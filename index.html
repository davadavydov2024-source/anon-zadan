<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>anon:zadan v23.0 SUPREME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #050505; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(18,18,20,0.9); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.06); border-radius: 30px; }
        .tab { display: none; } .tab.active { display: block; animation: fIn 0.4s ease; }
        @keyframes fIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .input-box { background: #0f0f11; border: 1px solid #222; color: #fff; border-radius: 20px; padding: 16px; width: 100%; outline: none; transition: 0.3s; }
        .nav-item { opacity: 0.2; transition: 0.3s; } .nav-item.active { opacity: 1; color: #3b82f6; }
        #ban-scr { display:none; position:fixed; inset:0; background:#000; z-index:9999; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
        .btn-act { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 10px; margin-top: 5px; font-size: 10px; font-weight: 800; text-transform: uppercase; width: 100%; text-align: center; }
    </style>
</head>
<body class="pb-32">
    <div id="ban-scr">
        <h1 class="text-red-600 font-black text-5xl mb-6 italic">ERR: 67</h1>
        <div class="glass p-2 mb-6 w-full max-w-sm"><video id="bv" class="w-full rounded-2xl" loop muted playsinline><source src="https://v1.pinimg.com/videos/mc/720p/8c/21/5c/8c215c0e181419796030c25a7209772a.mp4" type="video/mp4"></video></div>
        <div class="glass p-6 w-full max-w-sm text-center"><p id="br" class="text-[10px] opacity-40 mb-2 uppercase"></p><p id="bt" class="text-2xl font-black text-red-600 mb-8 italic"></p><button onclick="setTab('support'); document.getElementById('ban-scr').style.display='none'" class="w-full py-5 bg-white text-black rounded-2xl font-black uppercase text-xs">Support</button></div>
    </div>

    <header class="p-6 flex justify-between items-center sticky top-0 z-[100] glass rounded-none rounded-b-[40px] border-none">
        <div><h1 class="text-2xl font-black italic tracking-tighter">anon:<span class="text-zinc-700">zadan</span></h1><p class="text-[8px] text-green-500 font-black uppercase mt-1">● <span id="f-on">0</span> live</p></div>
        <div id="ub" onclick="setTab('me')" class="bg-white/5 border border-white/10 px-5 py-3 rounded-2xl text-xs font-black italic cursor-pointer">0 ₽</div>
    </header>

    <section id="home" class="tab active px-5 pt-8 space-y-6"><div id="tl" class="space-y-6"></div></section>
    
    <section id="create" class="tab px-5 pt-8"><div class="glass p-8 space-y-5"><input id="zt" class="input-box" placeholder="Название"><input id="za" class="input-box" placeholder="Локация"><input id="zp" type="number" class="input-box" placeholder="Сумма ₽"><input type="file" id="zf" class="hidden" onchange="document.getElementById('fl').innerText='FOTO ATTACHED'"><label for="zf" id="fl" class="input-box block text-center py-10 border-dashed border-zinc-800 opacity-40 italic uppercase text-[10px] font-black cursor-pointer">Прикрепить фото</label><button onclick="cTask()" id="cb" class="w-full py-6 bg-blue-600 rounded-[25px] font-black uppercase italic shadow-xl">Опубликовать задание</button></div></section>

    <section id="support" class="tab px-5 pt-8"><div id="cl" class="space-y-4"></div><div id="cr" class="hidden"><button onclick="activeC=null; render()" class="text-[10px] font-black uppercase mb-4 opacity-40"><i class="fa-solid fa-arrow-left"></i> Назад</button><div class="glass p-5 h-[62vh] flex flex-col"><div id="ms" class="flex-1 overflow-y-auto space-y-4 pr-2"></div><div id="ir" class="flex gap-3 mt-4"><input id="mi" class="input-box" placeholder="..."><button onclick="sMsg()" class="w-16 bg-white text-black rounded-[20px] flex items-center justify-center shadow-lg"><i class="fa-solid fa-paper-plane"></i></button></div></div></div></section>

    <section id="me" class="tab px-5 pt-8"><div class="glass p-10 text-center space-y-12"><h3 id="un" class="text-4xl font-black italic uppercase tracking-tighter">...</h3><div id="ubm" class="text-7xl font-black italic">0 ₽</div><div class="grid grid-cols-2 gap-4"><button onclick="localStorage.clear();location.reload()" class="py-5 bg-zinc-900 border border-white/5 rounded-2xl text-[10px] font-black uppercase italic">Logout</button><button onclick="setTab('al')" class="py-5 bg-zinc-900/40 rounded-2xl text-[10px] font-black uppercase opacity-5">Admin</button></div></div></section>

    <section id="al" class="tab px-5 pt-24"><div class="glass p-12"><input type="password" oninput="if(this.value==='kalubxq') setTab('adm')" class="input-box text-center font-black" placeholder="OVERLORD CODE"></div></section>
    
    <section id="adm" class="tab px-5 pt-8 pb-48 space-y-8 overflow-y-auto">
        <h2 class="text-3xl font-black italic text-red-600">OVERLORD PANEL</h2>
        
        <div class="glass p-6 space-y-4">
            <h3 class="text-[10px] font-black uppercase text-blue-500 italic">Universal Broadcast</h3>
            <textarea id="an-txt" class="input-box text-xs h-20" placeholder="Текст сообщения..."></textarea>
            <input type="file" id="an-img" class="hidden" onchange="document.getElementById('al-im').innerText='IMG READY'"><label for="an-img" id="al-im" class="text-[8px] font-black uppercase block border border-dashed border-zinc-800 p-3 text-center opacity-40">Add Image</label>
            <div id="btn-builder" class="space-y-2"></div>
            <button onclick="addBtnField()" class="text-[8px] font-black uppercase text-zinc-500">+ Кнопка действия</button>
            <div class="grid grid-cols-2 gap-2 mt-4"><button onclick="sendB('news')" class="py-3 bg-blue-600 rounded-xl text-[9px] font-black uppercase">В Канал</button><button onclick="sendB('all')" class="py-3 bg-white text-black rounded-xl text-[9px] font-black uppercase">Всем в ЛС</button></div>
        </div>

        <div class="space-y-4"><h3 class="text-[10px] font-black opacity-20 uppercase italic ml-1">Задания (Pending)</h3><div id="atl" class="space-y-3"></div></div>
        <div class="space-y-4"><h3 class="text-[10px] font-black opacity-20 uppercase italic ml-1">База Пользователей</h3><div id="aul" class="space-y-3"></div></div>
    </section>

    <nav id="bn" class="fixed bottom-0 left-0 right-0 h-24 bg-black/95 backdrop-blur-3xl border-t border-white/5 flex justify-around items-center z-[200] rounded-t-[45px] shadow-2xl">
        <button onclick="setTab('home')" class="nav-item active" id="btn-home"><i class="fa-solid fa-house-chimney text-xl"></i></button>
        <button onclick="setTab('create')" class="nav-item" id="btn-create"><i class="fa-solid fa-square-plus text-2xl"></i></button>
        <button onclick="setTab('support')" class="nav-item" id="btn-support"><i class="fa-solid fa-message text-xl"></i></button>
        <button onclick="setTab('me')" class="nav-item" id="btn-me"><i class="fa-solid fa-user-gear text-xl"></i></button>
    </nav>

    <script>
        const cf = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com", storageBucket: "dogx-base.appspot.com" };
        const K = 'anon_v23_supreme'; firebase.initializeApp(cf); const db_r = firebase.database(); const st_r = firebase.storage();
        let me = null, activeC = null, db = {u:{}, t:{}, c:{}}, btnCount = 0;

        function init() {
            db_r.ref(K).on('value', s => {
                db = s.val() || {u:{}, t:{}, c:{}}; const uid = localStorage.getItem('a_id');
                if(uid && db.u[uid]) { me = db.u[uid]; if(me.b) showB(); render(); } else auth();
                document.getElementById('f-on').innerText = Math.floor(Math.random() * 40 + 80);
            });
        }

        async function auth() {
            const { value: f } = await Swal.fire({ title: 'LOG-IN', background:'#050505', color:'#fff', html:`<input id="sn" class="swal2-input" placeholder="NIK"><input id="sp" type="password" class="swal2-input" placeholder="PASS"><input id="st" class="swal2-input" placeholder="@TELEGRAM" oninput="this.value.startsWith('@')?'':this.value='@'+this.value">`, allowOutsideClick:false, preConfirm:()=>[document.getElementById('sn').value, document.getElementById('sp').value, document.getElementById('st').value] });
            if(f && f[2].length > 3) {
                const ex = Object.values(db.u).find(u=>u.t===f[2]);
                if(ex) { if(ex.p===f[1]) { localStorage.setItem('a_id', ex.id); location.reload(); } else auth(); }
                else { const id = "u"+Date.now(); await db_r.ref(`${K}/u/${id}`).set({id, n:f[0], p:f[1], t:f[2], bal:0, b:false, s:'WORKER'}); localStorage.setItem('a_id', id); location.reload(); }
            } else auth();
        }

        function showB() { document.getElementById('ban-scr').style.display='flex'; document.getElementById('br').innerText=me.br; document.getElementById('bt').innerText=me.bt; document.getElementById('bv').play(); document.getElementById('bn').style.display='none'; }

        async function cTask() {
            const t = document.getElementById('zt').value, p = document.getElementById('zp').value, f = document.getElementById('zf').files[0]; if(!t || !p || !f) return;
            document.getElementById('cb').innerText = "UPLOADING..."; const ref = st_r.ref(`v23/${Date.now()}`); await ref.put(f); const url = await ref.getDownloadURL();
            await db_r.ref(`${K}/t/t${Date.now()}`).set({id:"t"+Date.now(), t, p:Number(p), img:url, st:'pending', o:me.n}); setTab('home');
        }

        function render() {
            document.getElementById('ub').innerText = me.bal + ' ₽'; document.getElementById('ubm').innerText = me.bal + ' ₽'; document.getElementById('un').innerText = me.n;
            const ts = Object.values(db.t || {}).filter(x => x.st === 'active');
            document.getElementById('tl').innerHTML = ts.map(t => `<div class="glass overflow-hidden shadow-2xl"><img src="${t.img}" class="w-full h-48 object-cover"><div class="p-5 flex justify-between items-center"><div><b class="text-xs uppercase italic font-black">${t.t}</b></div><b class="text-lg font-black italic">${t.p} ₽</b></div></div>`).join('');
            
            // ADMIN
            const pT = Object.values(db.t || {}).filter(x => x.st === 'pending');
            document.getElementById('atl').innerHTML = pT.map(t => `<div class="glass p-4 flex justify-between items-center text-[10px] font-black uppercase">${t.o}: ${t.t}<div class="flex gap-4"><button onclick="db_r.ref('${K}/t/${t.id}').update({st:'active'})" class="text-green-500">OK</button><button onclick="db_r.ref('${K}/t/${t.id}').remove()" class="text-red-600">X</button></div></div>`).join('') || '<p class="text-center opacity-10 text-[8px]">Empty</p>';
            document.getElementById('aul').innerHTML = Object.values(db.u || {}).map(u => `<div class="glass p-4 flex justify-between items-center ${u.b?'border-red-600/30 bg-red-900/5':''}"><div class="text-[10px] font-black italic">${u.n} <span class="text-blue-500 text-[8px]">[${u.s}]</span><br><span class="opacity-30">${u.t} | ${u.p}</span></div><div class="flex flex-col items-end gap-1"><b class="text-[10px] text-green-500">${u.bal}₽</b><button onclick="aE('${u.id}')" class="text-[8px] opacity-30 uppercase font-black">Edit</button></div></div>`).join('');
            
            // CHATS
            const chats = [{id:'news', n:'Канал Системы', i:'fa-bullhorn', b:'bg-blue-600'}, {id:'system', n:'Служба Поддержки', i:'fa-headset', b:'bg-zinc-800'}];
            if(!activeC) document.getElementById('cl').innerHTML = chats.map(c => `<div onclick="oChat('${c.id}')" class="glass p-6 flex items-center gap-5 cursor-pointer"><div class="w-12 h-12 ${c.b} rounded-2xl flex items-center justify-center text-xl shadow-lg"><i class="fa-solid ${c.i} text-white"></i></div><div><b class="text-xs uppercase font-black italic">${c.n}</b><p class="text-[8px] opacity-40 font-bold mt-1 uppercase">Open communication</p></div></div>`).join('');
            if(activeC) renderM();
        }

        async function aE(uid) {
            const u = db.u[uid]; const { value: v } = await Swal.fire({ title:'OVERLORD CONTROL', background:'#0a0a0a', color:'#fff', html:`<input id="eb" class="swal2-input" placeholder="Баланс" value="${u.bal}"><input id="es" class="swal2-input" placeholder="Статус" value="${u.s}"><div class="grid grid-cols-2 gap-2 mt-4"><button onclick="window.act='b'" class="swal2-confirm swal2-styled !bg-red-600">${u.b?'UNBAN':'BAN'}</button><button onclick="window.act='d'" class="swal2-confirm swal2-styled !bg-zinc-800">DELETE</button></div>`, preConfirm:()=>({bal:document.getElementById('eb').value, s:document.getElementById('es').value}) });
            if(v) { if(window.act==='b') db_r.ref(`${K}/u/${uid}`).update({b:!u.b, br:'Violation', bt:'Forever'}); else if(window.act==='d') db_r.ref(`${K}/u/${uid}`).remove(); else db_r.ref(`${K}/u/${uid}`).update({bal:Number(v.bal), s:v.s}); window.act=null; }
        }

        function addBtnField() {
            const id = "b" + btnCount++;
            const div = document.createElement('div'); div.id = id; div.className = "flex gap-2";
            div.innerHTML = `<input class="input-box text-[9px] p-2" placeholder="Текст кнопки"><input class="input-box text-[9px] p-2" placeholder="Ответ/Ссылка"><button onclick="this.parentElement.remove()" class="text-red-500 text-[10px]">X</button>`;
            document.getElementById('btn-builder').appendChild(div);
        }

        async function sendB(target) {
            const txt = document.getElementById('an-txt').value, img = document.getElementById('an-img').files[0];
            let url = null; if(img) { const ref = st_r.ref(`an/${Date.now()}`); await ref.put(img); url = await ref.getDownloadURL(); }
            const btns = []; document.querySelectorAll('#btn-builder div').forEach(d => { const inp = d.querySelectorAll('input'); btns.push({t:inp[0].value, a:inp[1].value}); });
            const msg = { text:txt, img:url, btns:btns, from:'system', time:Date.now() };
            if(target === 'news') await db_r.ref(`${K}/c/news/${Date.now()}`).set(msg);
            else Object.keys(db.u).forEach(uid => db_r.ref(`${K}/c/${uid}/${Date.now()}`).set(msg));
            Swal.fire('OK', 'Broadcast sent', 'success');
        }

        function setTab(t) { if(me && me.b && t !== 'support') return; document.querySelectorAll('.tab').forEach(x => x.classList.remove('active')); document.getElementById(t).classList.add('active'); document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active')); if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.add('active'); }
        function oChat(id) { activeC = id; document.getElementById('cl').classList.add('hidden'); document.getElementById('cr').classList.remove('hidden'); document.getElementById('ir').style.display = (id==='news') ? 'none' : 'flex'; renderM(); }
        async function sMsg() { const v = document.getElementById('mi').value; if(!v) return; const p = (activeC === 'system' || db.u[activeC]) ? (activeC === 'system' ? me.id : activeC) : activeC; await db_r.ref(`${K}/c/${p}/${Date.now()}`).set({text:v, from: (me.id === activeC || activeC === 'system' ? 'user' : 'system'), time:Date.now()}); document.getElementById('mi').value=""; }
        function renderM() {
            const p = (activeC === 'system' || db.u[activeC]) ? (activeC === 'system' ? me.id : activeC) : activeC; const ms = Object.values(db.c[p] || {}).sort((a,b)=>a.time-b.time);
            document.getElementById('ms').innerHTML = ms.map(m => `
                <div class="p-4 max-w-[90%] rounded-[24px] text-[11px] font-black italic shadow-lg ${m.from==='system'?'bg-blue-600 self-start text-white':'bg-white text-black self-end'}">
                    ${m.img ? `<img src="${m.img}" class="w-full rounded-xl mb-2">` : ''}
                    ${m.text}
                    ${m.btns ? m.btns.map(b => `<button onclick="handleAct('${b.a}')" class="btn-act">${b.t}</button>`).join('') : ''}
                </div>`).join('');
            const b = document.getElementById('ms'); b.scrollTop = b.scrollHeight;
        }

        window.handleAct = (a) => {
            if(a.startsWith('http')) window.open(a, '_blank');
            else Swal.fire({ title: 'System', text: a, background: '#0a0a0a', color: '#fff' });
        };
        init();
    </script>
</body>
</html>
