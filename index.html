<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK OMEGA V120.7</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Courier+Prime&family=Dancing+Script:wght@700&family=EB+Garamond:ital@1&family=Jura:wght@700&family=Kelly+Slab&family=Lobster&family=Monoton&family=Montserrat+Alternates:wght@900&family=Pacifico&family=Playfair+Display:wght@900&family=Press+Start+2P&family=Ruslan+Display&family=Underdog&family=Zeyada&display=swap" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --bg: #050505; --card: #121214; --text: #ffffff; --blue: #007aff; --gray: #1c1c1e; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .glass { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 24px; }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px 16px 160px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .nick-rainbow { background: linear-gradient(to right, red, orange, yellow, green, cyan, blue, violet); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rainbow_anim 3s linear infinite; font-weight: 900; background-size: 200%; }
        @keyframes rainbow_anim { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .nick-neon { color: #fff; text-shadow: 0 0 5px #fff, 0 0 10px var(--blue), 0 0 20px var(--blue); }
        .nick-purple { color: #bf00ff; text-shadow: 0 0 10px rgba(191,0,255,0.5); }
        .nick-red { color: #ff3b30; font-weight: 900; }

        .badge-neon { color: #00f2ff; filter: drop-shadow(0 0 5px #00f2ff); }
        .badge-rainbow { background: linear-gradient(to right, red, yellow, lime, cyan, blue, magenta); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .badge-red { color: #ff3b30; } .badge-yellow { color: #ffcc00; } .badge-gray { color: #8e8e93; } .badge-white { color: #ffffff; }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: rgba(10,10,10,0.8); backdrop-filter: blur(20px); display: flex; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #636366; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 700; }
        .nav-btn.active { color: var(--blue); }

        input, textarea, select { background: var(--gray); border: 1px solid transparent; border-radius: 14px; padding: 14px; color: white; width: 100%; outline: none; font-size: 14px; }
        .btn-blue { background: var(--blue); color: white; border-radius: 16px; font-weight: 800; padding: 16px; width: 100%; border: none; cursor: pointer; }
        #loader { background: #000; z-index: 10000; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }

        /* Шрифты */
        .f-1 { font-family: 'Comfortaa'; } .f-12 { font-family: 'Press Start 2P'; }
    </style>
</head>
<body>

    <div id="loader"><div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>

    <div id="auth_scr" class="hidden fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-8">
        <h1 class="text-4xl font-black mb-12 italic tracking-tighter">LYNEOK<span class="text-blue-500">.</span></h1>
        <div class="w-full max-sm glass p-6 space-y-4">
            <div id="reg_ext" class="hidden space-y-4">
                <input type="file" id="r_ava" class="hidden" accept="image/*" onchange="upImg(this, 'l_r_ava')">
                <label for="r_ava" id="l_r_ava" class="w-20 h-20 bg-zinc-800 mx-auto rounded-full flex items-center justify-center cursor-pointer border-2 border-dashed border-zinc-700 overflow-hidden"><i class="fa-solid fa-plus text-zinc-500"></i></label>
                <input id="r_email" type="email" placeholder="Email">
                <input id="r_tg" placeholder="Telegram @nick">
            </div>
            <input id="a_n" placeholder="Логин">
            <input id="a_p" type="password" placeholder="Пароль">
            <button onclick="handleAuth()" id="a_btn" class="btn-blue">Войти</button>
            <p onclick="toggleR()" id="a_tog" class="text-center text-[10px] font-black text-zinc-500 uppercase cursor-pointer pt-2">Создать аккаунт</p>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-5 py-4 flex justify-between items-center bg-black/50 backdrop-blur-md border-b border-white/5">
            <b class="text-xl italic tracking-tighter">LYNEOK</b>
            <div onclick="switchT('profile')" class="bg-zinc-900 px-4 py-1.5 rounded-full flex items-center gap-2">
                <span id="h_bal" class="font-bold text-xs">0 ₽</span>
                <img id="h_ava" class="w-6 h-6 rounded-full object-cover">
            </div>
        </header>

        <main id="tab_market" class="tab-content active">
            <div id="cat_grid" class="grid grid-cols-2 gap-3"></div>
            <div id="subcat_view" class="hidden space-y-4">
                <button onclick="closeSubcat()" class="text-blue-500 font-bold text-xs flex items-center"><i class="fa-solid fa-chevron-left mr-2"></i> НАЗАД</button>
                <div id="subcat_grid" class="grid grid-cols-2 gap-3"></div>
            </div>
            <div id="items_view" class="hidden space-y-4">
                <button onclick="closeCat()" class="text-blue-500 font-bold text-xs flex items-center"><i class="fa-solid fa-chevron-left mr-2"></i> НАЗАД</button>
                <div id="items_list" class="space-y-3"></div>
            </div>
        </main>

        <main id="tab_sell" class="tab-content">
            <h2 class="text-2xl font-black mb-6">Продать</h2>
            <div class="glass p-5 space-y-4">
                <input type="file" id="s_img" class="hidden" onchange="upImg(this, 'l_s_img')">
                <label for="s_img" id="l_s_img" class="w-full h-40 bg-zinc-900 rounded-2xl flex items-center justify-center border-2 border-dashed border-zinc-800"><i class="fa-solid fa-camera text-2xl text-zinc-700"></i></label>
                <select id="s_game" onchange="updateSubcats()"></select>
                <select id="s_subcat"></select>
                <input id="s_t" placeholder="Название лота">
                <textarea id="s_acc" rows="3" placeholder="Описание и данные (только для покупателя)"></textarea>
                <input id="s_p" type="number" placeholder="Цена ₽" oninput="calcComm()">
                <div id="s_calc_res" class="text-[10px] text-zinc-500 font-bold px-2">К получению: 0 ₽</div>
                <button onclick="postItem()" class="btn-blue italic">ВЫСТАВИТЬ</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content">
            <h2 class="text-2xl font-black mb-6">Сделки</h2>
            <div id="deals_list" class="space-y-3"></div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="glass p-6 mb-4 text-center">
                <img id="p_ava" class="w-24 h-24 rounded-full mx-auto mb-4 object-cover border-4 border-zinc-900">
                <div class="flex items-center justify-center gap-1">
                    <span id="p_n" class="text-2xl font-black">...</span>
                    <span id="p_badge"></span>
                </div>
                <p id="p_status" class="text-xs font-bold mb-6 opacity-60"></p>
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <button class="btn-blue !bg-white !text-black !text-xs">ПОПОЛНИТЬ</button>
                    <button onclick="askOut()" class="btn-blue !text-xs">ВЫВОД</button>
                </div>
            </div>
            
            <div class="mb-4">
                <h3 class="text-[10px] font-black uppercase text-zinc-500 mb-3 ml-2">Мои товары (управление ценой)</h3>
                <div id="p_my_items" class="space-y-3"></div>
            </div>

            <div id="p_reviews" class="glass p-5 mb-4">
                <h3 class="text-xs font-black uppercase mb-4">Отзывы о вас</h3>
                <div id="reviews_list" class="space-y-3 text-xs"></div>
            </div>
            <button id="adm_btn" onclick="switchT('admin')" class="hidden w-full bg-red-600/10 text-red-500 py-4 rounded-2xl font-bold mb-4 border border-red-600/20">АДМИН-ПАНЕЛЬ</button>
            <button onclick="logout()" class="w-full py-4 text-red-500 opacity-30 text-[10px] font-black uppercase">Выйти</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <div class="mb-8">
                <h1 class="text-3xl font-black italic">LYNEOK ADMIN</h1>
                <div class="grid grid-cols-2 gap-2 mt-4">
                    <input id="ad_bot_token" placeholder="Bot Token" class="!p-2 !text-[9px]">
                    <input id="ad_bot_id" placeholder="Admin ID (TG)" class="!p-2 !text-[9px]">
                    <button onclick="admSaveBot()" class="col-span-2 bg-blue-600 py-2 rounded-lg text-[9px] font-black uppercase">Сохранить настройки бота</button>
                </div>
            </div>

            <div class="space-y-8">
                <section>
                    <h3 class="text-[10px] font-black text-yellow-500 uppercase mb-4">Модерация</h3>
                    <div id="ad_mod_list" class="space-y-3"></div>
                </section>

                <section class="glass p-5">
                    <h3 class="text-[10px] font-black text-blue-500 uppercase mb-4">Игры и категории</h3>
                    <div class="space-y-3 mb-6">
                        <input id="ad_game_name" placeholder="Название игры">
                        <input type="file" id="ad_game_img_input" class="hidden" onchange="upImg(this, 'l_ad_game_img')">
                        <label for="ad_game_img_input" id="l_ad_game_img" class="w-full py-4 bg-zinc-800 rounded-xl text-center text-[10px] font-bold block cursor-pointer">Выбрать иконку</label>
                        <button onclick="admAddGame()" class="w-full bg-white text-black py-4 rounded-xl font-black text-xs">СОЗДАТЬ ИГРУ</button>
                    </div>
                    <div id="ad_games_list" class="space-y-4"></div>
                </section>

                <section>
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-[10px] font-black text-zinc-500 uppercase">Пользователи</h3>
                        <span id="ad_total_users" class="text-[10px] font-bold text-blue-400">Всего: 0</span>
                    </div>
                    <input id="ad_user_search" placeholder="Поиск..." class="mb-4 !text-xs" oninput="renderAdminUsers()">
                    <div id="ad_users" class="space-y-4"></div>
                </section>
            </div>
        </main>

        <nav class="nav-bar">
            <div onclick="switchT('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-shop text-xl"></i><span>Маркет</span></div>
            <div onclick="switchT('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-plus-circle text-xl"></i><span>Продать</span></div>
            <div onclick="switchT('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-comments text-xl"></i><span>Сделки</span></div>
            <div onclick="switchT('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user text-xl"></i><span>Профиль</span></div>
        </nav>
    </div>

    <div id="item_modal" class="hidden fixed inset-0 z-[10002] bg-black/95 flex flex-col">
        <div class="flex-1 overflow-y-auto pb-10">
            <div class="relative w-full aspect-square">
                <img id="im_img" class="w-full h-full object-cover">
                <button onclick="closeItemModal()" class="absolute top-6 right-6 w-10 h-10 bg-black/50 rounded-full text-2xl">&times;</button>
            </div>
            <div class="p-6">
                <h1 id="im_title" class="text-3xl font-black italic tracking-tighter mb-2"></h1>
                <div class="flex items-center gap-4 mb-6">
                    <span id="im_price" class="text-2xl text-blue-500 font-black"></span>
                    <span id="im_old_price" class="text-sm text-zinc-600 line-through"></span>
                </div>
                
                <div class="glass p-5 mb-6">
                    <h3 class="text-[10px] font-black uppercase text-zinc-500 mb-2">Описание</h3>
                    <p id="im_desc" class="text-sm leading-relaxed"></p>
                </div>

                <div id="im_seller_box" class="flex items-center justify-between glass p-4 mb-6">
                    <div class="flex items-center gap-3">
                        <img id="im_s_ava" class="w-10 h-10 rounded-full object-cover">
                        <div>
                            <div class="flex items-center gap-1">
                                <b id="im_s_n" class="text-sm"></b>
                                <span id="im_s_badge"></span>
                            </div>
                            <div id="im_s_stars" class="text-[9px] text-yellow-500"></div>
                        </div>
                    </div>
                    <button id="im_buy_btn" class="bg-blue-600 px-6 py-2.5 rounded-xl text-xs font-black uppercase">Купить</button>
                </div>
                
                <div id="im_reviews_box">
                    <h3 class="text-[10px] font-black uppercase text-zinc-500 mb-3">Последние отзывы</h3>
                    <div id="im_reviews_list" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="chat_modal" class="hidden fixed inset-0 z-[10001] bg-black flex flex-col">
        <header class="p-5 flex justify-between items-center bg-zinc-900 border-b border-white/5">
            <b id="chat_title">Чат</b>
            <button onclick="closeChatModal()" class="text-3xl">&times;</button>
        </header>
        <div id="chat_body" class="flex-1 overflow-y-auto p-4 flex flex-col gap-2"></div>
        <div id="review_form" class="hidden p-4 bg-zinc-900 border-t border-blue-500/30">
            <select id="rev_stars" class="!w-full mb-2"><option value="5">⭐⭐⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option></select>
            <div class="flex gap-2">
                <input id="rev_text" placeholder="Ваш отзыв..." class="!text-xs">
                <button onclick="submitReview()" class="bg-blue-600 px-4 rounded-xl text-xs font-bold">ОК</button>
            </div>
        </div>
        <div class="p-4 bg-zinc-900 flex gap-2 pb-8">
            <input id="chat_input" placeholder="Сообщение...">
            <button onclick="sendMessage()" class="bg-blue-600 px-5 rounded-xl"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        firebase.initializeApp({ apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" });
        const db = firebase.database().ref('lyne_v120_omega');
        const Tst = Swal.mixin({ toast: true, position: 'top', timer: 2000, showConfirmButton: false, background: '#1c1c1e', color: '#fff' });

        let me = null, data = {}, isR = false, tmpImg = "", activeChat = null;

        function init() {
            db.on('value', snap => {
                data = snap.val() || { u:{}, i:{}, d:{}, mod:{}, games:{}, msgs:{}, reviews:{}, settings:{} };
                const sid = localStorage.getItem('lyne_v120_sid');
                document.getElementById('loader').style.display = 'none';
                if (sid && data.u[sid]) {
                    me = data.u[sid];
                    if(me.banned) return handleBan();
                    document.getElementById('auth_scr').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    if(me.n.toLowerCase() === 'owwner') document.getElementById('adm_btn').classList.remove('hidden');
                    render();
                } else { 
                    document.getElementById('auth_scr').classList.remove('hidden'); 
                }
            });
        }

        function render() {
            if(!me) return;
            document.getElementById('h_bal').innerText = me.bal + ' ₽';
            document.getElementById('h_ava').src = me.ava;
            document.getElementById('p_ava').src = me.ava;
            document.getElementById('p_n').innerText = me.n;
            document.getElementById('p_n').className = 'text-2xl font-black ' + (me.nickEffect || '') + ' ' + (me.fontClass || '');
            document.getElementById('p_badge').innerHTML = me.badgeType ? `<i class="fa-solid fa-circle-check ${me.badgeType}"></i>` : '';

            // Маркет
            const gs = Object.values(data.games || {});
            document.getElementById('cat_grid').innerHTML = gs.map(g => `<div class="glass p-5 text-center" onclick="openGame('${g.id}')"><img src="${g.img}" class="w-16 h-16 mx-auto mb-3 rounded-2xl object-cover"><b class="text-sm">${g.name}</b></div>`).join('');
            document.getElementById('s_game').innerHTML = gs.map(g => `<option value="${g.id}">${g.name}</option>`).join('');

            // Мои товары в профиле
            const myItems = Object.values(data.i || {}).filter(it => it.sid === me.id);
            document.getElementById('p_my_items').innerHTML = myItems.map(it => `
                <div class="glass p-3 flex justify-between items-center">
                    <span class="text-xs truncate w-32">${it.title}</span>
                    <div class="flex gap-2">
                        <input id="up_p_${it.id}" type="number" value="${it.price}" class="!w-16 !p-1 !text-xs !bg-black">
                        <button onclick="updatePrice('${it.id}')" class="bg-blue-600 px-2 rounded-lg text-[10px]">ОК</button>
                    </div>
                </div>
            `).join('');

            // Сделки
            const myDeals = Object.values(data.d || {}).filter(d => d.bid === me.id || d.sid === me.id);
            document.getElementById('deals_list').innerHTML = myDeals.reverse().map(d => `<div class="glass p-4 flex justify-between items-center"><div><b class="text-sm">${d.t}</b><div class="text-[10px] text-zinc-500">${d.p} ₽</div></div><button onclick="openChat('${d.id}')" class="bg-blue-600/10 text-blue-500 px-5 py-2 rounded-xl text-[10px]">ЧАТ</button></div>`).join('');

            if(me.n.toLowerCase() === 'owwner') {
                document.getElementById('ad_bot_token').value = data.settings.bot_token || '';
                document.getElementById('ad_bot_id').value = data.settings.bot_admin_id || '';
                renderAdminUsers(); renderAdminGames(); renderAdminMods();
            }
        }

        // --- МАРКЕТ И КАТЕГОРИИ ---
        function openGame(gid) {
            document.getElementById('cat_grid').classList.add('hidden');
            document.getElementById('subcat_view').classList.remove('hidden');
            const g = data.games[gid];
            let catsHtml = `<div class="bg-blue-600 p-5 text-center rounded-2xl cursor-pointer" onclick="openItems('${gid}', 'ALL')"><b class="text-sm uppercase">Показать ВСЕ</b></div>`;
            catsHtml += Object.values(g.cats || {}).map(c => `<div class="glass p-5 text-center cursor-pointer" onclick="openItems('${gid}', '${c.name}')"><b class="text-sm">${c.name}</b></div>`).join('');
            document.getElementById('subcat_grid').innerHTML = catsHtml;
        }

        function openItems(gid, cat) {
            document.getElementById('subcat_view').classList.add('hidden');
            document.getElementById('items_view').classList.remove('hidden');
            const its = Object.values(data.i || {}).filter(i => i.gameId === gid && (cat === 'ALL' || i.cat === cat));
            document.getElementById('items_list').innerHTML = its.map(i => `
                <div class="glass p-4 flex justify-between items-center cursor-pointer active:scale-95 transition" onclick="openItemDetail('${i.id}')">
                    <div class="flex items-center gap-3">
                        <img src="${i.img}" class="w-12 h-12 rounded-lg object-cover">
                        <div>
                            <b class="text-sm">${i.title}</b>
                            <div class="flex items-center gap-2">
                                <span class="text-blue-500 font-bold text-xs">${i.price} ₽</span>
                                ${i.oldPrice ? `<span class="text-zinc-600 line-through text-[9px]">${i.oldPrice} ₽</span>` : ''}
                            </div>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-zinc-800"></i>
                </div>
            `).join('');
        }

        // --- КАРТОЧКА ТОВАРА ---
        function openItemDetail(id) {
            const i = data.i[id];
            const seller = data.u[i.sid];
            const reviews = Object.values(data.reviews[i.sid] || {});
            
            document.getElementById('item_modal').classList.remove('hidden');
            document.getElementById('im_img').src = i.img;
            document.getElementById('im_title').innerText = i.title;
            document.getElementById('im_price').innerText = i.price + ' ₽';
            document.getElementById('im_old_price').innerText = i.oldPrice ? i.oldPrice + ' ₽' : '';
            document.getElementById('im_desc').innerText = i.acc_data || 'Описание отсутствует';
            
            document.getElementById('im_s_ava').src = seller.ava;
            document.getElementById('im_s_n').innerText = seller.n;
            document.getElementById('im_s_n').className = 'text-sm ' + (seller.nickEffect || '');
            document.getElementById('im_s_badge').innerHTML = seller.badgeType ? `<i class="fa-solid fa-circle-check ${seller.badgeType}"></i>` : '';
            document.getElementById('im_s_stars').innerText = '⭐'.repeat(5) + ` (${reviews.length})`;
            
            document.getElementById('im_buy_btn').onclick = () => { closeItemModal(); buyItem(id); };
            
            document.getElementById('im_reviews_list').innerHTML = reviews.slice(-3).map(r => `
                <div class="bg-white/5 p-3 rounded-xl text-[10px]">
                    <div class="flex justify-between mb-1"><b>${r.from}</b> <span>${'⭐'.repeat(r.stars)}</span></div>
                    <p class="opacity-60">${r.text}</p>
                </div>
            `).join('');
        }

        function closeItemModal() { document.getElementById('item_modal').classList.add('hidden'); }

        // --- УПРАВЛЕНИЕ ЦЕНОЙ ---
        function updatePrice(id) {
            const newP = Number(document.getElementById(`up_p_${id}`).value);
            const oldP = data.i[id].price;
            if(newP >= oldP) {
                db.child(`i/${id}/price`).set(newP);
                db.child(`i/${id}/oldPrice`).remove();
            } else {
                db.child(`i/${id}/price`).set(newP);
                db.child(`i/${id}/oldPrice`).set(oldP);
            }
            Tst.fire({icon:'success', title:'Цена обновлена'});
        }

        // --- АДМИНКА ---
        function renderAdminUsers() {
            const q = document.getElementById('ad_user_search').value.toLowerCase();
            const us = Object.values(data.u).filter(u => u.n.toLowerCase().includes(q));
            document.getElementById('ad_total_users').innerText = 'Всего: ' + Object.keys(data.u).length;
            document.getElementById('ad_users').innerHTML = us.map(u => `
                <div class="p-4 bg-zinc-900 rounded-2xl border border-white/5">
                    <div class="flex items-center gap-3 mb-4">
                        <img src="${u.ava}" class="w-8 h-8 rounded-full object-cover">
                        <b class="text-xs ${u.nickEffect || ''}">${u.n}</b>
                        <span class="text-[9px] text-zinc-500 ml-auto">Баланс: ${u.bal}₽</span>
                    </div>
                    <div class="flex gap-2 mb-3">
                        <select id="ab_${u.id}" class="!p-2 !text-[9px]">
                            <option value="">Без галочки</option>
                            <option value="badge-neon" ${u.badgeType==='badge-neon'?'selected':''}>Неон</option>
                            <option value="badge-rainbow" ${u.badgeType==='badge-rainbow'?'selected':''}>Радуга</option>
                            <option value="badge-red" ${u.badgeType==='badge-red'?'selected':''}>Красная</option>
                        </select>
                        <select id="an_${u.id}" class="!p-2 !text-[9px]">
                            <option value="">Обычный ник</option>
                            <option value="nick-rainbow" ${u.nickEffect==='nick-rainbow'?'selected':''}>Радуга</option>
                            <option value="nick-neon" ${u.nickEffect==='nick-neon'?'selected':''}>Неон</option>
                        </select>
                    </div>
                    <div class="flex gap-2">
                        <input id="abal_in_${u.id}" type="number" placeholder="Сумма пополнения" class="!p-2 !text-[10px] !bg-black">
                        <button onclick="admTopUp('${u.id}')" class="bg-green-600 px-4 rounded-lg text-xs font-bold">ОК</button>
                    </div>
                    <button onclick="admSaveU('${u.id}')" class="w-full mt-2 bg-blue-600 py-2 rounded-lg text-[9px] font-black uppercase">Сохранить стиль</button>
                </div>
            `).join('');
        }

        function admTopUp(uid) {
            const amt = Number(document.getElementById(`abal_in_${uid}`).value);
            if(!amt) return;
            db.child(`u/${uid}/bal`).transaction(b => (b || 0) + amt);
            Tst.fire({icon:'success', title:'Баланс пополнен'});
        }

        function admSaveU(uid) {
            db.child(`u/${uid}`).update({
                badgeType: document.getElementById(`ab_${uid}`).value,
                nickEffect: document.getElementById(`an_${uid}`).value
            });
            Tst.fire({icon:'success', title:'Обновлено'});
        }

        function admSaveBot() {
            db.child('settings').update({
                bot_token: document.getElementById('ad_bot_token').value,
                bot_admin_id: document.getElementById('ad_bot_id').value
            });
            Tst.fire({icon:'success', title:'Настройки бота сохранены'});
        }

        // --- ВСПОМОГАТЕЛЬНЫЕ ---
        function buyItem(id) {
            const i = data.i[id];
            if(me.bal < i.price) return Tst.fire({icon:'error', title:'Недостаточно ₽'});
            const did = 'd'+Date.now();
            db.child(`u/${me.id}/bal`).transaction(b => b - i.price);
            db.child(`u/${i.sid}/bal`).transaction(b => (b || 0) + Math.floor(i.price * 0.9));
            db.child(`d/${did}`).set({id:did, bid:me.id, bn:me.n, sid:i.sid, t:i.title, p:i.price, status:'active'});
            db.child(`i/${id}`).remove();
            Tst.fire({icon:'success', title:'Оплачено!'});
            switchT('chats');
        }

        function upImg(i, tid) { const r = new FileReader(); r.onload = e => { tmpImg = e.target.result; document.getElementById(tid).innerHTML = `<img src="${tmpImg}" class="w-full h-full object-cover rounded-xl">`; }; r.readAsDataURL(i.files[0]); }
        function switchT(t) { document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active')); document.getElementById('tab_'+t).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active')); document.getElementById('n_'+t)?.classList.add('active'); if(t==='market') closeSubcat(); }
        function logout() { localStorage.clear(); location.reload(); }
        function closeSubcat() { document.getElementById('subcat_view').classList.add('hidden'); document.getElementById('items_view').classList.add('hidden'); document.getElementById('cat_grid').classList.remove('hidden'); }
        function closeCat() { document.getElementById('items_view').classList.add('hidden'); document.getElementById('subcat_view').classList.remove('hidden'); }
        function closeChatModal() { activeChat = null; document.getElementById('chat_modal').classList.add('hidden'); }
        function handleAuth() { 
            const n = document.getElementById('a_n').value, p = document.getElementById('a_p').value; 
            if(isR){ 
                const id = 'u'+Date.now(); db.child(`u/${id}`).set({id, n, p, ava:tmpImg||'https://ui-avatars.com/api/?name='+n, bal:0}); 
                localStorage.setItem('lyne_v120_sid', id); location.reload();
            } else { 
                const u = Object.values(data.u).find(x => x.n === n && x.p === p); 
                if(u) { localStorage.setItem('lyne_v120_sid', u.id); location.reload(); } else { alert('!'); } 
            } 
        }
        function toggleR() { isR = !isR; document.getElementById('reg_ext').classList.toggle('hidden'); }
        function calcComm() { const p = Number(document.getElementById('s_p').value || 0); document.getElementById('s_calc_res').innerText = `К получению: ${Math.floor(p * 0.9)} ₽`; }
        
        // Запуск
        init();
    </script>
</body>
</html>
