<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK ULTIMATE V100</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --bg: #050505; --card: #121214; --text: #ffffff; --blue: #007aff; --gray: #1c1c1e; --accent: #ff3b30; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: var(--card); border: 1px solid rgba(255,255,255,0.03); border-radius: 24px; }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px 16px 160px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: rgba(10,10,10,0.8); backdrop-filter: blur(20px); display: flex; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #636366; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 700; }
        .nav-btn.active { color: var(--blue); }

        input, textarea, select { background: var(--gray); border: 1px solid transparent; border-radius: 14px; padding: 14px; color: white; width: 100%; outline: none; font-size: 14px; transition: 0.2s; }
        input:focus { border-color: var(--blue); background: #2c2c2e; }

        .btn-blue { background: var(--blue); color: white; border-radius: 16px; font-weight: 800; padding: 16px; width: 100%; transition: 0.2s; border: none; font-size: 14px; }
        .btn-blue:active { transform: scale(0.96); opacity: 0.9; }

        .b-blue { color: #00c2ff; }
        .b-red { color: #ff3b30; text-shadow: 0 0 5px rgba(255,59,48,0.5); }
        .b-gold { color: #ffcc00; text-shadow: 0 0 8px rgba(255,204,0,0.4); }
        .b-neon { color: #00ffcc; text-shadow: 0 0 10px #00ffcc; font-weight: 900; }
        .b-rainbow { background: linear-gradient(to right, #ef4444, #eab308, #22c55e, #3b82f6, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rb 3s linear infinite; font-weight: 900; }
        @keyframes rb { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        
        #loader { background: #000; z-index: 10000; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
        ::-webkit-scrollbar { width: 0; }

        /* Стиль чатов поддержки */
        .msg-adm { background: #3b82f6; color: white; border-radius: 15px 15px 0 15px; margin-left: auto; padding: 8px 12px; max-width: 80%; }
        .msg-usr { background: #27272a; color: white; border-radius: 15px 15px 15px 0; margin-right: auto; padding: 8px 12px; max-width: 80%; }
    </style>
</head>
<body>

    <div id="loader"><div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>

    <div id="auth_scr" class="hidden fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-8">
        <h1 class="text-4xl font-black mb-12 italic tracking-tighter">LYNEOK<span class="text-blue-500">.</span></h1>
        <div class="w-full max-w-sm glass p-6 space-y-4">
            <div id="reg_ext" class="hidden space-y-4">
                <input type="file" id="r_ava" class="hidden" accept="image/*" onchange="upImg(this, 'l_r_ava')">
                <label for="r_ava" id="l_r_ava" class="w-20 h-20 bg-zinc-800 mx-auto rounded-full flex items-center justify-center cursor-pointer overflow-hidden border-2 border-dashed border-zinc-700">
                    <i class="fa-solid fa-plus text-zinc-500"></i>
                </label>
                <input id="r_tg" placeholder="Telegram (@username)">
            </div>
            <input id="a_n" placeholder="Логин">
            <input id="a_p" type="password" placeholder="Пароль">
            <button onclick="handleAuth()" id="a_btn" class="btn-blue">Войти</button>
            <p onclick="toggleR()" id="a_tog" class="text-center text-[10px] font-black text-zinc-500 uppercase cursor-pointer tracking-widest pt-2">Создать аккаунт</p>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-5 py-4 flex justify-between items-center bg-black/50 backdrop-blur-md sticky top-0 z-50">
            <b class="text-xl italic">LYNEOK</b>
            <div onclick="switchT('profile')" class="bg-zinc-900 px-4 py-1.5 rounded-full flex items-center gap-2 border border-white/5">
                <span id="h_bal" class="font-bold text-xs">0 ₽</span>
                <img id="h_ava" class="w-6 h-6 rounded-full object-cover">
            </div>
        </header>

        <main id="tab_market" class="tab-content active">
            <div class="mb-6 relative">
                <i class="fa-solid fa-search absolute left-4 top-4 text-zinc-600"></i>
                <input oninput="doSearch(this.value)" class="pl-12 !bg-zinc-900 border-none" placeholder="Поиск товаров...">
            </div>
            <div id="cat_grid" class="grid grid-cols-2 gap-3"></div>
            <div id="items_view" class="hidden space-y-4">
                <button onclick="closeCat()" class="text-blue-500 font-bold text-xs"><i class="fa-solid fa-chevron-left mr-1"></i> НАЗАД</button>
                <div id="items_list" class="space-y-3"></div>
            </div>
        </main>

        <main id="tab_sell" class="tab-content">
            <h2 class="text-2xl font-black mb-6">Новый лот</h2>
            <div class="glass p-5 space-y-4">
                <input type="file" id="s_img" class="hidden" onchange="upImg(this, 'l_s_img')">
                <label for="s_img" id="l_s_img" class="w-full h-40 bg-zinc-900 rounded-2xl flex flex-col items-center justify-center border-2 border-dashed border-zinc-800 overflow-hidden">
                    <i class="fa-solid fa-camera text-2xl text-zinc-700 mb-2"></i>
                    <span class="text-[10px] font-bold text-zinc-600 uppercase">Фото товара</span>
                </label>
                <select id="s_cat" onchange="updateMethods()"></select>
                <select id="s_meth"><option disabled selected>Сначала выбери игру</option></select>
                <input id="s_t" placeholder="Название">
                <textarea id="s_d" placeholder="Описание" rows="3"></textarea>
                <textarea id="s_acc" placeholder="Данные (Логин:Пароль)" rows="2"></textarea>
                <div>
                    <input id="s_p" type="number" placeholder="Цена (от 50 ₽)" oninput="calcComm()">
                    <p id="s_info" class="text-[10px] text-zinc-500 mt-2 font-bold px-1 italic">Вы получите: 0 ₽</p>
                </div>
                <button onclick="postItem()" class="btn-blue">Опубликовать</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black italic">Сделки и Саппорт</h2>
                <button onclick="openSupport()" class="bg-blue-600/20 text-blue-500 text-[10px] px-3 py-1.5 rounded-full font-black">СЛУЖБА ПОДДЕРЖКИ</button>
            </div>
            
            <div id="deals_list" class="space-y-4"></div>
            
            <div id="admin_direct_msgs" class="mt-8 space-y-3"></div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="glass p-6 mb-4">
                <div class="flex items-center gap-4 mb-6">
                    <img id="p_ava" class="w-16 h-16 rounded-full object-cover">
                    <div>
                        <div class="flex items-center gap-1">
                            <b id="p_n" class="text-lg">...</b>
                            <span id="p_badge"></span>
                        </div>
                        <p id="p_tg" class="text-xs text-zinc-500"></p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 border-y border-white/5 py-4 mb-6">
                    <div class="text-center">
                        <b id="p_stars" class="block text-xl">0.0</b>
                        <span class="text-[9px] font-black text-zinc-600 uppercase">Рейтинг</span>
                    </div>
                    <div class="text-center border-l border-white/5">
                        <b id="p_sales" class="block text-xl">0</b>
                        <span class="text-[9px] font-black text-zinc-600 uppercase">Сделки</span>
                    </div>
                </div>
                <div class="space-y-3">
                    <button onclick="askPay()" class="btn-blue">Пополнить</button>
                    <button onclick="askOut()" class="w-full py-4 text-zinc-500 text-[10px] font-black uppercase tracking-widest">Вывод средств</button>
                </div>
            </div>
            <button id="adm_btn" onclick="switchT('admin')" class="hidden w-full bg-red-600/10 text-red-500 border border-red-600/20 py-4 rounded-2xl font-bold mb-4">АДМИН-ЦЕНТР</button>
            <button onclick="logout()" class="w-full py-4 text-red-500 text-[10px] font-black uppercase opacity-30">Выход</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <h1 class="text-3xl font-black mb-8 italic text-red-500">SYSTEM V100</h1>
            
            <div class="space-y-8">
                <section class="glass p-5 border-2 border-blue-500/20">
                    <h3 class="text-xs font-black text-blue-400 uppercase mb-4">Написать пользователю (Direct)</h3>
                    <input id="ad_dm_nick" placeholder="Никнейм юзера" class="mb-2">
                    <textarea id="ad_dm_text" placeholder="Текст сообщения..." rows="2" class="mb-3"></textarea>
                    <button onclick="adminSendDM()" class="btn-blue !py-2">Отправить сообщение</button>
                </section>

                <section>
                    <h3 class="text-xs font-black text-zinc-500 uppercase mb-4">Тикеты в саппорт</h3>
                    <div id="ad_tickets" class="space-y-3"></div>
                </section>

                <section>
                    <h3 class="text-xs font-black text-zinc-500 uppercase mb-4">Жалобы и Возвраты</h3>
                    <div id="ad_complaints" class="space-y-3"></div>
                </section>

                <section class="glass p-5">
                    <p class="text-[10px] text-zinc-400 mb-1">КОМИССИЯ %</p>
                    <input id="set_comm" type="number" onchange="saveComm()" class="mb-6">
                    
                    <h3 class="text-xs font-black text-zinc-500 uppercase mb-4">Добавить игру</h3>
                    <input type="file" id="g_img" class="hidden" onchange="upImg(this, 'l_g_img')">
                    <label for="g_img" id="l_g_img" class="w-full h-20 bg-zinc-800 rounded-xl flex items-center justify-center border border-dashed border-zinc-700 overflow-hidden mb-3">
                         <span class="text-xs text-zinc-500">Фото игры</span>
                    </label>
                    <input id="g_name" placeholder="Название игры" class="mb-2">
                    <input id="g_meths" placeholder="Способы (через запятую)" class="mb-3">
                    <button onclick="saveGame()" class="btn-blue !bg-white !text-black py-3">Создать игру</button>
                </section>

                <section>
                    <h3 class="text-xs font-black text-zinc-500 uppercase mb-4">Заявки на баланс</h3>
                    <div id="ad_reqs" class="space-y-3"></div>
                </section>

                <section>
                    <h3 class="text-xs font-black text-zinc-500 uppercase mb-4">База юзеров</h3>
                    <div id="ad_users" class="space-y-3"></div>
                </section>
            </div>
        </main>

        <nav class="nav-bar">
            <div onclick="switchT('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-shop text-xl"></i><span>Маркет</span></div>
            <div onclick="switchT('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-plus-circle text-xl"></i><span>Продать</span></div>
            <div onclick="switchT('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-comments text-xl"></i><span>Чат</span></div>
            <div onclick="switchT('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user text-xl"></i><span>Профиль</span></div>
        </nav>
    </div>

    <script>
        const FB_CFG = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        const TG = { tok: "8641257792:AAEsxnQWEIeozMt_gnSwJdVgSFQlOc-hnuc", chat: "7040863301" };
        
        firebase.initializeApp(FB_CFG);
        const db = firebase.database().ref('lyne_v100_final');
        const Tst = Swal.mixin({ toast: true, position: 'top', timer: 2000, showConfirmButton: false, background: '#1c1c1e', color: '#fff' });

        let me = null, data = {}, isR = false, tmpImg = "";

        function bot(m) { fetch(`https://api.telegram.org/bot${TG.tok}/sendMessage?chat_id=${TG.chat}&text=${encodeURIComponent('🔴 SYSTEM: ' + m)}`); }

        function init() {
            db.on('value', snap => {
                data = snap.val() || { u:{}, i:{}, d:{}, cats:{}, requests:{}, settings:{comm:10}, tickets:{}, complaints:{}, direct:{} };
                const sid = localStorage.getItem('lyne_v100_sid');
                if (sid && data.u[sid]) {
                    me = data.u[sid];
                    if (me.ban && me.banUntil > Date.now()) {
                        alert(`BAN! До: ${new Date(me.banUntil).toLocaleString()}\n${me.banReason}`);
                        logout(); return;
                    }
                    document.getElementById('auth_scr').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    if(me.n.toLowerCase() === 'owwner') document.getElementById('adm_btn').classList.remove('hidden');
                    render();
                } else { document.getElementById('auth_scr').classList.remove('hidden'); }
                document.getElementById('loader').style.display = 'none';
            });
        }

        // --- AUTH ---
        function toggleR() { isR = !isR; document.getElementById('reg_ext').classList.toggle('hidden', !isR); document.getElementById('a_btn').innerText = isR ? 'Создать аккаунт' : 'Войти'; }
        function handleAuth() {
            const n = document.getElementById('a_n').value.trim(), p = document.getElementById('a_p').value.trim();
            if (!n || !p) return Tst.fire({ icon:'error', title:'Заполни поля' });
            if (isR) {
                const tg = document.getElementById('r_tg').value.trim();
                if (!tg.includes('@') || !tmpImg) return Tst.fire({ icon:'warning', title:'Фото и TG нужны!' });
                const sid = 'u'+Date.now();
                db.child(`u/${sid}`).set({ id:sid, n, p, tg, ava:tmpImg, bal:0, sales:0, stars:0, revs:0, badge:'' });
                localStorage.setItem('lyne_v100_sid', sid);
                bot(`НОВЫЙ ЮЗЕР: ${n} (${tg})`);
            } else {
                const u = Object.values(data.u).find(x => x.n === n && x.p === p);
                if (u) localStorage.setItem('lyne_v100_sid', u.id);
                else Tst.fire({ icon:'error', title:'Ошибка данных' });
            }
        }

        function render() {
            if(!me) return;
            document.getElementById('h_bal').innerText = me.bal + ' ₽';
            document.getElementById('h_ava').src = me.ava;
            document.getElementById('p_ava').src = me.ava;
            document.getElementById('p_n').innerText = me.n;
            document.getElementById('p_tg').innerText = me.tg;
            document.getElementById('p_stars').innerText = (me.stars || 0).toFixed(1);
            document.getElementById('p_sales').innerText = me.sales || 0;
            document.getElementById('p_badge').innerHTML = getB(me);

            const cats = Object.values(data.cats || {});
            document.getElementById('cat_grid').innerHTML = cats.map(c => `
                <div class="glass p-4 text-center" onclick="openCat('${c.name}')">
                    <img src="${c.img}" class="w-12 h-12 mx-auto mb-2 rounded-xl object-cover bg-zinc-800">
                    <p class="text-[10px] font-black uppercase tracking-widest">${c.name}</p>
                </div>`).join('');
            
            document.getElementById('s_cat').innerHTML = '<option disabled selected>ИГРА</option>' + cats.map(c => `<option value="${c.name}">${c.name}</option>`).join('');

            renderDeals();
            renderDirectMsgs();
            if(me.n.toLowerCase() === 'owwner') renderAdmin();
        }

        function getB(u) {
            if(u.n.toLowerCase() === 'owwner') return '<i class="fa-solid fa-crown text-red-500"></i>';
            if(u.badge === 'blue') return '<i class="fa-solid fa-certificate b-blue"></i>';
            if(u.badge === 'red') return '<i class="fa-solid fa-certificate b-red"></i>';
            if(u.badge === 'gold') return '<i class="fa-solid fa-certificate b-gold"></i>';
            if(u.badge === 'neon') return '<i class="fa-solid fa-certificate b-neon"></i>';
            if(u.badge === 'rainbow') return '<i class="fa-solid fa-certificate b-rainbow"></i>';
            return '';
        }

        // --- MARKET & SELL ---
        function openCat(name) {
            document.getElementById('cat_grid').classList.add('hidden');
            document.getElementById('items_view').classList.remove('hidden');
            const list = Object.values(data.i || {}).filter(x => x.cat === name);
            renderItems(list);
        }
        function doSearch(v) {
            const list = Object.values(data.i || {}).filter(x => x.title.toLowerCase().includes(v.toLowerCase()));
            if(v.length > 0) { document.getElementById('cat_grid').classList.add('hidden'); document.getElementById('items_view').classList.remove('hidden'); renderItems(list); } else closeCat();
        }
        function renderItems(list) {
            document.getElementById('items_list').innerHTML = list.map(i => `
                <div class="glass p-3 flex gap-4">
                    <img src="${i.img}" class="w-20 h-20 rounded-xl object-cover">
                    <div class="flex-1 flex flex-col justify-between">
                        <div class="flex justify-between items-start"><b class="text-xs line-clamp-1">${i.title}</b><b class="text-blue-500 text-sm">${i.price} ₽</b></div>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-[8px] bg-zinc-800 px-2 py-0.5 rounded text-zinc-400 uppercase font-bold">${i.meth}</span>
                            <button onclick="buyItem('${i.id}')" class="bg-blue-600 text-[10px] font-black px-4 py-1.5 rounded-lg">КУПИТЬ</button>
                        </div>
                    </div>
                </div>`).join('') || '<p class="text-center py-10 text-zinc-600">Пусто</p>';
        }
        function closeCat() { document.getElementById('cat_grid').classList.remove('hidden'); document.getElementById('items_view').classList.add('hidden'); }
        function updateMethods() {
            const catName = document.getElementById('s_cat').value;
            const cat = Object.values(data.cats).find(c => c.name === catName);
            const meths = cat.meths.split(',').map(m => m.trim());
            document.getElementById('s_meth').innerHTML = meths.map(m => `<option value="${m}">${m}</option>`).join('');
        }
        function calcComm() {
            const p = Number(document.getElementById('s_p').value);
            const c = data.settings.comm || 10;
            document.getElementById('s_info').innerText = `Вы получите: ${Math.floor(p * (1 - c/100))} ₽`;
        }
        function postItem() {
            const t = document.getElementById('s_t').value, p = Number(document.getElementById('s_p').value);
            const c = document.getElementById('s_cat').value, m = document.getElementById('s_meth').value;
            const acc = document.getElementById('s_acc').value;
            if(!t || p < 50 || !tmpImg || !acc) return Tst.fire({ icon:'warning', title:'Заполни всё!' });
            const iid = 'i'+Date.now();
            db.child(`i/${iid}`).set({ id:iid, sid:me.id, seller:me.n, title:t, price:p, cat:c, meth:m, acc_data:acc, img:tmpImg });
            Tst.fire({ icon:'success', title:'Выставлено!' });
            switchT('market');
        }

        // --- DEALS & REFUNDS ---
        function buyItem(iid) {
            const i = data.i[iid];
            if(me.bal < i.price) return Tst.fire({ icon:'error', title:'Мало денег' });
            const did = 'd'+Date.now();
            const pure = Math.floor(i.price * (1 - (data.settings.comm/100)));
            db.child(`u/${me.id}/bal`).transaction(b => b - i.price);
            db.child(`u/${i.sid}/bal`).transaction(b => (b||0) + pure);
            db.child(`u/${i.sid}/sales`).transaction(s => (s||0) + 1);
            db.child(`d/${did}`).set({ id:did, bid:me.id, bn:me.n, sid:i.sid, sn:i.seller, t:i.title, p:i.price, acc:i.acc_data, img:i.img, time:Date.now() });
            db.child(`i/${iid}`).remove();
            Tst.fire({ icon:'success', title:'Куплено!' });
            switchT('chats');
        }

        function renderDeals() {
            const list = Object.values(data.d || {}).filter(d => d.bid === me.id || d.sid === me.id);
            document.getElementById('deals_list').innerHTML = list.reverse().map(d => {
                const canRefund = (Date.now() - d.time) < 86400000; // 1 день
                return `
                <div class="glass p-4 border-l-4 ${d.bid === me.id ? 'border-blue-500' : 'border-green-500'}">
                    <b class="text-[10px] uppercase block mb-2">${d.t}</b>
                    ${d.bid === me.id ? `<div class="bg-black/40 p-2 rounded text-[10px] font-mono break-all text-blue-400 mb-3">ДАННЫЕ: ${d.acc}</div>` : ''}
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] text-zinc-500">${d.p} ₽</span>
                        <div class="flex gap-2">
                            ${(d.bid === me.id && canRefund) ? `<button onclick="openComplaint('${d.id}')" class="bg-red-600/20 text-red-500 px-3 py-1 rounded text-[10px] font-bold">СПОР / ВОЗВРАТ</button>` : ''}
                            ${(d.bid === me.id && !d.rv) ? `<button onclick="leaveRev('${d.id}','${d.sid}')" class="bg-zinc-800 px-3 py-1 rounded text-[10px] font-bold">ОЦЕНИТЬ</button>` : ''}
                        </div>
                    </div>
                </div>`;
            }).join('') || '<p class="text-center py-10 text-zinc-600">Нет сделок</p>';
        }

        function openComplaint(did) {
            Swal.fire({ title:'Жалоба', text:'Опишите причину возврата', input:'textarea', background:'#1c1c1e', color:'#fff' }).then(r => {
                if(r.value) {
                    const cid = 'c'+Date.now();
                    db.child(`complaints/${cid}`).set({ id:cid, did, uid:me.id, name:me.n, text:r.value, status:'open' });
                    Tst.fire({ icon:'info', title:'Жалоба отправлена админу' });
                    bot(`⚠️ ЖАЛОБА ОТ ${me.n} на сделку ${did}`);
                }
            });
        }

        // --- SUPPORT SYSTEM ---
        function openSupport() {
            Swal.fire({ title:'Поддержка', text:'Напишите ваш вопрос', input:'textarea', background:'#1c1c1e', color:'#fff' }).then(r => {
                if(r.value) {
                    const tid = 't'+Date.now();
                    db.child(`tickets/${tid}`).set({ id:tid, uid:me.id, name:me.n, text:r.value, status:'open', time:Date.now() });
                    Tst.fire({ icon:'success', title:'Сообщение отправлено!' });
                }
            });
        }

        function renderDirectMsgs() {
            const msgs = Object.values(data.direct || {}).filter(m => m.to === me.n);
            document.getElementById('admin_direct_msgs').innerHTML = msgs.map(m => `
                <div class="bg-blue-600/10 border border-blue-500/30 p-4 rounded-2xl">
                    <p class="text-[10px] font-black text-blue-400 uppercase mb-1">Сообщение от Администрации</p>
                    <p class="text-xs">${m.text}</p>
                </div>
            `).join('');
        }

        // --- ADMIN V100 ---
        function renderAdmin() {
            document.getElementById('set_comm').value = data.settings.comm;
            
            // Тикеты
            const tix = Object.values(data.tickets || {}).filter(t => t.status === 'open');
            document.getElementById('ad_tickets').innerHTML = tix.map(t => `
                <div class="glass p-3 border-l-4 border-blue-500">
                    <p class="text-[10px]"><b>${t.name}:</b> ${t.text}</p>
                    <button onclick="replyTicket('${t.id}', '${t.name}')" class="mt-2 bg-blue-600 px-3 py-1 rounded text-[10px] font-bold">ОТВЕТИТЬ</button>
                </div>`).join('') || '<p class="text-[10px] text-zinc-600">Тикетов нет</p>';

            // Жалобы
            const comps = Object.values(data.complaints || {}).filter(c => c.status === 'open');
            document.getElementById('ad_complaints').innerHTML = comps.map(c => `
                <div class="glass p-3 border-l-4 border-red-500">
                    <p class="text-[10px]"><b>От ${c.name}:</b> ${c.text}</p>
                    <div class="flex gap-2 mt-2">
                        <button onclick="approveRefund('${c.id}')" class="bg-green-600 px-3 py-1 rounded text-[10px] font-bold">ВЕРНУТЬ ДЕНЬГИ</button>
                        <button onclick="db.child('complaints/${c.id}/status').set('closed')" class="bg-zinc-800 px-3 py-1 rounded text-[10px] font-bold">ОТКЛОНИТЬ</button>
                    </div>
                </div>`).join('') || '<p class="text-[10px] text-zinc-600">Жалоб нет</p>';

            // Заявки и Юзеры (из V90)
            const reqs = Object.values(data.requests || {}).filter(r => r.status === 'pending');
            document.getElementById('ad_reqs').innerHTML = reqs.map(r => `
                <div class="glass p-3 flex justify-between items-center border-l-4 border-amber-500">
                    <div><b class="text-[10px] block">${r.name} (${r.sum}₽)</b><span class="text-[8px] text-zinc-500">${data.u[r.uid]?.tg || '@none'}</span></div>
                    <button onclick="confirmPay('${r.id}')" class="bg-green-600 px-4 py-1 rounded text-[10px] font-bold">ОК</button>
                </div>`).join('');

            const us = Object.values(data.u);
            document.getElementById('ad_users').innerHTML = us.map(u => `
                <div class="glass p-3 flex justify-between items-center">
                    <div class="text-[10px]"><b>${u.n}</b> (${u.bal}₽)</div>
                    <div class="flex gap-1">
                        <button onclick="admEditBal('${u.id}')" class="bg-zinc-800 p-2 rounded"><i class="fa-solid fa-wallet text-blue-400"></i></button>
                        <button onclick="admEditBadge('${u.id}')" class="bg-zinc-800 p-2 rounded"><i class="fa-solid fa-certificate text-amber-400"></i></button>
                        <button onclick="admBan('${u.id}')" class="bg-zinc-800 p-2 rounded"><i class="fa-solid fa-ban text-red-400"></i></button>
                    </div>
                </div>`).join('');
        }

        function adminSendDM() {
            const nick = document.getElementById('ad_dm_nick').value.trim();
            const text = document.getElementById('ad_dm_text').value.trim();
            if(!nick || !text) return Tst.fire({ icon:'error', title:'Заполни поля' });
            const mid = 'm'+Date.now();
            db.child(`direct/${mid}`).set({ id:mid, to:nick, text:text });
            Tst.fire({ icon:'success', title:'Отправлено юзеру '+nick });
            document.getElementById('ad_dm_text').value = "";
        }

        function replyTicket(tid, name) {
            Swal.fire({ title:'Ответ для '+name, input:'textarea', background:'#1c1c1e', color:'#fff' }).then(r => {
                if(r.value) {
                    const mid = 'm'+Date.now();
                    db.child(`direct/${mid}`).set({ id:mid, to:name, text:'ОТВЕТ ПОДДЕРЖКИ: ' + r.value });
                    db.child(`tickets/${tid}/status`).set('closed');
                    Tst.fire({ icon:'success', title:'Ответ отправлен' });
                }
            });
        }

        function approveRefund(cid) {
            const comp = data.complaints[cid];
            const deal = data.d[comp.did];
            // Возвращаем деньги покупателю
            db.child(`u/${deal.bid}/bal`).transaction(b => (b||0) + deal.p);
            // Забираем у продавца (с учетом комиссии)
            const pure = Math.floor(deal.p * (1 - (data.settings.comm/100)));
            db.child(`u/${deal.sid}/bal`).transaction(b => (b||0) - pure);
            db.child(`complaints/${cid}/status`).set('refunded');
            Tst.fire({ icon:'success', title:'Средства возвращены' });
            bot(`💸 ВОЗВРАТ: ${deal.p}₽ возвращено ${deal.bn}`);
        }

        // --- COMMON HELPERS ---
        function upImg(input, tid) {
            const f = input.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const c = document.createElement('canvas'); const x = c.getContext('2d');
                    c.width = 400; c.height = 400; x.drawImage(img,0,0,400,400);
                    tmpImg = c.toDataURL('image/jpeg', 0.7);
                    document.getElementById(tid).innerHTML = `<img src="${tmpImg}" class="w-full h-full object-cover">`;
                };
                img.src = e.target.result;
            };
            r.readAsDataURL(f);
        }
        function saveComm() { db.child('settings/comm').set(Number(document.getElementById('set_comm').value)); Tst.fire({icon:'success', title:'OK'}); }
        function saveGame() {
            const n = document.getElementById('g_name').value, m = document.getElementById('g_meths').value;
            if(!n || !m || !tmpImg) return Tst.fire({icon:'error', title:'Данные!'});
            const id = 'c'+Date.now();
            db.child(`cats/${id}`).set({ id, name:n, meths:m, img:tmpImg });
            Tst.fire({icon:'success', title:'Игра добавлена'});
        }
        function confirmPay(rid) {
            const r = data.requests[rid];
            db.child(`u/${r.uid}/bal`).transaction(b => (b||0) + r.sum);
            db.child(`requests/${rid}/status`).set('done');
            bot(`✅ ПОДТВЕРЖДЕНО: ${r.name} +${r.sum}₽`);
        }
        function admEditBal(uid) { Swal.fire({title:'Баланс', input:'number'}).then(r => r.value && db.child(`u/${uid}/bal`).set(Number(r.value))); }
        function admEditBadge(uid) { Swal.fire({title:'Галка', input:'select', inputOptions:{'':'Нет','blue':'Синяя','red':'Красная','gold':'Золотая','neon':'Неон','rainbow':'Радуга'}}).then(r => db.child(`u/${uid}/badge`).set(r.value)); }
        function admBan(uid) { Swal.fire({title:'Бан', html:'<input id="bm" type="number" placeholder="Мин"><input id="br" placeholder="Причина">', preConfirm:()=>({m:document.getElementById('bm').value,r:document.getElementById('br').value}) }).then(res => res.value && db.child(`u/${uid}`).update({ ban:true, banUntil:Date.now()+(res.value.m*60000), banReason:res.value.r })); }
        function askPay() { Swal.fire({title:'Сумма пополнения', input:'number'}).then(r => { if(r.value >= 50) { const rid='req'+Date.now(); db.child(`requests/${rid}`).set({id:rid,uid:me.id,name:me.n,sum:Number(r.value),status:'pending'}); Tst.fire({icon:'info', title:'Заявка отправлена'}); bot(`💰 ЗАЯВКА: ${me.n} хочет +${r.value}₽`); } }); }
        function leaveRev(did, sid) { Swal.fire({title:'Оценка', input:'select', inputOptions:{5:'5 звёзд',4:'4 звезды',3:'3 звезды',2:'2 звезды',1:'1 звезда'}}).then(r => { if(r.value) { const s=Number(r.value); const u=data.u[sid]; const nt=(u.starSum||0)+s; const nr=(u.revs||0)+1; db.child(`u/${sid}`).update({starSum:nt, revs:nr, stars:nt/nr}); db.child(`d/${did}/rv`).set(s); } }); }
        function switchT(t) { document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active')); document.getElementById('tab_'+t).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active')); document.getElementById('n_'+t)?.classList.add('active'); tmpImg=""; }
        function logout() { localStorage.clear(); location.reload(); }
        init();
    </script>
</body>
</html>
