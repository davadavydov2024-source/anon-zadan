<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK OMEGA V120.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700&family=Orbitron:wght@900&family=UnifrakturMaguntia&display=swap');
        :root { --bg: #050505; --card: #121214; --text: #ffffff; --blue: #007aff; --gray: #1c1c1e; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .glass { background: var(--card); border: 1px solid rgba(255,255,255,0.03); border-radius: 24px; }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px 16px 160px; -webkit-overflow-scrolling: touch; }
        .tab-content.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: rgba(10,10,10,0.8); backdrop-filter: blur(20px); display: flex; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #636366; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 700; cursor: pointer; }
        .nav-btn.active { color: var(--blue); }

        input, textarea, select { background: var(--gray); border: 1px solid transparent; border-radius: 14px; padding: 14px; color: white; width: 100%; outline: none; font-size: 14px; }
        .btn-blue { background: var(--blue); color: white; border-radius: 16px; font-weight: 800; padding: 16px; width: 100%; border: none; cursor: pointer; }
        #loader { background: #000; z-index: 10000; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
    </style>
</head>
<body>

    <div id="loader"><div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>

    <div id="auth_scr" class="hidden fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-8">
        <h1 class="text-4xl font-black mb-12 italic tracking-tighter">LYNEOK<span class="text-blue-500">.</span></h1>
        <div class="w-full max-w-sm glass p-6 space-y-4">
            <div id="reg_ext" class="hidden space-y-4">
                <input type="file" id="r_ava" class="hidden" accept="image/*" onchange="upImg(this, 'l_r_ava')">
                <label for="r_ava" id="l_r_ava" class="w-20 h-20 bg-zinc-800 mx-auto rounded-full flex items-center justify-center cursor-pointer border-2 border-dashed border-zinc-700 overflow-hidden">
                    <i class="fa-solid fa-plus text-zinc-500"></i>
                </label>
                <input id="r_tg" placeholder="Telegram (@username)">
            </div>
            <input id="a_n" placeholder="Логин">
            <input id="a_p" type="password" placeholder="Пароль">
            <button onclick="handleAuth()" id="a_btn" class="btn-blue">Войти</button>
            <p onclick="toggleR()" id="a_tog" class="text-center text-[10px] font-black text-zinc-500 uppercase cursor-pointer tracking-widest pt-2">Создать аккаунт</p>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-5 py-4 flex justify-between items-center bg-black/50 backdrop-blur-md sticky top-0 z-50">
            <b class="text-xl italic">LYNEOK</b>
            <div onclick="switchT('profile')" class="bg-zinc-900 px-4 py-1.5 rounded-full flex items-center gap-2 border border-white/5 cursor-pointer">
                <span id="h_bal" class="font-bold text-xs">0 ₽</span>
                <img id="h_ava" class="w-6 h-6 rounded-full object-cover">
            </div>
        </header>

        <main id="tab_market" class="tab-content active">
            <div id="cat_grid" class="grid grid-cols-2 gap-3"></div>
            <div id="subcat_view" class="hidden space-y-4">
                <button onclick="closeSubcat()" class="text-blue-500 font-bold text-xs"><i class="fa-solid fa-chevron-left mr-1"></i> НАЗАД</button>
                <div id="subcat_grid" class="grid grid-cols-2 gap-3"></div>
            </div>
            <div id="items_view" class="hidden space-y-4">
                <button onclick="closeCat()" class="text-blue-500 font-bold text-xs"><i class="fa-solid fa-chevron-left mr-1"></i> НАЗАД</button>
                <div id="items_list" class="space-y-3"></div>
            </div>
        </main>

        <main id="tab_sell" class="tab-content">
            <div class="glass p-5 space-y-4">
                <input type="file" id="s_img" class="hidden" onchange="upImg(this, 'l_s_img')">
                <label for="s_img" id="l_s_img" class="w-full h-40 bg-zinc-900 rounded-2xl flex flex-col items-center justify-center border-2 border-dashed border-zinc-800 cursor-pointer overflow-hidden">
                    <i class="fa-solid fa-camera text-2xl text-zinc-700"></i>
                </label>
                <select id="s_game" onchange="updateSubcats()"></select>
                <select id="s_subcat"></select>
                <input id="s_t" placeholder="Название">
                <textarea id="s_acc" placeholder="Данные аккаунта"></textarea>
                <div class="space-y-1">
                    <input id="s_p" type="number" placeholder="Цена" oninput="calcComm()">
                    <p id="s_receive" class="text-[10px] text-zinc-500 font-bold ml-1 italic"></p>
                </div>
                <button onclick="postItem()" class="btn-blue">Опубликовать</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content">
            <h2 class="text-2xl font-black mb-6">Сделки и чаты</h2>
            <div id="deals_list" class="space-y-3"></div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="glass p-6 text-center mb-6">
                <img id="p_ava" class="w-24 h-24 rounded-full mx-auto mb-4 object-cover border-4 border-zinc-800">
                <h2 id="p_n" class="text-2xl font-black mb-1">...</h2>
                <p id="p_tg" class="text-zinc-500 text-sm mb-6"></p>
                <div class="grid grid-cols-2 gap-4">
                    <button class="btn-blue !bg-white !text-black py-3">ПОПОЛНИТЬ</button>
                    <button class="btn-blue py-3">ВЫВОД</button>
                </div>
            </div>
            <button id="adm_btn" onclick="switchT('admin')" class="hidden w-full bg-red-600/10 text-red-500 border border-red-600/20 py-4 rounded-2xl font-bold mb-4">АДМИН-ПАНЕЛЬ</button>
            <button onclick="logout()" class="w-full py-4 text-red-500 opacity-30 text-xs font-black uppercase">Выйти</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <h1 class="text-3xl font-black mb-6 italic text-red-500">OMEGA ADMIN</h1>

            <section class="mb-8">
                <h3 class="text-[10px] font-black text-blue-500 uppercase mb-4">Глобальные настройки</h3>
                <div class="glass p-5 border border-blue-500/20 flex gap-2">
                    <input id="ad_comm_val" type="number" placeholder="Комиссия %" class="!py-2">
                    <button onclick="admSaveComm()" class="bg-blue-600 px-6 rounded-xl text-xs font-black">OK</button>
                </div>
            </section>

            <section class="mb-8">
                <h3 class="text-[10px] font-black text-orange-500 uppercase mb-4">Модерация товаров</h3>
                <div id="ad_mod_list" class="space-y-3"></div>
            </section>

            <input id="u_search" oninput="render()" placeholder="Поиск пользователя..." class="mb-8 !bg-zinc-900">

            <div class="space-y-8">
                <section>
                    <h3 class="text-[10px] font-black text-purple-500 uppercase mb-4">Игры и категории</h3>
                    <div class="glass p-4 mb-4 space-y-3 border border-purple-500/20">
                        <input id="ad_game_name" placeholder="Название игры">
                        <input id="ad_game_img_url" placeholder="URL иконки">
                        <button onclick="admAddGame()" class="w-full bg-purple-600 py-3 rounded-xl text-xs font-black">ДОБАВИТЬ ИГРУ</button>
                    </div>
                    <div id="ad_games_list" class="space-y-3"></div>
                </section>
                <section><h3 class="text-[10px] font-black text-yellow-500 uppercase mb-4">Сделки Live</h3><div id="ad_all_deals" class="space-y-2"></div></section>
                <section><h3 class="text-[10px] font-black text-zinc-500 uppercase mb-4">Пользователи</h3><div id="ad_users" class="space-y-3"></div></section>
            </div>
        </main>

        <nav class="nav-bar">
            <div onclick="switchT('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-shop text-xl"></i><span>Маркет</span></div>
            <div onclick="switchT('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-plus-circle text-xl"></i><span>Продать</span></div>
            <div onclick="switchT('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-comments text-xl"></i><span>Чат</span></div>
            <div onclick="switchT('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user text-xl"></i><span>Профиль</span></div>
        </nav>
    </div>

    <script>
        const FB_CFG = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        firebase.initializeApp(FB_CFG);
        const db = firebase.database().ref('lyne_v120_omega');
        const Tst = Swal.mixin({ toast: true, position: 'top', timer: 2000, showConfirmButton: false, background: '#1c1c1e', color: '#fff' });

        let me = null, data = {}, isR = false, tmpImg = "";

        const loaderTimeout = setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').classList.add('hidden'), 500);
        }, 4000);

        function init() {
            db.on('value', snap => {
                clearTimeout(loaderTimeout);
                data = snap.val() || { u:{}, i:{}, games:{}, mod:{}, deals:{}, settings:{comm:10} };
                const sid = localStorage.getItem('lyne_v120_sid');
                if (sid && data.u && data.u[sid]) {
                    me = data.u[sid];
                    if (me.ban) { alert("Ваш аккаунт заблокирован"); logout(); return; }
                    document.getElementById('auth_scr').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    if(me.n === 'owwner' || me.role === 'admin') document.getElementById('adm_btn').classList.remove('hidden');
                    render();
                } else { document.getElementById('auth_scr').classList.remove('hidden'); }
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').classList.add('hidden'), 500);
            });
        }

        function render() {
            if(!me) return;
            document.getElementById('h_bal').innerText = (me.bal || 0) + ' ₽';
            document.getElementById('h_ava').src = me.ava || '';
            document.getElementById('p_ava').src = me.ava || '';
            document.getElementById('p_n').innerText = me.n;
            document.getElementById('p_tg').innerText = me.tg;

            const games = Object.values(data.games || {});
            document.getElementById('cat_grid').innerHTML = games.map(g => `<div class="glass p-4 text-center cursor-pointer" onclick="openGame('${g.id}')"><img src="${g.img}" class="w-12 h-12 mx-auto mb-2 rounded-xl object-cover"><p class="text-[10px] font-black uppercase">${g.name}</p></div>`).join('');
            document.getElementById('s_game').innerHTML = games.map(g => `<option value="${g.id}">${g.name}</option>`).join('');

            // --- АДМИНКА РЕНДЕР ---
            const mods = Object.values(data.mod || {});
            document.getElementById('ad_mod_list').innerHTML = mods.map(m => `
                <div class="glass p-3 flex items-center gap-3 border border-orange-500/10">
                    <img src="${m.img}" class="w-10 h-10 rounded-lg object-cover">
                    <div class="flex-1 text-[10px]"><b>${m.title}</b> (${m.price}₽)<br><span class="text-zinc-500">Продавец: ${m.seller}</span></div>
                    <button onclick="admModAction('${m.id}', 'approve')" class="bg-green-600 px-3 py-1 rounded text-[10px]">✅</button>
                    <button onclick="admModAction('${m.id}', 'reject')" class="bg-red-600 px-3 py-1 rounded text-[10px]">🗑</button>
                </div>`).join('') || '<p class="text-[10px] text-zinc-500 italic">Очередь пуста</p>';

            document.getElementById('ad_games_list').innerHTML = games.map(g => `<div class="glass p-4 border border-white/5">
                <div class="flex justify-between items-center mb-3"><b class="text-sm">${g.name}</b><button onclick="db.child('games/${g.id}').remove()" class="text-red-500 text-xs">УДАЛИТЬ</button></div>
                <div class="flex gap-2"><input id="cat_in_${g.id}" placeholder="Имя категории" class="!py-2 !text-xs"><button onclick="admAddCat('${g.id}')" class="bg-blue-600 px-4 rounded-xl text-xs">+</button></div>
            </div>`).join('');

            const search = document.getElementById('u_search').value.toLowerCase();
            const users = Object.values(data.u || {}).filter(u => u.n.toLowerCase().includes(search));
            document.getElementById('ad_users').innerHTML = users.map(u => `<div class="glass p-3 mb-2 flex justify-between items-center">
                <div class="text-[10px]"><b>${u.n}</b><br>${u.tg}</div>
                <div class="flex gap-1">
                    <button onclick="admUserOp('${u.id}', 'bal')" class="bg-zinc-800 p-2 rounded text-[8px]">БАЛАНС</button>
                    <button onclick="admUserOp('${u.id}', 'ban')" class="bg-red-900/20 text-red-500 p-2 rounded text-[8px]">БАН</button>
                </div>
            </div>`).join('');

            renderDeals();
            updateSubcats();
        }

        // --- ЛОГИКА АДМИНА ---
        function admSaveComm() { const v = document.getElementById('ad_comm_val').value; if(v) db.child('settings/comm').set(Number(v)); Tst.fire({icon:'success', title:'Готово'}); }
        function admAddGame() { 
            const n = document.getElementById('ad_game_name').value, img = document.getElementById('ad_game_img_url').value;
            if(!n || !img) return;
            const id = 'g'+Date.now();
            db.child(`games/${id}`).set({id, name:n, img});
        }
        function admAddCat(gid) {
            const val = document.getElementById(`cat_in_${gid}`).value;
            if(!val) return;
            const cid = 'c'+Date.now();
            db.child(`games/${gid}/cats/${cid}`).set({id:cid, name:val});
        }
        function admModAction(id, act) {
            if(act === 'approve') { db.child(`i/${id}`).set(data.mod[id]); }
            db.child(`mod/${id}`).remove();
        }
        function admUserOp(uid, type) {
            if(type === 'bal') {
                Swal.fire({title:'Изменить баланс', input:'number'}).then(r => { if(r.value) db.child(`u/${uid}/bal`).set(Number(r.value)); });
            } else { db.child(`u/${uid}/ban`).set(true); }
        }

        // --- ЛОГИКА МАРКЕТА ---
        function openGame(gid) {
            document.getElementById('cat_grid').classList.add('hidden');
            document.getElementById('subcat_view').classList.remove('hidden');
            const scats = Object.values(data.games[gid].cats || {});
            document.getElementById('subcat_grid').innerHTML = scats.map(c => `<div class="glass p-4 text-center cursor-pointer" onclick="openSubCat('${gid}', '${c.name}')"><p class="text-[12px] font-black uppercase">${c.name}</p></div>`).join('');
        }
        function openSubCat(gid, cat) {
            document.getElementById('subcat_view').classList.add('hidden');
            document.getElementById('items_view').classList.remove('hidden');
            const items = Object.values(data.i || {}).filter(i => i.gameId === gid && i.cat === cat);
            document.getElementById('items_list').innerHTML = items.map(i => `<div class="glass p-4 flex gap-4"><img src="${i.img}" class="w-16 h-16 rounded-xl object-cover bg-zinc-800"><div class="flex-1"><b class="text-sm">${i.title}</b><p class="text-[10px] text-zinc-500 mb-2">Продавец: ${i.seller}</p><button onclick="buyItem('${i.id}')" class="bg-blue-600 px-4 py-1.5 rounded-lg text-xs font-black">${i.price} ₽</button></div></div>`).join('');
        }

        function buyItem(iid) {
            const i = data.i[iid];
            if(me.bal < i.price) return Tst.fire({icon:'error', title:'Недостаточно средств'});
            const did = 'd'+Date.now();
            const profit = Math.floor(i.price * (1 - (data.settings.comm/100)));
            db.child(`u/${me.id}/bal`).transaction(b => b - i.price);
            db.child(`u/${i.sid}/bal`).transaction(b => (b||0) + profit);
            db.child(`deals/${did}`).set({id:did, bid:me.id, sid:i.sid, title:i.title, acc:i.acc_data, price:i.price, time:Date.now()});
            db.child(`i/${iid}`).remove();
            Tst.fire({icon:'success', title:'Успешно!'}); switchT('chats');
        }

        function postItem() {
            const t = document.getElementById('s_t').value, p = Number(document.getElementById('s_p').value);
            if(!t || p < 1 || !tmpImg) return Tst.fire({icon:'error', title:'Заполни поля'});
            const iid = 'm'+Date.now();
            db.child(`mod/${iid}`).set({id:iid, sid:me.id, seller:me.n, title:t, price:p, gameId:document.getElementById('s_game').value, cat:document.getElementById('s_subcat').value, acc_data:document.getElementById('s_acc').value, img:tmpImg});
            Tst.fire({title:'На проверке'}); switchT('market');
        }

        // --- СИСТЕМНОЕ ---
        function handleAuth() {
            const n = document.getElementById('a_n').value, p = document.getElementById('a_p').value;
            if (isR) {
                const sid = 'u'+Date.now();
                db.child(`u/${sid}`).set({id:sid, n, p, tg:document.getElementById('r_tg').value, ava:tmpImg, bal:0, role:'user'});
                localStorage.setItem('lyne_v120_sid', sid);
            } else {
                const u = Object.values(data.u || {}).find(x => x.n === n && x.p === p);
                if (u) localStorage.setItem('lyne_v120_sid', u.id);
            }
        }
        function upImg(input, tid) {
            const f = input.files[0]; const r = new FileReader();
            r.onload = e => {
                const img = new Image(); img.onload = () => {
                    const c = document.createElement('canvas'); const x = c.getContext('2d');
                    c.width = 300; c.height = 300; x.drawImage(img,0,0,300,300);
                    tmpImg = c.toDataURL('image/jpeg', 0.6);
                    document.getElementById(tid).innerHTML = `<img src="${tmpImg}" class="w-full h-full object-cover">`;
                }; img.src = e.target.result;
            }; r.readAsDataURL(f);
        }
        function renderDeals() {
            const deals = Object.values(data.deals || {}).filter(d => d.bid === me.id || d.sid === me.id);
            document.getElementById('deals_list').innerHTML = deals.map(d => `<div class="glass p-4"><b class="text-xs uppercase">${d.title}</b><div class="mt-2 p-3 bg-black/40 rounded text-[10px] text-zinc-400">ДАННЫЕ: ${d.acc}</div></div>`).join('');
            if(me.role === 'admin' || me.n === 'owwner') {
                document.getElementById('ad_all_deals').innerHTML = Object.values(data.deals || {}).map(d => `<div class="text-[8px] opacity-50">${d.title} - ${d.price}₽</div>`).join('');
            }
        }
        function updateSubcats() {
            const g = data.games[document.getElementById('s_game').value];
            if(g && g.cats) document.getElementById('s_subcat').innerHTML = Object.values(g.cats).map(c => `<option value="${c.name}">${c.name}</option>`).join('');
        }
        function calcComm() { const p = document.getElementById('s_p').value; document.getElementById('s_receive').innerText = p ? `Получите: ${Math.floor(p * (1 - (data.settings.comm/100)))} ₽` : ''; }
        function switchT(t) { document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active')); document.getElementById('tab_'+t).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active')); document.getElementById('n_'+t).classList.add('active'); }
        function toggleR() { isR = !isR; document.getElementById('reg_ext').classList.toggle('hidden', !isR); }
        function closeSubcat() { document.getElementById('subcat_view').classList.add('hidden'); document.getElementById('cat_grid').classList.remove('hidden'); }
        function closeCat() { document.getElementById('items_view').classList.add('hidden'); document.getElementById('subcat_view').classList.remove('hidden'); }
        function logout() { localStorage.clear(); location.reload(); }

        init();
    </script>
</body>
</html>
