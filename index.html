<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK OMEGA V120.17 CUSTOM</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Press+Start+2P&family=Ruslan+Display&family=Kelly+Slab&family=Underdog&family=Lobster&family=Pacifico&family=Monoton&family=Jura:wght@700&family=Playfair+Display:wght@900&family=Courier+Prime&family=Zeyada&family=Dancing+Script:wght@700&family=EB+Garamond:ital@1&family=Montserrat+Alternates:wght@900&family=Caveat:wght@700&family=Unbounded:wght@900&family=Russo+One&family=Bad+Script&family=Bungee+Shade&display=swap" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --bg: #050505; --card: #121214; --text: #ffffff; --blue: #007aff; --gray: #1c1c1e; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .glass { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 24px; }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px 16px 160px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ГРАДИЕНТНЫЕ НИКИ */
        .n-sunset { background: linear-gradient(45deg, #ff5f6d, #ffc371); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .n-ocean { background: linear-gradient(45deg, #2193b0, #6dd5ed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .n-forest { background: linear-gradient(45deg, #11998e, #38ef7d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .n-gold { background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .n-royal { background: linear-gradient(45deg, #6a11cb, #2575fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .n-fire { background: linear-gradient(45deg, #f12711, #f5af19); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .nick-rainbow { background: linear-gradient(to right, red, orange, yellow, green, cyan, blue, violet); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rainbow_anim 3s linear infinite; font-weight: 900; background-size: 200%; }
        @keyframes rainbow_anim { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        /* ГРАДИЕНТНЫЕ ГАЛОЧКИ */
        .b-grad-blue { background: linear-gradient(45deg, #00c6ff, #0072ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .b-grad-purple { background: linear-gradient(45deg, #833ab4, #fd1d1d, #fcb045); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .b-grad-green { background: linear-gradient(45deg, #96fbc4, #f9f586); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .badge-rainbow { background: linear-gradient(to right, red, yellow, lime, cyan, blue, magenta); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* КЛАССЫ ШРИФТОВ */
        .f-1 { font-family: 'Comfortaa'; } .f-2 { font-family: 'Press Start 2P'; } .f-3 { font-family: 'Ruslan Display'; }
        .f-4 { font-family: 'Kelly Slab'; } .f-5 { font-family: 'Underdog'; } .f-6 { font-family: 'Lobster'; }
        .f-7 { font-family: 'Pacifico'; } .f-8 { font-family: 'Monoton'; } .f-9 { font-family: 'Jura'; }
        .f-10 { font-family: 'Playfair Display'; } .f-11 { font-family: 'Courier Prime'; } .f-12 { font-family: 'Zeyada'; }
        .f-13 { font-family: 'Dancing Script'; } .f-14 { font-family: 'EB Garamond'; } .f-15 { font-family: 'Montserrat Alternates'; }
        .f-16 { font-family: 'Caveat'; } .f-17 { font-family: 'Unbounded'; } .f-18 { font-family: 'Russo One'; }
        .f-19 { font-family: 'Bad Script'; } .f-20 { font-family: 'Bungee Shade'; }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: rgba(10,10,10,0.8); backdrop-filter: blur(20px); display: flex; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #636366; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 700; }
        .nav-btn.active { color: var(--blue); }

        input, textarea, select { background: var(--gray); border: 1px solid transparent; border-radius: 14px; padding: 14px; color: white; width: 100%; outline: none; font-size: 14px; }
        .btn-blue { background: var(--blue); color: white; border-radius: 16px; font-weight: 800; padding: 16px; width: 100%; border: none; cursor: pointer; transition: 0.3s; }
        .btn-blue:active { transform: scale(0.95); }
        #loader { background: #000; z-index: 10000; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loader"><div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>

    <div id="auth_scr" class="hidden fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-8">
        <h1 class="text-4xl font-black mb-12 italic tracking-tighter">LYNEOK<span class="text-blue-500">.</span></h1>
        <div class="w-full max-sm glass p-6 space-y-4">
            <div id="reg_ext" class="hidden space-y-4">
                <input type="file" id="r_ava" class="hidden" accept="image/*" onchange="upImg(this, 'l_r_ava')">
                <label for="r_ava" id="l_r_ava" class="w-20 h-20 bg-zinc-800 mx-auto rounded-full flex items-center justify-center cursor-pointer border-2 border-dashed border-zinc-700 overflow-hidden"><i class="fa-solid fa-plus text-zinc-500"></i></label>
                <input id="r_email" type="email" placeholder="Email">
                <div class="flex items-center gap-2 px-2">
                    <input type="checkbox" id="reg_rules" class="!w-5 !h-5">
                    <label for="reg_rules" class="text-[10px] text-zinc-500">Я принимаю <span class="text-blue-500 underline" onclick="showRules()">правила нашей политики</span></label>
                </div>
            </div>
            <input id="a_n" placeholder="Никнейм">
            <input id="a_p" type="password" placeholder="Пароль">
            <button onclick="handleAuth()" id="a_btn" class="btn-blue">Войти</button>
            <p onclick="toggleR()" id="a_tog" class="text-center text-[10px] font-black text-zinc-500 uppercase cursor-pointer pt-2">Создать аккаунт</p>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-5 py-4 flex justify-between items-center bg-black/50 backdrop-blur-md border-b border-white/5 sticky top-0 z-50">
            <b class="text-xl italic tracking-tighter text-blue-500">LYNEOK</b>
            <div onclick="switchT('profile')" class="bg-zinc-900 px-4 py-1.5 rounded-full flex items-center gap-2">
                <span id="h_bal" class="font-bold text-xs">0 ₽</span>
                <img id="h_ava" class="w-6 h-6 rounded-full object-cover bg-zinc-800">
            </div>
        </header>

        <main id="tab_market" class="tab-content active">
            <div id="cat_grid" class="grid grid-cols-2 gap-3"></div>
            <div id="subcat_view" class="hidden space-y-4">
                <button onclick="closeSubcat()" class="text-blue-500 font-bold text-[10px] uppercase flex items-center"><i class="fa-solid fa-chevron-left mr-2"></i> Назад</button>
                <div id="subcat_grid" class="grid grid-cols-2 gap-3"></div>
            </div>
            <div id="items_view" class="hidden space-y-4">
                <button onclick="closeCat()" class="text-blue-500 font-bold text-[10px] uppercase flex items-center"><i class="fa-solid fa-chevron-left mr-2"></i> Назад</button>
                <div id="items_list" class="space-y-3"></div>
            </div>
        </main>

        <main id="tab_sell" class="tab-content">
            <h2 class="text-2xl font-black mb-6 italic">Создать лот</h2>
            <div class="glass p-5 space-y-4">
                <input type="file" id="s_img" class="hidden" onchange="upImg(this, 'l_s_img')">
                <label for="s_img" id="l_s_img" class="w-full h-40 bg-zinc-900 rounded-2xl flex items-center justify-center border-2 border-dashed border-zinc-800"><i class="fa-solid fa-camera text-2xl text-zinc-700"></i></label>
                <select id="s_game"></select>
                <input id="s_t" placeholder="Название товара">
                <textarea id="s_acc" rows="3" placeholder="Описание/Данные..."></textarea>
                <input id="s_p" type="number" placeholder="Цена ₽">
                <button onclick="postItem()" class="btn-blue italic uppercase tracking-widest">Выставить</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content">
            <h2 class="text-2xl font-black mb-6 italic">Мои сделки</h2>
            <div id="deals_list" class="space-y-3"></div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="glass p-6 mb-4 text-center relative">
                <button onclick="shareProf()" class="absolute top-6 right-6 text-zinc-500"><i class="fa-solid fa-share-nodes text-xl"></i></button>
                <img id="p_ava" class="w-24 h-24 rounded-full mx-auto mb-4 object-cover border-4 border-zinc-900">
                <div class="flex items-center justify-center gap-1">
                    <span id="p_n" class="text-2xl font-black">...</span>
                    <span id="p_badge"></span>
                </div>
                <div class="grid grid-cols-2 gap-3 mt-6">
                    <button onclick="topUp()" class="btn-blue !bg-white !text-black !text-[10px]">ПОПОЛНИТЬ</button>
                    <button onclick="askOut()" class="btn-blue !text-[10px]">ВЫВОД</button>
                </div>
            </div>
            
            <div class="mb-4">
                <h3 class="text-[10px] font-black uppercase text-zinc-500 mb-3 ml-2 tracking-widest">Активные лоты</h3>
                <div id="p_my_items" class="space-y-3"></div>
            </div>

            <button id="adm_btn" onclick="switchT('admin')" class="hidden w-full bg-red-600/10 text-red-500 py-4 rounded-2xl font-black mb-4 border border-red-600/20 uppercase text-xs tracking-widest">Админ-Панель</button>
            <button onclick="logout()" class="w-full py-4 text-red-500 opacity-30 text-[10px] font-black uppercase tracking-widest">Выйти</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <h1 class="text-3xl font-black italic mb-6">OMEGA PANEL</h1>
            <section class="mb-8">
                <h3 class="text-[10px] font-black text-yellow-500 uppercase mb-4">Пользователи & Стили</h3>
                <div id="ad_users" class="space-y-4"></div>
            </section>
        </main>

        <nav class="nav-bar">
            <div onclick="switchT('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-shop text-xl"></i><span>Маркет</span></div>
            <div onclick="switchT('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-plus-circle text-xl"></i><span>Продать</span></div>
            <div onclick="switchT('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-comments text-xl"></i><span>Сделки</span></div>
            <div onclick="switchT('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user text-xl"></i><span>Профиль</span></div>
        </nav>
    </div>

    <script>
        firebase.initializeApp({ apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" });
        const db = firebase.database().ref('lyne_v120_omega');
        const Tst = Swal.mixin({ toast: true, position: 'top', timer: 2000, showConfirmButton: false, background: '#1c1c1e', color: '#fff' });

        let me = null, data = {}, isR = false, tmpImg = "";

        const fonts = ["Inter", "Comfortaa", "Press Start 2P", "Ruslan Display", "Kelly Slab", "Underdog", "Lobster", "Pacifico", "Monoton", "Jura", "Playfair Display", "Courier Prime", "Zeyada", "Dancing Script", "EB Garamond", "Montserrat Alternates", "Caveat", "Unbounded", "Russo One", "Bad Script", "Bungee Shade"];
        const nicks = ["nick-rainbow", "n-sunset", "n-ocean", "n-forest", "n-gold", "n-royal", "n-fire"];
        const badges = ["badge-rainbow", "b-grad-blue", "b-grad-purple", "b-grad-green"];

        function init() {
            db.on('value', snap => {
                data = snap.val() || { u:{}, i:{}, d:{}, games:{} };
                const sid = localStorage.getItem('lyne_v120_sid');
                document.getElementById('loader').style.display = 'none';
                if (sid && data.u[sid]) {
                    me = data.u[sid];
                    document.getElementById('auth_scr').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    if(me.n.toLowerCase() === 'owwner') document.getElementById('adm_btn').classList.remove('hidden');
                    render();
                } else { 
                    document.getElementById('auth_scr').classList.remove('hidden'); 
                }
            });
        }

        function render() {
            if(!me) return;
            document.getElementById('h_bal').innerText = me.bal + ' ₽';
            document.getElementById('h_ava').src = me.ava;
            document.getElementById('p_ava').src = me.ava;
            
            // Применяем шрифт и градиент
            const pN = document.getElementById('p_n');
            pN.innerText = me.n;
            pN.className = `text-2xl font-black ${me.nickEffect || ''} ${me.fontClass || ''}`;
            document.getElementById('p_badge').innerHTML = me.badgeType ? `<i class="fa-solid fa-circle-check ${me.badgeType}"></i>` : '';

            // Отрисовка юзеров в админке
            if(me.n.toLowerCase() === 'owwner') renderAdminUsers();
        }

        function renderAdminUsers() {
            document.getElementById('ad_users').innerHTML = Object.values(data.u).map(u => `
                <div class="glass p-4 border border-white/5 space-y-3">
                    <div class="flex items-center gap-3">
                        <img src="${u.ava}" class="w-8 h-8 rounded-full object-cover">
                        <b class="text-xs ${u.nickEffect || ''} ${u.fontClass || ''}">${u.n}</b>
                        <button onclick="admDeleteAcc('${u.id}')" class="ml-auto text-red-500 text-[9px] font-black uppercase">УДАЛИТЬ</button>
                    </div>
                    <div class="grid grid-cols-1 gap-2">
                        <select onchange="admSetStyle('${u.id}', 'fontClass', this.value)" class="!p-2 !text-[10px]">
                            <option value="">Шрифт: Обычный</option>
                            ${fonts.map((f, i) => `<option value="f-${i+1}" ${u.fontClass==='f-'+(i+1)?'selected':''}>${f}</option>`).join('')}
                        </select>
                        <select onchange="admSetStyle('${u.id}', 'nickEffect', this.value)" class="!p-2 !text-[10px]">
                            <option value="">Ник: Обычный</option>
                            ${nicks.map(n => `<option value="${n}" ${u.nickEffect===n?'selected':''}>${n}</option>`).join('')}
                        </select>
                        <select onchange="admSetStyle('${u.id}', 'badgeType', this.value)" class="!p-2 !text-[10px]">
                            <option value="">Галочка: Нет</option>
                            ${badges.map(b => `<option value="${b}" ${u.badgeType===b?'selected':''}>${b}</option>`).join('')}
                        </select>
                    </div>
                </div>
            `).join('');
        }

        function admSetStyle(uid, type, val) {
            db.child(`u/${uid}/${type}`).set(val);
            Tst.fire({icon:'success', title:'Стиль обновлен'});
        }

        function admDeleteAcc(uid) {
            if(confirm('Удалить аккаунт?')) { db.child(`u/${uid}`).remove(); Tst.fire({icon:'success', title:'Стерт'}); }
        }

        function shareProf() {
            navigator.clipboard.writeText(window.location.href + "?u=" + me.id);
            Tst.fire({icon:'success', title:'Ссылка в буфере'});
        }

        function logout() { localStorage.clear(); location.reload(); }
        function switchT(t) { 
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active')); 
            document.getElementById('tab_'+t).classList.add('active'); 
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active')); 
            document.getElementById('n_'+t)?.classList.add('active'); 
        }

        function handleAuth() { 
            const n = document.getElementById('a_n').value, p = document.getElementById('a_p').value; 
            if(isR) { 
                if(!document.getElementById('reg_rules').checked) return Tst.fire({icon:'warning', title:'Правила!'});
                const id = 'u'+Date.now(); db.child(`u/${id}`).set({ id, n, p, ava:tmpImg||'https://ui-avatars.com/api/?name='+n, bal:0 }); 
                localStorage.setItem('lyne_v120_sid', id); location.reload();
            } else { 
                const u = Object.values(data.u).find(x => x.n === n && x.p === p); 
                if(u) { localStorage.setItem('lyne_v120_sid', u.id); location.reload(); } else { Tst.fire({icon:'error', title:'Ошибка'}); } 
            } 
        }

        function toggleR() { isR = !isR; document.getElementById('reg_ext').classList.toggle('hidden'); }
        function upImg(i, tid) { const r = new FileReader(); r.onload = e => { tmpImg = e.target.result; document.getElementById(tid).innerHTML = `<img src="${tmpImg}" class="w-full h-full object-cover rounded-full">`; }; r.readAsDataURL(i.files[0]); }
        function showRules() { Swal.fire({ title: 'Политика', text: 'Будь честным!', background: '#1c1c1e', color: '#fff' }); }

        init();
    </script>
</body>
</html>
