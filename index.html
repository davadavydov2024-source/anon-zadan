<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Press+Start+2P&family=Ruslan+Display&family=Kelly+Slab&family=Underdog&family=Lobster&family=Pacifico&family=Monoton&family=Jura:wght@700&family=Playfair+Display:wght@900&family=Courier+Prime&family=Zeyada&family=Dancing+Script:wght@700&family=EB+Garamond:ital@1&family=Montserrat+Alternates:wght@900&family=Caveat:wght@700&family=Unbounded:wght@900&family=Russo+One&family=Bad+Script&family=Bungee+Shade&family=Rubik+Glitch&family=Creepster&family=Nosifer&family=Rubik+Microbe&family=Silkscreen&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --bg: #050505; --card: #121214; --text: #ffffff; --blue: #007aff; --gray: #1c1c1e; }
        
        body.theme-winter { --bg: #0a192f; --blue: #00d4ff; background-image: url('https://images.unsplash.com/photo-1418985991508-e47386d96a71?q=80&w=2070&auto=format&fit=crop'); }
        body.theme-summer { --bg: #0b2e13; --blue: #ffcc00; background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2073&auto=format&fit=crop'); }
        body.theme-halloween { --bg: #1a0f00; --blue: #ff6600; background-image: url('https://images.unsplash.com/photo-1508361705456-d6f4b634877a?q=80&w=2070&auto=format&fit=crop'); }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; background-size: cover; background-attachment: fixed; transition: 0.5s; }
        .glass { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 24px; backdrop-filter: blur(15px); }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px 16px 180px; scrollbar-width: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(10,10,10,0.9); backdrop-filter: blur(25px); display: flex; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #636366; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: 0.3s; } .nav-btn.active { color: var(--blue); transform: translateY(-2px); }
        input, textarea, select { background: var(--gray); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; color: white; width: 100%; outline: none; font-size: 14px; transition: 0.3s; }
        .btn-blue { background: var(--blue); color: white; border-radius: 18px; font-weight: 900; padding: 18px; width: 100%; border: none; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-style: italic; } 
        
        .chat-msg { margin-bottom: 10px; padding: 10px 15px; border-radius: 18px; max-width: 80%; font-size: 13px; position: relative; }
        .msg-me { background: var(--blue); margin-left: auto; border-bottom-right-radius: 4px; }
        .msg-them { background: #2c2c2e; margin-right: auto; border-bottom-left-radius: 4px; }
        
        #loader { background: #000; z-index: 10000; position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .badge-rainbow { background: linear-gradient(45deg, red, orange, yellow, green, blue, indigo, violet); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rainbow_anim 3s linear infinite; background-size: 200%; }
        .nick-rainbow { background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rainbow_anim 3s linear infinite; background-size: 200%; font-weight: 900; }
        @keyframes rainbow_anim { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .online-dot { width:8px; height:8px; background:#34c759; border-radius:50%; display:inline-block; box-shadow:0 0 8px #34c759; }
    </style>
    <style id="dynamic_styles"></style>
</head>
<body>
    <div id="loader"><div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>
    <img id="holiday_pixel" src="" class="hidden fixed top-24 right-6 z-[4000] w-12 animate-bounce pointer-events-none drop-shadow-2xl">

    <div id="auth_scr" class="hidden fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-8 overflow-y-auto">
        <h1 id="auth_logo" class="text-5xl font-black mb-12 italic tracking-tighter">LYNEOK<span class="text-blue-500">.</span></h1>
        <div id="auth_box" class="w-full glass p-8 space-y-4">
            <div id="google_sim" class="text-center mb-6">
                <button onclick="simGoogleAuth()" class="w-full bg-white text-black py-4 rounded-2xl font-bold flex items-center justify-center gap-3">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-6"> Войти через Google
                </button>
            </div>
            <div id="manual_auth" class="space-y-4">
                <div id="reg_ext" class="hidden space-y-4">
                    <input type="file" id="r_ava" class="hidden" accept="image/*" onchange="upImg(this, 'l_r_ava', true)">
                    <label for="r_ava" id="l_r_ava" class="w-24 h-24 bg-zinc-900 mx-auto rounded-full flex items-center justify-center cursor-pointer border-2 border-dashed border-zinc-800"><i class="fa-solid fa-camera text-zinc-600 text-xl"></i></label>
                    <input id="r_email" placeholder="Ваш Gmail для уведомлений">
                </div>
                <input id="a_n" placeholder="Никнейм">
                <input id="a_p" type="password" placeholder="Пароль">
                <button onclick="handleAuth()" id="a_btn" class="btn-blue">Войти</button>
                <p onclick="toggleR()" id="a_tog" class="text-center text-[11px] font-black text-zinc-500 uppercase cursor-pointer pt-4">Создать новый аккаунт</p>
            </div>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-6 py-5 flex justify-between items-center bg-black/60 backdrop-blur-xl border-b border-white/5 sticky top-0 z-50">
            <b id="main_logo" class="text-2xl italic tracking-tighter text-blue-500">LYNEOK</b>
            <div onclick="switchT('profile')" class="bg-white/5 px-4 py-2 rounded-2xl flex items-center gap-3 border border-white/5 cursor-pointer">
                <div class="text-right"><p class="text-[9px] uppercase font-black opacity-40">Баланс</p><span id="h_bal" class="font-black text-sm">0 ₽</span></div>
                <img id="h_ava" class="w-9 h-9 rounded-full object-cover bg-zinc-800">
            </div>
        </header>

        <main id="tab_market" class="tab-content active">
            <div id="promo_alert" class="hidden mb-6 bg-yellow-500/20 border border-yellow-500/30 p-4 rounded-2xl flex items-center justify-between">
                <div><p class="text-[10px] font-black uppercase text-yellow-500">Акция!</p><p id="promo_text" class="text-xs font-bold"></p></div>
                <i class="fa-solid fa-fire text-yellow-500 animate-pulse"></i>
            </div>
            <div id="market_main">
                <h2 class="text-3xl font-black italic mb-6">Маркет</h2>
                <div id="cat_grid" class="grid grid-cols-3 gap-3"></div> 
            </div>
            <div id="items_view" class="hidden space-y-6">
                <button onclick="closeCat()" class="text-blue-500 text-xs font-bold uppercase"><i class="fa-solid fa-chevron-left"></i> Назад</button>
                <div id="items_list" class="space-y-4"></div>
            </div>
        </main>

        <main id="tab_chats" class="tab-content">
            <h2 class="text-3xl font-black mb-6 italic">Сделки</h2>
            <div id="deals_list" class="space-y-4"></div>
        </main>

        <main id="tab_support" class="tab-content">
            <h2 class="text-3xl font-black mb-6 italic">Поддержка</h2>
            <div class="glass p-6 mb-4">
                <p class="text-[10px] uppercase font-black text-zinc-500 mb-4">Часто задаваемые вопросы (AI)</p>
                <div class="space-y-2 mb-6">
                    <button onclick="askAI('Как пополнить баланс?')" class="w-full text-left bg-zinc-900 p-3 rounded-xl text-xs">Как пополнить баланс?</button>
                    <button onclick="askAI('Как вывести деньги?')" class="w-full text-left bg-zinc-900 p-3 rounded-xl text-xs">Как вывести деньги?</button>
                    <button onclick="askAI('Меня обманули, что делать?')" class="w-full text-left bg-zinc-900 p-3 rounded-xl text-xs">Меня обманули, что делать?</button>
                </div>
                <hr class="border-white/5 mb-6">
                <div id="support_chat_area" class="h-64 overflow-y-auto mb-4 space-y-2"></div>
                <div class="flex gap-2">
                    <input id="sup_msg" placeholder="Напишите нам..." class="!p-3 !text-xs">
                    <button onclick="sendSupportMsg()" class="bg-blue-600 px-4 rounded-xl"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="glass p-8 mb-6 text-center">
                <img id="p_ava" class="w-24 h-24 mx-auto mb-4 rounded-full object-cover">
                <div class="flex items-center justify-center gap-2 mb-2"><span id="p_n" class="text-2xl font-black">...</span><span id="p_badge"></span></div>
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <button onclick="topUp()" class="bg-white text-black py-4 rounded-2xl font-black text-xs uppercase">Пополнить</button>
                    <button onclick="askOut()" class="bg-zinc-800 text-white py-4 rounded-2xl font-black text-xs uppercase">Вывод</button>
                </div>
            </div>
            <button onclick="switchT('support')" class="w-full bg-blue-500/10 text-blue-500 py-4 rounded-2xl font-black mb-4 uppercase text-xs">Связаться с поддержкой</button>
            <button id="adm_btn" onclick="switchT('admin')" class="hidden w-full bg-red-600/10 text-red-500 py-4 rounded-2xl font-black mb-4 uppercase text-xs">Админ-панель</button>
            <button onclick="logout()" class="w-full py-4 text-zinc-600 text-[10px] font-black uppercase">Выйти</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <h1 class="text-3xl font-black italic mb-6">TITAN ADM</h1>
            <div class="space-y-6">
                <section class="glass p-5">
                    <h3 class="text-xs font-black uppercase text-red-500 mb-4">Поддержка (Сообщения)</h3>
                    <div id="ad_support_list" class="space-y-3"></div>
                </section>
                <section class="glass p-5">
                    <h3 class="text-xs font-black uppercase text-yellow-500 mb-4">Пользователи</h3>
                    <div id="ad_users" class="space-y-3"></div>
                </section>
                <button onclick="admFullReset()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-black text-[10px]">WIPE DATA</button>
            </div>
        </main>

        <nav class="nav-bar">
            <div onclick="switchT('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-store text-xl"></i><span>Маркет</span></div>
            <div onclick="switchT('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-message text-xl"></i><span>Сделки</span></div>
            <div onclick="switchT('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user text-xl"></i><span>Профиль</span></div>
        </nav>
    </div>

    <div id="chat_modal" class="hidden fixed inset-0 z-[10005] bg-black flex flex-col">
        <header class="p-4 border-b border-white/5 flex items-center justify-between bg-zinc-900">
            <div class="flex items-center gap-3">
                <button onclick="closeChat()" class="text-xl px-2">&larr;</button>
                <div>
                    <b id="chat_title" class="text-sm block">Сделка</b>
                    <span class="text-[10px] text-green-500">online</span>
                </div>
            </div>
            <button onclick="showDealActions()" class="text-zinc-500"><i class="fa-solid fa-ellipsis-vertical text-xl"></i></button>
        </header>
        <div id="chat_msgs" class="flex-1 overflow-y-auto p-4 flex flex-col"></div>
        <div id="chat_actions" class="hidden p-4 bg-zinc-900 border-t border-white/5 space-y-2">
            <button id="btn_dispute" onclick="submitDispute()" class="w-full bg-red-600/20 text-red-500 py-3 rounded-xl font-bold text-xs uppercase">Подать проблему</button>
            <button id="btn_cancel" onclick="cancelDeal()" class="w-full bg-zinc-800 text-white py-3 rounded-xl font-bold text-xs uppercase">Отменить покупку</button>
        </div>
        <div class="p-4 bg-zinc-900 flex gap-3">
            <input id="chat_input" placeholder="Сообщение..." class="!p-3 !rounded-2xl !bg-black">
            <button onclick="sendChatMessage()" class="bg-blue-600 w-12 h-12 rounded-full flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // --- CONFIG & INIT ---
        emailjs.init("9M8GxYWeMi6hJP6Rg");
        const fList = ["Inter", "Comfortaa", "Press Start 2P", "Jura", "Unbounded", "Russo One", "Silkscreen"];
        const HOLIDAY_IMG = { ny: "https://i.ibb.co/L8y2v8y/pixel-tree.png", easter: "https://i.ibb.co/V9mH9nB/pixel-egg.png", summer: "https://i.ibb.co/QfH30P3/pixel-sun.png" };

        firebase.initializeApp({ apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" });
        const db = firebase.database().ref('lyne_v122_titan');
        const Tst = Swal.mixin({ toast: true, position: 'top', timer: 2000, showConfirmButton: false, background: '#1c1c1e', color: '#fff' });

        let me = null, data = {}, isR = false, tmpImg = "", curChatId = null;

        function init() {
            db.on('value', snap => {
                data = snap.val() || { u:{}, i:{}, d:{}, support:{}, settings:{com:5, branding:{text:"LYNEOK", color:"#007aff", font:0}} };
                const sid = localStorage.getItem('lyne_v122_sid');
                document.getElementById('loader').style.display = 'none';
                
                if (sid && data.u && data.u[sid]) {
                    me = data.u[sid];
                    db.child(`u/${me.id}/online`).set(Date.now());
                }

                if (me) {
                    document.getElementById('auth_scr').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    if(me.isAdmin) document.getElementById('adm_btn').classList.remove('hidden');
                    render();
                    if(curChatId) renderMessages(curChatId);
                } else {
                    document.getElementById('auth_scr').classList.remove('hidden');
                }
            });
        }

        // --- EMAIL NOTIFICATIONS ---
        function sendEmail(toEmail, subject, text) {
            if(!toEmail) return;
            emailjs.send("service_ndr83sj", "template_q98pr7g", {
                to_email: toEmail,
                subject: subject,
                message: text
            });
        }

        // --- AUTH LOGIC ---
        function simGoogleAuth() {
            Tst.fire({icon:'info', title:'Google Auth симуляция...'});
            isR = true;
            document.getElementById('reg_ext').classList.remove('hidden');
            document.getElementById('google_sim').classList.add('hidden');
            document.getElementById('a_btn').innerText = 'Завершить регистрацию';
        }

        function toggleR() { 
            isR = !isR; 
            document.getElementById('reg_ext').classList.toggle('hidden'); 
            document.getElementById('a_btn').innerText = isR ? 'Создать' : 'Войти'; 
        }

        function handleAuth() {
            const n = document.getElementById('a_n').value.trim();
            const p = document.getElementById('a_p').value;
            const email = document.getElementById('r_email').value;
            if(!n || !p) return;

            if(isR) {
                const id = 'u' + Date.now();
                const newUser = { id, n, p, email: email || '', ava: tmpImg || 'https://ui-avatars.com/api/?name='+n, bal: 0, isAdmin: n.toLowerCase() === 'sswckk' };
                db.child(`u/${id}`).set(newUser);
                localStorage.setItem('lyne_v122_sid', id);
                location.reload();
            } else {
                const u = Object.values(data.u || {}).find(x => x.n.toLowerCase() === n.toLowerCase() && x.p === p);
                if(u) { localStorage.setItem('lyne_v122_sid', u.id); location.reload(); }
                else { Swal.fire('Ошибка', 'Неверные данные', 'error'); }
            }
        }

        // --- CHAT & DEALS ---
        function openChat(dealId) {
            curChatId = dealId;
            const d = data.d[dealId];
            document.getElementById('chat_title').innerText = d.t;
            document.getElementById('chat_modal').classList.remove('hidden');
            
            // Кнопки действий
            const isBuyer = d.bid === me.id;
            const isSeller = d.sid === me.id;
            document.getElementById('btn_dispute').style.display = isBuyer ? 'block' : 'none';
            document.getElementById('btn_cancel').style.display = isSeller ? 'block' : 'none';
            
            renderMessages(dealId);
        }

        function renderMessages(dealId) {
            const d = data.d[dealId];
            const area = document.getElementById('chat_msgs');
            if(!d.msgs) { area.innerHTML = '<p class="text-center text-[10px] opacity-30 mt-10">Сообщений нет. Начните общение!</p>'; return; }
            area.innerHTML = Object.values(d.msgs).map(m => `
                <div class="chat-msg ${m.uid === me.id ? 'msg-me' : 'msg-them'}">
                    ${m.txt}
                    <span class="block text-[8px] opacity-50 mt-1 text-right">${new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                </div>
            `).join('');
            area.scrollTop = area.scrollHeight;
        }

        function sendChatMessage() {
            const txt = document.getElementById('chat_input').value;
            if(!txt || !curChatId) return;
            const mid = 'm' + Date.now();
            db.child(`d/${curChatId}/msgs/${mid}`).set({ uid: me.id, txt, time: Date.now() });
            document.getElementById('chat_input').value = '';
        }

        function showDealActions() { document.getElementById('chat_actions').classList.toggle('hidden'); }

        function submitDispute() {
            const d = data.d[curChatId];
            db.child(`d/${curChatId}/dispute`).set(true);
            db.child(`d/${curChatId}/status`).set('Спор');
            // Уведомление админу
            db.child(`support/ticket_${curChatId}`).set({ id:curChatId, type:'dispute', title: 'СПОР по сделке ' + d.t, uid: me.id, time: Date.now() });
            sendEmail(data.u[d.sid].email, "Проблема в сделке", `Покупатель ${me.n} подал жалобу на товар ${d.t}`);
            Swal.fire('Жалоба подана', 'Администратор скоро рассмотрит вашу заявку', 'success');
            showDealActions();
        }

        function cancelDeal() {
            const d = data.d[curChatId];
            Swal.fire({
                title: 'Отменить сделку?',
                text: "Деньги вернутся покупателю",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Да, отменить'
            }).then((result) => {
                if (result.isConfirmed) {
                    const buyer = data.u[d.bid];
                    db.child(`u/${d.bid}/bal`).set((buyer.bal || 0) + d.p);
                    db.child(`d/${curChatId}/status`).set('Отменена');
                    sendEmail(buyer.email, "Товар отменен", `Продавец отменил сделку по товару ${d.t}. Деньги возвращены на баланс.`);
                    Tst.fire({icon:'success', title:'Сделка отменена'});
                    closeChat();
                }
            });
        }

        function closeChat() { curChatId = null; document.getElementById('chat_modal').classList.add('hidden'); }

        // --- SUPPORT (AI & HUMAN) ---
        function askAI(q) {
            const area = document.getElementById('support_chat_area');
            area.innerHTML += `<div class="bg-zinc-800 p-3 rounded-xl text-xs ml-auto max-w-[80%] mb-2">${q}</div>`;
            
            let reply = "Извините, я не понял вопрос. Попробуйте написать 'настоящему человеку' ниже.";
            if(q.includes('баланс')) reply = "Чтобы пополнить баланс, перейдите в профиль и нажмите кнопку 'Пополнить'. Мы принимаем карты и СБП.";
            if(q.includes('вывести')) reply = "Вывод средств доступен от 509₽ в разделе профиля. Срок обработки до 24 часов.";
            if(q.includes('обманули')) reply = "Если в сделке возникли проблемы, откройте чат сделки, нажмите три точки и выберите 'Подать проблему'. Админ подключится!";

            setTimeout(() => {
                area.innerHTML += `<div class="bg-blue-600/20 text-blue-400 p-3 rounded-xl text-xs mr-auto max-w-[80%] mb-2"><b>AI:</b> ${reply}</div>`;
                area.scrollTop = area.scrollHeight;
            }, 600);
        }

        function sendSupportMsg() {
            const txt = document.getElementById('sup_msg').value;
            if(!txt) return;
            const tid = 'sup_' + me.id;
            db.child(`support/${tid}`).set({ uid: me.id, lastMsg: txt, time: Date.now(), status: 'open' });
            db.child(`support/${tid}/msgs/m${Date.now()}`).set({ uid: me.id, txt, time: Date.now() });
            document.getElementById('sup_msg').value = '';
            Tst.fire({icon:'success', title:'Сообщение отправлено админу'});
        }

        // --- RENDER FUNCTIONS ---
        function render() {
            document.getElementById('h_bal').innerText = (me.bal || 0) + ' ₽';
            document.getElementById('h_ava').src = me.ava;
            document.getElementById('p_ava').src = me.ava;
            document.getElementById('p_n').innerText = me.n;

            // Рендер категорий (игр)
            const catGrid = document.getElementById('cat_grid');
            catGrid.innerHTML = Object.values(data.games || {}).map(g => `
                <div class="glass p-3 text-center" onclick="openGame('${g.id}')">
                    <img src="${g.img}" class="w-12 h-12 mx-auto mb-2 rounded-2xl object-cover">
                    <b class="text-[9px] uppercase block truncate">${g.name}</b>
                </div>
            `).join('');

            // Рендер сделок
            const dealsList = document.getElementById('deals_list');
            const myDeals = Object.values(data.d || {}).filter(d => d.bid === me.id || d.sid === me.id).reverse();
            dealsList.innerHTML = myDeals.map(d => `
                <div onclick="openChat('${d.id}')" class="glass p-5 flex justify-between items-center relative">
                    <div>
                        <b class="text-sm">${d.t}</b>
                        <p class="text-[10px] opacity-40 uppercase">${d.status} • ${d.p}₽</p>
                    </div>
                    <i class="fa-solid fa-chevron-right opacity-20"></i>
                </div>
            `).join('') || '<p class="text-center opacity-30 py-10">У вас пока нет сделок</p>';

            if(me.isAdmin) renderAdmin();
        }

        function renderAdmin() {
            const supArea = document.getElementById('ad_support_list');
            supArea.innerHTML = Object.values(data.support || {}).map(s => `
                <div onclick="adminReply('${s.uid}')" class="bg-zinc-900 p-3 rounded-xl flex justify-between items-center cursor-pointer">
                    <span class="text-xs font-bold">${data.u[s.uid]?.n || 'Юзер'}</span>
                    <span class="text-[10px] text-blue-500 uppercase font-black">ОТВЕТИТЬ</span>
                </div>
            `).join('');

            const userArea = document.getElementById('ad_users');
            userArea.innerHTML = Object.values(data.u || {}).map(u => `
                <div class="bg-zinc-900 p-3 rounded-xl flex justify-between items-center">
                    <span class="text-xs">${u.n} (${u.bal}₽)</span>
                    <button onclick="admEditBal('${u.id}')" class="text-blue-500 text-[10px] font-black">+/-</button>
                </div>
            `).join('');
        }

        async function adminReply(uid) {
            const { value: text } = await Swal.fire({ title: 'Ответ пользователю', input: 'textarea' });
            if(text) {
                const mid = 'm' + Date.now();
                db.child(`support/sup_${uid}/msgs/${mid}`).set({ uid: 'admin', txt: text, time: Date.now() });
                sendEmail(data.u[uid].email, "Ответ поддержки", `Администратор Lyneok ответил на ваш запрос: ${text}`);
                Tst.fire({icon:'success', title:'Отправлено'});
            }
        }

        function openGame(gid) {
            document.getElementById('market_main').classList.add('hidden');
            document.getElementById('items_view').classList.remove('hidden');
            const its = Object.values(data.i || {}).filter(i => i.game === gid && !i.sold);
            document.getElementById('items_list').innerHTML = its.map(i => `
                <div onclick="buyItem('${i.id}')" class="glass p-5 flex justify-between items-center">
                    <b class="text-sm">${i.t}</b>
                    <span class="font-black text-blue-500">${i.p}₽</span>
                </div>
            `).join('') || '<p class="text-center opacity-30 py-10">Товаров нет</p>';
        }

        function buyItem(id) {
            const i = data.i[id];
            if(me.bal < i.p) return Swal.fire('Мало денег', 'Пополните баланс в профиле', 'error');
            
            const did = 'd' + Date.now();
            db.child(`u/${me.id}/bal`).set(me.bal - i.p);
            db.child(`i/${id}/sold`).set(true);
            db.child(`d/${did}`).set({ id:did, bid:me.id, sid:i.sid, t:i.t, p:i.p, status:'Оплачено', time:Date.now() });
            
            sendEmail(data.u[i.sid].email, "У вас купили товар!", `Ваш лот "${i.t}" был куплен за ${i.p}₽. Перейдите в чат для обсуждения.`);
            Swal.fire('Успешно!', 'Товар куплен. Перейдите в сделки для общения с продавцом.', 'success');
        }

        // --- UTILS ---
        function switchT(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.getElementById('tab_'+t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            const n = document.getElementById('n_'+t);
            if(n) n.classList.add('active');
        }

        function logout() { localStorage.clear(); location.reload(); }
        function closeCat() { document.getElementById('items_view').classList.add('hidden'); document.getElementById('market_main').classList.remove('hidden'); }
        function upImg(i, tid, set) { const r=new FileReader(); r.onload=e=>{ tmpImg=e.target.result; if(set) document.getElementById(tid).innerHTML=`<img src="${tmpImg}" class="w-full h-full object-cover rounded-full">`; }; if(i.files[0]) r.readAsDataURL(i.files[0]); }

        init();
    </script>
</body>
</html>
