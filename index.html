<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK V41.6 — OMNI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        :root { --bg: #050506; --card: #111113; --blue: #3b82f6; --gold: #ffb000; }
        body { background: var(--bg); color: #fff; font-family: 'Manrope', sans-serif; overflow-x: hidden; height: 100vh; margin: 0; }
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 24px 20px 140px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(10,10,12,0.96); backdrop-filter: blur(25px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #52525b; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 9px; font-weight: 800; cursor: pointer; }
        .nav-btn.active { color: var(--blue); }
        .tile { background: var(--card); border-radius: 24px; border: 1px solid rgba(255,255,255,0.04); }
        input, textarea, select { background: #18181b; border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 16px; color: white; width: 100%; outline: none; font-size: 14px; }
        .btn-main { background: var(--blue); padding: 18px; border-radius: 22px; font-weight: 800; text-transform: uppercase; width: 100%; }
        ::-webkit-scrollbar { width: 0; }
        .badge-ver { color: #3b82f6; font-size: 10px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="text-3xl font-black italic tracking-tighter text-blue-500">LYNEOK</div>
    </div>

    <div id="auth_screen" class="hidden h-screen flex flex-col items-center justify-center px-10">
        <h1 class="text-4xl font-black italic mb-8 uppercase">LYNE<span class="text-blue-500">OK</span></h1>
        <div class="w-full max-w-sm space-y-3">
            <input id="reg_n" placeholder="ЛОГИН">
            <input id="reg_p" type="password" placeholder="ПАРОЛЬ">
            <input id="reg_tg" placeholder="ТВОЙ TG (напр. @sswckk)">
            <input id="reg_mail" placeholder="EMAIL (ДЛЯ УВЕДОМЛЕНИЙ)">
            <button onclick="handleAuth()" class="btn-main mt-4">СОЗДАТЬ АККАУНТ</button>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-6 py-5 flex justify-between items-center bg-zinc-950 border-b border-white/5 z-50">
            <span class="font-black italic text-xl">LYNEOK</span>
            <div id="h_bal" class="bg-blue-500/10 text-blue-500 px-4 py-2 rounded-2xl font-black text-sm italic">0 ₽</div>
        </header>

        <main id="tab_market" class="tab-content active">
            <div id="cat_view" class="grid grid-cols-2 gap-4"></div>
            <div id="items_view" class="hidden space-y-4">
                <button onclick="backToCats()" class="text-zinc-500 font-black text-[10px] uppercase italic mb-2">← К КАТЕГОРИЯМ</button>
                <div id="market_grid" class="space-y-3"></div>
            </div>
        </main>

        <main id="tab_sell" class="tab-content">
            <h2 class="text-2xl font-black mb-6 italic uppercase text-blue-500">ПРОДАТЬ</h2>
            <div class="space-y-4">
                <input type="file" id="i_img" class="hidden" onchange="compImg(this, 'l_img')">
                <label for="i_img" id="l_img" class="w-full h-32 bg-zinc-900 border-2 border-dashed border-white/10 rounded-3xl flex items-center justify-center font-black text-[10px] opacity-40 uppercase">ФОТО ТОВАРА</label>
                <select id="i_cat"></select>
                <input id="i_title" placeholder="Название">
                <textarea id="i_desc" placeholder="Описание / Данные"></textarea>
                <input id="i_price" type="number" placeholder="Цена">
                <button onclick="postItem()" class="btn-main">ВЫСТАВИТЬ</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content">
            <div id="support_chat" onclick="openSupport()" class="tile p-5 mb-6 border-blue-500/30 bg-blue-500/5 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center shadow-lg shadow-blue-500/20"><i class="fa-solid fa-headset"></i></div>
                    <div>
                        <b class="text-xs uppercase italic">Support Lyneok <i class="fa-solid fa-circle-check badge-ver"></i></b>
                        <p class="text-[9px] opacity-40 uppercase font-black">Служба поддержки</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-[10px] opacity-20"></i>
            </div>
            <h2 class="text-[10px] font-black opacity-20 uppercase mb-3 tracking-widest">Активные сделки</h2>
            <div id="chats_list" class="space-y-3"></div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="tile p-6 mb-4 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div id="p_ava" class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center font-black text-xl">?</div>
                    <div>
                        <div class="flex items-center gap-1">
                            <b id="p_name" class="text-lg uppercase italic">...</b>
                            <i id="p_ver" class="fa-solid fa-circle-check text-blue-500 hidden"></i>
                        </div>
                        <p id="p_id" class="text-[8px] opacity-30 font-black">UID: 000000</p>
                    </div>
                </div>
                <button onclick="shareProfile()" class="w-10 h-10 bg-zinc-900 rounded-xl flex items-center justify-center"><i class="fa-solid fa-share-nodes text-xs"></i></button>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mb-4 text-center">
                <div class="tile p-4"><p class="text-[8px] opacity-30 uppercase font-black">Покупки</p><b id="p_buy_cnt" class="text-lg">0</b></div>
                <div class="tile p-4"><p class="text-[8px] opacity-30 uppercase font-black">Продажи</p><b id="p_sell_cnt" class="text-lg">0</b></div>
            </div>

            <button id="adm_btn" onclick="switchTab('admin')" class="hidden tile w-full p-5 text-red-500 font-black text-[10px] uppercase italic mb-3">OWNER PANEL</button>
            <button onclick="logout()" class="tile w-full p-4 opacity-20 font-black text-[9px] uppercase">Выход</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <h1 class="text-2xl font-black text-red-500 mb-6 italic uppercase">Админ-центр</h1>
            <div class="space-y-4">
                <div class="tile p-5">
                    <input id="u_search" placeholder="UID юзера" class="mb-3">
                    <div id="u_mail_status" class="mb-3 text-[9px] font-black uppercase hidden"></div>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="adminAction('bal')" class="bg-zinc-800 p-3 rounded-xl text-[9px] font-black uppercase">Баланс</button>
                        <button onclick="adminAction('ver')" class="bg-blue-600 p-3 rounded-xl text-[9px] font-black uppercase">Галочка</button>
                        <button onclick="adminAction('info')" class="bg-zinc-800 p-3 rounded-xl text-[9px] font-black uppercase">Проверить Почту</button>
                        <button onclick="adminAction('ban')" class="bg-red-600 p-3 rounded-xl text-[9px] font-black uppercase">БАН</button>
                    </div>
                </div>
                <div class="tile p-5">
                    <p class="text-[10px] font-black text-blue-500 mb-3 uppercase italic">Ответ в Саппорт</p>
                    <input id="sup_uid" placeholder="UID кому отвечаем" class="mb-2">
                    <textarea id="sup_msg" placeholder="Текст ответа"></textarea>
                    <button onclick="answerSupport()" class="w-full bg-blue-600 p-4 rounded-2xl font-black text-[10px] uppercase mt-3">ОТПРАВИТЬ ОТВЕТ</button>
                </div>
                <div id="adm_mod"></div>
            </div>
        </main>

        <nav class="nav-bar">
            <div onclick="switchTab('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-store text-xl"></i><span>МАРКЕТ</span></div>
            <div onclick="switchTab('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-plus text-xl"></i><span>ПРОДАТЬ</span></div>
            <div onclick="switchTab('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-comment text-xl"></i><span>СДЕЛКИ</span></div>
            <div onclick="switchTab('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user text-xl"></i><span>ПРОФИЛЬ</span></div>
        </nav>
    </div>

    <script>
        // ИНИЦИАЛИЗАЦИЯ
        const CFG = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        firebase.initializeApp(CFG);
        const db = firebase.database().ref('lyne_v41_ulti');
        
        // EMAILJS (Замени на свои ключи)
        emailjs.init("YOUR_PUBLIC_KEY");

        const TG_TOKEN = "8641257792:AAEsxnQWEIeozMt_gnSwJdVgSFQlOc-hnuc";
        const TG_ADMIN = "7040863301";

        let me = null, data = {}, b64 = "";

        // ФУНКЦИИ
        async function notify(title, msg, targetMail) {
            // В Telegram
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_ADMIN}&text=${encodeURIComponent('🔔 ' + title + '\n' + msg)}&parse_mode=HTML`);
            
            // На почту (если есть)
            if(targetMail) {
                emailjs.send("service_id", "template_id", { to_email: targetMail, message: msg, subject: title });
            }
        }

        function init() {
            // Проверка ссылки на профиль
            const urlParams = new URLSearchParams(window.location.search);
            const viewUid = urlParams.get('u');

            db.on('value', snap => {
                data = snap.val() || { u:{}, i:{}, d:{}, cat:{}, sup:{} };
                const sid = localStorage.getItem('lyne_sid');
                
                if(viewUid) return renderPublicProfile(viewUid);

                if(!sid) { document.getElementById('auth_screen').classList.remove('hidden'); } 
                else {
                    me = data.u[sid];
                    if(!me) return logout();
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('auth_screen').classList.add('hidden');
                    render();
                }
                document.getElementById('loader').style.display = 'none';
            });
        }

        async function handleAuth() {
            const n = document.getElementById('reg_n').value.trim(), p = document.getElementById('reg_p').value.trim(), tg = document.getElementById('reg_tg').value.trim(), m = document.getElementById('reg_mail').value.trim();
            if(!n || !p) return Swal.fire('!', 'Логин и пароль!', 'warning');
            let uid = Object.keys(data.u || {}).find(k => data.u[k].n.toLowerCase() === n.toLowerCase());
            if(!uid) {
                uid = 'u' + Math.random().toString(36).substr(2, 6);
                await db.child(`u/${uid}`).set({ id: uid, n, p, tg, mail: m, bal: 0, ver: false });
                notify("НОВЫЙ ЮЗЕР", `Имя: ${n}\nEmail: ${m || 'Не указан'}`, null);
            } else if(data.u[uid].p !== p) return Swal.fire('!', 'Пароль!', 'error');
            localStorage.setItem('lyne_sid', uid); location.reload();
        }

        function render() {
            document.getElementById('h_bal').innerText = (me.bal || 0).toLocaleString() + ' ₽';
            document.getElementById('p_name').innerText = me.n;
            document.getElementById('p_id').innerText = 'UID: ' + me.id;
            if(me.ver) document.getElementById('p_ver').classList.remove('hidden');
            
            if(me.n === 'owwner' || me.n === 'АРТЁМ') document.getElementById('adm_btn').classList.remove('hidden');

            // Рендер категорий и лотов
            const cats = Object.values(data.cat || {});
            document.getElementById('cat_view').innerHTML = cats.map(c => `<div onclick="openCat('${c.name}')" class="tile p-6 text-center"><img src="${c.img}" class="w-12 h-12 mx-auto mb-2 rounded-xl object-cover"><p class="text-[10px] font-black uppercase italic">${c.name}</p></div>`).join('');
            document.getElementById('i_cat').innerHTML = cats.map(c => `<option value="${c.name}">${c.name}</option>`).join('');

            const myD = Object.values(data.d || {}).filter(d => d.bid === me.id || d.sid === me.id).reverse();
            document.getElementById('chats_list').innerHTML = myD.map(d => `<div onclick="viewDeal('${d.id}')" class="tile p-4 flex justify-between items-center"><div><b class="text-xs uppercase">${d.title}</b><p class="text-[9px] text-blue-500 font-black uppercase mt-1">${d.status}</p></div><b class="text-xs">${d.price} ₽</b></div>`).join('');
        }

        function openSupport() {
            const myMsgs = data.sup && data.sup[me.id] ? Object.values(data.sup[me.id]) : [];
            let chatHtml = myMsgs.map(m => `<div class="mb-2 ${m.from === 'admin' ? 'text-left' : 'text-right'}"><div class="inline-block p-3 rounded-2xl text-[11px] ${m.from === 'admin' ? 'bg-blue-600' : 'bg-zinc-800'}">${m.txt}</div></div>`).join('') || "<p class='opacity-20 text-center py-5 uppercase text-[10px]'>Нет сообщений</p>";
            
            Swal.fire({
                title: 'SUPPORT LYNEOK',
                html: `<div id="chat_box" class="max-h-60 overflow-y-auto mb-4">${chatHtml}</div><input id="sup_inp" placeholder="Ваш вопрос...">`,
                confirmButtonText: 'ОТПРАВИТЬ',
                confirmButtonColor: '#3b82f6',
                preConfirm: () => {
                    const txt = document.getElementById('sup_inp').value;
                    if(txt) {
                        const mId = Date.now();
                        db.child(`sup/${me.id}/${mId}`).set({ txt, from: 'user', date: mId });
                        notify("ВОПРОС В САППОРТ", `От: ${me.n}\nТекст: ${txt}`, null);
                    }
                }
            });
        }

        function answerSupport() {
            const uid = document.getElementById('sup_uid').value, txt = document.getElementById('sup_msg').value;
            if(!uid || !txt) return;
            const mId = Date.now();
            db.child(`sup/${uid}/${mId}`).set({ txt, from: 'admin', date: mId });
            Swal.fire('ОК', 'Ответ отправлен', 'success');
        }

        function adminAction(act) {
            const uid = document.getElementById('u_search').value.trim();
            const u = data.u[uid];
            if(!u) return Swal.fire('?', 'UID?', 'error');

            if(act === 'info') {
                const status = u.mail ? `<span class="text-green-500">ПОДКЛЮЧЕНА (${u.mail})</span>` : `<span class="text-red-500">НЕ ПОДКЛЮЧЕНА</span>`;
                document.getElementById('u_mail_status').innerHTML = `ПОЧТА: ${status}`;
                document.getElementById('u_mail_status').classList.remove('hidden');
            } else if(act === 'bal') {
                Swal.fire({ title: 'Баланс', input: 'number' }).then(r => { if(r.value) db.child(`u/${uid}/bal`).set(Number(r.value)) });
            } else if(act === 'ver') {
                db.child(`u/${uid}/ver`).set(!u.ver);
            }
        }

        function shareProfile() {
            const link = window.location.origin + window.location.pathname + '?u=' + me.id;
            navigator.clipboard.writeText(link);
            Swal.fire('ССЫЛКА СКОПИРОВАНА', 'Теперь ты можешь отправить её кому угодно', 'success');
        }

        function renderPublicProfile(uid) {
            const u = data.u[uid];
            if(!u) return document.body.innerHTML = "404 - USER NOT FOUND";
            const items = Object.values(data.i || {}).filter(i => i.sid === uid && i.status === 'active');
            
            document.body.innerHTML = `
                <div class="p-10 text-center">
                    <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-4 flex items-center justify-center text-3xl font-black">${u.n[0].toUpperCase()}</div>
                    <h1 class="text-2xl font-black italic uppercase">${u.n} ${u.ver ? '<i class="fa-solid fa-circle-check text-blue-500"></i>' : ''}</h1>
                    <p class="opacity-30 text-[10px] mb-8 tracking-widest uppercase">Официальный профиль Lyneok</p>
                    <div class="grid grid-cols-2 gap-3 mb-10">
                        <div class="tile p-4"><p class="text-[8px] opacity-30 uppercase">Товаров</p><b class="text-xl">${items.length}</b></div>
                        <div class="tile p-4"><p class="text-[8px] opacity-30 uppercase">Рейтинг</p><b class="text-xl text-gold">5.0</b></div>
                    </div>
                    <button onclick="location.href='${window.location.origin + window.location.pathname}'" class="btn-main">ПЕРЕЙТИ В МАРКЕТ</button>
                </div>`;
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.getElementById('tab_'+t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById('n_'+t)?.classList.add('active');
        }

        function logout() { localStorage.clear(); location.reload(); }
        init();
    </script>
</body>
</html>
