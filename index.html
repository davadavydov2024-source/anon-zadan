<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>anon:zadan (dmd) v2.2 STABLE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { background: #0a0a0b; color: #e4e4e7; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: #161618; border: 1px solid #27272a; border-radius: 24px; overflow: hidden; }
        .tab { display: none; }
        .tab.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn-accent { background: #ffffff; color: #000; border-radius: 16px; font-weight: 800; }
        .input-dark { background: #0f0f10 !important; border: 1px solid #27272a !important; color: white !important; border-radius: 14px !important; outline: none; }
        .msg-support { border-left: 3px solid #3b82f6; background: #1d1d21; padding: 12px; border-radius: 14px; margin-bottom: 8px; align-self: flex-start; max-width: 85%; }
        .msg-user { border-right: 3px solid #71717a; background: #27272a; padding: 12px; border-radius: 14px; margin-bottom: 8px; align-self: flex-end; max-width: 85%; text-align: right; }
        .support-btn { background: #27272a; border: 1px solid #3f3f46; color: white; padding: 6px 10px; border-radius: 8px; font-size: 9px; margin-top: 5px; display: inline-block; margin-right: 4px; }
    </style>
</head>
<body class="pb-28">

    <header class="p-5 flex justify-between items-center sticky top-0 bg-[#0a0a0b]/90 backdrop-blur-md z-50 border-b border-white/5">
        <h1 class="text-lg font-extrabold italic tracking-tighter">anon:<span class="text-zinc-600">zadan</span></h1>
        <div id="u-bal-head" class="bg-zinc-900 px-4 py-1.5 rounded-full text-[11px] font-bold border border-zinc-800 text-white">0.00₽</div>
    </header>

    <section id="home" class="tab active px-5 pt-4">
        <div id="zadan-list" class="space-y-4 pb-10"></div>
    </section>
    
    <section id="create" class="tab px-5 pt-4">
        <div class="card p-6 space-y-4">
            <h2 class="font-bold text-xs uppercase opacity-40 tracking-widest">Создать задание</h2>
            <input id="z-title" class="input-dark w-full p-4 text-xs" placeholder="Что нужно сделать?">
            <textarea id="z-desc" class="input-dark w-full p-4 text-xs h-24" placeholder="Подробное описание..."></textarea>
            <div class="relative">
                <input type="file" id="z-file" accept="image/*" class="hidden" onchange="handleFile(this)">
                <button onclick="document.getElementById('z-file').click()" class="w-full bg-zinc-900 py-5 rounded-2xl text-[10px] font-bold border border-zinc-800 text-zinc-400">ЗАГРУЗИТЬ ФОТО ТОВАРА</button>
                <div id="file-preview" class="hidden mt-2 text-[9px] text-green-500 text-center font-bold">ФОТО ПРИНЯТО ✅</div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <input id="z-price" type="number" class="input-dark w-full p-4 text-xs" placeholder="Цена (₽)">
                <input id="z-addr" class="input-dark w-full p-4 text-xs" placeholder="Город / Адрес">
            </div>
            <button onclick="createZadan()" class="w-full btn-accent py-5 text-[11px] uppercase tracking-widest">Опубликовать</button>
        </div>
    </section>

    <section id="chats" class="tab px-5 pt-4 space-y-4">
        <div class="card p-5 border-blue-900/20 flex flex-col h-[70vh]">
            <div class="flex items-center gap-2 mb-4">
                <i class="fa-solid fa-circle-check text-blue-500"></i>
                <span class="text-xs font-bold uppercase">Поддержка anon:zadan ✅</span>
            </div>
            <div id="support-messages" class="flex-1 overflow-y-auto space-y-3 mb-4 flex flex-col pr-1"></div>
            <div class="flex gap-2">
                <input id="user-msg-input" class="input-dark flex-1 p-3.5 text-[11px]" placeholder="Ваш вопрос...">
                <button onclick="userSendMessage()" class="bg-blue-600 w-12 h-11 rounded-xl flex items-center justify-center text-white"><i class="fa-solid fa-paper-plane text-sm"></i></button>
            </div>
        </div>
    </section>

    <section id="me" class="tab px-5 pt-4">
        <div class="card p-8 text-center space-y-6">
            <div>
                <h3 id="u-nick" class="font-black text-2xl mb-1">...</h3>
                <p id="u-id" class="text-[10px] opacity-30 italic">ID: 000000</p>
            </div>
            <div id="u-bal-main" class="bg-zinc-900 p-7 rounded-[32px] border border-zinc-800 font-black text-3xl">0₽</div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="deposit()" class="btn-accent py-4 text-[10px] uppercase">Пополнить</button>
                <button onclick="withdraw()" class="bg-zinc-800 text-zinc-400 py-4 rounded-xl text-[10px] uppercase">Вывод</button>
            </div>
            <button onclick="setTab('admin_login')" class="opacity-10 text-[8px] uppercase font-bold tracking-[5px]">Admin Control</button>
            <button onclick="localStorage.clear(); location.reload();" class="block w-full text-[8px] opacity-30 mt-4 uppercase underline">Выйти из аккаунта</button>
        </div>
    </section>

    <section id="admin_login" class="tab px-5 pt-20">
        <input type="password" id="admin-pass-input" oninput="if(this.value.toLowerCase()==='kalubxq') setTab('admin')" class="w-full p-6 text-center card outline-none border-zinc-700" placeholder="••••">
    </section>

    <section id="admin" class="tab px-5 pb-32 space-y-6 pt-4">
        <div class="card p-5 space-y-3">
            <h2 class="text-[10px] font-bold text-blue-500 uppercase">📢 Рассылка / Ответ</h2>
            <input id="adm-target-id" class="input-dark w-full p-3 text-[10px]" placeholder="ID юзера (пусто = ВСЕМ)">
            <textarea id="adm-msg-text" class="input-dark w-full p-3 text-[10px] h-16" placeholder="Текст сообщения..."></textarea>
            <div id="btn-builder" class="space-y-2"></div>
            <button onclick="addBtnField()" class="w-full py-2 text-[8px] text-zinc-500 border border-dashed border-zinc-800 rounded-lg">+ КНОПКА</button>
            <button onclick="adminSendSmartMsg()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl text-[10px]">ОТПРАВИТЬ</button>
        </div>
        <div id="adm-full-list" class="space-y-4"></div>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-black/95 border-t border-zinc-900 flex justify-around items-center z-[100] px-4">
        <button onclick="setTab('home')" id="btn-home" class="flex flex-col items-center gap-1"><i class="fa-solid fa-house text-lg"></i></button>
        <button onclick="setTab('create')" id="btn-create" class="flex flex-col items-center gap-1 opacity-30"><i class="fa-solid fa-plus-circle text-lg"></i></button>
        <button onclick="setTab('chats')" id="btn-chats" class="flex flex-col items-center gap-1 opacity-30"><i class="fa-solid fa-comment-dots text-lg"></i></button>
        <button onclick="setTab('me')" id="btn-me" class="flex flex-col items-center gap-1 opacity-30"><i class="fa-solid fa-user text-lg"></i></button>
    </nav>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
          authDomain: "dogx-base.firebaseapp.com",
          databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
          projectId: "dogx-base",
          storageBucket: "dogx-base.firebasestorage.app",
          messagingSenderId: "81713249793",
          appId: "1:81713249793:web:1b44a13e6faf5acfa78a00"
        };

        const DB_VER = 'anon_v2_2_fix'; 
        const tg = window.Telegram.WebApp;
        firebase.initializeApp(firebaseConfig);
        const rdb = firebase.database();

        let db = { users: {}, tasks: {}, notifications: {} };
        let me = null;

        function init() {
            rdb.ref(DB_VER).on('value', (s) => {
                db = s.val() || { users: {}, tasks: {}, notifications: {} };
                const uid = localStorage.getItem('anon_uid');
                if (uid && db.users && db.users[uid]) {
                    me = db.users[uid];
                    renderAll();
                } else if (!document.querySelector('.swal2-container')) {
                    showReg();
                }
            });
        }

        async function showReg() {
            const tgUser = tg.initDataUnsafe?.user;
            const { value: f } = await Swal.fire({
                title: 'ВХОД / РЕГИСТРАЦИЯ',
                background: '#161618', color: '#fff',
                html: `<input id="s-n" class="swal2-input" style="color:black" placeholder="Ник" value="${tgUser?.first_name || ''}">
                       <input id="s-p" type="password" class="swal2-input" style="color:black" placeholder="Пароль">`,
                confirmButtonText: 'ВОЙТИ',
                allowOutsideClick: false,
                preConfirm: () => {
                    const n = document.getElementById('s-n').value.trim();
                    const p = document.getElementById('s-p').value.trim();
                    if(!n || !p) { Swal.showValidationMessage('Заполните все поля!'); return false; }
                    return [n, p];
                }
            });

            if (f) {
                const [nick, pass] = f;
                let user = Object.values(db.users || {}).find(x => x.nick === nick);

                if (user) {
                    if (user.pass === pass) {
                        localStorage.setItem('anon_uid', user.id);
                        location.reload();
                    } else {
                        await Swal.fire('Ошибка', 'Неверный пароль для этого ника', 'error');
                        showReg();
                    }
                } else {
                    const id = Math.floor(100000 + Math.random() * 900000).toString();
                    const newUser = { id, nick, pass, bal: 0, tg_user: tgUser?.username || 'none', created: Date.now() };
                    await rdb.ref(DB_VER + '/users/' + id).set(newUser);
                    localStorage.setItem('anon_uid', id);
                    location.reload();
                }
            }
        }

        // Остальные функции без изменений для сохранения функционала
        function userSendMessage() {
            const input = document.getElementById('user-msg-input');
            const txt = input.value.trim();
            if(!txt || !me) return;
            rdb.ref(`${DB_VER}/notifications/${me.id}/${Date.now()}`).set({ text: txt, from: 'user', time: Date.now() });
            input.value = '';
        }

        function renderChats() {
            if(!me) return;
            const msgs = db.notifications?.[me.id] || {};
            const sorted = Object.values(msgs).sort((a,b) => a.time - b.time);
            const container = document.getElementById('support-messages');
            container.innerHTML = sorted.map(m => `<div class="${m.from === 'user' ? 'msg-user' : 'msg-support'}"><p class="text-[11px]">${m.text}</p><div class="text-[7px] opacity-30 mt-1 uppercase">${new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div></div>`).join('');
            container.scrollTop = container.scrollHeight;
        }

        function renderHome() {
            const list = Object.values(db.tasks || {}).filter(t => t.status === 'active').sort((a,b) => b.created_at - a.created_at);
            document.getElementById('zadan-list').innerHTML = list.map(t => `<div class="card">${t.img ? `<img src="${t.img}" class="w-full h-48 object-cover">` : ''}<div class="p-5"><b>${t.title}</b> <span class="text-green-400">${t.price}₽</span><p class="text-[10px] opacity-40 mt-1">${t.desc}</p><button class="w-full btn-accent py-4 mt-4 text-[10px] uppercase">Купить товар</button></div></div>`).join('') || '<p class="text-center opacity-20 py-10 text-xs">Заданий нет</p>';
        }

        function renderAll() { 
            if(!me) return;
            renderHome(); renderChats();
            document.getElementById('u-nick').innerText = me.nick;
            document.getElementById('u-id').innerText = 'ID: ' + me.id;
            document.getElementById('u-bal-head').innerText = (me.bal || 0) + '₽';
            document.getElementById('u-bal-main').innerText = (me.bal || 0) + '₽';
            if(window.location.hash === '#admin') renderAdmin();
        }

        function setTab(t) {
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.add('opacity-30'));
            if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.remove('opacity-30');
        }

        init();
    </script>
</body>
</html>
