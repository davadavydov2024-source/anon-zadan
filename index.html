<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK OMEGA V120.8</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --bg: #050505; --card: #121214; --text: #ffffff; --blue: #007aff; --gray: #1c1c1e; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .glass { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 24px; }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px 16px 160px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Эффекты */
        .nick-rainbow { background: linear-gradient(to right, red, orange, yellow, green, cyan, blue, violet); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rainbow_anim 3s linear infinite; font-weight: 900; background-size: 200%; }
        @keyframes rainbow_anim { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        .nick-neon { color: #fff; text-shadow: 0 0 10px var(--blue), 0 0 20px var(--blue); }
        .badge-neon { color: #00f2ff; filter: drop-shadow(0 0 5px #00f2ff); }
        .badge-rainbow { background: linear-gradient(to right, red, yellow, lime, cyan, blue, magenta); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: rgba(10,10,10,0.8); backdrop-filter: blur(20px); display: flex; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #636366; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 700; }
        .nav-btn.active { color: var(--blue); }

        input, textarea, select { background: var(--gray); border: 1px solid transparent; border-radius: 14px; padding: 14px; color: white; width: 100%; outline: none; font-size: 14px; }
        .btn-blue { background: var(--blue); color: white; border-radius: 16px; font-weight: 800; padding: 16px; width: 100%; border: none; cursor: pointer; transition: 0.3s; }
        .btn-blue:active { transform: scale(0.95); opacity: 0.8; }
        #loader { background: #000; z-index: 10000; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }

        /* Скрин бана */
        #ban_screen { background: #000; z-index: 20000; position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
    </style>
</head>
<body>

    <div id="loader"><div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>

    <div id="ban_screen" class="hidden">
        <i class="fa-solid fa-hand text-red-600 text-6xl mb-6"></i>
        <h1 class="text-3xl font-black mb-2 uppercase">Ваш аккаунт заблокирован</h1>
        <div class="glass p-6 w-full max-w-sm space-y-4">
            <p class="text-xs text-zinc-500">Причина: <span id="ban_reason" class="text-white"></span></p>
            <p class="text-xs text-zinc-500">Осталось: <span id="ban_timer" class="text-blue-500 font-bold"></span></p>
            <p class="text-xs text-zinc-500">Почта для обжалования: <br><span id="ban_email" class="text-white border-b border-zinc-800"></span></p>
        </div>
        <button onclick="logout()" class="mt-8 opacity-40 text-[10px] font-black uppercase tracking-widest">Выйти из системы</button>
    </div>

    <div id="auth_scr" class="hidden fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-8">
        <h1 class="text-4xl font-black mb-12 italic tracking-tighter">LYNEOK<span class="text-blue-500">.</span></h1>
        <div class="w-full max-sm glass p-6 space-y-4">
            <div id="reg_ext" class="hidden space-y-4">
                <input type="file" id="r_ava" class="hidden" accept="image/*" onchange="upImg(this, 'l_r_ava')">
                <label for="r_ava" id="l_r_ava" class="w-16 h-16 bg-zinc-800 mx-auto rounded-full flex items-center justify-center cursor-pointer border-2 border-dashed border-zinc-700 overflow-hidden"><i class="fa-solid fa-plus text-zinc-500"></i></label>
                <input id="r_email" type="email" placeholder="Email">
                <div class="flex items-center gap-2 px-2">
                    <input type="checkbox" id="reg_rules" class="!w-5 !h-5">
                    <label for="reg_rules" class="text-[10px] text-zinc-500">Я принимаю <span class="text-blue-500 underline" onclick="showRules()">правила нашей политики</span></label>
                </div>
            </div>
            <input id="a_n" placeholder="Логин">
            <input id="a_p" type="password" placeholder="Пароль">
            <button onclick="handleAuth()" id="a_btn" class="btn-blue">Войти</button>
            <p onclick="toggleR()" id="a_tog" class="text-center text-[10px] font-black text-zinc-500 uppercase cursor-pointer pt-2">Создать аккаунт</p>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-5 py-4 flex justify-between items-center bg-black/50 backdrop-blur-md border-b border-white/5 sticky top-0 z-50">
            <b class="text-xl italic tracking-tighter">LYNEOK</b>
            <div onclick="switchT('profile')" class="bg-zinc-900 px-4 py-1.5 rounded-full flex items-center gap-2">
                <span id="h_bal" class="font-bold text-xs">0 ₽</span>
                <img id="h_ava" class="w-6 h-6 rounded-full object-cover bg-zinc-800">
            </div>
        </header>

        <main id="tab_market" class="tab-content active">
            <div id="cat_grid" class="grid grid-cols-2 gap-3"></div>
            <div id="subcat_view" class="hidden space-y-4">
                <button onclick="closeSubcat()" class="text-blue-500 font-bold text-xs flex items-center"><i class="fa-solid fa-chevron-left mr-2"></i> НАЗАД</button>
                <div id="subcat_grid" class="grid grid-cols-2 gap-3"></div>
            </div>
            <div id="items_view" class="hidden space-y-4">
                <button onclick="closeCat()" class="text-blue-500 font-bold text-xs flex items-center"><i class="fa-solid fa-chevron-left mr-2"></i> НАЗАД</button>
                <div id="items_list" class="space-y-3"></div>
            </div>
        </main>

        <main id="tab_sell" class="tab-content">
            <h2 class="text-2xl font-black mb-6">Продать</h2>
            <div class="glass p-5 space-y-4">
                <input type="file" id="s_img" class="hidden" onchange="upImg(this, 'l_s_img')">
                <label for="s_img" id="l_s_img" class="w-full h-40 bg-zinc-900 rounded-2xl flex items-center justify-center border-2 border-dashed border-zinc-800"><i class="fa-solid fa-camera text-2xl text-zinc-700"></i></label>
                <select id="s_game" onchange="updateSubcats()"></select>
                <select id="s_subcat"></select>
                <input id="s_t" placeholder="Название лота">
                <textarea id="s_acc" rows="3" placeholder="Описание"></textarea>
                <input id="s_p" type="number" placeholder="Цена ₽" oninput="calcComm()">
                <button onclick="postItem()" class="btn-blue italic">ВЫСТАВИТЬ</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content">
            <h2 class="text-2xl font-black mb-6">Сделки</h2>
            <div id="deals_list" class="space-y-3"></div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="glass p-6 mb-4 text-center relative">
                <button onclick="shareProf()" class="absolute top-6 right-6 text-zinc-500 active:text-blue-500"><i class="fa-solid fa-share-nodes text-xl"></i></button>
                <img id="p_ava" class="w-24 h-24 rounded-full mx-auto mb-4 object-cover border-4 border-zinc-900">
                <div class="flex items-center justify-center gap-1">
                    <span id="p_n" class="text-2xl font-black">...</span>
                    <span id="p_badge"></span>
                </div>
                <div class="grid grid-cols-2 gap-3 mt-6">
                    <button onclick="topUp()" class="btn-blue !bg-white !text-black !text-xs">ПОПОЛНИТЬ</button>
                    <button onclick="askOut()" class="btn-blue !text-xs">ВЫВОД</button>
                </div>
            </div>

            <div id="email_connect_box" class="hidden glass p-5 mb-4 flex justify-between items-center">
                <div>
                    <b class="text-xs">Уведомления на почту</b>
                    <p class="text-[9px] opacity-40">Получайте письма о продажах</p>
                </div>
                <button onclick="toggleEmailConn()" id="email_toggle_btn" class="bg-zinc-800 px-4 py-2 rounded-xl text-[10px] font-bold">ОТКЛЮЧЕНО</button>
            </div>
            
            <div class="mb-4">
                <h3 class="text-[10px] font-black uppercase text-zinc-500 mb-3 ml-2">Мои товары</h3>
                <div id="p_my_items" class="space-y-3"></div>
            </div>

            <button id="adm_btn" onclick="switchT('admin')" class="hidden w-full bg-red-600/10 text-red-500 py-4 rounded-2xl font-bold mb-4 border border-red-600/20 uppercase text-xs">Админ-Панель</button>
            <button onclick="logout()" class="w-full py-4 text-red-500 opacity-30 text-[10px] font-black uppercase">Выйти</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <h1 class="text-3xl font-black italic mb-6">ADMIN OMEGA</h1>
            
            <section class="glass p-5 mb-8 border-blue-500/20">
                <h3 class="text-[10px] font-black text-blue-500 uppercase mb-4">Настройки EmailJS</h3>
                <div class="grid gap-2">
                    <input id="ad_ejs_service" placeholder="Service ID" class="!p-2 !text-xs">
                    <input id="ad_ejs_template" placeholder="Template ID" class="!p-2 !text-xs">
                    <input id="ad_ejs_key" placeholder="Public Key" class="!p-2 !text-xs">
                    <div class="flex items-center gap-2 mt-2">
                        <input type="checkbox" id="ad_ejs_active" class="!w-4 !h-4">
                        <label for="ad_ejs_active" class="text-[10px]">Кнопка почты у всех юзеров</label>
                    </div>
                    <button onclick="admSaveEJS()" class="bg-blue-600 py-3 rounded-xl text-[10px] font-black mt-2">СОХРАНИТЬ КОНФИГ</button>
                </div>
            </section>

            <section class="mb-8">
                <h3 class="text-[10px] font-black text-yellow-500 uppercase mb-4">Пользователи</h3>
                <div id="ad_users" class="space-y-4"></div>
            </section>

            <section class="mb-8">
                <h3 class="text-[10px] font-black text-red-500 uppercase mb-4">Заявки на вывод / пополнение</h3>
                <div id="ad_money_list" class="space-y-3"></div>
            </section>
        </main>

        <nav class="nav-bar">
            <div onclick="switchT('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-shop text-xl"></i><span>Маркет</span></div>
            <div onclick="switchT('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-plus-circle text-xl"></i><span>Продать</span></div>
            <div onclick="switchT('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-comments text-xl"></i><span>Сделки</span></div>
            <div onclick="switchT('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user text-xl"></i><span>Профиль</span></div>
        </nav>
    </div>

    <div id="item_modal" class="hidden fixed inset-0 z-[10002] bg-black/95 overflow-y-auto">
        <div class="relative w-full aspect-square"><img id="im_img" class="w-full h-full object-cover"><button onclick="closeItemModal()" class="absolute top-6 right-6 w-10 h-10 bg-black/50 rounded-full text-2xl">&times;</button></div>
        <div class="p-6">
            <h1 id="im_title" class="text-3xl font-black italic mb-2"></h1>
            <span id="im_price" class="text-2xl text-blue-500 font-black block mb-6"></span>
            <div class="glass p-5 mb-6"><p id="im_desc" class="text-sm opacity-60"></p></div>
            <div class="flex items-center justify-between glass p-4 mb-20">
                <div class="flex items-center gap-3"><img id="im_s_ava" class="w-10 h-10 rounded-full object-cover"><b id="im_s_n" class="text-sm"></b></div>
                <button id="im_buy_btn" class="bg-blue-600 px-6 py-2.5 rounded-xl text-xs font-black uppercase">Купить</button>
            </div>
        </div>
    </div>

    <script>
        firebase.initializeApp({ apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" });
        const db = firebase.database().ref('lyne_v120_omega');
        const Tst = Swal.mixin({ toast: true, position: 'top', timer: 2000, showConfirmButton: false, background: '#1c1c1e', color: '#fff' });

        let me = null, data = {}, isR = false, tmpImg = "", activeChat = null;

        function init() {
            db.on('value', snap => {
                data = snap.val() || { u:{}, i:{}, d:{}, mod:{}, games:{}, msgs:{}, reviews:{}, settings:{}, money_req:{} };
                const sid = localStorage.getItem('lyne_v120_sid');
                document.getElementById('loader').style.display = 'none';
                if (sid && data.u[sid]) {
                    me = data.u[sid];
                    checkBan();
                    document.getElementById('auth_scr').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    if(me.n.toLowerCase() === 'owwner') document.getElementById('adm_btn').classList.remove('hidden');
                    render();
                } else { 
                    document.getElementById('auth_scr').classList.remove('hidden'); 
                    document.getElementById('app').classList.add('hidden');
                    document.getElementById('ban_screen').classList.add('hidden');
                }
            });
        }

        function checkBan() {
            if(me.banned) {
                const now = Date.now();
                if(now > me.banData.until) {
                    db.child(`u/${me.id}/banned`).set(false);
                    return;
                }
                document.getElementById('app').classList.add('hidden');
                document.getElementById('ban_screen').classList.remove('hidden');
                document.getElementById('ban_reason').innerText = me.banData.reason;
                document.getElementById('ban_email').innerText = me.banData.appealEmail;
                updateBanTimer();
            } else {
                document.getElementById('ban_screen').classList.add('hidden');
            }
        }

        function updateBanTimer() {
            const timer = setInterval(() => {
                const left = me.banData.until - Date.now();
                if(left <= 0) { clearInterval(timer); location.reload(); }
                const h = Math.floor(left / 3600000), m = Math.floor((left % 3600000) / 60000);
                document.getElementById('ban_timer').innerText = `${h}ч ${m}м`;
            }, 1000);
        }

        function render() {
            if(!me) return;
            document.getElementById('h_bal').innerText = me.bal + ' ₽';
            document.getElementById('h_ava').src = me.ava;
            document.getElementById('p_ava').src = me.ava;
            document.getElementById('p_n').innerText = me.n;
            document.getElementById('p_n').className = 'text-2xl font-black ' + (me.nickEffect || '');
            document.getElementById('p_badge').innerHTML = me.badgeType ? `<i class="fa-solid fa-circle-check ${me.badgeType}"></i>` : '';

            // Почта в профиле
            if(data.settings.ejs_active) {
                document.getElementById('email_connect_box').classList.remove('hidden');
                const btn = document.getElementById('email_toggle_btn');
                btn.innerText = me.email_notify ? 'ПОДКЛЮЧЕНО' : 'ОТКЛЮЧЕНО';
                btn.className = me.email_notify ? 'bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-bold' : 'bg-zinc-800 px-4 py-2 rounded-xl text-[10px] font-bold';
            }

            // Маркет и прочее
            const gs = Object.values(data.games || {});
            document.getElementById('cat_grid').innerHTML = gs.map(g => `<div class="glass p-5 text-center" onclick="openGame('${g.id}')"><img src="${g.img}" class="w-16 h-16 mx-auto mb-3 rounded-2xl object-cover"><b class="text-sm">${g.name}</b></div>`).join('');
            document.getElementById('s_game').innerHTML = gs.map(g => `<option value="${g.id}">${g.name}</option>`).join('');

            // Сделки (Фикс кнопок)
            const myDeals = Object.values(data.d || {}).filter(d => d.bid === me.id || d.sid === me.id);
            document.getElementById('deals_list').innerHTML = myDeals.reverse().map(d => `
                <div class="glass p-4 flex justify-between items-center">
                    <div><b class="text-sm">${d.t}</b><div class="text-[10px] text-zinc-500">${d.p} ₽ • ${d.status}</div></div>
                    <div class="flex gap-2">
                        ${me.n.toLowerCase()==='owwner' && d.status==='active' ? `<button onclick="admFinishDeal('${d.id}', true)" class="bg-green-600 px-3 py-2 rounded-lg text-[8px]">OK</button>` : ''}
                        <button onclick="openChat('${d.id}')" class="bg-blue-600/10 text-blue-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase">ЧАТ</button>
                    </div>
                </div>
            `).join('');

            if(me.n.toLowerCase() === 'owwner') {
                document.getElementById('ad_ejs_service').value = data.settings.ejs_service || '';
                document.getElementById('ad_ejs_template').value = data.settings.ejs_template || '';
                document.getElementById('ad_ejs_key').value = data.settings.ejs_key || '';
                document.getElementById('ad_ejs_active').checked = data.settings.ejs_active || false;
                renderAdminUsers();
                renderAdminMoney();
            }
        }

        // --- ФУНКЦИИ БАЛАНСА ---
        function topUp() {
            Swal.fire({
                title: 'Пополнение', text: 'Введите сумму пополнения:', input: 'number', background: '#1c1c1e', color: '#fff', confirmButtonText: 'Создать запрос',
                preConfirm: (val) => { if(!val || val <= 0) return Swal.showValidationMessage('Сумма неверна'); return val; }
            }).then(r => {
                if(r.isConfirmed) {
                    const rid = 'req'+Date.now();
                    db.child(`money_req/${rid}`).set({ id:rid, uid:me.id, n:me.n, amt:Number(r.value), type:'deposit', status:'pending' });
                    Tst.fire({icon:'info', title:'Запрос отправлен админу'});
                }
            });
        }

        function askOut() {
            Swal.fire({
                title: 'Вывод', text: 'Введите сумму вывода:', input: 'number', background: '#1c1c1e', color: '#fff', confirmButtonText: 'Вывести',
                preConfirm: (val) => { if(!val || val > me.bal) return Swal.showValidationMessage('Недостаточно средств'); return val; }
            }).then(r => {
                if(r.isConfirmed) {
                    const rid = 'req'+Date.now();
                    db.child(`money_req/${rid}`).set({ id:rid, uid:me.id, n:me.n, amt:Number(r.value), type:'withdraw', status:'pending' });
                    Tst.fire({icon:'info', title:'Заявка на вывод создана'});
                }
            });
        }

        // --- АДМИНКА ---
        function renderAdminUsers() {
            document.getElementById('ad_users').innerHTML = Object.values(data.u).map(u => `
                <div class="p-4 bg-zinc-900 rounded-2xl border border-white/5">
                    <div class="flex items-center gap-3 mb-4">
                        <img src="${u.ava}" class="w-8 h-8 rounded-full object-cover">
                        <b class="text-xs ${u.nickEffect || ''}">${u.n}</b>
                        <button onclick="admStartBan('${u.id}')" class="ml-auto text-red-500 text-[9px] font-black uppercase">BAN</button>
                    </div>
                    <div class="flex gap-2">
                        <input id="adb_val_${u.id}" type="number" placeholder="Баланс" value="${u.bal}" class="!p-2 !text-xs !w-20">
                        <button onclick="admSetBal('${u.id}')" class="bg-white text-black px-4 rounded-lg text-[10px] font-bold">ОК</button>
                    </div>
                </div>
            `).join('');
        }

        function admStartBan(uid) {
            Swal.fire({
                title: 'Бан пользователя',
                html: `<input id="sw_reason" class="swal2-input" placeholder="Причина">
                       <input id="sw_hours" type="number" class="swal2-input" placeholder="Часы (напр. 24)">
                       <input id="sw_email" class="swal2-input" placeholder="Email для обжалования">`,
                focusConfirm: false, background: '#1c1c1e', color: '#fff',
                preConfirm: () => {
                    return {
                        reason: document.getElementById('sw_reason').value,
                        until: Date.now() + (document.getElementById('sw_hours').value * 3600000),
                        email: document.getElementById('sw_email').value
                    }
                }
            }).then(r => {
                if(r.isConfirmed) {
                    db.child(`u/${uid}`).update({ banned: true, banData: r.value });
                    Tst.fire({icon:'success', title:'Забанен'});
                }
            });
        }

        function renderAdminMoney() {
            const reqs = Object.values(data.money_req || {}).filter(r => r.status === 'pending');
            document.getElementById('ad_money_list').innerHTML = reqs.map(r => `
                <div class="glass p-4 flex justify-between items-center">
                    <div><b class="text-xs">${r.n}</b><br><span class="${r.type==='deposit'?'text-green-500':'text-red-500'} text-[10px] font-bold">${r.type} ${r.amt}₽</span></div>
                    <div class="flex gap-2">
                        <button onclick="admHandleMoney('${r.id}', true)" class="bg-green-600 px-4 py-2 rounded-lg text-[9px] font-black">OK</button>
                        <button onclick="admHandleMoney('${r.id}', false)" class="bg-red-600 px-4 py-2 rounded-lg text-[9px] font-black">NO</button>
                    </div>
                </div>
            `).join('');
        }

        function admHandleMoney(rid, approve) {
            const r = data.money_req[rid];
            if(approve) {
                const change = r.type === 'deposit' ? r.amt : -r.amt;
                db.child(`u/${r.uid}/bal`).transaction(b => (b || 0) + change);
            }
            db.child(`money_req/${rid}/status`).set(approve ? 'approved' : 'rejected');
        }

        function admSaveEJS() {
            db.child('settings').update({
                ejs_service: document.getElementById('ad_ejs_service').value,
                ejs_template: document.getElementById('ad_ejs_template').value,
                ejs_key: document.getElementById('ad_ejs_key').value,
                ejs_active: document.getElementById('ad_ejs_active').checked
            });
            Tst.fire({icon:'success', title:'Настройки сохранены'});
        }

        // --- ВСПОМОГАТЕЛЬНОЕ ---
        function shareProf() {
            const link = window.location.href + "?u=" + me.id;
            navigator.clipboard.writeText(link);
            Tst.fire({icon:'success', title:'Ссылка на профиль скопирована!'});
        }

        function showRules() {
            Swal.fire({
                title: 'Правила политики',
                text: '1. Будьте вежливы. 2. Никакого скама. 3. Комиссия сервиса 10%. 4. Выплаты в течение 24 часов.',
                background: '#1c1c1e', color: '#fff'
            });
        }

        function toggleEmailConn() {
            db.child(`u/${me.id}/email_notify`).set(!me.email_notify);
        }

        function logout() { localStorage.clear(); location.reload(); }
        function switchT(t) { 
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active')); 
            document.getElementById('tab_'+t).classList.add('active'); 
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active')); 
            document.getElementById('n_'+t)?.classList.add('active'); 
        }
        function toggleR() { isR = !isR; document.getElementById('reg_ext').classList.toggle('hidden'); }
        function handleAuth() { 
            const n = document.getElementById('a_n').value, p = document.getElementById('a_p').value; 
            if(isR) { 
                if(!document.getElementById('reg_rules').checked) return Tst.fire({icon:'warning', title:'Примите правила'});
                const id = 'u'+Date.now(); db.child(`u/${id}`).set({id, n, p, ava:tmpImg||'https://ui-avatars.com/api/?name='+n, bal:0, email_notify:false}); 
                localStorage.setItem('lyne_v120_sid', id); location.reload();
            } else { 
                const u = Object.values(data.u).find(x => x.n === n && x.p === p); 
                if(u) { localStorage.setItem('lyne_v120_sid', u.id); location.reload(); } else { Tst.fire({icon:'error', title:'Ошибка'}); } 
            } 
        }
        function upImg(i, tid) { const r = new FileReader(); r.onload = e => { tmpImg = e.target.result; document.getElementById(tid).innerHTML = `<img src="${tmpImg}" class="w-full h-full object-cover rounded-full">`; }; r.readAsDataURL(i.files[0]); }
        
        // Функции модерации и чатов
        function openGame(gid) { 
            document.getElementById('cat_grid').classList.add('hidden'); 
            document.getElementById('subcat_view').classList.remove('hidden'); 
            const g = data.games[gid]; 
            document.getElementById('subcat_grid').innerHTML = Object.values(g.cats || {}).map(c => `<div class="glass p-5 text-center" onclick="openItems('${gid}', '${c.name}')"><b>${c.name}</b></div>`).join(''); 
        }
        function openItems(gid, cat) { 
            document.getElementById('subcat_view').classList.add('hidden'); 
            document.getElementById('items_view').classList.remove('hidden'); 
            const its = Object.values(data.i || {}).filter(i => i.gameId === gid && i.cat === cat);
            document.getElementById('items_list').innerHTML = its.map(i => `<div class="glass p-4 flex justify-between items-center" onclick="openItemDetail('${i.id}')"><div><b class="text-sm">${i.title}</b><div class="text-blue-500 text-xs">${i.price} ₽</div></div><i class="fa-solid fa-chevron-right opacity-20"></i></div>`).join('');
        }
        function openItemDetail(id) { 
            const i = data.i[id]; const s = data.u[i.sid];
            document.getElementById('item_modal').classList.remove('hidden');
            document.getElementById('im_img').src = i.img;
            document.getElementById('im_title').innerText = i.title;
            document.getElementById('im_price').innerText = i.price + ' ₽';
            document.getElementById('im_desc').innerText = i.acc_data || '';
            document.getElementById('im_s_ava').src = s.ava;
            document.getElementById('im_s_n').innerText = s.n;
            document.getElementById('im_buy_btn').onclick = () => buyItem(id);
        }
        function closeItemModal() { document.getElementById('item_modal').classList.add('hidden'); }
        function buyItem(id) {
            const i = data.i[id]; if(me.bal < i.price) return Tst.fire({icon:'error', title:'Мало денег'});
            const did = 'd'+Date.now();
            db.child(`u/${me.id}/bal`).transaction(b => b - i.price);
            db.child(`d/${did}`).set({id:did, bid:me.id, bn:me.n, sid:i.sid, t:i.title, p:i.price, status:'active'});
            db.child(`i/${id}`).remove();
            closeItemModal(); switchT('chats');
        }
        function admFinishDeal(did, confirm) {
            const d = data.d[did];
            if(confirm) db.child(`u/${d.sid}/bal`).transaction(b => (b || 0) + Math.floor(d.p * 0.9));
            else db.child(`u/${d.bid}/bal`).transaction(b => (b || 0) + d.p);
            db.child(`d/${did}/status`).set(confirm ? 'finished' : 'cancelled');
        }

        init();
    </script>
</body>
</html>
