<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>sswckk:SYSTEM v30.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        
        /* Дорогой дизайн регистрации */
        #auth-screen { position: fixed; inset: 0; z-index: 9999; background: radial-gradient(circle at top right, #1e3a8a, #000); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px; width: 100%; max-width: 400px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes cardIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass { background: rgba(15,15,20,0.8); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.08); border-radius: 35px; }
        .input-premium { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 22px; padding: 20px; width: 100%; color: #fff; outline: none; transition: 0.3s; font-size: 14px; }
        .input-premium:focus { border-color: #3b82f6; background: rgba(255,255,255,0.08); box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        
        .tab { display: none; height: 100vh; overflow-y: auto; padding-bottom: 140px; } 
        .tab.active { display: block; animation: fIn 0.4s ease; }
        @keyframes fIn { from { opacity: 0; } to { opacity: 1; } }
        
        .nav-item { opacity: 0.3; transition: 0.4s; transform: scale(0.9); }
        .nav-item.active { opacity: 1; transform: scale(1.1); color: #3b82f6; }
        .btn-main { background: linear-gradient(135deg, #3b82f6, #2563eb); border-radius: 24px; padding: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 10px 30px rgba(37, 99, 235, 0.3); width: 100%; transition: 0.3s; }
        .btn-main:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <div id="auth-screen" class="hidden">
        <div class="auth-card text-center">
            <div class="mb-8">
                <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto flex items-center justify-center shadow-2xl shadow-blue-600/40 mb-4">
                    <i class="fa-solid fa-shield-halved text-3xl"></i>
                </div>
                <h2 class="text-3xl font-black italic tracking-tighter">sswckk:<span class="text-blue-500">access</span></h2>
                <p class="text-[10px] uppercase font-bold text-zinc-500 mt-2 tracking-widest">Вход в систему управления</p>
            </div>
            <div class="space-y-4">
                <input id="sn" class="input-premium" placeholder="Никнейм">
                <input id="st" class="input-premium" placeholder="@username_tg">
                <input id="sp" type="password" class="input-premium" placeholder="Пароль">
                <button onclick="performAuth()" id="auth-btn" class="btn-main mt-4">Начать работу</button>
            </div>
            <p class="text-[9px] text-zinc-600 mt-8 font-bold uppercase italic">v30.0 Encrypted Connection</p>
        </div>
    </div>

    <div id="app" class="hidden">
        <header class="p-6 flex justify-between items-center glass border-none rounded-none rounded-b-[45px] sticky top-0 z-50">
            <div><h1 class="text-2xl font-black italic tracking-tighter">sswckk:<span class="text-zinc-600">system</span></h1></div>
            <div id="ub" onclick="setTab('me')" class="bg-blue-600/10 border border-blue-600/20 px-6 py-3 rounded-2xl text-[11px] font-black italic text-blue-400">0 ₽</div>
        </header>

        <section id="home" class="tab active px-5 pt-8 space-y-6"><div id="tl" class="grid gap-6"></div></section>
        
        <section id="wallet" class="tab px-5 pt-8"><div class="glass p-8 space-y-8 text-center">
            <h2 class="text-4xl font-black italic">КОШЕЛЕК</h2>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="fOp('deposit')" class="py-8 bg-zinc-900 border border-white/5 rounded-[30px] font-black text-xs uppercase">📥 Плюс</button>
                <button onclick="fOp('withdraw')" class="py-8 bg-zinc-900 border border-white/5 rounded-[30px] font-black text-xs uppercase">📤 Минус</button>
            </div>
            <div id="wl" class="space-y-3 pt-6"></div>
        </div></section>

        <section id="support" class="tab px-5 pt-8"><div id="cl" class="space-y-4"></div><div id="cr" class="hidden"><div class="glass p-5 h-[70vh] flex flex-col"><div id="ms" class="flex-1 overflow-y-auto space-y-4"></div><div class="flex gap-3 mt-4"><input id="mi" class="input-premium" placeholder="Сообщение..."><button onclick="sMsg()" class="w-16 bg-blue-600 rounded-2xl flex items-center justify-center text-xl"><i class="fa-solid fa-paper-plane"></i></button></div></div></div></section>

        <section id="me" class="tab px-5 pt-8"><div class="glass p-12 text-center space-y-12"><h3 id="un" class="text-5xl font-black italic uppercase tracking-tighter">...</h3><div id="ubm" class="text-7xl font-black italic text-blue-500">0 ₽</div><div class="grid grid-cols-2 gap-4"><button onclick="location.reload()" class="py-5 bg-zinc-900 rounded-2xl text-[10px] font-black uppercase">Выйти</button><button onclick="setTab('al')" class="py-5 bg-white/5 rounded-2xl text-[10px] font-black uppercase">Admin</button></div></div></section>

        <section id="al" class="tab px-5 pt-24"><div class="glass p-12 text-center"><input type="password" oninput="if(this.value==='kalubxq') setTab('adm')" class="input-premium text-center font-black" placeholder="ADMIN_KEY"></div></section>
        
        <section id="adm" class="tab px-5 pt-8 space-y-8">
            <h2 class="text-3xl font-black text-red-600 italic">MANAGER PANEL</h2>
            <div class="glass p-6 space-y-4"><h3 class="text-[10px] font-bold opacity-40 uppercase">Заявки</h3><div id="atl" class="space-y-3"></div></div>
            <div class="glass p-6 space-y-4">
                <h3 class="text-[10px] font-bold opacity-40 uppercase">Рассылка (Flow)</h3>
                <textarea id="bc-t" class="input-premium text-xs" placeholder="Текст"></textarea>
                <div id="bb" class="space-y-2"></div>
                <button onclick="aBtn()" class="text-[10px] font-bold text-blue-500">+ КНОПКА</button>
                <button onclick="sB('all')" class="btn-main mt-4">ОТПРАВИТЬ ВСЕМ</button>
            </div>
        </section>

        <nav class="fixed bottom-0 left-0 right-0 h-28 bg-black/80 backdrop-blur-xl border-t border-white/5 flex justify-around items-center z-[1000] px-6">
            <button onclick="setTab('home')" class="nav-item active" id="btn-home"><i class="fa-solid fa-grid-2 text-xl"></i></button>
            <button onclick="setTab('wallet')" class="nav-item" id="btn-wallet"><i class="fa-solid fa-vault text-xl"></i></button>
            <button onclick="setTab('support')" class="nav-item" id="btn-support"><i class="fa-solid fa-comments text-xl"></i></button>
            <button onclick="setTab('me')" class="nav-item" id="btn-me"><i class="fa-solid fa-user-ninja text-xl"></i></button>
        </nav>
    </div>

    <script>
        // ТВОИ ДАННЫЕ ВШИТЫ
        const TG_TOKEN = "8722822022:AAEmZa-V4-isxXnZ00omU8gAM_NtYevuL9Y";
        const ADMIN_ID = "7040863301";

        const cfg = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        const K = 'sswckk_v30'; firebase.initializeApp(cfg); const db_r = firebase.database();
        let me = null, activeC = null, db = {u:{}, t:{}, c:{}, w:{}};

        function init() {
            db_r.ref(K).on('value', s => {
                db = s.val() || {u:{}, t:{}, c:{}, w:{}}; 
                const uid = localStorage.getItem('u_id');
                if(uid && db.u[uid]) { me = db.u[uid]; document.getElementById('app').classList.remove('hidden'); render(); } 
                else { document.getElementById('auth-screen').classList.remove('hidden'); }
            });
        }

        async function notify(txt) {
            const url = `https://api.telegram.org/bot${TG_TOKEN}/sendMessage`;
            await fetch(url, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({ chat_id: ADMIN_ID, text: txt, parse_mode: "HTML" }) });
        }

        async function performAuth() {
            const n = document.getElementById('sn').value, t = document.getElementById('st').value, p = document.getElementById('sp').value;
            if(!n || !t || !p) return;
            const ex = Object.values(db.u).find(u=>u.t===t);
            if(ex && ex.p===p) { localStorage.setItem('u_id', ex.id); }
            else { 
                const id = "u"+Date.now(); 
                await db_r.ref(`${K}/u/${id}`).set({id, n, p, t, bal:0}); 
                localStorage.setItem('u_id', id);
                notify(`✨ <b>Новая регистрация!</b>\nЮзер: ${n}\nТГ: ${t}`);
            }
            location.reload();
        }

        async function fOp(type) {
            const { value: am } = await Swal.fire({ title: 'СУММА ₽', input: 'number', background: '#111', color: '#fff' });
            if (am) {
                const wid = "w" + Date.now();
                await db_r.ref(`${K}/w/${wid}`).set({ id: wid, uid: me.id, n: me.n, type, amount: Number(am), st: 'pending' });
                notify(`💸 <b>Заявка на ${type === 'deposit' ? 'ПОПОЛНЕНИЕ' : 'ВЫВОД'}</b>\nЮзер: ${me.n}\nСумма: ${am} ₽\nПроверь админку на сайте!`);
                Swal.fire('Ожидайте', 'Заявка передана админу', 'info');
            }
        }

        function render() {
            document.getElementById('ub').innerText = me.bal + ' ₽'; document.getElementById('ubm').innerText = me.bal + ' ₽'; document.getElementById('un').innerText = me.n;
            const ts = Object.values(db.t || {}).filter(x => x.st === 'active');
            document.getElementById('tl').innerHTML = ts.map(t => `<div class="glass p-6"><b>${t.t}</b><div class="text-blue-500 font-black mt-2">${t.p} ₽</div></div>`).join('');
            
            const reqs = [...Object.values(db.t||{}).filter(x=>x.st==='pending'), ...Object.values(db.w||{}).filter(x=>x.st==='pending')];
            document.getElementById('atl').innerHTML = reqs.map(r => `<div class="p-4 bg-white/5 rounded-2xl flex justify-between items-center text-[10px] font-black italic uppercase">${r.n || r.o}: ${r.amount || r.p} ₽ <button onclick="aApprove('${r.id}', '${r.type?'w':'t'}')" class="text-blue-500">OK</button></div>`).join('');
            
            const ch = [{id:'news', n:'КАК РАБОТАТЬ', i:'fa-book-open', b:'bg-blue-600'}, {id:'system', n:'ПОДДЕРЖКА', i:'fa-headset', b:'bg-zinc-800'}];
            if(!activeC) document.getElementById('cl').innerHTML = ch.map(c => `<div onclick="oChat('${c.id}')" class="glass p-8 flex items-center gap-6 cursor-pointer"><div class="w-12 h-12 ${c.b} rounded-2xl flex items-center justify-center text-xl shadow-lg"><i class="fa-solid ${c.i}"></i></div><b class="text-sm uppercase font-black">${c.n}</b></div>`).join('');
            if(activeC) renderM();
        }

        async function aApprove(id, type) {
            if(type === 'w') {
                const req = db.w[id]; const u = db.u[req.uid];
                const am = req.type === 'deposit' ? (Number(u.bal) + Number(req.amount)) : (Number(u.bal) - Number(req.amount));
                await db_r.ref(`${K}/u/${u.id}`).update({ bal: am });
                await db_r.ref(`${K}/w/${id}`).update({ st: 'active' });
            } else { await db_r.ref(`${K}/t/${id}`).update({ st: 'active' }); }
        }

        function setTab(t) { document.querySelectorAll('.tab').forEach(x => x.classList.remove('active')); document.getElementById(t).classList.add('active'); document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active')); if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.add('active'); }
        function oChat(id) { activeC = id; document.getElementById('cl').classList.add('hidden'); document.getElementById('cr').classList.remove('hidden'); renderM(); }
        async function sMsg() { 
            const v = document.getElementById('mi').value; if(!v) return; 
            const p = (activeC === 'system' ? me.id : activeC); 
            await db_r.ref(`${K}/c/${p}/${Date.now()}`).set({text:v, from:(activeC==='system'?'user':'system'), time:Date.now()}); 
            if(activeC === 'system') notify(`📩 <b>Сообщение в Саппорт!</b>\nОт: ${me.n}\nТекст: ${v}`);
            document.getElementById('mi').value = ""; 
        }

        function renderM() {
            const p = (activeC === 'system' ? me.id : activeC); const msgs = Object.values(db.c[p] || {}).sort((a,b)=>a.time-b.time);
            document.getElementById('ms').innerHTML = msgs.map(m => `<div class="p-5 max-w-[85%] rounded-[25px] text-[12px] font-bold shadow-xl ${m.from==='system'?'bg-blue-600 self-start':'bg-zinc-800 self-end'}">${m.text}${m.btns ? m.btns.map(b => `<button onclick="hA('${b.a}')" class="w-full py-3 bg-white/10 rounded-xl mt-3 text-[10px] uppercase font-black">${b.t}</button>`).join('') : ''}</div>`).join('');
            const b = document.getElementById('ms'); b.scrollTop = b.scrollHeight;
        }
        function aBtn() { const div = document.createElement('div'); div.className = "flex gap-2"; div.innerHTML = `<input class="input-premium text-[10px] p-3" placeholder="Текст"><input class="input-premium text-[10px] p-3" placeholder="Ссылка/Текст"><button onclick="this.parentElement.remove()" class="text-red-500 font-bold px-2">✕</button>`; document.getElementById('bb').appendChild(div); }
        async function sB(target) {
            const txt = document.getElementById('bc-t').value;
            const btns = []; document.querySelectorAll('#bb div').forEach(d => { const i = d.querySelectorAll('input'); if(i[0].value) btns.push({t:i[0].value, a:i[1].value}); });
            const m = { text:txt, btns:btns, from:'system', time:Date.now() };
            Object.keys(db.u).forEach(uid => db_r.ref(`${K}/c/${uid}/${Date.now()}`).set(m));
            Swal.fire('OK', 'Ушло всем', 'success');
        }
        window.hA = (a) => { if(a.startsWith('http')) window.open(a, '_blank'); else Swal.fire('ИНФО', a); };
        init();
    </script>
</body>
</html>
