<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK V48.7 — EMPIRE FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap');
        :root { --bg: #030304; --card: #0d0d12; --blue: #3b82f6; --gold: #ffb000; --red: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: 'Manrope', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 35px 25px 200px; scroll-behavior: smooth; }
        .tab-content.active { display: block; animation: ultraFade 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes ultraFade { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* TITAN LOADER V2.1 */
        #loader { background: radial-gradient(circle at center, #111, #000); z-index: 10000; transition: 0.8s; position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 80px; height: 80px; border: 4px solid rgba(59,130,246,0.1); border-top-color: var(--blue); border-radius: 50%; animation: spin 1s infinite linear; position: relative; }
        .spinner::after { content: ''; position: absolute; inset: 10px; border: 4px solid rgba(255,176,0,0.1); border-top-color: var(--gold); border-radius: 50%; animation: spin 2s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 100px; background: rgba(10,10,15,0.98); backdrop-filter: blur(50px); border-top: 1px solid rgba(255,255,255,0.08); display: flex; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #52525b; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; font-size: 11px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: var(--blue); transform: scale(1.1); }

        .tile { background: var(--card); border-radius: 36px; border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .gold-text { background: linear-gradient(90deg, #ffb000, #fff2cc, #ffb000); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        
        input, textarea, select { background: #16161c; border: 1.5px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 22px; color: white; width: 100%; outline: none; font-size: 15px; transition: 0.3s; }
        input:focus { border-color: var(--blue); background: #1c1c24; }

        .btn-main { background: var(--blue); padding: 22px; border-radius: 28px; font-weight: 900; text-transform: uppercase; width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 13px; box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3); border: none; color: white; cursor: pointer; }
        .btn-main:active { transform: scale(0.95); }
        
        .cat-card { background: var(--card); border-radius: 32px; padding: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.04); }
        .support-msg { background: rgba(59, 130, 246, 0.15); border-left: 4px solid var(--blue); padding: 15px; border-radius: 12px; font-size: 12px; margin-top: 10px; }
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner mb-6"></div>
        <div class="text-3xl font-black italic text-white tracking-widest animate-pulse">LYNEOK<span class="text-blue-500">.</span></div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-8 py-6 flex justify-between items-center bg-zinc-950/90 backdrop-blur-3xl border-b border-white/5 z-50">
            <span class="font-black italic text-2xl tracking-tighter">LYNEOK</span>
            <div id="h_bal" class="bg-blue-600/10 text-blue-500 px-5 py-2 rounded-2xl font-black text-sm italic border border-blue-500/20">0 ₽</div>
        </header>

        <main id="tab_market" class="tab-content active">
            <div id="cat_view" class="grid grid-cols-2 gap-5"></div>
            <div id="items_view" class="hidden space-y-5">
                <button onclick="backToCats()" class="text-zinc-500 font-black text-[11px] uppercase italic flex items-center gap-2">← КАТЕГОРИИ</button>
                <div id="market_grid" class="space-y-4"></div>
            </div>
        </main>

        <main id="tab_sell" class="tab-content">
            <h2 class="text-3xl font-black mb-6 italic uppercase text-blue-500">Выставить</h2>
            <div class="space-y-4">
                <input type="file" id="i_img" class="hidden" onchange="compImg(this, 'l_img')">
                <label for="i_img" id="l_img" class="w-full h-44 bg-zinc-900/50 border-2 border-dashed border-white/10 rounded-[30px] flex flex-col items-center justify-center font-black text-[11px] opacity-40 uppercase overflow-hidden">
                    <i class="fa-solid fa-camera text-2xl mb-2"></i> ЗАГРУЗИТЬ ФОТО
                </label>
                <select id="i_cat" onchange="loadSubsForSell()"></select>
                <select id="i_sub" class="hidden"></select>
                <input id="i_title" placeholder="Заголовок объявления">
                <textarea id="i_desc" placeholder="Описание товара..." rows="3"></textarea>
                
                <div class="space-y-2">
                    <input id="i_price" type="number" placeholder="Цена (минимум 45₽)" oninput="calcComm()">
                    <div id="comm_info" class="text-[10px] font-black uppercase text-zinc-500 px-2 italic">Будет зачислено: 0 ₽</div>
                </div>
                <button onclick="postItem()" class="btn-main">ВЫСТАВИТЬ БЕСПЛАТНО</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black italic uppercase text-blue-500">Сделки</h2>
                <div id="adm_deals_toggle" class="hidden bg-red-500/20 text-red-500 px-3 py-1 rounded-full text-[10px] font-black" onclick="toggleAllDeals()">ВСЕ СДЕЛКИ</div>
            </div>
            <div id="deals_list" class="space-y-4"></div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="tile p-7 mb-6 flex items-center justify-between">
                <div class="flex items-center gap-5">
                    <div id="p_ava" class="w-16 h-16 bg-zinc-800 rounded-3xl flex items-center justify-center font-black text-2xl shadow-xl">?</div>
                    <div>
                        <div class="flex items-center gap-2">
                            <b id="p_name" class="text-xl uppercase italic tracking-tighter">...</b>
                            <i id="p_ver" class="fa-solid fa-circle-check text-blue-500 hidden"></i>
                        </div>
                        <div id="p_rating" class="text-[11px] font-black text-gold"><i class="fa-solid fa-star"></i> <span>0.0</span></div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <button onclick="payIn()" class="tile p-5 font-black text-xs uppercase text-green-500 bg-green-500/5 border-green-500/10">Пополнить</button>
                <button onclick="payOut()" class="tile p-5 font-black text-xs uppercase text-red-500 bg-red-500/5 border-red-500/10">Вывод</button>
            </div>

            <button id="adm_btn" onclick="switchTab('admin')" class="hidden tile w-full p-6 text-red-500 font-black text-[11px] uppercase italic mb-4 border-red-500/20 bg-red-500/5 items-center justify-center gap-2">OWNER CONTROL</button>
            <button onclick="logout()" class="tile w-full p-5 opacity-20 font-black text-[9px] uppercase tracking-widest text-center">LOGOUT</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <h1 class="text-3xl font-black text-red-500 mb-8 italic uppercase tracking-widest">CONTROL</h1>
            <div class="space-y-6">
                <div class="tile p-6 space-y-3 border-blue-500/20">
                    <p class="text-[10px] font-black text-blue-500 uppercase">Редактор Маркета</p>
                    <button onclick="addNewCat()" class="btn-main !bg-zinc-800 !py-3 !text-[10px]">Добавить Игру</button>
                    <button onclick="addNewSub()" class="btn-main !bg-zinc-800 !py-3 !text-[10px]">Добавить Категорию</button>
                    <div class="flex gap-2">
                        <input id="set_comm" type="number" placeholder="Ком-сия %" class="!p-3 !text-xs">
                        <button onclick="updateComm()" class="bg-blue-600 px-4 rounded-2xl font-black text-[10px] border-none text-white cursor-pointer">SAVE</button>
                    </div>
                </div>
                <div id="adm_mod" class="space-y-3"></div>
            </div>
        </main>

        <nav class="nav-bar">
            <div onclick="switchTab('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-shop text-2xl"></i><span>МАРКЕТ</span></div>
            <div onclick="switchTab('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-plus-circle text-2xl"></i><span>ПРОДАТЬ</span></div>
            <div onclick="switchTab('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-handshake text-2xl"></i><span>СДЕЛКИ</span></div>
            <div onclick="switchTab('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-shield-cat text-2xl"></i><span>ПРОФИЛЬ</span></div>
        </nav>
    </div>

    <script>
        // ВАШИ ДАННЫЕ ВСТАВЛЕНЫ
        const TG_TOKEN = "8641257792:AAEsxnQWEIeozMt_gnSwJdVgSFQlOc-hnuc"; 
        const TG_CHAT = "7040863301";

        const CFG = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        firebase.initializeApp(CFG);
        const db = firebase.database().ref('lyne_empire_v48');

        let me = null, data = {}, tempImg = "", showAllDeals = false;
        const Toast = Swal.mixin({ toast: true, position: 'top', showConfirmButton: false, timer: 2000, background: '#111113', color: '#fff' });

        function init() {
            db.on('value', snap => {
                const val = snap.val();
                data = val || { u:{}, i:{}, d:{}, cat:{}, subs:{}, settings:{comm:10} };
                
                const sid = localStorage.getItem('lyne_sid');
                if(sid && data.u[sid]) {
                    me = data.u[sid];
                    checkSecurity();
                    document.getElementById('app').classList.remove('hidden');
                    render();
                } else {
                    document.getElementById('app').classList.remove('hidden'); 
                }
                setTimeout(() => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').style.display = 'none', 800);
                }, 1000);
            }, err => { location.reload(); });
        }

        async function tgNotify(txt) {
            try { fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT}&text=${encodeURIComponent('📢 ' + txt)}`); } catch(e) {}
        }

        function checkSecurity() {
            if(me.n && me.n.toLowerCase() === 'owwner') {
                document.getElementById('adm_btn').style.display = 'flex';
                document.getElementById('adm_deals_toggle').classList.remove('hidden');
                if(!me.ver) db.child(`u/${me.id}/ver`).set(true);
            }
        }

        function render() {
            if(!me) return;
            document.getElementById('h_bal').innerText = (me.bal || 0).toLocaleString() + ' ₽';
            document.getElementById('p_name').innerText = me.n;
            if(me.boost) document.getElementById('p_name').classList.add('gold-text');
            
            renderMarket();
            renderDeals();
            renderAdmin();
        }

        function renderMarket() {
            const cats = Object.values(data.cat || {});
            document.getElementById('cat_view').innerHTML = cats.map(c => `
                <div class="cat-card" onclick="openCat('${c.name}')">
                    <img src="${c.img}" class="w-16 h-16 mx-auto mb-3 rounded-2xl object-cover">
                    <p class="text-[11px] font-black uppercase italic">${c.name}</p>
                </div>`).join('');
            document.getElementById('i_cat').innerHTML = '<option disabled selected>ВЫБЕРИТЕ ИГРУ</option>' + cats.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
        }

        function loadSubsForSell() {
            const game = document.getElementById('i_cat').value;
            const subs = Object.values(data.subs || {}).filter(s => s.game === game);
            const el = document.getElementById('i_sub');
            if(subs.length > 0) {
                el.classList.remove('hidden');
                el.innerHTML = subs.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
            } else el.classList.add('hidden');
        }

        async function postItem() {
            const t = document.getElementById('i_title').value;
            const p = Number(document.getElementById('i_price').value);
            const c = document.getElementById('i_cat').value;
            
            if(p < 45) return Toast.fire({ icon: 'error', title: 'Минимальная цена — 45 ₽' });
            if(!tempImg || !t || !p || c === 'ВЫБЕРИТЕ ИГРУ') return Toast.fire({ icon: 'warning', title: 'ЗАПОЛНИТЕ ВСЁ' });

            const iid = 'i' + Date.now();
            db.child(`i/${iid}`).set({
                id: iid, sid: me.id, seller: me.n, title: t, price: p, 
                cat: c, sub: document.getElementById('i_sub').value || 'Общее',
                status: 'pending', img: tempImg
            });
            tgNotify(`Новый товар на модерацию: ${t} (${p}₽) от ${me.n}`);
            Toast.fire({ icon: 'success', title: 'Отправлено на проверку' });
            switchTab('market');
        }

        function toggleAllDeals() {
            showAllDeals = !showAllDeals;
            document.getElementById('adm_deals_toggle').innerText = showAllDeals ? "МОИ СДЕЛКИ" : "ВСЕ СДЕЛКИ";
            renderDeals();
        }

        function renderDeals() {
            let ds = Object.values(data.d || {});
            if(!showAllDeals) ds = ds.filter(d => d.buyerId === me.id || d.sid === me.id);
            document.getElementById('deals_list').innerHTML = ds.reverse().map(d => {
                const isAdmin = me.n.toLowerCase() === 'owwner';
                return `
                <div class="tile p-5 ${d.alert ? 'border-red-500/50 bg-red-500/5' : ''}">
                    <div class="flex justify-between items-start">
                        <div><b class="text-xs uppercase block">${d.title}</b><span class="text-[9px] opacity-40">${d.price}₽ | ${d.status}</span></div>
                        ${d.status === 'active' && d.buyerId === me.id ? `<button onclick="openDispute('${d.id}')" class="text-[8px] bg-red-600 px-2 py-1 rounded-lg font-black uppercase">Проблема</button>` : ''}
                    </div>
                    ${d.msg ? `<div class="support-msg"><b>SUPPORT:</b> ${d.msg}</div>` : ''}
                    ${isAdmin ? `<div class="flex gap-2 mt-4">
                        <button onclick="admClose('${d.id}', true)" class="bg-green-600 text-[8px] px-3 py-1 rounded-md font-bold">ОК</button>
                        <button onclick="admClose('${d.id}', false)" class="bg-red-600 text-[8px] px-3 py-1 rounded-md font-bold">BACK</button>
                        <button onclick="admSay('${d.id}')" class="bg-blue-600 text-[8px] px-3 py-1 rounded-md font-bold">SAY</button>
                    </div>` : ''}
                </div>`;
            }).join('') || '<p class="text-center opacity-20 text-[10px] py-10">ПУСТО</p>';
        }

        function openDispute(did) {
            Swal.fire({ title: 'ОПИШИТЕ ПРОБЛЕМУ', input: 'textarea', background: '#111', color: '#fff' }).then(r => {
                if(r.value) {
                    db.child(`d/${did}`).update({ alert: true, disputeText: r.value });
                    tgNotify(`🆘 ЖАЛОБА В СДЕЛКЕ ${did}: ${r.value}`);
                    Toast.fire({ icon: 'warning', title: 'Админ уведомлен' });
                }
            });
        }

        function admSay(did) {
            Swal.fire({ title: 'ОТВЕТ ПОДДЕРЖКИ', input: 'text', background: '#111', color: '#fff' }).then(r => { if(r.value) db.child(`d/${did}/msg`).set(r.value); });
        }

        function admClose(did, success) {
            const d = data.d[did];
            if(success) {
                const net = d.price - (d.price * (data.settings.comm / 100));
                db.child(`u/${d.sid}/bal`).transaction(b => (b || 0) + net);
                db.child(`d/${did}/status`).set('completed');
            } else {
                db.child(`u/${d.buyerId}/bal`).transaction(b => (b || 0) + d.price);
                db.child(`d/${did}/status`).set('cancelled');
            }
            db.child(`d/${did}/alert`).set(false);
            Toast.fire({ icon: 'success', title: 'Готово' });
        }

        function payIn() {
            Swal.fire({ title: 'ПОПОЛНЕНИЕ', text: 'Минимум 40 ₽', input: 'number', background: '#111', color: '#fff' }).then(r => {
                if(r.value >= 40) {
                    db.child(`u/${me.id}/bal`).transaction(b => (b || 0) + Number(r.value));
                    Toast.fire({ icon: 'success', title: 'Успешно!' });
                }
            });
        }

        function payOut() {
            Swal.fire({ title: 'ВЫВОД', text: 'От 700 ₽', input: 'number', background: '#111', color: '#fff' }).then(r => {
                const v = Number(r.value);
                if(v >= 700 && me.bal >= v) {
                    db.child(`u/${me.id}/bal`).transaction(b => b - v);
                    tgNotify(`💸 ЗАЯВКА НА ВЫВОД: ${me.n} — ${v}₽`);
                    Toast.fire({ icon: 'success', title: 'Заявка отправлена' });
                }
            });
        }

        function calcComm() {
            const p = Number(document.getElementById('i_price').value);
            const res = p - (p * (data.settings?.comm || 0) / 100);
            document.getElementById('comm_info').innerText = `Будет зачислено: ${Math.floor(res)} ₽`;
        }

        function updateComm() {
            db.child('settings/comm').set(Number(document.getElementById('set_comm').value));
            Toast.fire({ icon: 'success', title: 'Обновлено' });
        }

        function compImg(input, targetId) {
            const f = input.files[0]; if(!f) return;
            const rd = new FileReader();
            rd.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                    canvas.width = 500; canvas.height = 500; ctx.drawImage(img, 0, 0, 500, 500);
                    tempImg = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById(targetId).innerHTML = `<img src="${tempImg}" class="w-full h-full object-cover rounded-3xl">`;
                };
                img.src = e.target.result;
            };
            rd.readAsDataURL(f);
        }

        function renderAdmin() {
            const pnd = Object.values(data.i || {}).filter(i => i.status === 'pending');
            document.getElementById('adm_mod').innerHTML = `<p class="text-[10px] font-black text-zinc-500 uppercase mb-3">Модерация (${pnd.length})</p>` + pnd.map(i => `
                <div class="tile p-5 mb-3 flex justify-between items-center bg-zinc-900/40">
                    <div><b class="text-[11px] uppercase block">${i.title}</b><span class="text-[9px] opacity-40">${i.seller} • ${i.price}₽</span></div>
                    <div class="flex gap-2">
                        <button onclick="db.child('i/${i.id}/status').set('active')" class="bg-green-600 px-4 py-2 rounded-xl text-[9px] font-black border-none text-white cursor-pointer">OK</button>
                        <button onclick="db.child('i/${i.id}').remove()" class="bg-red-600 px-4 py-2 rounded-xl text-[9px] font-black border-none text-white cursor-pointer">X</button>
                    </div>
                </div>`).join('') || '<p class="text-center opacity-20 text-[10px] py-10 uppercase">Чисто</p>';
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.getElementById('tab_'+t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById('n_'+t)?.classList.add('active');
        }

        function logout() { localStorage.clear(); location.reload(); }
        init();
    </script>
</body>
</html>
