<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK V37 — SIGNAL</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        :root { --bg: #050506; --card: #111113; --blue: #3b82f6; }
        body { background: var(--bg); color: #fff; font-family: 'Manrope', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding-bottom: 120px; }
        .tab-content.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(10,10,12,0.95); backdrop-filter: blur(25px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #52525b; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 9px; font-weight: 800; text-transform: uppercase; }
        .nav-btn.active { color: var(--blue); }
        .tile { background: var(--card); border-radius: 24px; border: 1px solid rgba(255,255,255,0.04); }
        input, textarea, select { background: #18181b; border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 16px; color: white; width: 100%; outline: none; font-size: 14px; }
        .btn-main { background: var(--blue); padding: 18px; border-radius: 22px; font-weight: 800; text-transform: uppercase; width: 100%; transition: all 0.2s; }
        .btn-main:active { transform: scale(0.97); opacity: 0.9; }
        .chat-msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; margin-bottom: 8px; font-size: 13px; line-height: 1.4; }
        .msg-in { background: #1c1c1f; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-out { background: var(--blue); align-self: flex-end; border-bottom-right-radius: 4px; }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 bg-black z-[9999] flex flex-col items-center justify-center font-black text-blue-500 italic uppercase">Connecting_TG_Signal_V37...</div>

    <div id="auth_screen" class="hidden h-screen flex flex-col items-center justify-center px-10 text-center">
        <h1 class="text-4xl font-black italic mb-8 uppercase tracking-tighter">LYNE<span class="text-blue-500">OK</span></h1>
        <div class="w-full max-w-sm space-y-3">
            <input id="reg_n" placeholder="НИКНЕЙМ">
            <input id="reg_p" type="password" placeholder="ПАРОЛЬ">
            <button onclick="handleAuth()" class="btn-main mt-4">Войти</button>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-6 py-5 flex justify-between items-center bg-zinc-950 border-b border-white/5">
            <span class="font-black italic text-xl tracking-tighter">LYNEOK</span>
            <div id="h_bal" class="bg-blue-500/10 text-blue-500 px-4 py-2 rounded-2xl font-black text-sm italic">0 ₽</div>
        </header>

        <main id="tab_market" class="tab-content active px-5 pt-6">
            <div id="cat_view" class="grid grid-cols-2 gap-4"></div>
            <div id="items_view" class="hidden space-y-4">
                <button onclick="backToCats()" class="text-zinc-500 font-black text-[10px] uppercase italic">← Назад</button>
                <div id="market_grid" class="space-y-3"></div>
            </div>
        </main>

        <main id="tab_sell" class="tab-content px-5 pt-6">
            <h2 class="text-xl font-black mb-6 italic uppercase text-blue-500">Продать</h2>
            <div class="space-y-3">
                <input type="file" id="i_img" class="hidden" onchange="compImg(this, 'l_img')">
                <label for="i_img" id="l_img" class="w-full h-32 bg-zinc-900 border-2 border-dashed border-white/5 rounded-3xl flex items-center justify-center font-black text-[10px] opacity-40 uppercase">Добавить фото</label>
                <select id="i_cat"></select>
                <input id="i_title" placeholder="Заголовок">
                <textarea id="i_desc" placeholder="Данные товара"></textarea>
                <input id="i_price" type="number" oninput="updFee()" placeholder="Цена">
                <button onclick="postItem()" class="btn-main">Выставить</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content px-5 pt-6">
            <button onclick="openChatRoom('support_' + me.id)" class="w-full tile p-5 mb-4 border-blue-500/20 text-blue-500 font-black text-[10px] uppercase italic">Техподдержка</button>
            <div id="chats_list" class="space-y-2"></div>
        </main>

        <main id="tab_profile" class="tab-content px-5 pt-6">
            <div class="tile p-6 mb-4 flex items-center gap-4">
                <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center font-black text-xl" id="p_ava">?</div>
                <div>
                    <b id="p_name" class="text-lg uppercase italic">...</b>
                    <p id="p_id" class="text-[9px] opacity-30 font-bold uppercase">UID: 000000</p>
                </div>
            </div>
            <div class="tile p-5 mb-4">
                <input id="u_email" placeholder="Привязать почту" class="mb-2">
                <button onclick="saveEmail()" class="w-full bg-blue-600 py-3 rounded-xl font-black text-[10px] uppercase">Сохранить</button>
            </div>
            <div class="grid grid-cols-2 gap-2 mb-4">
                <button onclick="moneyReq('ПОПОЛНЕНИЕ')" class="tile p-5 font-black text-[10px] uppercase italic">Пополнить</button>
                <button onclick="moneyReq('ВЫВОД')" class="tile p-5 font-black text-[10px] uppercase italic text-zinc-400">Вывести</button>
            </div>
            <button id="v_btn" onclick="reqV()" class="tile w-full p-5 font-black text-xs text-blue-500 uppercase italic mb-2">Верификация</button>
            <button id="adm_btn" onclick="switchTab('admin')" class="hidden tile w-full p-5 font-black text-xs text-red-500 uppercase italic mb-2">АДМИН-ПАНЕЛЬ</button>
            <button onclick="logout()" class="tile w-full p-5 opacity-30 font-black text-xs uppercase italic">Выход</button>
        </main>

        <main id="tab_admin" class="tab-content px-5 pt-6">
            <div class="space-y-4">
                <div class="bg-zinc-900 p-4 rounded-3xl">
                    <input id="cat_name" placeholder="Название игры" class="mb-2">
                    <input type="file" id="cat_img" class="hidden" onchange="compImg(this, 'l_cat')">
                    <label for="cat_img" id="l_cat" class="w-full h-10 bg-zinc-800 rounded-xl flex items-center justify-center text-[9px] font-black mb-2">ФОТО ИГРЫ</label>
                    <button onclick="saveCat()" class="w-full bg-blue-600 py-3 rounded-xl font-black text-[10px] uppercase">Добавить категорию</button>
                </div>
                <div id="adm_mod" class="space-y-2"></div>
                <div id="adm_support" class="space-y-2"></div>
                <div id="adm_users" class="space-y-2 pb-20"></div>
            </div>
        </main>

        <nav class="nav-bar">
            <div onclick="switchTab('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-store text-xl"></i><span>Рынок</span></div>
            <div onclick="switchTab('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-circle-plus text-xl"></i><span>Продать</span></div>
            <div onclick="switchTab('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-comments text-xl"></i><span>Связь</span></div>
            <div onclick="switchTab('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-ghost text-xl"></i><span>Профиль</span></div>
        </nav>
    </div>

    <div id="chat_modal" class="fixed inset-0 bg-black z-[2000] hidden flex flex-col">
        <header class="p-6 flex justify-between items-center border-b border-white/5 bg-zinc-950">
            <b id="chat_title" class="text-xs text-blue-500 italic uppercase">Чат</b>
            <button onclick="closeChat()"><i class="fa-solid fa-xmark text-xl"></i></button>
        </header>
        <div id="chat_body" class="flex-1 overflow-y-auto p-5 flex flex-col gap-2"></div>
        <div class="p-4 bg-zinc-950 flex gap-2 pb-10 border-t border-white/5">
            <input id="chat_input" placeholder="Сообщение...">
            <button onclick="sendTextMsg()" class="bg-blue-600 px-6 rounded-2xl font-black text-[9px] uppercase">ОТПР.</button>
        </div>
    </div>

    <script>
        const CFG = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        firebase.initializeApp(CFG);
        const db = firebase.database().ref('lyne_v37_signal');

        // ТВОИ ДАННЫЕ
        const TG_TOKEN = "8641257792:AAEsxnQWEIeozMt_gnSwJdVgSFQlOc-hnuc";
        const TG_ADMIN_ID = "7040863301";

        let me = null, data = {}, curChat = null, b64 = "", b64Cat = "";

        // УВЕДОМЛЕНИЯ В ТГ
        async function sendTg(text) {
            const url = `https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_ADMIN_ID}&text=${encodeURIComponent(text)}&parse_mode=HTML`;
            try { await fetch(url); } catch(e) { console.error(e); }
        }

        async function init() {
            db.on('value', snap => {
                data = snap.val() || { u:{}, i:{}, d:{}, c:{}, cat:{}, support:{} };
                const sid = localStorage.getItem('lyne_sid');
                if(!sid) { document.getElementById('auth_screen').classList.remove('hidden'); }
                else {
                    me = data.u[sid];
                    if(!me) return logout();
                    document.getElementById('auth_screen').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    render();
                    if(curChat) renderChat();
                }
                document.getElementById('loader').classList.add('hidden');
            });
        }

        async function handleAuth() {
            const n = document.getElementById('reg_n').value.trim();
            const p = document.getElementById('reg_p').value.trim();
            if(!n || !p) return;
            let uid = Object.keys(data.u || {}).find(k => data.u[k].n.toLowerCase() === n.toLowerCase());
            if(!uid) {
                uid = 'u' + Date.now().toString().slice(-6);
                await db.child(`u/${uid}`).set({ id: uid, n, p, bal: 0 });
                await sendTg(`🆕 <b>Новая регистрация!</b>\nНик: ${n}\nID: ${uid}`);
            } else if(data.u[uid].p !== p) return Swal.fire('!', 'Пароль!', 'error');
            localStorage.setItem('lyne_sid', uid);
            await sendTg(`🔑 <b>Вход в систему</b>\nЮзер: ${n}`);
            location.reload();
        }

        function render() {
            document.getElementById('h_bal').innerText = (me.bal || 0) + ' ₽';
            document.getElementById('p_name').innerText = me.n;
            document.getElementById('p_id').innerText = 'UID: ' + me.id;
            document.getElementById('p_ava').innerText = me.n[0].toUpperCase();
            if(me.n === 'owner') document.getElementById('adm_btn').classList.remove('hidden');

            const cats = Object.values(data.cat || {});
            document.getElementById('cat_view').innerHTML = cats.map(c => `
                <div onclick="openCat('${c.name}')" class="tile p-4 text-center">
                    <img src="${c.img}" class="w-10 h-10 mx-auto mb-2 rounded-lg">
                    <p class="text-[8px] font-black uppercase">${c.name}</p>
                </div>`).join('');
            document.getElementById('i_cat').innerHTML = '<option disabled selected>ИГРА</option>' + cats.map(c => `<option value="${c.name}">${c.name}</option>`).join('');

            const myD = Object.values(data.d || {}).filter(d => d.bid === me.id || d.sid === me.id).reverse();
            document.getElementById('chats_list').innerHTML = myD.map(d => `
                <div onclick="openChatRoom('${d.id}')" class="tile p-4 flex justify-between items-center">
                    <b class="text-[9px] uppercase italic">${d.title}</b>
                    <span class="text-[7px] opacity-40">${d.status}</span>
                </div>`).join('');

            if(me.n === 'owner') renderAdmin();
        }

        async function postItem() {
            const t = document.getElementById('i_title').value;
            const p = Number(document.getElementById('i_price').value);
            const c = document.getElementById('i_cat').value;
            if(!t || !p || !b64) return Swal.fire('!', 'Поля!', 'warning');
            const id = 'i' + Date.now();
            await db.child(`i/${id}`).set({ id, sid: me.id, title: t, price: p, cat: c, status: 'pending', img: b64 });
            await sendTg(`📦 <b>Новый лот на модерацию!</b>\nОт: ${me.n}\nТовар: ${t}\nЦена: ${p}₽`);
            Swal.fire('OK', 'Ждите модерации', 'success');
            switchTab('market');
        }

        async function buyItem(id) {
            const it = data.i[id];
            if(me.bal < it.price) return Swal.fire('!', 'Баланс!', 'error');
            const did = 'd' + Date.now();
            await db.child(`u/${me.id}/bal`).set(me.bal - it.price);
            await db.child(`d/${did}`).set({ id: did, bid: me.id, sid: it.sid, title: it.title, price: it.price, status: 'Оплачено' });
            await db.child(`i/${id}/status`).set('sold');
            await sendTg(`💰 <b>ПРОДАЖА!</b>\nТовар: ${it.title}\nЦена: ${it.price}₽\nПокупатель: ${me.n}`);
            switchTab('chats');
        }

        async function sendTextMsg() {
            const txt = document.getElementById('chat_input').value;
            if(!txt) return;
            const isSupport = curChat.startsWith('support_');
            const path = isSupport ? `support/${curChat}` : `c/${curChat}`;
            await db.child(`${path}/m${Date.now()}`).set({ sender: me.id, text: txt });
            if(me.n !== 'owner') {
                await sendTg(`💬 <b>Сообщение в ${isSupport ? 'Поддержку' : 'Сделку'}</b>\nОт: ${me.n}\nТекст: ${txt}`);
            }
            document.getElementById('chat_input').value = '';
        }

        async function moneyReq(type) {
            const { value: amt } = await Swal.fire({ title: type, input: 'number' });
            if(amt) {
                await sendTg(`💸 <b>ЗАЯВКА НА ${type}</b>\nЮзер: ${me.n}\nСумма: ${amt}₽`);
                Swal.fire('ОК', 'Админ уведомлен', 'success');
            }
        }

        async function saveEmail() {
            const em = document.getElementById('u_email').value;
            if(em) {
                await db.child(`u/${me.id}/email`).set(em);
                await sendTg(`📧 <b>Почта привязана</b>\nЮзер: ${me.n}\nEmail: ${em}`);
            }
        }

        async function reqV() {
            await sendTg(`✔️ <b>Запрос верификации!</b>\nЮзер: ${me.n}\nID: ${me.id}`);
            Swal.fire('OK', 'Запрос отправлен', 'info');
        }

        // --- ВСПОМОГАТЕЛЬНОЕ ---
        function renderChat() {
            const path = curChat.startsWith('support_') ? data.support?.[curChat] : data.c?.[curChat];
            const msgs = Object.values(path || {});
            const body = document.getElementById('chat_body');
            body.innerHTML = msgs.map(m => `<div class="chat-msg ${m.sender === me.id ? 'msg-out' : 'msg-in'}">${m.text}</div>`).join('');
            body.scrollTop = body.scrollHeight;
        }
        function openChatRoom(id) { curChat = id; document.getElementById('chat_modal').classList.remove('hidden'); renderChat(); }
        function closeChat() { curChat = null; document.getElementById('chat_modal').classList.add('hidden'); }
        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById('tab_'+t).classList.add('active');
            document.getElementById('n_'+t).classList.add('active');
        }
        function openCat(n) {
            document.getElementById('cat_view').classList.add('hidden');
            document.getElementById('items_view').classList.remove('hidden');
            const its = Object.values(data.i || {}).filter(i => i.cat === n && i.status === 'active').reverse();
            document.getElementById('market_grid').innerHTML = its.map(i => `
                <div class="tile p-4 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <img src="${i.img}" class="w-10 h-10 rounded-lg object-cover">
                        <b class="text-[10px] uppercase italic">${i.title}</b>
                    </div>
                    <button onclick="buyItem('${i.id}')" class="bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-black italic">${i.price} ₽</button>
                </div>`).join('');
        }
        function backToCats() { document.getElementById('cat_view').classList.remove('hidden'); document.getElementById('items_view').classList.add('hidden'); }
        function logout() { localStorage.clear(); location.reload(); }
        function compImg(i, l) {
            const r = new FileReader();
            r.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const c = document.createElement('canvas');
                    const ctx = c.getContext('2d');
                    c.width = 400; c.height = img.height * (400/img.width);
                    ctx.drawImage(img, 0,0,400, c.height);
                    const res = c.toDataURL('image/jpeg', 0.6);
                    if(l === 'l_img') b64 = res; else b64Cat = res;
                    document.getElementById(l).innerHTML = `<img src="${res}" class="w-full h-full object-cover rounded-3xl">`;
                };
                img.src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }
        function renderAdmin() {
            const pnd = Object.values(data.i || {}).filter(i => i.status === 'pending');
            document.getElementById('adm_mod').innerHTML = pnd.map(i => `
                <div class="tile p-4 flex justify-between items-center">
                    <p class="text-[9px] font-black uppercase">${i.title}</p>
                    <button onclick="db.child('i/${i.id}/status').set('active')" class="bg-green-600 px-3 py-1 rounded text-[8px] font-black">OK</button>
                </div>`).join('');
            const tickets = [...Object.keys(data.support || {}), ...Object.keys(data.c || {})];
            document.getElementById('adm_support').innerHTML = tickets.map(t => `
                <div onclick="openChatRoom('${t}')" class="tile p-4 flex justify-between items-center text-[8px] uppercase font-black">${t} <i class="fa-solid fa-message"></i></div>`).join('');
        }
        init();
    </script>
</body>
</html>
