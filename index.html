<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>sswckk:system v29.0 OMNI-SYNC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(15,15,18,0.9); backdrop-filter: blur(35px); border: 1px solid rgba(255,255,255,0.07); border-radius: 35px; }
        .tab { display: none; padding-bottom: 120px; } .tab.active { display: block; animation: fIn 0.3s ease; }
        @keyframes fIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .input-box { background: #0a0a0c; border: 1px solid #1a1a1c; color: #fff; border-radius: 20px; padding: 18px; width: 100%; outline: none; }
        .nav-item { opacity: 0.2; transition: 0.3s; } .nav-item.active { opacity: 1; color: #3b82f6; }
        .btn-act { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 12px; margin-top: 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; width: 100%; text-align: center; display: block; }
        .status-badge { font-size: 8px; font-weight: 900; padding: 4px 10px; border-radius: 10px; text-transform: uppercase; }
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <header class="p-6 flex justify-between items-center sticky top-0 z-[500] glass border-none rounded-none rounded-b-[45px]">
        <div><h1 class="text-2xl font-black italic tracking-tighter">sswckk:<span class="text-zinc-600">system</span></h1><p class="text-[8px] text-blue-500 font-black uppercase mt-1 tracking-[2px]">● bot synchronized</p></div>
        <div id="ub" onclick="setTab('me')" class="bg-white/5 border border-white/10 px-6 py-3 rounded-2xl text-[11px] font-black italic cursor-pointer">0 ₽</div>
    </header>

    <section id="home" class="tab active px-5 pt-8 space-y-6"><div id="tl" class="space-y-6"></div></section>
    
    <section id="wallet" class="tab px-5 pt-8"><div class="glass p-8 space-y-6">
        <h2 class="text-center font-black italic text-xl">WALLET</h2>
        <div class="grid grid-cols-2 gap-4">
            <button onclick="fOp('deposit')" class="py-6 bg-green-600/20 border border-green-600/30 rounded-3xl font-black uppercase italic text-xs">Пополнить</button>
            <button onclick="fOp('withdraw')" class="py-6 bg-red-600/20 border border-red-600/30 rounded-3xl font-black uppercase italic text-xs">Вывести</button>
        </div>
        <div class="pt-4"><h3 class="text-[10px] opacity-30 font-black uppercase mb-4">История транзакций</h3><div id="wl" class="space-y-3"></div></div>
    </div></section>

    <section id="create" class="tab px-5 pt-8"><div class="glass p-8 space-y-5"><input id="zt" class="input-box" placeholder="Название"><input id="za" class="input-box" placeholder="Ссылка/Локация"><input id="zp" type="number" class="input-box" placeholder="Цена ₽"><input type="file" id="zf" class="hidden" onchange="document.getElementById('fl').innerText='МЕДИА: OK'"><label for="zf" id="fl" class="input-box block text-center py-12 border-dashed border-zinc-800 opacity-40 italic uppercase text-[10px] font-black cursor-pointer">Прикрепить фото</label><button onclick="cTask()" id="cb" class="w-full py-6 bg-blue-600 rounded-[28px] font-black uppercase italic">Опубликовать</button></div></section>

    <section id="support" class="tab px-5 pt-8"><div id="cl" class="space-y-4"></div><div id="cr" class="hidden"><button onclick="activeC=null; render()" class="text-[10px] font-black uppercase mb-5 opacity-40">Назад</button><div class="glass p-5 h-[62vh] flex flex-col"><div id="ms" class="flex-1 overflow-y-auto space-y-4 pr-1"></div><div class="flex gap-3 mt-4"><input id="mi" class="input-box" placeholder="Текст..."><button onclick="sMsg()" class="w-16 bg-white text-black rounded-[22px] flex items-center justify-center shadow-lg"><i class="fa-solid fa-paper-plane"></i></button></div></div></div></section>

    <section id="me" class="tab px-5 pt-8"><div class="glass p-12 text-center space-y-12"><h3 id="un" class="text-4xl font-black italic uppercase tracking-tighter">...</h3><div id="ubm" class="text-8xl font-black italic tracking-tighter">0 ₽</div><div class="grid grid-cols-2 gap-4"><button onclick="localStorage.clear();location.reload()" class="py-5 bg-zinc-900 border border-white/5 rounded-2xl text-[10px] font-black uppercase italic">Выход</button><button onclick="setTab('al')" class="py-5 bg-zinc-900/40 rounded-2xl text-[10px] font-black uppercase opacity-10">Admin</button></div></div></section>

    <section id="al" class="tab px-5 pt-24"><div class="glass p-12 text-center"><input type="password" oninput="if(this.value==='kalubxq') setTab('adm')" class="input-box text-center font-black" placeholder="OVERLORD CODE"></div></section>
    
    <section id="adm" class="tab px-5 pt-8 space-y-8 overflow-y-auto">
        <h2 class="text-3xl font-black italic text-red-600">OVERLORD</h2>
        
        <div class="glass p-8 space-y-4">
            <h3 class="text-[10px] font-black uppercase text-blue-500 italic">Flow Builder (Бесконечные действия)</h3>
            <textarea id="bc-t" class="input-box text-xs h-24" placeholder="Фраза (например: Привет! Как дела?)"></textarea>
            <div id="bb" class="space-y-2"></div>
            <button onclick="aBtn()" class="text-[9px] font-black uppercase text-zinc-500">+ Кнопка "Далее" (Связка)</button>
            <div class="grid grid-cols-2 gap-3 mt-4"><button onclick="sB('news')" class="py-4 bg-blue-600 rounded-2xl text-[10px] font-black uppercase italic">В КАНАЛ</button><button onclick="sB('all')" class="py-4 bg-white text-black rounded-2xl text-[10px] font-black uppercase italic">ВСЕМ В ЛС</button></div>
        </div>

        <div class="space-y-4"><h3 class="text-[10px] font-black opacity-20 uppercase italic ml-2">Заявки и Жалобы</h3><div id="atl" class="space-y-4"></div></div>
        <div class="space-y-4"><h3 class="text-[10px] font-black opacity-20 uppercase italic ml-2">Воркеры</h3><div id="aul" class="space-y-3"></div></div>
    </section>

    <nav id="bn" class="fixed bottom-0 left-0 right-0 h-28 bg-black/95 border-t border-white/5 flex justify-around items-center z-[1000] rounded-t-[50px]">
        <button onclick="setTab('home')" class="nav-item active" id="btn-home"><i class="fa-solid fa-house-user text-xl"></i></button>
        <button onclick="setTab('wallet')" class="nav-item" id="btn-wallet"><i class="fa-solid fa-wallet text-xl"></i></button>
        <button onclick="setTab('create')" class="nav-item" id="btn-create"><i class="fa-solid fa-circle-plus text-2xl"></i></button>
        <button onclick="setTab('support')" class="nav-item" id="btn-support"><i class="fa-solid fa-comment-dots text-xl"></i></button>
        <button onclick="setTab('me')" class="nav-item" id="btn-me"><i class="fa-solid fa-user-circle text-xl"></i></button>
    </nav>

    <script>
        // ДАННЫЕ БОТА (Впиши свои!)
        const TG_TOKEN = "ТВОЙ_ТОКЕН_БОТА";
        const ADMIN_ID = "ТВОЙ_ТГ_ID";

        const cfg = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com", storageBucket: "dogx-base.appspot.com" };
        const K = 'sswckk_sync_v29'; firebase.initializeApp(cfg); const db_r = firebase.database(); const st_r = firebase.storage();
        let me = null, activeC = null, db = {u:{}, t:{}, c:{}, w:{}};

        function init() {
            db_r.ref(K).on('value', s => {
                db = s.val() || {u:{}, t:{}, c:{}, w:{}}; const uid = localStorage.getItem('u_id');
                if(uid && db.u[uid]) { me = db.u[uid]; render(); } else auth();
            });
        }

        // ОТПРАВКА В ТГ АДМИНУ
        async function notifyAdmin(txt, buttons = []) {
            const url = `https://api.telegram.org/bot${TG_TOKEN}/sendMessage`;
            const body = { chat_id: ADMIN_ID, text: txt, parse_mode: "HTML", reply_markup: { inline_keyboard: buttons } };
            await fetch(url, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(body) });
        }

        async function fOp(type) {
            const label = type === 'deposit' ? 'Пополнение' : 'Вывод';
            const { value: amount } = await Swal.fire({ title: label, input: 'number', inputPlaceholder: 'Введите сумму ₽', background: '#000', color: '#fff' });
            if (amount) {
                const wid = "w" + Date.now();
                await db_r.ref(`${K}/w/${wid}`).set({ id: wid, uid: me.id, n: me.n, type, amount: Number(amount), st: 'pending' });
                // Уведомление тебе в ТГ
                notifyAdmin(`🔔 <b>Новая заявка: ${label}</b>\nЮзер: ${me.n} (@${me.t})\nСумма: ${amount} ₽`, [
                    [{ text: "✅ Принять", callback_data: `acc_${wid}` }, { text: "❌ Отклонить", callback_data: `rej_${wid}` }]
                ]);
                Swal.fire('Заявка отправлена', 'Админ проверит её в ближайшее время', 'success');
            }
        }

        async function auth() {
            const { value: f } = await Swal.fire({ title: 'REGISTRATION', background:'#000', color:'#fff', html:`<input id="sn" class="swal2-input" placeholder="Ник"><input id="sp" type="password" class="swal2-input" placeholder="Пароль"><input id="st" class="swal2-input" placeholder="@Телеграм">`, allowOutsideClick:false, preConfirm:()=>[document.getElementById('sn').value, document.getElementById('sp').value, document.getElementById('st').value] });
            if(f && f[2]) {
                const ex = Object.values(db.u).find(u=>u.t===f[2]);
                if(ex && ex.p===f[1]) { localStorage.setItem('u_id', ex.id); location.reload(); }
                else { const id = "u"+Date.now(); await db_r.ref(`${K}/u/${id}`).set({id, n:f[0], p:f[1], t:f[2], bal:0, s:'WORKER'}); localStorage.setItem('u_id', id); location.reload(); }
            } else auth();
        }

        async function cTask() {
            const t = document.getElementById('zt').value, p = document.getElementById('zp').value, f = document.getElementById('zf').files[0]; if(!t || !p || !f) return;
            document.getElementById('cb').innerText = "..."; const r = st_r.ref(`v29/${Date.now()}`); await r.put(f); const url = await r.getDownloadURL();
            const tid = "t" + Date.now();
            await db_r.ref(`${K}/t/${tid}`).set({id:tid, t, p:Number(p), img:url, st:'pending', o:me.n});
            notifyAdmin(`📦 <b>Новое задание на проверку!</b>\nОт: ${me.n}\nНазвание: ${t}\nЦена: ${p} ₽`, [[{text:"Смотреть на сайте", url:"https://твойсайт.com"}]]);
            setTab('home');
        }

        function render() {
            document.getElementById('ub').innerText = me.bal + ' ₽'; document.getElementById('ubm').innerText = me.bal + ' ₽'; document.getElementById('un').innerText = me.n;
            
            // Лента
            const ts = Object.values(db.t || {}).filter(x => x.st === 'active');
            document.getElementById('tl').innerHTML = ts.map(t => `<div class="glass overflow-hidden"><img src="${t.img}" class="w-full h-56 object-cover"><div class="p-6 flex justify-between items-center"><b>${t.t}</b><b>${t.p} ₽</b></div></div>`).join('');
            
            // История финансов (Кошелек)
            const myW = Object.values(db.w || {}).filter(x => x.uid === me.id);
            document.getElementById('wl').innerHTML = myW.map(w => `<div class="glass p-4 flex justify-between items-center"><div class="text-[10px] font-black uppercase">${w.type === 'deposit' ? '📥' : '📤'} ${w.amount} ₽</div><div class="status-badge ${w.st==='pending'?'bg-zinc-800 text-zinc-500':(w.st==='active'?'bg-green-600/20 text-green-500':'bg-red-600/20 text-red-500')}">${w.st}</div></div>`).join('') || '<p class="text-center opacity-10 text-[8px]">Пусто</p>';

            // Админка: Заявки (Задания + Финансы)
            const allReq = [...Object.values(db.t||{}).filter(x=>x.st==='pending'), ...Object.values(db.w||{}).filter(x=>x.st==='pending')];
            document.getElementById('atl').innerHTML = allReq.map(r => `<div class="glass p-5 flex justify-between items-center text-[10px] font-black uppercase">${r.o || r.n}: ${r.t || r.type} (${r.p || r.amount}₽)<div class="flex gap-3"><button onclick="aApprove('${r.id}', '${r.type?'w':'t'}')" class="text-green-500">ОК</button><button onclick="db_r.ref('${K}/${r.type?'w':'t'}/${r.id}').update({st:'rejected'})" class="text-red-600">X</button></div></div>`).join('');
            
            document.getElementById('aul').innerHTML = Object.values(db.u||{}).map(u => `<div class="glass p-5 flex justify-between items-center text-[10px] uppercase">${u.n}<button onclick="eU('${u.id}')" class="opacity-30">ИЗМЕНИТЬ</button></div>`).join('');

            const ch = [{id:'news', n:'Канал', i:'fa-bullhorn', b:'bg-blue-600'}, {id:'system', n:'Поддержка', i:'fa-headset', b:'bg-zinc-800'}];
            if(!activeC) document.getElementById('cl').innerHTML = ch.map(c => `<div onclick="oChat('${c.id}')" class="glass p-7 flex items-center gap-6"><div class="w-14 h-14 ${c.b} rounded-2xl flex items-center justify-center text-2xl shadow-xl"><i class="fa-solid ${c.i}"></i></div><div><b class="text-sm uppercase font-black italic">${c.n}</b></div></div>`).join('');
            if(activeC) renderM();
        }

        async function aApprove(id, type) {
            if(type === 'w') {
                const { value: am } = await Swal.fire({ title:'Сумма на баланс', input:'number', background:'#000', color:'#fff' });
                if(am) {
                    const req = db.w[id]; const u = db.u[req.uid];
                    await db_r.ref(`${K}/u/${u.id}`).update({ bal: Number(u.bal) + Number(am) });
                    await db_r.ref(`${K}/w/${id}`).update({ st: 'active' });
                }
            } else { await db_r.ref(`${K}/t/${id}`).update({ st: 'active' }); }
        }

        async function eU(uid) {
            const u = db.u[uid]; const { value: v } = await Swal.fire({ title:'Управление', background:'#000', color:'#fff', html:`<input id="eb" class="swal2-input" value="${u.bal}"><button onclick="window.act='d'" class="bg-red-600 p-4 w-full rounded-xl mt-4 text-[10px] font-black uppercase">Удалить аккаунт</button>`, preConfirm:()=>({bal:document.getElementById('eb').value}) });
            if(v) { if(window.act==='d') db_r.ref(`${K}/u/${uid}`).remove(); else db_r.ref(`${K}/u/${uid}`).update({bal:Number(v.bal)}); window.act=null; }
        }

        function aBtn() { const div = document.createElement('div'); div.className = "flex gap-2"; div.innerHTML = `<input class="input-box text-[10px] p-3" placeholder="Текст (Пример: Продолжить)"><input class="input-box text-[10px] p-3" placeholder="Действие (Ссылка или Текст)"><button onclick="this.parentElement.remove()" class="text-red-500 font-bold px-2">✕</button>`; document.getElementById('bb').appendChild(div); }

        async function sB(target) {
            const txt = document.getElementById('bc-t').value;
            const btns = []; document.querySelectorAll('#bb div').forEach(d => { const i = d.querySelectorAll('input'); if(i[0].value) btns.push({t:i[0].value, a:i[1].value}); });
            const m = { text:txt, btns:btns, from:'system', time:Date.now() };
            if(target === 'news') await db_r.ref(`${K}/c/news/${Date.now()}`).set(m);
            else Object.keys(db.u).forEach(uid => db_r.ref(`${K}/c/${uid}/${Date.now()}`).set(m));
            notifyAdmin(`📢 <b>Рассылка отправлена!</b>\nТекст: ${txt}`);
            Swal.fire('OK', 'Рассылка ушла', 'success');
        }

        function setTab(t) { document.querySelectorAll('.tab').forEach(x => x.classList.remove('active')); document.getElementById(t).classList.add('active'); document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active')); if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.add('active'); }
        function oChat(id) { activeC = id; document.getElementById('cl').classList.add('hidden'); document.getElementById('cr').classList.remove('hidden'); renderM(); }
        async function sMsg() { 
            const v = document.getElementById('mi').value; if(!v) return; 
            const p = (activeC === 'system' ? me.id : activeC); 
            await db_r.ref(`${K}/c/${p}/${Date.now()}`).set({text:v, from:(activeC==='system'?'user':'system'), time:Date.now()}); 
            if(activeC === 'system') notifyAdmin(`✉️ <b>Новое сообщение в поддержке!</b>\nОт: ${me.n}\nТекст: ${v}`);
            document.getElementById('mi').value = ""; 
        }

        function renderM() {
            const p = (activeC === 'system' ? me.id : activeC); const msgs = Object.values(db.c[p] || {}).sort((a,b)=>a.time-b.time);
            document.getElementById('ms').innerHTML = msgs.map(m => `<div class="p-5 max-w-[92%] rounded-[28px] text-[12px] font-black italic shadow-xl ${m.from==='system'?'bg-blue-600 self-start text-white':'bg-zinc-800 self-end text-white'}">${m.text}${m.btns ? m.btns.map(b => `<button onclick="hA('${b.a}')" class="btn-act">${b.t}</button>`).join('') : ''}</div>`).join('');
            const b = document.getElementById('ms'); b.scrollTop = b.scrollHeight;
        }
        window.hA = (a) => { if(a.startsWith('http')) window.open(a, '_blank'); else Swal.fire('Информация', a); };
        init();
    </script>
</body>
</html>
