<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>lyneok — Verified Market</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        :root { --bg: #070708; --card: #121215; --blue: #3b82f6; }
        body { background: var(--bg); color: #e4e4e7; font-family: 'Manrope', sans-serif; overflow: hidden; height: 100vh; }
        
        .tab-content { display: none; height: 100%; overflow-y: auto; padding-bottom: 140px; scrollbar-width: none; }
        .tab-content::-webkit-scrollbar { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(10,10,12,0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-btn { color: #52525b; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 9px; font-weight: 800; }
        .nav-btn.active { color: var(--blue); }

        .admin-panel { background: #0a0a0c; border: 1px solid #3b82f633; border-radius: 24px; padding: 20px; }
        .spy-row { background: #16161a; border-radius: 16px; padding: 12px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.03); }
        
        .v-badge { color: var(--blue); margin-left: 4px; font-size: 11px; }
        .msg { margin-bottom: 10px; padding: 12px; border-radius: 18px; max-width: 85%; font-size: 13px; }
        .msg.me { background: var(--blue); align-self: flex-end; }
        .msg.other { background: #27272a; align-self: flex-start; }
        
        input, textarea { background: #1c1c21; border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; padding: 14px; color: white; width: 100%; outline: none; }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 bg-black z-[9999] flex flex-col items-center justify-center font-black italic text-2xl">lyne<span class="text-blue-500">ok</span></div>

    <div id="auth_screen" class="hidden h-screen flex flex-col items-center justify-center px-10">
        <h1 class="text-4xl font-black italic mb-2">lyne<span class="text-blue-500">ok</span></h1>
        <div id="reg_form" class="w-full max-w-sm space-y-3 mt-8">
            <input id="reg_n" placeholder="Никнейм">
            <input id="reg_tg" placeholder="Telegram @username">
            <input id="reg_p" type="password" placeholder="Пароль">
            <button onclick="handleAuth()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase shadow-xl shadow-blue-500/20 active:scale-95 transition">Войти / Регистрация</button>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        
        <header class="px-6 py-5 flex justify-between items-center bg-black/50 backdrop-blur-xl border-b border-white/5 sticky top-0 z-[100]">
            <div class="text-xl font-black italic">lyne<span>ok</span></div>
            <div onclick="switchTab('profile')" class="flex items-center gap-3 bg-zinc-900 px-4 py-2 rounded-xl border border-white/5">
                <b id="h_bal" class="text-sm font-black">0 ₽</b>
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-xs font-black" id="h_ava">?</div>
            </div>
        </header>

        <main id="tab_market" class="tab-content active px-5 pt-4">
            <div id="market_grid" class="space-y-3"></div>
        </main>

        <main id="tab_deals" class="tab-content px-5 pt-6">
            <h2 class="text-xl font-black mb-6">Ваши сделки</h2>
            <div id="deals_list" class="space-y-3"></div>
        </main>

        <main id="tab_admin" class="tab-content px-5 pt-6">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/20"><i class="fa-solid fa-bolt"></i></div>
                <h2 class="text-xl font-black italic text-blue-500 uppercase tracking-tighter">System Overlord</h2>
            </div>

            <div class="admin-panel mb-6">
                <h3 class="text-[10px] font-black uppercase text-zinc-500 mb-4">Управление верификацией</h3>
                <div id="spy_users" class="space-y-2"></div>
            </div>

            <div class="admin-panel">
                <h3 class="text-[10px] font-black uppercase text-zinc-500 mb-4">Рассылка всем юзерам</h3>
                <textarea id="bc_text" placeholder="Текст..." class="mb-3"></textarea>
                <button onclick="sendBroadcast()" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase text-[10px]">Запустить рассылку</button>
            </div>
        </main>

        <div id="chat_window" class="fixed inset-0 bg-black z-[2000] hidden flex flex-col">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <button onclick="closeChat()" class="text-zinc-500"><i class="fa-solid fa-chevron-left text-xl"></i></button>
                <div class="text-center">
                    <h3 id="cw_title" class="text-sm font-black italic">Диалог</h3>
                    <p class="text-[8px] text-blue-500 font-black uppercase tracking-widest">Безопасная сделка</p>
                </div>
                <div class="w-10"></div>
            </div>
            <div id="cw_messages" class="flex-1 overflow-y-auto p-6 flex flex-col"></div>
            <div class="p-5 bg-zinc-950 border-t border-white/5 flex gap-3">
                <input id="cw_input" placeholder="Напишите сообщение...">
                <button onclick="sendMsg()" class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center text-xl"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

        <main id="tab_profile" class="tab-content px-5 pt-6">
            <div class="bg-zinc-900/50 p-8 rounded-[40px] text-center border border-white/5">
                <div class="w-24 h-24 bg-blue-600 rounded-[35px] mx-auto flex items-center justify-center text-4xl font-black mb-4 relative" id="p_ava">?</div>
                <h3 id="p_name" class="text-2xl font-black italic flex items-center justify-center">User</h3>
                <p id="p_id" class="text-[10px] text-zinc-600 font-bold mt-2">ID: ---</p>
                <div class="grid grid-cols-2 gap-3 mt-8">
                    <div onclick="addMoney()" class="bg-white/5 p-4 rounded-2xl border border-white/5 active:scale-95 transition">
                        <b class="text-lg font-black text-blue-500"><i class="fa-solid fa-wallet"></i></b>
                        <p class="text-[8px] text-zinc-500 font-black uppercase">Пополнить</p>
                    </div>
                    <div onclick="logout()" class="bg-white/5 p-4 rounded-2xl border border-white/5">
                        <b class="text-lg font-black text-red-500"><i class="fa-solid fa-arrow-right-from-bracket"></i></b>
                        <p class="text-[8px] text-zinc-500 font-black uppercase">Выйти</p>
                    </div>
                </div>
            </div>
        </main>

        <nav class="nav-bar">
            <div onclick="switchTab('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-shop text-xl"></i><span>Маркет</span></div>
            <div onclick="switchTab('deals')" id="n_deals" class="nav-btn"><i class="fa-solid fa-message text-xl"></i><span>Чаты</span></div>
            <div onclick="switchTab('admin')" id="n_admin" class="nav-btn hidden text-red-500"><i class="fa-solid fa-key text-xl"></i><span>Admin</span></div>
            <div onclick="switchTab('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-circle-user text-xl"></i><span>Профиль</span></div>
        </nav>
    </div>

    <script>
        const CFG = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        const ADMIN_TG = { token: "8641257792:AAEsxnQWEIeozMt_gnSwJdVgSFQlOc-hnuc", id: "7040863301" };
        
        firebase.initializeApp(CFG);
        const db = firebase.database().ref('lyneok_v18_verified');

        let me = null, data = {}, curDealId = null;
        const vIcon = '<i class="fa-solid fa-circle-check v-badge"></i>';

        function init() {
            db.on('value', snap => {
                data = snap.val() || { u: {}, i: {}, d: {}, c: {}, bc: [] };
                const sid = localStorage.getItem('lyne_v18_sid');
                if(!sid) toggleAuth(true);
                else {
                    me = data.u[sid];
                    if(me) { toggleAuth(false); render(); }
                    else { localStorage.removeItem('lyne_v18_sid'); toggleAuth(true); }
                }
                document.getElementById('loader').style.display = 'none';
            });
        }

        function toggleAuth(s) {
            document.getElementById('auth_screen').classList.toggle('hidden', !s);
            document.getElementById('app').classList.toggle('hidden', s);
        }

        async function handleAuth() {
            const n = document.getElementById('reg_n').value.trim();
            const t = document.getElementById('reg_tg').value.trim();
            const p = document.getElementById('reg_p').value.trim();
            if(!n || !t.includes('@')) return Swal.fire('Error', 'Ник и @TG обязательны', 'error');

            let uid = Object.keys(data.u || {}).find(k => data.u[k].n === n);
            if(!uid) {
                uid = 'u' + Date.now().toString().slice(-6);
                await db.child(`u/${uid}`).set({ id: uid, n, tg: t, p, bal: 0, verified: false });
            }
            localStorage.setItem('lyne_v18_sid', uid);
        }

        function render() {
            document.getElementById('h_bal').innerText = (me.bal || 0).toLocaleString() + ' ₽';
            document.getElementById('h_ava').innerText = me.n[0].toUpperCase();
            document.getElementById('p_name').innerHTML = me.n + (me.verified ? vIcon : '');
            document.getElementById('p_id').innerText = 'ID: ' + me.id;

            if(me.n === 'sswckk' || me.n === 'artyom' || me.id === 'u333') {
                document.getElementById('n_admin').classList.remove('hidden');
                renderAdmin();
            }

            // Market
            const items = Object.values(data.i || {}).reverse();
            document.getElementById('market_grid').innerHTML = items.map(i => {
                const seller = data.u[i.sid];
                return `
                <div class="bg-zinc-900/50 p-5 rounded-3xl border border-white/5 flex justify-between items-center" onclick="buyItem('${i.id}')">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-blue-600/10 rounded-2xl flex items-center justify-center text-blue-500 text-xl"><i class="fa-solid fa-cube"></i></div>
                        <div>
                            <h4 class="font-bold text-sm">${i.title}</h4>
                            <p class="text-[9px] text-zinc-600 font-black uppercase flex items-center">
                                ${seller?.n || 'System'} ${seller?.verified ? vIcon : ''}
                            </p>
                        </div>
                    </div>
                    <b class="text-blue-500 font-black">${i.price} ₽</b>
                </div>`;
            }).join('') || '<p class="text-center py-20 opacity-20 font-black uppercase text-xs">Товаров пока нет</p>';

            // Chats
            const deals = Object.values(data.d || {}).filter(d => d.bid === me.id || d.sid === me.id).reverse();
            document.getElementById('deals_list').innerHTML = deals.map(d => {
                const partner = data.u[d.sid === me.id ? d.bid : d.sid];
                return `
                <div class="bg-zinc-900/40 p-5 rounded-2xl border border-white/5 flex justify-between items-center" onclick="openChat('${d.id}')">
                    <div>
                        <h4 class="text-xs font-black uppercase">${d.title}</h4>
                        <p class="text-[9px] text-zinc-500 flex items-center">С кем: ${partner?.n} ${partner?.verified ? vIcon : ''}</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-[10px] opacity-20"></i>
                </div>`;
            }).join('');

            if(curDealId) renderChat();
        }

        function renderAdmin() {
            const users = Object.values(data.u || {});
            document.getElementById('spy_users').innerHTML = users.map(u => `
                <div class="spy-row flex justify-between items-center">
                    <div class="text-[10px] font-bold">${u.n} ${u.verified ? vIcon : ''}</div>
                    <div class="flex gap-2">
                        <button onclick="toggleVerify('${u.id}', ${u.verified})" class="px-3 py-1 rounded-lg text-[8px] font-black uppercase ${u.verified ? 'bg-red-600/20 text-red-500' : 'bg-blue-600/20 text-blue-500'}">
                            ${u.verified ? 'Unverify' : 'Verify'}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function toggleVerify(uid, current) {
            await db.child(`u/${uid}/verified`).set(!current);
        }

        async function buyItem(id) {
            const i = data.i[id];
            if(i.sid === me.id) return;
            if((me.bal || 0) < i.price) return Swal.fire('Баланс!', 'Сначала пополни счет', 'warning');
            const { isConfirmed } = await Swal.fire({ title: 'Купить?', text: i.title, background: '#121215', color: '#fff', showCancelButton: true });
            if(isConfirmed) {
                const did = 'd' + Date.now();
                await db.child(`u/${me.id}/bal`).set(me.bal - i.price);
                await db.child(`d/${did}`).set({ id: did, bid: me.id, sid: i.sid, title: i.title, price: i.price });
                await db.child(`i/${id}`).remove();
                tgAdmin(`💰 КУПЛЕН ТОВАР\nПокупатель: ${me.n}\nПродавец: ${data.u[i.sid].n}\nЦена: ${i.price}₽`);
            }
        }

        function openChat(did) {
            curDealId = did;
            document.getElementById('cw_title').innerText = data.d[did].title;
            document.getElementById('chat_window').classList.remove('hidden');
            renderChat();
        }

        function renderChat() {
            const msgs = Object.values(data.c?.[curDealId] || {});
            const box = document.getElementById('cw_messages');
            box.innerHTML = msgs.map(m => {
                const sender = data.u[m.uid];
                return `
                <div class="msg ${m.uid === me.id ? 'me' : 'other'}">
                    <p class="text-[8px] font-black opacity-40 mb-1 uppercase flex items-center">
                        ${sender?.n} ${sender?.verified ? vIcon : ''}
                    </p>
                    ${m.text}
                </div>`;
            }).join('');
            box.scrollTop = box.scrollHeight;
        }

        async function sendMsg() {
            const text = document.getElementById('cw_input').value.trim();
            if(!text) return;
            const mid = 'm' + Date.now();
            await db.child(`c/${curDealId}/${mid}`).set({ uid: me.id, text, time: Date.now() });
            document.getElementById('cw_input').value = '';
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab_'+t).classList.add('active');
            if(document.getElementById('n_'+t)) document.getElementById('n_'+t).classList.add('active');
        }

        function closeChat() { document.getElementById('chat_window').classList.add('hidden'); curDealId = null; }
        async function addMoney() { Swal.fire('Инфо', 'Свяжитесь с админом для пополнения', 'info'); }
        function logout() { localStorage.removeItem('lyne_v18_sid'); location.reload(); }
        function tgAdmin(m) { fetch(`https://api.telegram.org/bot${ADMIN_TG.token}/sendMessage?chat_id=${ADMIN_TG.id}&text=${encodeURIComponent(m)}`); }

        init();
    </script>
</body>
</html>
