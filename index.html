<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK V36 — FIXED</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        :root { --bg: #050506; --card: #111113; --blue: #3b82f6; }
        body { background: var(--bg); color: #fff; font-family: 'Manrope', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding-bottom: 120px; }
        .tab-content.active { display: block; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(10,10,12,0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #52525b; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 9px; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .nav-btn.active { color: var(--blue); }
        .tile { background: var(--card); border-radius: 24px; border: 1px solid rgba(255,255,255,0.04); }
        input, textarea, select { background: #18181b; border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 16px; color: white; width: 100%; outline: none; font-size: 14px; }
        .btn-main { background: var(--blue); padding: 18px; border-radius: 22px; font-weight: 800; text-transform: uppercase; width: 100%; cursor: pointer; }
        .btn-main:active { transform: scale(0.98); opacity: 0.9; }
        .chat-msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; margin-bottom: 8px; font-size: 13px; }
        .msg-in { background: #18181b; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-out { background: var(--blue); align-self: flex-end; border-bottom-right-radius: 4px; }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 bg-black z-[9999] flex items-center justify-center font-black text-blue-500 italic uppercase">Syncing_Engine...</div>

    <div id="auth_screen" class="hidden h-screen flex flex-col items-center justify-center px-10 text-center">
        <h1 class="text-4xl font-black italic mb-8 uppercase">LYNE<span class="text-blue-500">OK</span></h1>
        <div class="w-full max-w-sm space-y-3">
            <input id="reg_n" placeholder="Никнейм">
            <input id="reg_p" type="password" placeholder="Пароль">
            <button onclick="handleAuth()" class="btn-main mt-4">Войти</button>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-6 py-5 flex justify-between items-center bg-zinc-950 border-b border-white/5">
            <span class="font-black italic text-xl">LYNEOK</span>
            <div id="h_bal" class="bg-blue-500/10 text-blue-500 px-4 py-2 rounded-2xl font-black text-sm italic">0 ₽</div>
        </header>

        <main id="tab_market" class="tab-content active px-5 pt-6">
            <div id="cat_view" class="grid grid-cols-2 gap-4"></div>
            <div id="items_view" class="hidden space-y-4 pb-20">
                <button onclick="backToCats()" class="text-zinc-500 font-black text-[10px] uppercase italic">← Назад</button>
                <div id="market_grid" class="space-y-3"></div>
            </div>
        </main>

        <main id="tab_sell" class="tab-content px-5 pt-6">
            <h2 class="text-xl font-black mb-6 italic uppercase text-blue-500">Разместить лот</h2>
            <div class="space-y-3">
                <input type="file" id="i_img" class="hidden" onchange="compImg(this, 'l_img')">
                <label for="i_img" id="l_img" class="w-full h-32 bg-zinc-900 border-2 border-dashed border-white/5 rounded-3xl flex items-center justify-center font-black text-[10px] opacity-40 uppercase cursor-pointer">Фото товара</label>
                <select id="i_cat"></select>
                <input id="i_title" placeholder="Название лота">
                <textarea id="i_desc" placeholder="Данные для выдачи"></textarea>
                <input id="i_price" type="number" oninput="updFee()" placeholder="Цена в ₽">
                <div class="p-4 bg-blue-500/5 rounded-2xl border border-blue-500/10 flex justify-between items-center">
                   <p class="text-[9px] text-zinc-500 font-black uppercase">К зачислению (-<span id="cur_fee_txt">0</span>%):</p>
                   <b class="text-blue-500 text-lg italic" id="c_res">0 ₽</b>
                </div>
                <button id="post_btn" onclick="postItem()" class="btn-main">Выставить</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content px-5 pt-6">
            <button onclick="openSupport()" class="w-full tile p-5 mb-6 border-blue-500/20 flex items-center justify-center gap-3 font-black text-blue-500 text-[10px] uppercase italic">
                <i class="fa-solid fa-headset text-lg"></i> Поддержка
            </button>
            <div id="chats_list" class="space-y-2"></div>
        </main>

        <main id="tab_profile" class="tab-content px-5 pt-6">
            <div class="tile p-6 mb-4 flex items-center gap-4">
                <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center font-black text-xl" id="p_ava">?</div>
                <div>
                    <div class="flex items-center gap-1">
                        <b id="p_name" class="text-lg uppercase">...</b>
                        <i id="p_v_icon" class="fa-solid fa-circle-check text-blue-500 hidden"></i>
                    </div>
                    <p id="p_id" class="text-[9px] opacity-30 font-bold">UID: 000000</p>
                </div>
            </div>

            <div id="email_box" class="tile p-5 mb-4 border-dashed border-zinc-800">
                <p class="text-[9px] font-black uppercase text-zinc-500 mb-3 tracking-widest italic">Почта для уведомлений</p>
                <div id="email_form" class="flex gap-2">
                    <input id="u_email" type="email" placeholder="email@example.com" class="!py-3 !text-xs">
                    <button onclick="saveEmail()" class="bg-blue-600 px-4 rounded-xl text-[10px] font-black uppercase cursor-pointer">OK</button>
                </div>
                <div id="email_ready" class="hidden text-blue-500 font-black text-[10px] uppercase italic">Почта привязана ✔️</div>
            </div>

            <div class="grid grid-cols-2 gap-2 mb-6">
                <button onclick="moneyReq('ПОПОЛНЕНИЕ')" class="tile p-5 font-black text-[10px] uppercase italic cursor-pointer">Пополнить</button>
                <button onclick="moneyReq('ВЫВОД')" class="tile p-5 font-black text-[10px] uppercase italic cursor-pointer">Вывести</button>
            </div>

            <div class="space-y-2 pb-20">
                <button onclick="reqV()" class="tile w-full p-5 font-black text-xs text-blue-500 text-left uppercase italic cursor-pointer">Запросить галочку</button>
                <button id="adm_btn" onclick="switchTab('admin')" class="hidden tile w-full p-5 font-black text-xs text-red-500 text-left uppercase italic cursor-pointer">Админ-панель</button>
                <button onclick="logout()" class="tile w-full p-5 opacity-30 font-black text-xs text-left uppercase italic cursor-pointer">Выход</button>
            </div>
        </main>

        <main id="tab_admin" class="tab-content px-5 pt-6">
            <h2 class="text-xl font-black text-red-500 mb-6 italic uppercase">Admin Console</h2>
            <div class="space-y-4">
                <div class="tile p-5">
                    <p class="text-[9px] font-black text-zinc-500 mb-3 uppercase">Комиссия (%)</p>
                    <div class="flex gap-2">
                        <input id="adm_fee_val" type="number" class="!py-3">
                        <button onclick="saveFee()" class="bg-blue-600 px-6 rounded-xl font-black text-[10px] uppercase">SAVE</button>
                    </div>
                </div>

                <div class="tile p-5">
                    <p class="text-[9px] font-black text-blue-500 mb-3 uppercase">Новая категория</p>
                    <input id="cat_name" placeholder="Название" class="mb-2">
                    <input type="file" id="cat_img" class="hidden" onchange="compImg(this, 'l_cat')">
                    <label for="cat_img" id="l_cat" class="w-full h-10 bg-zinc-800 rounded-xl flex items-center justify-center text-[9px] font-black mb-2 border border-white/5 cursor-pointer">ФОТО</label>
                    <button onclick="saveCat()" class="w-full bg-blue-600 py-3 rounded-xl font-black text-[10px] uppercase">СОЗДАТЬ</button>
                </div>

                <div class="space-y-2">
                    <p class="text-[9px] font-black text-zinc-500 uppercase italic">Заявки на галочку:</p>
                    <div id="adm_v_reqs" class="space-y-1"></div>
                    
                    <p class="text-[9px] font-black text-zinc-500 uppercase italic mt-4">Модерация товаров:</p>
                    <div id="adm_mod" class="space-y-1"></div>

                    <p class="text-[9px] font-black text-zinc-500 uppercase italic mt-4">Поддержка:</p>
                    <div id="adm_support" class="space-y-1"></div>

                    <p class="text-[9px] font-black text-zinc-500 uppercase italic mt-4">Юзеры:</p>
                    <div id="adm_users" class="space-y-1 pb-20"></div>
                </div>
            </div>
        </main>

        <nav class="nav-bar">
            <div onclick="switchTab('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-store text-xl"></i><span>Рынок</span></div>
            <div onclick="switchTab('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-circle-plus text-xl"></i><span>Продать</span></div>
            <div onclick="switchTab('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-message text-xl"></i><span>Связь</span></div>
            <div onclick="switchTab('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user text-xl"></i><span>Кабинет</span></div>
        </nav>
    </div>

    <div id="chat_modal" class="fixed inset-0 bg-black z-[2000] hidden flex flex-col">
        <header class="p-6 flex justify-between items-center border-b border-white/5 bg-zinc-950">
            <b id="chat_title" class="uppercase text-xs tracking-widest text-blue-500 italic">...</b>
            <button onclick="closeChat()" class="text-zinc-500"><i class="fa-solid fa-xmark text-xl"></i></button>
        </header>
        <div id="chat_body" class="flex-1 overflow-y-auto p-5 flex flex-col gap-2"></div>
        <div class="p-4 bg-zinc-950 flex gap-2 pb-10 border-t border-white/5">
            <input id="chat_input" placeholder="Сообщение..." class="!py-3">
            <button onclick="sendTextMsg()" class="bg-blue-600 px-6 rounded-2xl font-black text-[9px] uppercase">SEND</button>
        </div>
    </div>

    <script>
        const CFG = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        firebase.initializeApp(CFG);
        const db = firebase.database().ref('lyne_v36_fixed');

        let me = null, data = {}, curChat = null, b64 = "", b64Cat = "";

        async function init() {
            db.on('value', snap => {
                data = snap.val() || { u:{}, i:{}, d:{}, c:{}, cat:{}, config: {fee: 10}, support: {}, v_req: {} };
                const sid = localStorage.getItem('lyne_sid');
                if(!sid) { document.getElementById('auth_screen').classList.remove('hidden'); }
                else {
                    me = data.u[sid];
                    if(!me) return logout();
                    if(me.banned && Date.now() < (me.ban_until || 0)) {
                        return Swal.fire('БАН', `До: ${new Date(me.ban_until).toLocaleString()}`, 'error').then(logout);
                    }
                    document.getElementById('auth_screen').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    render();
                    if(curChat) renderChat();
                }
                document.getElementById('loader').classList.add('hidden');
            });
        }

        function handleAuth() {
            const n = document.getElementById('reg_n').value.trim().toLowerCase();
            const p = document.getElementById('reg_p').value.trim();
            if(!n || !p) return;
            let uid = Object.keys(data.u || {}).find(k => data.u[k].n === n);
            if(!uid) {
                uid = 'u' + Date.now().toString().slice(-6);
                db.child(`u/${uid}`).set({ id: uid, n, p, bal: 0, verified: false });
            } else if(data.u[uid].p !== p) return Swal.fire('!', 'Пароль неверный', 'error');
            localStorage.setItem('lyne_sid', uid);
            location.reload();
        }

        function render() {
            const fee = data.config?.fee || 10;
            document.getElementById('h_bal').innerText = (me.bal || 0).toLocaleString() + ' ₽';
            document.getElementById('p_name').innerText = me.n;
            document.getElementById('p_id').innerText = 'UID: ' + me.id;
            document.getElementById('p_ava').innerText = me.n[0].toUpperCase();
            document.getElementById('cur_fee_txt').innerText = fee;
            updFee();

            if(me.email) {
                document.getElementById('email_form').classList.add('hidden');
                document.getElementById('email_ready').classList.remove('hidden');
            }
            if(me.verified) document.getElementById('p_v_icon').classList.remove('hidden');
            if(me.n === 'owner') { 
                document.getElementById('adm_btn').classList.remove('hidden'); 
                renderAdmin(); 
            }

            const cats = Object.values(data.cat || {});
            document.getElementById('cat_view').innerHTML = cats.map(c => `
                <div onclick="openCat('${c.name}')" class="tile p-6 text-center cursor-pointer active:scale-95 transition">
                    <img src="${c.img}" class="w-12 h-12 mx-auto mb-2 object-cover rounded-xl">
                    <p class="text-[9px] font-black uppercase opacity-60 tracking-widest">${c.name}</p>
                </div>`).join('');
            document.getElementById('i_cat').innerHTML = '<option disabled selected>ИГРА</option>' + cats.map(c => `<option value="${c.name}">${c.name}</option>`).join('');

            const myD = Object.values(data.d || {}).filter(d => d.bid === me.id || d.sid === me.id).reverse();
            document.getElementById('chats_list').innerHTML = myD.map(d => `
                <div onclick="openChatRoom('${d.id}')" class="tile p-5 flex justify-between items-center cursor-pointer">
                    <div><b class="text-[10px] uppercase italic">${d.title}</b><p class="text-[8px] opacity-30 mt-1 uppercase">${d.status}</p></div>
                    <i class="fa-solid fa-chevron-right text-[10px] opacity-10"></i>
                </div>`).join('');
        }

        // --- КНОПКИ ФИНАНСОВ (FIXED) ---
        function moneyReq(type) {
            Swal.fire({
                title: type,
                input: 'number',
                inputPlaceholder: 'Введите сумму в ₽',
                showCancelButton: true,
                confirmButtonText: 'Отправить заявку'
            }).then(res => {
                if(res.isConfirmed && res.value > 0) {
                    Swal.fire('Принято', 'Администратор свяжется с вами', 'success');
                    // Можно добавить запись в отдельную ветку базы для админа
                    db.child('support/support_' + me.id + '/m' + Date.now()).set({
                        sender: 'system',
                        text: `Заявка на ${type}: ${res.value} ₽`,
                        time: Date.now()
                    });
                }
            });
        }

        // --- ЛОГИКА ТОВАРА ---
        function updFee() {
            const p = Number(document.getElementById('i_price').value);
            const f = data.config?.fee || 10;
            document.getElementById('c_res').innerText = Math.floor(p - (p * (f/100))) + ' ₽';
        }

        async function post
