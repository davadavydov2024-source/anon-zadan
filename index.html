<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>anon:zadan v4.0 ADMIN POWER</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { background: #0a0a0b; color: #e4e4e7; font-family: 'Inter', sans-serif; }
        .card { background: #161618; border: 1px solid #27272a; border-radius: 24px; }
        .tab { display: none; }
        .tab.active { display: block; }
        .input-dark { background: #0f0f10 !important; border: 1px solid #27272a !important; color: white !important; border-radius: 14px !important; outline: none; }
        .ban-screen { display:none; position:fixed; inset:0; background:#000; z-index:9999; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
    </style>
</head>
<body class="pb-28">

    <div id="ban-overlay" class="ban-screen">
        <img src="https://media.tenor.com/8s76Y9v-v80AAAAd/cat-sad.gif" class="w-48 mb-6 rounded-full border-4 border-red-500">
        <h1 class="text-2xl font-black text-red-500 italic">ДОСТУП ОГРАНИЧЕН</h1>
        <p id="ban-text" class="text-zinc-500 text-[10px] mt-2 px-10">...</p>
    </div>

    <header class="p-5 flex justify-between items-center sticky top-0 bg-[#0a0a0b]/90 border-b border-white/5 z-50">
        <h1 class="text-lg font-extrabold italic tracking-tighter">anon:<span class="text-zinc-600">zadan</span></h1>
        <div id="u-bal-head" class="bg-zinc-900 px-4 py-1.5 rounded-full text-[11px] font-bold border border-zinc-800">0.00₽</div>
    </header>

    <section id="home" class="tab active px-5 pt-4">
        <div id="zadan-list" class="space-y-4 pb-10"></div>
    </section>

    <section id="admin" class="tab px-5 pt-4 pb-32 space-y-6">
        <div class="card p-5 space-y-3 border-red-900/30">
            <h2 class="text-[10px] font-bold text-red-500 uppercase">Управление Юзерами</h2>
            <input id="adm-nick" class="input-dark w-full p-3 text-xs" placeholder="Никнейм юзера">
            <div class="grid grid-cols-3 gap-2">
                <button onclick="adminAction('bal')" class="bg-zinc-800 py-3 rounded-lg text-[9px]">БАЛАНС</button>
                <button onclick="adminAction('ban')" class="bg-red-900 text-white py-3 rounded-lg text-[9px]">БАН</button>
                <button onclick="adminAction('unban')" class="bg-green-900 text-white py-3 rounded-lg text-[9px]">РАЗБАН</button>
            </div>
        </div>

        <div class="card p-5 space-y-3">
            <h2 class="text-[10px] font-bold text-blue-500 uppercase">Мониторинг Сделок (Spy)</h2>
            <div id="adm-deals" class="space-y-2 max-h-60 overflow-y-auto"></div>
        </div>

        <div class="card p-5 space-y-3">
            <h2 class="text-[10px] font-bold text-orange-500 uppercase">Чат-Логи</h2>
            <div id="adm-chat-logs" class="space-y-2 max-h-60 overflow-y-auto text-[9px]"></div>
        </div>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-black border-t border-zinc-900 flex justify-around items-center z-[100] px-4">
        <button onclick="setTab('home')" id="btn-home"><i class="fa-solid fa-house text-lg"></i></button>
        <button onclick="setTab('chats')" id="btn-chats" class="opacity-30"><i class="fa-solid fa-comment-dots text-lg"></i></button>
        <button onclick="setTab('me')" id="btn-me" class="opacity-30"><i class="fa-solid fa-user text-lg"></i></button>
    </nav>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
          authDomain: "dogx-base.firebaseapp.com",
          databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
          projectId: "dogx-base",
          storageBucket: "dogx-base.firebasestorage.app",
          messagingSenderId: "81713249793",
          appId: "1:81713249793:web:1b44a13e6faf5acfa78a00"
        };

        const DB_VER = 'anon_v4_0'; 
        const TG_TOKEN = "8722822022:AAEmZa-V4-isxXnZ00omU8gAM_NtYevuL9Y";
        const ADMIN_ID = "7040863301";

        firebase.initializeApp(firebaseConfig);
        const rdb = firebase.database();
        let db = { users: {}, tasks: {}, deals: {}, notifications: {} };
        let me = null;

        function init() {
            rdb.ref(DB_VER).on('value', (s) => {
                db = s.val() || { users: {}, tasks: {}, deals: {}, notifications: {} };
                const uid = localStorage.getItem('anon_uid');
                if (uid && db.users && db.users[uid]) {
                    me = db.users[uid];
                    checkBan();
                    renderAll();
                }
            });
        }

        function checkBan() {
            if(me.banUntil && me.banUntil > Date.now()) {
                const diff = Math.ceil((me.banUntil - Date.now()) / 60000);
                document.getElementById('ban-overlay').style.display = 'flex';
                document.getElementById('ban-text').innerText = `Вас заблокировал админ. До разблокировки: ${diff} мин.`;
            } else {
                document.getElementById('ban-overlay').style.display = 'none';
            }
        }

        async function adminAction(type) {
            const nick = document.getElementById('adm-nick').value;
            const user = Object.values(db.users).find(u => u.nick === nick);
            if(!user) return Swal.fire('Ошибка','Юзер не найден','error');

            if(type === 'ban') {
                const { value: mins } = await Swal.fire({ title: 'Минуты бана', input: 'number', placeholder: '60' });
                if(mins) rdb.ref(`${DB_VER}/users/${user.id}`).update({ banUntil: Date.now() + (mins * 60000) });
            } else if(type === 'unban') {
                rdb.ref(`${DB_VER}/users/${user.id}`).update({ banUntil: 0 });
                Swal.fire('Разбанен','Свобода!','success');
            } else if(type === 'bal') {
                const { value: sum } = await Swal.fire({ title: 'Баланс', input: 'number' });
                if(sum) rdb.ref(`${DB_VER}/users/${user.id}`).update({ bal: Number(sum) });
            }
        }

        function renderAdminPower() {
            // Мониторинг сделок
            const deals = Object.values(db.deals || {});
            document.getElementById('adm-deals').innerHTML = deals.map(d => `
                <div class="bg-zinc-900 p-3 rounded-xl border border-white/5 space-y-2">
                    <div class="flex justify-between text-[10px] font-bold">
                        <span>${d.buyerNick} -> ${d.sellerNick}</span>
                        <span class="text-green-500">${d.price}₽</span>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="forceDeal('${d.id}', 'finish')" class="bg-green-600 flex-1 py-1 rounded text-[8px]">ЗАВЕРШИТЬ</button>
                        <button onclick="forceDeal('${d.id}', 'cancel')" class="bg-red-600 flex-1 py-1 rounded text-[8px]">ОТМЕНИТЬ</button>
                    </div>
                </div>
            `).join('');

            // Чат-логи всех юзеров
            let chatHtml = "";
            Object.keys(db.notifications || {}).forEach(uid => {
                const userMsgs = Object.values(db.notifications[uid]).slice(-3);
                chatHtml += `<div class="p-2 border-b border-zinc-800 opacity-70">
                    <b>ID ${uid}:</b> ${userMsgs.map(m => m.text).join(' | ')}
                </div>`;
            });
            document.getElementById('adm-chat-logs').innerHTML = chatHtml || "Переписок пока нет";
        }

        function forceDeal(id, action) {
            const deal = db.deals[id];
            if(action === 'finish') {
                rdb.ref(`${DB_VER}/users/${deal.sellerId}/bal`).transaction(b => (b || 0) + deal.price);
                rdb.ref(`${DB_VER}/deals/${id}`).remove();
                Swal.fire('Успех','Сделка закрыта админом','success');
            } else {
                rdb.ref(`${DB_VER}/users/${deal.buyerId}/bal`).transaction(b => (b || 0) + deal.price);
                rdb.ref(`${DB_VER}/deals/${id}`).remove();
                Swal.fire('Отмена','Средства возвращены','info');
            }
        }

        function renderAll() {
            document.getElementById('u-bal-head').innerText = me.bal + '₽';
            renderAdminPower();
            const tasks = Object.values(db.tasks || {}).filter(t => t.status === 'active');
            document.getElementById('zadan-list').innerHTML = tasks.map(t => `
                <div class="card p-5 flex justify-between items-center">
                    <div><b class="text-sm">${t.title}</b><p class="text-[9px] opacity-40">${t.addr}</p></div>
                    <b class="text-green-500">${t.price}₽</b>
                </div>`).join('');
        }

        function setTab(t) { 
            document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); 
            document.getElementById(t).classList.add('active'); 
            document.querySelectorAll('nav button').forEach(b=>b.classList.add('opacity-30'));
            if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.remove('opacity-30');
        }
        
        init();
    </script>
</body>
</html>
