<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK V47.0 — ULTRA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap');
        :root { --bg: #030304; --card: #0d0d10; --blue: #3b82f6; --gold: #ffb000; --red: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: 'Manrope', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        
        /* ГИГАНТСКИЙ КОНТЕНТ */
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 35px 25px 180px; scroll-behavior: smooth; }
        .tab-content.active { display: block; animation: ultraFade 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes ultraFade { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 100px; background: rgba(10,10,13,0.98); backdrop-filter: blur(40px); border-top: 1px solid rgba(255,255,255,0.08); display: flex; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #52525b; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; font-size: 11px; font-weight: 800; cursor: pointer; transition: all 0.3s; }
        .nav-btn.active { color: var(--blue); transform: translateY(-5px); }

        .tile { background: var(--card); border-radius: 36px; border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
        
        .gold-text { background: linear-gradient(135deg, #ffb000, #fff2cc, #ffb000); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .gold-item { border: 2px solid var(--gold) !important; box-shadow: 0 0 35px rgba(255, 176, 0, 0.15); }
        .gold-btn { background: linear-gradient(45deg, #ffb000, #ff8f00); color: black !important; font-weight: 900; box-shadow: 0 5px 20px rgba(255, 176, 0, 0.3); }

        input, textarea, select { 
            background: #16161a; border: 1px solid rgba(255,255,255,0.1); border-radius: 26px; 
            padding: 24px; color: white; width: 100%; outline: none; font-size: 16px; 
            transition: all 0.3s;
        }
        input:focus { border-color: var(--blue); box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }

        .btn-main { background: var(--blue); padding: 24px; border-radius: 30px; font-weight: 900; text-transform: uppercase; width: 100%; transition: 0.25s; display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 14px; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3); }
        .btn-main:active { transform: scale(0.94); opacity: 0.9; }
        
        .cat-card { background: var(--card); border-radius: 32px; padding: 30px; text-align: center; border: 1.5px solid rgba(255,255,255,0.04); transition: 0.3s; cursor: pointer; }
        .cat-card:active { transform: scale(0.96); background: #1a1a20; }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 bg-black z-[9999] flex flex-col items-center justify-center">
        <div class="text-5xl font-black italic text-blue-500 animate-pulse tracking-tighter">LYNEOK</div>
        <div class="text-[10px] text-zinc-500 font-black uppercase tracking-[0.5em] mt-4">V47 ULTRA LOADING</div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-8 py-7 flex justify-between items-center bg-zinc-950/95 backdrop-blur-2xl border-b border-white/10 z-50">
            <span class="font-black italic text-3xl tracking-tighter">LYNEOK</span>
            <div id="h_bal" class="bg-blue-600/20 text-blue-500 px-6 py-3 rounded-[24px] font-black text-base italic border border-blue-500/30">0 ₽</div>
        </header>

        <main id="tab_market" class="tab-content active">
            <h2 class="text-sm font-black text-zinc-600 uppercase mb-6 tracking-[0.3em]">Категории игр</h2>
            <div id="cat_view" class="grid grid-cols-2 gap-6"></div>
            
            <div id="items_view" class="hidden space-y-6">
                <button onclick="backToCats()" class="text-blue-500 font-black text-xs uppercase italic flex items-center gap-3 mb-4">
                    <i class="fa-solid fa-chevron-left"></i> КАТЕГОРИИ
                </button>
                <div id="market_grid" class="space-y-5"></div>
            </div>
        </main>

        <main id="tab_sell" class="tab-content">
            <h2 class="text-4xl font-black mb-10 italic uppercase text-blue-500 tracking-tighter">Продать</h2>
            <div class="space-y-6">
                <input type="file" id="i_img" class="hidden" onchange="compImg(this, 'l_img')">
                <label for="i_img" id="l_img" class="w-full h-56 bg-zinc-900 border-2 border-dashed border-white/10 rounded-[40px] flex flex-col items-center justify-center font-black text-xs opacity-50 uppercase overflow-hidden">
                    <i class="fa-solid fa-cloud-arrow-up text-3xl mb-3"></i> ЗАГРУЗИТЬ СКРИНШОТ
                </label>
                <select id="i_cat" class="font-black italic"></select>
                <input id="i_title" placeholder="Краткое название">
                <textarea id="i_desc" placeholder="Описание и данные..." rows="4"></textarea>
                
                <div class="space-y-3">
                    <input id="i_price" type="number" placeholder="Стоимость (₽)" oninput="calcComm()">
                    <div id="comm_info" class="tile bg-blue-500/10 p-5 text-[11px] font-black uppercase text-blue-400 border-blue-500/20 italic rounded-[28px]">
                        К зачислению: 0 ₽ <span class="opacity-30 mx-2">|</span> Комиссия: 0%
                    </div>
                </div>

                <button onclick="postItem()" class="btn-main mt-6">ВЫСТАВИТЬ ЛОТ</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content">
            <h2 class="text-3xl font-black mb-8 italic uppercase text-blue-500 tracking-tighter">Сделки</h2>
            <div id="deals_list" class="space-y-5"></div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="tile p-8 mb-6 flex items-center justify-between">
                <div class="flex items-center gap-6">
                    <div id="p_ava" class="w-20 h-20 bg-zinc-800 rounded-[30px] flex items-center justify-center font-black text-3xl shadow-2xl border border-white/5 text-blue-500">?</div>
                    <div>
                        <div class="flex items-center gap-3">
                            <b id="p_name" class="text-2xl uppercase italic tracking-tighter">...</b>
                            <i id="p_ver" class="fa-solid fa-circle-check text-blue-500 text-xl hidden"></i>
                        </div>
                        <div id="p_rating" class="flex items-center gap-2 text-xs font-black text-gold mt-1">
                            <i class="fa-solid fa-star"></i> <span>0.0</span> <span class="opacity-30 text-white font-normal ml-2">(0 отзывов)</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="boost_card" class="tile p-7 border-gold/40 bg-gold/5 mb-6 hidden">
                <div class="flex justify-between items-center">
                    <div>
                        <h3 class="text-gold font-black italic uppercase text-lg tracking-tighter">LYNEOK BOOST</h3>
                        <p class="text-xs opacity-60">Золотое имя и топ-товары</p>
                    </div>
                    <button onclick="buyBoost()" class="gold-btn px-8 py-4 rounded-[26px] text-xs">25 ₽</button>
                </div>
            </div>

            <button id="adm_btn" onclick="switchTab('admin')" class="hidden tile w-full p-7 text-red-500 font-black text-sm uppercase italic mb-5 border-red-500/30 bg-red-500/5 items-center justify-center gap-4">
                <i class="fa-solid fa-crown"></i> OWNER PANEL
            </button>
            <button onclick="logout()" class="tile w-full p-6 opacity-20 font-black text-xs uppercase tracking-[0.4em] text-center border-none">ВЫЙТИ</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <h1 class="text-4xl font-black text-red-500 mb-10 italic uppercase tracking-tighter">УПРАВЛЕНИЕ</h1>
            <div class="space-y-6">
                
                <div class="tile p-7 border border-blue-500/30 bg-blue-500/5">
                    <p class="text-xs font-black text-blue-500 mb-5 uppercase italic">Комиссия проекта (%)</p>
                    <div class="flex gap-4">
                        <input id="set_comm" type="number" placeholder="0" class="!py-5 text-center text-2xl font-black">
                        <button onclick="updateComm()" class="bg-blue-600 px-10 rounded-[28px] font-black text-sm uppercase">OK</button>
                    </div>
                </div>

                <div id="adm_mod" class="space-y-4"></div>
            </div>
        </main>

        <nav class="nav-bar">
            <div onclick="switchTab('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-shop text-3xl"></i><span>МАРКЕТ</span></div>
            <div onclick="switchTab('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-circle-plus text-3xl"></i><span>ПРОДАТЬ</span></div>
            <div onclick="switchTab('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-receipt text-3xl"></i><span>СДЕЛКИ</span></div>
            <div onclick="switchTab('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user-gear text-3xl"></i><span>ПРОФИЛЬ</span></div>
        </nav>
    </div>

    <script>
        const CFG = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        firebase.initializeApp(CFG);
        const db = firebase.database().ref('lyne_ultra_v47'); // Новая ветка для стабильности

        let me = null, data = {}, tempImg = "", catImg = "";
        const Toast = Swal.mixin({ toast: true, position: 'top', showConfirmButton: false, timer: 2000, background: '#111113', color: '#fff' });

        function init() {
            db.on('value', snap => {
                const val = snap.val();
                data = val || { u:{}, i:{}, d:{}, cat:{}, settings:{comm:0} };
                
                if(!val) db.set(data);

                const sid = localStorage.getItem('lyne_sid');
                if(sid && data.u[sid]) {
                    me = data.u[sid];
                    checkStatus();
                    document.getElementById('app').classList.remove('hidden');
                    render();
                } else {
                    document.getElementById('app').classList.remove('hidden'); 
                }
                document.getElementById('loader').style.display = 'none';
            }, err => {
                location.reload(); // Авто-рестарт при баге сети
            });
        }

        function calcComm() {
            const p = Number(document.getElementById('i_price').value);
            const c = data.settings?.comm || 0;
            const res = p - (p * (c / 100));
            document.getElementById('comm_info').innerHTML = `К зачислению: ${Math.floor(res)} ₽ <span class="opacity-30 mx-2">|</span> Комиссия: ${c}%`;
        }

        function updateComm() {
            const v = Number(document.getElementById('set_comm').value);
            db.child('settings/comm').set(v);
            Toast.fire({ icon: 'success', title: 'ОБНОВЛЕНО' });
        }

        function getRating(uid) {
            const r = Object.values(data.reviews || {}).filter(x => x.sellerId === uid);
            if(r.length === 0) return { avg: "0.0", count: 0 };
            const s = r.reduce((a, b) => a + b.stars, 0);
            return { avg: (s / r.length).toFixed(1), count: r.length };
        }

        function checkStatus() {
            if(!me) return;
            const isAdm = me.n && me.n.toLowerCase() === 'owwner';
            const comp = Object.values(data.d || {}).filter(d => d.sid === me.id && d.status === 'completed').length;
            const rat = getRating(me.id);
            
            if(isAdm) {
                if(!me.ver) db.child(`u/${me.id}/ver`).set(true);
                if(!me.boost) db.child(`u/${me.id}/boost`).set(true);
            } else if(comp >= 10 && rat.avg >= 4.0 && !me.ver) {
                db.child(`u/${me.id}/ver`).set(true);
            }
        }

        function render() {
            if(!me) return;
            document.getElementById('h_bal').innerText = (me.bal || 0).toLocaleString() + ' ₽';
            const nameEl = document.getElementById('p_name');
            nameEl.innerText = me.n;
            
            if(me.boost) {
                nameEl.classList.add('gold-text');
                document.getElementById('p_ava').classList.add('gold-item');
                document.getElementById('boost_card').classList.add('hidden');
            } else {
                document.getElementById('boost_card').classList.remove('hidden');
            }

            const r = getRating(me.id);
            document.getElementById('p_rating').innerHTML = `<i class="fa-solid fa-star"></i> <span>${r.avg}</span> <span class="opacity-30 text-white font-normal ml-2">(${r.count} отзывов)</span>`;
            if(me.ver) document.getElementById('p_ver').classList.remove('hidden');
            
            if(me.n && me.n.toLowerCase() === 'owwner') {
                document.getElementById('adm_btn').style.display = 'flex';
                document.getElementById('set_comm').value = data.settings?.comm || 0;
            }

            renderMarket();
            renderAdmin();
        }

        function renderMarket() {
            const cats = Object.values(data.cat || {});
            document.getElementById('cat_view').innerHTML = cats.map(c => `
                <div class="cat-card" onclick="openCat('${c.name}')">
                    <img src="${c.img}" class="w-20 h-20 mx-auto mb-4 rounded-[28px] object-cover shadow-2xl">
                    <p class="text-[14px] font-black uppercase italic tracking-tight">${c.name}</p>
                </div>`).join('');
            document.getElementById('i_cat').innerHTML = '<option disabled selected>ВЫБЕРИТЕ ИГРУ</option>' + cats.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
        }

        function renderAdmin() {
            const pnd = Object.values(data.i || {}).filter(i => i.status === 'pending');
            document.getElementById('adm_mod').innerHTML = `<p class="text-xs font-black text-zinc-500 uppercase mb-4">Ожидают проверки (${pnd.length})</p>` + pnd.map(i => `
                <div class="tile p-6 mb-4 flex justify-between items-center bg-zinc-900/40">
                    <div>
                        <b class="text-sm uppercase block mb-1">${i.title}</b>
                        <span class="text-[10px] opacity-40 font-bold">ОТ: ${i.seller} • ${i.price}₽</span>
                    </div>
                    <button onclick="db.child('i/${i.id}/status').set('active')" class="bg-blue-600 px-6 py-3 rounded-[20px] text-[11px] font-black">ОДОБРИТЬ</button>
                </div>`).join('') || '<p class="text-center opacity-20 text-xs py-10 font-black uppercase">Нет новых заявок</p>';
        }

        function postItem() {
            const t = document.getElementById('i_title').value;
            const p = Number(document.getElementById('i_price').value);
            const c = document.getElementById('i_cat').value;
            if(!tempImg || !t || !p || c === 'ВЫБЕРИТЕ ИГРУ') return Toast.fire({ icon: 'warning', title: 'ЗАПОЛНИТЕ ВСЁ' });
            
            const id = 'i' + Date.now();
            db.child(`i/${id}`).set({ id, sid: me.id, seller: me.n, title: t, price: p, status: 'pending', img: tempImg, isGold: me.boost || false });
            Toast.fire({ icon: 'success', title: 'ОТПРАВЛЕНО' });
            switchTab('market');
        }

        function compImg(input, target) {
            const f = input.files[0]; if(!f) return;
            const rd = new FileReader();
            rd.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                    canvas.width = 600; canvas.height = 600; ctx.drawImage(img, 0, 0, 600, 600);
                    const b64 = canvas.toDataURL('image/jpeg', 0.85);
                    if(target === 'l_img') tempImg = b64;
                    document.getElementById(target).innerHTML = `<img src="${b64}" class="w-full h-full object-cover rounded-[36px]">`;
                };
                img.src = e.target.result;
            };
            rd.readAsDataURL(f);
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.getElementById('tab_'+t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById('n_'+t)?.classList.add('active');
        }

        function logout() { localStorage.clear(); location.reload(); }
        init();
    </script>
</body>
</html>
