<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>anon:zadan v17.8 IRON WALL</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #050505; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; opacity: 0; transition: opacity 0.5s; }
        body.auth-ok { opacity: 1; }
        .glass { background: rgba(15, 15, 17, 0.9); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.06); border-radius: 28px; }
        .tab { display: none; } .tab.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-main { background: #fff; color: #000; border-radius: 20px; font-weight: 800; padding: 18px; width: 100%; text-transform: uppercase; font-style: italic; border: none; cursor: pointer; }
        .input-box { background: #0f0f11 !important; border: 1px solid #222 !important; color: #fff !important; border-radius: 18px !important; padding: 16px !important; width: 100%; outline: none; }
        .nav-item { opacity: 0.3; transition: 0.3s; padding: 15px; } .nav-item.active { opacity: 1; transform: translateY(-3px); color: #3b82f6; }
        #ban-screen { display:none; position:fixed; inset:0; background:#000; z-index:9999; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
        .swal2-container { z-index: 10000 !important; }
    </style>
</head>
<body id="main-body" class="pb-32">

    <div id="ban-screen">
        <h1 class="text-red-600 font-black text-5xl mb-4 italic">err : 67</h1>
        <div class="glass p-2 mb-6 w-full max-w-sm">
            <video class="w-full rounded-2xl" autoplay loop muted playsinline>
                <source src="https://v1.pinimg.com/videos/mc/720p/8c/21/5c/8c215c0e181419796030c25a7209772a.mp4" type="video/mp4">
            </video>
        </div>
        <div class="glass p-6 w-full max-w-sm text-center">
            <p id="ban-reason" class="text-sm font-bold text-white mb-4 italic">Нарушение правил</p>
            <p id="ban-duration" class="text-xl font-black text-red-600 italic mb-8">Навсегда</p>
            <button onclick="openSupportFromBan()" class="w-full py-4 bg-white text-black rounded-2xl font-black text-[10px] uppercase italic">Оспорить в поддержке</button>
        </div>
    </div>

    <header class="p-6 flex justify-between items-center sticky top-0 z-[100] glass border-none rounded-none rounded-b-[35px]">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter">anon:<span class="text-zinc-600">zadan</span></h1>
        </div>
        <div id="u-bal-head" onclick="setTab('me')" class="bg-white/5 border border-white/10 px-5 py-2.5 rounded-2xl text-xs font-black italic cursor-pointer">0 ₽</div>
    </header>

    <section id="home" class="tab active px-5 pt-6 space-y-6"><div id="zadan-list" class="space-y-4"></div></section>
    
    <section id="create" class="tab px-5 pt-6">
        <div class="glass p-8 space-y-5">
            <input id="z-title" class="input-box" placeholder="Название">
            <input id="z-addr" class="input-box" placeholder="Адрес">
            <input id="z-price" type="number" class="input-box" placeholder="Цена (₽)">
            <input type="file" id="z-file" class="hidden" onchange="document.getElementById('f-st').innerText='Фото ✅'">
            <label for="z-file" class="input-box block text-center py-8 border-dashed border-zinc-700 italic"><span id="f-st">Загрузить фото</span></label>
            <button onclick="uploadTask()" class="btn-main bg-blue-600 text-white">Выставить</button>
        </div>
    </section>

    <section id="support" class="tab px-5 pt-6">
        <div id="chat-list-ui" class="space-y-3">
            <div onclick="openDialog('system')" class="glass p-6 flex items-center gap-5 cursor-pointer">
                <div class="w-14 h-14 bg-white text-black rounded-[22px] flex items-center justify-center text-2xl"><i class="fa-solid fa-headset"></i></div>
                <div><b class="text-sm italic uppercase font-black">Поддержка</b></div>
            </div>
        </div>
        <div id="chat-room-ui" class="hidden">
            <div class="glass p-5 h-[65vh] flex flex-col"><div id="msgs-box" class="flex-1 overflow-y-auto space-y-4"></div><div class="flex gap-2 mt-5"><input id="msg-input" class="input-box" placeholder="Сообщение..."><button onclick="sendMsg()" class="w-14 bg-white text-black rounded-2xl flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button></div></div>
        </div>
    </section>

    <section id="me" class="tab px-5 pt-6 text-center">
        <div class="glass p-10 space-y-8">
            <h3 id="u-nick" class="text-3xl font-black italic uppercase tracking-tighter">...</h3>
            <div id="u-bal-main" class="text-6xl font-black italic tracking-tighter">0 ₽</div>
            <button onclick="logout()" class="btn-main bg-zinc-900 text-zinc-600">Выйти</button>
            <button onclick="setTab('admin_login')" class="opacity-5 text-[8px] mt-10">ADMIN</button>
        </div>
    </section>

    <section id="admin_login" class="tab px-5 pt-20"><input type="password" oninput="if(this.value.toLowerCase()==='kalubxq') setTab('admin')" class="input-box text-center font-black" placeholder="CODE"></section>
    <section id="admin" class="tab px-5 pt-6 pb-40 space-y-8">
        <div id="adm-users-list" class="space-y-2"></div>
    </section>

    <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 h-24 bg-black/95 backdrop-blur-3xl border-t border-white/5 flex justify-around items-center z-[200] px-6 rounded-t-[40px]">
        <button onclick="setTab('home')" class="nav-item active" id="btn-home"><i class="fa-solid fa-home-alt text-2xl"></i></button>
        <button onclick="setTab('create')" class="nav-item" id="btn-create"><i class="fa-solid fa-plus-circle text-3xl"></i></button>
        <button onclick="setTab('support')" class="nav-item" id="btn-support"><i class="fa-solid fa-comments text-2xl"></i></button>
        <button onclick="setTab('me')" class="nav-item" id="btn-me"><i class="fa-solid fa-user-circle text-2xl"></i></button>
    </nav>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", authDomain: "dogx-base.firebaseapp.com", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com", projectId: "dogx-base", storageBucket: "dogx-base.appspot.com", messagingSenderId: "81713249793", appId: "1:81713249793:web:1b44a13e6faf5acfa78a00" };
        const DB_K = 'anon_v17_8_wall';
        firebase.initializeApp(firebaseConfig);
        const rdb = firebase.database();
        const storage = firebase.storage();
        let db = { users:{} }, me = null;

        async function startSystem() {
            rdb.ref(DB_K).on('value', (s) => {
                db = s.val() || { users:{} };
                const uid = localStorage.getItem('anon_uid');
                
                if (uid && db.users[uid]) { 
                    me = db.users[uid]; 
                    document.body.classList.add('auth-ok');
                    if(me.banned) showBan();
                    renderAll(); 
                } else { 
                    forceAuth(); 
                }
            });
        }

        // ПРИНУДИТЕЛЬНАЯ РЕГИСТРАЦИЯ
        async function forceAuth() {
            const { value: f } = await Swal.fire({
                title: 'ДОСТУП ОГРАНИЧЕН',
                text: 'Для входа необходимо зарегистрироваться',
                background: '#0a0a0a',
                color: '#fff',
                html: `
                    <div class="space-y-3 mt-4">
                        <input id="sw-n" class="swal2-input w-full m-0" placeholder="НИКНЕЙМ">
                        <input id="sw-p" type="password" class="swal2-input w-full m-0" placeholder="ПАРОЛЬ">
                        <div class="p-4 bg-blue-500/10 border border-blue-500/20 rounded-2xl">
                            <p class="text-[10px] text-blue-500 font-black uppercase mb-2">Обязательное поле:</p>
                            <input id="sw-t" class="swal2-input w-full m-0 !border-blue-500" placeholder="@TELEGRAM_USERNAME">
                        </div>
                    </div>
                `,
                confirmButtonText: 'ЗАРЕГИСТРИРОВАТЬСЯ',
                allowOutsideClick: false,
                allowEscapeKey: false,
                preConfirm: () => {
                    const n = document.getElementById('sw-n').value.trim();
                    const p = document.getElementById('sw-p').value.trim();
                    const t = document.getElementById('sw-t').value.trim();
                    if(!n || !p || !t) return Swal.showValidationMessage('БРО, ЮЗЕРНЕЙМ В ТГ ОБЯЗАТЕЛЕН!');
                    if(!t.includes('@')) return Swal.showValidationMessage('Юзернейм должен начинаться с @');
                    return [n, p, t];
                }
            });

            if(f) {
                const existing = Object.values(db.users).find(u => u.nick.toLowerCase() === f[0].toLowerCase());
                if(existing) {
                    if(existing.pass === f[1]) {
                        localStorage.setItem('anon_uid', existing.id);
                        location.reload();
                    } else {
                        Swal.fire('Ошибка', 'Ник занят или пароль неверный', 'error').then(forceAuth);
                    }
                } else {
                    const id = "u" + Date.now();
                    await rdb.ref(`${DB_K}/users/${id}`).set({ id, nick: f[0], pass: f[1], tg: f[2], bal: 0, banned: false });
                    localStorage.setItem('anon_uid', id);
                    location.reload();
                }
            }
        }

        function showBan() {
            document.getElementById('ban-screen').style.display = 'flex';
            document.getElementById('ban-reason').innerText = me.banReason || "Нарушение";
            document.getElementById('ban-duration').innerText = me.banTime || "Навсегда";
            document.getElementById('bottom-nav').style.pointerEvents = 'none';
            document.getElementById('bottom-nav').style.opacity = '0.1';
        }

        function openSupportFromBan() {
            document.getElementById('ban-screen').style.display = 'none';
            setTab('support');
            openDialog('system');
        }

        function renderAll() {
            if(!me) return;
            document.getElementById('u-nick').innerText = me.nick;
            document.getElementById('u-bal-head').innerText = (me.bal || 0).toFixed(0) + ' ₽';
            document.getElementById('u-bal-main').innerText = (me.bal || 0).toFixed(0) + ' ₽';
            
            const users = Object.values(db.users);
            document.getElementById('adm-users-list').innerHTML = users.map(u => `
                <div class="p-4 glass flex justify-between items-center ${u.banned?'border-red-600':''}">
                    <div><b class="text-xs font-black uppercase">${u.nick}</b><p class="text-[8px] opacity-40">${u.tg}</p></div>
                    <button onclick="manageUser('${u.id}')" class="text-[9px] font-black uppercase text-zinc-500">УПРАВЛЯТЬ</button>
                </div>
            `).join('');
        }

        async function manageUser(uid) {
            const u = db.users[uid];
            if(u.banned) {
                await rdb.ref(`${DB_K}/users/${uid}`).update({banned:false});
                return;
            }
            const { value: res } = await Swal.fire({
                title: 'БАН ЮЗЕРА',
                html: `<input id="br" class="swal2-input" placeholder="Причина"><input id="bt" class="swal2-input" placeholder="Срок">`,
                preConfirm: () => [document.getElementById('br').value, document.getElementById('bt').value]
            });
            if(res) {
                await rdb.ref(`${DB_K}/users/${uid}`).update({banned:true, banReason: res[0], banTime: res[1]});
            }
        }

        function setTab(t) {
            if(me && me.banned && t !== 'support') return;
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.add('active');
        }

        function openDialog(id) { document.getElementById('chat-list-ui').classList.add('hidden'); document.getElementById('chat-room-ui').classList.remove('hidden'); }
        function logout() { localStorage.removeItem('anon_uid'); location.reload(); }
        
        startSystem();
    </script>
</body>
</html>
