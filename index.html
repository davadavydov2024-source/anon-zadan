<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>anon:zadan (dmd) v2.3 ULTIMATE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { background: #0a0a0b; color: #e4e4e7; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: #161618; border: 1px solid #27272a; border-radius: 24px; overflow: hidden; }
        .tab { display: none; }
        .tab.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn-accent { background: #ffffff; color: #000; border-radius: 16px; font-weight: 800; }
        .input-dark { background: #0f0f10 !important; border: 1px solid #27272a !important; color: white !important; border-radius: 14px !important; outline: none; }
        .swal-input-custom { color: #000 !important; font-weight: 600 !important; }
        .msg-support { border-left: 3px solid #3b82f6; background: #1d1d21; padding: 12px; border-radius: 14px; margin-bottom: 8px; }
        .msg-user { border-right: 3px solid #71717a; background: #27272a; padding: 12px; border-radius: 14px; margin-bottom: 8px; text-align: right; }
        
        /* Стили для бана */
        #ban-screen { display:none; position:fixed; inset:0; background:#0a0a0b; z-index:9999; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
    </style>
</head>
<body class="pb-28">

    <div id="ban-screen">
        <h1 class="text-6xl font-black mb-4">Error: 404</h1>
        <img src="https://cataas.com/cat/cute" class="w-64 h-64 object-cover rounded-3xl mb-6 border-4 border-red-500/50 shadow-2xl">
        <p class="text-xl font-bold text-red-500 mb-2">ВАШ АККАУНТ ЗАБЛОКИРОВАН ❤️‍🩹</p>
        <p id="ban-timer" class="text-zinc-400 mb-8">Осталось дней: ...</p>
        <button onclick="window.open('https://t.me/sswckk')" class="btn-accent px-8 py-4">ОСПОРТИТЬ БАН</button>
    </div>

    <header class="p-5 flex justify-between items-center sticky top-0 bg-[#0a0a0b]/90 backdrop-blur-md z-50 border-b border-white/5">
        <h1 class="text-lg font-extrabold italic tracking-tighter">anon:<span class="text-zinc-600">zadan</span></h1>
        <div id="u-bal-head" class="bg-zinc-900 px-4 py-1.5 rounded-full text-[11px] font-bold border border-zinc-800">0.00₽</div>
    </header>

    <section id="home" class="tab active px-5 pt-4"><div id="zadan-list" class="space-y-4"></div></section>
    
    <section id="create" class="tab px-5 pt-4">
        <div class="card p-6 space-y-4">
            <h2 class="font-bold text-xs opacity-40 uppercase">Создать товар</h2>
            <input id="z-title" class="input-dark w-full p-4 text-xs" placeholder="Название">
            <textarea id="z-desc" class="input-dark w-full p-4 text-xs h-24" placeholder="Описание"></textarea>
            <input type="file" id="z-file" accept="image/*" class="hidden" onchange="handleFile(this)">
            <button onclick="document.getElementById('z-file').click()" class="w-full bg-zinc-900 py-4 rounded-2xl text-[10px] font-bold border border-zinc-800">ФОТО ТОВАРА</button>
            <div id="file-preview" class="hidden text-[9px] text-green-500 text-center font-bold">ФОТО ГОТОВО ✅</div>
            <div class="grid grid-cols-2 gap-3">
                <input id="z-price" type="number" class="input-dark w-full p-4 text-xs" placeholder="Цена">
                <input id="z-addr" class="input-dark w-full p-4 text-xs" placeholder="Город">
            </div>
            <button onclick="createZadan()" class="w-full btn-accent py-5 text-[11px] uppercase">Опубликовать</button>
        </div>
    </section>

    <section id="chats" class="tab px-5 pt-4">
        <div class="card p-5 border-blue-900/20 flex flex-col h-[65vh]">
            <div id="support-messages" class="flex-1 overflow-y-auto space-y-3 mb-4 flex flex-col"></div>
            <div class="flex gap-2">
                <input id="user-msg-input" class="input-dark flex-1 p-3.5 text-[11px]" placeholder="Ваш вопрос...">
                <button onclick="userSendMessage()" class="bg-blue-600 w-12 h-11 rounded-xl flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </section>

    <section id="me" class="tab px-5 pt-4 text-center">
        <div class="card p-8 space-y-6">
            <h3 id="u-nick" class="font-black text-2xl">...</h3>
            <div id="u-bal-main" class="bg-zinc-900 p-7 rounded-[32px] border border-zinc-800 font-black text-3xl">0₽</div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="deposit()" class="btn-accent py-4 text-[10px] uppercase">Пополнить</button>
                <button onclick="withdraw()" class="bg-zinc-800 py-4 rounded-xl text-[10px] uppercase">Вывод</button>
            </div>
            <button onclick="setTab('admin_login')" class="opacity-10 text-[8px] uppercase font-bold">Admin Panel</button>
        </div>
    </section>

    <section id="admin_login" class="tab px-5 pt-20">
        <input type="password" id="admin-pass-input" oninput="if(this.value.toLowerCase()==='kalubxq') setTab('admin')" class="w-full p-6 text-center card outline-none" placeholder="••••">
    </section>

    <section id="admin" class="tab px-5 pb-32 space-y-6 pt-4">
        <div class="card p-5 space-y-3 border-red-500/20">
            <h2 class="text-[10px] font-bold text-red-500 uppercase">Управление пользователем</h2>
            <input id="adm-user-nick" class="input-dark w-full p-3 text-[10px]" placeholder="Ник пользователя">
            <div class="grid grid-cols-2 gap-2">
                <button onclick="adminChangeBal()" class="bg-zinc-800 py-3 rounded-lg text-[9px] font-bold">ИЗМЕНИТЬ БАЛАНС</button>
                <button onclick="adminBanUser()" class="bg-red-900/40 py-3 rounded-lg text-[9px] font-bold text-red-500">ЗАБАНИТЬ</button>
                <button onclick="adminUnbanUser()" class="bg-green-900/40 py-3 rounded-lg text-[9px] font-bold text-green-500">РАЗБАНИТЬ</button>
                <button onclick="adminDeleteUser()" class="bg-black py-3 rounded-lg text-[9px] font-bold text-white border border-white/10">УДАЛИТЬ АКК</button>
            </div>
        </div>

        <div class="card p-5 space-y-3">
            <h2 class="text-[10px] font-bold text-blue-500 uppercase">Модерация товаров</h2>
            <div id="adm-mod-list" class="space-y-3"></div>
        </div>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-black border-t border-zinc-900 flex justify-around items-center z-[100] px-4">
        <button onclick="setTab('home')" id="btn-home"><i class="fa-solid fa-house text-lg"></i></button>
        <button onclick="setTab('create')" id="btn-create" class="opacity-30"><i class="fa-solid fa-plus-circle text-lg"></i></button>
        <button onclick="setTab('chats')" id="btn-chats" class="opacity-30"><i class="fa-solid fa-comment-dots text-lg"></i></button>
        <button onclick="setTab('me')" id="btn-me" class="opacity-30"><i class="fa-solid fa-user text-lg"></i></button>
    </nav>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
          authDomain: "dogx-base.firebaseapp.com",
          databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
          projectId: "dogx-base",
          storageBucket: "dogx-base.firebasestorage.app",
          messagingSenderId: "81713249793",
          appId: "1:81713249793:web:1b44a13e6faf5acfa78a00"
        };

        const DB_VER = 'anon_v2_3'; 
        const TG_TOKEN = "8722822022:AAEmZa-V4-isxXnZ00omU8gAM_NtYevuL9Y";
        const ADMIN_ID = "7040863301";

        firebase.initializeApp(firebaseConfig);
        const rdb = firebase.database();
        const tg = window.Telegram.WebApp;

        let db = { users: {}, tasks: {}, notifications: {} };
        let me = null;
        let tempPhoto = "";

        function init() {
            rdb.ref(DB_VER).on('value', (s) => {
                db = s.val() || { users: {}, tasks: {}, notifications: {} };
                const uid = localStorage.getItem('anon_uid');
                if (uid && db.users && db.users[uid]) {
                    me = db.users[uid];
                    checkBan();
                    renderAll();
                } else {
                    showReg();
                }
            });
        }

        function checkBan() {
            if (me.ban_until && me.ban_until > Date.now()) {
                const days = Math.ceil((me.ban_until - Date.now()) / (1000 * 60 * 60 * 24));
                document.getElementById('ban-screen').style.display = 'flex';
                document.getElementById('ban-timer').innerText = `Ваш аккаунт находится в бане на ${days} дней!`;
                document.body.style.overflow = 'hidden';
            }
        }

        async function sendTG(txt) {
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(txt)}&parse_mode=HTML`);
        }

        async function showReg(isLogin = false) {
            const { value: f } = await Swal.fire({
                title: isLogin ? 'ВХОД' : 'РЕГИСТРАЦИЯ',
                background: '#161618', color: '#fff',
                html: `<input id="s-n" class="swal2-input swal-input-custom" placeholder="Ник">
                       <input id="s-p" type="password" class="swal2-input swal-input-custom" placeholder="Пароль">
                       <button onclick="Swal.clickConfirm(); window.toggleMode()" class="mt-4 text-blue-400 text-xs font-bold underline uppercase block w-full">
                         ${isLogin ? 'Создать новый аккаунт' : 'Войти в существующий'}
                       </button>`,
                confirmButtonText: isLogin ? 'ВОЙТИ' : 'ЗАГРЕАТЬСЯ',
                allowOutsideClick: false,
                preConfirm: () => [document.getElementById('s-n').value.trim(), document.getElementById('s-p').value.trim()]
            });

            if (f && f[0]) {
                const [n, p] = f;
                let user = Object.values(db.users || {}).find(x => x.nick === n);
                if (isLogin) {
                    if (user && user.pass === p) { localStorage.setItem('anon_uid', user.id); location.reload(); }
                    else { await Swal.fire('Ошибка', 'Неверный ник или пароль', 'error'); showReg(true); }
                } else {
                    if (user) { await Swal.fire('Ошибка', 'Ник занят', 'error'); showReg(false); }
                    else {
                        const id = Math.floor(100000+Math.random()*900000).toString();
                        await rdb.ref(DB_VER+'/users/'+id).set({ id, nick: n, pass: p, bal: 0, created: Date.now() });
                        localStorage.setItem('anon_uid', id); location.reload();
                    }
                }
            }
        }
        window.toggleMode = () => { const isL = Swal.getTitle().innerText === 'ВХОД'; showReg(!isL); };

        // АДМИН ФУНКЦИИ
        async function adminChangeBal() {
            const nick = document.getElementById('adm-user-nick').value;
            const user = Object.values(db.users).find(u => u.nick === nick);
            if (!user) return Swal.fire('Не найден','','error');
            const { value: amount } = await Swal.fire({ title: 'Новый баланс', input: 'number', inputValue: user.bal });
            if (amount !== undefined) rdb.ref(`${DB_VER}/users/${user.id}`).update({ bal: Number(amount) });
        }

        async function adminBanUser() {
            const nick = document.getElementById('adm-user-nick').value;
            const user = Object.values(db.users).find(u => u.nick === nick);
            const { value: days } = await Swal.fire({ title: 'На сколько дней бан?', input: 'number' });
            if (days) rdb.ref(`${DB_VER}/users/${user.id}`).update({ ban_until: Date.now() + (days * 86400000) });
        }

        function adminUnbanUser() {
            const nick = document.getElementById('adm-user-nick').value;
            const user = Object.values(db.users).find(u => u.nick === nick);
            rdb.ref(`${DB_VER}/users/${user.id}`).update({ ban_until: 0 });
            Swal.fire('Разбанен','','success');
        }

        function adminDeleteUser() {
            const nick = document.getElementById('adm-user-nick').value;
            const user = Object.values(db.users).find(u => u.nick === nick);
            if (confirm('УДАЛИТЬ АККАУНТ?')) rdb.ref(`${DB_VER}/users/${user.id}`).remove();
        }

        // МОДЕРАЦИЯ И УВЕДОМЛЕНИЯ
        function createZadan() {
            const t = document.getElementById('z-title').value, p = Number(document.getElementById('z-price').value);
            if (!t || p < 20 || me.bal < p) return Swal.fire('Ошибка','Проверьте данные или баланс','error');
            const tid = Date.now().toString();
            rdb.ref(`${DB_VER}/tasks/${tid}`).set({ id: tid, owner: me.id, nick: me.nick, title: t, price: p, status: 'mod', img: tempPhoto, created: Date.now() });
            rdb.ref(`${DB_VER}/users/${me.id}`).update({ bal: me.bal - p });
            sendTG(`📦 НОВЫЙ ТОВАР!\nЮзер: ${me.nick}\nНазвание: ${t}\nЦена: ${p}₽`);
            setTab('home');
        }

        function renderAdmin() {
            const mods = Object.values(db.tasks || {}).filter(t => t.status === 'mod');
            document.getElementById('adm-mod-list').innerHTML = mods.map(t => `
                <div class="card p-3 bg-zinc-900/40">
                    <p class="text-[10px] font-bold">${t.title} (${t.price}₽) от ${t.nick}</p>
                    <div class="flex gap-2 mt-2">
                        <button onclick="modAction('${t.id}','active','одобрен')" class="bg-green-600 flex-1 py-2 rounded text-[8px] font-bold">РАЗРЕШИТЬ</button>
                        <button onclick="modAction('${t.id}','rejected','отклонен')" class="bg-red-600 flex-1 py-2 rounded text-[8px] font-bold">ОТКЛОНИТЬ</button>
                    </div>
                </div>`).join('') || '<p class="text-center opacity-20 text-[10px]">Очередь пуста</p>';
        }

        function modAction(id, status, word) {
            const task = db.tasks[id];
            rdb.ref(`${DB_VER}/tasks/${id}`).update({ status });
            rdb.ref(`${DB_VER}/notifications/${task.owner}/${Date.now()}`).set({ 
                text: `🛒 Ваш товар "${task.title}" был ${word} администрацией.`, from: 'support', time: Date.now() 
            });
            if (status === 'rejected') rdb.ref(`${DB_VER}/users/${task.owner}/bal`).transaction(b => b + task.price);
        }

        // ОСТАЛЬНОЕ
        function deposit() { sendTG(`💰 ЗАЯВКА НА ПОПОЛНЕНИЕ!\nЮзер: ${me.nick} (ID: ${me.id})`); Swal.fire('Заявка отправлена','Админ свяжется с вами','success'); }
        function withdraw() { sendTG(`💸 ЗАЯВКА НА ВЫВОД!\nЮзер: ${me.nick}\nБаланс: ${me.bal}₽`); Swal.fire('Заявка на вывод принята','','info'); }
        function userSendMessage() {
            const txt = document.getElementById('user-msg-input').value.trim();
            if(!txt) return;
            rdb.ref(`${DB_VER}/notifications/${me.id}/${Date.now()}`).set({ text: txt, from: 'user', time: Date.now() });
            sendTG(`📩 СООБЩЕНИЕ В ПОДДЕРЖКУ!\nОт: ${me.nick}\nТекст: ${txt}`);
            document.getElementById('user-msg-input').value = '';
        }

        function renderAll() {
            if(!me) return;
            document.getElementById('u-bal-head').innerText = me.bal + '₽';
            document.getElementById('u-bal-main').innerText = me.bal + '₽';
            document.getElementById('u-nick').innerText = me.nick;
            
            const tasks = Object.values(db.tasks || {}).filter(t => t.status === 'active');
            document.getElementById('zadan-list').innerHTML = tasks.map(t => `<div class="card">${t.img ? `<img src="${t.img}" class="w-full h-44 object-cover">` : ''}<div class="p-5"><b>${t.title}</b> <span class="text-green-400">${t.price}₽</span><p class="text-[10px] opacity-40 mt-1">${t.desc || ''}</p></div></div>`).join('');
            
            const msgs = Object.values(db.notifications?.[me.id] || {}).sort((a,b) => a.time - b.time);
            document.getElementById('support-messages').innerHTML = msgs.map(m => `<div class="${m.from==='user'?'msg-user':'msg-support'}"><p class="text-[10px]">${m.text}</p></div>`).join('');
            
            renderAdmin();
        }

        function handleFile(i) { const r = new FileReader(); r.onload=e=>{tempPhoto=e.target.result;document.getElementById('file-preview').classList.remove('hidden');}; r.readAsDataURL(i.files[0]); }
        function setTab(t) { document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); document.getElementById(t).classList.add('active'); document.querySelectorAll('nav button').forEach(b=>b.classList.add('opacity-30')); if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.remove('opacity-30'); }
        
        init();
    </script>
</body>
</html>
