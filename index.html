<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK OMEGA V120.6</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Courier+Prime&family=Dancing+Script:wght@700&family=EB+Garamond:ital@1&family=Jura:wght@700&family=Kelly+Slab&family=Lobster&family=Monoton&family=Montserrat+Alternates:wght@900&family=Pacifico&family=Playfair+Display:wght@900&family=Press+Start+2P&family=Ruslan+Display&family=Underdog&family=Zeyada&display=swap" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        :root { --bg: #050505; --card: #121214; --text: #ffffff; --blue: #007aff; --gray: #1c1c1e; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .glass { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 24px; }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px 16px 160px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Эффекты ников */
        .nick-rainbow { background: linear-gradient(to right, red, orange, yellow, green, cyan, blue, violet); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rainbow_anim 3s linear infinite; font-weight: 900; }
        @keyframes rainbow_anim { to { background-position: 200% center; } }
        .nick-neon { color: #fff; text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--blue), 0 0 30px var(--blue); }
        .nick-purple { color: #bf00ff; text-shadow: 0 0 10px rgba(191,0,255,0.5); }
        .nick-red { color: #ff3b30; font-weight: 900; }

        /* Эффекты галочек */
        .badge-neon { color: #00f2ff; filter: drop-shadow(0 0 5px #00f2ff); }
        .badge-rainbow { background: linear-gradient(to right, red, yellow, lime, cyan, blue, magenta); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .badge-red { color: #ff3b30; }
        .badge-yellow { color: #ffcc00; }
        .badge-gray { color: #8e8e93; }
        .badge-white { color: #ffffff; }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: rgba(10,10,10,0.8); backdrop-filter: blur(20px); display: flex; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #636366; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 700; transition: 0.2s; }
        .nav-btn.active { color: var(--blue); }

        input, textarea, select { background: var(--gray); border: 1px solid transparent; border-radius: 14px; padding: 14px; color: white; width: 100%; outline: none; font-size: 14px; }
        .btn-blue { background: var(--blue); color: white; border-radius: 16px; font-weight: 800; padding: 16px; width: 100%; border: none; cursor: pointer; }
        #loader { background: #000; z-index: 10000; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }

        /* Стили шрифтов для селектора */
        .f-1 { font-family: 'Comfortaa', cursive; }
        .f-2 { font-family: 'Courier Prime', monospace; }
        .f-3 { font-family: 'Dancing Script', cursive; }
        .f-4 { font-family: 'EB Garamond', serif; }
        .f-5 { font-family: 'Jura', sans-serif; }
        .f-6 { font-family: 'Kelly Slab', cursive; }
        .f-7 { font-family: 'Lobster', cursive; }
        .f-8 { font-family: 'Monoton', cursive; }
        .f-9 { font-family: 'Montserrat Alternates', sans-serif; }
        .f-10 { font-family: 'Pacifico', cursive; }
        .f-11 { font-family: 'Playfair Display', serif; }
        .f-12 { font-family: 'Press Start 2P', cursive; }
        .f-13 { font-family: 'Ruslan Display', cursive; }
        .f-14 { font-family: 'Underdog', cursive; }
        .f-15 { font-family: 'Zeyada', cursive; }
    </style>
</head>
<body>

    <div id="loader"><div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>

    <div id="auth_scr" class="hidden fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-8">
        <h1 class="text-4xl font-black mb-12 italic tracking-tighter">LYNEOK<span class="text-blue-500">.</span></h1>
        <div class="w-full max-sm glass p-6 space-y-4">
            <div id="reg_ext" class="hidden space-y-4">
                <input type="file" id="r_ava" class="hidden" accept="image/*" onchange="upImg(this, 'l_r_ava')">
                <label for="r_ava" id="l_r_ava" class="w-20 h-20 bg-zinc-800 mx-auto rounded-full flex items-center justify-center cursor-pointer border-2 border-dashed border-zinc-700 overflow-hidden">
                    <i class="fa-solid fa-plus text-zinc-500"></i>
                </label>
                <input id="r_email" type="email" placeholder="Email (для уведомлений)">
                <input id="r_tg" placeholder="Telegram (@username)">
            </div>
            <input id="a_n" placeholder="Логин">
            <input id="a_p" type="password" placeholder="Пароль">
            <button onclick="handleAuth()" id="a_btn" class="btn-blue">Войти</button>
            <p onclick="toggleR()" id="a_tog" class="text-center text-[10px] font-black text-zinc-500 uppercase cursor-pointer tracking-widest pt-2">Создать аккаунт</p>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-5 py-4 flex justify-between items-center bg-black/50 backdrop-blur-md sticky top-0 z-50 border-b border-white/5">
            <b class="text-xl italic tracking-tighter">LYNEOK</b>
            <div onclick="switchT('profile')" class="bg-zinc-900 px-4 py-1.5 rounded-full flex items-center gap-2 border border-white/5">
                <span id="h_bal" class="font-bold text-xs">0 ₽</span>
                <img id="h_ava" class="w-6 h-6 rounded-full object-cover bg-zinc-800">
            </div>
        </header>

        <main id="tab_market" class="tab-content active">
            <div id="cat_grid" class="grid grid-cols-2 gap-3"></div>
            <div id="subcat_view" class="hidden space-y-4">
                <button onclick="closeSubcat()" class="text-blue-500 font-bold text-xs flex items-center"><i class="fa-solid fa-chevron-left mr-2"></i> НАЗАД</button>
                <div id="subcat_grid" class="grid grid-cols-2 gap-3"></div>
            </div>
            <div id="items_view" class="hidden space-y-4">
                <button onclick="closeCat()" class="text-blue-500 font-bold text-xs flex items-center"><i class="fa-solid fa-chevron-left mr-2"></i> НАЗАД</button>
                <div id="items_list" class="space-y-3"></div>
            </div>
        </main>

        <main id="tab_sell" class="tab-content">
            <h2 class="text-2xl font-black mb-6">Продать</h2>
            <div class="glass p-5 space-y-4">
                <input type="file" id="s_img" class="hidden" onchange="upImg(this, 'l_s_img')">
                <label for="s_img" id="l_s_img" class="w-full h-40 bg-zinc-900 rounded-2xl flex flex-col items-center justify-center border-2 border-dashed border-zinc-800">
                    <i class="fa-solid fa-camera text-2xl text-zinc-700"></i>
                </label>
                <select id="s_game" onchange="updateSubcats()"></select>
                <select id="s_subcat"></select>
                <input id="s_t" placeholder="Название лота">
                <textarea id="s_acc" rows="3" placeholder="Данные (только для покупателя)"></textarea>
                <input id="s_p" type="number" placeholder="Цена ₽" oninput="calcComm()">
                <div id="s_calc_res" class="text-[10px] text-zinc-500 font-bold px-2">К получению: 0 ₽</div>
                <button onclick="postItem()" class="btn-blue italic">ВЫСТАВИТЬ</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content">
            <h2 class="text-2xl font-black mb-6">Сделки</h2>
            <div id="deals_list" class="space-y-3"></div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="glass p-6 mb-4 text-center relative">
                <img id="p_ava" class="w-24 h-24 rounded-full mx-auto mb-4 object-cover border-4 border-zinc-900">
                <div class="flex items-center justify-center gap-1">
                    <span id="p_n" class="text-2xl font-black">...</span>
                    <span id="p_badge"></span>
                </div>
                <p id="p_status" class="text-xs font-bold mb-6 opacity-60"></p>
                <div class="grid grid-cols-2 gap-3">
                    <button class="btn-blue !bg-white !text-black !text-xs">ПОПОЛНИТЬ</button>
                    <button onclick="askOut()" class="btn-blue !text-xs">ВЫВОД</button>
                </div>
            </div>
            <div id="p_reviews" class="glass p-5 mb-4">
                <h3 class="text-xs font-black uppercase tracking-widest mb-4">Отзывы продавца</h3>
                <div id="reviews_list" class="space-y-3 text-xs"></div>
            </div>
            <button id="adm_btn" onclick="switchT('admin')" class="hidden w-full bg-red-600/10 text-red-500 py-4 rounded-2xl font-bold mb-4 border border-red-600/20">АДМИН-ПАНЕЛЬ</button>
            <button onclick="logout()" class="w-full py-4 text-red-500 opacity-30 text-[10px] font-black uppercase">Выйти</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-black italic">ADMIN</h1>
                <div class="flex flex-col items-end gap-1">
                    <input id="ad_tg_webhook" placeholder="TG Bot Webhook" class="!w-40 !p-2 !text-[9px]">
                    <div class="flex gap-1">
                        <input id="ad_comm_val" type="number" class="!w-12 !p-2 !text-center !text-xs">
                        <button onclick="admSetComm()" class="bg-blue-600 px-3 rounded-lg text-[9px]">OK</button>
                    </div>
                </div>
            </div>

            <div class="space-y-8">
                <section>
                    <h3 class="text-[10px] font-black text-yellow-500 uppercase mb-4 tracking-widest">Модерация товаров</h3>
                    <div id="ad_mod_list" class="space-y-3"></div>
                </section>

                <section>
                    <h3 class="text-[10px] font-black text-purple-500 uppercase mb-4 tracking-widest">Сделки</h3>
                    <div id="ad_deals_list" class="space-y-3"></div>
                </section>

                <section class="glass p-5 border-blue-500/20">
                    <h3 class="text-[10px] font-black text-blue-500 uppercase mb-4 tracking-widest">Конструктор игр</h3>
                    <div class="space-y-3 mb-6">
                        <input id="ad_game_name" placeholder="Название новой игры">
                        <input type="file" id="ad_game_img_input" class="hidden" onchange="upImg(this, 'l_ad_game_img')">
                        <label for="ad_game_img_input" id="l_ad_game_img" class="w-full py-4 bg-zinc-800 rounded-xl text-center text-[10px] font-bold block cursor-pointer">Выбрать иконку</label>
                        <button onclick="admAddGame()" class="w-full bg-white text-black py-4 rounded-xl font-black text-xs">СОЗДАТЬ ИГРУ</button>
                    </div>
                    <div id="ad_games_list" class="space-y-4 pt-4 border-t border-white/5"></div>
                </section>

                <section class="pt-10 border-t border-white/10">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Пользователи</h3>
                        <span id="ad_total_users" class="bg-zinc-800 px-3 py-1 rounded-full text-[10px] font-bold text-blue-400">Всего: 0</span>
                    </div>
                    <input id="ad_user_search" placeholder="Поиск юзера..." class="mb-4 !text-xs" oninput="renderAdminUsers()">
                    <div id="ad_users" class="space-y-4"></div>
                </section>
            </div>
        </main>

        <nav class="nav-bar">
            <div onclick="switchT('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-shop text-xl"></i><span>Маркет</span></div>
            <div onclick="switchT('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-plus-circle text-xl"></i><span>Продать</span></div>
            <div onclick="switchT('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-comments text-xl"></i><span>Сделки</span></div>
            <div onclick="switchT('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user text-xl"></i><span>Профиль</span></div>
        </nav>
    </div>

    <div id="chat_modal" class="hidden fixed inset-0 z-[10001] bg-black flex flex-col">
        <header class="p-5 flex justify-between items-center bg-zinc-900 border-b border-white/5">
            <b id="chat_title">Чат</b>
            <button onclick="closeChatModal()" class="text-3xl">&times;</button>
        </header>
        <div id="chat_body" class="flex-1 overflow-y-auto p-4 flex flex-col gap-2"></div>
        
        <div id="review_form" class="hidden p-4 bg-zinc-900 border-t border-blue-500/30">
            <p class="text-[10px] font-black text-blue-500 uppercase mb-2">Оцените покупку:</p>
            <div class="flex gap-2 mb-2">
                <select id="rev_stars" class="!w-20 !p-2 !text-xs">
                    <option value="5">⭐⭐⭐⭐⭐</option>
                    <option value="4">⭐⭐⭐⭐</option>
                    <option value="3">⭐⭐⭐</option>
                    <option value="2">⭐⭐</option>
                    <option value="1">⭐</option>
                </select>
                <input id="rev_text" placeholder="Ваш отзыв..." class="!p-2 !text-xs">
                <button onclick="submitReview()" class="bg-blue-600 px-4 rounded-xl text-xs font-bold">OK</button>
            </div>
        </div>

        <div id="chat_admin_actions" class="hidden p-3 bg-red-900/10 flex gap-2">
            <button onclick="admDealAction('confirm')" class="flex-1 bg-green-600 py-3 rounded-xl text-[10px] font-black">CONFIRM</button>
            <button onclick="admDealAction('cancel')" class="flex-1 bg-red-600 py-3 rounded-xl text-[10px] font-black">CANCEL</button>
        </div>
        <div class="p-4 bg-zinc-900 flex gap-2 border-t border-white/5 pb-8">
            <input id="chat_input" placeholder="Сообщение...">
            <button onclick="sendMessage()" class="bg-blue-600 px-5 rounded-xl"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        firebase.initializeApp({ apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" });
        const db = firebase.database().ref('lyne_v120_omega');
        const Tst = Swal.mixin({ toast: true, position: 'top', timer: 2000, showConfirmButton: false, background: '#1c1c1e', color: '#fff' });
        emailjs.init("9M8GxYWeMi6hJP6Rg"); 

        let me = null, data = {}, isR = false, tmpImg = "", activeChat = null;

        function init() {
            db.on('value', snap => {
                data = snap.val() || { u:{}, i:{}, d:{}, mod:{}, games:{}, msgs:{}, reviews:{}, settings:{ commission: 10 } };
                if (!snap.exists()) db.set(data);
                const sid = localStorage.getItem('lyne_v120_sid');
                document.getElementById('loader').style.display = 'none';
                if (sid && data.u[sid]) {
                    me = data.u[sid];
                    if(me.banned) return handleBan();
                    document.getElementById('auth_scr').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    if(me.n.toLowerCase() === 'owwner') document.getElementById('adm_btn').classList.remove('hidden');
                    render();
                    if(activeChat) renderMessages();
                } else { 
                    document.getElementById('auth_scr').classList.remove('hidden'); 
                    document.getElementById('app').classList.add('hidden');
                }
            });
        }

        function render() {
            if(!me) return;
            document.getElementById('h_bal').innerText = me.bal + ' ₽';
            document.getElementById('h_ava').src = me.ava || '';
            document.getElementById('p_ava').src = me.ava || '';
            
            // Применяем кастомные стили ника
            const pn = document.getElementById('p_n');
            pn.innerText = me.n;
            pn.className = 'text-2xl font-black ' + (me.nickEffect || '') + ' ' + (me.fontClass || '');
            
            // Применяем кастомную галочку
            document.getElementById('p_badge').innerHTML = me.badgeType ? `<i class="fa-solid fa-circle-check ${me.badgeType}"></i>` : (me.verified ? '<i class="fa-solid fa-circle-check badge-neon"></i>' : '');
            
            document.getElementById('p_status').innerText = me.text || 'Нет статуса';
            document.getElementById('p_status').style.fontFamily = me.fontFamily || 'inherit';

            // Маркет
            const gs = Object.values(data.games || {});
            document.getElementById('cat_grid').innerHTML = gs.map(g => `<div class="glass p-5 text-center cursor-pointer" onclick="openGame('${g.id}')"><img src="${g.img}" class="w-16 h-16 mx-auto mb-3 rounded-2xl object-cover shadow-lg"><b class="text-sm">${g.name}</b></div>`).join('');
            document.getElementById('s_game').innerHTML = gs.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
            
            // Сделки
            const myDeals = Object.values(data.d || {}).filter(d => d.bid === me.id || d.sid === me.id);
            document.getElementById('deals_list').innerHTML = myDeals.reverse().map(d => `<div class="glass p-4 flex justify-between items-center"><div><b class="text-sm">${d.t}</b><div class="text-[10px] text-zinc-500">${d.p} ₽ • ${d.status}</div></div><button onclick="openChat('${d.id}')" class="bg-blue-600/10 text-blue-500 px-5 py-2 rounded-xl text-[10px] font-black uppercase">ЧАТ</button></div>`).join('');

            // Отзывы в профиле
            const myRev = Object.values(data.reviews[me.id] || {});
            document.getElementById('reviews_list').innerHTML = myRev.length ? myRev.map(r => `<div class="bg-zinc-900/50 p-3 rounded-xl"><b>${'⭐'.repeat(r.stars)}</b><p class="mt-1">${r.text}</p><div class="text-[9px] opacity-40 mt-1">От: ${r.from}</div></div>`).join('') : '<p class="opacity-30">Отзывов нет</p>';

            if(me.n.toLowerCase() === 'owwner') {
                document.getElementById('ad_comm_val').value = data.settings.commission;
                document.getElementById('ad_tg_webhook').value = data.settings.tg_webhook || '';
                document.getElementById('ad_total_users').innerText = 'Всего: ' + Object.keys(data.u).length;
                renderAdminUsers(); renderAdminMods(); renderAdminDeals(); renderAdminGames();
            }
        }

        // --- АДМИНКА: ПОЛЬЗОВАТЕЛИ ---
        function renderAdminUsers() {
            const q = document.getElementById('ad_user_search').value.toLowerCase();
            const users = Object.values(data.u).filter(u => u.n.toLowerCase().includes(q));
            
            document.getElementById('ad_users').innerHTML = users.map(u => `
                <div class="p-4 bg-zinc-900 rounded-2xl border border-white/5">
                    <div class="flex items-center gap-3 mb-4">
                        <img src="${u.ava}" class="w-10 h-10 rounded-full object-cover">
                        <b class="${u.nickEffect || ''} ${u.fontClass || ''}" style="color:${u.color}">${u.n}</b>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <div>
                            <p class="text-[8px] uppercase font-bold text-zinc-500 ml-1">Галочка</p>
                            <select id="au_badge_${u.id}" class="!p-2 !text-[10px]">
                                <option value="">Нет</option>
                                <option value="badge-white" ${u.badgeType==='badge-white'?'selected':''}>Белая</option>
                                <option value="badge-gray" ${u.badgeType==='badge-gray'?'selected':''}>Серая</option>
                                <option value="badge-yellow" ${u.badgeType==='badge-yellow'?'selected':''}>Желтая</option>
                                <option value="badge-red" ${u.badgeType==='badge-red'?'selected':''}>Красная</option>
                                <option value="badge-neon" ${u.badgeType==='badge-neon'?'selected':''}>Неоновая</option>
                                <option value="badge-rainbow" ${u.badgeType==='badge-rainbow'?'selected':''}>Радужная</option>
                            </select>
                        </div>
                        <div>
                            <p class="text-[8px] uppercase font-bold text-zinc-500 ml-1">Ник эффект</p>
                            <select id="au_nick_${u.id}" class="!p-2 !text-[10px]">
                                <option value="">Нет</option>
                                <option value="nick-red" ${u.nickEffect==='nick-red'?'selected':''}>Красный</option>
                                <option value="nick-purple" ${u.nickEffect==='nick-purple'?'selected':''}>Фиолет</option>
                                <option value="nick-neon" ${u.nickEffect==='nick-neon'?'selected':''}>Неон</option>
                                <option value="nick-rainbow" ${u.nickEffect==='nick-rainbow'?'selected':''}>Радуга</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <p class="text-[8px] uppercase font-bold text-zinc-500 ml-1">Шрифт (15 вариантов)</p>
                        <select id="au_font_${u.id}" class="!p-2 !text-[10px]">
                            <option value="">Стандарт</option>
                            <option value="f-1" ${u.fontClass==='f-1'?'selected':''}>Comfortaa</option>
                            <option value="f-2" ${u.fontClass==='f-2'?'selected':''}>Courier</option>
                            <option value="f-3" ${u.fontClass==='f-3'?'selected':''}>Dancing</option>
                            <option value="f-4" ${u.fontClass==='f-4'?'selected':''}>Garamond</option>
                            <option value="f-5" ${u.fontClass==='f-5'?'selected':''}>Jura</option>
                            <option value="f-6" ${u.fontClass==='f-6'?'selected':''}>Kelly Slab</option>
                            <option value="f-7" ${u.fontClass==='f-7'?'selected':''}>Lobster</option>
                            <option value="f-8" ${u.fontClass==='f-8'?'selected':''}>Monoton</option>
                            <option value="f-9" ${u.fontClass==='f-9'?'selected':''}>Montserrat</option>
                            <option value="f-10" ${u.fontClass==='f-10'?'selected':''}>Pacifico</option>
                            <option value="f-11" ${u.fontClass==='f-11'?'selected':''}>Playfair</option>
                            <option value="f-12" ${u.fontClass==='f-12'?'selected':''}>Pixel</option>
                            <option value="f-13" ${u.fontClass==='f-13'?'selected':''}>Ruslan</option>
                            <option value="f-14" ${u.fontClass==='f-14'?'selected':''}>Underdog</option>
                            <option value="f-15" ${u.fontClass==='f-15'?'selected':''}>Zeyada</option>
                        </select>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="admSaveUserEx('${u.id}')" class="bg-blue-600 flex-1 py-2 rounded-lg text-[10px] font-black uppercase">Применить</button>
                        <button onclick="admEditBal('${u.id}', 500)" class="bg-zinc-800 px-4 py-2 rounded-lg text-[10px] font-black text-green-500">+500</button>
                    </div>
                </div>
            `).join('');
        }

        function admSaveUserEx(uid) {
            db.child(`u/${uid}`).update({
                badgeType: document.getElementById(`au_badge_${uid}`).value,
                nickEffect: document.getElementById(`au_nick_${uid}`).value,
                fontClass: document.getElementById(`au_font_${uid}`).value
            });
            Tst.fire({icon:'success', title:'Успешно'});
        }

        // --- ИГРЫ И КАТЕГОРИИ ---
        function renderAdminGames() {
            document.getElementById('ad_games_list').innerHTML = Object.values(data.games || {}).map(g => `
                <div class="bg-zinc-900 p-4 rounded-xl border border-white/5">
                    <div class="flex justify-between items-center mb-3">
                        <b>${g.name}</b>
                        <button onclick="db.child('games/${g.id}').remove()" class="text-red-500 text-xs">DEL</button>
                    </div>
                    <div class="flex gap-2 mb-3">
                        <input id="incat_${g.id}" class="!p-2 !text-xs" placeholder="Новая категория">
                        <button onclick="admAddCat('${g.id}')" class="bg-blue-600 px-4 rounded-lg">+</button>
                    </div>
                    <div class="flex flex-wrap gap-1">
                        ${Object.values(g.cats||{}).map(c => `<span class="bg-black/40 px-2 py-1 rounded-md text-[9px] border border-white/5">${c.name} <i class="fa-solid fa-xmark ml-1 cursor-pointer" onclick="db.child('games/${g.id}/cats/${c.id}').remove()"></i></span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function admAddCat(gid) {
            const name = document.getElementById('incat_'+gid).value; if(!name) return;
            const cid = 'c'+Date.now();
            db.child(`games/${gid}/cats/${cid}`).set({id:cid, name:name});
            document.getElementById('incat_'+gid).value = '';
        }

        // --- ОТЗЫВЫ ---
        function submitReview() {
            const stars = document.getElementById('rev_stars').value;
            const text = document.getElementById('rev_text').value;
            if(!text) return;
            const deal = data.d[activeChat];
            const rid = 'r'+Date.now();
            db.child(`reviews/${deal.sid}/${rid}`).set({ from: me.n, stars: Number(stars), text: text });
            db.child(`d/${activeChat}/reviewed`).set(true);
            Tst.fire({icon:'success', title:'Спасибо за отзыв!'});
            closeChatModal();
        }

        // --- УВЕДОМЛЕНИЯ В TG ---
        function notifyBot(msg) {
            const url = data.settings.tg_webhook;
            if(!url) return;
            fetch(url, { method: 'POST', body: JSON.stringify({ message: msg }), headers: {'Content-Type': 'application/json'} }).catch(e => console.log(e));
        }

        // --- ОСТАЛЬНЫЕ ФУНКЦИИ (БЕЗ ИЗМЕНЕНИЙ) ---
        function openGame(gid) { 
            document.getElementById('cat_grid').classList.add('hidden'); 
            document.getElementById('subcat_view').classList.remove('hidden'); 
            const g = data.games[gid]; 
            document.getElementById('subcat_grid').innerHTML = Object.values(g.cats||{}).map(c => `<div class="glass p-5 text-center cursor-pointer" onclick="openItems('${gid}', '${c.name}')"><b class="text-sm">${c.name}</b></div>`).join(''); 
        }
        function openItems(gid, cat) { 
            document.getElementById('subcat_view').classList.add('hidden'); 
            document.getElementById('items_view').classList.remove('hidden'); 
            const its = Object.values(data.i||{}).filter(i=>i.gameId===gid && i.cat===cat); 
            document.getElementById('items_list').innerHTML = its.length ? its.map(i=>`<div class="glass p-4 flex justify-between items-center"><div class="flex items-center gap-3"><img src="${i.img}" class="w-10 h-10 rounded-lg"><b class="text-sm">${i.title} <br><span class="text-blue-500">${i.price} ₽</span></b></div><button onclick="buyItem('${i.id}')" class="bg-white text-black px-4 py-2 rounded-xl text-xs font-black">КУПИТЬ</button></div>`).join('') : '<p class="text-center opacity-30 py-10">Пусто</p>'; 
        }
        function buyItem(id) { 
            const i = data.i[id]; 
            if(me.bal < i.price) return Tst.fire({icon:'error', title:'Недостаточно средств'});
            const did = 'd'+Date.now();
            db.child(`u/${me.id}/bal`).transaction(b => b - i.price);
            db.child(`u/${i.sid}/bal`).transaction(b => (b||0) + Math.floor(i.price * (1-(data.settings.commission/100))));
            db.child(`d/${did}`).set({id:did, bid:me.id, bn:me.n, sid:i.sid, t:i.title, p:i.price, status:'active'});
            db.child(`i/${id}`).remove();
            notifyBot(`💰 Продажа! ${me.n} купил ${i.title} за ${i.price}₽`);
            switchT('chats');
        }

        function openChat(did) { 
            activeChat = did; const d = data.d[did];
            document.getElementById('chat_modal').classList.remove('hidden'); 
            document.getElementById('chat_title').innerText = d.t;
            if(me.n.toLowerCase()==='owwner') document.getElementById('chat_admin_actions').classList.remove('hidden');
            if(d.status === 'active' && d.bid === me.id && !d.reviewed) document.getElementById('review_form').classList.remove('hidden');
            else document.getElementById('review_form').classList.add('hidden');
            renderMessages(); 
        }
        function sendMessage() { 
            const t = document.getElementById('chat_input').value; if(!t) return; 
            db.child(`msgs/${activeChat}/${Date.now()}`).set({sender: me.n, text:t}); 
            document.getElementById('chat_input').value = ""; 
        }
        function renderMessages() { 
            const msgs = Object.values(data.msgs[activeChat] || {}); 
            document.getElementById('chat_body').innerHTML = msgs.map(m => `<div class="max-w-[80%] p-3 rounded-2xl text-xs ${m.sender===me.n ? 'bg-blue-600 self-end':'bg-zinc-800 self-start'}"><b>${m.sender}</b><br>${m.text}</div>`).join(''); 
            const b = document.getElementById('chat_body'); b.scrollTop = b.scrollHeight; 
        }

        function upImg(i, tid) { const r = new FileReader(); r.onload = e => { tmpImg = e.target.result; document.getElementById(tid).innerHTML = `<img src="${tmpImg}" class="w-full h-full object-cover rounded-xl">`; }; r.readAsDataURL(i.files[0]); }
        function switchT(t) { document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active')); document.getElementById('tab_'+t).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active')); document.getElementById('n_'+t)?.classList.add('active'); if(t==='market') closeSubcat(); }
        function logout() { localStorage.clear(); location.reload(); }
        function handleBan() { document.body.innerHTML = '<div class="h-screen bg-red-900 text-white flex items-center justify-center font-black uppercase">Blocked</div>'; }
        function closeChatModal() { activeChat = null; document.getElementById('chat_modal').classList.add('hidden'); }
        function closeSubcat() { document.getElementById('subcat_view').classList.add('hidden'); document.getElementById('items_view').classList.add('hidden'); document.getElementById('cat_grid').classList.remove('hidden'); }
        function closeCat() { document.getElementById('items_view').classList.add('hidden'); document.getElementById('subcat_view').classList.remove('hidden'); }
        function updateSubcats() { const g = data.games[document.getElementById('s_game').value]; if(g && g.cats) document.getElementById('s_subcat').innerHTML = Object.values(g.cats).map(c => `<option value="${c.name}">${c.name}</option>`).join(''); }
        function calcComm() { const p = Number(document.getElementById('s_p').value || 0); const c = data.settings.commission; document.getElementById('s_calc_res').innerText = `К получению: ${Math.floor(p * (1-(c/100)))} ₽`; }
        function handleAuth() { 
            const n = document.getElementById('a_n').value, p = document.getElementById('a_p').value; 
            if(isR){ 
                const id = 'u'+Date.now(); 
                db.child(`u/${id}`).set({id, n, p, email: document.getElementById('r_email').value, tg:document.getElementById('r_tg').value, ava:tmpImg, bal:0, banned:false, color:'#fff'}); 
                localStorage.setItem('lyne_v120_sid', id); location.reload();
            } else { 
                const u = Object.values(data.u).find(x => x.n === n && x.p === p); 
                if(u) { localStorage.setItem('lyne_v120_sid', u.id); location.reload(); } else { alert('Ошибка'); } 
            } 
        }
        function toggleR() { isR = !isR; document.getElementById('reg_ext').classList.toggle('hidden'); document.getElementById('a_tog').innerText = isR ? 'Есть аккаунт' : 'Создать аккаунт'; }
        function admSetComm() { db.child('settings/commission').set(Number(document.getElementById('ad_comm_val').value)); db.child('settings/tg_webhook').set(document.getElementById('ad_tg_webhook').value); Tst.fire({icon:'success', title:'Обновлено'}); }
        function postItem() { const t=document.getElementById('s_t').value, p=document.getElementById('s_p').value; if(!t||!p||!tmpImg) return; const id='i'+Date.now(); db.child(`mod/${id}`).set({id, sid:me.id, seller:me.n, title:t, price:Number(p), gameId:document.getElementById('s_game').value, cat:document.getElementById('s_subcat').value, acc_data:document.getElementById('s_acc').value, img:tmpImg}); switchT('market'); Tst.fire({icon:'success', title:'На модерации'}); }
        function admAddGame() { const n=document.getElementById('ad_game_name').value; if(!n||!tmpImg) return; const id='g'+Date.now(); db.child(`games/${id}`).set({id, name:n, img:tmpImg}); Tst.fire({icon:'success', title:'Игра создана'}); }

        init();
    </script>
</body>
</html>
