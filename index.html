<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>anon:zadan (dmd) v2.2 - Support Chat & Old UI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background: #0a0a0b; color: #e4e4e7; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: #161618; border: 1px solid #27272a; border-radius: 24px; overflow: hidden; }
        .tab { display: none; animation: slideUp 0.3s ease; }
        .tab.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .btn-accent { background: #ffffff; color: #000; border-radius: 16px; font-weight: 800; }
        .input-dark { background: #0f0f10 !important; border: 1px solid #27272a !important; color: white !important; border-radius: 14px !important; outline: none; }
        
        /* Стили чата */
        .msg-support { border-left: 3px solid #3b82f6; background: #1d1d21; padding: 12px; border-radius: 14px; margin-bottom: 10px; }
        .msg-user { border-right: 3px solid #71717a; background: #161618; padding: 12px; border-radius: 14px; margin-bottom: 10px; text-align: right; }
        .support-btn { background: #27272a; border: 1px solid #3f3f46; color: white; padding: 6px 10px; border-radius: 8px; font-size: 9px; margin-top: 5px; display: inline-block; margin-right: 4px; }
    </style>
</head>
<body class="pb-28">

    <header class="p-5 flex justify-between items-center sticky top-0 bg-[#0a0a0b]/80 backdrop-blur-md z-50 border-b border-zinc-900/50">
        <h1 class="text-lg font-extrabold tracking-tighter italic">anon:<span class="text-zinc-500">zadan</span></h1>
        <div id="u-bal-head" class="bg-zinc-900 px-4 py-1.5 rounded-full text-[11px] font-bold border border-zinc-800">0.00₽</div>
    </header>

    <section id="home" class="tab active px-5 pt-4"><div id="zadan-list" class="space-y-4"></div></section>
    
    <section id="create" class="tab px-5 pt-4">
        <div class="card p-6 space-y-4">
            <h2 class="font-bold text-sm uppercase tracking-widest opacity-40">Новое задание</h2>
            <input id="z-title" class="input-dark w-full p-4 text-xs" placeholder="Заголовок">
            <textarea id="z-desc" class="input-dark w-full p-4 text-xs h-24" placeholder="Описание задачи"></textarea>
            
            <div class="relative">
                <input type="file" id="z-file" accept="image/*" class="hidden" onchange="handleFile(this)">
                <button onclick="document.getElementById('z-file').click()" class="w-full bg-zinc-900 py-4 rounded-2xl text-[10px] font-bold border border-zinc-800">
                    <i class="fa-solid fa-camera mr-2 opacity-40"></i> ПРИКРЕПИТЬ ФОТО
                </button>
                <div id="file-preview" class="hidden mt-2 text-[9px] text-green-500 text-center font-bold">ФОТО ГОТОВО ✅</div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <input id="z-price" type="number" class="input-dark w-full p-4 text-xs" placeholder="Цена (от 20₽)">
                <input id="z-addr" class="input-dark w-full p-4 text-xs" placeholder="Адрес (РФ)">
            </div>
            <p class="text-[9px] opacity-30 italic">* Минимальная цена товара — 20₽</p>
            <button onclick="createZadan()" class="w-full btn-accent py-5 text-[10px] uppercase">Отправить на модерацию</button>
        </div>
    </section>

    <section id="chats" class="tab px-5 pt-4 space-y-4">
        <div class="card p-5 border-blue-900/20">
            <div class="flex items-center gap-2 mb-4">
                <i class="fa-solid fa-circle-check text-blue-500"></i>
                <span class="text-xs font-bold uppercase tracking-widest">Поддержка anon:zadan ✅</span>
            </div>
            
            <div id="support-messages" class="max-h-64 overflow-y-auto space-y-3 mb-4 pr-1"></div>

            <div class="flex gap-2">
                <input id="user-msg-input" class="input-dark flex-1 p-3 text-[10px]" placeholder="Написать сообщение...">
                <button onclick="userSendMessage()" class="bg-blue-600 w-12 h-10 rounded-xl flex items-center justify-center"><i class="fa-solid fa-paper-plane text-xs"></i></button>
            </div>
        </div>
        <div id="deal-list" class="space-y-3"></div>
    </section>

    <section id="me" class="tab px-5 pt-4 text-center">
        <div class="card p-8">
            <h3 id="u-nick" class="font-black text-xl mb-1">...</h3>
            <p id="u-id" class="text-[10px] opacity-30 mb-6 italic">ID: 000000</p>
            <div id="u-bal-main" class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800 font-black text-3xl mb-8">0₽</div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="deposit()" class="btn-accent py-4 text-[10px] uppercase">Пополнить</button>
                <button onclick="withdraw()" class="btn-main bg-zinc-800 py-4 rounded-xl text-[10px] text-white/70 uppercase">Вывод</button>
            </div>
            <button onclick="setTab('admin_login')" class="mt-8 text-[9px] opacity-10 uppercase font-bold tracking-[4px]">Admin Panel</button>
        </div>
    </section>

    <section id="admin_login" class="tab px-5 pt-20">
        <input type="password" id="admin-pass-input" oninput="if(this.value.toLowerCase()==='kalubxq') setTab('admin')" class="w-full p-6 text-center card outline-none border-zinc-700" placeholder="••••">
    </section>

    <section id="admin" class="tab px-5 pb-32 space-y-6 pt-4">
        <div class="card p-5 space-y-3">
            <h2 class="text-[10px] font-bold text-blue-500 uppercase">📢 Рассылка / Ответ</h2>
            <input id="adm-target-id" class="input-dark w-full p-3 text-[10px]" placeholder="ID юзера (пусто = ВСЕМ)">
            <textarea id="adm-msg-text" class="input-dark w-full p-3 text-[10px] h-16" placeholder="Текст сообщения..."></textarea>
            <div id="btn-builder" class="space-y-2"></div>
            <button onclick="addBtnField()" class="w-full py-2 text-[8px] text-zinc-500 border border-dashed border-zinc-800 rounded-lg">+ КНОПКА</button>
            <button onclick="adminSendSmartMsg()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl text-[10px]">ОТПРАВИТЬ</button>
        </div>
        <div id="adm-full-list" class="space-y-4"></div>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-black/95 border-t border-zinc-900 flex justify-around items-center z-[100]">
        <button onclick="setTab('home')" id="btn-home" class="flex flex-col items-center gap-1"><i class="fa-solid fa-house text-lg"></i></button>
        <button onclick="setTab('create')" id="btn-create" class="flex flex-col items-center gap-1 opacity-30"><i class="fa-solid fa-plus-circle text-lg"></i></button>
        <button onclick="setTab('chats')" id="btn-chats" class="flex flex-col items-center gap-1 opacity-30"><i class="fa-solid fa-comment-dots text-lg"></i></button>
        <button onclick="setTab('me')" id="btn-me" class="flex flex-col items-center gap-1 opacity-30"><i class="fa-solid fa-user text-lg"></i></button>
    </nav>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
          authDomain: "dogx-base.firebaseapp.com",
          databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
          projectId: "dogx-base",
          storageBucket: "dogx-base.firebasestorage.app",
          messagingSenderId: "81713249793",
          appId: "1:81713249793:web:1b44a13e6faf5acfa78a00"
        };

        const DB_PATH = 'anon_zadan_v2_2';
        const ADMIN_ID = "7040863301";
        const TG_TOKEN = "8722822022:AAEmZa-V4-isxXnZ00omU8gAM_NtYevuL9Y";

        const tg = window.Telegram.WebApp;
        firebase.initializeApp(firebaseConfig);
        const rdb = firebase.database();

        let db = { users: {}, tasks: {}, notifications: {} };
        let me = null;
        let tempPhoto = "";

        function init() {
            rdb.ref(DB_PATH).on('value', (s) => {
                db = s.val() || { users: {}, tasks: {}, notifications: {} };
                const uid = localStorage.getItem('anon_uid');
                if (uid && db.users[uid]) { me = db.users[uid]; renderAll(); } else { showReg(); }
            });
        }

        // ОТПРАВКА СООБЩЕНИЯ ОТ ЮЗЕРА
        function userSendMessage() {
            const txt = document.getElementById('user-msg-input').value.trim();
            if(!txt) return;
            const mid = Date.now();
            rdb.ref(`${DB_PATH}/notifications/${me.id}/${mid}`).set({
                text: txt,
                from: 'user',
                time: Date.now()
            });
            document.getElementById('user-msg-input').value = '';
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent('📩 Новое сообщение от '+me.nick+':\n'+txt)}`);
        }

        function renderChats() {
            const msgs = db.notifications?.[me.id] || {};
            const sorted = Object.values(msgs).sort((a,b) => a.time - b.time);
            const container = document.getElementById('support-messages');
            container.innerHTML = sorted.map(m => `
                <div class="${m.from === 'user' ? 'msg-user' : 'msg-support'}">
                    <p class="text-[10px]">${m.text}</p>
                    ${(m.buttons || []).map(b => `<button onclick="handleBtn('${b.type}','${b.val}')" class="support-btn">${b.name}</button>`).join('')}
                    <div class="text-[6px] opacity-20 mt-1 uppercase font-bold">${new Date(m.time).toLocaleTimeString()}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        function handleBtn(type, val) {
            if(type === 'link') window.open(val, '_blank');
            if(type === 'msg') Swal.fire({ text: val, background: '#161618', color: '#fff' });
        }

        // АДМИН ФУНКЦИИ
        function addBtnField() {
            const div = document.createElement('div');
            div.className = "flex gap-1 adm-btn-row";
            div.innerHTML = `<input class="b-name input-dark p-2 text-[8px] w-1/3" placeholder="Имя"><input class="b-val input-dark p-2 text-[8px] flex-1" placeholder="Линк/Текст"><select class="b-type input-dark p-2 text-[8px]"><option value="link">Линк</option><option value="msg">Текст</option></select><button onclick="this.parentElement.remove()" class="text-red-500 px-1">×</button>`;
            document.getElementById('btn-builder').appendChild(div);
        }

        function adminSendSmartMsg() {
            const tid = document.getElementById('adm-target-id').value.trim();
            const text = document.getElementById('adm-msg-text').value.trim();
            if(!text) return;
            const buttons = [];
            document.querySelectorAll('.adm-btn-row').forEach(row => {
                buttons.push({ name: row.querySelector('.b-name').value, type: row.querySelector('.b-type').value, val: row.querySelector('.b-val').value });
            });
            const mid = Date.now();
            const payload = { text, buttons, from: 'support', time: Date.now() };
            if(tid) rdb.ref(`${DB_PATH}/notifications/${tid}/${mid}`).set(payload);
            else Object.keys(db.users).forEach(uid => rdb.ref(`${DB_PATH}/notifications/${uid}/${mid}`).set(payload));
            document.getElementById('adm-msg-text').value = '';
            document.getElementById('btn-builder').innerHTML = '';
        }

        function renderAdmin() {
            const list = Object.values(db.tasks || {});
            document.getElementById('adm-full-list').innerHTML = list.map(t => `
                <div class="card p-3 bg-zinc-900/40">
                    <p class="text-[10px] font-bold">${t.title} - ${t.price}₽ (ID: ${t.owner})</p>
                    <div class="flex gap-2 mt-2">
                        ${t.status === 'mod' ? `<button onclick="rdb.ref('${DB_PATH}/tasks/${t.id}').update({status:'active'})" class="bg-green-600 text-[8px] flex-1 py-2 rounded">ОДОБРИТЬ</button>` : ''}
                        <button onclick="rdb.ref('${DB_PATH}/tasks/${t.id}').remove()" class="bg-red-900/50 text-[8px] flex-1 py-2 rounded">УДАЛИТЬ</button>
                    </div>
                </div>`).join('');
        }

        // БАЗОВЫЕ ФУНКЦИИ
        function handleFile(input) {
            const reader = new FileReader();
            reader.onload = (e) => { tempPhoto = e.target.result; document.getElementById('file-preview').classList.remove('hidden'); };
            reader.readAsDataURL(input.files[0]);
        }

        function createZadan() {
            const t = document.getElementById('z-title').value, p = parseInt(document.getElementById('z-price').value);
            if (!t || !p || p < 20 || me.bal < Math.ceil(p * 1.03)) return Swal.fire('Ошибка','Заполните все поля и проверьте баланс','error');
            const tid = Date.now().toString();
            rdb.ref(DB_PATH + '/tasks/' + tid).set({ id: tid, owner: me.id, title: t, price: p, status: 'mod', addr: document.getElementById('z-addr').value, desc: document.getElementById('z-desc').value, img: tempPhoto, created_at: Date.now() });
            rdb.ref(DB_PATH + '/users/' + me.id).update({ bal: me.bal - Math.ceil(p * 1.03) });
            tempPhoto = ""; document.getElementById('file-preview').classList.add('hidden');
            setTab('home');
        }

        function renderHome() {
            const list = Object.values(db.tasks || {}).filter(t => t.status === 'active').sort((a,b) => b.created_at - a.created_at);
            document.getElementById('zadan-list').innerHTML = list.map(t => `<div class="card">${t.img ? `<img src="${t.img}" class="w-full h-44 object-cover">` : ''}<div class="p-5"><b>${t.title}</b> <span class="text-green-400">${t.price}₽</span><p class="text-[10px] opacity-40 mt-1">${t.desc}</p><button class="w-full btn-accent py-3 mt-4 text-[10px] uppercase font-bold tracking-widest">Взять задание</button></div></div>`).join('');
        }

        function setTab(t) {
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.add('opacity-30'));
            if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.remove('opacity-30');
        }

        async function showReg() {
            const tgUser = tg.initDataUnsafe?.user;
            const { value: f } = await Swal.fire({ title: 'ВХОД', html: `<input id="s-n" class="swal2-input" placeholder="Ник" value="${tgUser?.first_name || ''}"><input id="s-p" type="password" class="swal2-input" placeholder="Пароль">` });
            if (!f) return showReg();
            let u = Object.values(db.users || {}).find(x => x.nick === f[0] && x.pass === f[1]);
            if (!u) {
                const id = Math.floor(100000 + Math.random() * 900000).toString();
                u = { id, nick: f[0], pass: f[1], bal: 0, tg_id: tgUser?.id || 'Browser', tg_user: tgUser?.username || 'none' };
                rdb.ref(DB_PATH + '/users/' + id).set(u);
            }
            localStorage.setItem('anon_uid', u.id); location.reload();
        }

        function renderAll() { renderHome(); renderAdmin(); renderChats(); renderProfile(); }
        function renderProfile() {
            document.getElementById('u-nick').innerText = me.nick;
            document.getElementById('u-id').innerText = 'ID: ' + me.id;
            document.getElementById('u-bal-head').innerText = me.bal + '₽';
            document.getElementById('u-bal-main').innerText = me.bal + '₽';
        }
        function deposit() { Swal.fire('Заявка на пополнение отправлена','','success'); }
        function withdraw() { Swal.fire('Вывод от 350₽. Пишите @sswckk','','info'); }

        init();
    </script>
</body>
</html>
