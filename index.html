<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK — V70 PLAYEROK EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        :root { --bg: #f9f9fb; --card: #ffffff; --text: #111827; --blue: #007aff; --blue-hover: #0062cc; --gray: #f3f4f6; }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #000000; --card: #121212; --text: #ffffff; --gray: #1e1e1e; }
        }
        
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        
        .box { background: var(--card); border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.04); border: 1px solid rgba(128,128,128,0.1); }
        
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px 20px 180px; scroll-behavior: smooth; }
        .tab-content.active { display: block; animation: fadeSlide 0.3s ease-out; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: var(--card); border-top: 1px solid rgba(128,128,128,0.1); display: flex; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #9ca3af; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .nav-btn.active { color: var(--blue); }

        .btn-blue { background: var(--blue); color: white; border-radius: 16px; font-weight: 700; padding: 16px; width: 100%; transition: 0.2s; font-size: 14px; text-align: center; border: none; }
        .btn-blue:active { transform: scale(0.97); background: var(--blue-hover); }

        input, textarea, select { background: var(--gray); border: 1px solid transparent; border-radius: 14px; padding: 16px; color: var(--text); width: 100%; outline: none; font-size: 14px; transition: 0.2s; }
        input:focus, textarea:focus, select:focus { border-color: var(--blue); background: var(--card); }

        .badge-neon { color: #4ade80; text-shadow: 0 0 10px rgba(74,222,128,0.8); }
        .badge-rainbow { background: linear-gradient(90deg, #ff0000, #ffff00, #0000ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        ::-webkit-scrollbar { width: 0; }
        
        #loader { background: var(--bg); z-index: 10000; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 4px solid var(--gray); border-top-color: var(--blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>

    <div id="auth_screen" class="hidden fixed inset-0 z-[9999] bg-[var(--bg)] flex flex-col items-center justify-center p-6">
        <h1 class="text-3xl font-black mb-8">LYNEOK</h1>
        <div class="w-full max-w-sm space-y-4 box p-6">
            <div id="reg_fields" class="hidden space-y-4 mb-4">
                <input type="file" id="reg_ava" class="hidden" accept="image/*" onchange="compImg(this, 'l_reg_ava')">
                <label for="reg_ava" id="l_reg_ava" class="w-20 h-20 bg-[var(--gray)] mx-auto rounded-full flex items-center justify-center cursor-pointer overflow-hidden border-2 border-dashed border-gray-400">
                    <i class="fa-solid fa-camera text-gray-400"></i>
                </label>
                <input id="reg_tg" placeholder="Telegram (напр. @sswckk)">
            </div>
            
            <input id="auth_name" placeholder="Никнейм">
            <input id="auth_pass" type="password" placeholder="Пароль">
            
            <button onclick="handleAuth()" id="auth_main_btn" class="btn-blue mt-2">Войти</button>
            <p onclick="toggleAuthMode()" id="auth_toggle" class="text-center text-xs text-gray-500 font-bold cursor-pointer mt-4">Создать аккаунт</p>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-5 py-4 flex justify-between items-center bg-[var(--card)] border-b border-gray-200/10 sticky top-0 z-50">
            <span class="font-black text-xl tracking-tight">LYNEOK</span>
            <div id="h_bal" class="bg-blue-500/10 text-blue-500 px-4 py-2 rounded-xl font-bold text-sm">0 ₽</div>
        </header>

        <main id="tab_market" class="tab-content active">
            <div id="cat_view" class="grid grid-cols-2 gap-4"></div>
            <div id="items_view" class="hidden space-y-4">
                <button onclick="backToCats()" class="text-gray-500 font-bold text-xs flex items-center gap-2 mb-2"><i class="fa-solid fa-arrow-left"></i> Назад к играм</button>
                <div id="market_grid" class="space-y-4"></div>
            </div>
        </main>

        <main id="tab_sell" class="tab-content">
            <h2 class="text-2xl font-black mb-6">Продать товар</h2>
            <div class="box p-5 space-y-4">
                <input type="file" id="i_img" class="hidden" accept="image/*" onchange="compImg(this, 'l_img')">
                <label for="i_img" id="l_img" class="w-full h-40 bg-[var(--gray)] rounded-2xl flex flex-col items-center justify-center font-bold text-sm text-gray-400 cursor-pointer overflow-hidden">
                    <i class="fa-solid fa-image text-2xl mb-2"></i> Фото товара
                </label>
                
                <select id="i_cat" onchange="syncSubs()"></select>
                <select id="i_sub" class="hidden"></select>
                
                <input id="i_title" placeholder="Короткое название">
                <textarea id="i_desc" placeholder="Подробное описание..." rows="3"></textarea>
                <textarea id="i_data" placeholder="Данные аккаунта (видит только покупатель после оплаты)" rows="2"></textarea>
                
                <div class="relative">
                    <input id="i_price" type="number" placeholder="Цена (минимум 44 ₽)" oninput="calcComm()">
                    <div id="comm_info" class="text-xs font-bold text-gray-500 mt-2 ml-1">Вы получите: 0 ₽</div>
                </div>
                
                <button onclick="postItem()" class="btn-blue mt-2">Выставить на продажу</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black">Сделки</h2>
                <div class="flex gap-2">
                    <button onclick="filterDeals('all')" class="text-xs font-bold bg-[var(--gray)] px-3 py-1 rounded-lg">Все</button>
                    <button onclick="filterDeals('buy')" class="text-xs font-bold bg-[var(--gray)] px-3 py-1 rounded-lg">Покупки</button>
                    <button onclick="filterDeals('sell')" class="text-xs font-bold bg-[var(--gray)] px-3 py-1 rounded-lg">Продажи</button>
                </div>
            </div>
            <div id="deals_list" class="space-y-4"></div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="box p-6 mb-4">
                <div class="flex items-center gap-4 mb-6">
                    <img id="p_ava" src="" class="w-16 h-16 bg-[var(--gray)] rounded-full object-cover">
                    <div class="flex-1">
                        <div class="flex items-center gap-1">
                            <b id="p_name" class="text-xl">...</b>
                            <span id="p_badge"></span>
                        </div>
                        <p id="p_tg" class="text-sm text-gray-500"></p>
                        <div class="flex items-center gap-2 mt-1 text-sm">
                            <i class="fa-solid fa-star text-yellow-400"></i> <span id="p_rating" class="font-bold">5.0</span> 
                            <span class="text-gray-400 text-xs">(<span id="p_sales">0</span> сделок)</span>
                        </div>
                    </div>
                    <button onclick="shareProfile()" class="w-10 h-10 bg-[var(--gray)] rounded-full flex items-center justify-center text-blue-500"><i class="fa-solid fa-share-nodes"></i></button>
                </div>
                
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <button onclick="finance('topup')" class="bg-blue-500/10 text-blue-500 py-3 rounded-xl font-bold text-sm">Пополнить</button>
                    <button onclick="finance('withdraw')" class="bg-[var(--gray)] py-3 rounded-xl font-bold text-sm">Вывести</button>
                </div>

                <div class="space-y-3 border-t border-gray-200/10 pt-4">
                    <p class="text-xs font-bold text-gray-500 uppercase">Настройки</p>
                    <input id="set_email" type="email" placeholder="Привязать Email для чеков">
                    <button onclick="saveProfile()" class="text-sm font-bold text-blue-500">Сохранить почту</button>
                </div>
            </div>

            <button id="adm_btn" onclick="switchTab('admin')" class="hidden btn-blue !bg-red-500 mb-4"><i class="fa-solid fa-crown mr-2"></i> Админ-панель</button>
            <button onclick="logout()" class="w-full py-4 text-red-500 font-bold text-sm text-center">Выйти из аккаунта</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <h1 class="text-3xl font-black text-red-500 mb-6">Панель Управления</h1>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="box p-4">
                    <p class="text-xs font-bold text-gray-400 mb-1">Комиссия сайта (%)</p>
                    <div class="flex gap-2">
                        <input id="set_comm" type="number" class="!p-2">
                        <button onclick="updateSettings()" class="bg-blue-500 text-white p-2 rounded-xl w-12"><i class="fa-solid fa-save"></i></button>
                    </div>
                </div>
                <div class="box p-4 flex flex-col justify-center">
                    <p class="text-xs font-bold text-gray-400 mb-1">Всего юзеров</p>
                    <b id="stat_users" class="text-2xl">0</b>
                </div>
            </div>

            <div class="flex gap-2 mb-6">
                <button onclick="addNewCat()" class="btn-blue !bg-[var(--gray)] !text-[var(--text)] !py-3 !text-xs">+ Добавить Игру</button>
                <button onclick="addNewSub()" class="btn-blue !bg-[var(--gray)] !text-[var(--text)] !py-3 !text-xs">+ Категорию</button>
            </div>

            <div class="space-y-6">
                <div>
                    <h3 class="text-sm font-bold text-gray-500 mb-3">Модерация товаров</h3>
                    <div id="adm_items" class="space-y-3"></div>
                </div>
                <div>
                    <h3 class="text-sm font-bold text-gray-500 mb-3">Пользователи</h3>
                    <div id="adm_users" class="space-y-3"></div>
                </div>
            </div>
        </main>

        <nav class="nav-bar">
            <div onclick="switchTab('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-gamepad text-xl"></i><span>Игры</span></div>
            <div onclick="switchTab('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-plus-circle text-xl"></i><span>Продать</span></div>
            <div onclick="switchTab('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-message text-xl"></i><span>Чаты</span></div>
            <div onclick="switchTab('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user text-xl"></i><span>Профиль</span></div>
        </nav>
    </div>

    <script>
        // КОНФИГ
        const EMAIL_CONF = { pub: "9M8GxYWeMi6hJP6Rg", svc: "service_ndr83s", tmp: "template_q98pr7g" };
        const TG_CONF = { tok: "8641257792:AAEsxnQWEIeozMt_gnSwJdVgSFQlOc-hnuc", chat: "7040863301" };
        const FB_CONF = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        
        firebase.initializeApp(FB_CONF);
        const db = firebase.database().ref('lyne_empire_v70');
        emailjs.init(EMAIL_CONF.pub);

        let me = null, data = {}, tempImg = "", isRegMode = false, currentDealFilter = 'all';
        const Toast = Swal.mixin({ toast: true, position: 'top', showConfirmButton: false, timer: 2500, background: '#111', color: '#fff' });

        // БОТ ОПОВЕЩАЕТ О КАЖДОМ ЧИХЕ
        async function tgNotify(txt) { 
            fetch(`https://api.telegram.org/bot${TG_CONF.tok}/sendMessage?chat_id=${TG_CONF.chat}&text=${encodeURIComponent('🔔 СИСТЕМА: ' + txt)}`); 
        }

        // ПОЧТА КОТОРАЯ РЕАЛЬНО РАБОТАЕТ
        function notifyEmail(uid, msg) {
            const u = data.u[uid];
            if(u && u.email && u.email.includes('@')) {
                emailjs.send(EMAIL_CONF.svc, EMAIL_CONF.tmp, {
                    to_email: u.email,
                    user_name: u.n,
                    message: msg
                }).then(() => console.log('Email sent to', u.email)).catch(e => console.error('Email error', e));
            }
        }

        function init() {
            db.on('value', snap => {
                data = snap.val() || { u:{}, i:{}, d:{}, cat:{}, subs:{}, settings:{comm:10} };
                const sid = localStorage.getItem('lyne_v70_sid');
                if(sid && data.u[sid]) {
                    me = data.u[sid];
                    if(me.banned) { alert("Ваш аккаунт заблокирован администратором."); logout(); return; }
                    document.getElementById('auth_screen').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    if(me.n.toLowerCase() === 'owwner') document.getElementById('adm_btn').style.display = 'block';
                    render();
                } else document.getElementById('auth_screen').classList.remove('hidden');
                setTimeout(() => document.getElementById('loader').style.display = 'none', 800);
            });
        }

        // АВТОРИЗАЦИЯ
        function toggleAuthMode() {
            isRegMode = !isRegMode;
            document.getElementById('reg_fields').classList.toggle('hidden', !isRegMode);
            document.getElementById('auth_main_btn').innerText = isRegMode ? 'Создать аккаунт' : 'Войти';
            document.getElementById('auth_toggle').innerText = isRegMode ? 'Уже есть аккаунт? Войти' : 'Создать аккаунт';
        }

        function handleAuth() {
            const n = document.getElementById('auth_name').value.trim();
            const p = document.getElementById('auth_pass').value.trim();
            if(!n || !p) return Toast.fire({ icon: 'error', title: 'Заполни Ник и Пароль' });

            if(isRegMode) {
                const tg = document.getElementById('reg_tg').value.trim();
                if(!tg.includes('@')) return Toast.fire({ icon: 'error', title: 'Telegram должен содержать @' });
                if(!tempImg) return Toast.fire({ icon: 'error', title: 'Загрузи аватарку!' });
                
                const sid = 'u' + Date.now();
                db.child(`u/${sid}`).set({ id: sid, n, pass: p, tg, ava: tempImg, bal: 0, sales: 0, stars: 5, reviews: 0 });
                localStorage.setItem('lyne_v70_sid', sid);
                tgNotify(`Новая регистрация: ${n} (${tg})`);
            } else {
                const user = Object.values(data.u).find(u => u.n === n && u.pass === p);
                if(user) {
                    localStorage.setItem('lyne_v70_sid', user.id);
                    tgNotify(`Вход в систему: ${n}`);
                } else Toast.fire({ icon: 'error', title: 'Неверный ник или пароль' });
            }
        }

        // ГАЛОЧКИ
        function getBadge(user) {
            if(user.n.toLowerCase() === 'owwner') return '<i class="fa-solid fa-crown text-red-500 ml-1"></i>';
            if(user.stars < 4.9) return ''; // Только для идеальных продавцов
            
            const s = user.sales || 0;
            if(s >= 350) return '<i class="fa-solid fa-circle-check badge-rainbow ml-1" title="Радужная"></i>';
            if(s >= 100) return '<i class="fa-solid fa-circle-check badge-neon ml-1" title="Неоновая"></i>';
            if(s >= 90) return '<i class="fa-solid fa-circle-check text-red-500 ml-1" title="Красная"></i>';
            if(s >= 70) return '<i class="fa-solid fa-fire-flame-curved text-orange-600 ml-1" title="Огневая"></i>';
            if(s >= 45) return '<i class="fa-solid fa-gem text-cyan-400 ml-1" title="Бриллиантовая"></i>';
            if(s >= 35) return '<i class="fa-solid fa-circle-check text-yellow-400 ml-1" title="Золотая"></i>';
            if(s >= 25) return '<i class="fa-solid fa-fire text-orange-500 ml-1" title="Огневая"></i>';
            if(s >= 15) return '<i class="fa-solid fa-circle-check text-blue-500 ml-1" title="Синяя"></i>';
            return '';
        }

        function render() {
            if(!me) return;
            document.getElementById('h_bal').innerText = (me.bal || 0) + ' ₽';
            
            // Профиль
            document.getElementById('p_ava').src = me.ava || '';
            document.getElementById('p_name').innerText = me.n;
            document.getElementById('p_tg').innerText = me.tg || '';
            document.getElementById('p_rating').innerText = (me.stars || 5).toFixed(1);
            document.getElementById('p_sales').innerText = me.sales || 0;
            document.getElementById('p_badge').innerHTML = getBadge(me);
            document.getElementById('set_email').value = me.email || '';

            // Маркет Категории
            const cats = Object.values(data.cat || {});
            document.getElementById('cat_view').innerHTML = cats.map(c => `
                <div class="box p-4 text-center cursor-pointer hover:shadow-lg transition-all" onclick="openCat('${c.name}')">
                    <img src="${c.img}" class="w-16 h-16 mx-auto mb-3 rounded-2xl object-cover">
                    <p class="text-xs font-bold">${c.name}</p>
                </div>`).join('');
            document.getElementById('i_cat').innerHTML = '<option disabled selected>Выберите игру</option>' + cats.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            
            renderChats();
            if(me.n.toLowerCase() === 'owwner') renderAdmin();
        }

        // ФИНАНСЫ И ПРОФИЛЬ
        function saveProfile() {
            const m = document.getElementById('set_email').value;
            db.child(`u/${me.id}/email`).set(m);
            Toast.fire({ icon: 'success', title: 'Почта сохранена' });
            tgNotify(`${me.n} привязал почту: ${m}`);
        }

        function finance(type) {
            if(type === 'topup') {
                Swal.fire({ title: 'Сумма пополнения', input: 'number', background: 'var(--card)', color: 'var(--text)' }).then(r => {
                    const sum = Number(r.value);
                    if(sum >= 50) {
                        db.child(`u/${me.id}/bal`).transaction(b => (b||0) + sum);
                        tgNotify(`💰 ${me.n} пополнил баланс на ${sum}₽`);
                        Toast.fire({ icon: 'success', title: 'Баланс пополнен!' });
                    } else Toast.fire({ icon: 'error', title: 'Минимум 50 ₽' });
                });
            } else {
                Swal.fire({ title: 'Сумма вывода', input: 'number', background: 'var(--card)', color: 'var(--text)' }).then(r => {
                    const sum = Number(r.value);
                    if(sum >= 367 && me.bal >= sum) {
                        db.child(`u/${me.id}/bal`).transaction(b => b - sum);
                        tgNotify(`💸 ЗАЯВКА НА ВЫВОД: ${me.n} запросил ${sum}₽. (Реквизиты уточнить в TG: ${me.tg})`);
                        Toast.fire({ icon: 'success', title: 'Заявка отправлена' });
                    } else Toast.fire({ icon: 'error', title: 'Минимум 367 ₽ или мало средств' });
                });
            }
        }

        function shareProfile() {
            const text = `Смотри мой профиль ${me.n} на крутом Маркетплейсе! Рейтинг: 5.0`;
            if (navigator.share) navigator.share({ title: 'Профиль', text: text, url: window.location.href });
            else { navigator.clipboard.writeText(text); Toast.fire({ icon: 'success', title: 'Ссылка скопирована' }); }
        }

        // ТОВАРЫ
        function calcComm() {
            const p = Number(document.getElementById('i_price').value);
            const comm = data.settings.comm || 10;
            document.getElementById('comm_info').innerText = `Вы получите: ${Math.floor(p * (1 - comm/100))} ₽ (Комиссия ${comm}%)`;
        }

        function postItem() {
            const t = document.getElementById('i_title').value;
            const p = Number(document.getElementById('i_price').value);
            const c = document.getElementById('i_cat').value;
            const s = document.getElementById('i_sub').value;
            const d = document.getElementById('i_desc').value;
            const acc = document.getElementById('i_data').value;
            
            if(p < 44) return Toast.fire({ icon: 'error', title: 'Мин. цена 44 ₽' });
            if(!tempImg || !t || !acc || !c) return Toast.fire({ icon: 'warning', title: 'Заполни все поля и фото!' });
            
            const iid = 'i' + Date.now();
            db.child(`i/${iid}`).set({ id: iid, sid: me.id, seller: me.n, title: t, price: p, cat: c, sub: s, desc: d, acc_data: acc, status: 'pending', img: tempImg });
            
            tgNotify(`📦 Новый товар от ${me.n}: ${t} (${p}₽)`);
            Toast.fire({ icon: 'success', title: 'Товар на проверке' });
            document.getElementById('i_price').value = '';
            document.getElementById('i_title').value = '';
            switchTab('market');
        }

        function buyItem(iid) {
            const i = data.i[iid];
            if(me.bal < i.price) return Toast.fire({ icon: 'error', title: 'Недостаточно средств' });
            
            const did = 'd' + Date.now();
            const comm = Math.floor(i.price * ((data.settings.comm||10) / 100));
            const profit = i.price - comm;

            // Движение денег и статистики
            db.child(`u/${me.id}/bal`).transaction(b => b - i.price);
            db.child(`u/${i.sid}/bal`).transaction(b => (b||0) + profit);
            db.child(`u/${i.sid}/sales`).transaction(s => (s||0) + 1); // +1 к сделкам продавцу!
            
            db.child(`d/${did}`).set({ id: did, buyerId: me.id, buyerName: me.n, sid: i.sid, sellerName: i.seller, title: i.title, price: i.price, acc_data: i.acc_data });
            db.child(`i/${i.id}`).remove();

            // Оповещения
            tgNotify(`🛒 ПОКУПКА: ${me.n} купил "${i.title}" у ${i.seller} за ${i.price}₽`);
            notifyEmail(i.sid, `Твой товар "${i.title}" успешно продан за ${i.price}₽! Данные переданы покупателю.`);
            notifyEmail(me.id, `Вы успешно купили "${i.title}". Зайдите в раздел "Чаты", чтобы забрать данные.`);
            
            switchTab('chats');
        }

        // ЧАТЫ И ОТЗЫВЫ
        function filterDeals(type) { currentDealFilter = type; renderChats(); }

        function renderChats() {
            let chats = Object.values(data.d || {});
            const isAdmin = me.n.toLowerCase() === 'owwner';
            
            if(!isAdmin) {
                if(currentDealFilter === 'buy') chats = chats.filter(c => c.buyerId === me.id);
                else if(currentDealFilter === 'sell') chats = chats.filter(c => c.sid === me.id);
                else chats = chats.filter(c => c.buyerId === me.id || c.sid === me.id);
            }

            document.getElementById('deals_list').innerHTML = chats.reverse().map(c => `
                <div class="box p-5 mb-4 border-l-4 ${c.buyerId === me.id ? 'border-blue-500' : 'border-green-500'}">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <b class="text-sm block">${c.title}</b>
                            <span class="text-xs text-gray-400">Сделка #${c.id.slice(-6)}</span>
                        </div>
                        <span class="font-black ${c.buyerId === me.id ? 'text-red-500' : 'text-green-500'}">${c.buyerId === me.id ? '-' : '+'}${c.price} ₽</span>
                    </div>
                    
                    ${(c.buyerId === me.id || isAdmin) ? `
                        <div class="bg-[var(--gray)] p-3 rounded-xl mb-3">
                            <p class="text-[10px] font-bold text-gray-400 uppercase mb-1">Данные аккаунта:</p>
                            <code class="text-xs break-all user-select-all font-mono">${c.acc_data}</code>
                        </div>
                    ` : ''}
                    
                    <div id="chat_msgs_${c.id}" class="space-y-2 mb-3 bg-[var(--bg)] p-3 rounded-xl max-h-40 overflow-y-auto">
                        ${c.msgs ? Object.values(c.msgs).map(m => `<div class="text-xs"><b class="${m.role==='admin'?'text-red-500':'text-blue-500'}">${m.name}:</b> ${m.txt}</div>`).join('') : '<p class="text-xs text-gray-400 text-center">Чат пуст</p>'}
                    </div>
                    
                    <div class="flex gap-2">
                        <input id="in_${c.id}" class="!p-3 !text-xs bg-[var(--gray)]" placeholder="Написать...">
                        <button onclick="sendMsg('${c.id}')" class="btn-blue !w-12 !p-0 flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>

                    ${(c.buyerId === me.id && !c.review) ? `
                        <div class="mt-4 pt-4 border-t border-gray-200/20 text-center">
                            <span class="text-xs font-bold text-gray-500 mb-2 block">Оцените продавца:</span>
                            <div class="flex justify-center gap-2 text-xl">
                                ${[1,2,3,4,5].map(s => `<i onclick="leaveReview('${c.id}', ${s}, '${c.sid}')" class="fa-solid fa-star text-gray-300 hover:text-yellow-400 cursor-pointer transition-colors"></i>`).join('')}
                            </div>
                        </div>
                    ` : ''}
                </div>`).join('') || '<div class="text-center p-10 text-gray-400 font-bold">Сделок пока нет</div>';
        }

        function sendMsg(did) {
            const txt = document.getElementById('in_'+did).value;
            if(!txt) return;
            const mid = 'm' + Date.now();
            const role = me.n.toLowerCase()==='owwner' ? 'admin' : 'user';
            db.child(`d/${did}/msgs/${mid}`).set({ txt, name: me.n, role });
            tgNotify(`💬 Сообщение в чате ${did.slice(-4)} от ${me.n}: ${txt}`);
            
            // Отправляем письмо второму участнику
            const deal = data.d[did];
            const targetId = me.id === deal.buyerId ? deal.sid : deal.buyerId;
            notifyEmail(targetId, `Новое сообщение по сделке "${deal.title}": ${txt}`);
            
            document.getElementById('in_'+did).value = '';
        }

        function leaveReview(did, stars, sid) {
            db.child(`d/${did}/review`).set(stars);
            // Пересчет среднего рейтинга
            const seller = data.u[sid];
            const oldStars = seller.stars || 5;
            const revCount = seller.reviews || 0;
            const newStars = ((oldStars * revCount) + stars) / (revCount + 1);
            
            db.child(`u/${sid}/stars`).set(newStars);
            db.child(`u/${sid}/reviews`).set(revCount + 1);
            
            tgNotify(`⭐ ОЦЕНКА: Продавец получил ${stars} звезд по сделке ${did.slice(-4)}`);
            Toast.fire({ icon: 'success', title: 'Отзыв оставлен!' });
        }

        // АДМИН ПАНЕЛЬ
        function renderAdmin() {
            const users = Object.values(data.u);
            document.getElementById('stat_users').innerText = users.length;
            document.getElementById('set_comm').value = data.settings.comm || 10;

            document.getElementById('adm_users').innerHTML = users.map(u => `
                <div class="box p-3 flex justify-between items-center">
                    <div>
                        <b class="text-sm">${u.n}</b>
                        <p class="text-xs text-gray-500">Баланс: ${u.bal}₽ | ${u.tg}</p>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="editUserBal('${u.id}')" class="bg-blue-100 text-blue-600 w-8 h-8 rounded-lg"><i class="fa-solid fa-wallet"></i></button>
                        <button onclick="db.child('u/${u.id}/banned').set(${!u.banned})" class="${u.banned ? 'bg-red-500 text-white' : 'bg-red-100 text-red-600'} w-8 h-8 rounded-lg"><i class="fa-solid fa-ban"></i></button>
                    </div>
                </div>`).join('');

            const pnd = Object.values(data.i || {}).filter(i => i.status === 'pending');
            document.getElementById('adm_items').innerHTML = pnd.map(i => `
                <div class="box p-3 flex justify-between items-center border-l-4 border-yellow-400">
                    <div><b class="text-sm">${i.title}</b><p class="text-xs text-gray-500">${i.price}₽ | от ${i.seller}</p></div>
                    <div class="flex gap-1">
                        <button onclick="db.child('i/${i.id}/status').set('active'); tgNotify('✅ Одобрен товар: ${i.title}')" class="bg-green-100 text-green-600 w-8 h-8 rounded-lg"><i class="fa-solid fa-check"></i></button>
                        <button onclick="db.child('i/${i.id}').remove(); tgNotify('❌ Удален товар: ${i.title}')" class="bg-red-100 text-red-600 w-8 h-8 rounded-lg"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`).join('') || '<p class="text-xs text-gray-400">Нет товаров на проверке</p>';
        }

        function updateSettings() {
            const c = Number(document.getElementById('set_comm').value);
            db.child('settings/comm').set(c);
            tgNotify(`⚙️ Админ изменил комиссию на ${c}%`);
            Toast.fire({ icon: 'success', title: 'Сохранено' });
        }

        // ВСПОМОГАТЕЛЬНЫЕ
        function compImg(input, targetId) {
            const f = input.files[0]; if(!f) return;
            const rd = new FileReader();
            rd.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const cvs = document.createElement('canvas'); const ctx = cvs.getContext('2d');
                    cvs.width = 400; cvs.height = 400; ctx.drawImage(img, 0, 0, 400, 400);
                    tempImg = cvs.toDataURL('image/jpeg', 0.6);
                    document.getElementById(targetId).innerHTML = `<img src="${tempImg}" class="w-full h-full object-cover">`;
                };
                img.src = e.target.result;
            };
            rd.readAsDataURL(f);
        }

        function syncSubs() {
            const g = document.getElementById('i_cat').value;
            const subs = Object.values(data.subs || {}).filter(s => s.game === g);
            const el = document.getElementById('i_sub');
            if(subs.length) {
                el.classList.remove('hidden');
                el.innerHTML = subs.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
            } else el.classList.add('hidden');
        }

        function openCat(name) {
            document.getElementById('cat_view').classList.add('hidden');
            document.getElementById('items_view').classList.remove('hidden');
            const items = Object.values(data.i || {}).filter(i => i.cat === name && i.status === 'active');
            document.getElementById('market_grid').innerHTML = items.map(i => `
                <div class="box p-3 flex gap-4">
                    <img src="${i.img}" class="w-24 h-24 rounded-xl object-cover">
                    <div class="flex-1 flex flex-col justify-between py-1">
                        <div>
                            <b class="text-sm line-clamp-2 leading-tight">${i.title}</b>
                            <p class="text-xs text-gray-400 mt-1 line-clamp-1">${i.desc}</p>
                        </div>
                        <div class="flex justify-between items-end mt-2">
                            <b class="text-lg font-black text-blue-500">${i.price} ₽</b>
                            <button onclick="buyItem('${i.id}')" class="bg-blue-500 text-white px-4 py-1.5 rounded-lg text-xs font-bold">Купить</button>
                        </div>
                    </div>
                </div>`).join('') || '<div class="text-center p-10 text-gray-400 font-bold">Тут пока пусто</div>';
        }

        function addNewCat() {
            Swal.fire({title:'Название Игры', input:'text'}).then(r => {
                if(r.value) db.child(`cat/c${Date.now()}`).set({name: r.value, img: 'https://via.placeholder.com/150'});
            });
        }
        function addNewSub() {
            Swal.fire({title:'Категория (Имя игры, Категория)', html: '<input id="swal-in1" class="swal2-input" placeholder="Игра"><input id="swal-in2" class="swal2-input" placeholder="Категория">', preConfirm: () => [document.getElementById('swal-in1').value, document.getElementById('swal-in2').value]}).then(r => {
                if(r.value) db.child(`subs/s${Date.now()}`).set({game: r.value[0], name: r.value[1]});
            });
        }

        function editUserBal(uid) {
            Swal.fire({ title: 'Новый баланс', input: 'number' }).then(r => {
                if(r.value) db.child(`u/${uid}/bal`).set(Number(r.value));
            });
        }

        function backToCats() { document.getElementById('cat_view').classList.remove('hidden'); document.getElementById('items_view').classList.add('hidden'); }
        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.getElementById('tab_'+t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById('n_'+t)?.classList.add('active');
        }
        function logout() { localStorage.removeItem('lyne_v70_sid'); location.reload(); }
        init();
    </script>
</body>
</html>
