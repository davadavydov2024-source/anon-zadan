<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>anon:zadan v5.1 STABLE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU&apikey=40c0628e-f513-410c-9a00-5e581e26456f" type="text/javascript"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { background: #0a0a0b; color: #e4e4e7; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: #161618; border: 1px solid #27272a; border-radius: 24px; overflow: hidden; }
        .tab { display: none; }
        .tab.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn-accent { background: #ffffff; color: #000; border-radius: 16px; font-weight: 800; }
        .input-dark { background: #0f0f10 !important; border: 1px solid #27272a !important; color: white !important; border-radius: 14px !important; outline: none; }
        .ban-screen { display:none; position:fixed; inset:0; background:#000; z-index:9999; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
        .swal2-input { color: black !important; background: white !important; font-weight: bold !important; height: 45px !important; margin: 10px auto !important; }
    </style>
</head>
<body class="pb-28">

    <div id="ban-overlay" class="ban-screen">
        <img src="https://media.tenor.com/8s76Y9v-v80AAAAd/cat-sad.gif" class="w-48 mb-6 rounded-full border-4 border-red-500">
        <h1 class="text-2xl font-black text-red-500 italic uppercase">Доступ ограничен</h1>
        <p id="ban-text" class="text-zinc-500 text-[10px] mt-2 px-10">Ваш аккаунт заблокирован администрацией.</p>
    </div>

    <header class="p-5 flex justify-between items-center sticky top-0 bg-[#0a0a0b]/90 backdrop-blur-md z-50 border-b border-white/5">
        <h1 class="text-lg font-extrabold italic tracking-tighter">anon:<span class="text-zinc-600">zadan</span></h1>
        <div id="u-bal-head" class="bg-zinc-900 px-4 py-1.5 rounded-full text-[11px] font-bold border border-zinc-800 text-white">0.00₽</div>
    </header>

    <section id="home" class="tab active px-5 pt-4">
        <div id="zadan-list" class="space-y-4 pb-10"></div>
    </section>

    <section id="create" class="tab px-5 pt-4">
        <div class="card p-6 space-y-4">
            <h2 class="font-bold text-[10px] opacity-40 uppercase tracking-widest text-center">Разместить товар</h2>
            <input id="z-title" class="input-dark w-full p-4 text-xs" placeholder="Что продаете?">
            <textarea id="z-desc" class="input-dark w-full p-4 text-xs h-20" placeholder="Описание..."></textarea>
            <input id="z-addr" class="input-dark w-full p-4 text-xs" placeholder="Город, адрес">
            <input id="z-price" type="number" class="input-dark w-full p-4 text-xs" placeholder="Цена (₽)">
            <button onclick="createZadan()" class="w-full btn-accent py-5 text-[11px] uppercase tracking-widest">Опубликовать</button>
        </div>
    </section>

    <section id="chats" class="tab px-5 pt-4">
        <div id="chat-list-screen">
            <div id="dialog-list" class="card divide-y divide-zinc-800">
                <div onclick="openDialog('support')" class="p-5 flex items-center gap-4 active:bg-zinc-800 transition-all">
                    <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center font-black italic shadow-lg shadow-blue-900/20">S</div>
                    <div class="flex-1">
                        <div class="flex justify-between"><b class="text-sm italic">Поддержка</b><span class="text-[9px] opacity-30">ONLINE</span></div>
                        <p class="text-[10px] opacity-50">Связаться с администратором</p>
                    </div>
                </div>
            </div>
        </div>
        <div id="chat-room-screen" class="hidden">
            <div class="flex items-center gap-3 mb-4">
                <button onclick="closeDialog()" class="text-zinc-500 text-xs px-2"><i class="fa-solid fa-chevron-left"></i> Назад</button>
            </div>
            <div class="card p-4 h-[55vh] flex flex-col">
                <div id="messages-container" class="flex-1 overflow-y-auto space-y-3 flex flex-col p-2"></div>
                <div class="flex gap-2 mt-4">
                    <input id="msg-input" class="input-dark flex-1 p-3 text-[11px]" placeholder="Написать...">
                    <button onclick="sendMessage()" class="bg-blue-600 w-12 h-11 rounded-xl flex items-center justify-center text-white"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </section>

    <section id="me" class="tab px-5 pt-4 text-center">
        <div class="card p-8 space-y-6">
            <div>
                <h3 id="u-nick" class="font-black text-2xl tracking-tighter italic">...</h3>
                <p id="u-tg" class="text-blue-500 text-[10px] font-bold mt-1">@username</p>
            </div>
            <div id="u-bal-main" class="bg-zinc-900 p-7 rounded-[32px] border border-zinc-800 font-black text-3xl italic">0₽</div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="deposit()" class="btn-accent py-4 text-[10px] uppercase italic">Пополнить</button>
                <button onclick="withdraw()" class="bg-zinc-800 py-4 rounded-xl text-[10px] uppercase text-zinc-400 italic">Вывод</button>
            </div>
            <button onclick="logout()" class="w-full py-4 text-[9px] font-bold text-zinc-600 uppercase border border-zinc-900 rounded-xl mt-4">Выход</button>
            <button onclick="setTab('admin_login')" class="opacity-10 text-[8px] uppercase font-bold mt-10 block mx-auto tracking-widest">Admin Panel</button>
        </div>
    </section>

    <section id="admin_login" class="tab px-5 pt-20">
        <input type="password" oninput="if(this.value.toLowerCase()==='kalubxq') setTab('admin')" class="w-full p-6 text-center input-dark card" placeholder="ПAРОЛЬ">
    </section>

    <section id="admin" class="tab px-5 pt-4 pb-32 space-y-4">
        <div class="card p-5 space-y-3 border-red-900/20">
            <h2 class="text-[10px] font-bold text-red-500 uppercase italic">Управление пользователями</h2>
            <input id="adm-nick" class="input-dark w-full p-3 text-xs" placeholder="Никнейм">
            <div class="grid grid-cols-3 gap-1">
                <button onclick="adminAction('bal')" class="bg-zinc-800 py-3 rounded-lg text-[8px]">БАЛАНС</button>
                <button onclick="adminAction('ban')" class="bg-red-900 text-white py-3 rounded-lg text-[8px]">БАН</button>
                <button onclick="adminAction('unban')" class="bg-green-900 text-white py-3 rounded-lg text-[8px]">РАЗБАН</button>
            </div>
        </div>
        <div class="card p-5 space-y-3">
            <h2 class="text-[10px] font-bold text-blue-500 uppercase italic">Логи переписок и Сделок</h2>
            <div id="adm-monitor" class="space-y-2 max-h-60 overflow-y-auto text-[9px] font-mono"></div>
        </div>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-black/95 border-t border-zinc-900 flex justify-around items-center z-[100] px-4">
        <button onclick="setTab('home')" id="btn-home"><i class="fa-solid fa-house text-lg"></i></button>
        <button onclick="setTab('create')" id="btn-create" class="opacity-30"><i class="fa-solid fa-plus-circle text-lg"></i></button>
        <button onclick="setTab('chats')" id="btn-chats" class="opacity-30"><i class="fa-solid fa-comment-dots text-lg"></i></button>
        <button onclick="setTab('me')" id="btn-me" class="opacity-30"><i class="fa-solid fa-user text-lg"></i></button>
    </nav>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
          authDomain: "dogx-base.firebaseapp.com",
          databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
          projectId: "dogx-base",
          storageBucket: "dogx-base.firebasestorage.app",
          messagingSenderId: "81713249793",
          appId: "1:81713249793:web:1b44a13e6faf5acfa78a00"
        };

        const DB_VER = 'anon_v5_1'; 
        const TG_TOKEN = "8722822022:AAEmZa-V4-isxXnZ00omU8gAM_NtYevuL9Y";
        const ADMIN_ID = "7040863301";

        firebase.initializeApp(firebaseConfig);
        const rdb = firebase.database();
        let db = { users: {}, tasks: {}, notifications: {} };
        let me = null;
        let isAuthOpen = false;

        function init() {
            rdb.ref(DB_VER).on('value', (s) => {
                db = s.val() || { users: {}, tasks: {}, notifications: {} };
                const uid = localStorage.getItem('anon_uid');
                if (uid && db.users && db.users[uid]) {
                    me = db.users[uid];
                    // Проверка бана
                    if(me.banUntil && me.banUntil > Date.now()) {
                        document.getElementById('ban-overlay').style.display = 'flex';
                        document.getElementById('ban-text').innerText = `Разблокировка через ${Math.ceil((me.banUntil - Date.now())/60000)} мин.`;
                    } else { document.getElementById('ban-overlay').style.display = 'none'; }
                    renderAll();
                } else if(!isAuthOpen) { showAuth(true); }
            });
        }

        async function showAuth(isLogin) {
            isAuthOpen = true;
            const { value: f } = await Swal.fire({
                title: isLogin ? 'ВХОД' : 'РЕГИСТРАЦИЯ',
                background: '#161618', color: '#fff',
                html: `
                    <input id="s-n" class="swal2-input" placeholder="Логин">
                    <input id="s-p" type="password" class="swal2-input" placeholder="Пароль">
                    ${!isLogin ? '<input id="s-tg" class="swal2-input" placeholder="Telegram @nick">' : ''}
                    <button onclick="window.toggleMode()" class="mt-4 text-blue-500 text-[10px] font-bold uppercase block w-full">
                        ${isLogin ? 'Нет аккаунта? Создать' : 'Уже есть аккаунт? Войти'}
                    </button>`,
                confirmButtonText: 'ГОТОВО',
                allowOutsideClick: false,
                preConfirm: () => [
                    document.getElementById('s-n').value.trim(),
                    document.getElementById('s-p').value.trim(),
                    !isLogin ? document.getElementById('s-tg').value.trim() : null
                ]
            });
            isAuthOpen = false;
            if(f && f[0]) {
                const [n, p, t] = f;
                const user = Object.values(db.users || {}).find(u => u.nick === n);
                if(isLogin) {
                    if(user && user.pass === p) { localStorage.setItem('anon_uid', user.id); location.reload(); }
                    else { await Swal.fire('Ошибка','Логин или пароль неверны','error'); showAuth(true); }
                } else {
                    if(user) { await Swal.fire('Ошибка','Ник занят','error'); showAuth(false); }
                    else {
                        const id = "u" + Date.now();
                        await rdb.ref(DB_VER+'/users/'+id).set({id, nick:n, pass:p, tg:t, bal:0});
                        localStorage.setItem('anon_uid', id); location.reload();
                    }
                }
            }
        }
        window.toggleMode = () => { const isL = Swal.getTitle().innerText === 'ВХОД'; showAuth(!isL); };

        async function deposit() {
            const { value: amount } = await Swal.fire({ title: 'Пополнение', input: 'number', background: '#161618', color: '#fff', inputPlaceholder: 'Сумма в ₽' });
            if(amount > 0) {
                fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(`💰 <b>ПОПОЛНЕНИЕ</b>\nНик: ${me.nick}\nТГ: ${me.tg}\nСумма: ${amount}₽`)}&parse_mode=HTML`);
                Swal.fire('Заявка создана','Ожидайте подтверждения','success');
            }
        }

        async function createZadan() {
            const title = document.getElementById('z-title').value;
            const price = Number(document.getElementById('z-price').value);
            const addr = document.getElementById('z-addr').value;
            if(!title || !price) return Swal.fire('Ошибка','Заполните название и цену','warning');
            const id = "z" + Date.now();
            await rdb.ref(`${DB_VER}/tasks/${id}`).set({ id, title, price, addr, owner: me.id, status: 'active', created: Date.now() });
            Swal.fire('Успех','Товар опубликован','success');
            setTab('home');
        }

        async function adminAction(type) {
            const nick = document.getElementById('adm-nick').value;
            const user = Object.values(db.users || {}).find(u => u.nick === nick);
            if(!user) return Swal.fire('Упс','Юзер не найден','error');
            
            if(type === 'ban') {
                const { value: m } = await Swal.fire({ title: 'Время бана', input: 'number', inputPlaceholder: 'Минуты (например 60)' });
                if(m) rdb.ref(`${DB_VER}/users/${user.id}`).update({ banUntil: Date.now() + (m * 60000) });
            } else if(type === 'unban') {
                rdb.ref(`${DB_VER}/users/${user.id}`).update({ banUntil: 0 });
                Swal.fire('Ок','Разбанен','success');
            } else if(type === 'bal') {
                const { value: b } = await Swal.fire({ title: 'Изменить баланс', input: 'number' });
                if(b) rdb.ref(`${DB_VER}/users/${user.id}`).update({ bal: Number(b) });
            }
        }

        function renderAll() {
            if(!me) return;
            document.getElementById('u-bal-head').innerText = me.bal + '₽';
            document.getElementById('u-bal-main').innerText = me.bal + '₽';
            document.getElementById('u-nick').innerText = me.nick;
            document.getElementById('u-tg').innerText = me.tg || '@не указан';
            
            const tasks = Object.values(db.tasks || {}).filter(t => t.status === 'active').sort((a,b)=>b.created-a.created);
            document.getElementById('zadan-list').innerHTML = tasks.length ? tasks.map(t => `
                <div class="card p-5 flex justify-between items-center transition-transform active:scale-[0.98]">
                    <div><b class="text-sm uppercase tracking-tight">${t.title}</b><p class="text-[9px] opacity-40 mt-1"><i class="fa-solid fa-location-dot mr-1"></i>${t.addr}</p></div>
                    <div class="text-right"><b class="text-green-500 block">${t.price}₽</b><span class="text-[8px] opacity-20 uppercase font-bold">в наличии</span></div>
                </div>`).join('') : '<p class="text-center opacity-20 text-xs mt-20">Товаров пока нет...</p>';
            
            // Рендер логов для админа
            if(document.getElementById('admin').classList.contains('active')) {
                let logs = "";
                Object.keys(db.notifications || {}).forEach(uid => {
                    const lastMsg = Object.values(db.notifications[uid]).slice(-1)[0];
                    logs += `<div class="p-2 bg-zinc-900/50 rounded mb-1 border-l-2 border-blue-500">
                        <span class="text-blue-400">ID:${uid}</span>: ${lastMsg.text}
                    </div>`;
                });
                document.getElementById('adm-monitor').innerHTML = logs || "Лента пуста";
            }
            if(document.getElementById('chat-room-screen').offsetParent !== null) renderMsgs();
        }

        function openDialog() { document.getElementById('chat-list-screen').classList.add('hidden'); document.getElementById('chat-room-screen').classList.remove('hidden'); renderMsgs(); }
        function closeDialog() { document.getElementById('chat-list-screen').classList.remove('hidden'); document.getElementById('chat-room-screen').classList.add('hidden'); }
        
        function sendMessage() {
            const t = document.getElementById('msg-input').value.trim();
            if(!t) return;
            rdb.ref(`${DB_VER}/notifications/${me.id}/${Date.now()}`).set({text:t, from:'user', time:Date.now()});
            document.getElementById('msg-input').value='';
            renderMsgs();
        }

        function renderMsgs() {
            const msgs = Object.values(db.notifications?.[me.id] || {}).sort((a,b)=>a.time-b.time);
            const container = document.getElementById('messages-container');
            container.innerHTML = msgs.map(m => `
                <div class="p-3 text-[11px] rounded-2xl max-w-[80%] ${m.from==='user'?'bg-blue-600 self-end shadow-lg shadow-blue-900/20':'bg-zinc-800 self-start'}">
                    ${m.text}
                </div>`).join('');
            container.scrollTop = container.scrollHeight;
        }

        function setTab(t) { 
            document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); 
            document.getElementById(t).classList.add('active'); 
            document.querySelectorAll('nav button').forEach(b=>b.classList.add('opacity-30')); 
            if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.remove('opacity-30');
            renderAll();
        }
        
        function logout() { localStorage.removeItem('anon_uid'); location.reload(); }
        init();
    </script>
</body>
</html>
