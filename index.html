<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK TITAN V123 | ADMIN GOD MODE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Jura:wght@700&family=Russo+One&family=Unbounded:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #121214; --text: #ffffff; --blue: #007aff; --gray: #1c1c1e; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .glass { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 24px; }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px 16px 180px; scrollbar-width: none; }
        .tab-content::-webkit-scrollbar { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(10,10,10,0.9); backdrop-filter: blur(25px); display: flex; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #636366; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: 0.3s; } 
        .nav-btn.active { color: var(--blue); transform: translateY(-2px); }
        input, textarea, select { background: var(--gray); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; color: white; width: 100%; outline: none; font-size: 14px; }
        .btn-blue { background: var(--blue); color: white; border-radius: 18px; font-weight: 900; padding: 18px; width: 100%; border: none; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .star-rating { color: #facc15; }
        .admin-search { position: sticky; top: -20px; z-index: 60; background: var(--bg); padding: 10px 0; }
    </style>
    <style id="dynamic_styles"></style>
</head>
<body>
    <div id="loader" class="fixed inset-0 bg-black z-[10000] flex items-center justify-center"><div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>

    <div id="auth_scr" class="hidden fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-8">
        <h1 class="text-5xl font-black mb-16 italic tracking-tighter">LYNEOK<span class="text-blue-500">.</span></h1>
        <div class="w-full glass p-8 space-y-4">
            <div id="reg_ext" class="hidden space-y-4">
                <input type="file" id="r_ava" class="hidden" accept="image/*" onchange="upImg(this, 'l_r_ava')">
                <label for="r_ava" id="l_r_ava" class="w-20 h-20 bg-zinc-900 mx-auto rounded-full flex items-center justify-center cursor-pointer border-2 border-dashed border-zinc-800"><i class="fa-solid fa-camera text-zinc-600 text-xl"></i></label>
            </div>
            <input id="a_n" placeholder="Никнейм">
            <input id="a_p" type="password" placeholder="Пароль">
            <button onclick="handleAuth()" id="a_btn" class="btn-blue">Войти</button>
            <p onclick="toggleR()" id="a_tog" class="text-center text-[11px] font-black text-zinc-500 uppercase cursor-pointer pt-4">Создать аккаунт</p>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-6 py-5 flex justify-between items-center bg-black/60 backdrop-blur-xl border-b border-white/5 sticky top-0 z-50">
            <b class="text-2xl italic tracking-tighter text-blue-500">LYNEOK</b>
            <div onclick="switchT('profile')" class="bg-white/5 px-4 py-2 rounded-2xl flex items-center gap-3 border border-white/5 cursor-pointer">
                <div class="text-right"><p class="text-[9px] uppercase font-black opacity-40">Баланс</p><span id="h_bal" class="font-black text-sm">0 ₽</span></div>
                <img id="h_ava" class="w-9 h-9 rounded-full object-cover bg-zinc-800">
            </div>
        </header>

        <main id="tab_market" class="tab-content active">
            <div id="market_main"><h2 class="text-3xl font-black mb-6 italic">Маркет</h2><div id="cat_grid" class="grid grid-cols-2 gap-4"></div></div>
            <div id="subcat_view" class="hidden space-y-4"><button onclick="closeSubcat()" class="text-blue-500 text-[10px] font-black uppercase mb-2"><i class="fa-solid fa-chevron-left mr-1"></i> Назад</button><div id="subcat_grid" class="grid grid-cols-1 gap-3"></div></div>
            <div id="items_view" class="hidden space-y-4"><button onclick="closeCat()" class="text-blue-500 text-[10px] font-black uppercase mb-2"><i class="fa-solid fa-chevron-left mr-1"></i> К категориям</button><div id="items_list" class="space-y-4"></div></div>
        </main>

        <main id="tab_chats" class="tab-content">
            <h2 class="text-3xl font-black mb-6 italic">Мои Сделки</h2>
            <div id="deals_list" class="space-y-4"></div>
        </main>

        <main id="tab_sell" class="tab-content">
            <h2 class="text-3xl font-black mb-6 italic">Продать</h2>
            <div class="glass p-6 space-y-5">
                <input type="file" id="s_img" class="hidden" onchange="upImg(this, 'l_s_img')">
                <label for="s_img" id="l_s_img" class="w-full h-40 bg-zinc-900 rounded-3xl flex flex-col items-center justify-center border-2 border-dashed border-zinc-800 cursor-pointer"><i class="fa-solid fa-image text-2xl text-zinc-700"></i></label>
                <div class="grid grid-cols-2 gap-2"><select id="s_game" onchange="updateSubcatsSell()"></select><select id="s_subcat"></select></div>
                <input id="s_t" placeholder="Название товара">
                <textarea id="s_acc" rows="3" placeholder="Описание товара..."></textarea>
                <input id="s_p" type="number" placeholder="Цена ₽">
                <button onclick="postItem()" class="btn-blue">Выставить</button>
            </div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="glass p-8 mb-6 text-center border border-white/5 relative">
                <img id="p_ava" class="w-24 h-24 mx-auto mb-4 rounded-full object-cover">
                <div class="flex items-center justify-center gap-2"><span id="p_n" class="text-2xl font-black">...</span><span id="p_badge"></span></div>
                <div id="p_rating" class="text-yellow-500 text-[10px] font-black mt-1"></div>
                <div class="grid grid-cols-2 gap-3 mt-8"><button onclick="topUp()" class="bg-white text-black py-3 rounded-xl font-black text-[10px] uppercase">Пополнить</button><button onclick="askOut()" class="bg-zinc-800 text-white py-3 rounded-xl font-black text-[10px] uppercase">Вывести</button></div>
            </div>
            <button id="adm_btn" onclick="switchT('admin')" class="hidden w-full bg-red-600/10 text-red-500 py-5 rounded-3xl font-black mb-4 border border-red-600/20 uppercase text-xs italic"><i class="fa-solid fa-crown mr-2"></i>Админ Панель</button>
            <button onclick="logout()" class="w-full py-4 text-zinc-600 text-[10px] font-black uppercase">Выйти</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <div class="admin-search">
                <input id="adm_global_search" oninput="renderAdmin()" placeholder="Поиск (Ник, Товар, ID)..." class="!bg-zinc-900 border-blue-500/30">
            </div>

            <div id="adm_sections" class="space-y-8 mt-4">
                <section class="glass p-6">
                    <h3 class="text-[10px] font-black text-blue-500 uppercase mb-4">Игры</h3>
                    <div id="ad_games_list" class="grid grid-cols-1 gap-2 mb-4"></div>
                    <button onclick="showAddGameModal()" class="w-full py-3 bg-blue-600/20 text-blue-500 rounded-xl font-black text-[10px] uppercase">+ Добавить игру</button>
                </section>

                <section>
                    <h3 class="text-[10px] font-black text-yellow-500 uppercase mb-4 ml-2">Все активные сделки (Чаты)</h3>
                    <div id="ad_all_deals" class="space-y-3"></div>
                </section>

                <section>
                    <h3 class="text-[10px] font-black text-green-500 uppercase mb-4 ml-2">Все пользователи</h3>
                    <div id="ad_users" class="space-y-4"></div>
                </section>
            </div>
        </main>

        <nav class="nav-bar">
            <div onclick="switchT('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-store text-xl"></i><span>Маркет</span></div>
            <div onclick="switchT('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-circle-plus text-xl"></i><span>Продать</span></div>
            <div onclick="switchT('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-receipt text-xl"></i><span>Сделки</span></div>
            <div onclick="switchT('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-id-card text-xl"></i><span>Профиль</span></div>
        </nav>
    </div>

    <div id="item_modal" class="hidden fixed inset-0 z-[10002] bg-black/98 overflow-y-auto">
        <div class="relative w-full aspect-video"><img id="im_img" class="w-full h-full object-cover"></div>
        <div class="p-6">
            <h1 id="im_title" class="text-3xl font-black italic mb-1"></h1>
            <p id="im_seller" class="text-[10px] text-blue-500 font-bold uppercase mb-4"></p>
            <div class="glass p-5 mb-8"><p id="im_desc" class="text-sm opacity-60"></p></div>
            <div class="flex items-center justify-between gap-4">
                <b id="im_price" class="text-2xl font-black italic"></b>
                <button id="im_buy_btn" class="btn-blue flex-1">Купить</button>
            </div>
            <button onclick="document.getElementById('item_modal').classList.add('hidden')" class="w-full mt-4 text-[10px] uppercase font-black opacity-30">Закрыть</button>
        </div>
    </div>

    <div id="chat_modal" class="hidden fixed inset-0 z-[10005] bg-black flex flex-col">
        <header class="p-5 flex justify-between items-center bg-zinc-900 border-b border-white/10">
            <button onclick="closeChat()" class="text-blue-500 text-xs font-black uppercase">Назад</button>
            <b id="chat_title" class="text-[10px] uppercase font-black text-center px-4">Чат</b>
            <div id="chat_adm_actions" class="hidden flex gap-2">
                <button onclick="admChatAction('Подтверждено')" class="bg-green-600 px-3 py-1 rounded text-[10px] font-black">OK</button>
                <button onclick="admChatAction('Отклонено')" class="bg-red-600 px-3 py-1 rounded text-[10px] font-black">X</button>
            </div>
        </header>
        <div id="chat_msgs" class="flex-1 overflow-y-auto p-4 space-y-3 pb-20"></div>
        <div id="review_block" class="hidden p-4 bg-yellow-600/10 border-t border-yellow-500/20 text-center">
            <p class="text-[10px] font-black uppercase text-yellow-500 mb-2">Оцените продавца</p>
            <div class="flex justify-center gap-4 text-2xl">
                <i onclick="sendReview(1)" class="fa-solid fa-star cursor-pointer opacity-30 hover:opacity-100"></i>
                <i onclick="sendReview(2)" class="fa-solid fa-star cursor-pointer opacity-30 hover:opacity-100"></i>
                <i onclick="sendReview(3)" class="fa-solid fa-star cursor-pointer opacity-30 hover:opacity-100"></i>
                <i onclick="sendReview(4)" class="fa-solid fa-star cursor-pointer opacity-30 hover:opacity-100"></i>
                <i onclick="sendReview(5)" class="fa-solid fa-star cursor-pointer opacity-30 hover:opacity-100"></i>
            </div>
        </div>
        <div class="p-4 bg-zinc-900 flex gap-2">
            <input id="chat_input" placeholder="Текст..." class="!py-3">
            <button onclick="sendMsg()" class="bg-blue-600 px-5 rounded-xl"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        firebase.initializeApp({ apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" });
        const db = firebase.database().ref('lyne_v123_titan');
        const Tst = Swal.mixin({ toast: true, position: 'top', timer: 2000, showConfirmButton: false, background: '#1c1c1e', color: '#fff' });

        let me = null, data = {}, isR = false, tmpImg = "", curG = null, curSub = null, curChat = null, curDealObj = null;

        function init() {
            db.on('value', snap => {
                data = snap.val() || { u:{}, i:{}, d:{}, games:{}, chats:{} };
                const sid = localStorage.getItem('lyne_v122_sid');
                document.getElementById('loader').style.display = 'none';
                if (sid && data.u[sid]) { 
                    me = data.u[sid];
                    document.getElementById('auth_scr').classList.add('hidden'); document.getElementById('app').classList.remove('hidden');
                    if(me.n.toLowerCase() === 'owwner') document.getElementById('adm_btn').classList.remove('hidden');
                    render(); if(curChat) renderChat();
                } else { document.getElementById('auth_scr').classList.remove('hidden'); }
            });
        }

        function render() {
            document.getElementById('h_bal').innerText = me.bal.toLocaleString() + ' ₽';
            document.getElementById('h_ava').src = me.ava; document.getElementById('p_ava').src = me.ava;
            document.getElementById('p_n').innerText = me.n;
            
            if(!curG) document.getElementById('cat_grid').innerHTML = Object.values(data.games || {}).map(g => `<div class="glass p-6 text-center border border-white/5" onclick="openGame('${g.id}')"><img src="${g.img}" class="w-14 h-14 mx-auto mb-3 rounded-2xl object-cover"><b class="text-[10px] uppercase font-black">${g.name}</b></div>`).join('');
            
            document.getElementById('s_game').innerHTML = Object.values(data.games || {}).map(g => `<option value="${g.id}">${g.name}</option>`).join('');
            
            const deals = Object.values(data.d || {}).filter(d => d.bid === me.id || d.sid === me.id).reverse();
            document.getElementById('deals_list').innerHTML = deals.map(d => `<div class="glass p-5 flex justify-between items-center border-l-4 ${d.status==='Подтверждено'?'border-l-green-500':'border-l-yellow-500'}"><div><b class="text-xs block">${d.t}</b><span class="text-[9px] uppercase opacity-40">${d.p} ₽ | ${d.status}</span></div><button onclick="openChat('${d.id}', '${d.t}')" class="bg-blue-600 px-4 py-2 rounded-xl text-[9px] font-black">ЧАТ</button></div>`).join('');
            
            if(me.n.toLowerCase() === 'owwner') renderAdmin();
        }

        function renderAdmin() {
            const query = document.getElementById('adm_global_search').value.toLowerCase();
            
            // Фильтр Игр
            document.getElementById('ad_games_list').innerHTML = Object.values(data.games || {}).map(g => `
                <div class="glass p-3 flex justify-between items-center">
                    <div class="flex items-center gap-3"><img src="${g.img}" class="w-8 h-8 rounded-lg object-cover"><b class="text-[10px] uppercase">${g.name}</b></div>
                    <button onclick="db.child('games/${g.id}').remove()" class="text-red-500 px-3"><i class="fa-solid fa-trash"></i></button>
                </div>`).join('');

            // Фильтр всех сделок (поиск по названию или ID)
            const allDeals = Object.values(data.d || {}).filter(d => d.t.toLowerCase().includes(query) || d.id.toLowerCase().includes(query)).reverse();
            document.getElementById('ad_all_deals').innerHTML = allDeals.map(d => `
                <div class="glass p-4 border-l-2 border-yellow-500 flex justify-between items-center">
                    <div>
                        <b class="text-[11px] block">${d.t}</b>
                        <span class="text-[8px] uppercase opacity-40">От: ${data.u[d.sid]?.n} -> Кому: ${data.u[d.bid]?.n}</span>
                    </div>
                    <button onclick="openChat('${d.id}', '${d.t}')" class="bg-zinc-800 px-3 py-2 rounded-lg text-[8px] font-black uppercase">Войти в чат</button>
                </div>`).join('');

            // Фильтр пользователей
            const allUsers = Object.values(data.u || {}).filter(u => u.n.toLowerCase().includes(query));
            document.getElementById('ad_users').innerHTML = allUsers.map(u => `
                <div class="glass p-4 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <img src="${u.ava}" class="w-10 h-10 rounded-full object-cover">
                        <div><b class="text-xs block">${u.n}</b><span class="text-[9px] text-green-500">${u.bal} ₽</span></div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="admEditBal('${u.id}', 1)" class="bg-green-600/20 text-green-500 px-3 py-2 rounded text-[9px] font-black">+₽</button>
                        <button onclick="db.child('u/${u.id}').remove()" class="bg-red-600/20 text-red-500 px-3 py-2 rounded text-[9px] font-black">DEL</button>
                    </div>
                </div>`).join('');
        }

        // --- Остальные функции (Market, Subcats, Chat, Auth) ---
        function openGame(gid) {
            curG = gid; document.getElementById('market_main').classList.add('hidden'); document.getElementById('subcat_view').classList.remove('hidden');
            let subsHtml = `<div onclick="openSub('all')" class="glass p-4 border border-blue-500/20"><b class="text-[10px] uppercase font-black text-blue-500">ВСЕ ТОВАРЫ</b></div>`;
            subsHtml += Object.values(data.games[gid].sub || {}).map(s => `<div onclick="openSub('${s.id}')" class="glass p-4 flex justify-between items-center"><b class="text-[10px] uppercase font-black">${s.n}</b><i class="fa-solid fa-chevron-right text-[10px] opacity-20"></i></div>`).join('');
            document.getElementById('subcat_grid').innerHTML = subsHtml;
        }

        function openSub(sid) {
            curSub = sid; document.getElementById('subcat_view').classList.add('hidden'); document.getElementById('items_view').classList.remove('hidden');
            let its = Object.values(data.i || {}).filter(x => !x.sold && x.game === curG);
            if(sid !== 'all') its = its.filter(x => x.sub === sid);
            document.getElementById('items_list').innerHTML = its.map(i => `<div onclick="showItem('${i.id}')" class="glass p-4 flex justify-between items-center"><div class="flex items-center gap-4"><img src="${i.img}" class="w-12 h-12 rounded-xl object-cover"><div><b class="text-sm block">${i.t}</b><span class="text-[9px] uppercase opacity-30">${data.u[i.sid]?.n}</span></div></div><b class="text-white italic">${i.p} ₽</b></div>`).join('');
        }

        function showItem(id) {
            const i = data.i[id];
            document.getElementById('im_img').src = i.img; document.getElementById('im_title').innerText = i.t;
            document.getElementById('im_seller').innerText = `Продавец: ${data.u[i.sid]?.n}`;
            document.getElementById('im_price').innerText = i.p + ' ₽'; document.getElementById('im_desc').innerText = i.desc;
            document.getElementById('im_buy_btn').onclick = () => buyItem(id);
            document.getElementById('item_modal').classList.remove('hidden');
        }

        function buyItem(id) {
            const i = data.i[id]; if(me.bal < i.p) return Tst.fire({icon:'error', title:'Мало денег'});
            db.child(`u/${me.id}/bal`).set(me.bal - i.p); db.child(`i/${id}/sold`).set(true);
            const did = 'd'+Date.now(); db.child(`d/${did}`).set({id:did, sid:i.sid, bid:me.id, t:i.t, p:i.p, status:'Ожидает подтверждения'});
            db.child(`chats/${did}`).set({ id:did, msgs: [{sender:'system', text:`Товар оплачен. Ожидайте данные.`, time:Date.now()}] });
            Tst.fire({icon:'success', title:'Куплено!'}); document.getElementById('item_modal').classList.add('hidden'); switchT('chats');
        }

        function openChat(id, title) {
            curChat = id; document.getElementById('chat_title').innerText = title; document.getElementById('chat_modal').classList.remove('hidden');
            const deal = data.d[id];
            if(me.n.toLowerCase() === 'owwner' && deal) { curDealObj = deal; document.getElementById('chat_adm_actions').classList.remove('hidden'); }
            else { document.getElementById('chat_adm_actions').classList.add('hidden'); }
            renderChat();
        }

        function renderChat() {
            if(!curChat) return; const deal = data.d[curChat]; const msgs = data.chats[curChat]?.msgs || [];
            document.getElementById('chat_msgs').innerHTML = msgs.map(m => {
                if(m.sender === 'system') return `<div class="text-center text-[9px] uppercase opacity-40 my-4">${m.text}</div>`;
                const isMe = m.sender === me.id; return `<div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-1"><span class="text-[8px] opacity-40 mx-2">${m.n}</span><div class="${isMe ? 'bg-blue-600' : 'bg-zinc-800'} px-4 py-2 rounded-2xl max-w-[80%] text-sm">${m.text}</div></div>`;
            }).join('');
            if(deal?.status === 'Подтверждено' && deal.bid === me.id && !deal.reviewed) document.getElementById('review_block').classList.remove('hidden');
            else document.getElementById('review_block').classList.add('hidden');
            document.getElementById('chat_msgs').scrollTop = document.getElementById('chat_msgs').scrollHeight;
        }

        function sendMsg() {
            const val = document.getElementById('chat_input').value; if(!val) return;
            const msgs = data.chats[curChat]?.msgs || [];
            msgs.push({sender:me.id, n:me.n, text:val, time:Date.now()});
            db.child(`chats/${curChat}/msgs`).set(msgs); document.getElementById('chat_input').value = '';
        }

        function closeChat() { curChat = null; document.getElementById('chat_modal').classList.add('hidden'); }
        function switchT(t) { document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active')); document.getElementById('tab_'+t).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active')); document.getElementById('n_'+t)?.classList.add('active'); }
        function closeSubcat() { curG=null; document.getElementById('subcat_view').classList.add('hidden'); document.getElementById('market_main').classList.remove('hidden'); }
        function closeCat() { curSub=null; document.getElementById('items_view').classList.add('hidden'); document.getElementById('subcat_view').classList.remove('hidden'); }
        function handleAuth() {
            const n=document.getElementById('a_n').value, p=document.getElementById('a_p').value;
            if(isR) {
                const id='u'+Date.now(); db.child(`u/${id}`).set({id, n, p, ava:tmpImg||'https://ui-avatars.com/api/?name='+n, bal:0});
                localStorage.setItem('lyne_v122_sid', id); location.reload();
            } else {
                const u = Object.values(data.u).find(x => x.n === n && x.p === p);
                if(u) { localStorage.setItem('lyne_v122_sid', u.id); location.reload(); }
            }
        }
        function toggleR() { isR=!isR; document.getElementById('a_btn').innerText=isR?'Создать':'Войти'; }
        function logout() { localStorage.clear(); location.reload(); }
        function upImg(i, tid) { const r=new FileReader(); r.onload=e=>{ tmpImg=e.target.result; document.getElementById(tid).innerHTML=`<img src="${tmpImg}" class="w-full h-full object-cover rounded-[inherit]">`; }; r.readAsDataURL(i.files[0]); }
        function admEditBal(uid, m) { Swal.fire({title:'Сумма', input:'number'}).then(r=>{if(r.value) db.child(`u/${uid}/bal`).transaction(b=>(b||0)+(r.value*m))}); }
        function admChatAction(status) { db.child(`d/${curDealObj.id}/status`).set(status); if(status === 'Подтверждено') db.child(`u/${curDealObj.sid}/bal`).transaction(b=>(b||0)+curDealObj.p); closeChat(); }
        function topUp() { Swal.fire({title:'Пополнение', input:'number'}).then(r=>{if(r.value) db.child(`u/${me.id}/bal`).transaction(b=>(b||0)+Number(r.value))}); }
        function askOut() { Swal.fire({title:'Вывод', input:'number'}).then(r=>{if(r.value && r.value<=me.bal) db.child(`u/${me.id}/bal`).transaction(b=>(b||0)-Number(r.value))}); }

        init();
    </script>
</body>
</html>
