<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>anon:zadan | V38 INSTANT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        /* Весь дизайн кнопок и стела из v37 сохранен */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { background: #050505; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow: hidden; }
        .glass { background: rgba(20, 20, 25, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 32px; }
        .btn-super { background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899); border-radius: 28px; padding: 20px; font-weight: 900; width: 100%; text-transform: uppercase; cursor: pointer; border: none; color: white; }
    </style>
</head>
<body>

    <div id="app">
        </div>

    <script>
        // ТВОИ ДАННЫЕ (ВШИТЫ)
        const TG_TOKEN = "8722822022:AAEmZa-V4-isxXnZ00omU8gAM_NtYevuL9Y";
        const ADMIN_ID = "7040863301";
        const ADM_PASS = "kalubxq"; // Твой код админа
        
        // ВАЖНО: Впиши сюда адрес, где висит твой index.html (например на GitHub или Vercel)
        const MY_SITE_URL = window.location.href.split('?')[0]; 

        const CFG = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        firebase.initializeApp(CFG);
        const dbRef = firebase.database().ref('anon_zadan_v38');
        
        let me = null, db = {u:{}, t:{}, w:{}};

        function init() {
            // ПРОВЕРКА ССЫЛКИ ИЗ БОТА (AUTO-APPROVE)
            const params = new URLSearchParams(window.location.search);
            const action = params.get('action');
            const tid = params.get('tid');
            const key = params.get('key');

            dbRef.on('value', async (s) => {
                db = s.val() || {u:{}, t:{}, w:{}};
                
                // Если ты нажал кнопку "ДА" в ТГ
                if (action === 'approve' && tid && key === ADM_PASS) {
                    await handleInstantApprove(tid);
                    return;
                }

                // Обычная загрузка приложения
                const id = localStorage.getItem('u_id');
                if(id && db.u[id]) { 
                    me = db.u[id]; 
                    document.getElementById('app').classList.add('visible');
                    render(); 
                }
            });
        }

        // ФУНКЦИЯ ОТПРАВКИ В БОТ С ЖИВЫМИ КНОПКАМИ
        async function tg(txt, transactionId = null) {
            let body = { chat_id: ADMIN_ID, text: txt, parse_mode: "HTML" };
            
            if (transactionId) {
                // Генерируем ссылку для мгновенного одобрения
                const approveLink = `${MY_SITE_URL}?action=approve&tid=${transactionId}&key=${ADM_PASS}`;
                
                body.reply_markup = JSON.stringify({
                    inline_keyboard: [[
                        { text: "ДА 👑 (Одобрить)", url: approveLink },
                        { text: "НЕТ 🙁 (В админку)", url: MY_SITE_URL }
                    ]]
                });
            }

            await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });
        }

        // МОМЕНТАЛЬНОЕ ОДОБРЕНИЕ ПРИ ПЕРЕХОДЕ ПО ССЫЛКЕ
        async function handleInstantApprove(tid) {
            const request = db.w[tid];
            if (!request || request.st !== 'pending') {
                Swal.fire('Ошибка', 'Заявка уже обработана или не найдена', 'error');
                return;
            }

            const user = db.u[request.uid];
            let newBal = Number(user.bal);
            
            if (request.type === 'deposit') newBal += Number(request.amount);
            else newBal -= Number(request.amount);

            await dbRef.child(`u/${user.id}`).update({ bal: newBal });
            await dbRef.child(`w/${tid}`).update({ st: 'success' });

            Swal.fire({
                title: 'ОДОБРЕНО!',
                text: `Баланс @${user.t} успешно пополнен.`,
                icon: 'success',
                confirmButtonText: 'Вернуться на сайт'
            }).then(() => {
                window.location.href = MY_SITE_URL; // Очищаем ссылку от параметров
            });
        }

        // Когда юзер нажимает "Пополнить"
        async function money(type) {
            const {value: am} = await Swal.fire({title: 'СУММА ₽', input: 'number', background: '#111', color: '#fff'});
            if(am) { 
                const id = "w" + Date.now();
                await dbRef.child(`w/${id}`).set({
                    id, uid: me.id, n: me.n, t: me.t, type, amount: Number(am), st: 'pending'
                });
                
                // Шлем в ТГ с кнопкой, привязанной к этой транзакции
                const msg = `💰 <b>ЗАЯВКА!</b>\nЮзер: @${me.t}\nТип: ${type==='deposit'?'Пополнение':'Вывод'}\nСумма: <b>${am} рублей</b>\n\nДа или нет? ❤️‍🩹❤️`;
                tg(msg, id); 
                
                Swal.fire('Готово', 'Заявка ушла админу в бот', 'success');
            }
        }

        // ОСТАЛЬНЫЕ ФУНКЦИИ (render, setTab, auth) ОСТАЮТСЯ ПРЕЖНИМИ
        init();
    </script>
</body>
</html>
