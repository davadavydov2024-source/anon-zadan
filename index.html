<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>anon:zadan v2.7 ALL-IN-ONE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU&apikey=40c0628e-f513-410c-9a00-5e581e26456f" type="text/javascript"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { background: #0a0a0b; color: #e4e4e7; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: #161618; border: 1px solid #27272a; border-radius: 24px; overflow: hidden; }
        .tab { display: none; }
        .tab.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn-accent { background: #ffffff; color: #000; border-radius: 16px; font-weight: 800; }
        .input-dark { background: #0f0f10 !important; border: 1px solid #27272a !important; color: white !important; border-radius: 14px !important; outline: none; }
        .swal2-input { color: black !important; background: white !important; font-weight: bold !important; font-size: 14px !important; margin: 10px auto !important; }
        #map { width: 100%; height: 250px; border-radius: 20px; display: none; }
    </style>
</head>
<body class="pb-28">

    <header class="p-5 flex justify-between items-center sticky top-0 bg-[#0a0a0b]/90 backdrop-blur-md z-50 border-b border-white/5">
        <h1 class="text-lg font-extrabold italic tracking-tighter">anon:<span class="text-zinc-600">zadan</span></h1>
        <div id="u-bal-head" class="bg-zinc-900 px-4 py-1.5 rounded-full text-[11px] font-bold border border-zinc-800 text-white">0.00₽</div>
    </header>

    <section id="home" class="tab active px-5 pt-4">
        <div class="flex gap-2 mb-4">
            <input id="search-geo" class="input-dark flex-1 p-3 text-xs" placeholder="Поиск локации...">
            <button onclick="toggleMap()" class="bg-zinc-800 px-4 rounded-xl text-white"><i class="fa-solid fa-map"></i></button>
        </div>
        <div id="map"></div>
        <div id="zadan-list" class="space-y-4 pb-10 mt-4"></div>
    </section>

    <section id="create" class="tab px-5 pt-4">
        <div class="card p-6 space-y-4">
            <h2 class="font-bold text-[10px] opacity-40 uppercase tracking-widest text-center">Разместить товар</h2>
            <input id="z-title" class="input-dark w-full p-4 text-xs" placeholder="Название">
            <textarea id="z-desc" class="input-dark w-full p-4 text-xs h-20" placeholder="Описание..."></textarea>
            <input id="z-addr" class="input-dark w-full p-4 text-xs" placeholder="Адрес (Яндекс Поиск)">
            <input id="z-price" type="number" class="input-dark w-full p-4 text-xs" placeholder="Цена (₽)">
            <button onclick="createZadan()" class="w-full btn-accent py-5 text-[11px] uppercase tracking-widest">Опубликовать</button>
        </div>
    </section>

    <section id="chats" class="tab px-5 pt-4">
        <div class="card p-5 h-[60vh] flex flex-col">
            <div id="support-messages" class="flex-1 overflow-y-auto space-y-3 mb-4"></div>
            <div class="flex gap-2">
                <input id="user-msg-input" class="input-dark flex-1 p-3.5 text-[11px]" placeholder="Сообщение...">
                <button onclick="userSendMessage()" class="bg-blue-600 w-12 h-11 rounded-xl flex items-center justify-center text-white"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </section>

    <section id="me" class="tab px-5 pt-4 text-center">
        <div class="card p-8 space-y-6">
            <div>
                <h3 id="u-nick" class="font-black text-2xl tracking-tighter">...</h3>
                <p id="u-tg" class="text-blue-500 text-[10px] font-bold mt-1">@username</p>
            </div>
            <div id="u-bal-main" class="bg-zinc-900 p-7 rounded-[32px] border border-zinc-800 font-black text-3xl">0₽</div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="deposit()" class="btn-accent py-4 text-[10px] uppercase">Пополнить</button>
                <button onclick="withdraw()" class="bg-zinc-800 py-4 rounded-xl text-[10px] uppercase text-zinc-400">Вывод</button>
            </div>
            <button onclick="logout()" class="w-full py-4 text-[9px] font-bold text-zinc-600 uppercase border border-zinc-900 rounded-xl mt-4">Выйти из аккаунта</button>
            <button onclick="setTab('admin_login')" class="opacity-10 text-[8px] uppercase font-bold mt-10 block mx-auto tracking-widest">Admin Access</button>
        </div>
    </section>

    <section id="admin_login" class="tab px-5 pt-20">
        <input type="password" id="admin-pass-input" oninput="if(this.value.toLowerCase()==='kalubxq') setTab('admin')" class="w-full p-6 text-center card outline-none border-zinc-700" placeholder="PASSWORD">
    </section>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-black/95 border-t border-zinc-900 flex justify-around items-center z-[100] px-4">
        <button onclick="setTab('home')" id="btn-home"><i class="fa-solid fa-house text-lg"></i></button>
        <button onclick="setTab('create')" id="btn-create" class="opacity-30"><i class="fa-solid fa-plus-circle text-lg"></i></button>
        <button onclick="setTab('chats')" id="btn-chats" class="opacity-30"><i class="fa-solid fa-comment-dots text-lg"></i></button>
        <button onclick="setTab('me')" id="btn-me" class="opacity-30"><i class="fa-solid fa-user text-lg"></i></button>
    </nav>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
          authDomain: "dogx-base.firebaseapp.com",
          databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
          projectId: "dogx-base",
          storageBucket: "dogx-base.firebasestorage.app",
          messagingSenderId: "81713249793",
          appId: "1:81713249793:web:1b44a13e6faf5acfa78a00"
        };

        const DB_VER = 'anon_v2_7'; 
        const TG_TOKEN = "8722822022:AAEmZa-V4-isxXnZ00omU8gAM_NtYevuL9Y";
        const ADMIN_ID = "7040863301";

        firebase.initializeApp(firebaseConfig);
        const rdb = firebase.database();
        let db = { users: {}, tasks: {} };
        let me = null;
        let isAuthOpen = false;

        ymaps.ready(() => { 
            new ymaps.SuggestView('z-addr'); 
            new ymaps.SuggestView('search-geo'); 
        });

        function init() {
            rdb.ref(DB_VER).on('value', (s) => {
                db = s.val() || { users: {}, tasks: {} };
                const uid = localStorage.getItem('anon_uid');
                if (uid && db.users && db.users[uid]) {
                    me = db.users[uid];
                    renderAll();
                } else if (!isAuthOpen) { showAuth(false); }
            });
        }

        // ЕДИНОЕ ОКНО ВХОДА И РЕГИСТРАЦИИ
        async function showAuth(isLogin = true) {
            isAuthOpen = true;
            const { value: f } = await Swal.fire({
                title: isLogin ? 'ВХОД' : 'СОЗДАТЬ АККАУНТ',
                background: '#161618', color: '#fff',
                html: `
                    <input id="s-n" class="swal2-input" placeholder="Никнейм">
                    ${!isLogin ? '<input id="s-tg" class="swal2-input" placeholder="@Username в TG">' : ''}
                    <input id="s-p" type="password" class="swal2-input" placeholder="Пароль">
                    <button onclick="Swal.clickConfirm(); window.toggleMode()" class="mt-4 text-blue-500 text-[10px] font-bold uppercase block w-full">
                        ${isLogin ? 'Зарегистрироваться' : 'Уже есть аккаунт? Войти'}
                    </button>`,
                confirmButtonText: isLogin ? 'ВОЙТИ' : 'ГОТОВО',
                allowOutsideClick: false,
                preConfirm: () => [
                    document.getElementById('s-n').value.trim(), 
                    document.getElementById('s-p').value.trim(),
                    !isLogin ? document.getElementById('s-tg').value.trim() : null
                ]
            });

            isAuthOpen = false;
            if (f && f[0]) {
                const [n, p, t] = f;
                let user = Object.values(db.users || {}).find(x => x.nick === n);
                
                if (isLogin) {
                    if (user && user.pass === p) { localStorage.setItem('anon_uid', user.id); location.reload(); }
                    else { await Swal.fire('Ошибка', 'Неверный ник или пароль', 'error'); showAuth(true); }
                } else {
                    if (user) { await Swal.fire('Ошибка', 'Ник уже занят', 'error'); showAuth(false); }
                    else if (!n || !p || !t) { await Swal.fire('Ошибка', 'Заполните все поля', 'error'); showAuth(false); }
                    else {
                        const id = Math.floor(100000+Math.random()*900000).toString();
                        await rdb.ref(DB_VER+'/users/'+id).set({ id, nick: n, pass: p, tg: t, bal: 0, created: Date.now() });
                        localStorage.setItem('anon_uid', id); location.reload();
                    }
                }
            }
        }
        window.toggleMode = () => { const isL = Swal.getTitle().innerText === 'ВХОД'; showAuth(!isL); };

        // ЛОГИКА ТГ-УВЕДОМЛЕНИЙ С КНОПКАМИ ВЫВОДА
        async function sendTGWithButtons(txt, userId, amount, requestId) {
            const kb = { inline_keyboard: [[
                { text: "✅ Принять", callback_data: `approve_${userId}_${amount}_${requestId}` },
                { text: "❌ Отклонить", callback_data: `reject_${userId}_${amount}_${requestId}` }
            ]]};
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: ADMIN_ID, text: txt, parse_mode: 'HTML', reply_markup: kb })
            });
        }

        async function withdraw() {
            const { value: amount } = await Swal.fire({ title: 'Вывод средств', input: 'number', inputLabel: 'Мин. 100₽', background: '#161618', color: '#fff' });
            if (amount >= 100 && me.bal >= amount) {
                const rid = Date.now();
                rdb.ref(`${DB_VER}/users/${me.id}`).update({ bal: me.bal - amount });
                const msg = `💸 <b>ВЫВОД</b>\nЮзер: <b>${me.tg}</b>\nСумма: <b>${amount}₽</b>`;
                sendTGWithButtons(msg, me.id, amount, rid);
                Swal.fire('Успех', 'Заявка отправлена админу', 'success');
            } else { Swal.fire('Ошибка', 'Проверьте сумму или баланс', 'error'); }
        }

        function renderAll() {
            document.getElementById('u-bal-head').innerText = me.bal + '₽';
            document.getElementById('u-bal-main').innerText = me.bal + '₽';
            document.getElementById('u-nick').innerText = me.nick;
            document.getElementById('u-tg').innerText = me.tg;
            
            const tasks = Object.values(db.tasks || {}).filter(t => t.status === 'active').sort((a,b)=>b.created-a.created);
            document.getElementById('zadan-list').innerHTML = tasks.map(t => `
                <div class="card p-4">
                    <div class="flex justify-between items-center mb-2">
                        <b class="text-xs uppercase opacity-40">${t.addr}</b>
                        <span class="text-green-400 font-black text-sm">${t.price}₽</span>
                    </div>
                    <b class="text-lg tracking-tight">${t.title}</b>
                </div>`).join('');
        }

        function setTab(t) { 
            document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); 
            document.getElementById(t).classList.add('active'); 
            document.querySelectorAll('nav button').forEach(b=>b.classList.add('opacity-30'));
            if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.remove('opacity-30');
        }

        function logout() { localStorage.removeItem('anon_uid'); location.reload(); }
        function deposit() { fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent('💰 ПОПОЛНЕНИЕ: ' + me.tg)}`); Swal.fire('Ждите','Админ свяжется в ТГ','info'); }
        
        init();
    </script>
</body>
</html>
