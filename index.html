<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK V41.3 — FIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        :root { --bg: #050506; --card: #111113; --blue: #3b82f6; --gold: #ffb000; }
        body { background: var(--bg); color: #fff; font-family: 'Manrope', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        
        /* Исправленный лоадер */
        #loader { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 0.5s ease; 
        }

        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 24px 20px 140px; }
        .tab-content.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(10,10,12,0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #52525b; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 9px; font-weight: 800; cursor: pointer; }
        .nav-btn.active { color: var(--blue); }
        
        .tile { background: var(--card); border-radius: 22px; border: 1px solid rgba(255,255,255,0.04); }
        input, textarea, select { background: #18181b; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 14px; color: white; width: 100%; outline: none; font-size: 14px; }
        .btn-main { background: var(--blue); padding: 18px; border-radius: 20px; font-weight: 800; text-transform: uppercase; width: 100%; }
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="text-2xl font-black italic">LYNE<span class="text-blue-500">OK</span></div>
        <div class="mt-4 w-12 h-1 bg-zinc-800 rounded-full overflow-hidden">
            <div class="bg-blue-500 h-full animate-[loading_2s_infinite]"></div>
        </div>
        <style>@keyframes loading { 0% { width: 0; transform: translateX(-100%); } 50% { width: 100%; transform: translateX(0); } 100% { width: 0; transform: translateX(100%); } }</style>
    </div>

    <div id="auth_screen" class="hidden h-screen flex flex-col items-center justify-center px-10">
        <h1 class="text-4xl font-black italic mb-8 uppercase">LYNE<span class="text-blue-500">OK</span></h1>
        <div class="w-full max-w-sm space-y-3">
            <input id="reg_n" placeholder="ЛОГИН">
            <input id="reg_p" type="password" placeholder="ПАРОЛЬ">
            <input id="reg_tg" placeholder="TG (например @sswckk)">
            <button onclick="handleAuth()" class="btn-main mt-4">ВХОД / РЕГИСТРАЦИЯ</button>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-6 py-5 flex justify-between items-center bg-zinc-950 border-b border-white/5 z-50">
            <span class="font-black italic text-xl">LYNEOK</span>
            <div id="h_bal" class="bg-blue-500/10 text-blue-500 px-4 py-2 rounded-xl font-black text-sm italic">0 ₽</div>
        </header>

        <main id="tab_market" class="tab-content active"><div id="cat_view" class="grid grid-cols-2 gap-4"></div></main>
        
        <main id="tab_sell" class="tab-content">
            <h2 class="text-xl font-black mb-6 italic uppercase text-blue-500">ПРОДАТЬ</h2>
            <div class="space-y-4">
                <input type="file" id="i_img" class="hidden" onchange="compImg(this)">
                <label for="i_img" id="l_img" class="w-full h-32 bg-zinc-900 border-2 border-dashed border-white/10 rounded-3xl flex items-center justify-center font-black text-[10px] opacity-50 uppercase">ФОТО ТОВАРА</label>
                <input id="i_title" placeholder="Название">
                <input id="i_price" type="number" placeholder="Цена (от 30₽)">
                <button onclick="postItem()" class="btn-main">ОПУБЛИКОВАТЬ</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content">
            <h2 class="text-xl font-black mb-4 italic uppercase text-blue-500">СДЕЛКИ</h2>
            <div id="chats_list" class="space-y-2"></div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="tile p-6 mb-4 flex items-center gap-4">
                <div id="p_ava" class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center font-black text-xl">?</div>
                <div>
                    <b id="p_name" class="text-lg uppercase italic">...</b>
                    <p id="p_id" class="text-[9px] opacity-30 font-bold">UID: 000000</p>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <button onclick="showPurchases()" class="tile p-5 text-center">
                    <i class="fa-solid fa-cart-shopping text-blue-500 mb-2"></i>
                    <p class="text-[9px] font-black opacity-40 uppercase">Покупки: <span id="p_buy_cnt">0</span></p>
                </button>
                <button onclick="showSales()" class="tile p-5 text-center">
                    <i class="fa-solid fa-tag text-gold mb-2"></i>
                    <p class="text-[9px] font-black opacity-40 uppercase">Продажи: <span id="p_sell_cnt">0</span></p>
                </button>
            </div>
            <button onclick="logout()" class="tile w-full p-5 opacity-30 font-black text-xs uppercase italic mt-4">ВЫЙТИ</button>
        </main>

        <nav class="nav-bar">
            <div onclick="switchTab('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-store text-xl"></i><span>МАРКЕТ</span></div>
            <div onclick="switchTab('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-plus-circle text-xl"></i><span>ПРОДАТЬ</span></div>
            <div onclick="switchTab('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-comment text-xl"></i><span>СДЕЛКИ</span></div>
            <div onclick="switchTab('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user text-xl"></i><span>ПРОФИЛЬ</span></div>
        </nav>
    </div>

    <script>
        // Твои конфиги
        const CFG = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        firebase.initializeApp(CFG);
        const db = firebase.database().ref('lyne_v41_ulti');

        let me = null, data = {}, b64 = "";

        // ФУНКЦИЯ СКРЫТИЯ ЛОАДЕРА
        function hideLoader() {
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 500);
        }

        // ПРЕДОХРАНИТЕЛЬ: Если через 7 секунд база не ответила — убираем лоадер принудительно
        setTimeout(() => {
            if (document.getElementById('loader').style.display !== 'none') {
                console.log("Firebase timeout - forcing app start");
                hideLoader();
                if (!me) document.getElementById('auth_screen').classList.remove('hidden');
            }
        }, 7000);

        function init() {
            const sid = localStorage.getItem('lyne_sid');
            
            db.on('value', snap => {
                data = snap.val() || { u:{}, i:{}, d:{}, cat:{} };
                
                if(!sid) {
                    document.getElementById('auth_screen').classList.remove('hidden');
                } else {
                    me = data.u[sid];
                    if(!me) return logout();
                    
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('auth_screen').classList.add('hidden');
                    render();
                }
                hideLoader(); // Скрываем лоадер сразу после получения данных
            }, err => {
                console.error(err);
                hideLoader(); // Даже при ошибке скрываем, чтобы не висел бесконечно
            });
        }

        async function handleAuth() {
            const n = document.getElementById('reg_n').value.trim(), p = document.getElementById('reg_p').value.trim(), tg = document.getElementById('reg_tg').value.trim();
            if(!n || !p || !tg) return Swal.fire('!', 'Заполни поля', 'warning');
            
            let uid = Object.keys(data.u || {}).find(k => data.u[k].n.toLowerCase() === n.toLowerCase());
            if(!uid) {
                uid = 'u' + Math.random().toString(36).substr(2, 6);
                await db.child(`u/${uid}`).set({ id: uid, n, p, tg, bal: 0, regDate: Date.now() });
            } else if(data.u[uid].p !== p) return Swal.fire('!', 'Пароль!', 'error');
            
            localStorage.setItem('lyne_sid', uid);
            location.reload();
        }

        function render() {
            document.getElementById('h_bal').innerText = (me.bal || 0).toLocaleString() + ' ₽';
            document.getElementById('p_name').innerText = me.n;
            document.getElementById('p_id').innerText = 'UID: ' + me.id;
            
            const myBuy = Object.values(data.d || {}).filter(d => d.bid === me.id).length;
            const mySell = Object.values(data.d || {}).filter(d => d.sid === me.id).length;
            document.getElementById('p_buy_cnt').innerText = myBuy;
            document.getElementById('p_sell_cnt').innerText = mySell;

            const cats = Object.values(data.cat || {});
            document.getElementById('cat_view').innerHTML = cats.map(c => `
                <div class="tile p-6 text-center">
                    <img src="${c.img}" class="w-12 h-12 mx-auto mb-2 rounded-xl object-cover">
                    <p class="text-[10px] font-black uppercase italic">${c.name}</p>
                </div>`).join('');
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.getElementById('tab_'+t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById('n_'+t).classList.add('active');
        }

        function showPurchases() { Swal.fire('Инфо', 'Список покупок в разработке', 'info'); }
        function showSales() { Swal.fire('Инфо', 'Список продаж в разработке', 'info'); }
        function logout() { localStorage.clear(); location.reload(); }

        function compImg(i) {
            const r = new FileReader();
            r.onload = e => {
                b64 = e.target.result;
                document.getElementById('l_img').innerHTML = `<img src="${b64}" class="w-full h-full object-cover rounded-2xl">`;
            };
            r.readAsDataURL(i.files[0]);
        }

        init();
    </script>
</body>
</html>
