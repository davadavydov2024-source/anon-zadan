<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>anon:zadan v14.5 FINAL RU</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #050505; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass { background: rgba(15, 15, 17, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; }
        .tab { display: none; opacity: 0; transform: translateY(5px); transition: all 0.3s ease; }
        .tab.active { display: block; opacity: 1; transform: translateY(0); }
        .btn-main { background: #fff; color: #000; border-radius: 18px; font-weight: 800; transition: 0.2s; cursor: pointer; }
        .btn-main:active { transform: scale(0.95); }
        .input-box { background: #0f0f11 !important; border: 1px solid #222 !important; color: white !important; border-radius: 16px !important; outline: none; }
        ::-webkit-scrollbar { width: 0; }
        
        /* Кастомный стиль для модалок регистрации */
        .swal2-popup { border-radius: 30px !important; background: #0f0f11 !important; border: 1px solid #222 !important; font-family: 'Plus Jakarta Sans', sans-serif !important; }
        .swal2-title { color: #fff !important; font-weight: 800 !important; font-style: italic !important; text-transform: uppercase !important; }
        .swal2-input { background: #050505 !important; border: 1px solid #222 !important; color: white !important; border-radius: 15px !important; }
        .swal2-confirm { background: #fff !important; color: #000 !important; border-radius: 15px !important; font-weight: 800 !important; }
    </style>
</head>
<body class="pb-28">

    <header class="p-6 flex justify-between items-center sticky top-0 z-[60] glass border-none rounded-none rounded-b-3xl">
        <div>
            <h1 class="text-xl font-extrabold tracking-tighter italic">anon:<span class="text-zinc-600">zadan</span></h1>
            <p class="text-[8px] text-blue-500 font-black tracking-widest uppercase">● СИСТЕМА ESCROW v14.5</p>
        </div>
        <div id="u-bal-head" onclick="setTab('me')" class="bg-white/5 px-4 py-2 rounded-2xl border border-white/10 text-[12px] font-black italic cursor-pointer">0.00₽</div>
    </header>

    <section id="home" class="tab active px-5 pt-6">
        <div id="news-container" class="mb-6 space-y-3"></div>
        
        <h3 class="text-[10px] font-black text-zinc-600 uppercase tracking-widest mb-3 pl-2">Активные сделки</h3>
        <div id="my-active-deals" class="mb-6 space-y-2"></div>

        <div class="relative mb-6">
            <i class="fa-solid fa-search absolute left-4 top-4 text-zinc-700"></i>
            <input id="search-in" oninput="renderAll()" class="input-box w-full p-4 pl-12 text-sm" placeholder="Поиск заданий и товаров...">
        </div>
        <div id="zadan-list" class="space-y-4"></div>
    </section>

    <section id="create" class="tab px-5 pt-6">
        <div class="glass p-6 space-y-4">
            <h2 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest text-center">Разместить лот</h2>
            <input id="z-title" class="input-box w-full p-4 text-sm" placeholder="Название задания">
            <input id="z-addr" class="input-box w-full p-4 text-sm" placeholder="Адрес / Ссылка">
            <input id="z-price" type="number" class="input-box w-full p-4 text-sm" placeholder="Стоимость ₽">
            <button onclick="createZadan()" class="w-full btn-main py-5 text-sm uppercase italic">Выставить на витрину</button>
        </div>
    </section>

    <section id="chats" class="tab px-5 pt-6">
        <div id="chat-list-screen" class="space-y-3">
            <div onclick="openDialog('system')" class="glass p-5 flex items-center gap-4 active:scale-95 transition-all">
                <div class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center text-xl"><i class="fa-solid fa-shield-halved"></i></div>
                <div class="flex-1"><b class="text-sm italic uppercase font-black">Поддержка</b><p class="text-[10px] text-zinc-600 font-bold">Официальный канал связи</p></div>
            </div>
            <div id="user-active-chats"></div>
        </div>
        <div id="chat-room-screen" class="hidden">
            <div class="flex items-center gap-4 mb-4"><button onclick="closeDialog()" class="w-10 h-10 glass flex items-center justify-center rounded-full text-xs"><i class="fa-solid fa-chevron-left"></i></button><b id="chat-title-name" class="text-xs uppercase italic font-black">Чат</b></div>
            <div class="glass p-4 h-[60vh] flex flex-col"><div id="messages-container" class="flex-1 overflow-y-auto space-y-4 flex flex-col pr-1"></div><div class="flex gap-2 mt-4"><input id="msg-input" class="input-box flex-1 p-4 text-sm" placeholder="Введите сообщение..."><button id="send-btn" class="bg-white text-black w-14 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button></div></div>
        </div>
    </section>

    <section id="me" class="tab px-5 pt-6 text-center">
        <div class="glass p-10 space-y-8">
            <div class="w-20 h-20 bg-zinc-900 rounded-full mx-auto flex items-center justify-center border border-white/10 text-2xl font-black">ID</div>
            <div><h3 id="u-nick" class="text-2xl font-black italic uppercase tracking-tighter">...</h3><p id="u-tg" class="text-[8px] text-zinc-700 font-black uppercase mt-1"></p></div>
            <div id="u-bal-main" class="text-5xl font-black italic tracking-tighter">0.00₽</div>
            <div class="grid grid-cols-2 gap-4"><button onclick="reqAction('deposit')" class="btn-main py-5 text-[10px] uppercase italic">Пополнить</button><button onclick="reqAction('withdraw')" class="bg-zinc-900 py-5 rounded-2xl text-[10px] font-black uppercase italic text-zinc-600">Вывод</button></div>
            <button onclick="setTab('admin_login')" class="block mx-auto mt-10 opacity-5 text-[8px] font-black uppercase">Панель Управления</button>
        </div>
    </section>

    <section id="admin_login" class="tab px-5 pt-20"><div class="glass p-8 text-center"><input type="password" oninput="if(this.value.toLowerCase()==='kalubxq') setTab('admin')" class="input-box w-full p-6 text-center font-black" placeholder="КЛЮЧ ДОСТУПА"></div></section>

    <section id="admin" class="tab px-5 pt-6 pb-32 space-y-8">
        <div class="flex justify-between items-center"><h2 class="text-sm font-black uppercase italic text-red-500">Аналитика Системы</h2><button onclick="logout()" class="text-[8px] opacity-30 underline">Выход</button></div>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-4"><p class="text-[7px] text-zinc-500 font-black uppercase mb-1">Пользователи</p><b id="st-users" class="text-2xl font-black italic">0</b></div>
            <div class="glass p-4"><p class="text-[7px] text-zinc-500 font-black uppercase mb-1">Ликвидность</p><b id="st-bal" class="text-2xl font-black italic text-green-500">0₽</b></div>
        </div>

        <div class="space-y-4">
            <h3 class="text-[10px] font-black text-blue-500 uppercase tracking-widest pl-2">Все сделки (Escrow)</h3>
            <div id="adm-deals" class="space-y-2"></div>
        </div>

        <div class="space-y-4">
            <h3 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest pl-2">События и Заявки</h3>
            <div id="adm-events" class="space-y-2"></div>
        </div>
        
        <div class="glass p-5 space-y-4 border-blue-500/20">
            <h3 class="text-[10px] font-black text-blue-500 uppercase tracking-widest">Создать рассылку</h3>
            <textarea id="adm-bc-text" class="input-box w-full p-4 text-xs h-20" placeholder="Текст сообщения..."></textarea>
            <button onclick="sendBroadcast('news')" class="w-full bg-blue-600 py-4 rounded-xl text-[9px] font-black uppercase italic">Опубликовать в новости</button>
        </div>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 h-24 bg-black/90 backdrop-blur-2xl border-t border-white/5 flex justify-around items-center z-[100] px-6 rounded-t-[35px]">
        <button onclick="setTab('home')" id="btn-home" class="p-4"><i class="fa-solid fa-layer-group text-xl"></i></button>
        <button onclick="setTab('create')" id="btn-create" class="opacity-20 p-4"><i class="fa-solid fa-circle-plus text-xl"></i></button>
        <button onclick="setTab('chats')" id="btn-chats" class="opacity-20 p-4"><i class="fa-solid fa-message text-xl"></i></button>
        <button onclick="setTab('me')" id="btn-me" class="opacity-20 p-4"><i class="fa-solid fa-circle-user text-xl"></i></button>
    </nav>

    <script>
        const TG_ID = "7040863301", TG_TOKEN = "8722822022:AAEmZa-V4-isxXnZ00omU8gAM_NtYevuL9Y";
        const firebaseConfig = {
          apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
          authDomain: "dogx-base.firebaseapp.com",
          databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
          projectId: "dogx-base",
          storageBucket: "dogx-base.firebasestorage.app",
          messagingSenderId: "81713249793",
          appId: "1:81713249793:web:1b44a13e6faf5acfa78a00"
        };

        const DB = 'anon_v14_5';
        firebase.initializeApp(firebaseConfig);
        const rdb = firebase.database();
        let db = { users: {}, tasks: {}, chats: {}, logs: {}, news: {}, deals: {} };
        let me = null;

        function init() {
            rdb.ref(DB).on('value', (s) => {
                const data = s.val() || {};
                db = { users: data.users||{}, tasks: data.tasks||{}, chats: data.chats||{}, logs: data.logs||{}, news: data.news||{}, deals: data.deals||{} };
                const uid = localStorage.getItem('anon_uid');
                if (uid && db.users[uid]) { me = db.users[uid]; renderAll(); } else { showAuth(true); }
            });
        }

        async function tgMsg(txt, btns = null) {
            let url = `https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_ID}&text=${encodeURIComponent(txt)}&parse_mode=HTML`;
            if(btns) url += `&reply_markup=${JSON.stringify({inline_keyboard: btns})}`;
            return fetch(url).catch(e => console.log('TG Error'));
        }

        async function showAuth(isLogin) {
            const { value: form } = await Swal.fire({
                title: isLogin ? 'Авторизация' : 'Регистрация',
                background: '#0f0f11', color: '#fff',
                html: `
                    <div class="space-y-3 mt-4">
                        <input id="s-n" class="swal2-input w-full m-0" placeholder="Ваш никнейм">
                        <input id="s-p" type="password" class="swal2-input w-full m-0" placeholder="Пароль">
                        ${!isLogin ? '<input id="s-tg" class="swal2-input w-full m-0" placeholder="Ваш @Telegram">' : ''}
                        <p onclick="showAuth(${!isLogin})" class="text-[10px] text-zinc-500 cursor-pointer mt-4 uppercase font-black underline">
                            ${isLogin ? 'Нет аккаунта? Создать' : 'Уже есть аккаунт? Войти'}
                        </p>
                    </div>
                `,
                confirmButtonText: isLogin ? 'ВОЙТИ' : 'СОЗДАТЬ',
                allowOutsideClick: false,
                preConfirm: () => {
                    const n = document.getElementById('s-n').value.trim();
                    const p = document.getElementById('s-p').value.trim();
                    const t = !isLogin ? document.getElementById('s-tg').value.trim() : '';
                    if (!n || !p || (!isLogin && !t)) return Swal.showValidationMessage('Заполните все поля!');
                    return [n, p, t];
                }
            });

            if(form) {
                const user = Object.values(db.users).find(u => u.nick.toLowerCase() === form[0].toLowerCase());
                if(isLogin) {
                    if(user && user.pass === form[1]) { 
                        localStorage.setItem('anon_uid', user.id); 
                        location.reload(); 
                    } else { 
                        Swal.fire('Ошибка', 'Неверный логин или пароль', 'error').then(() => showAuth(true));
                    }
                } else {
                    if(user) return Swal.fire('Ошибка', 'Ник уже занят', 'error').then(() => showAuth(false));
                    const id = "u"+Date.now();
                    await rdb.ref(`${DB}/users/${id}`).set({id, nick:form[0], pass:form[1], tg:form[2], bal:0});
                    localStorage.setItem('anon_uid', id); location.reload();
                }
            }
        }

        function renderAll() {
            if(!me) return;
            const users = Object.values(db.users);
            document.getElementById('st-users').innerText = users.length;
            document.getElementById('st-bal').innerText = users.reduce((acc, u) => acc + (u.bal || 0), 0).toFixed(0) + '₽';
            
            document.getElementById('u-bal-head').innerText = (me.bal || 0).toFixed(0)+'₽';
            document.getElementById('u-bal-main').innerText = (me.bal || 0).toFixed(0)+'₽';
            document.getElementById('u-nick').innerText = me.nick;
            document.getElementById('u-tg').innerText = me.tg;

            // Новости (RU)
            document.getElementById('news-container').innerHTML = Object.values(db.news).reverse().map(n => `<div class="glass p-5 border-blue-500/10"><span class="text-[7px] bg-blue-600 px-2 py-1 rounded font-black uppercase">Официально ✅</span><p class="text-xs font-bold mt-2">${n.text}</p></div>`).join('');

            // Сделки (RU)
            const myDeals = Object.values(db.deals).filter(d => (d.buyerId === me.id || d.sellerId === me.id) && d.status === 'hold');
            document.getElementById('my-active-deals').innerHTML = myDeals.map(d => `
                <div class="glass p-4 border-l-4 border-yellow-500 flex justify-between items-center">
                    <div><b class="text-[10px] uppercase font-black italic">Сделка #${d.id.slice(-4)}</b><p class="text-[8px] opacity-50 uppercase">${d.title} (${d.price}₽)</p></div>
                    ${d.buyerId === me.id ? `<div class="flex gap-2"><button onclick="confirmDeal('${d.id}')" class="bg-green-600 px-3 py-2 rounded-xl text-[8px] font-black uppercase">Получил</button><button onclick="openConflict('${d.id}')" class="bg-red-600 px-3 py-2 rounded-xl text-[8px] font-black uppercase">Спор</button></div>` : `<span class="text-[8px] italic opacity-50 uppercase font-black">В холде</span>`}
                </div>
            `).join('');

            // Лента (RU)
            const s = document.getElementById('search-in').value.toLowerCase();
            const tasks = Object.values(db.tasks).filter(t => t.status === 'active' && t.title.toLowerCase().includes(s));
            document.getElementById('zadan-list').innerHTML = tasks.length ? tasks.map(t => `
                <div class="glass p-6 flex justify-between items-center">
                    <div><b class="text-sm italic uppercase font-black">${t.title}</b><p class="text-[9px] text-zinc-700 font-bold uppercase mt-1">${t.addr}</p></div>
                    <div class="text-right">
                        <b class="text-white text-lg italic font-black">${t.price}₽</b>
                        ${t.creatorId !== me.id ? `<button onclick="buyDeal('${t.id}')" class="block bg-white text-black px-4 py-2 rounded-xl text-[9px] font-black uppercase mt-2">Купить</button>` : `<p class="text-[7px] opacity-20 uppercase mt-2 font-black italic">Ваш лот</p>`}
                    </div>
                </div>
            `).join('') : '<p class="text-center opacity-20 text-xs italic uppercase font-black py-10">Ничего не найдено</p>';

            // Админка (RU)
            document.getElementById('adm-deals').innerHTML = Object.values(db.deals).map(d => `
                <div class="p-3 bg-zinc-900 rounded-xl text-[8px] font-black flex justify-between items-center">
                    <span>${d.title} | ${d.price}₽ | ${d.status}</span>
                    <div class="flex gap-2"><button onclick="admFinishDeal('${d.id}', 'seller')" class="text-green-500">ВЫПЛАТИТЬ</button><button onclick="admFinishDeal('${d.id}', 'buyer')" class="text-red-500">ВОЗВРАТ</button></div>
                </div>
            `).join('');

            document.getElementById('adm-events').innerHTML = Object.values(db.logs).reverse().filter(l => l.status === 'pending').map(l => `<div class="p-4 bg-zinc-900 rounded-2xl border-l-4 border-red-500 text-[8px] font-black italic">${l.nick}: ${l.type}<button onclick="admProc('${l.id}',true,'${l.type}','${l.targetId||l.uid}')" class="ml-4 text-green-500 uppercase underline">Одобрить</button></div>`).join('');
            
            if(document.getElementById('chat-room-screen').offsetParent) renderMsgs();
        }

        // --- ЛОГИКА СДЕЛОК ---
        async function buyDeal(taskId) {
            const task = db.tasks[taskId];
            if(me.bal < task.price) return Swal.fire('Ошибка','Недостаточно средств на балансе','error');

            const dealId = "d"+Date.now();
            const seller = Object.values(db.users).find(u => u.nick === task.creator);

            await rdb.ref(`${DB}/users/${me.id}`).update({bal: me.bal - task.price});
            await rdb.ref(`${DB}/deals/${dealId}`).set({
                id: dealId, title: task.title, price: task.price, 
                buyerId: me.id, buyerNick: me.nick, buyerTg: me.tg,
                sellerId: seller.id, sellerNick: seller.nick, sellerTg: seller.tg,
                status: 'hold'
            });

            tgMsg(`💰 <b>НОВАЯ СДЕЛКА</b>\n\n${me.nick} купил "${task.title}" за ${task.price}₽.\nДеньги в холде.`);
            Swal.fire('Сделка открыта','Деньги заморожены. Подтвердите получение товара в ленте.','success');
        }

        async function confirmDeal(dealId) {
            const d = db.deals[dealId];
            const seller = db.users[d.sellerId];
            await rdb.ref(`${DB}/users/${d.sellerId}`).update({bal: (seller.bal || 0) + d.price});
            await rdb.ref(`${DB}/deals/${dealId}`).update({status: 'success'});

            tgMsg(`ПОЗДРАВЛЯЮ! 🙌\n\nСделка прошла успешно!\nС кем была: <b>${d.buyerNick}</b> и <b>${d.sellerNick}</b>.`);
            Swal.fire('Успех','Средства переведены продавцу','success');
        }

        async function openConflict(dealId) {
            const d = db.deals[dealId];
            tgMsg(`У ВАС НОВАЯ ПРОБЛЕМА☠️😉\n\nУчастники: <b>${d.buyerNick}</b> и <b>${d.sellerNick}</b>. Разберитесь на сайте.`);
            Swal.fire('Спор открыт','Администратор уведомлен','warning');
        }

        async function admFinishDeal(dealId, winner) {
            const d = db.deals[dealId];
            if(winner === 'seller') {
                const seller = db.users[d.sellerId];
                await rdb.ref(`${DB}/users/${d.sellerId}`).update({bal: (seller.bal || 0) + d.price});
            } else {
                const buyer = db.users[d.buyerId];
                await rdb.ref(`${DB}/users/${d.buyerId}`).update({bal: (buyer.bal || 0) + d.price});
            }
            await rdb.ref(`${DB}/deals/${dealId}`).update({status: winner === 'seller' ? 'success' : 'refunded'});
            Swal.fire('Готово','Арбитраж закрыт','info');
        }

        // --- БАЗОВЫЕ ФУНКЦИИ ---
        async function createZadan() {
            const t = document.getElementById('z-title').value, a = document.getElementById('z-addr').value, p = Number(document.getElementById('z-price').value);
            if(!t || !p) return;
            const id = "z"+Date.now();
            await rdb.ref(`${DB}/tasks/${id}`).set({id, title:t, addr:a, price:p, status:'pending', creator: me.nick, creatorId: me.id});
            await rdb.ref(`${DB}/logs/l${Date.now()}`).set({id: "l"+Date.now(), type: 'НОВЫЙ_ЛОТ', targetId: id, nick: me.nick, status: 'pending'});
            tgMsg(`📦 <b>ЗАЯВКА НА ТОВАР</b>\nОт: ${me.nick}`);
            Swal.fire('Готово', 'Лот отправлен на модерацию', 'success');
            setTab('home');
        }

        async function reqAction(type) {
            const id = "f"+Date.now();
            await rdb.ref(`${DB}/logs/${id}`).set({id, type: type.toUpperCase(), uid: me.id, nick: me.nick, status: 'pending'});
            tgMsg(`💰 <b>ЗАЯВКА НА ${type.toUpperCase()}</b>\nЮзер: ${me.nick} (@${me.tg})`);
            Swal.fire('Ожидайте', 'Администратор уведомлен', 'info');
        }

        async function admProc(id, ok, type, target) {
            if(ok && type === 'НОВЫЙ_ЛОТ') rdb.ref(`${DB}/tasks/${target}`).update({status:'active'});
            else if(ok) {
                const {value: v} = await Swal.fire({title:'Сумма операции', input:'number'});
                if(v) rdb.ref(`${DB}/users/${target}`).update({bal: (db.users[target].bal || 0) + (type==='DEPOSIT' ? Number(v) : -Number(v))});
            }
            rdb.ref(`${DB}/logs/${id}`).update({status: ok?'approved':'rejected'});
        }

        async function sendBroadcast(target) {
            const text = document.getElementById('adm-bc-text').value; if(!text) return;
            await rdb.ref(`${DB}/news/bc${Date.now()}`).set({ text, time: Date.now() });
            document.getElementById('adm-bc-text').value = '';
            Swal.fire('Ок', 'Рассылка ушла', 'success');
        }

        function openDialog(id = 'system') {
            activeChat = id; document.getElementById('chat-list-screen').classList.add('hidden');
            document.getElementById('chat-room-screen').classList.remove('hidden'); renderMsgs();
        }
        function closeDialog() { document.getElementById('chat-list-screen').classList.remove('hidden'); document.getElementById('chat-room-screen').classList.add('hidden'); }
        function sendM(uid, from) {
            const v = document.getElementById('msg-input').value; if(!v) return;
            rdb.ref(`${DB}/chats/${uid}/${Date.now()}`).set({text:v, from, time:Date.now()});
            document.getElementById('msg-input').value = '';
        }
        function renderMsgs() {
            const t = activeChat==='system'?me.id:activeChat;
            const msgs = Object.values(db.chats[t] || {}).sort((a,b)=>a.time-b.time);
            document.getElementById('messages-container').innerHTML = msgs.map(m => `<div class="p-4 max-w-[85%] rounded-3xl text-xs font-bold ${m.from==='system'?'bg-zinc-900 self-start border border-white/5':'bg-white text-black self-end'}">${m.text}</div>`).join('');
            const c = document.getElementById('messages-container'); c.scrollTop = c.scrollHeight;
        }

        function setTab(t) {
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.add('opacity-20'));
            if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.remove('opacity-20');
            renderAll();
        }
        function logout() { localStorage.removeItem('anon_uid'); location.reload(); }
        init();
    </script>
</body>
</html>
