    <script>
        const cfg = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com", storageBucket: "dogx-base.appspot.com" };
        const K = 'anon_v24_monolith'; firebase.initializeApp(cfg); const db_r = firebase.database(); const st_r = firebase.storage();
        let me = null, activeC = null, db = {u:{}, t:{}, c:{}}, btnC = 0;

        function init() {
            db_r.ref(K).on('value', s => {
                db = s.val() || {u:{}, t:{}, c:{}}; const uid = localStorage.getItem('a_id');
                if(uid && db.u[uid]) { me = db.u[uid]; if(me.b) showB(); render(); } else auth();
                document.getElementById('f-on').innerText = Math.floor(Math.random() * 50 + 90);
            });
        }

            const { value: f } = await Swal.fire({ 
                title: 'ВХОД / РЕГИСТРАЦИЯ', 
                background:'#000', 
                color:'#fff', 
                html:`<input id="sn" class="swal2-input" placeholder="Никнейм"><input id="sp" type="password" class="swal2-input" placeholder="Пароль"><input id="st" class="swal2-input" placeholder="@Телеграм" oninput="this.value.startsWith('@')?'':this.value='@'+this.value">`, 
                allowOutsideClick:false, 
                confirmButtonText: 'Войти',
                preConfirm:()=> {
                    const n = document.getElementById('sn').value, p = document.getElementById('sp').value, t = document.getElementById('st').value;
                    if(!n || !p || t.length < 4) return Swal.showValidationMessage('Заполните все поля!');
                    return [n, p, t];
                }
            });
            if(f) {
                const ex = Object.values(db.u || {}).find(u => u.t === f[2]);
                if(ex) {
                    if(ex.p === f[1]) { localStorage.setItem('a_id', ex.id); location.reload(); }
                    else { await Swal.fire('Ошибка', 'Неверный пароль для этого @Телеграм', 'error'); auth(); }
                } else {
                    const id = "u"+Date.now(); await db_r.ref(`${K}/u/${id}`).set({id, n:f[0], p:f[1], t:f[2], bal:0, b:false, s:'НОВИЧОК'});
                    localStorage.setItem('a_id', id); location.reload();
                }
            }
        }

        function showB() { document.getElementById('ban-scr').style.display='flex'; document.getElementById('br').innerText='Нарушение правил'; document.getElementById('bt').innerText='Блокировка навсегда'; document.getElementById('bv').play(); document.getElementById('bn').style.display='none'; }

        async function cTask() {
            const t = document.getElementById('zt').value, p = document.getElementById('zp').value, f = document.getElementById('zf').files[0]; if(!t || !p || !f) return;
            document.getElementById('cb').innerText = "ЗАГРУЗКА..."; const ref = st_r.ref(`v24/${Date.now()}`); await ref.put(f); const url = await ref.getDownloadURL();
            await db_r.ref(`${K}/t/t${Date.now()}`).set({id:"t"+Date.now(), t, p:Number(p), img:url, st:'pending', o:me.n}); setTab('home');
            document.getElementById('cb').innerText = "Опубликовать";
        }

        function render() {
            document.getElementById('ub').innerText = me.bal + ' ₽'; document.getElementById('ubm').innerText = me.bal + ' ₽'; document.getElementById('un').innerText = me.n;
            const ts = Object.values(db.t || {}).filter(x => x.st === 'active');
            document.getElementById('tl').innerHTML = ts.map(t => `<div class="glass overflow-hidden shadow-2xl"><img src="${t.img}" class="w-full h-56 object-cover"><div class="p-6 flex justify-between items-center"><div><b class="text-sm uppercase italic font-black">${t.t}</b></div><b class="text-xl font-black italic tracking-tighter">${t.p} ₽</b></div></div>`).join('');
            
            // АДМИН ПАНЕЛЬ
            const pT = Object.values(db.t || {}).filter(x => x.st === 'pending');
            document.getElementById('atl').innerHTML = pT.map(t => `<div class="glass p-5 flex justify-between items-center text-[11px] font-black uppercase">${t.o}: ${t.t}<div class="flex gap-4"><button onclick="db_r.ref('${K}/t/${t.id}').update({st:'active'})" class="text-green-500">ОК</button><button onclick="db_r.ref('${K}/t/${t.id}').remove()" class="text-red-600">УДАЛИТЬ</button></div></div>`).join('') || '<p class="text-center opacity-10 text-[9px] uppercase">Нет новых заданий</p>';
            document.getElementById('aul').innerHTML = Object.values(db.u || {}).map(u => `<div class="glass p-5 flex justify-between items-center ${u.b?'border-red-600/30 bg-red-900/10':''}"><div class="text-[11px] font-black italic">${u.n} <span class="text-blue-500">[${u.s}]</span><br><span class="opacity-30">${u.t}</span></div><div class="flex flex-col items-end gap-2"><b class="text-[11px] text-green-500">${u.bal}₽</b><button onclick="aE('${u.id}')" class="text-[9px] opacity-40 font-black">ПРАВКА</button></div></div>`).join('');
            
            // ЧАТЫ
            const ch = [{id:'news', n:'Канал Системы', i:'fa-bullhorn', b:'bg-blue-600'}, {id:'system', n:'Тех-Поддержка', i:'fa-headset', b:'bg-zinc-800'}];
            if(!activeC) document.getElementById('cl').innerHTML = ch.map(c => `<div onclick="oChat('${c.id}')" class="glass p-7 flex items-center gap-6 cursor-pointer hover:scale-[1.02] transition"><div class="w-14 h-14 ${c.b} rounded-[22px] flex items-center justify-center text-2xl shadow-xl"><i class="fa-solid ${c.i} text-white"></i></div><div><b class="text-sm uppercase font-black italic">${c.n}</b><p class="text-[9px] opacity-30 font-bold mt-1 uppercase tracking-widest">Официальные уведомления</p></div></div>`).join('');
            if(activeC) renderM();
        }

        async function aE(uid) {
            const u = db.u[uid]; const { value: v } = await Swal.fire({ title:'УПРАВЛЕНИЕ ЮЗЕРОМ', background:'#0a0a0a', color:'#fff', html:`<input id="eb" class="swal2-input" placeholder="Баланс" value="${u.bal}"><input id="es" class="swal2-input" placeholder="Статус" value="${u.s}"><div class="grid grid-cols-2 gap-3 mt-5"><button onclick="window.act='b'" class="swal2-confirm swal2-styled !bg-red-600">${u.b?'РАЗБАНИТЬ':'БАН'}</button><button onclick="window.act='d'" class="swal2-confirm swal2-styled !bg-zinc-900">УДАЛИТЬ</button></div>`, preConfirm:()=>({bal:document.getElementById('eb').value, s:document.getElementById('es').value}) });
            if(v) { if(window.act==='b') db_r.ref(`${K}/u/${uid}`).update({b:!u.b}); else if(window.act==='d') db_r.ref(`${K}/u/${uid}`).remove(); else db_r.ref(`${K}/u/${uid}`).update({bal:Number(v.bal), s:v.s}); window.act=null; }
        }

        function addBtnField() {
            const id = "b" + btnC++; const div = document.createElement('div'); div.className = "flex gap-2";
            div.innerHTML = `<input class="input-box text-[10px] p-3" placeholder="Текст на кнопке"><input class="input-box text-[10px] p-3" placeholder="Ссылка или Ответ"><button onclick="this.parentElement.remove()" class="text-red-500 font-bold px-2">✕</button>`;
            document.getElementById('btn-builder').appendChild(div);
        }

        async function sendB(target) {
            const txt = document.getElementById('an-txt').value, img = document.getElementById('an-img').files[0];
            let url = null; if(img) { const ref = st_r.ref(`an/${Date.now()}`); await ref.put(img); url = await ref.getDownloadURL(); }
            const btns = []; document.querySelectorAll('#btn-builder div').forEach(d => { const inp = d.querySelectorAll('input'); if(inp[0].value) btns.push({t:inp[0].value, a:inp[1].value}); });
            const msg = { text:txt, img:url, btns:btns, from:'system', time:Date.now() };
            if(target === 'news
