<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>lyneok — Robzi Style</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        :root { --bg: #0f1012; --card: #1c1d21; --accent: #3b82f6; --text-gray: #94a3b8; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Manrope', sans-serif; overflow: hidden; height: 100vh; }
        
        .tab-content { display: none; height: 100%; overflow-y: auto; padding-bottom: 120px; scrollbar-width: none; }
        .tab-content.active { display: block; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: #16171b; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; align-items: center; z-index: 1000; padding-bottom: 10px; }
        .nav-btn { color: #475569; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.2s; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn i { font-size: 20px; }
        .nav-btn span { font-size: 10px; font-weight: 800; text-transform: uppercase; }

        .tile-card { background: var(--card); border-radius: 24px; border: 1px solid rgba(255,255,255,0.03); transition: 0.2s; position: relative; overflow: hidden; }
        .tile-card:active { transform: scale(0.97); background: #25262b; }
        
        input { background: #16171b; border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; color: white; width: 100%; outline: none; }
        .btn-main { background: var(--accent); color: white; padding: 18px; border-radius: 20px; font-weight: 800; text-transform: uppercase; width: 100%; }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 bg-[#0f1012] z-[9999] flex flex-col items-center justify-center font-black italic text-2xl tracking-widest">LYNE<span class="text-blue-500">OK</span></div>

    <div id="auth_screen" class="hidden h-screen flex flex-col items-center justify-center px-10">
        <div class="w-20 h-20 bg-blue-600 rounded-[30px] flex items-center justify-center text-3xl font-black italic mb-8 shadow-2xl shadow-blue-600/30">L</div>
        <h1 class="text-3xl font-black mb-8 italic">Вход в lyneok</h1>
        <div class="w-full max-w-sm space-y-3">
            <input id="reg_n" placeholder="Ваш никнейм">
            <input id="reg_tg" placeholder="Telegram @username">
            <input id="reg_p" type="password" placeholder="Пароль">
            <button onclick="handleAuth()" class="btn-main mt-4">Продолжить</button>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        
        <header class="px-6 py-5 flex justify-between items-center bg-[#0f1012] border-b border-white/5 sticky top-0 z-[100]">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-black italic text-xs">L</div>
                <span class="font-black italic text-lg uppercase tracking-tighter">lyne<span class="text-blue-500">ok</span></span>
            </div>
            <div onclick="switchTab('profile')" class="bg-blue-600/10 px-4 py-2 rounded-xl flex items-center gap-2 border border-blue-600/20">
                <i class="fa-solid fa-wallet text-blue-500 text-xs"></i>
                <b id="h_bal" class="text-sm font-black text-blue-500">0 ₽</b>
            </div>
        </header>

        <main id="tab_market" class="tab-content active px-5 pt-6">
            <h2 class="text-sm font-black text-slate-500 uppercase mb-4 tracking-widest">Категории товаров</h2>
            <div class="grid grid-cols-2 gap-3 mb-8">
                <div class="tile-card p-4 flex flex-col items-center gap-2">
                    <i class="fa-solid fa-gamepad text-blue-500 text-xl"></i>
                    <span class="text-[10px] font-black uppercase">Игры</span>
                </div>
                <div class="tile-card p-4 flex flex-col items-center gap-2">
                    <i class="fa-solid fa-coins text-yellow-500 text-xl"></i>
                    <span class="text-[10px] font-black uppercase">Донат</span>
                </div>
            </div>
            
            <h2 class="text-sm font-black text-slate-500 uppercase mb-4 tracking-widest">Витрина</h2>
            <div id="market_grid" class="grid grid-cols-1 gap-3 pb-20"></div>
        </main>

        <main id="tab_profile" class="tab-content px-5 pt-6">
            <div class="tile-card p-6 mb-4 flex items-center gap-5">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-2xl font-black" id="p_ava">?</div>
                <div>
                    <h2 id="p_name" class="text-xl font-black italic flex items-center">User</h2>
                    <p id="p_id" class="text-[10px] text-slate-500 font-bold">ID: 000000</p>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-3 mb-4">
                <div class="tile-card p-5 flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-black text-slate-500 uppercase">Баланс</p>
                        <b id="w_bal" class="text-2xl font-black text-blue-500">0 ₽</b>
                    </div>
                    <button onclick="moneyAction('dep')" class="bg-blue-600 px-6 py-3 rounded-xl font-black text-xs uppercase">Пополнить</button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-4">
                <div onclick="moneyAction('with')" class="tile-card p-5 text-center">
                    <i class="fa-solid fa-money-bill-transfer text-slate-500 mb-2"></i>
                    <p class="text-[10px] font-black uppercase">Вывод</p>
                </div>
                <div onclick="switchTab('promo')" class="tile-card p-5 text-center">
                    <i class="fa-solid fa-ticket text-slate-500 mb-2"></i>
                    <p class="text-[10px] font-black uppercase">Промокоды</p>
                </div>
            </div>

            <div class="space-y-2">
                <button onclick="openSupport()" class="tile-card w-full p-5 flex justify-between items-center">
                    <span class="text-[11px] font-black uppercase"><i class="fa-solid fa-headset mr-3 text-blue-500"></i>Поддержка</span>
                    <i class="fa-solid fa-chevron-right text-xs opacity-20"></i>
                </button>
                <button onclick="logout()" class="tile-card w-full p-5 flex justify-between items-center opacity-50">
                    <span class="text-[11px] font-black uppercase"><i class="fa-solid fa-door-open mr-3"></i>Выйти</span>
                </button>
            </div>
        </main>

        <main id="tab_promo" class="tab-content px-5 pt-6">
            <button onclick="switchTab('profile')" class="mb-6 text-slate-500 text-xs font-black uppercase"><i class="fa-solid fa-arrow-left mr-2"></i> Назад</button>
            <h2 class="text-2xl font-black italic mb-6">Активация</h2>
            <div class="tile-card p-6">
                <input id="promo_input" placeholder="Введите промокод" class="mb-4">
                <button onclick="applyPromo()" class="btn-main">Активировать</button>
            </div>
        </main>

        <main id="tab_admin" class="tab-content px-5 pt-6">
            <h2 class="text-2xl font-black italic text-red-500 mb-6 uppercase">Админ-панель</h2>
            <div id="adm_users" class="space-y-3 mb-8"></div>
            
            <div class="tile-card p-6 mb-4">
                <h3 class="text-[10px] font-black uppercase mb-4">Создать Промо</h3>
                <input id="adm_p_name" placeholder="Название" class="mb-2">
                <input id="adm_p_sum" type="number" placeholder="Сумма" class="mb-4">
                <button onclick="createPromo()" class="btn-main bg-white text-black">Создать</button>
            </div>
        </main>

        <nav class="nav-bar">
            <div onclick="switchTab('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-bag-shopping"></i><span>Магазин</span></div>
            <div onclick="moneyAction('dep')" class="nav-btn"><i class="fa-solid fa-circle-plus"></i><span>Донат</span></div>
            <div onclick="switchTab('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user-circle"></i><span>Профиль</span></div>
            <div onclick="switchTab('admin')" id="n_admin" class="nav-btn hidden text-red-500"><i class="fa-solid fa-crown"></i><span>Админ</span></div>
        </nav>
    </div>

    <script>
        const CFG = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        const ADMIN_TG = { token: "8641257792:AAEsxnQWEIeozMt_gnSwJdVgSFQlOc-hnuc", id: "7040863301" };
        
        firebase.initializeApp(CFG);
        const db = firebase.database().ref('lyneok_v20_robzi');

        let me = null, data = {};

        function init() {
            db.on('value', snap => {
                data = snap.val() || { u: {}, i: {}, p: {} };
                const sid = localStorage.getItem('lyne_robzi_sid');
                if(!sid) toggleAuth(true);
                else {
                    me = data.u[sid];
                    if(me) { toggleAuth(false); render(); } else logout();
                }
                document.getElementById('loader').style.display = 'none';
            });
        }

        function toggleAuth(s) {
            document.getElementById('auth_screen').classList.toggle('hidden', !s);
            document.getElementById('app').classList.toggle('hidden', s);
        }

        async function handleAuth() {
            const n = document.getElementById('reg_n').value.trim();
            const t = document.getElementById('reg_tg').value.trim();
            const p = document.getElementById('reg_p').value.trim();
            if(!n || !t.includes('@')) return Swal.fire('Error', 'Ник и @TG обязательны', 'error');

            let uid = Object.keys(data.u || {}).find(k => data.u[k].n === n);
            if(!uid) {
                uid = 'u' + Date.now().toString().slice(-6);
                await db.child(`u/${uid}`).set({ id: uid, n, tg: t, p, bal: 0, verified: false, regDate: new Date().toLocaleDateString() });
            }
            localStorage.setItem('lyne_robzi_sid', uid);
        }

        function render() {
            const balTxt = (me.bal || 0).toLocaleString() + ' ₽';
            document.getElementById('h_bal').innerText = balTxt;
            document.getElementById('w_bal').innerText = balTxt;
            document.getElementById('p_name').innerHTML = me.n + (me.verified ? ' <i class="fa-solid fa-circle-check text-blue-500 ml-1"></i>' : '');
            document.getElementById('p_id').innerText = 'ID: ' + me.id;
            document.getElementById('p_ava').innerText = me.n[0].toUpperCase();

            if(me.n === 'sswckk' || me.n === 'artyom' || me.id === 'u333') {
                document.getElementById('n_admin').classList.remove('hidden');
                renderAdmin();
            }

            // Market (Tiles)
            const items = Object.values(data.i || {}).reverse();
            document.getElementById('market_grid').innerHTML = items.map(i => `
                <div class="tile-card p-5 flex justify-between items-center" onclick="buyItem('${i.id}')">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-blue-600/10 rounded-2xl flex items-center justify-center text-blue-500"><i class="fa-solid fa-box-open"></i></div>
                        <div>
                            <h4 class="font-bold text-sm">${i.title}</h4>
                            <p class="text-[9px] text-slate-500 font-black uppercase">${i.cat}</p>
                        </div>
                    </div>
                    <b class="text-blue-500 font-black">${i.price} ₽</b>
                </div>
            `).join('') || '<p class="text-center py-10 opacity-20 font-black uppercase text-[10px]">Магазин обновляется...</p>';
        }

        function renderAdmin() {
            const users = Object.values(data.u || {});
            document.getElementById('adm_users').innerHTML = users.map(u => `
                <div class="tile-card p-4 flex justify-between items-center">
                    <span class="text-[10px] font-bold">${u.n} (${u.bal}₽)</span>
                    <div class="flex gap-2">
                        <button onclick="adminAction('ver', '${u.id}')" class="text-[8px] font-black ${u.verified ? 'text-blue-500' : 'text-slate-500'}">VERIFY</button>
                        <button onclick="adminAction('bal', '${u.id}')" class="text-[8px] font-black text-green-500">CASH</button>
                    </div>
                </div>
            `).join('');
        }

        async function moneyAction(type) {
            const { value: sum } = await Swal.fire({ 
                title: type === 'dep' ? 'Пополнение' : 'Вывод', 
                input: 'number', 
                inputLabel: 'Введите сумму (₽)',
                background: '#1c1d21', color: '#fff' 
            });
            if(sum > 0) {
                tgAdmin(`💸 ЗАЯВКА [${type.toUpperCase()}]\nЮзер: ${me.n} (${me.tg})\nСумма: ${sum}₽`);
                Swal.fire('Заявка создана', 'Ожидайте сообщения от админа', 'success');
            }
        }

        async function applyPromo() {
            const code = document.getElementById('promo_input').value.trim();
            const p = data.p?.[code];
            if(p) {
                await db.child(`u/${me.id}/bal`).set((me.bal || 0) + p.sum);
                await db.child(`p/${code}`).remove();
                Swal.fire('Успех!', `Вам начислено ${p.sum} ₽`, 'success');
                switchTab('profile');
            } else {
                Swal.fire('Ошибка', 'Промокод не существует', 'error');
            }
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab_'+t).classList.add('active');
            if(document.getElementById('n_'+t)) document.getElementById('n_'+t).classList.add('active');
        }

        function openSupport() {
            tgAdmin(`🆘 ПОДДЕРЖКА\nЮзер: ${me.n}\nTG: ${me.tg}`);
            Swal.fire('Отправлено', 'Админ скоро напишет вам в Telegram', 'info');
        }

        async function adminAction(type, uid) {
            if(type === 'ver') db.child(`u/${uid}/verified`).set(!data.u[uid].verified);
            if(type === 'bal') {
                const { value: s } = await Swal.fire({ title: 'Баланс юзера', input: 'number' });
                if(s !== undefined) db.child(`u/${uid}/bal`).set(Number(s));
            }
        }

        async function createPromo() {
            const name = document.getElementById('adm_p_name').value;
            const sum = Number(document.getElementById('adm_p_sum').value);
            if(name && sum) {
                await db.child(`p/${name}`).set({ sum });
                Swal.fire('Ok', 'Промокод создан', 'success');
            }
        }

        function logout() { localStorage.removeItem('lyne_robzi_sid'); location.reload(); }
        function tgAdmin(m) { fetch(`https://api.telegram.org/bot${ADMIN_TG.token}/sendMessage?chat_id=${ADMIN_TG.id}&text=${encodeURIComponent(m)}`); }

        init();
    </script>
</body>
</html>
