<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>anon:zadan (dmd) v2.4 PRO</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { background: #0a0a0b; color: #e4e4e7; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: #161618; border: 1px solid #27272a; border-radius: 24px; overflow: hidden; }
        .tab { display: none; }
        .tab.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn-accent { background: #ffffff; color: #000; border-radius: 16px; font-weight: 800; }
        .input-dark { background: #0f0f10 !important; border: 1px solid #27272a !important; color: white !important; border-radius: 14px !important; outline: none; }
        .swal2-input { color: black !important; background: white !important; font-weight: bold !important; }
        .msg-support { border-left: 3px solid #3b82f6; background: #1d1d21; padding: 12px; border-radius: 14px; margin-bottom: 8px; align-self: flex-start; max-width: 85%; }
        .msg-user { border-right: 3px solid #71717a; background: #27272a; padding: 12px; border-radius: 14px; margin-bottom: 8px; align-self: flex-end; max-width: 85%; text-align: right; }
    </style>
</head>
<body class="pb-28">

    <header class="p-5 flex justify-between items-center sticky top-0 bg-[#0a0a0b]/90 backdrop-blur-md z-50 border-b border-white/5">
        <h1 class="text-lg font-extrabold italic tracking-tighter">anon:<span class="text-zinc-600">zadan</span></h1>
        <div id="u-bal-head" class="bg-zinc-900 px-4 py-1.5 rounded-full text-[11px] font-bold border border-zinc-800 text-white">0.00₽</div>
    </header>

    <section id="home" class="tab active px-5 pt-4"><div id="zadan-list" class="space-y-4 pb-10"></div></section>
    
    <section id="create" class="tab px-5 pt-4">
        <div class="card p-6 space-y-4">
            <h2 class="font-bold text-xs opacity-40 uppercase">Создать товар</h2>
            <input id="z-title" class="input-dark w-full p-4 text-xs" placeholder="Название">
            <textarea id="z-desc" class="input-dark w-full p-4 text-xs h-24" placeholder="Описание..."></textarea>
            <input type="file" id="z-file" accept="image/*" class="hidden" onchange="handleFile(this, 'tempPhoto')">
            <button onclick="document.getElementById('z-file').click()" class="w-full bg-zinc-900 py-4 rounded-2xl text-[10px] font-bold border border-zinc-800">ЗАГРУЗИТЬ ФОТО</button>
            <div id="file-preview" class="hidden text-[9px] text-green-500 text-center font-bold">ФОТО ГОТОВО ✅</div>
            <div class="grid grid-cols-2 gap-3">
                <input id="z-price" type="number" class="input-dark w-full p-4 text-xs" placeholder="Цена">
                <input id="z-addr" class="input-dark w-full p-4 text-xs" placeholder="Город">
            </div>
            <button onclick="createZadan()" class="w-full btn-accent py-5 text-[11px] uppercase">Опубликовать</button>
        </div>
    </section>

    <section id="chats" class="tab px-5 pt-4">
        <div class="card p-5 border-blue-900/20 flex flex-col h-[65vh]">
            <div id="support-messages" class="flex-1 overflow-y-auto space-y-3 mb-4 flex flex-col"></div>
            <div class="flex gap-2">
                <input id="user-msg-input" class="input-dark flex-1 p-3.5 text-[11px]" placeholder="Ваш вопрос...">
                <button onclick="userSendMessage()" class="bg-blue-600 w-12 h-11 rounded-xl flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </section>

    <section id="me" class="tab px-5 pt-4 text-center">
        <div class="card p-8 space-y-6">
            <h3 id="u-nick" class="font-black text-2xl">...</h3>
            <div id="u-bal-main" class="bg-zinc-900 p-7 rounded-[32px] border border-zinc-800 font-black text-3xl">0₽</div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="deposit()" class="btn-accent py-4 text-[10px] uppercase">Пополнить</button>
                <button onclick="withdraw()" class="bg-zinc-800 py-4 rounded-xl text-[10px] uppercase text-zinc-400">Вывод</button>
            </div>
            <button onclick="logout()" class="w-full py-4 mt-4 text-[9px] font-bold text-zinc-500 uppercase">Выйти из системы</button>
            <button onclick="setTab('admin_login')" class="opacity-10 text-[8px] uppercase font-bold mt-4 block mx-auto">Admin Panel</button>
        </div>
    </section>

    <section id="admin_login" class="tab px-5 pt-20">
        <input type="password" id="admin-pass-input" oninput="if(this.value.toLowerCase()==='kalubxq') setTab('admin')" class="w-full p-6 text-center card outline-none border-zinc-700" placeholder="••••">
    </section>

    <section id="admin" class="tab px-5 pb-32 space-y-4 pt-4">
        <div class="card p-5 space-y-3 border-blue-500/20">
            <h2 class="text-[10px] font-bold text-blue-500 uppercase">Конструктор сообщений (Support)</h2>
            <input id="adm-msg-nick" class="input-dark w-full p-3 text-[10px]" placeholder="Ник получателя">
            <textarea id="adm-msg-text" class="input-dark w-full p-3 text-[10px] h-20" placeholder="Текст сообщения..."></textarea>
            
            <input type="file" id="adm-msg-img" class="hidden" onchange="handleFile(this, 'admPhoto')">
            <button onclick="document.getElementById('adm-msg-img').click()" class="w-full bg-zinc-900 py-3 rounded-lg text-[9px] border border-zinc-800">ДОБАВИТЬ ФОТО</button>
            <div id="adm-file-ok" class="hidden text-center text-[8px] text-green-500 font-bold">ФОТО ПРИКРЕПЛЕНО</div>

            <div class="grid grid-cols-2 gap-2">
                <input id="btn-name" class="input-dark p-3 text-[9px]" placeholder="Имя кнопки">
                <input id="btn-link" class="input-dark p-3 text-[9px]" placeholder="Ссылка (URL)">
            </div>
            <button onclick="adminSendMessage()" class="w-full bg-blue-600 py-4 rounded-xl text-[10px] font-bold uppercase">ОТПРАВИТЬ ЮЗЕРУ</button>
        </div>

        <div class="card p-5 space-y-3 border-red-500/20 text-center">
            <h2 class="text-[10px] font-bold text-red-500 uppercase">Управление аккаунтом</h2>
            <input id="adm-user-nick" class="input-dark w-full p-3 text-[10px]" placeholder="Ник юзера">
            <div class="grid grid-cols-2 gap-2">
                <button onclick="adminChangeBal()" class="bg-zinc-800 py-3 rounded-lg text-[9px] font-bold italic">ИЗМЕНИТЬ БАЛАНС</button>
                <button onclick="adminBanUser()" class="bg-red-900/40 py-3 rounded-lg text-[9px] font-bold text-red-500">ЗАБАНИТЬ</button>
            </div>
        </div>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-black/95 border-t border-zinc-900 flex justify-around items-center z-[100] px-4">
        <button onclick="setTab('home')" id="btn-home"><i class="fa-solid fa-house text-lg"></i></button>
        <button onclick="setTab('create')" id="btn-create" class="opacity-30"><i class="fa-solid fa-plus-circle text-lg"></i></button>
        <button onclick="setTab('chats')" id="btn-chats" class="opacity-30"><i class="fa-solid fa-comment-dots text-lg"></i></button>
        <button onclick="setTab('me')" id="btn-me" class="opacity-30"><i class="fa-solid fa-user text-lg"></i></button>
    </nav>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
          authDomain: "dogx-base.firebaseapp.com",
          databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
          projectId: "dogx-base",
          storageBucket: "dogx-base.firebasestorage.app",
          messagingSenderId: "81713249793",
          appId: "1:81713249793:web:1b44a13e6faf5acfa78a00"
        };

        const DB_VER = 'anon_v2_4'; 
        const TG_TOKEN = "8722822022:AAEmZa-V4-isxXnZ00omU8gAM_NtYevuL9Y";
        const ADMIN_ID = "7040863301";

        firebase.initializeApp(firebaseConfig);
        const rdb = firebase.database();

        let db = { users: {}, tasks: {}, notifications: {} };
        let me = null;
        let tempPhoto = "", admPhoto = "";

        function init() {
            rdb.ref(DB_VER).on('value', (s) => {
                db = s.val() || { users: {}, tasks: {}, notifications: {} };
                const uid = localStorage.getItem('anon_uid');
                if (uid && db.users && db.users[uid]) {
                    me = db.users[uid];
                    renderAll();
                } else { showReg(); }
            });
        }

        async function sendTG(txt) {
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(txt)}&parse_mode=HTML`);
        }

        async function showReg(isLogin = false) {
            const { value: f } = await Swal.fire({
                title: isLogin ? 'ВХОД' : 'РЕГИСТРАЦИЯ',
                background: '#161618', color: '#fff',
                html: `<input id="s-n" class="swal2-input" placeholder="Ник (Nickname)">
                       <input id="s-p" type="password" class="swal2-input" placeholder="Пароль (Password)">
                       <button onclick="Swal.clickConfirm(); window.toggleMode()" class="mt-4 text-blue-400 text-[10px] font-bold underline uppercase block w-full">
                         ${isLogin ? 'Создать аккаунт' : 'Уже есть аккаунт? Войти'}
                       </button>`,
                confirmButtonText: isLogin ? 'ВОЙТИ' : 'РЕГИСТРАЦИЯ',
                allowOutsideClick: false,
                preConfirm: () => [document.getElementById('s-n').value.trim(), document.getElementById('s-p').value.trim()]
            });

            if (f && f[0]) {
                const [n, p] = f;
                let user = Object.values(db.users || {}).find(x => x.nick === n);
                if (isLogin) {
                    if (user && user.pass === p) { localStorage.setItem('anon_uid', user.id); location.reload(); }
                    else { await Swal.fire('Ошибка', 'Ник или пароль неверны', 'error'); showReg(true); }
                } else {
                    if (user) { await Swal.fire('Ошибка', 'Ник уже занят', 'error'); showReg(false); }
                    else {
                        const id = Math.floor(100000+Math.random()*900000).toString();
                        await rdb.ref(DB_VER+'/users/'+id).set({ id, nick: n, pass: p, bal: 0, created: Date.now() });
                        localStorage.setItem('anon_uid', id); location.reload();
                    }
                }
            }
        }
        window.toggleMode = () => { const isL = Swal.getTitle().innerText === 'ВХОД'; showReg(!isL); };

        function userSendMessage() {
            const txt = document.getElementById('user-msg-input').value.trim();
            if(!txt) return;
            rdb.ref(`${DB_VER}/notifications/${me.id}/${Date.now()}`).set({ text: txt, from: 'user', time: Date.now() });
            sendTG(`📩 <b>СООБЩЕНИЕ В САППОРТ</b>\n<b>От юзера:</b> ${me.nick}\n<b>ID:</b> ${me.id}\n<b>Текст:</b> ${txt}`);
            document.getElementById('user-msg-input').value = '';
        }

        // АДМИНСКАЯ ОТПРАВКА С ФОТО И КНОПКАМИ
        function adminSendMessage() {
            const nick = document.getElementById('adm-msg-nick').value;
            const text = document.getElementById('adm-msg-text').value;
            const bName = document.getElementById('btn-name').value;
            const bLink = document.getElementById('btn-link').value;
            
            const user = Object.values(db.users).find(u => u.nick === nick);
            if (!user || !text) return Swal.fire('Ошибка','Укажите ник и текст','error');

            const msgData = {
                text: text,
                img: admPhoto,
                btnName: bName,
                btnLink: bLink,
                from: 'support',
                time: Date.now()
            };

            rdb.ref(`${DB_VER}/notifications/${user.id}/${Date.now()}`).set(msgData);
            Swal.fire('Отправлено',`Юзер ${nick} получил сообщение`,'success');
            
            // Очистка
            document.getElementById('adm-msg-text').value = '';
            admPhoto = "";
            document.getElementById('adm-file-ok').classList.add('hidden');
        }

        function createZadan() {
            const t = document.getElementById('z-title').value, p = Number(document.getElementById('z-price').value);
            if (!t || p < 20 || me.bal < p) return Swal.fire('Ошибка','Проверьте баланс','error');
            const tid = Date.now().toString();
            rdb.ref(`${DB_VER}/tasks/${tid}`).set({ id: tid, owner: me.id, nick: me.nick, title: t, price: p, status: 'active', img: tempPhoto || "", created: Date.now() });
            rdb.ref(`${DB_VER}/users/${me.id}`).update({ bal: me.bal - p });
            sendTG(`📦 <b>НОВЫЙ ТОВАР</b>\n<b>Автор:</b> ${me.nick}\n<b>Цена:</b> ${p}₽`);
            setTab('home');
        }

        function deposit() { sendTG(`💰 <b>ЗАЯВКА: ПОПОЛНЕНИЕ</b>\n<b>Юзер:</b> ${me.nick}`); Swal.fire('Отправлено','','success'); }
        function withdraw() { sendTG(`💸 <b>ЗАЯВКА: ВЫВОД</b>\n<b>Юзер:</b> ${me.nick}`); Swal.fire('Принято','','info'); }
        function logout() { localStorage.removeItem('anon_uid'); location.reload(); }

        function renderAll() {
            document.getElementById('u-bal-head').innerText = me.bal + '₽';
            document.getElementById('u-bal-main').innerText = me.bal + '₽';
            document.getElementById('u-nick').innerText = me.nick;
            
            const tasks = Object.values(db.tasks || {}).filter(t => t.status === 'active').sort((a,b)=>b.created-a.created);
            document.getElementById('zadan-list').innerHTML = tasks.map(t => `
                <div class="card">
                    ${t.img ? `<img src="${t.img}" class="w-full h-44 object-cover">` : ''}
                    <div class="p-5"><b>${t.title}</b> <span class="text-green-400 font-bold">${t.price}₽</span></div>
                </div>`).join('');
            
            const msgs = Object.values(db.notifications?.[me.id] || {}).sort((a,b) => a.time - b.time);
            document.getElementById('support-messages').innerHTML = msgs.map(m => `
                <div class="${m.from==='user'?'msg-user':'msg-support'}">
                    ${m.img ? `<img src="${m.img}" class="w-full rounded-lg mb-2">` : ''}
                    <p class="text-[10px]">${m.text}</p>
                    ${m.btnLink ? `<a href="${m.btnLink}" class="block mt-2 bg-white text-black text-center py-2 rounded-lg font-bold text-[8px] uppercase">${m.btnName}</a>` : ''}
                </div>`).join('');
        }

        function handleFile(i, target) { 
            const r = new FileReader(); 
            r.onload=e=>{
                if(target === 'tempPhoto') {
                    tempPhoto=e.target.result;
                    document.getElementById('file-preview').classList.remove('hidden');
                } else {
                    admPhoto=e.target.result;
                    document.getElementById('adm-file-
