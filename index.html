<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK OMEGA V120.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700&family=Orbitron:wght@900&family=UnifrakturMaguntia&display=swap');
        :root { --bg: #050505; --card: #121214; --text: #ffffff; --blue: #007aff; --gray: #1c1c1e; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; padding: 0; }
        .glass { background: var(--card); border: 1px solid rgba(255,255,255,0.03); border-radius: 24px; }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px 16px 160px; -webkit-overflow-scrolling: touch; }
        .tab-content.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nick-gold { color: #ffcc00; text-shadow: 0 0 10px rgba(255,204,0,0.6); font-weight: 900; }
        .nick-diamond { color: #b9f2ff; text-shadow: 0 0 15px #b9f2ff; font-weight: 900; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: rgba(10,10,10,0.85); backdrop-filter: blur(25px); display: flex; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #636366; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 700; cursor: pointer; }
        .nav-btn.active { color: var(--blue); }
        input, textarea, select { background: var(--gray); border: 1px solid transparent; border-radius: 14px; padding: 14px; color: white; width: 100%; outline: none; font-size: 14px; transition: 0.2s; }
        input:focus { border-color: var(--blue); }
        .btn-blue { background: var(--blue); color: white; border-radius: 16px; font-weight: 800; padding: 16px; width: 100%; border: none; cursor: pointer; active: scale(0.98); }
        #loader { background: #000; z-index: 10000; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .hidden { display: none !important; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 13px; margin-bottom: 8px; }
        .msg-me { align-self: flex-end; background: var(--blue); color: white; border-bottom-right-radius: 4px; }
        .msg-op { align-self: flex-start; background: #2c2c2e; color: white; border-bottom-left-radius: 4px; }
    </style>
</head>
<body>

    <div id="loader"><div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>

    <div id="auth_scr" class="hidden fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-8">
        <h1 class="text-4xl font-black mb-12 italic tracking-tighter">LYNEOK<span class="text-blue-500">.</span></h1>
        <div class="w-full max-w-sm glass p-6 space-y-4">
            <div id="reg_ext" class="hidden space-y-4">
                <input type="file" id="r_ava" class="hidden" accept="image/*" onchange="upImg(this, 'l_r_ava')">
                <label for="r_ava" id="l_r_ava" class="w-20 h-20 bg-zinc-800 mx-auto rounded-full flex items-center justify-center cursor-pointer border-2 border-dashed border-zinc-700 overflow-hidden">
                    <i class="fa-solid fa-plus text-zinc-500"></i>
                </label>
                <input id="r_tg" placeholder="Telegram (@username)">
            </div>
            <input id="a_n" placeholder="Логин">
            <input id="a_p" type="password" placeholder="Пароль">
            <button onclick="handleAuth()" id="a_btn" class="btn-blue">Войти</button>
            <p onclick="toggleR()" id="a_tog" class="text-center text-[10px] font-black text-zinc-500 uppercase cursor-pointer tracking-widest pt-2">Создать аккаунт</p>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-5 py-4 flex justify-between items-center bg-black/50 backdrop-blur-md sticky top-0 z-50">
            <b class="text-xl italic">LYNEOK</b>
            <div onclick="switchT('profile')" class="bg-zinc-900 px-4 py-1.5 rounded-full flex items-center gap-2 border border-white/5 cursor-pointer">
                <span id="h_bal" class="font-bold text-xs">0 ₽</span>
                <img id="h_ava" class="w-6 h-6 rounded-full object-cover bg-zinc-800">
            </div>
        </header>

        <main id="tab_market" class="tab-content active">
            <div id="cat_grid" class="grid grid-cols-2 gap-3"></div>
            <div id="subcat_view" class="hidden space-y-4">
                <button onclick="closeSubcat()" class="text-blue-500 font-bold text-[10px] uppercase tracking-widest"><i class="fa-solid fa-chevron-left mr-1"></i> Назад к играм</button>
                <div id="subcat_grid" class="grid grid-cols-2 gap-3"></div>
            </div>
            <div id="items_view" class="hidden space-y-4">
                <button onclick="closeCat()" class="text-blue-500 font-bold text-[10px] uppercase tracking-widest"><i class="fa-solid fa-chevron-left mr-1"></i> Назад к категориям</button>
                <div id="items_list" class="space-y-3"></div>
            </div>
        </main>

        <main id="tab_sell" class="tab-content">
            <div class="glass p-5 space-y-4">
                <input type="file" id="s_img" class="hidden" onchange="upImg(this, 'l_s_img')">
                <label for="s_img" id="l_s_img" class="w-full h-40 bg-zinc-900 rounded-2xl flex flex-col items-center justify-center border-2 border-dashed border-zinc-800 cursor-pointer overflow-hidden">
                    <i class="fa-solid fa-camera text-2xl text-zinc-700"></i>
                </label>
                <select id="s_game" onchange="updateSubcats()"></select>
                <select id="s_subcat"></select>
                <input id="s_t" placeholder="Название товара">
                <textarea id="s_acc" placeholder="Данные аккаунта (будут видны покупателю)"></textarea>
                <div class="space-y-1">
                    <input id="s_p" type="number" placeholder="Цена" oninput="calcComm()">
                    <p id="s_receive" class="text-[10px] text-zinc-500 font-bold italic"></p>
                </div>
                <button onclick="postItem()" class="btn-blue">Опубликовать</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content">
            <h2 class="text-2xl font-black mb-6">Сделки и чаты</h2>
            <div id="deals_list" class="space-y-3"></div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="glass p-6 text-center mb-6">
                <img id="p_ava" class="w-24 h-24 rounded-full mx-auto mb-4 object-cover border-4 border-zinc-800 bg-zinc-800">
                <h2 id="p_n" class="text-2xl font-black mb-1">...</h2>
                <p id="p_tg" class="text-zinc-500 text-sm mb-6"></p>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="Tst.fire({title:'Скоро!', icon:'info'})" class="btn-blue !bg-white !text-black py-3">Пополнить</button>
                    <button onclick="Tst.fire({title:'Скоро!', icon:'info'})" class="btn-blue py-3">Вывод</button>
                </div>
            </div>
            <button id="adm_btn" onclick="switchT('admin')" class="hidden w-full bg-red-600/10 text-red-500 border border-red-600/20 py-4 rounded-2xl font-bold mb-4">АДМИН-ПАНЕЛЬ</button>
            <button onclick="logout()" class="w-full py-4 text-red-500 opacity-30 text-xs font-black uppercase">Выйти из системы</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <h1 class="text-3xl font-black mb-6 italic text-red-500">OMEGA ADMIN</h1>
            <div class="space-y-8">
                <section class="glass p-4 border border-red-500/20">
                    <h3 class="text-xs font-black mb-4 uppercase">Добавить игру</h3>
                    <input id="ad_game_name" placeholder="Название игры" class="mb-2">
                    <input id="ad_game_img" placeholder="URL иконки" class="mb-4">
                    <button onclick="admAddGame()" class="w-full bg-red-600 py-3 rounded-xl text-xs font-black">Создать игру</button>
                </section>
                <div id="ad_games_list" class="space-y-3"></div>
                <section>
                    <h3 class="text-xs font-black mb-4 uppercase text-zinc-500">Пользователи</h3>
                    <div id="ad_users" class="space-y-2"></div>
                </section>
            </div>
        </main>

        <nav class="nav-bar">
            <div onclick="switchT('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-shop text-xl"></i><span>Маркет</span></div>
            <div onclick="switchT('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-plus-circle text-xl"></i><span>Продать</span></div>
            <div onclick="switchT('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-comments text-xl"></i><span>Чат</span></div>
            <div onclick="switchT('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user text-xl"></i><span>Профиль</span></div>
        </nav>
    </div>

    <script>
        // ИНИЦИАЛИЗАЦИЯ FIREBASE
        const FB_CFG = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        firebase.initializeApp(FB_CFG);
        const db = firebase.database().ref('lyne_v120_omega');
        const Tst = Swal.mixin({ toast: true, position: 'top', timer: 2000, showConfirmButton: false, background: '#1c1c1e', color: '#fff' });

        let me = null, data = {}, isR = false, tmpImg = "";

        // ФИКС БАГА ЗАГРУЗКИ: Если база не отвечает 5 сек, вырубаем лоадер и кидаем на логин
        const loaderTimeout = setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').classList.add('hidden'), 500);
            if(!localStorage.getItem('lyne_v120_sid')) document.getElementById('auth_scr').classList.remove('hidden');
        }, 5000);

        function init() {
            // Оптимизация: слушаем только один раз для начальной загрузки, потом переходим на точечные обновления
            db.on('value', snap => {
                clearTimeout(loaderTimeout);
                data = snap.val() || { u:{}, i:{}, games:{}, settings:{comm:10} };
                
                const sid = localStorage.getItem('lyne_v120_sid');
                if (sid && data.u && data.u[sid]) {
                    me = data.u[sid];
                    document.getElementById('auth_scr').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    if(me.n === 'owwner' || me.role === 'admin') document.getElementById('adm_btn').classList.remove('hidden');
                    render();
                } else {
                    document.getElementById('auth_scr').classList.remove('hidden');
                }
                
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').classList.add('hidden'), 500);
            });
        }

        function render() {
            if(!me) return;
            // Данные шапки и профиля
            document.getElementById('h_bal').innerText = (me.bal || 0) + ' ₽';
            document.getElementById('h_ava').src = me.ava || '';
            document.getElementById('p_ava').src = me.ava || '';
            document.getElementById('p_n').innerText = me.n || 'Аноним';
            document.getElementById('p_tg').innerText = me.tg || '';

            // Рендер Игр
            const games = Object.values(data.games || {});
            document.getElementById('cat_grid').innerHTML = games.map(g => `
                <div class="glass p-4 text-center cursor-pointer active:scale-95 transition" onclick="openGame('${g.id}')">
                    <img src="${g.img}" class="w-12 h-12 mx-auto mb-2 rounded-xl object-cover bg-zinc-800">
                    <p class="text-[10px] font-black uppercase tracking-tighter">${g.name}</p>
                </div>
            `).join('');

            // Селект в продаже
            document.getElementById('s_game').innerHTML = games.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
            
            // Админка
            if(me.role === 'admin' || me.n === 'owwner') {
                document.getElementById('ad_games_list').innerHTML = games.map(g => `
                    <div class="glass p-3 flex justify-between items-center">
                        <span class="text-xs font-bold">${g.name}</span>
                        <div class="flex gap-2">
                            <button onclick="admAddCat('${g.id}')" class="text-blue-500 text-[10px] font-bold">+[КАТ]</button>
                            <button onclick="db.child('games/${g.id}').remove()" class="text-red-500"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                `).join('');
                
                const users = Object.values(data.u || {});
                document.getElementById('ad_users').innerHTML = users.map(u => `
                    <div class="glass p-3 flex justify-between items-center">
                        <div class="text-[10px]"><b>${u.n}</b> | ${u.bal}₽</div>
                        <button onclick="admEditUser('${u.id}')" class="bg-zinc-800 px-3 py-1 rounded text-[8px] font-bold">ИЗМ</button>
                    </div>
                `).join('');
            }
            updateSubcats();
            renderDeals();
        }

        // ЛОГИКА МАРКЕТА
        let currentGid = null;
        function openGame(gid) {
            currentGid = gid;
            const game = data.games[gid];
            document.getElementById('cat_grid').classList.add('hidden');
            document.getElementById('subcat_view').classList.remove('hidden');
            const cats = Object.values(game.cats || {});
            document.getElementById('subcat_grid').innerHTML = cats.map(c => `
                <div class="glass p-4 text-center cursor-pointer border border-blue-500/10 active:border-blue-500" onclick="openSubCat('${gid}', '${c.name}')">
                    <p class="text-[12px] font-black uppercase">${c.name}</p>
                </div>
            `).join('') || '<p class="text-center col-span-2 py-10 opacity-20">Нет категорий</p>';
        }

        function openSubCat(gid, catName) {
            document.getElementById('subcat_view').classList.add('hidden');
            document.getElementById('items_view').classList.remove('hidden');
            const items = Object.values(data.i || {}).filter(i => i.gameId === gid && i.cat === catName);
            document.getElementById('items_list').innerHTML = items.map(i => `
                <div class="glass p-4 flex gap-4 items-center">
                    <img src="${i.img}" class="w-16 h-16 rounded-xl object-cover bg-zinc-800">
                    <div class="flex-1">
                        <b class="text-sm block">${i.title}</b>
                        <p class="text-[10px] text-zinc-500 mb-2">Продавец: ${i.seller}</p>
                        <button onclick="buyItem('${i.id}')" class="bg-blue-600 px-4 py-1.5 rounded-lg text-xs font-black">${i.price} ₽</button>
                    </div>
                </div>
            `).join('') || '<p class="text-center py-10 opacity-20 text-xs">Товаров пока нет</p>';
        }

        function buyItem(iid) {
            const i = data.i[iid];
            if(i.sid === me.id) return Tst.fire({icon:'error', title:'Нельзя купить у себя'});
            if((me.bal || 0) < i.price) return Tst.fire({icon:'error', title:'Недостаточно средств'});

            Swal.fire({
                title: 'Подтвердите покупку',
                text: `Вы покупаете "${i.title}" за ${i.price} ₽`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#007aff',
                confirmButtonText: 'Купить'
            }).then(res => {
                if(res.isConfirmed) {
                    const did = 'd' + Date.now();
                    const comm = data.settings?.comm || 10;
                    const profit = Math.floor(i.price * (1 - comm/100));

                    // Транзакции: Минус у покупателя, плюс у продавца, удаление товара
                    db.child(`u/${me.id}/bal`).transaction(b => (b || 0) - i.price);
                    db.child(`u/${i.sid}/bal`).transaction(b => (b || 0) + profit);
                    db.child(`i/${iid}`).remove();
                    
                    // Создаем запись о сделке в чатах
                    db.child(`deals/${did}`).set({
                        id: did, bid: me.id, sid: i.sid, 
                        title: i.title, price: i.price, 
                        acc: i.acc_data, status: 'completed', time: Date.now()
                    });

                    Tst.fire({icon:'success', title:'Успешно куплено!'});
                    switchT('chats');
                }
            });
        }

        function renderDeals() {
            const deals = Object.values(data.deals || {}).filter(d => d.bid === me.id || d.sid === me.id);
            document.getElementById('deals_list').innerHTML = deals.map(d => `
                <div class="glass p-4 border border-white/5">
                    <div class="flex justify-between mb-2">
                        <b class="text-xs uppercase">${d.title}</b>
                        <span class="text-[10px] text-green-500 font-bold">ВЫПОЛНЕНО</span>
                    </div>
                    <div class="bg-black/40 p-3 rounded-lg text-[10px] font-mono break-all text-zinc-400">
                        ДАННЫЕ: ${d.acc}
                    </div>
                </div>
            `).join('') || '<p class="text-center py-20 opacity-20 text-xs uppercase font-bold">Нет сделок</p>';
        }

        // СИСТЕМНЫЕ ФУНКЦИИ
        function handleAuth() {
            const n = document.getElementById('a_n').value.trim(), p = document.getElementById('a_p').value.trim();
            if(!n || !p) return Tst.fire({icon:'error', title:'Заполни поля'});

            if (isR) {
                const tg = document.getElementById('r_tg').value.trim();
                if(!tg || !tmpImg) return Tst.fire({icon:'error', title:'Добавь фото и TG'});
                const sid = 'u' + Date.now();
                db.child(`u/${sid}`).set({ id:sid, n, p, tg, ava:tmpImg, bal:0, role:'user' }).then(() => {
                    localStorage.setItem('lyne_v120_sid', sid);
                    location.reload();
                });
            } else {
                const u = Object.values(data.u || {}).find(x => x.n === n && x.p === p);
                if (u) {
                    localStorage.setItem('lyne_v120_sid', u.id);
                    location.reload();
                } else Tst.fire({ icon:'error', title:'Неверный логин/пароль' });
            }
        }

        function postItem() {
            const gid = document.getElementById('s_game').value;
            const cat = document.getElementById('s_subcat').value;
            const t = document.getElementById('s_t').value, p = Number(document.getElementById('s_p').value);
            const acc = document.getElementById('s_acc').value;
            if(!t || !p || !acc || !tmpImg) return Tst.fire({icon:'error', title:'Заполни всё!'});
            
            const iid = 'i' + Date.now();
            db.child(`i/${iid}`).set({ id:iid, sid:me.id, seller:me.n, title:t, price:p, gameId:gid, cat, acc_data:acc, img:tmpImg }).then(() => {
                Tst.fire({icon:'success', title:'Опубликовано!'});
                switchT('market');
            });
        }

        function admAddGame() {
            const n = document.getElementById('ad_game_name').value, img = document.getElementById('ad_game_img').value;
            if(!n || !img) return;
            const gid = 'g' + Date.now();
            db.child(`games/${gid}`).set({ id:gid, name:n, img:img });
        }

        function admAddCat(gid) {
            Swal.fire({ title:'Новая категория', input:'text', showCancelButton:true }).then(r => {
                if(r.value) {
                    const cid = 'c' + Date.now();
                    db.child(`games/${gid}/cats/${cid}`).set({ id:cid, name:r.value });
                }
            });
        }

        function updateSubcats() {
            const gid = document.getElementById('s_game').value;
            const game = data.games[gid];
            if(game && game.cats) {
                document.getElementById('s_subcat').innerHTML = Object.values(game.cats).map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            }
        }

        function calcComm() {
            const p = Number(document.getElementById('s_p').value);
            const c = data.settings?.comm || 10;
            document.getElementById('s_receive').innerText = p > 0 ? `Вы получите: ${Math.floor(p * (1 - c/100))} ₽` : "";
        }

        function upImg(input, tid) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 300; canvas.height = 300;
                    ctx.drawImage(img, 0, 0, 300, 300);
                    tmpImg = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById(tid).innerHTML = `<img src="${tmpImg}" class="w-full h-full object-cover">`;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function switchT(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.getElementById('tab_'+t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById('n_'+t).classList.add('active');
        }

        function toggleR() {
            isR = !isR;
            document.getElementById('reg_ext').classList.toggle('hidden', !isR);
            document.getElementById('a_btn').innerText = isR ? 'Создать аккаунт' : 'Войти';
            document.getElementById('a_tog').innerText = isR ? 'Уже есть аккаунт?' : 'Создать аккаунт';
        }

        function closeSubcat() { document.getElementById('subcat_view').classList.add('hidden'); document.getElementById('cat_grid').classList.remove('hidden'); }
        function closeCat() { document.getElementById('items_view').classList.add('hidden'); document.getElementById('subcat_view').classList.remove('hidden'); }
        function logout() { localStorage.clear(); location.reload(); }

        init();
    </script>
</body>
</html>
