<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK TITAN V122 | FULL RESTORED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Press+Start+2P&family=Ruslan+Display&family=Kelly+Slab&family=Underdog&family=Lobster&family=Pacifico&family=Monoton&family=Jura:wght@700&family=Playfair+Display:wght@900&family=Courier+Prime&family=Zeyada&family=Dancing+Script:wght@700&family=EB+Garamond:ital@1&family=Montserrat+Alternates:wght@900&family=Caveat:wght@700&family=Unbounded:wght@900&family=Russo+One&family=Bad+Script&family=Bungee+Shade&family=Rubik+Glitch&family=Creepster&family=Nosifer&family=Rubik+Microbe&family=Silkscreen&display=swap" rel="stylesheet">
    <style> 
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --bg: #050505; --card: #121214; --text: #ffffff; --blue: #007aff; --gray: #1c1c1e; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .glass { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 24px; }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px 16px 180px; scrollbar-width: none; }
        .tab-content::-webkit-scrollbar { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(10,10,10,0.9); backdrop-filter: blur(25px); display: flex; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #636366; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: 0.3s; } .nav-btn.active { color: var(--blue); transform: translateY(-2px); }
        input, textarea, select { background: var(--gray); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; color: white; width: 100%; outline: none; font-size: 14px; transition: 0.3s; } input:focus, textarea:focus { border-color: var(--blue); }
        .btn-blue { background: var(--blue); color: white; border-radius: 18px; font-weight: 900; padding: 18px; width: 100%; border: none; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-style: italic; } .btn-blue:active { transform: scale(0.96); }
        #loader { background: #000; z-index: 10000; position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ad-banner { background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.8)), var(--ad-bg); background-size: cover; background-position: center; }
    </style>
</head>
<body>
    <div id="loader"><div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>

    <div id="maintenance_scr" class="hidden fixed inset-0 z-[20000] bg-black flex flex-col items-center justify-center p-8 text-center overflow-y-auto">
        <h1 id="maint_title" class="text-4xl font-black italic uppercase text-yellow-500 mb-4 tracking-tighter">ТЕХНИЧЕСКИЙ ПЕРЕРЫВ</h1>
        <div id="maint_timer" class="text-3xl font-mono font-black text-white mb-6 bg-white/10 px-6 py-3 rounded-2xl border border-white/10 hidden">00:00:00</div>
        <div id="maint_texts" class="space-y-2 mb-8 opacity-70 text-sm font-medium"></div>
        <button id="admin_maint_bypass" class="hidden btn-blue !bg-blue-600 mt-6 !py-4 shadow-lg shadow-blue-500/20">ОТКЛЮЧИТЬ ДЛЯ АДМИНА</button>
    </div>

    <div id="auth_scr" class="hidden fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-8">
        <h1 class="text-5xl font-black mb-16 italic tracking-tighter">LYNEOK<span class="text-blue-500">.</span></h1>
        <div class="w-full glass p-8 space-y-4">
            <div id="reg_ext" class="hidden space-y-4">
                <input type="file" id="r_ava" class="hidden" accept="image/*" onchange="upImg(this, 'l_r_ava', true)">
                <label for="r_ava" id="l_r_ava" class="w-24 h-24 bg-zinc-900 mx-auto rounded-full flex items-center justify-center cursor-pointer border-2 border-dashed border-zinc-800"><i class="fa-solid fa-camera text-zinc-600 text-xl"></i></label>
                <input id="r_email" type="email" placeholder="Email (необяз.)">
            </div>
            <input id="a_n" placeholder="Никнейм">
            <input id="a_p" type="password" placeholder="Пароль">
            <button onclick="handleAuth()" id="a_btn" class="btn-blue">Войти</button>
            <p onclick="toggleR()" id="a_tog" class="text-center text-[11px] font-black text-zinc-500 uppercase cursor-pointer pt-4 hover:text-white transition">Создать новый аккаунт</p>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-6 py-5 flex justify-between items-center bg-black/60 backdrop-blur-xl border-b border-white/5 sticky top-0 z-50">
            <b class="text-2xl italic tracking-tighter text-blue-500">LYNEOK</b>
            <div onclick="switchT('profile')" class="bg-white/5 px-4 py-2 rounded-2xl flex items-center gap-3 border border-white/5 cursor-pointer">
                <div class="text-right"><p class="text-[9px] uppercase font-black opacity-40">Баланс</p><span id="h_bal" class="font-black text-sm">0 ₽</span></div>
                <img id="h_ava" class="w-9 h-9 rounded-full object-cover bg-zinc-800">
            </div>
        </header>

        <main id="tab_market" class="tab-content active">
            <div id="ad_slider" class="mb-8 space-y-4"></div>
            <div id="market_main">
                <h2 class="text-3xl font-black italic mb-6">Маркет</h2>
                <div id="cat_grid" class="grid grid-cols-3 gap-3"></div>
            </div>
            <div id="subcat_view" class="hidden space-y-6">
                <button onclick="closeSubcat()" class="text-blue-500 text-xs font-bold uppercase"><i class="fa-solid fa-chevron-left mr-1"></i> Назад</button>
                <div id="subcat_grid" class="grid grid-cols-1 gap-3"></div>
            </div>
            <div id="items_view" class="hidden space-y-6">
                <button onclick="closeCat()" class="text-blue-500 text-xs font-bold uppercase"><i class="fa-solid fa-chevron-left mr-1"></i> К категориям</button>
                <div id="items_list" class="space-y-4"></div>
            </div>
        </main>

        <main id="tab_sell" class="tab-content">
            <h2 class="text-3xl font-black mb-6 italic">Создать лот</h2>
            <div class="glass p-6 space-y-5">
                <input type="file" id="s_img" class="hidden" onchange="upImg(this, 'l_s_img', true)">
                <label for="s_img" id="l_s_img" class="w-full h-48 bg-zinc-900 rounded-3xl flex flex-col items-center justify-center border-2 border-dashed border-zinc-800 gap-3 cursor-pointer"><i class="fa-solid fa-image text-3xl text-zinc-700"></i></label>
                <div class="grid grid-cols-2 gap-3"><select id="s_game" onchange="updateSubcatsSell()"></select><select id="s_subcat"></select></div>
                <input id="s_t" placeholder="Название">
                <textarea id="s_acc" rows="4" placeholder="Описание..."></textarea>
                <input id="s_p" type="number" placeholder="Цена ₽" oninput="calcCom()">
                <p class="text-[9px] font-black uppercase text-zinc-500">Комиссия: <span id="s_com_val">0 ₽</span></p>
                <button onclick="postItem()" class="btn-blue">Опубликовать</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content">
            <h2 class="text-3xl font-black mb-6 italic">Сделки</h2>
            <div id="deals_list" class="space-y-4"></div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="glass p-8 mb-6 text-center">
                <img id="p_ava" class="w-28 h-28 mx-auto mb-6 rounded-full object-cover">
                <div class="flex items-center justify-center gap-2 mb-8"><span id="p_n" class="text-3xl font-black">...</span></div>
                <div class="grid grid-cols-2 gap-4"><button onclick="topUp()" class="bg-white text-black py-4 rounded-2xl font-black text-xs uppercase italic">Пополнить</button><button onclick="logout()" class="bg-zinc-800 text-white py-4 rounded-2xl font-black text-xs uppercase italic">Выйти</button></div>
            </div>
            <button id="adm_btn" onclick="switchT('admin')" class="hidden w-full bg-red-600/10 text-red-500 py-5 rounded-3xl font-black mb-4 uppercase text-xs italic"><i class="fa-solid fa-crown mr-2"></i>TITAN PANEL</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <h1 class="text-4xl font-black italic mb-8">TITAN <span class="text-red-500">SYSTEM</span></h1>
            <section class="glass p-6 mb-8 border-yellow-600/20">
                <h3 class="text-[11px] font-black text-yellow-500 uppercase mb-5">Тех. перерыв</h3>
                <div class="space-y-4">
                    <label class="flex items-center justify-between"><span class="text-[10px] font-black uppercase">Активен</span><input type="checkbox" id="ad_maint_active"></label>
                    <div class="grid grid-cols-3 gap-2"><input id="ad_maint_d" type="number" placeholder="Дн" class="!py-3 !text-xs"><input id="ad_maint_h" type="number" placeholder="Ч" class="!py-3 !text-xs"><input id="ad_maint_m" type="number" placeholder="Мин" class="!py-3 !text-xs"></div>
                    <input id="ad_maint_title" placeholder="Заголовок" class="!py-3 !text-xs">
                    <textarea id="ad_maint_texts" placeholder="Тексты (через запятую)" class="!py-3 !text-xs"></textarea>
                    <button onclick="admSaveMaint()" class="btn-blue !bg-yellow-600 !py-3 !text-[10px]">Применить</button>
                </div>
            </section>
            <section class="glass p-6 mb-8 border-blue-600/20">
                <h3 class="text-[11px] font-black text-blue-500 uppercase mb-5">Реклама</h3>
                <div class="space-y-4">
                    <input type="file" id="ad_p_file" class="hidden" onchange="upImg(this, 'l_ad_p', true, 'ad_p_base64')">
                    <label id="l_ad_p" for="ad_p_file" class="w-full h-24 bg-zinc-900 flex items-center justify-center border-dashed border border-zinc-700">ФОТО</label>
                    <input type="hidden" id="ad_p_base64"><input id="ad_p_text" placeholder="Текст"><input id="ad_p_link" placeholder="Ссылка"><input id="ad_p_btn" placeholder="Текст кнопки"><button onclick="admAddAd()" class="btn-blue !py-3">Создать</button>
                </div>
            </section>
            <section class="glass p-6 border-red-600/20"><h3 class="text-[11px] font-black text-red-500 uppercase mb-5">Юзеры</h3><div id="ad_users" class="space-y-4"></div></section>
        </main>

        <nav class="nav-bar">
            <div onclick="switchT('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-store"></i><span>Маркет</span></div>
            <div onclick="switchT('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-circle-plus"></i><span>Продать</span></div>
            <div onclick="switchT('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-receipt"></i><span>Сделки</span></div>
            <div onclick="switchT('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-id-card"></i><span>Профиль</span></div>
        </nav>
    </div>

    <div id="chat_modal" class="hidden fixed inset-0 z-[10005] bg-black flex flex-col">
        <header class="p-5 flex justify-between items-center bg-zinc-900">
            <button onclick="closeChat()" class="text-blue-500">Назад</button>
            <b id="chat_title" class="text-[10px] uppercase font-black">Чат</b>
            <div></div>
        </header>
        <div id="chat_msgs" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
        <div class="p-4 bg-zinc-900 flex gap-2">
            <input id="chat_input" placeholder="Текст...">
            <button onclick="sendMsg()" class="bg-blue-600 px-5 rounded-xl"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        firebase.initializeApp({ apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" });
        const db = firebase.database().ref('lyne_v122_titan');
        const Tst = Swal.mixin({ toast: true, position: 'top', timer: 2000, showConfirmButton: false, background: '#1c1c1e', color: '#fff' });

        let me = null, data = {}, isR = false, tmpImg = "", curG = null, curSub = null, curChat = null;
        let maintTimerInt = null;
        const MY_ADMIN_ID = "7040863301"; 

        // ГЛАВНАЯ ПРОВЕРКА ПРАВ
        function isAdm(user) {
            return user && (user.id == MY_ADMIN_ID || user.n === 'owwner');
        }

        function init() {
            db.on('value', snap => {
                data = snap.val() || { u:{}, i:{}, d:{}, games:{}, settings:{com:0, maint:{active:false}}, ads:{}, chats:{} };
                const sid = localStorage.getItem('lyne_v122_sid');
                document.getElementById('loader').style.display = 'none';

                const currentUser = sid && data.u[sid] ? data.u[sid] : null;
                const maint = data.settings?.maint;
                
                if(maint?.active && !isAdm(currentUser)) {
                    renderMaintenance();
                    return; 
                }
                
                document.getElementById('maintenance_scr').classList.add('hidden');
                
                if(currentUser) { 
                    me = currentUser;
                    document.getElementById('auth_scr').classList.add('hidden'); 
                    document.getElementById('app').classList.remove('hidden'); 
                    if(isAdm(me)) {
                        document.getElementById('adm_btn').classList.remove('hidden');
                        document.getElementById('admin_maint_bypass').classList.remove('hidden');
                    }
                    render(); 
                } else { 
                    document.getElementById('auth_scr').classList.remove('hidden'); 
                }
            });
        }

        function render() {
            if(!me) return;
            document.getElementById('h_bal').innerText = me.bal.toLocaleString() + ' ₽';
            document.getElementById('h_ava').src = me.ava;
            document.getElementById('p_ava').src = me.ava;
            document.getElementById('p_n').innerText = me.n;

            // Категории
            if(!curG) {
                document.getElementById('cat_grid').innerHTML = Object.values(data.games || {}).map(g => `
                    <div class="glass p-3 text-center" onclick="openGame('${g.id}')">
                        <img src="${g.img || 'https://via.placeholder.com/50'}" class="w-12 h-12 mx-auto mb-2 rounded-2xl object-cover">
                        <b class="text-[9px] uppercase font-black block truncate">${g.name}</b>
                    </div>`).join('');
            }

            // Реклама
            document.getElementById('ad_slider').innerHTML = Object.values(data.ads || {}).map(ad => `
                <div class="ad-banner w-full h-40 rounded-[2rem] p-6 flex flex-col justify-end relative overflow-hidden" style="--ad-bg: url(${ad.img})">
                    <div class="relative z-10">
                        <h4 class="text-lg font-black uppercase italic">${ad.text}</h4>
                        <a href="${ad.link}" class="inline-block mt-3 bg-white text-black px-4 py-2 rounded-xl text-[10px] font-black uppercase">${ad.btn}</a>
                    </div>
                </div>`).join('');

            // Сделки
            const deals = Object.values(data.d || {}).filter(d => d.bid === me.id || d.sid === me.id).reverse();
            document.getElementById('deals_list').innerHTML = deals.map(d => `<div class="glass p-5 flex justify-between items-center"><div><b class="text-sm italic">${d.t}</b><br><span class="text-[9px] opacity-40">${d.p} ₽ | ${d.status}</span></div><button onclick="openChat('${d.id}', '${d.t}')" class="bg-blue-600/20 text-blue-500 px-3 py-1 rounded-lg text-[9px] font-black">ЧАТ</button></div>`).join('');

            if(isAdm(me)) renderAdmin();
        }

        function renderAdmin() {
            document.getElementById('ad_users').innerHTML = Object.values(data.u).map(u => `
                <div class="glass p-4 space-y-2">
                    <div class="flex justify-between"><b>${u.n}</b><span class="text-blue-500">${u.bal} ₽</span></div>
                    <button onclick="admEditBal('${u.id}', 1)" class="bg-green-600/20 text-green-500 text-[9px] p-2 rounded-lg">ВЫДАТЬ</button>
                </div>`).join('');
        }

        function renderMaintenance() {
            const m = data.settings.maint;
            document.getElementById('maintenance_scr').classList.remove('hidden');
            document.getElementById('maint_title').innerText = m.title || 'ТЕХНИЧЕСКИЙ ПЕРЕРЫВ';
            document.getElementById('maint_texts').innerHTML = m.texts?.map(t => `<p>${t}</p>`).join('') || '';
            
            if (m.until > Date.now()) {
                document.getElementById('maint_timer').classList.remove('hidden');
                maintTimerInt = setInterval(() => {
                    const diff = m.until - Date.now();
                    if(diff <= 0) location.reload();
                    const h = Math.floor(diff/3600000), min = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                    document.getElementById('maint_timer').innerText = `${h}:${min}:${s}`;
                }, 1000);
            }
            
            const bypass = document.getElementById('admin_maint_bypass');
            if(isAdm(me)) {
                bypass.classList.remove('hidden');
                bypass.onclick = () => document.getElementById('maintenance_scr').classList.add('hidden');
            }
        }

        // РЕГИСТРАЦИЯ И АВТОРИЗАЦИЯ
        function handleAuth() {
            const n=document.getElementById('a_n').value, p=document.getElementById('a_p').value;
            if(isR) { 
                const id='u'+Date.now(); 
                db.child(`u/${id}`).set({id, n, p, ava:tmpImg||'https://ui-avatars.com/api/?name='+n, bal:0}); 
                localStorage.setItem('lyne_v122_sid', id); 
                location.reload(); 
            } else { 
                const u = Object.values(data.u).find(x => x.n === n && x.p === p); 
                if(u) { localStorage.setItem('lyne_v122_sid', u.id); location.reload(); } 
                else { Tst.fire({icon:'error', title:'Неверные данные'}); }
            }
        }

        // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        function upImg(i, tid, setImgHtml = true, hiddenInputId = null) {
            const r = new FileReader(); r.onload = e => { tmpImg = e.target.result; if(setImgHtml) document.getElementById(tid).innerHTML = `<img src="${tmpImg}" class="w-full h-full object-cover rounded-[inherit]">`; if(hiddenInputId) document.getElementById(hiddenInputId).value = tmpImg; }; if(i.files[0]) r.readAsDataURL(i.files[0]);
        }
        function toggleR() { isR=!isR; document.getElementById('reg_ext').classList.toggle('hidden'); document.getElementById('a_btn').innerText=isR?'Создать':'Войти'; }
        function logout() { localStorage.clear(); location.reload(); }
        function switchT(t) { document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active')); document.getElementById('tab_'+t).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active')); document.getElementById('n_'+t)?.classList.add('active'); }
        function admSaveMaint() {
            const maint = {
                active: document.getElementById('ad_maint_active').checked,
                until: Date.now() + (Number(document.getElementById('ad_maint_d').value)*86400000) + (Number(document.getElementById('ad_maint_h').value)*3600000) + (Number(document.getElementById('ad_maint_m').value)*60000),
                title: document.getElementById('ad_maint_title').value,
                texts: document.getElementById('ad_maint_texts').value.split(',')
            };
            db.child('settings/maint').set(maint);
            Tst.fire({icon:'success', title:'Обновлено'});
        }
        function openChat(id, title) { curChat = id; document.getElementById('chat_title').innerText = title; document.getElementById('chat_modal').classList.remove('hidden'); renderChat(); }
        function closeChat() { curChat = null; document.getElementById('chat_modal').classList.add('hidden'); }
        function sendMsg() { const input = document.getElementById('chat_input'); const msgs = data.chats[curChat]?.msgs || []; msgs.push({ sender: me.id, text: input.value, time: Date.now() }); db.child(`chats/${curChat}/msgs`).set(msgs); input.value = ''; }
        function renderChat() {
            if(!curChat || !data.chats[curChat]) return; const msgs = data.chats[curChat].msgs || [];
            document.getElementById('chat_msgs').innerHTML = msgs.map(m => `<div class="flex flex-col ${m.sender === me.id ? 'items-end' : 'items-start'}"><div class="bg-zinc-800 p-3 rounded-2xl max-w-[80%]">${m.text}</div></div>`).join('');
        }

        init();
    </script>
</body>
</html>
