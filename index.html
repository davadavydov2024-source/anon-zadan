<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>anon:zadan v2.5 GEO</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU&apikey=40c0628e-f513-410c-9a00-5e581e26456f" type="text/javascript"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { background: #0a0a0b; color: #e4e4e7; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .card { background: #161618; border: 1px solid #27272a; border-radius: 24px; }
        .tab { display: none; }
        .tab.active { display: block; }
        .input-dark { background: #0f0f10 !important; border: 1px solid #27272a !important; color: white !important; border-radius: 14px !important; outline: none; }
        .btn-accent { background: #ffffff; color: #000; border-radius: 16px; font-weight: 800; }
        #map { width: 100%; height: 300px; border-radius: 20px; margin-top: 10px; display: none; }
        /* Фикс для подсказок Яндекса в темной теме */
        .ymaps-2-1-79-suggest-item { color: black !important; padding: 10px !important; }
    </style>
</head>
<body class="pb-28">

    <header class="p-5 flex justify-between items-center sticky top-0 bg-[#0a0a0b]/90 backdrop-blur-md z-50 border-b border-white/5">
        <h1 class="text-lg font-extrabold italic tracking-tighter">anon:<span class="text-zinc-600">zadan</span></h1>
        <div id="u-bal-head" class="bg-zinc-900 px-4 py-1.5 rounded-full text-[11px] font-bold border border-zinc-800 text-white">0.00₽</div>
    </header>

    <section id="home" class="tab active px-5 pt-4">
        <div class="flex gap-2 mb-4">
            <input id="search-geo" class="input-dark flex-1 p-3 text-xs" placeholder="Поиск по городу...">
            <button onclick="toggleMap()" class="bg-zinc-800 px-4 rounded-xl"><i class="fa-solid fa-map-location-dot"></i></button>
        </div>
        <div id="map"></div>
        <div id="zadan-list" class="space-y-4 pb-10 mt-4"></div>
    </section>
    
    <section id="create" class="tab px-5 pt-4">
        <div class="card p-6 space-y-4">
            <h2 class="font-bold text-xs opacity-40 uppercase">Создать товар</h2>
            <input id="z-title" class="input-dark w-full p-4 text-xs" placeholder="Что продаем?">
            <textarea id="z-desc" class="input-dark w-full p-4 text-xs h-20" placeholder="Описание..."></textarea>
            
            <input type="file" id="z-file" accept="image/*" class="hidden" onchange="handleFile(this)">
            <button onclick="document.getElementById('z-file').click()" class="w-full bg-zinc-900 py-3 rounded-xl text-[10px] border border-zinc-800 font-bold uppercase">Прикрепить фото</button>
            <div id="file-preview" class="hidden text-center text-[9px] text-green-500 font-bold">ФОТО ДОБАВЛЕНО ✅</div>

            <input id="z-addr" class="input-dark w-full p-4 text-xs" placeholder="Введите адрес (Яндекс Поиск)">
            <input id="z-price" type="number" class="input-dark w-full p-4 text-xs" placeholder="Цена (₽)">
            
            <button onclick="createZadan()" class="w-full btn-accent py-5 text-[11px] uppercase tracking-widest">Выставить на продажу</button>
        </div>
    </section>

    <section id="chats" class="tab px-5 pt-4">
        <div class="card p-5 border-blue-900/20 flex flex-col h-[60vh]">
            <div id="support-messages" class="flex-1 overflow-y-auto space-y-3 mb-4"></div>
            <div class="flex gap-2">
                <input id="user-msg-input" class="input-dark flex-1 p-3.5 text-[11px]" placeholder="Написать админу...">
                <button onclick="userSendMessage()" class="bg-blue-600 w-12 h-11 rounded-xl flex items-center justify-center text-white"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </section>

    <section id="me" class="tab px-5 pt-4 text-center">
        <div class="card p-8 space-y-6">
            <div>
                <h3 id="u-nick" class="font-black text-2xl">...</h3>
                <p id="u-tg" class="text-blue-500 text-xs font-bold mt-1">@username</p>
            </div>
            <div id="u-bal-main" class="bg-zinc-900 p-7 rounded-[32px] border border-zinc-800 font-black text-3xl">0₽</div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="deposit()" class="btn-accent py-4 text-[10px] uppercase">Пополнить</button>
                <button onclick="withdraw()" class="bg-zinc-800 py-4 rounded-xl text-[10px] uppercase text-zinc-400">Вывод</button>
            </div>
            <button onclick="logout()" class="w-full py-4 text-[9px] font-bold text-zinc-600 uppercase border border-zinc-900 rounded-xl">Выйти из профиля</button>
            <button onclick="setTab('admin_login')" class="opacity-10 text-[8px] uppercase font-bold mt-4 block mx-auto">Admin Panel</button>
        </div>
    </section>

    <section id="admin_login" class="tab px-5 pt-20">
        <input type="password" id="admin-pass-input" oninput="if(this.value.toLowerCase()==='kalubxq') setTab('admin')" class="w-full p-6 text-center card outline-none" placeholder="••••">
    </section>

    <section id="admin" class="tab px-5 pb-32 space-y-4 pt-4">
        <div class="card p-5 space-y-3">
            <h2 class="text-[10px] font-bold text-red-500 uppercase">Управление</h2>
            <input id="adm-user-nick" class="input-dark w-full p-3 text-[10px]" placeholder="Ник юзера">
            <button onclick="adminChangeBal()" class="w-full bg-zinc-800 py-3 rounded-lg text-[9px] font-bold">ИЗМЕНИТЬ БАЛАНС</button>
        </div>
        <div id="adm-mod-list" class="space-y-3"></div>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-black/95 border-t border-zinc-900 flex justify-around items-center z-[100] px-4">
        <button onclick="setTab('home')" id="btn-home"><i class="fa-solid fa-house text-lg"></i></button>
        <button onclick="setTab('create')" id="btn-create" class="opacity-30"><i class="fa-solid fa-plus-circle text-lg"></i></button>
        <button onclick="setTab('chats')" id="btn-chats" class="opacity-30"><i class="fa-solid fa-comment-dots text-lg"></i></button>
        <button onclick="setTab('me')" id="btn-me" class="opacity-30"><i class="fa-solid fa-user text-lg"></i></button>
    </nav>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
          authDomain: "dogx-base.firebaseapp.com",
          databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
          projectId: "dogx-base",
          storageBucket: "dogx-base.firebasestorage.app",
          messagingSenderId: "81713249793",
          appId: "1:81713249793:web:1b44a13e6faf5acfa78a00"
        };

        const DB_VER = 'anon_v2_5'; 
        const TG_TOKEN = "8722822022:AAEmZa-V4-isxXnZ00omU8gAM_NtYevuL9Y";
        const ADMIN_ID = "7040863301";

        firebase.initializeApp(firebaseConfig);
        const rdb = firebase.database();
        let db = { users: {}, tasks: {} };
        let me = null;
        let tempPhoto = "";
        let myMap;

        // Инициализация поиска Яндекса
        ymaps.ready(() => {
            new ymaps.SuggestView('z-addr');
            new ymaps.SuggestView('search-geo');
        });

        function init() {
            rdb.ref(DB_VER).on('value', (s) => {
                db = s.val() || { users: {}, tasks: {} };
                const uid = localStorage.getItem('anon_uid');
                if (uid && db.users && db.users[uid]) {
                    me = db.users[uid];
                    renderAll();
                } else { showReg(); }
            });
        }

        async function sendTG(txt) {
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(txt)}&parse_mode=HTML`);
        }

        async function showReg(isLogin = false) {
            const { value: f } = await Swal.fire({
                title: isLogin ? 'ВХОД' : 'РЕГИСТРАЦИЯ',
                background: '#161618', color: '#fff',
                html: `
                    <input id="s-n" class="swal2-input" placeholder="Ник на сайте">
                    ${!isLogin ? '<input id="s-tg" class="swal2-input" placeholder="@Username в TG">' : ''}
                    <input id="s-p" type="password" class="swal2-input" placeholder="Пароль">
                    <button onclick="Swal.clickConfirm(); window.toggleMode()" class="mt-4 text-blue-400 text-[10px] font-bold block w-full uppercase">
                        ${isLogin ? 'Нет аккаунта? Регистрация' : 'Уже есть аккаунт? Войти'}
                    </button>`,
                confirmButtonText: isLogin ? 'ВОЙТИ' : 'ГОТОВО',
                allowOutsideClick: false,
                preConfirm: () => {
                    return [
                        document.getElementById('s-n').value.trim(), 
                        document.getElementById('s-p').value.trim(),
                        !isLogin ? document.getElementById('s-tg').value.trim() : null
                    ]
                }
            });

            if (f && f[0]) {
                const [n, p, t] = f;
                let user = Object.values(db.users || {}).find(x => x.nick === n);
                if (isLogin) {
                    if (user && user.pass === p) { localStorage.setItem('anon_uid', user.id); location.reload(); }
                    else { await Swal.fire('Ошибка', 'Данные неверны', 'error'); showReg(true); }
                } else {
                    if (user) { await Swal.fire('Ошибка', 'Ник занят', 'error'); showReg(false); }
                    else {
                        const id = Math.floor(100000+Math.random()*900000).toString();
                        await rdb.ref(DB_VER+'/users/'+id).set({ id, nick: n, pass: p, tg: t || 'не указан', bal: 0, created: Date.now() });
                        localStorage.setItem('anon_uid', id); location.reload();
                    }
                }
            }
        }
        window.toggleMode = () => { const isL = Swal.getTitle().innerText === 'ВХОД'; showReg(!isL); };

        function userSendMessage() {
            const txt = document.getElementById('user-msg-input').value.trim();
            if(!txt) return;
            rdb.ref(`${DB_VER}/notifications/${me.id}/${Date.now()}`).set({ text: txt, from: 'user', time: Date.now() });
            sendTG(`📩 <b>ЧАТ:</b>\n<b>От:</b> ${me.tg} (${me.nick})\n<b>Текст:</b> ${txt}`);
            document.getElementById('user-msg-input').value = '';
        }

        function createZadan() {
            const t = document.getElementById('z-title').value, 
                  p = Number(document.getElementById('z-price').value),
                  addr = document.getElementById('z-addr').value;
            if (!t || p < 20 || me.bal < p || !addr) return Swal.fire('Ошибка','Заполните все поля и проверьте баланс','error');
            
            const tid = Date.now().toString();
            rdb.ref(`${DB_VER}/tasks/${tid}`).set({ id: tid, owner: me.id, nick: me.nick, tg: me.tg, title: t, price: p, addr: addr, status: 'active', img: tempPhoto || "", created: Date.now() });
            rdb.ref(`${DB_VER}/users/${me.id}`).update({ bal: me.bal - p });
            sendTG(`📦 <b>НОВЫЙ ТОВАР</b>\n<b>Продавец:</b> ${me.tg}\n<b>Товар:</b> ${t}\n<b>Адрес:</b> ${addr}\n<b>Цена:</b> ${p}₽`);
            setTab('home');
        }

        function toggleMap() {
            const m = document.getElementById('map');
            if (m.style.display === 'block') { m.style.display = 'none'; }
            else { 
                m.style.display = 'block';
                if (!myMap) {
                    myMap = new ymaps.Map("map", { center: [55.76, 37.64], zoom: 10 });
                    // Добавляем метки товаров
                    Object.values(db.tasks || {}).forEach(t => {
                        if (t.status === 'active') {
                            ymaps.geocode(t.addr).then(res => {
                                let coord = res.geoObjects.get(0).geometry.getCoordinates();
                                myMap.geoObjects.add(new ymaps.Placemark(coord, { balloonContent: t.title + ' - ' + t.price + '₽' }));
                            });
                        }
                    });
                }
            }
        }

        function renderAll() {
            document.getElementById('u-bal-head').innerText = me.bal + '₽';
            document.getElementById('u-bal-main').innerText = me.bal + '₽';
            document.getElementById('u-nick').innerText = me.nick;
            document.getElementById('u-tg').innerText = me.tg.startsWith('@') ? me.tg : '@' + me.tg;
            
            const tasks = Object.values(db.tasks || {}).filter(t => t.status === 'active').sort((a,b)=>b.created-a.created);
            document.getElementById('zadan-list').innerHTML = tasks.map(t => `
                <div class="card p-4">
                    ${t.img ? `<img src="${t.img}" class="w-full h-40 object-cover rounded-xl mb-3">` : ''}
                    <div class="flex justify-between items-start">
                        <div>
                            <b class="text-sm">${t.title}</b>
                            <p class="text-[10px] opacity-50 mt-1"><i class="fa-solid fa-location-dot"></i> ${t.addr}</p>
                        </div>
                        <span class="text-green-400 font-black">${t.price}₽</span>
                    </div>
                </div>`).join('');
        }

        function deposit() { sendTG(`💰 <b>ПОПОЛНЕНИЕ</b>\n<b>От:</b> ${me.tg} (${me.nick})`); Swal.fire('Заявка отправлена','','success'); }
        function withdraw() { sendTG(`💸 <b>ВЫВОД</b>\n<b>От:</b> ${me.tg}`); Swal.fire('Принято','','info'); }
        function logout() { localStorage.removeItem('anon_uid'); location.reload(); }
        function handleFile(i) { const r = new FileReader(); r.onload=e=>{tempPhoto=e.target.result;document.getElementById('file-preview').classList.remove('hidden');}; if(i.files[0]) r.readAsDataURL(i.files[0]); }
        function setTab(t) { document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); document.getElementById(t).classList.add('active'); document.querySelectorAll('nav button').forEach(b=>b.classList.add('opacity-30')); if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.remove('opacity-30'); }
        
        init();
    </script>
</body>
</html>
