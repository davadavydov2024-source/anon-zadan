<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK TITAN V122 | ULTIMATE EXPANDED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Press+Start+2P&family=Ruslan+Display&family=Kelly+Slab&family=Underdog&family=Lobster&family=Pacifico&family=Monoton&family=Jura:wght@700&family=Playfair+Display:wght@900&family=Courier+Prime&family=Zeyada&family=Dancing+Script:wght@700&family=EB+Garamond:ital@1&family=Montserrat+Alternates:wght@900&family=Caveat:wght@700&family=Unbounded:wght@900&family=Russo+One&family=Bad+Script&family=Bungee+Shade&family=Rubik+Glitch&family=Creepster&family=Nosifer&family=Rubik+Microbe&family=Silkscreen&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --bg: #050505; --card: #121214; --text: #ffffff; --blue: #007aff; --gray: #1c1c1e; }
        
        body.theme-winter { --bg: #0a192f; --blue: #00d4ff; background-image: url('https://images.unsplash.com/photo-1418985991508-e47386d96a71?q=80&w=2070&auto=format&fit=crop'); }
        body.theme-summer { --bg: #0b2e13; --blue: #ffcc00; background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2073&auto=format&fit=crop'); }
        body.theme-halloween { --bg: #1a0f00; --blue: #ff6600; background-image: url('https://images.unsplash.com/photo-1508361705456-d6f4b634877a?q=80&w=2070&auto=format&fit=crop'); }
        body.theme-spring { --bg: #2d1b2d; --blue: #ff85ff; background-image: url('https://images.unsplash.com/photo-1490750967868-88aa4486c946?q=80&w=2070&auto=format&fit=crop'); }
        body.theme-autumn { --bg: #2d1b1b; --blue: #d35400; background-image: url('https://images.unsplash.com/photo-1507722744111-703359846394?q=80&w=2070&auto=format&fit=crop'); }
        body.theme-easter { --bg: #1b2d2d; --blue: #00feba; background-image: url('https://images.unsplash.com/photo-1522336572018-ed27201bb747?q=80&w=2070&auto=format&fit=crop'); }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; background-size: cover; background-attachment: fixed; transition: 0.5s; }
        .glass { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 24px; backdrop-filter: blur(15px); }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px 16px 180px; scrollbar-width: none; }
        .tab-content::-webkit-scrollbar { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(10,10,10,0.9); backdrop-filter: blur(25px); display: flex; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #636366; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: 0.3s; } 
        .nav-btn.active { color: var(--blue); transform: translateY(-2px); }
        
        input, textarea, select { background: var(--gray); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; color: white; width: 100%; outline: none; font-size: 14px; transition: 0.3s; } 
        input:focus { border-color: var(--blue); }
        .btn-blue { background: var(--blue); color: white; border-radius: 18px; font-weight: 900; padding: 18px; width: 100%; border: none; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-style: italic; } 
        
        .chat-bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; margin-bottom: 8px; font-size: 14px; position: relative; }
        .chat-me { background: var(--blue); align-self: flex-end; border-bottom-right-radius: 4px; }
        .chat-op { background: var(--gray); align-self: flex-start; border-bottom-left-radius: 4px; }
        
        .playerok-header { background: #1a1a1c; border-bottom: 1px solid #2c2c2e; padding: 12px; border-radius: 20px 20px 0 0; }
        
        #event_overlay { position: fixed; inset: 0; z-index: 50000; background: black; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        #event_overlay video, #event_overlay img { max-width: 100%; max-height: 80vh; border-radius: 30px; box-shadow: 0 0 50px var(--blue); }

        #loader { background: #000; z-index: 10000; position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .badge-rainbow { background: linear-gradient(45deg, red, orange, yellow, green, blue, indigo, violet); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rainbow_anim 3s linear infinite; background-size: 200%; }
        .nick-rainbow { background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rainbow_anim 3s linear infinite; background-size: 200%; font-weight: 900; }
        @keyframes rainbow_anim { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .online-dot { width:8px; height:8px; background:#34c759; border-radius:50%; display:inline-block; box-shadow:0 0 8px #34c759; }
    </style>
    <style id="dynamic_styles"></style>
</head>
<body>
    <div id="loader"><div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>
    <img id="holiday_pixel" src="" class="hidden fixed top-24 right-6 z-[4000] w-12 animate-bounce pointer-events-none drop-shadow-2xl">

    <div id="event_overlay">
        <div id="event_container" class="w-full h-full flex flex-col items-center justify-center p-6"></div>
        <button onclick="document.getElementById('event_overlay').style.display='none'" class="absolute top-12 right-8 text-white/50 text-4xl">&times;</button>
    </div>

    <div id="auth_scr" class="hidden fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-8">
        <h1 id="auth_logo" class="text-5xl font-black mb-16 italic tracking-tighter">LYNEOK<span class="text-blue-500">.</span></h1>
        <div class="w-full glass p-8 space-y-4">
            <div id="reg_ext" class="hidden space-y-4">
                <input id="a_email" type="email" placeholder="Ваш Gmail">
                <input type="file" id="r_ava" class="hidden" accept="image/*" onchange="upImg(this, 'l_r_ava', true)">
                <label for="r_ava" id="l_r_ava" class="w-20 h-20 bg-zinc-900 mx-auto rounded-full flex items-center justify-center cursor-pointer border-2 border-dashed border-zinc-800"><i class="fa-solid fa-camera text-zinc-600"></i></label>
            </div>
            <input id="a_n" placeholder="Никнейм">
            <input id="a_p" type="password" placeholder="Пароль">
            <button onclick="handleAuth()" id="a_btn" class="btn-blue">Войти</button>
            <p onclick="toggleR()" id="a_tog" class="text-center text-[11px] font-black text-zinc-500 uppercase cursor-pointer pt-4">Создать новый аккаунт</p>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-6 py-5 flex justify-between items-center bg-black/60 backdrop-blur-xl border-b border-white/5 sticky top-0 z-50">
            <b id="main_logo" class="text-2xl italic tracking-tighter text-blue-500">LYNEOK</b>
            <div onclick="switchT('profile')" class="bg-white/5 px-4 py-2 rounded-2xl flex items-center gap-3 border border-white/5 cursor-pointer">
                <div class="text-right"><p class="text-[9px] uppercase font-black opacity-40">Баланс</p><span id="h_bal" class="font-black text-sm">0 ₽</span></div>
                <img id="h_ava" class="w-9 h-9 rounded-full object-cover bg-zinc-800">
            </div>
        </header>

        <main id="tab_market" class="tab-content active">
            <div id="market_main">
                <h2 class="text-3xl font-black italic mb-6">Маркет</h2>
                <div id="cat_grid" class="grid grid-cols-3 gap-3"></div> 
            </div>
            <div id="subcat_view" class="hidden space-y-6">
                <button onclick="closeSubcat()" class="text-blue-500 text-xs font-bold uppercase"><i class="fa-solid fa-chevron-left mr-1"></i> Назад</button>
                <div id="subcat_grid" class="grid grid-cols-1 gap-3"></div>
            </div>
            <div id="items_view" class="hidden space-y-6">
                <button onclick="closeCat()" class="text-blue-500 text-xs font-bold uppercase"><i class="fa-solid fa-chevron-left mr-1"></i> К категориям</button>
                <div id="items_list" class="space-y-4"></div>
            </div>
        </main>

        <main id="tab_sell" class="tab-content">
            <h2 class="text-3xl font-black mb-6 italic">Создать лот</h2>
            <div class="glass p-6 space-y-5">
                <input type="file" id="s_img" class="hidden" onchange="upImg(this, 'l_s_img', true)">
                <label for="s_img" id="l_s_img" class="w-full h-48 bg-zinc-900 rounded-3xl flex flex-col items-center justify-center border-2 border-dashed border-zinc-800 cursor-pointer"><i class="fa-solid fa-image text-3xl text-zinc-700"></i></label>
                <div class="grid grid-cols-2 gap-3"><select id="s_game" onchange="updateSubcatsSell()"></select><select id="s_subcat"></select></div>
                <input id="s_t" placeholder="Название">
                <textarea id="s_acc" rows="3" placeholder="Описание товара"></textarea>
                <input id="s_p" type="number" placeholder="Цена ₽ (от 70₽)">
                <button onclick="postItem()" class="btn-blue">Опубликовать</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content">
            <h2 class="text-3xl font-black mb-6 italic">Сделки</h2>
            <div id="deals_list" class="space-y-4"></div>
        </main>

        <main id="tab_support" class="tab-content">
            <h2 class="text-3xl font-black mb-6 italic">Поддержка</h2>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <button onclick="openAI()" class="glass p-6 text-center border-blue-500/30"><i class="fa-solid fa-robot text-2xl mb-2 text-blue-500"></i><br><b class="text-[10px] uppercase">ИИ Помощник</b></button>
                <button onclick="openHumanSup()" class="glass p-6 text-center"><i class="fa-solid fa-headset text-2xl mb-2 text-green-500"></i><br><b class="text-[10px] uppercase">Оператор</b></button>
            </div>
            <div id="sup_box" class="hidden glass p-4 flex flex-col h-[400px]">
                <div id="sup_msgs" class="flex-1 overflow-y-auto p-2 flex flex-col"></div>
                <div class="flex gap-2 mt-4"><input id="sup_in" placeholder="Ваш вопрос..."><button onclick="sendSup()" class="bg-blue-500 px-4 rounded-xl"><i class="fa-solid fa-paper-plane"></i></button></div>
            </div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="glass p-8 mb-6 text-center border border-white/5 relative">
                <img id="p_ava" class="w-28 h-28 mx-auto mb-6 rounded-full object-cover border-4 border-zinc-900 shadow-2xl">
                <div class="flex items-center justify-center gap-2 mb-4"><span id="p_n" class="text-3xl font-black">...</span><span id="p_badge"></span></div>
                <div class="grid grid-cols-2 gap-4"><button onclick="topUp()" class="bg-white text-black py-4 rounded-2xl font-black text-xs uppercase italic">Пополнить</button><button onclick="askOut()" class="bg-zinc-800 text-white py-4 rounded-2xl font-black text-xs uppercase italic">Вывести</button></div>
            </div>
            <button id="adm_btn" onclick="switchT('admin')" class="hidden w-full bg-red-600/10 text-red-500 py-5 rounded-3xl font-black mb-4 border border-red-600/20 uppercase text-xs italic">TITAN PANEL</button>
            <button onclick="logout()" class="w-full py-4 text-zinc-600 text-[10px] font-black uppercase">Выйти</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <h1 class="text-4xl font-black italic mb-8">TITAN <span class="text-red-500">SYSTEM</span></h1>
            
            <section class="glass p-6 mb-8 border-green-500/20">
                <h3 class="text-[11px] font-black uppercase mb-4 text-green-500">Поддержка (Сообщения)</h3>
                <div id="ad_sup_list" class="space-y-3"></div>
            </section>

            <section class="glass p-6 mb-8">
                <h3 class="text-[11px] font-black uppercase mb-5 text-blue-500">Пользователи</h3>
                <div id="ad_users" class="space-y-4"></div>
            </section>
            
            <button onclick="db.child('settings/holiday').set('ny')" class="btn-blue !bg-zinc-800 mb-2">ВКЛ НОВЫЙ ГОД</button>
            <button onclick="admFullReset()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-black uppercase text-[10px] italic">WIPE DATA</button>
        </main>

        <nav class="nav-bar">
            <div onclick="switchT('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-store text-xl"></i><span>Маркет</span></div>
            <div onclick="switchT('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-circle-plus text-xl"></i><span>Продать</span></div>
            <div onclick="switchT('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-comment-dots text-xl"></i><span>Сделки</span></div>
            <div onclick="switchT('support')" id="n_support" class="nav-btn"><i class="fa-solid fa-headset text-xl"></i><span>Помощь</span></div>
            <div onclick="switchT('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user text-xl"></i><span>Профиль</span></div>
        </nav>
    </div>

    <div id="deal_chat_modal" class="hidden fixed inset-0 z-[10005] bg-black flex flex-col">
        <div class="playerok-header flex flex-col gap-2">
            <div class="flex justify-between items-center">
                <button onclick="closeDealChat()" class="text-white/50"><i class="fa-solid fa-chevron-left"></i></button>
                <div class="text-center"><b id="dc_title" class="text-xs uppercase block">Сделка #123</b><span class="text-[9px] text-green-500 font-bold uppercase">В процессе</span></div>
                <div class="w-6"></div>
            </div>
            <div id="dc_actions" class="flex gap-2 overflow-x-auto py-2 no-scrollbar">
                </div>
        </div>
        <div id="dc_msgs" class="flex-1 overflow-y-auto p-4 flex flex-col gap-2"></div>
        <div class="p-4 bg-zinc-900 flex gap-2">
            <input id="dc_in" placeholder="Сообщение...">
            <button onclick="sendDealMsg()" class="bg-blue-500 w-14 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        emailjs.init("9M8GxYWeMi6hJP6Rg");

        const fList = ["Inter", "Comfortaa", "Press Start 2P", "Ruslan Display", "Kelly Slab", "Underdog", "Lobster", "Pacifico", "Monoton", "Jura", "Playfair Display", "Courier Prime", "Zeyada", "Dancing Script", "EB Garamond", "Montserrat Alternates", "Caveat", "Unbounded", "Russo One", "Bad Script", "Bungee Shade", "Rubik Glitch", "Creepster", "Nosifer", "Rubik Microbe", "Silkscreen"];
        firebase.initializeApp({ apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" });
        const db = firebase.database().ref('lyne_v122_titan');
        const Tst = Swal.mixin({ toast: true, position: 'top', timer: 2000, showConfirmButton: false, background: '#1c1c1e', color: '#fff' });

        let me = null, data = {}, isR = false, tmpImg = "", curG = null, curSub = null, activeDealId = null, supMode = 'ai';

        function init() {
            db.on('value', snap => {
                data = snap.val() || { u:{}, i:{}, d:{}, games:{}, requests:{}, settings:{com:5, branding:{text:"LYNEOK", color:"#007aff", font:0}} };
                const sid = localStorage.getItem('lyne_v122_sid');
                document.getElementById('loader').style.display = 'none';
                
                if (sid && data.u && data.u[sid]) {
                    me = data.u[sid];
                    db.child(`u/${me.id}/online`).set(Date.now());
                }

                if (me) {
                    document.getElementById('auth_scr').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    if(me.isAdmin || me.n === 'sswckk') document.getElementById('adm_btn').classList.remove('hidden');
                    render();
                    if(activeDealId) listenChat(activeDealId);
                } else {
                    document.getElementById('auth_scr').classList.remove('hidden');
                }
            });
        }

        async function sendMail(email, text, subj) {
            emailjs.send("service_ndr83sj", "template_q98pr7g", {
                to_email: email,
                message: text,
                subject: subj
            });
        }

        function render() {
            if(!me) return;
            document.getElementById('h_bal').innerText = (me.bal || 0) + ' ₽';
            document.getElementById('h_ava').src = me.ava || 'https://ui-avatars.com/api/?name='+me.n;
            document.getElementById('p_ava').src = me.ava || 'https://ui-avatars.com/api/?name='+me.n;
            document.getElementById('p_n').innerText = me.n;

            // Маркет
            document.getElementById('cat_grid').innerHTML = Object.values(data.games || {}).map(g => `
                <div class="glass p-3 text-center" onclick="openGame('${g.id}')">
                    <img src="${g.img}" class="w-12 h-12 mx-auto mb-2 rounded-2xl object-cover">
                    <b class="text-[9px] uppercase block truncate">${g.name}</b>
                </div>`).join('');

            // Список сделок
            const deals = Object.values(data.d || {}).filter(d => d.bid === me.id || d.sid === me.id).reverse();
            document.getElementById('deals_list').innerHTML = deals.map(d => `
                <div class="glass p-5 flex justify-between items-center" onclick="openDealChat('${d.id}')">
                    <div><b class="text-sm">${d.t}</b><br><span class="text-[9px] opacity-40 uppercase">${d.status}</span></div>
                    <i class="fa-solid fa-chevron-right text-white/20"></i>
                </div>`).join('') || '<p class="text-center opacity-30 py-10">У вас пока нет сделок</p>';

            if(me.isAdmin || me.n === 'sswckk') renderAdmin();
        }

        // --- ЛОГИКА ЧАТА СДЕЛКИ ---
        function openDealChat(did) {
            activeDealId = did;
            const d = data.d[did];
            document.getElementById('deal_chat_modal').classList.remove('hidden');
            document.getElementById('dc_title').innerText = d.t;
            
            let actions = '';
            if(me.id === d.bid) { // Я покупатель
                actions = `<button onclick="reportDeal('${did}')" class="bg-red-500/20 text-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase whitespace-nowrap">Подать проблему</button>`;
            } else if(me.id === d.sid) { // Я продавец
                actions = `<button onclick="cancelDeal('${did}')" class="bg-yellow-500/20 text-yellow-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase whitespace-nowrap">Отменить покупку</button>`;
            }
            document.getElementById('dc_actions').innerHTML = actions;
            listenChat(did);
        }

        function listenChat(did) {
            const box = document.getElementById('dc_msgs');
            db.child(`d/${did}/msgs`).off();
            db.child(`d/${did}/msgs`).on('value', snap => {
                const msgs = snap.val() || {};
                box.innerHTML = Object.values(msgs).map(m => `
                    <div class="chat-bubble ${m.uid === me.id ? 'chat-me' : 'chat-op'}">
                        ${m.text}
                        <div class="text-[8px] opacity-50 mt-1">${new Date(m.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                    </div>
                `).join('');
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendDealMsg() {
            const text = document.getElementById('dc_in').value;
            if(!text) return;
            db.child(`d/${activeDealId}/msgs`).push({ uid: me.id, text, time: Date.now() });
            document.getElementById('dc_in').value = '';
        }

        function closeDealChat() {
            document.getElementById('deal_chat_modal').classList.add('hidden');
            activeDealId = null;
        }

        function reportDeal(did) {
            db.child(`d/${did}/status`).set('ПРОБЛЕМА');
            db.child(`requests/ticket_${did}`).set({ type: 'dispute', did, uid: me.id, time: Date.now() });
            Tst.fire('Жалоба подана', 'Админ скоро свяжется с вами', 'info');
            sendMail(me.email, `Вы подали жалобу по сделке #${did}. Ожидайте админа.`, "Проблема в сделке");
        }

        async function cancelDeal(did) {
            const d = data.d[did];
            const { isConfirmed } = await Swal.fire({ title: 'Отменить?', text: 'Деньги вернутся покупателю!', icon: 'warning', showCancelButton: true });
            if(isConfirmed) {
                const buyer = data.u[d.bid];
                db.child(`u/${d.bid}/bal`).set((buyer.bal || 0) + d.p);
                db.child(`d/${did}/status`).set('ОТМЕНЕНА');
                Tst.fire('Отменено', 'Средства возвращены', 'success');
                sendMail(buyer.email, `Продавец отменил сделку "${d.t}". Деньги (${d.p}₽) возвращены на баланс.`, "Товар отменен");
            }
        }

        // --- ПОДДЕРЖКА (ИИ + ЧЕЛОВЕК) ---
        function openAI() {
            supMode = 'ai';
            document.getElementById('sup_box').classList.remove('hidden');
            document.getElementById('sup_msgs').innerHTML = `<div class="chat-bubble chat-op">Привет! Я ИИ Lyneok. Какой у тебя вопрос? (Пополнение, Вывод, Жалобы?)</div>`;
        }

        function openHumanSup() {
            supMode = 'human';
            document.getElementById('sup_box').classList.remove('hidden');
            listenSup();
        }

        function sendSup() {
            const t = document.getElementById('sup_in').value; if(!t) return;
            if(supMode === 'ai') {
                const box = document.getElementById('sup_msgs');
                box.innerHTML += `<div class="chat-bubble chat-me">${t}</div>`;
                let reply = "Я не совсем понял. Попробуйте связаться с оператором.";
                if(t.toLowerCase().includes("пополн")) reply = "Пополнить баланс можно в профиле через кнопку 'Пополнить'. Заявка обрабатывается до 24ч.";
                if(t.toLowerCase().includes("вывод")) reply = "Минимальный вывод - 509₽. Комиссия системы 5%.";
                if(t.toLowerCase().includes("пробл")) reply = "Если возникла проблема в сделке, нажмите на кнопку 'Подать проблему' в чате сделки.";
                setTimeout(() => { box.innerHTML += `<div class="chat-bubble chat-op">${reply}</div>`; box.scrollTop = box.scrollHeight; }, 600);
            } else {
                db.child(`support/${me.id}/msgs`).push({ uid: me.id, text: t, time: Date.now() });
                db.child(`support/${me.id}/last`).set(Date.now());
            }
            document.getElementById('sup_in').value = '';
        }

        function listenSup() {
            db.child(`support/${me.id}/msgs`).on('value', snap => {
                const box = document.getElementById('sup_msgs');
                box.innerHTML = Object.values(snap.val() || {}).map(m => `
                    <div class="chat-bubble ${m.uid === me.id ? 'chat-me' : 'chat-op'}">${m.text}</div>
                `).join('');
                box.scrollTop = box.scrollHeight;
            });
        }

        // --- АДМИНКА ---
        function renderAdmin() {
            const supList = document.getElementById('ad_sup_list');
            const sups = Object.values(data.support || {}).sort((a,b) => b.last - a.last);
            supList.innerHTML = sups.map(s => {
                const user = data.u[Object.keys(data.support).find(key => data.support[key] === s)];
                return `<div class="glass p-3 flex justify-between items-center" onclick="admReplySup('${user.id}')">
                    <span class="text-[10px] uppercase font-bold">${user.n}</span>
                    <i class="fa-solid fa-comment text-blue-500"></i>
                </div>`;
            }).join('') || '<p class="text-center opacity-30 text-[10px]">Нет активных чатов</p>';
            
            document.getElementById('ad_users').innerHTML = Object.values(data.u).map(u => `
                <div class="glass p-4 text-[10px] flex justify-between items-center">
                    <b>${u.n} (${u.bal}₽)</b>
                    <button onclick="admEditBal('${u.id}')" class="text-blue-500">+/-</button>
                </div>
            `).join('');
        }

        async function admReplySup(uid) {
            const { value: text } = await Swal.fire({ title: 'Ответ саппорта', input: 'textarea' });
            if(text) {
                db.child(`support/${uid}/msgs`).push({ uid: 'admin', text, time: Date.now() });
                sendMail(data.u[uid].email, `Поддержка ответила на ваш запрос: "${text}"`, "Ответ поддержки");
            }
        }

        async function admEditBal(uid) {
            const { value: amt } = await Swal.fire({ title:'Изменить баланс', input:'number' });
            if(amt) {
                db.child(`u/${uid}/bal`).set(Number(amt));
                sendMail(data.u[uid].email, `Ваш баланс был изменен администратором. Новый баланс: ${amt}₽`, "Изменение баланса");
            }
        }

        // --- АВТОРИЗАЦИЯ И ПРОФИЛЬ ---
        function handleAuth() {
            const n=document.getElementById('a_n').value, p=document.getElementById('a_p').value, em=document.getElementById('a_email').value;
            if(!n || !p) return;
            if(isR) {
                const id = 'u' + Date.now();
                db.child(`u/${id}`).set({ id, n, p, email: em, ava: tmpImg, bal: 0, isAdmin: n==='sswckk' });
                localStorage.setItem('lyne_v122_sid', id);
                location.reload();
            } else {
                const u = Object.values(data.u).find(x => x.n === n && x.p === p);
                if(u) { localStorage.setItem('lyne_v122_sid', u.id); location.reload(); }
                else Tst.fire('Ошибка', 'Неверные данные', 'error');
            }
        }

        function toggleR() { 
            isR = !isR; 
            document.getElementById('reg_ext').classList.toggle('hidden'); 
            document.getElementById('a_btn').innerText = isR ? 'Зарегистрироваться' : 'Войти'; 
        }

        function upImg(i, tid, set) { 
            const r=new FileReader(); 
            r.onload=e=>{ tmpImg=e.target.result; if(set) document.getElementById(tid).innerHTML=`<img src="${tmpImg}" class="w-full h-full rounded-full object-cover">`; }; 
            if(i.files[0]) r.readAsDataURL(i.files[0]); 
        }

        function switchT(t) { 
            document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active')); 
            document.getElementById('tab_'+t).classList.add('active'); 
            document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active')); 
            document.getElementById('n_'+t).classList.add('active'); 
        }

        function logout() { localStorage.clear(); location.reload(); }

        init();
    </script>
</body>
</html>
