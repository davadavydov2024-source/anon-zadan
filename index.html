<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse Messenger</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --bg-secondary: #111820;
    --bg-tertiary: #1a2230;
    --card: #151d29;
    --border: #1e2a3a;
    --fg: #e8edf4;
    --fg-muted: #6b7f99;
    --accent: #00e5a0;
    --accent-dim: rgba(0,229,160,0.12);
    --accent-glow: rgba(0,229,160,0.25);
    --danger: #ff4d6a;
    --warning: #ffb84d;
    --msg-out: #00c78a;
    --msg-in: #1e2a3a;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--fg);
    height: 100vh;
    overflow: hidden;
  }

  /* === ФОНОВАЯ АТМОСФЕРА === */
  .bg-glow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .bg-glow::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    top: -150px; right: -100px;
    background: radial-gradient(circle, rgba(0,229,160,0.06) 0%, transparent 70%);
    animation: driftGlow 12s ease-in-out infinite alternate;
  }
  .bg-glow::after {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    bottom: -100px; left: -80px;
    background: radial-gradient(circle, rgba(0,180,220,0.05) 0%, transparent 70%);
    animation: driftGlow 15s ease-in-out infinite alternate-reverse;
  }
  @keyframes driftGlow {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(60px, 40px) scale(1.15); }
  }

  /* === ОСНОВНАЯ РАСКЛАДКА === */
  .app {
    position: relative;
    z-index: 1;
    display: flex;
    height: 100vh;
    max-width: 1400px;
    margin: 0 auto;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  /* === САЙДБАР === */
  .sidebar {
    width: 380px;
    min-width: 380px;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: transform 0.3s ease;
  }

  .sidebar-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), #00b4dc);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: var(--bg);
    font-weight: 700;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .logo-text {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--accent); }

  .sidebar-actions {
    display: flex; gap: 4px;
  }

  .icon-btn {
    width: 36px; height: 36px;
    border: none;
    background: transparent;
    color: var(--fg-muted);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 15px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn:hover {
    background: var(--accent-dim);
    color: var(--accent);
  }

  /* === ПОИСК === */
  .search-box {
    position: relative;
  }
  .search-box i {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--fg-muted);
    font-size: 13px;
    pointer-events: none;
    transition: color 0.2s;
  }
  .search-box input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--fg);
    font-family: inherit;
    font-size: 13.5px;
    outline: none;
    transition: all 0.25s;
  }
  .search-box input::placeholder { color: var(--fg-muted); }
  .search-box input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }
  .search-box input:focus + i,
  .search-box input:focus ~ i { color: var(--accent); }

  /* === СПИСОК ЧАТОВ === */
  .chat-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 10px;
  }
  .chat-list::-webkit-scrollbar { width: 4px; }
  .chat-list::-webkit-scrollbar-track { background: transparent; }
  .chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .chat-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .chat-item:hover { background: var(--bg-tertiary); }
  .chat-item.active {
    background: var(--accent-dim);
    border: 1px solid rgba(0,229,160,0.15);
  }
  .chat-item:not(.active) { border: 1px solid transparent; }

  .chat-avatar {
    position: relative;
    flex-shrink: 0;
  }
  .chat-avatar img {
    width: 48px; height: 48px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--border);
    transition: border-color 0.2s;
  }
  .chat-item.active .chat-avatar img,
  .chat-item:hover .chat-avatar img {
    border-color: var(--accent);
  }

  .online-dot {
    position: absolute;
    bottom: 1px; right: 1px;
    width: 12px; height: 12px;
    background: var(--accent);
    border: 2.5px solid var(--bg-secondary);
    border-radius: 50%;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); }
    50% { box-shadow: 0 0 0 5px transparent; }
  }

  .chat-info {
    flex: 1;
    min-width: 0;
  }
  .chat-info-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .chat-name {
    font-weight: 600;
    font-size: 14.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .chat-time {
    font-size: 11.5px;
    color: var(--fg-muted);
    flex-shrink: 0;
    margin-left: 8px;
  }
  .chat-preview {
    font-size: 13px;
    color: var(--fg-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .chat-preview .typing { color: var(--accent); font-style: italic; }

  .unread-badge {
    position: absolute;
    top: 12px; right: 14px;
    min-width: 20px; height: 20px;
    background: var(--accent);
    color: var(--bg);
    font-size: 11px;
    font-weight: 700;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 6px;
    box-shadow: 0 0 12px var(--accent-glow);
  }

  /* === ОСНОВНАЯ ОБЛАСТЬ ЧАТА === */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    position: relative;
  }

  .chat-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10,14,20,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: 5;
  }

  .chat-header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .chat-header-avatar img {
    width: 42px; height: 42px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--accent);
  }

  .chat-header-info h3 {
    font-size: 15px;
    font-weight: 600;
  }
  .chat-header-status {
    font-size: 12.5px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .chat-header-status.offline { color: var(--fg-muted); }

  .chat-header-actions { display: flex; gap: 4px; }

  /* === СООБЩЕНИЯ === */
  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .messages-area::-webkit-scrollbar { width: 5px; }
  .messages-area::-webkit-scrollbar-track { background: transparent; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-group {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .message {
    max-width: 65%;
    padding: 10px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.55;
    position: relative;
    animation: msgIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    word-wrap: break-word;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(14px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .message.out {
    align-self: flex-end;
    background: linear-gradient(135deg, #00c78a, #00a876);
    color: #021a10;
    border-bottom-right-radius: 6px;
    font-weight: 500;
  }
  .message.in {
    align-self: flex-start;
    background: var(--msg-in);
    color: var(--fg);
    border-bottom-left-radius: 6px;
    border: 1px solid var(--border);
  }

  .msg-time {
    font-size: 10.5px;
    opacity: 0.6;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .message.out .msg-time { justify-content: flex-end; color: #043d26; }
  .message.in .msg-time { color: var(--fg-muted); }

  .msg-check { font-size: 11px; }

  .date-separator {
    text-align: center;
    padding: 16px 0 8px;
  }
  .date-separator span {
    font-size: 11.5px;
    color: var(--fg-muted);
    background: var(--bg-tertiary);
    padding: 4px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* === ИНДИКАТОР НАБОРА === */
  .typing-indicator {
    align-self: flex-start;
    padding: 12px 18px;
    background: var(--msg-in);
    border: 1px solid var(--border);
    border-radius: 18px;
    border-bottom-left-radius: 6px;
    display: none;
    gap: 5px;
    align-items: center;
    animation: msgIn 0.3s ease;
  }
  .typing-indicator.show { display: flex; }
  .typing-dot {
    width: 7px; height: 7px;
    background: var(--fg-muted);
    border-radius: 50%;
    animation: typingBounce 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* === ПАНЕЛЬ ВВОДА === */
  .input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: rgba(10,14,20,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }

  .input-actions {
    display: flex;
    gap: 2px;
    padding-bottom: 6px;
  }

  .input-wrapper {
    flex: 1;
    position: relative;
  }

  .input-wrapper textarea {
    width: 100%;
    padding: 12px 16px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 22px;
    color: var(--fg);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    resize: none;
    max-height: 120px;
    min-height: 44px;
    line-height: 1.4;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .input-wrapper textarea::placeholder { color: var(--fg-muted); }
  .input-wrapper textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .send-btn {
    width: 44px; height: 44px;
    border: none;
    background: linear-gradient(135deg, var(--accent), #00b4dc);
    color: var(--bg);
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s;
    flex-shrink: 0;
    box-shadow: 0 0 20px var(--accent-glow);
  }
  .send-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 30px var(--accent-glow);
  }
  .send-btn:active { transform: scale(0.95); }
  .send-btn.disabled {
    opacity: 0.35;
    pointer-events: none;
    box-shadow: none;
  }

  /* === ПУСТОЕ СОСТОЯНИЕ === */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--fg-muted);
  }
  .empty-state i {
    font-size: 56px;
    opacity: 0.2;
  }
  .empty-state p {
    font-size: 15px;
  }

  /* === ЭМОДЗИ-ПИКЕР === */
  .emoji-picker {
    position: absolute;
    bottom: 70px;
    left: 24px;
    width: 320px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    display: none;
    flex-wrap: wrap;
    gap: 4px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    z-index: 10;
    animation: fadeUp 0.25s ease;
  }
  .emoji-picker.show { display: flex; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .emoji-btn {
    width: 36px; height: 36px;
    border: none;
    background: transparent;
    font-size: 20px;
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .emoji-btn:hover { background: var(--bg-tertiary); }

  /* === ТОСТ === */
  .toast-container {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .toast {
    padding: 12px 20px;
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: var(--radius-sm);
    color: var(--fg);
    font-size: 13px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    animation: toastIn 0.35s ease, toastOut 0.3s ease 2.5s forwards;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toast i { color: var(--accent); }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(40px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes toastOut {
    from { opacity: 1; transform: translateX(0); }
    to { opacity: 0; transform: translateX(40px); }
  }

  /* === КОНТЕКСТНОЕ МЕНЮ === */
  .ctx-menu {
    position: fixed;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px;
    min-width: 160px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    z-index: 100;
    display: none;
    animation: fadeUp 0.15s ease;
  }
  .ctx-menu.show { display: block; }
  .ctx-item {
    padding: 9px 14px;
    font-size: 13px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--fg);
    transition: background 0.15s;
    border: none;
    background: none;
    width: 100%;
    font-family: inherit;
    text-align: left;
  }
  .ctx-item:hover { background: var(--bg-tertiary); }
  .ctx-item i { width: 16px; text-align: center; color: var(--fg-muted); }
  .ctx-item.danger { color: var(--danger); }
  .ctx-item.danger i { color: var(--danger); }

  /* === ПРОФИЛЬ-ПАНЕЛЬ === */
  .profile-panel {
    width: 0;
    overflow: hidden;
    background: var(--bg-secondary);
    border-left: 1px solid var(--border);
    transition: width 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    flex-shrink: 0;
  }
  .profile-panel.open { width: 320px; }
  .profile-inner {
    width: 320px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .profile-close {
    align-self: flex-end;
  }
  .profile-avatar-large img {
    width: 100px; height: 100px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--accent);
    box-shadow: 0 0 30px var(--accent-glow);
  }
  .profile-name {
    font-size: 20px;
    font-weight: 700;
    text-align: center;
  }
  .profile-bio {
    font-size: 13px;
    color: var(--fg-muted);
    text-align: center;
    line-height: 1.5;
  }
  .profile-details {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .profile-detail {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--bg-tertiary);
    border-radius: var(--radius-sm);
    font-size: 13px;
  }
  .profile-detail i {
    color: var(--accent);
    width: 18px;
    text-align: center;
  }
  .profile-detail span { color: var(--fg-muted); }

  /* === МОБИЛЬНАЯ АДАПТАЦИЯ === */
  @media (max-width: 768px) {
    .sidebar {
      position: absolute;
      z-index: 20;
      width: 100%;
      min-width: unset;
      height: 100%;
      transform: translateX(0);
    }
    .sidebar.hidden { transform: translateX(-100%); }
    .mobile-back {
      display: flex !important;
    }
    .profile-panel.open { width: 100%; position: absolute; z-index: 25; height: 100%; }
    .profile-inner { width: 100%; }
    .message { max-width: 85%; }
  }

  .mobile-back { display: none; }

  /* === СКРОЛЛ К НИЗУ === */
  .scroll-bottom {
    position: absolute;
    bottom: 90px;
    right: 30px;
    width: 40px; height: 40px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--fg);
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    z-index: 5;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .scroll-bottom.show { display: flex; }
  .scroll-bottom:hover {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  /* === АНИМАЦИЯ ПОЯВЛЕНИЯ ЧАТОВ === */
  .chat-item {
    animation: chatSlide 0.3s ease backwards;
  }
  .chat-item:nth-child(1) { animation-delay: 0.02s; }
  .chat-item:nth-child(2) { animation-delay: 0.04s; }
  .chat-item:nth-child(3) { animation-delay: 0.06s; }
  .chat-item:nth-child(4) { animation-delay: 0.08s; }
  .chat-item:nth-child(5) { animation-delay: 0.10s; }
  .chat-item:nth-child(6) { animation-delay: 0.12s; }
  .chat-item:nth-child(7) { animation-delay: 0.14s; }
  @keyframes chatSlide {
    from { opacity: 0; transform: translateX(-12px); }
    to { opacity: 1; transform: translateX(0); }
  }
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="toast-container" id="toastContainer"></div>
<div class="ctx-menu" id="ctxMenu">
  <button class="ctx-item" onclick="copyMessage()"><i class="fa-regular fa-copy"></i>Копировать</button>
  <button class="ctx-item" onclick="replyMessage()"><i class="fa-solid fa-reply"></i>Ответить</button>
  <button class="ctx-item danger" onclick="deleteMessage()"><i class="fa-regular fa-trash-can"></i>Удалить</button>
</div>

<div class="app">
  <!-- САЙДБАР -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-top">
        <div class="logo">
          <div class="logo-icon"><i class="fa-solid fa-bolt"></i></div>
          <div class="logo-text">Pulse<span>Msg</span></div>
        </div>
        <div class="sidebar-actions">
          <button class="icon-btn" title="Новый чат" onclick="showToast('Новый чат создан')"><i class="fa-solid fa-pen-to-square"></i></button>

    list.innerHTML = filtered.map(c => `
      <div class="chat-item ${activeChatId === c.id ? 'active' : ''}" onclick="openChat(${c.id})" oncontextmenu="event.preventDefault()">

  // === РЕНДЕР СООБЩЕНИЙ ===
  function renderMessages(c) {
    const area = document.getElementById('messagesArea');
    const typing = document.getElementById('typingIndicator');
    // Оставить индикатор набора
    area.innerHTML = '';
    area.appendChild(typing);

    // Разделитель даты
    const sep = document.createElement('div');
    sep.className = 'date-separator';
    sep.innerHTML = '<span>Сегодня</span>';
    area.appendChild(sep);

    c.messages.forEach((m, i) => {
      const el = createMsgEl(m, i);
      area.appendChild(el);
    });

    scrollToBottom();
  }

  function createMsgEl(m, index) {
    const div = document.createElement('div');
    div.className = `message ${m.out ? 'out' : 'in'}`;
    div.dataset.index = index;

    let senderLine = '';
    if (!m.out && m.sender) {
      senderLine = `<div style="font-size:11px;font-weight:600;color:var(--accent);margin-bottom:3px">${m.sender}</div>`;
    }

    const checkIcon = m.out
      ? `<span class="msg-check">${m.read ? '<i class="fa-solid fa-check-double"></i>' : '<i class="fa-solid fa-check"></i>'}</span>`
      : '';

    div.innerHTML = `
      ${senderLine}
      ${m.text}
      <div class="msg-time">${m.time} ${checkIcon}</div>
    `;

    div.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      showCtxMenu(e.clientX, e.clientY, index, div);
    });

    return div;
  }

  // === ОТПРАВКА СООБЩЕНИЯ ===
  function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || !activeChatId) return;

    const c = contacts.find(x => x.id === activeChatId);
    const now = new Date();
    const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

    const msg = { text, out: true, time, read: false };
    c.messages.push(msg);
    c.lastMsg = text;
    c.lastTime = time;

    const area = document.getElementById('messagesArea');
    const el = createMsgEl(msg, c.messages.length - 1);
    area.appendChild(el);
    scrollToBottom();

    input.value = '';
    autoResize(input);
    toggleSendBtn();
    renderChatList(document.getElementById('searchInput').value);

    // Автоответ
    simulateReply(c);
  }

  function simulateReply(c) {
    const indicator = document.getElementById('typingIndicator');
    indicator.classList.add('show');
    scrollToBottom();

    // Обновить превью
    const prevEl = document.querySelector('.chat-item.active .chat-preview');
    if (prevEl) prevEl.innerHTML = '<span class="typing">печатает...</span>';

    const delay = 1500 + Math.random() * 2500;
    setTimeout(() => {
      indicator.classList.remove('show');
      if (activeChatId !== c.id) return;

      const reply = c.replies[Math.floor(Math.random() * c.replies.length)];
      const now = new Date();
      const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

      const msg = { text: reply, out: false, time };
      c.messages.push(msg);
      c.lastMsg = reply;
      c.lastTime = time;

      // Пометить предыдущие как прочитанные
      c.messages.forEach(m => { if (m.out) m.read = true; });

      const area = document.getElementById('messagesArea');
      const el = createMsgEl(msg, c.messages.length - 1);
      area.appendChild(el);
      scrollToBottom();
      renderChatList(document.getElementById('searchInput').value);
    }, delay);
  }

  // === КОНТЕКСТНОЕ МЕНЮ ===
  function showCtxMenu(x, y, index, el) {
    ctxTargetMsg = index;
    ctxTargetEl = el;
    const menu = document.getElementById('ctxMenu');
    menu.style.left = Math.min(x, window.innerWidth - 180) + 'px';
    menu.style.top = Math.min(y, window.innerHeight - 140) + 'px';
    menu.classList.add('show');
  }

  function copyMessage() {
    const c = contacts.find(x => x.id === activeChatId);
    if (!c || ctxTargetMsg == null) return;
    navigator.clipboard.writeText(c.messages[ctxTargetMsg].text).then(() => {
      showToast('Сообщение скопировано');
    });
    document.getElementById('ctxMenu').classList.remove('show');
  }

  function replyMessage() {
    const c = contacts.find(x => x.id === activeChatId);
    if (!c || ctxTargetMsg == null) return;
    const input = document.getElementById('msgInput');
    input.value = `> ${c.messages[ctxTargetMsg].text}\n`;
    input.focus();
    autoResize(input);
    toggleSendBtn();
    document.getElementById('ctxMenu').classList.remove('show');
  }

  function deleteMessage() {
    const c = contacts.find(x => x.id === activeChatId);
    if (!c || ctxTargetMsg == null) return;
    c.messages.splice(ctxTargetMsg, 1);
    if (c.messages.length > 0) {
      c.lastMsg = c.messages[c.messages.length - 1].text;
    } else {
      c.lastMsg = 'Нет сообщений';
    }
    renderMessages(c);
    renderChatList(document.getElementById('searchInput').value);
    document.getElementById('ctxMenu').classList.remove('show');
    showToast('Сообщение удалено');
  }

  // === ЭМОДЗИ ===
  function buildEmojiPicker() {
    const picker = document.getElementById('emojiPicker');
    picker.innerHTML = emojis.map(e =>
      `<button class="emoji-btn" onclick="insertEmoji('${e.trim()}')">${e.trim()}</button>`
    ).join('');
  }

  function toggleEmoji() {
    document.getElementById('emojiPicker').classList.toggle('show');
  }

  function insertEmoji(e) {
    const input = document.getElementById('msgInput');
    const start = input.selectionStart;
    const end = input.selectionEnd;
    input.value = input.value.substring(0, start) + e + input.value.substring(end);
    input.selectionStart = input.selectionEnd = start + e.length;
    input.focus();
    toggleSendBtn();
    document.getElementById('emojiPicker').classList.remove('show');
  }

  // === ПРОФИЛЬ ===
  function toggleProfile() {
    document.getElementById('profilePanel').classList.toggle('open');
  }
  function closeProfile() {
    document.getElementById('profilePanel').classList.remove('open');
  }

  // === УТИЛИТЫ ===
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function toggleSendBtn() {
    const btn = document.getElementById('sendBtn');
    const val = document.getElementById('msgInput').value.trim();
    btn.classList.toggle('disabled', !val);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function scrollToBottom() {
    const area = document.getElementById('messagesArea');
    requestAnimationFrame(() => {
      area.scrollTop = area.scrollHeight;
    });
  }

  function handleScroll() {
    const area = document.getElementById('messagesArea');
    const btn = document.getElementById('scrollBtn');
    const diff = area.scrollHeight - area.scrollTop - area.clientHeight;
    btn.classList.toggle('show', diff > 200);
  }

  function goBack() {
    document.getElementById('sidebar').classList.remove('hidden');
  }

  function showToast(text) {
    const container = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast';
    t.innerHTML = `<i class="fa-solid fa-circle-check"></i>${text}`;
    container.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // Запуск
  init();
</script>
</body>
</html>
