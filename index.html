<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK TITAN V122 | MEGA FIXED & EXPANDED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Rubik+Mono+One&family=Unbounded:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #121214; --text: #ffffff; --blue: #007aff; --gray: #1c1c1e; --bs-yellow: #f3ca52; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .glass { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 24px; }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px 16px 180px; scrollbar-width: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(10,10,10,0.9); backdrop-filter: blur(25px); display: flex; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #636366; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: 0.3s; } 
        .nav-btn.active { color: var(--blue); transform: translateY(-2px); }
        
        input, textarea, select { background: var(--gray); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; color: white; width: 100%; outline: none; font-size: 14px; }
        .btn-blue { background: var(--blue); color: white; border-radius: 18px; font-weight: 900; padding: 18px; width: 100%; border: none; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-style: italic; }
        
        /* Brawl Stars Style Maintenance */
        #maintenance_scr { background: linear-gradient(135deg, #2b5876 0%, #4e4376 100%); }
        .bs-card { background: rgba(0,0,0,0.6); border: 4px solid #000; border-radius: 20px; box-shadow: 0 10px 0 rgba(0,0,0,0.2); }
        .bs-btn { background: #ffcc00; color: #000; border: 4px solid #000; border-radius: 12px; font-family: 'Unbounded', sans-serif; box-shadow: 0 6px 0 #b38f00; transition: 0.1s; }
        .bs-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b38f00; }
        .bs-title { font-family: 'Unbounded', sans-serif; -webkit-text-stroke: 2px #000; text-shadow: 4px 4px 0 #000; color: #fff; }

        .badge-rainbow { background: linear-gradient(45deg, red, orange, yellow, green, blue, indigo, violet); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rainbow_anim 3s linear infinite; background-size: 200%; }
        @keyframes rainbow_anim { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body>
    <div id="loader" class="fixed inset-0 bg-black z-[10000] flex items-center justify-center">
        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <div id="maintenance_scr" class="hidden fixed inset-0 z-[20000] flex flex-col items-center justify-center p-6">
        <div class="bs-card w-full max-w-sm p-6 flex flex-col items-center text-center">
            <img id="m_img" class="w-full aspect-video object-cover rounded-lg mb-4 border-2 border-black hidden">
            <h1 id="m_title" class="bs-title text-2xl uppercase mb-4">Тех. перерыв</h1>
            <p id="m_desc" class="text-white font-bold text-sm mb-6 leading-tight"></p>
            <div id="m_links" class="flex flex-col gap-3 w-full"></div>
        </div>
    </div>

    <div id="auth_scr" class="hidden fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-8">
        <h1 class="text-5xl font-black mb-16 italic tracking-tighter">LYNEOK<span class="text-blue-500">.</span></h1>
        <div class="w-full glass p-8 space-y-4">
            <div id="reg_ext" class="hidden space-y-4">
                <input type="file" id="r_ava" class="hidden" accept="image/*" onchange="upImg(this, 'l_r_ava', true)">
                <label for="r_ava" id="l_r_ava" class="w-20 h-20 bg-zinc-900 mx-auto rounded-full flex items-center justify-center cursor-pointer border-2 border-dashed border-zinc-800"><i class="fa-solid fa-camera text-zinc-600"></i></label>
            </div>
            <input id="a_n" placeholder="Никнейм">
            <input id="a_p" type="password" placeholder="Пароль">
            <button onclick="handleAuth()" id="a_btn" class="btn-blue">Войти</button>
            <p onclick="toggleR()" id="a_tog" class="text-center text-[10px] font-black text-zinc-500 uppercase cursor-pointer pt-4">Создать аккаунт</p>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-6 py-4 flex justify-between items-center bg-black/50 backdrop-blur-xl border-b border-white/5">
            <b class="text-2xl font-black italic tracking-tighter">LYNEOK</b>
            <div onclick="switchT('profile')" class="flex items-center gap-3 bg-white/5 p-2 rounded-2xl border border-white/5">
                <div class="text-right"><p class="text-[8px] uppercase opacity-40">Баланс</p><span id="h_bal" class="font-black text-xs">0 ₽</span></div>
                <img id="h_ava" class="w-8 h-8 rounded-full object-cover">
            </div>
        </header>

        <main id="tab_market" class="tab-content active">
            <h2 class="text-3xl font-black italic mb-6">Маркет</h2>
            <div id="cat_grid" class="grid grid-cols-3 gap-3"></div>
            <div id="items_view" class="hidden mt-6 space-y-4">
                <button onclick="curG=null; render()" class="text-blue-500 text-[10px] font-black uppercase mb-4">← Назад</button>
                <div id="items_list" class="space-y-3"></div>
            </div>
        </main>

        <main id="tab_sell" class="tab-content">
            <h2 class="text-3xl font-black italic mb-6">Продать</h2>
            <div class="glass p-6 space-y-4">
                <input type="file" id="s_img" class="hidden" onchange="upImg(this, 'l_s_img', true)">
                <label for="s_img" id="l_s_img" class="w-full h-40 bg-zinc-900 rounded-3xl flex items-center justify-center border-2 border-dashed border-zinc-800 cursor-pointer"><i class="fa-solid fa-image text-2xl opacity-20"></i></label>
                <select id="s_game"></select>
                <input id="s_t" placeholder="Название">
                <textarea id="s_acc" placeholder="Описание"></textarea>
                <input id="s_p" type="number" placeholder="Цена ₽">
                <button onclick="postItem()" class="btn-blue">Выставить</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content">
            <h2 class="text-3xl font-black italic mb-6">Сделки</h2>
            <div id="deals_list" class="space-y-3"></div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="glass p-8 text-center mb-6">
                <img id="p_ava" class="w-24 h-24 mx-auto mb-4 rounded-full object-cover border-4 border-zinc-900">
                <h3 id="p_n" class="text-2xl font-black mb-1">...</h3>
                <div class="flex justify-center gap-4 mb-6">
                    <div><p class="text-[8px] opacity-40 uppercase">Рейтинг</p><b id="p_rating" class="text-yellow-500">0.0 ★</b></div>
                    <div><p class="text-[8px] opacity-40 uppercase">Отзывы</p><b id="p_rev_count">0</b></div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button class="bg-white text-black py-3 rounded-xl font-black text-[10px] uppercase">Пополнить</button>
                    <button class="bg-zinc-800 text-white py-3 rounded-xl font-black text-[10px] uppercase">Вывод</button>
                </div>
            </div>
            <button id="adm_btn" onclick="switchT('admin')" class="hidden w-full bg-red-600/10 text-red-500 py-4 rounded-2xl font-black uppercase text-[10px] border border-red-600/20 mb-4">Titan Panel</button>
            <button onclick="logout()" class="w-full text-zinc-600 text-[10px] font-black uppercase">Выйти</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <h2 class="text-3xl font-black italic mb-8">Admin <span class="text-red-500">Titan</span></h2>
            
            <section class="glass p-5 mb-6 border-yellow-500/20">
                <h3 class="text-[10px] font-black uppercase text-yellow-500 mb-4">Технический перерыв</h3>
                <div class="space-y-3">
                    <button onclick="toggleMaint()" id="maint_toggle_btn" class="w-full py-3 rounded-xl font-black text-[10px] uppercase bg-zinc-800">Включить/Выключить</button>
                    <input id="am_title" placeholder="Заголовок (например: ТЕХ. ПЕРЕРЫВ)">
                    <textarea id="am_desc" placeholder="Описание перерыва..."></textarea>
                    <input type="file" id="am_img_file" class="hidden" onchange="upImg(this, 'l_am_img', false, 'am_img_data')">
                    <label for="am_img_file" id="l_am_img" class="block bg-zinc-800 p-3 rounded-xl text-center text-[10px] font-black cursor-pointer">ЗАГРУЗИТЬ ФОТО</label>
                    <input type="hidden" id="am_img_data">
                    <input id="am_link_text" placeholder="Текст кнопки (необяз.)">
                    <input id="am_link_url" placeholder="Ссылка (необяз.)">
                    <button onclick="saveMaintSettings()" class="btn-blue !py-3 !text-[10px]">Применить настройки</button>
                </div>
            </section>

            <section class="glass p-5 mb-6">
                <h3 class="text-[10px] font-black uppercase text-blue-500 mb-4">Добавить игру</h3>
                <div class="space-y-3">
                    <input id="ag_name" placeholder="Название игры">
                    <input type="file" id="ag_img_file" class="hidden" onchange="upImg(this, 'l_ag_img', false, 'ag_img_data')">
                    <label for="ag_img_file" id="l_ag_img" class="block bg-zinc-800 p-3 rounded-xl text-center text-[10px] font-black cursor-pointer">ФОТО ИГРЫ</label>
                    <input type="hidden" id="ag_img_data">
                    <button onclick="admAddGame()" class="btn-blue !py-3 !text-[10px]">Добавить</button>
                </div>
            </section>

            <section class="glass p-5 mb-6">
                <h3 class="text-[10px] font-black uppercase text-green-500 mb-4">Модерация товаров</h3>
                <div id="am_mod_list" class="space-y-3"></div>
            </section>

            <section class="glass p-5">
                <h3 class="text-[10px] font-black uppercase text-red-500 mb-4">Пользователи</h3>
                <div id="am_users" class="space-y-3"></div>
            </section>
        </main>

        <nav class="nav-bar">
            <div onclick="switchT('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-store text-xl"></i><span>Маркет</span></div>
            <div onclick="switchT('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-plus-circle text-xl"></i><span>Продать</span></div>
            <div onclick="switchT('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-receipt text-xl"></i><span>Сделки</span></div>
            <div onclick="switchT('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user text-xl"></i><span>Профиль</span></div>
        </nav>
    </div>

    <script>
        firebase.initializeApp({ apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" });
        const db = firebase.database().ref('lyne_v122_titan');
        const Tst = Swal.mixin({ toast: true, position: 'top', timer: 2000, showConfirmButton: false, background: '#1c1c1e', color: '#fff' });

        let me = null, data = {}, isR = false, tmpImg = "", curG = null;

        function init() {
            db.on('value', snap => {
                data = snap.val() || { u:{}, i:{}, d:{}, games:{}, settings:{com:5, maint:{active:false}} };
                const sid = localStorage.getItem('lyne_v122_sid');
                document.getElementById('loader').style.display = 'none';

                // ПРОВЕРКА ТЕХ ПЕРЕРЫВА
                const m = data.settings.maint || {active:false};
                if(m.active && (!me || !me.isAdmin)) {
                    document.getElementById('maintenance_scr').classList.remove('hidden');
                    document.getElementById('m_title').innerText = m.title || "ТЕХ. ПЕРЕРЫВ";
                    document.getElementById('m_desc').innerText = m.desc || "Мы скоро вернемся!";
                    if(m.img) { document.getElementById('m_img').src = m.img; document.getElementById('m_img').classList.remove('hidden'); }
                    if(m.btnText && m.btnUrl) {
                        document.getElementById('m_links').innerHTML = `<a href="${m.btnUrl}" class="bs-btn w-full py-3 text-center block text-xs uppercase font-black">${m.btnText}</a>`;
                    }
                } else {
                    document.getElementById('maintenance_scr').classList.add('hidden');
                }

                if (sid && data.u && data.u[sid]) {
                    me = data.u[sid];
                    document.getElementById('auth_scr').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    if(me.isAdmin) document.getElementById('adm_btn').classList.remove('hidden');
                    render();
                } else {
                    document.getElementById('auth_scr').classList.remove('hidden');
                }
            });
        }

        function render() {
            if(!me) return;
            document.getElementById('h_bal').innerText = (me.bal || 0) + ' ₽';
            document.getElementById('h_ava').src = me.ava;
            document.getElementById('p_ava').src = me.ava;
            document.getElementById('p_n').innerText = me.n;

            // --- ОБНОВЛЕННАЯ ЛОГИКА РЕЙТИНГА: 0 ЗВЕЗД ПО УМОЛЧАНИЮ ---
            const myDealsWithRating = Object.values(data.d || {}).filter(d => d.sid === me.id && d.rating && d.rating > 0);
            if(myDealsWithRating.length > 0) {
                const avg = (myDealsWithRating.reduce((a,b)=>a+b.rating, 0) / myDealsWithRating.length).toFixed(1);
                document.getElementById('p_rating').innerText = avg + " ★";
                document.getElementById('p_rev_count').innerText = myDealsWithRating.length;
            } else {
                document.getElementById('p_rating').innerText = "0.0 ★";
                document.getElementById('p_rev_count').innerText = "0";
            }

            if(!curG) {
                document.getElementById('cat_grid').classList.remove('hidden');
                document.getElementById('items_view').classList.add('hidden');
                document.getElementById('cat_grid').innerHTML = Object.values(data.games || {}).map(g => `
                    <div class="glass p-3 text-center" onclick="openGame('${g.id}')">
                        <img src="${g.img}" class="w-12 h-12 mx-auto mb-2 rounded-xl object-cover">
                        <b class="text-[8px] uppercase block truncate">${g.name}</b>
                    </div>`).join('');
            }

            const deals = Object.values(data.d || {}).filter(d => d.bid === me.id || d.sid === me.id).reverse();
            document.getElementById('deals_list').innerHTML = deals.map(d => {
                let action = '';
                if(d.status === 'Завершено' && d.bid === me.id && !d.rating) {
                    action = `<button onclick="rateDeal('${d.id}')" class="bg-yellow-500 text-black px-3 py-1 rounded-lg text-[9px] font-black uppercase">Оценить</button>`;
                }
                return `<div class="glass p-4 flex justify-between items-center"><div class="text-[10px] uppercase font-black">${d.t}<br><span class="opacity-40">${d.status}</span></div>${action}</div>`;
            }).join('');

            document.getElementById('s_game').innerHTML = Object.values(data.games || {}).map(g => `<option value="${g.id}">${g.name}</option>`).join('');
            
            if(me.isAdmin) renderAdmin();
        }

        function renderAdmin() {
            const m = data.settings.maint || {active:false};
            document.getElementById('maint_toggle_btn').innerText = m.active ? 'ВЫКЛЮЧИТЬ ПЕРЕРЫВ' : 'ВКЛЮЧИТЬ ПЕРЕРЫВ';
            document.getElementById('maint_toggle_btn').style.background = m.active ? '#ef4444' : '#1c1c1e';

            const pending = Object.values(data.i || {}).filter(i => i.status === 'pending');
            document.getElementById('am_mod_list').innerHTML = pending.map(i => `
                <div class="glass p-4 text-[10px]">
                    <b>${i.t}</b> (${i.p}₽)
                    <div class="flex gap-2 mt-2">
                        <button onclick="admMod('${i.id}', 'approved')" class="flex-1 bg-green-600 py-2 rounded-lg">OK</button>
                        <button onclick="admMod('${i.id}', 'rejected')" class="flex-1 bg-red-600 py-2 rounded-lg">X</button>
                    </div>
                </div>
            `).join('') || '<p class="text-[8px] opacity-30 text-center">Нет товаров на проверке</p>';

            document.getElementById('am_users').innerHTML = Object.values(data.u || {}).map(u => `
                <div class="glass p-3 flex justify-between items-center text-[10px]">
                    <span>${u.n} (${u.bal}₽)</span>
                    <button onclick="admAddBal('${u.id}')" class="text-blue-500">+</button>
                </div>
            `).join('');
        }

        // ФУНКЦИИ АДМИНА
        function saveMaintSettings() {
            const title = document.getElementById('am_title').value;
            const desc = document.getElementById('am_desc').value;
            const img = document.getElementById('am_img_data').value;
            const btnText = document.getElementById('am_link_text').value;
            const btnUrl = document.getElementById('am_link_url').value;
            
            db.child('settings/maint').update({ title, desc, img, btnText, btnUrl });
            Tst.fire({icon:'success', title:'Настройки сохранены'});
        }

        function toggleMaint() {
            const cur = data.settings.maint?.active || false;
            db.child('settings/maint/active').set(!cur);
        }

        function admAddGame() {
            const n = document.getElementById('ag_name').value;
            const img = document.getElementById('ag_img_data').value;
            if(!n || !img) return;
            const id = 'g'+Date.now();
            db.child(`games/${id}`).set({id, name:n, img});
            Tst.fire({icon:'success', title:'Игра добавлена'});
        }

        function admMod(id, status) {
            if(status === 'rejected') db.child(`i/${id}`).remove();
            else db.child(`i/${id}/status`).set('approved');
        }

        async function admAddBal(uid) {
            const { value: amt } = await Swal.fire({ title: 'Сумма', input: 'number' });
            if(amt) db.child(`u/${uid}/bal`).set(Number(data.u[uid].bal || 0) + Number(amt));
        }

        // ФУНКЦИИ МАРКЕТА
        function openGame(gid) {
            curG = gid;
            document.getElementById('cat_grid').classList.add('hidden');
            document.getElementById('items_view').classList.remove('hidden');
            const its = Object.values(data.i || {}).filter(x => x.game === gid && x.status === 'approved' && !x.sold);
            document.getElementById('items_list').innerHTML = its.map(i => `
                <div onclick="buyItem('${i.id}')" class="glass p-4 flex justify-between items-center">
                    <div><b class="text-xs uppercase">${i.t}</b><br><span class="text-[9px] opacity-40">${data.u[i.sid]?.n}</span></div>
                    <b class="text-blue-500">${i.p} ₽</b>
                </div>
            `).join('') || '<p class="text-center opacity-30 py-10">Пусто</p>';
        }

        function postItem() {
            const t = document.getElementById('s_t').value;
            const p = Number(document.getElementById('s_p').value);
            if(!t || !p || !tmpImg) return Tst.fire({icon:'warning', title:'Заполни всё'});
            const id = 'i'+Date.now();
            db.child(`i/${id}`).set({
                id, t, p, sid: me.id, img: tmpImg, 
                desc: document.getElementById('s_acc').value,
                game: document.getElementById('s_game').value,
                sold: false, status: 'pending'
            });
            Tst.fire({icon:'success', title:'На модерации'});
            switchT('market');
        }

        function buyItem(id) {
            const i = data.i[id];
            if(me.bal < i.p) return Tst.fire({icon:'error', title:'Нет денег'});
            Swal.fire({
                title: 'Купить?',
                text: i.t + " за " + i.p + "₽",
                showCancelButton: true,
                background: '#121214', color: '#fff'
            }).then(res => {
                if(res.isConfirmed) {
                    db.child(`u/${me.id}/bal`).set(me.bal - i.p);
                    db.child(`i/${id}/sold`).set(true);
                    db.child(`d/d${Date.now()}`).set({ id:'d'+Date.now(), sid:i.sid, bid:me.id, t:i.t, p:i.p, status:'Завершено', time:Date.now() });
                    Tst.fire({icon:'success', title:'Куплено!'});
                }
            });
        }

        async function rateDeal(did) {
            const { value: stars } = await Swal.fire({
                title: 'Оценка (1-5)',
                input: 'range',
                inputAttributes: { min: 1, max: 5, step: 1 },
                inputValue: 5
            });
            if(stars) {
                db.child(`d/${did}/rating`).set(Number(stars));
                Tst.fire({icon:'success', title:'Оценено'});
            }
        }

        // ВСПОМОГАТЕЛЬНЫЕ
        function upImg(i, tid, set, hid) {
            const r = new FileReader();
            r.onload = e => {
                const res = e.target.result;
                if(set) document.getElementById(tid).innerHTML = `<img src="${res}" class="w-full h-full object-cover rounded-[inherit]">`;
                if(hid) document.getElementById(hid).value = res;
                tmpImg = res;
            };
            if(i.files[0]) r.readAsDataURL(i.files[0]);
        }

        function handleAuth() {
            const n=document.getElementById('a_n').value.trim(), p=document.getElementById('a_p').value;
            if(!n || !p) return;
            if(isR) {
                const id = 'u'+Date.now();
                db.child(`u/${id}`).set({id, n, p, ava:tmpImg||'https://ui-avatars.com/api/?name='+n, bal:0});
                localStorage.setItem('lyne_v122_sid', id);
            } else {
                const u = Object.values(data.u||{}).find(x=>x.n.toLowerCase()===n.toLowerCase() && x.p===p);
                if(u) localStorage.setItem('lyne_v122_sid', u.id);
                else Tst.fire({icon:'error', title:'Ошибка'});
            }
        }

        function switchT(t) {
            document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
            document.getElementById('tab_'+t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
            document.getElementById('n_'+t).classList.add('active');
        }
        function toggleR() { isR=!isR; document.getElementById('reg_ext').classList.toggle('hidden'); document.getElementById('a_btn').innerText=isR?'Создать':'Войти'; }
        function logout() { localStorage.clear(); location.reload(); }

        init();
    </script>
</body>
</html>
