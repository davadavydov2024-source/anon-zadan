<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK MARKET V85</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --bg: #0b0b0c; --card: #18181b; --text: #ffffff; --blue: #3b82f6; --gray: #27272a; --accent: #f59e0b; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px 16px 140px; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: rgba(24, 24, 27, 0.95); backdrop-filter: blur(10px); display: flex; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-btn { flex: 1; color: #71717a; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 600; transition: 0.2s; }
        .nav-btn.active { color: var(--blue); }

        input, textarea, select { background: var(--gray); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: white; width: 100%; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }

        .btn-blue { background: var(--blue); color: white; border-radius: 14px; font-weight: 700; padding: 14px; width: 100%; transition: 0.2s; border: none; }
        .btn-blue:active { transform: scale(0.97); }

        /* Специальные значки */
        .b-rainbow { background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000); background-size: 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rb 10s linear infinite; }
        @keyframes rb { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        ::-webkit-scrollbar { width: 0; }
        #loader { background: #000; z-index: 10000; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loader"><div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>

    <div id="auth_screen" class="hidden fixed inset-0 z-[9999] bg-[#000] flex flex-col items-center justify-center p-8">
        <div class="w-full max-w-sm text-center">
            <h1 class="text-4xl font-black mb-2 italic">LYNEOK<span class="text-blue-500"> MARKET</span></h1>
            <p class="text-gray-500 text-sm mb-10 font-medium">Твой путь к топовым аккаунтам</p>
            
            <div class="glass p-6 space-y-4">
                <div id="reg_fields" class="hidden space-y-4">
                    <input type="file" id="r_ava_f" class="hidden" accept="image/*" onchange="hImg(this, 'l_r_ava')">
                    <label for="r_ava_f" id="l_r_ava" class="w-20 h-20 bg-zinc-800 mx-auto rounded-full flex items-center justify-center cursor-pointer border-2 border-dashed border-zinc-600 overflow-hidden">
                        <i class="fa-solid fa-camera text-zinc-500"></i>
                    </label>
                    <input id="r_tg" placeholder="Telegram (@username)">
                </div>
                <input id="a_n" placeholder="Никнейм">
                <input id="a_p" type="password" placeholder="Пароль">
                <button onclick="auth()" id="a_btn_main" class="btn-blue">Войти</button>
                <p onclick="togA()" id="a_tog" class="text-xs text-blue-500 font-bold cursor-pointer uppercase tracking-widest pt-2">Нет аккаунта? Регистрация</p>
            </div>
        </div>
    </div>

    <div id="app" class="hidden flex flex-col h-screen">
        <header class="px-5 py-4 flex justify-between items-center bg-[#0b0b0c] sticky top-0 z-50">
            <b class="text-xl italic tracking-tighter">LYNEOK<span class="text-blue-500">.</span></b>
            <div onclick="switchT('profile')" class="flex items-center gap-2 bg-zinc-800/50 px-3 py-1.5 rounded-full border border-white/5 cursor-pointer">
                <span id="h_bal" class="font-bold text-xs">0 ₽</span>
                <img id="h_ava" class="w-6 h-6 rounded-full object-cover bg-zinc-700">
            </div>
        </header>

        <main id="tab_market" class="tab-content active">
            <div class="mb-6">
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-zinc-500"></i>
                    <input oninput="search(this.value)" class="pl-12 !bg-zinc-900/50 !rounded-2xl" placeholder="Поиск товаров в LYNEOK...">
                </div>
            </div>

            <div id="cat_grid" class="grid grid-cols-2 gap-3 mb-8"></div>
            
            <div id="items_view" class="hidden">
                <div class="flex items-center gap-2 mb-4" onclick="closeCat()">
                    <i class="fa-solid fa-arrow-left text-blue-500"></i>
                    <b id="cat_title" class="text-lg">Игра</b>
                </div>
                <div id="market_list" class="space-y-3"></div>
            </div>
        </main>

        <main id="tab_sell" class="tab-content">
            <h2 class="text-2xl font-black mb-6">Создать объявление</h2>
            <div class="glass p-5 space-y-4">
                <input type="file" id="s_img_f" class="hidden" onchange="hImg(this, 'l_s_img')">
                <label for="s_img_f" id="l_s_img" class="w-full h-44 bg-zinc-900 rounded-2xl flex flex-col items-center justify-center border-2 border-dashed border-zinc-700 overflow-hidden">
                    <i class="fa-solid fa-image text-3xl text-zinc-600 mb-2"></i>
                    <span class="text-[10px] font-bold text-zinc-500 uppercase">Фото товара</span>
                </label>
                
                <select id="s_cat" class="!bg-zinc-800"></select>
                
                <div class="space-y-2">
                    <p class="text-[10px] font-bold text-zinc-500 uppercase pl-1">Способ получения</p>
                    <select id="s_method">
                        <option value="Трейд">Трейд (передача в игре)</option>
                        <option value="Внутриигровая почта">Внутриигровая почта</option>
                        <option value="Подарок">Подарок (Gift)</option>
                        <option value="Промокод">Промокод</option>
                    </select>
                </div>

                <input id="s_t" placeholder="Краткое название">
                <textarea id="s_d" placeholder="Описание (характеристики, время доставки)" rows="3"></textarea>
                <textarea id="s_acc" placeholder="Данные аккаунта (будут переданы после оплаты)" rows="2"></textarea>
                
                <div>
                    <input id="s_p" type="number" placeholder="Цена (от 50 ₽)" oninput="calcP()">
                    <p id="s_info" class="text-[10px] text-zinc-500 mt-2 font-bold italic px-1">К зачислению: 0 ₽</p>
                </div>

                <button onclick="createLoot()" class="btn-blue">Выставить на продажу</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content">
            <h2 class="text-2xl font-black mb-6 italic">Сделки</h2>
            <div id="deals_list" class="space-y-4"></div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="glass p-6 mb-4">
                <div class="flex items-center gap-4 mb-6">
                    <img id="p_ava" class="w-16 h-16 rounded-full object-cover ring-2 ring-blue-500/20">
                    <div>
                        <div class="flex items-center gap-1">
                            <b id="p_n" class="text-xl">...</b>
                            <span id="p_badge"></span>
                        </div>
                        <p id="p_tg" class="text-xs text-zinc-500"></p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6 border-y border-white/5 py-4">
                    <div class="text-center">
                        <b id="p_stars" class="block text-xl">5.0</b>
                        <span class="text-[9px] uppercase font-black text-zinc-500">Рейтинг</span>
                    </div>
                    <div class="text-center border-l border-white/5">
                        <b id="p_sales" class="block text-xl">0</b>
                        <span class="text-[9px] uppercase font-black text-zinc-500">Сделки</span>
                    </div>
                </div>

                <div class="space-y-3">
                    <button onclick="reqPay()" class="btn-blue shadow-lg shadow-blue-500/20">Пополнить баланс</button>
                    <button onclick="reqOut()" class="w-full py-4 text-xs font-bold uppercase tracking-widest text-zinc-400">Вывод средств</button>
                </div>
            </div>

            <button id="admin_btn" onclick="switchT('admin')" class="hidden w-full bg-red-600/10 text-red-500 border border-red-600/20 py-4 rounded-2xl font-bold mb-4">
                <i class="fa-solid fa-hammer mr-2"></i> АДМИН-ПАНЕЛЬ
            </button>

            <button onclick="logout()" class="w-full py-4 text-red-500 text-[10px] font-black uppercase opacity-40">Выйти из системы</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <h1 class="text-3xl font-black text-white italic mb-8">CONTROL <span class="text-red-500">CENTER</span></h1>
            
            <div class="space-y-8">
                <section>
                    <h3 class="text-xs font-black uppercase text-zinc-500 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-wallet text-blue-500"></i> Заявки на пополнение
                    </h3>
                    <div id="ad_pay" class="space-y-2"></div>
                </section>

                <section class="glass p-5">
                    <h3 class="text-xs font-black uppercase text-zinc-500 mb-4">Создать категорию/игру</h3>
                    <div class="space-y-3">
                        <input type="file" id="g_img_f" class="hidden" onchange="hImg(this, 'l_g_img')">
                        <label for="g_img_f" id="l_g_img" class="w-full h-20 bg-zinc-800 rounded-xl flex items-center justify-center border border-dashed border-zinc-600 overflow-hidden">
                             <span class="text-xs text-zinc-500">Выбрать фото</span>
                        </label>
                        <input id="g_name" placeholder="Название (например, Blox Fruits)">
                        <button onclick="addGame()" class="btn-blue !bg-white !text-black py-2 text-xs">Добавить в маркет</button>
                    </div>
                </section>

                <section>
                    <h3 class="text-xs font-black uppercase text-zinc-500 mb-4">Пользователи</h3>
                    <div id="ad_users" class="space-y-3"></div>
                </section>
            </div>
        </main>

        <nav class="nav-bar">
            <div onclick="switchT('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-shop text-xl"></i><span>Маркет</span></div>
            <div onclick="switchT('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-plus-circle text-xl"></i><span>Продать</span></div>
            <div onclick="switchT('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-comments text-xl"></i><span>Сделки</span></div>
            <div onclick="switchT('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user-ninja text-xl"></i><span>Профиль</span></div>
        </nav>
    </div>

    <script>
        const CONFIG = {
            fb: { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" },
            bot: "8641257792:AAEsxnQWEIeozMt_gnSwJdVgSFQlOc-hnuc",
            chat: "7040863301"
        };

        firebase.initializeApp(CONFIG.fb);
        const db = firebase.database().ref('lyne_v85_core');

        let me = null, data = {}, isR = false, tempImg = "", curSearch = "";

        const Tst = Swal.mixin({ toast: true, position: 'top', timer: 2500, showConfirmButton: false, background: '#1c1c1e', color: '#fff' });

        function bot(m) { fetch(`https://api.telegram.org/bot${CONFIG.bot}/sendMessage?chat_id=${CONFIG.chat}&text=${encodeURIComponent('⚡️: ' + m)}`); }

        // --- AUTH & CORE ---
        function init() {
            db.on('value', snap => {
                data = snap.val() || { u:{}, i:{}, d:{}, cats:{}, requests:{}, settings:{comm:10} };
                
                const sid = localStorage.getItem('lyne_v85_sid');
                if (sid && data.u[sid]) {
                    me = data.u[sid];
                    if (me.ban && me.banUntil > Date.now()) {
                        alert(`ВЫ ЗАБАНЕНЫ! До: ${new Date(me.banUntil).toLocaleString()}\nПричина: ${me.banReason}`);
                        logout(); return;
                    }
                    document.getElementById('auth_screen').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    if (me.n.toLowerCase() === 'owwner') document.getElementById('admin_btn').classList.remove('hidden');
                    render();
                } else {
                    document.getElementById('auth_screen').classList.remove('hidden');
                    document.getElementById('app').classList.add('hidden');
                }
                document.getElementById('loader').style.display = 'none';
            });
        }

        function togA() { isR = !isR; document.getElementById('reg_fields').classList.toggle('hidden', !isR); document.getElementById('a_btn_main').innerText = isR ? 'Создать аккаунт' : 'Войти'; document.getElementById('a_tog').innerText = isR ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Регистрация'; }

        function auth() {
            const n = document.getElementById('a_n').value.trim(), p = document.getElementById('a_p').value.trim();
            if (!n || !p) return Tst.fire({ icon:'error', title:'Заполни всё!' });

            if (isR) {
                const tg = document.getElementById('r_tg').value.trim();
                if (!tg.includes('@') || !tempImg) return Tst.fire({ icon:'warning', title:'Нужно фото и верный ТГ' });
                const sid = 'u' + Date.now();
                db.child(`u/${sid}`).set({ id:sid, n, p, tg, ava:tempImg, bal:0, sales:0, stars:5, revs:0 });
                localStorage.setItem('lyne_v85_sid', sid);
                bot(`НОВЫЙ ЮЗЕР: ${n} (${tg})`);
            } else {
                const found = Object.values(data.u).find(x => x.n === n && x.p === p);
                if (found) { localStorage.setItem('lyne_v85_sid', found.id); }
                else Tst.fire({ icon:'error', title:'Неверные данные' });
            }
        }

        // --- RENDER ---
        function render() {
            if(!me) return;
            // Header & Profile
            document.getElementById('h_bal').innerText = me.bal + ' ₽';
            document.getElementById('h_ava').src = me.ava;
            document.getElementById('p_ava').src = me.ava;
            document.getElementById('p_n').innerText = me.n;
            document.getElementById('p_tg').innerText = me.tg;
            document.getElementById('p_stars').innerText = (me.stars || 5).toFixed(1);
            document.getElementById('p_sales').innerText = me.sales || 0;
            document.getElementById('p_badge').innerHTML = getBadge(me);

            // Market Cats
            const cats = Object.values(data.cats || {});
            document.getElementById('cat_grid').innerHTML = cats.map(c => `
                <div class="glass p-4 text-center cursor-pointer" onclick="openCat('${c.name}')">
                    <img src="${c.img}" class="w-12 h-12 mx-auto mb-2 rounded-xl object-cover bg-zinc-800">
                    <p class="text-[10px] font-black uppercase tracking-widest">${c.name}</p>
                </div>`).join('');
            
            document.getElementById('s_cat').innerHTML = '<option disabled selected>ВЫБЕРИТЕ ИГРУ</option>' + cats.map(c => `<option value="${c.name}">${c.name}</option>`).join('');

            renderDeals();
            if(me.n.toLowerCase() === 'owwner') renderAdmin();
        }

        function getBadge(u) {
            if (u.n.toLowerCase() === 'owwner') return '<i class="fa-solid fa-crown text-red-500"></i>';
            if (u.badge === 'rainbow') return '<i class="fa-solid fa-certificate b-rainbow"></i>';
            if (u.badge === 'blue') return '<i class="fa-solid fa-certificate text-blue-400"></i>';
            if (u.badge === 'gold') return '<i class="fa-solid fa-certificate text-yellow-500"></i>';
            return '';
        }

        // --- MARKET LOGIC ---
        function search(val) {
            curSearch = val.toLowerCase();
            const its = Object.values(data.i || {}).filter(x => x.title.toLowerCase().includes(curSearch) && x.status === 'active');
            if (curSearch.length > 0) {
                document.getElementById('cat_grid').classList.add('hidden');
                document.getElementById('items_view').classList.remove('hidden');
                document.getElementById('cat_title').innerText = "Результаты поиска";
                renderItems(its);
            } else {
                closeCat();
            }
        }

        function openCat(name) {
            document.getElementById('cat_grid').classList.add('hidden');
            document.getElementById('items_view').classList.remove('hidden');
            document.getElementById('cat_title').innerText = name;
            const its = Object.values(data.i || {}).filter(x => x.cat === name && x.status === 'active');
            renderItems(its);
        }

        function renderItems(list) {
            document.getElementById('market_list').innerHTML = list.map(i => `
                <div class="glass p-3 flex gap-4">
                    <img src="${i.img}" class="w-20 h-20 rounded-xl object-cover bg-zinc-800">
                    <div class="flex-1 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start">
                                <b class="text-xs line-clamp-1">${i.title}</b>
                                <b class="text-blue-400 text-sm whitespace-nowrap ml-2">${i.price} ₽</b>
                            </div>
                            <div class="flex items-center gap-1 mt-1">
                                <span class="text-[8px] px-1.5 py-0.5 bg-zinc-800 rounded text-zinc-400 uppercase">${i.method}</span>
                            </div>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-[9px] text-zinc-500 italic">Продавец: ${i.seller}</span>
                            <button onclick="buyItem('${i.id}')" class="bg-blue-600 text-[10px] font-black px-4 py-1.5 rounded-lg">КУПИТЬ</button>
                        </div>
                    </div>
                </div>`).join('') || '<p class="text-center py-10 text-zinc-600">Товаров пока нет</p>';
        }

        function closeCat() {
            document.getElementById('cat_grid').classList.remove('hidden');
            document.getElementById('items_view').classList.add('hidden');
        }

        // --- MONEY & DEALS ---
        function reqPay() {
            Swal.fire({ title: 'Пополнение', text:'Введите сумму (от 50₽)', input:'number', background:'#18181b', color:'#fff', confirmButtonColor: '#3b82f6' }).then(r => {
                if (r.value >= 50) {
                    const rid = 'req' + Date.now();
                    db.child(`requests/${rid}`).set({ id:rid, uid:me.id, name:me.n, sum:Number(r.value), type:'pay', status:'pending' });
                    Tst.fire({ icon:'info', title:'Заявка создана! Жди подтверждения админом.' });
                    bot(`💰 ЗАЯВКА НА ПОПОЛНЕНИЕ: ${me.n} (${r.value}₽)`);
                }
            });
        }

        function buyItem(iid) {
            const i = data.i[iid];
            if (me.bal < i.price) return Tst.fire({ icon:'error', title:'Недостаточно средств' });
            
            const did = 'd' + Date.now();
            const com = data.settings.comm || 10;
            const pure = Math.floor(i.price * (1 - com/100));

            db.child(`u/${me.id}/bal`).transaction(b => b - i.price);
            db.child(`u/${i.sid}/bal`).transaction(b => (b||0) + pure);
            db.child(`u/${i.sid}/sales`).transaction(s => (s||0) + 1);
            db.child(`d/${did}`).set({ id:did, bid:me.id, bn:me.n, sid:i.sid, sn:i.seller, t:i.title, p:i.price, acc:i.acc_data, img:i.img });
            db.child(`i/${iid}`).remove();
            
            Tst.fire({ icon:'success', title:'Успешная покупка!' });
            bot(`🤝 СДЕЛКА: ${me.n} купил у ${i.seller} за ${i.price}₽`);
            switchT('chats');
        }

        function renderDeals() {
            const list = Object.values(data.d || {}).filter(d => d.bid === me.id || d.sid === me.id);
            document.getElementById('deals_list').innerHTML = list.reverse().map(d => `
                <div class="glass p-4 border-l-4 ${d.bid === me.id ? 'border-blue-500' : 'border-green-500'}">
                    <div class="flex gap-3 mb-3">
                        <img src="${d.img}" class="w-10 h-10 rounded-lg object-cover">
                        <div>
                            <b class="text-xs block">${d.t}</b>
                            <span class="text-[10px] text-zinc-500">${d.bid === me.id ? 'Продавец: '+d.sn : 'Покупатель: '+d.bn}</span>
                        </div>
                    </div>
                    ${d.bid === me.id ? `<div class="bg-zinc-900 p-2 rounded text-[10px] font-mono break-all mb-2 text-blue-400">ДАННЫЕ: ${d.acc}</div>` : ''}
                    <button class="w-full bg-zinc-800 py-2 rounded-lg text-[10px] font-bold uppercase">Написать в чат</button>
                </div>`).join('') || '<p class="text-center py-10 text-zinc-600">Сделок нет</p>';
        }

        // --- ADMIN FUNCTIONS ---
        function renderAdmin() {
            const reqs = Object.values(data.requests || {}).filter(r => r.status === 'pending');
            document.getElementById('ad_pay').innerHTML = reqs.map(r => `
                <div class="glass p-3 flex justify-between items-center border-l-4 border-amber-500">
                    <div class="text-[10px]"><b>${r.name}</b> хочет ${r.sum} ₽</div>
                    <div class="flex gap-2">
                        <button onclick="approvePay('${r.id}')" class="bg-green-600 px-3 py-1 rounded text-[10px] font-bold">ДА</button>
                        <button onclick="db.child('requests/${r.id}').remove()" class="bg-red-600 px-3 py-1 rounded text-[10px] font-bold">НЕТ</button>
                    </div>
                </div>`).join('') || '<p class="text-[10px] text-zinc-600">Заявок нет</p>';

            const us = Object.values(data.u);
            document.getElementById('ad_users').innerHTML = us.map(u => `
                <div class="glass p-3 flex justify-between items-center">
                    <span class="text-xs">${u.n} (${u.bal}₽)</span>
                    <div class="flex gap-1">
                        <button onclick="admEditBal('${u.id}')" class="bg-blue-600/20 text-blue-400 p-2 rounded text-[10px]"><i class="fa-solid fa-wallet"></i></button>
                        <button onclick="admBadge('${u.id}')" class="bg-amber-600/20 text-amber-400 p-2 rounded text-[10px]"><i class="fa-solid fa-certificate"></i></button>
                        <button onclick="admBan('${u.id}')" class="bg-red-600/20 text-red-400 p-2 rounded text-[10px]"><i class="fa-solid fa-ban"></i></button>
                    </div>
                </div>`).join('');
        }

        function approvePay(rid) {
            const r = data.requests[rid];
            db.child(`u/${r.uid}/bal`).transaction(b => (b||0) + r.sum);
            db.child(`requests/${rid}/status`).set('done');
            bot(`✅ АДМИН ПОДТВЕРДИЛ: ${r.name} (+${r.sum}₽)`);
        }

        function addGame() {
            const n = document.getElementById('g_name').value.trim();
            if (!n || !tempImg) return Tst.fire({ icon:'error', title:'Название и фото!' });
            const cid = 'c' + Date.now();
            db.child(`cats/${cid}`).set({ id:cid, name:n, img:tempImg });
            Tst.fire({ icon:'success', title:'Игра добавлена' });
            document.getElementById('g_name').value = "";
        }

        function admEditBal(uid) {
            Swal.fire({ title:'Новый баланс', input:'number', background:'#18181b', color:'#fff' }).then(r => {
                if(r.value) db.child(`u/${uid}/bal`).set(Number(r.value));
            });
        }

        function admBan(uid) {
            Swal.fire({
                title: 'Бан юзера',
                background:'#18181b', color:'#fff',
                html: `<input id="b_min" type="number" placeholder="Минуты" class="swal2-input">
                       <input id="b_res" placeholder="Причина" class="swal2-input">`,
                preConfirm: () => {
                    return { m: document.getElementById('b_min').value, r: document.getElementById('b_res').value }
                }
            }).then(res => {
                if (res.value) {
                    const until = Date.now() + (res.value.m * 60000);
                    db.child(`u/${uid}`).update({ ban: true, banUntil: until, banReason: res.value.r });
                    bot(`🔨 ЗАБАНЕН: ${data.u[uid].n} на ${res.value.m} мин.`);
                }
            });
        }

        function admBadge(uid) {
            Swal.fire({
                title: 'Выдать галочку',
                background:'#18181b', color:'#fff',
                input: 'select',
                inputOptions: { 'none': 'Нет', 'blue': 'Синяя', 'gold': 'Золотая', 'rainbow': 'Радужная' }
            }).then(r => {
                db.child(`u/${uid}/badge`).set(r.value);
            });
        }

        // --- HELPERS ---
        function hImg(input, lid) {
            const f = input.files[0]; if(!f) return;
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const c = document.createElement('canvas'); const x = c.getContext('2d');
                    c.width = 400; c.height = 400; x.drawImage(img,0,0,400,400);
                    tempImg = c.toDataURL('image/jpeg', 0.7);
                    document.getElementById(lid).innerHTML = `<img src="${tempImg}" class="w-full h-full object-cover">`;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(f);
        }

        function createLoot() {
            const t = document.getElementById('s_t').value, p = Number(document.getElementById('s_p').value);
            const c = document.getElementById('s_cat').value, acc = document.getElementById('s_acc').value;
            const m = document.getElementById('s_method').value;

            if (p < 50 || !tempImg || !t || !acc || !c) return Tst.fire({ icon:'warning', title:'Минимум 50₽ и все поля!' });
            
            const iid = 'i' + Date.now();
            db.child(`i/${iid}`).set({ 
                id:iid, sid:me.id, seller:me.n, title:t, price:p, cat:c, 
                desc:document.getElementById('s_d').value, acc_data:acc, 
                status:'active', img:tempImg, method:m 
            });
            Tst.fire({ icon:'success', title:'Выставлено на продажу!' });
            switchT('market');
        }

        function calcP() {
            const p = Number(document.getElementById('s_p').value);
            const com = data.settings.comm || 10;
            document.getElementById('s_info').innerText = `К зачислению: ${Math.floor(p * (1 - com/100))} ₽`;
        }

        function switchT(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.getElementById('tab_'+t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById('n_'+t)?.classList.add('active');
            tempImg = ""; // Сброс временных картинок
        }

        function logout() { localStorage.clear(); location.reload(); }

        init();
    </script>
</body>
</html>
