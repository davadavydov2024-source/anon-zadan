<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK V52.0 — GLOBAL NOTIFS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap');
        :root { --bg: #030304; --card: #0d0d12; --blue: #3b82f6; --gold: #ffb000; }
        body { background: var(--bg); color: #fff; font-family: 'Manrope', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 35px 25px 200px; scroll-behavior: smooth; }
        .tab-content.active { display: block; animation: ultraFade 0.4s ease-out; }
        @keyframes ultraFade { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        #loader { background: #000; z-index: 10000; position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 60px; height: 60px; border: 3px solid rgba(59,130,246,0.1); border-top-color: var(--blue); border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 90px; background: rgba(10,10,15,0.95); backdrop-filter: blur(40px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #52525b; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .nav-btn.active { color: var(--blue); }

        .tile { background: var(--card); border-radius: 28px; border: 1px solid rgba(255,255,255,0.05); }
        input, textarea, select { background: #121218; border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 18px; color: white; width: 100%; outline: none; font-size: 14px; }
        
        .btn-main { background: var(--blue); padding: 18px; border-radius: 22px; font-weight: 900; text-transform: uppercase; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 12px; color: white; border: none; }
        
        .chat-bubble { background: rgba(59, 130, 246, 0.1); border-left: 3px solid var(--blue); padding: 12px; border-radius: 14px; font-size: 12px; margin-top: 10px; }
        
        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #222; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--blue); }
        input:checked + .slider:before { transform: translateX(24px); }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner mb-4"></div>
        <div class="text-xl font-black italic tracking-widest">LYNEOK<span class="text-blue-500">.</span></div>
    </div>

    <div id="auth_screen" class="hidden fixed inset-0 bg-black z-[9999] flex flex-col items-center justify-center p-10">
        <h1 class="text-3xl font-black italic mb-8 text-center uppercase tracking-tighter">Lyneok <span class="text-blue-500">Empire</span></h1>
        <div class="w-full space-y-4">
            <input id="reg_name" placeholder="Никнейм">
            <input id="reg_email" type="email" placeholder="Email для уведомлений">
            <button onclick="register()" class="btn-main">ВОЙТИ В СИСТЕМУ</button>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-8 py-5 flex justify-between items-center bg-zinc-950/90 backdrop-blur-3xl border-b border-white/5 z-50">
            <span class="font-black italic text-xl tracking-tighter">LYNEOK</span>
            <div id="h_bal" class="bg-blue-600/10 text-blue-500 px-4 py-1.5 rounded-xl font-black text-xs border border-blue-500/20">0 ₽</div>
        </header>

        <main id="tab_market" class="tab-content active">
            <div id="cat_view" class="grid grid-cols-2 gap-4"></div>
            <div id="items_view" class="hidden space-y-5">
                <button onclick="backToCats()" class="text-zinc-500 font-black text-[10px] uppercase italic flex items-center gap-2">← КАТЕГОРИИ</button>
                <div id="market_grid" class="space-y-4"></div>
            </div>
        </main>

        <main id="tab_sell" class="tab-content">
            <h2 class="text-2xl font-black mb-6 italic uppercase text-blue-500">Выставить лот</h2>
            <div class="space-y-4">
                <input type="file" id="i_img" class="hidden" onchange="compImg(this, 'l_img')">
                <label for="i_img" id="l_img" class="w-full h-40 bg-zinc-900/50 border-2 border-dashed border-white/10 rounded-[24px] flex flex-col items-center justify-center font-black text-[10px] opacity-40 uppercase overflow-hidden">
                    <i class="fa-solid fa-camera text-xl mb-2"></i> ФОТО
                </label>
                <select id="i_cat" onchange="syncSubs()"></select>
                <div id="sub_wrapper" class="hidden"><select id="i_sub"></select></div>
                <input id="i_title" placeholder="Что продаете?">
                <textarea id="i_desc" placeholder="Описание / Данные..." rows="2"></textarea>
                <input id="i_price" type="number" placeholder="Цена (от 45 ₽)">
                <button onclick="postItem()" class="btn-main">ВЫСТАВИТЬ</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content">
            <h2 class="text-2xl font-black italic uppercase text-blue-500 mb-6">Чаты</h2>
            <div id="deals_list" class="space-y-4"></div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="tile p-6 mb-6">
                <div class="flex items-center gap-5 mb-6">
                    <div id="p_ava" class="w-12 h-12 bg-zinc-800 rounded-xl flex items-center justify-center font-black text-lg">?</div>
                    <div>
                        <b id="p_name" class="text-base uppercase italic tracking-tighter">...</b>
                        <p id="p_mail" class="text-[9px] opacity-30"></p>
                    </div>
                </div>
                
                <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-envelope text-blue-500"></i>
                        <span class="text-[10px] font-black uppercase">Уведомления на почту</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="mail_toggle" onchange="toggleMail()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <button id="adm_btn" onclick="switchTab('admin')" class="hidden tile w-full p-5 text-red-500 font-black text-[10px] uppercase italic mb-4 border-red-500/10 bg-red-500/5">OWNER PANEL👑</button>
            <button onclick="logout()" class="tile w-full p-4 opacity-20 font-black text-[9px] uppercase text-center">Выйти</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <h1 class="text-2xl font-black text-red-500 mb-6 italic uppercase">УПРАВЛЕНИЕ</h1>
            <div class="tile p-5 space-y-3 mb-6">
                <button onclick="addNewCat()" class="btn-main !bg-zinc-800 !py-3 !text-[10px]">Новая Игра</button>
                <button onclick="addNewSub()" class="btn-main !bg-zinc-800 !py-3 !text-[10px]">Новая Категория</button>
            </div>
            <div id="adm_mod" class="space-y-3"></div>
        </main>

        <nav class="nav-bar">
            <div onclick="switchTab('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-shop text-xl"></i><span>МАРКЕТ</span></div>
            <div onclick="switchTab('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-plus-circle text-xl"></i><span>ПРОДАТЬ</span></div>
            <div onclick="switchTab('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-comments text-xl"></i><span>ЧАТЫ</span></div>
            <div onclick="switchTab('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user-gear text-xl"></i><span>ПРОФИЛЬ</span></div>
        </nav>
    </div>

    <script>
        // ТВОИ ДАННЫЕ
        const EMAIL_PUB_KEY = "9M8GxYWeMi6hJP6Rg";
        const EMAIL_SVC_ID = "service_ndr83s";
        const EMAIL_TMP_ID = "template_q98pr7g";
        const TG_TOKEN = "8641257792:AAEsxnQWEIeozMt_gnSwJdVgSFQlOc-hnuc"; 
        const TG_CHAT = "7040863301";
        
        const CFG = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        firebase.initializeApp(CFG);
        const db = firebase.database().ref('lyne_empire_v52');
        emailjs.init(EMAIL_PUB_KEY);

        let me = null, data = {}, tempImg = "";
        const Toast = Swal.mixin({ toast: true, position: 'top', showConfirmButton: false, timer: 2000, background: '#111', color: '#fff' });

        // Умная отправка почты (проверяет настройки юзера)
        function notifyUser(uid, msg, sub = "LYNEOK NOTIFICATION") {
            const targetUser = data.u[uid];
            if(targetUser && targetUser.email && targetUser.mailEnabled !== false) {
                emailjs.send(EMAIL_SVC_ID, EMAIL_TMP_ID, {
                    to_email: targetUser.email,
                    user_name: targetUser.n,
                    message: msg,
                    subject: sub
                });
            }
        }

        function init() {
            db.on('value', snap => {
                data = snap.val() || { u:{}, i:{}, d:{}, cat:{}, subs:{} };
                const sid = localStorage.getItem('lyne_sid');
                if(sid && data.u[sid]) {
                    me = data.u[sid];
                    document.getElementById('auth_screen').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('mail_toggle').checked = me.mailEnabled !== false;
                    if(me.n.toLowerCase() === 'owwner') document.getElementById('adm_btn').style.display = 'flex';
                    render();
                } else document.getElementById('auth_screen').classList.remove('hidden');
                setTimeout(() => { document.getElementById('loader').style.display = 'none' }, 800);
            });
        }

        function toggleMail() {
            const isEnabled = document.getElementById('mail_toggle').checked;
            db.child(`u/${me.id}/mailEnabled`).set(isEnabled);
            Toast.fire({ icon: 'success', title: isEnabled ? 'Email включен' : 'Email выключен' });
        }

        function render() {
            if(!me) return;
            document.getElementById('h_bal').innerText = (me.bal || 0) + ' ₽';
            document.getElementById('p_name').innerText = me.n;
            document.getElementById('p_mail').innerText = me.email;
            document.getElementById('p_ava').innerText = me.n[0].toUpperCase();
            
            const cats = Object.values(data.cat || {});
            document.getElementById('cat_view').innerHTML = cats.map(c => `
                <div class="cat-card p-4 tile text-center" onclick="openCat('${c.name}')">
                    <img src="${c.img}" class="w-14 h-14 mx-auto mb-3 rounded-xl object-cover">
                    <p class="text-[10px] font-black uppercase">${c.name}</p>
                </div>`).join('');
            document.getElementById('i_cat').innerHTML = '<option disabled selected>ИГРА</option>' + cats.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            
            renderChats();
            renderAdmin();
        }

        function buyItem(iid) {
            const i = data.i[iid];
            if(me.bal < i.price) return Toast.fire({ icon: 'error', title: 'Мало средств' });
            const did = 'd' + Date.now();
            db.child(`u/${me.id}/bal`).transaction(b => b - i.price);
            db.child(`d/${did}`).set({ id: did, buyerId: me.id, sid: i.sid, title: i.title, price: i.price, status: 'active' });
            
            // Уведомляем продавца по почте
            notifyUser(i.sid, `Твой товар "${i.title}" купили за ${i.price}₽! Зайди в чаты, чтобы передать данные.`);
            // Уведомляем покупателя по почте
            notifyUser(me.id, `Ты успешно купил "${i.title}" за ${i.price}₽. Жди ответа продавца в чате.`);
            
            switchTab('chats');
        }

        function adminSendReply(did) {
            const val = document.getElementById('reply_'+did).value;
            if(!val) return;
            const deal = data.d[did];
            db.child(`d/${did}/msg`).set(val);
            
            // Уведомляем юзера, что админ ответил
            notifyUser(deal.buyerId, `Администратор ответил в вашем чате #${did}: "${val}"`);
            Toast.fire({ icon: 'success', title: 'Отправлено' });
        }

        // БАЗОВЫЕ ФУНКЦИИ (Сохранены из V51)
        function register() {
            const n = document.getElementById('reg_name').value.trim();
            const m = document.getElementById('reg_email').value.trim();
            if(!n || !m.includes('@')) return;
            const sid = 'u' + Date.now();
            db.child(`u/${sid}`).set({ id: sid, n, email: m, bal: 0, mailEnabled: true });
            localStorage.setItem('lyne_sid', sid);
        }

        function renderChats() {
            let chats = Object.values(data.d || {});
            const isAdmin = me.n.toLowerCase() === 'owwner';
            if(!isAdmin) chats = chats.filter(c => c.buyerId === me.id || c.sid === me.id);

            document.getElementById('deals_list').innerHTML = chats.reverse().map(c => `
                <div class="tile p-5">
                    <b class="text-[11px] uppercase block">${c.title} (${c.price}₽)</b>
                    ${c.msg ? `<div class="chat-bubble"><b>SUPPORT:</b> ${c.msg}</div>` : ''}
                    ${isAdmin ? `<div class="mt-3 flex gap-2"><input id="reply_${c.id}" class="!p-2 !text-xs" placeholder="Ответ..."><button onclick="adminSendReply('${c.id}')" class="bg-blue-600 px-3 rounded-lg"><i class="fa-solid fa-paper-plane"></i></button></div>` : ''}
                </div>`).join('') || '<p class="text-center opacity-20 py-10 text-[10px]">ПУСТО</p>';
        }

        function postItem() {
            const t = document.getElementById('i_title').value;
            const p = Number(document.getElementById('i_price').value);
            const c = document.getElementById('i_cat').value;
            if(!tempImg || !t || p < 45) return;
            const iid = 'i' + Date.now();
            db.child(`i/${iid}`).set({ id: iid, sid: me.id, seller: me.n, title: t, price: p, cat: c, status: 'pending', img: tempImg });
            switchTab('market');
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.getElementById('tab_'+t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById('n_'+t)?.classList.add('active');
        }

        function compImg(i, t) {
            const f = i.files[0]; if(!f) return;
            const rd = new FileReader();
            rd.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                    canvas.width = 400; canvas.height = 400; ctx.drawImage(img, 0, 0, 400, 400);
                    tempImg = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById(t).innerHTML = `<img src="${tempImg}" class="w-full h-full object-cover">`;
                };
                img.src = e.target.result;
            };
            rd.readAsDataURL(f);
        }

        function logout() { localStorage.clear(); location.reload(); }
        init();
    </script>
</body>
</html>
