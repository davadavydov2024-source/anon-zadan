<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>anon:zadan v15.0 ULTRA</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        :root { --accent: #fff; --bg: #050505; --card: #0f0f11; }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 15, 17, 0.9); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.06); border-radius: 28px; }
        .tab { display: none; } .tab.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-action { background: var(--accent); color: #000; border-radius: 20px; font-weight: 800; padding: 18px; transition: 0.3s; width: 100%; text-transform: uppercase; font-style: italic; font-size: 13px; cursor: pointer; border: none; }
        .btn-action:active { transform: scale(0.96); }
        .input-main { background: var(--card) !important; border: 1px solid #222 !important; color: #fff !important; border-radius: 18px !important; padding: 16px !important; width: 100%; outline: none; font-size: 14px; }
        .nav-item { transition: 0.3s; opacity: 0.3; padding: 15px; } .nav-item.active { opacity: 1; transform: translateY(-5px); }
        .badge-official { background: #3b82f6; color: #fff; font-size: 7px; padding: 2px 6px; border-radius: 5px; font-weight: 900; text-transform: uppercase; }
        ::-webkit-scrollbar { width: 0; }
        #map { height: 200px; border-radius: 20px; margin-top: 10px; border: 1px solid #222; }
    </style>
</head>
<body class="pb-32">

    <header class="p-6 flex justify-between items-center sticky top-0 z-[100] glass border-none rounded-none rounded-b-[35px]">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter leading-none">anon:<span class="text-zinc-600">zadan</span></h1>
            <div class="flex items-center gap-1 mt-1"><span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span><p class="text-[7px] text-zinc-500 font-black uppercase tracking-widest">Server v15.0 Online</p></div>
        </div>
        <div id="u-bal-head" onclick="setTab('me')" class="bg-white/5 border border-white/10 px-5 py-2.5 rounded-2xl text-xs font-black italic">0.00 ₽</div>
    </header>

    <section id="home" class="tab active px-5 pt-6 space-y-6">
        <div id="news-mini-feed" class="space-y-3"></div> <div class="relative">
            <i class="fa-solid fa-magnifying-glass absolute left-5 top-5 text-zinc-600"></i>
            <input id="search-in" oninput="renderAll()" class="input-main pl-14" placeholder="Поиск услуг, товаров, адресов...">
        </div>

        <div id="my-escrow-box" class="space-y-2"></div>
        <div id="zadan-list" class="space-y-4"></div>
    </section>

    <section id="channel" class="tab px-5 pt-6">
        <h2 class="text-xs font-black uppercase tracking-[0.2em] text-zinc-500 mb-6 text-center">Официальный Канал</h2>
        <div id="channel-feed" class="space-y-6"></div>
    </section>

    <section id="create" class="tab px-5 pt-6">
        <div class="glass p-7 space-y-5">
            <div class="text-center mb-4"><i class="fa-solid fa-cloud-arrow-up text-3xl mb-2"></i><h3 class="text-xs font-black uppercase">Разместить предложение</h3></div>
            <div class="space-y-3">
                <input id="z-title" class="input-main" placeholder="Что продаете?">
                <input id="z-addr" class="input-main" placeholder="Адрес (для карты)">
                <input id="z-price" type="number" class="input-main" placeholder="Цена в рублях">
                <div class="relative">
                    <input type="file" id="z-file" class="hidden" accept="image/*" onchange="previewImg(this)">
                    <label for="z-file" class="input-main block text-center cursor-pointer border-dashed border-zinc-700 bg-transparent py-8">
                        <i class="fa-solid fa-image mb-2 text-xl"></i><br><span id="file-status" class="text-[10px] font-bold uppercase">Прикрепить фото (файл)</span>
                    </label>
                </div>
            </div>
            <button onclick="uploadAndCreate()" id="create-btn" class="btn-action">Выставить на продажу</button>
        </div>
    </section>

    <section id="support" class="tab px-5 pt-6">
        <div id="chat-list-ui" class="space-y-3">
            <div onclick="openDialog('system')" class="glass p-6 flex items-center gap-5 active:scale-95 transition-all cursor-pointer">
                <div class="w-14 h-14 bg-white text-black rounded-[20px] flex items-center justify-center text-2xl rotate-3"><i class="fa-solid fa-headset"></i></div>
                <div><b class="text-sm italic uppercase font-black">Служба Поддержки</b><p class="text-[9px] text-zinc-500 font-bold uppercase">Решаем проблемы 24/7</p></div>
            </div>
            <div id="active-user-chats"></div>
        </div>
        <div id="chat-room-ui" class="hidden space-y-4">
            <button onclick="closeDialog()" class="text-[10px] font-black uppercase opacity-40"><i class="fa-solid fa-arrow-left mr-2"></i> Назад</button>
            <div class="glass p-5 h-[60vh] flex flex-col">
                <div id="msgs-box" class="flex-1 overflow-y-auto space-y-4 pr-2"></div>
                <div class="flex gap-2 mt-5">
                    <input id="msg-input" class="input-main py-4" placeholder="Ваш вопрос...">
                    <button onclick="sendMsg()" class="w-14 bg-white text-black rounded-2xl flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </section>

    <section id="me" class="tab px-5 pt-6">
        <div class="glass p-8 text-center space-y-8">
            <div class="relative w-24 h-24 mx-auto">
                <div class="w-full h-full bg-zinc-900 rounded-[30px] flex items-center justify-center border border-white/5 rotate-6">
                    <i class="fa-solid fa-user-ninja text-4xl -rotate-6"></i>
                </div>
            </div>
            <div>
                <h3 id="u-nick" class="text-3xl font-black italic uppercase tracking-tighter">...</h3>
                <p id="u-tg" class="text-[9px] text-zinc-600 font-black uppercase tracking-widest mt-2"></p>
            </div>
            <div id="u-bal-main" class="text-6xl font-black italic tracking-tighter">0.00 ₽</div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="reqAction('deposit')" class="btn-action">Пополнить</button>
                <button onclick="reqAction('withdraw')" class="btn-action bg-zinc-900 text-zinc-400">Вывод</button>
            </div>
            <button onclick="setTab('admin_login')" class="block mx-auto mt-10 opacity-5 text-[8px] font-black uppercase underline">Системный вход</button>
        </div>
    </section>

    <section id="admin_login" class="tab px-5 pt-20 text-center">
        <div class="glass p-8">
            <input type="password" oninput="if(this.value.toLowerCase()==='kalubxq') setTab('admin')" class="input-main text-center text-2xl font-black tracking-[1em]" placeholder="****">
        </div>
    </section>

    <section id="admin" class="tab px-5 pt-6 pb-40 space-y-10">
        <div class="flex justify-between items-end border-b border-white/5 pb-4">
            <h2 class="text-lg font-black italic text-red-600 underline uppercase">Overlord Panel</h2>
            <div class="text-right">
                <p id="st-users" class="text-xs font-black">Юзеров: 0</p>
                <p id="st-bal" class="text-xs font-black text-green-500">Касса: 0 ₽</p>
            </div>
        </div>

        <div class="glass p-6 space-y-4 border-blue-500/20">
            <h3 class="text-[10px] font-black text-blue-500 uppercase tracking-widest">Конструктор Рассылок</h3>
            <textarea id="adm-bc-text" class="input-main h-24 text-xs" placeholder="Текст сообщения..."></textarea>
            <div class="grid grid-cols-2 gap-2">
                <input id="adm-bc-btn-txt" class="input-main py-3 text-[10px]" placeholder="Текст кнопки">
                <input id="adm-bc-btn-url" class="input-main py-3 text-[10px]" placeholder="Действие (link / deposit)">
            </div>
            <div class="flex gap-2">
                <input type="file" id="adm-bc-file" class="hidden" onchange="previewAdmImg(this)">
                <label for="adm-bc-file" class="flex-1 bg-zinc-900 border border-white/5 p-4 rounded-xl text-center text-[10px] font-bold uppercase cursor-pointer">
                    <i class="fa-solid fa-camera mr-2"></i> <span id="adm-file-st">Фото</span>
                </label>
                <button onclick="sendSmartBroadcast()" class="flex-1 bg-blue-600 text-white font-black uppercase text-[10px] rounded-xl">Запустить</button>
            </div>
        </div>

        <div class="space-y-4">
            <h3 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest pl-2">Активные споры и сделки</h3>
            <div id="adm-deals-list" class="space-y-2"></div>
        </div>

        <div class="space-y-4">
            <h3 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest pl-2">Очередь событий</h3>
            <div id="adm-logs-list" class="space-y-2"></div>
        </div>

        <div class="space-y-4">
            <h3 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest pl-2">База пользователей</h3>
            <div id="adm-users-list" class="space-y-2"></div>
        </div>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 h-24 bg-black/90 backdrop-blur-3xl border-t border-white/5 flex justify-around items-center z-[200] px-6 rounded-t-[40px]">
        <button onclick="setTab('home')" class="nav-item active" id="btn-home"><i class="fa-solid fa-ghost text-2xl"></i></button>
        <button onclick="setTab('channel')" class="nav-item" id="btn-channel"><i class="fa-solid fa-tower-broadcast text-2xl"></i></button>
        <button onclick="setTab('create')" class="nav-item" id="btn-create"><i class="fa-solid fa-plus-square text-2xl"></i></button>
        <button onclick="setTab('support')" class="nav-item" id="btn-support"><i class="fa-solid fa-comments text-2xl"></i></button>
        <button onclick="setTab('me')" class="nav-item" id="btn-me"><i class="fa-solid fa-user-circle text-2xl"></i></button>
    </nav>

    <script>
        // --- CONFIG & INIT ---
        const TG_ID = "7040863301", TG_TOKEN = "8722822022:AAEmZa-V4-isxXnZ00omU8gAM_NtYevuL9Y";
        const firebaseConfig = {
          apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
          authDomain: "dogx-base.firebaseapp.com",
          databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
          projectId: "dogx-base",
          storageBucket: "dogx-base.appspot.com",
          messagingSenderId: "81713249793",
          appId: "1:81713249793:web:1b44a13e6faf5acfa78a00"
        };

        const DB_KEY = 'anon_v15_ultra';
        firebase.initializeApp(firebaseConfig);
        const rdb = firebase.database();
        const storage = firebase.storage();
        let db = { users: {}, tasks: {}, logs: {}, news: {}, deals: {}, chats: {} };
        let me = null;
        let activeChat = null;

        function init() {
            rdb.ref(DB_KEY).on('value', (s) => {
                db = s.val() || { users: {}, tasks: {}, logs: {}, news: {}, deals: {}, chats: {} };
                const uid = localStorage.getItem('anon_uid');
                if (uid && db.users && db.users[uid]) { me = db.users[uid]; renderAll(); } else { showLogin(); }
            });
        }

        // --- AUTH (NEW DESIGN) ---
        async function showLogin() {
            const { value: form } = await Swal.fire({
                title: 'ДОБРО ПОЖАЛОВАТЬ', background: '#050505', color: '#fff',
                html: `<div class="space-y-4"><input id="auth-n" class="swal2-input w-full m-0" placeholder="НИКНЕЙМ"><input id="auth-p" type="password" class="swal2-input w-full m-0" placeholder="ПАРОЛЬ"></div>`,
                confirmButtonText: 'ВОЙТИ / СОЗДАТЬ', allowOutsideClick: false,
                preConfirm: () => [document.getElementById('auth-n').value.trim(), document.getElementById('auth-p').value.trim()]
            });
            if(form && form[0]) {
                const user = Object.values(db.users || {}).find(u => u.nick.toLowerCase() === form[0].toLowerCase());
                if(user) {
                    if(user.pass === form[1]) { localStorage.setItem('anon_uid', user.id); location.reload(); }
                    else { Swal.fire('Ошибка', 'Пароль неверный', 'error').then(showLogin); }
                } else {
                    const id = "u"+Date.now();
                    await rdb.ref(`${DB_KEY}/users/${id}`).set({id, nick:form[0], pass:form[1], bal:0, tg:'@none'});
                    localStorage.setItem('anon_uid', id); location.reload();
                }
            }
        }

        // --- FILE UPLOAD LOGIC ---
        function previewImg(input) { if(input.files[0]) document.getElementById('file-status').innerText = "ФОТО ВЫБРАНО ✅"; }
        function previewAdmImg(input) { if(input.files[0]) document.getElementById('adm-file-st').innerText = "ФОТО OK"; }

        async function uploadAndCreate() {
            const t = document.getElementById('z-title').value, a = document.getElementById('z-addr').value, p = Number(document.getElementById('z-price').value), f = document.getElementById('z-file').files[0];
            if(!t || !p || !f) return Swal.fire('Ошибка', 'Заполни всё, включая фото!', 'error');

            document.getElementById('create-btn').innerText = "ЗАГРУЗКА...";
            const fRef = storage.ref(`tasks/${Date.now()}_${f.name}`);
            await fRef.put(f);
            const url = await fRef.getDownloadURL();

            const id = "z"+Date.now();
            await rdb.ref(`${DB_KEY}/tasks/${id}`).set({id, title:t, addr:a, price:p, img:url, status:'pending', creator: me.nick, creatorId: me.id});
            await rdb.ref(`${DB_KEY}/logs/l${Date.now()}`).set({id: "l"+Date.now(), type: 'НОВЫЙ_ЛОТ', targetId: id, nick: me.nick, status: 'pending'});
            
            tgMsg(`📦 <b>ЗАЯВКА НА ТОВАР</b>\n\nОт: ${me.nick}\nТовар: ${t}\nЦена: ${p}₽\nПроверьте админку!`);
            Swal.fire('Ок', 'Отправлено на модерацию!', 'success');
            setTab('home');
        }

        // --- PLAYEROK BROADCAST LOGIC ---
        async function sendSmartBroadcast() {
            const txt = document.getElementById('adm-bc-text').value, btnT = document.getElementById('adm-bc-btn-txt').value, btnU = document.getElementById('adm-bc-btn-url').value, f = document.getElementById('adm-bc-file').files[0];
            if(!txt) return;

            let imgUrl = "";
            if(f) {
                const fRef = storage.ref(`news/${Date.now()}_${f.name}`);
                await fRef.put(f);
                imgUrl = await fRef.getDownloadURL();
            }

            const id = "n"+Date.now();
            await rdb.ref(`${DB_KEY}/news/${id}`).set({ id, text:txt, btnText:btnT, btnUrl:btnU, img:imgUrl, time:Date.now() });
            
            Swal.fire('Готово', 'Рассылка запущена!', 'success');
            document.getElementById('adm-bc-text').value = "";
        }

        // --- RENDER ENGINE ---
        function renderAll() {
            if(!me) return;
            const users = Object.values(db.users || {});
            document.getElementById('u-bal-head').innerText = (me.bal || 0).toFixed(0) + ' ₽';
            document.getElementById('u-bal-main').innerText = (me.bal || 0).toFixed(0) + ' ₽';
            document.getElementById('u-nick').innerText = me.nick;
            document.getElementById('u-tg').innerText = me.tg;

            // Stats
            document.getElementById('st-users').innerText = `Юзеров: ${users.length}`;
            document.getElementById('st-bal').innerText = `Касса: ${users.reduce((acc,u)=>acc+(u.bal||0),0).toFixed(0)} ₽`;

            // News / Broadcasts
            const news = Object.values(db.news || {}).reverse();
            document.getElementById('news-mini-feed').innerHTML = news.slice(0,2).map(n => `
                <div class="glass p-5 border-l-4 border-blue-500">
                    <div class="flex items-center gap-2 mb-2"><span class="badge-official">anon:zadan ✅</span></div>
                    <p class="text-[11px] font-bold leading-relaxed">${n.text}</p>
                    ${n.btnText ? `<button onclick="handleBtn('${n.btnUrl}')" class="mt-3 w-full bg-blue-600 py-3 rounded-xl text-[9px] font-black uppercase italic">${n.btnText}</button>` : ''}
                </div>
            `).join('');

            document.getElementById('channel-feed').innerHTML = news.map(n => `
                <div class="glass overflow-hidden">
                    ${n.img ? `<img src="${n.img}" class="w-full h-48 object-cover border-b border-white/5">` : ''}
                    <div class="p-6">
                        <div class="flex items-center gap-2 mb-3"><span class="badge-official text-[6px]">ОФИЦИАЛЬНО</span><span class="text-[7px] text-zinc-600 font-black">${new Date(n.time).toLocaleDateString()}</span></div>
                        <p class="text-xs font-bold leading-relaxed mb-4">${n.text}</p>
                        ${n.btnText ? `<button onclick="handleBtn('${n.btnUrl}')" class="w-full bg-white text-black py-4 rounded-2xl text-[10px] font-black uppercase italic">${n.btnText}</button>` : ''}
                    </div>
                </div>
            `).join('');

            // Tasks (RU + Google Maps Link)
            const s = document.getElementById('search-in').value.toLowerCase();
            const tasks = Object.values(db.tasks || {}).filter(t => t.status === 'active' && t.title.toLowerCase().includes(s));
            document.getElementById('zadan-list').innerHTML = tasks.map(t => `
                <div class="glass overflow-hidden active:scale-[0.98] transition-all">
                    <img src="${t.img}" class="w-full h-52 object-cover">
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-2">
                            <b class="text-sm italic uppercase font-black">${t.title}</b>
                            <b class="text-xl italic font-black text-green-500">${t.price} ₽</b>
                        </div>
                        <p onclick="window.open('https://www.google.com/maps/search/${t.addr}')" class="text-[9px] text-zinc-500 font-bold uppercase cursor-pointer hover:text-white transition-all">
                            <i class="fa-solid fa-location-dot mr-1"></i> ${t.addr}
                        </p>
                        <div class="flex gap-2 mt-5">
                            <button onclick="buyDeal('${t.id}')" class="flex-1 bg-white text-black py-4 rounded-2xl text-[10px] font-black uppercase italic">Купить сейчас</button>
                            <button onclick="openDialog('${t.creatorId}')" class="w-14 bg-zinc-900 rounded-2xl flex items-center justify-center border border-white/5"><i class="fa-solid fa-message"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');

            // Escrow UI
            const myDeals = Object.values(db.deals || {}).filter(d => (d.buyerId === me.id || d.sellerId === me.id) && d.status === 'hold');
            document.getElementById('my-escrow-box').innerHTML = myDeals.map(d => `
                <div class="glass p-5 border-l-4 border-yellow-500 flex justify-between items-center bg-yellow-500/5">
                    <div><b class="text-[9px] uppercase font-black italic">Холд #${d.id.slice(-4)}</b><p class="text-[7px] font-bold opacity-40">${d.title}</p></div>
                    ${d.buyerId === me.id ? `<button onclick="confirmDeal('${d.id}')" class="bg-green-600 px-4 py-2 rounded-xl text-[8px] font-black uppercase">Подтвердить</button>` : `<span class="text-[7px] font-black italic opacity-30 uppercase animate-pulse">Ожидание...</span>`}
                </div>
            `).join('');

            // Admin Lists
            document.getElementById('adm-deals-list').innerHTML = Object.values(db.deals || {}).map(d => `<div class="p-4 bg-zinc-900 rounded-2xl text-[9px] font-black flex justify-between items-center"><span>${d.title} [${d.status}]</span><button onclick="admFinishDeal('${d.id}','seller')" class="text-blue-500 uppercase">Закрыть</button></div>`).join('');
            document.getElementById('adm-logs-list').innerHTML = Object.values(db.logs || {}).reverse().filter(l=>l.status==='pending').map(l => `<div class="p-4 glass border-l-4 border-red-500 text-[9px] font-black">${l.nick}: ${l.type}<button onclick="admProc('${l.id}',true,'${l.type}','${l.targetId||l.uid}')" class="ml-4 text-green-500 underline uppercase">Ок</button></div>`).join('');
            document.getElementById('adm-users-list').innerHTML = users.map(u => `<div class="p-4 glass flex justify-between items-center text-[10px] font-black italic"><span>${u.nick} (${u.bal}₽)</span><button onclick="admEditBal('${u.id}')" class="text-zinc-500">ПРАВКА</button></div>`).join('');

            if(activeChat) renderMsgs();
        }

        // --- ESCROW & FINANCE ---
        async function buyDeal(id) {
            const t = db.tasks[id]; if(me.bal < t.price) return Swal.fire('Ошибка', 'Пополни баланс!', 'error');
            const dId = "d"+Date.now(), s = Object.values(db.users).find(u=>u.nick === t.creator);
            await rdb.ref(`${DB_KEY}/users/${me.id}`).update({bal: me.bal - t.price});
            await rdb.ref(`${DB_KEY}/deals/${dId}`).set({id:dId, title:t.title, price:t.price, buyerId:me.id, sellerId:s.id, status:'hold', buyerNick:me.nick, sellerNick:s.nick});
            tgMsg(`💰 <b>НОВАЯ СДЕЛКА (ХОЛД)</b>\n\n${me.nick} -> ${t.title} (${t.price}₽)`);
            Swal.fire('Сделка открыта', 'Средства заморожены в системе!', 'success');
        }

        async function confirmDeal(id) {
            const d = db.deals[id], s = db.users[d.sellerId];
            await rdb.ref(`${DB_KEY}/users/${s.id}`).update({bal: (s.bal||0) + d.price});
            await rdb.ref(`${DB_KEY}/deals/${id}`).update({status:'success'});
            tgMsg(`✅ <b>СДЕЛКА ЗАВЕРШЕНА</b>\n\n${d.buyerNick} подтвердил получение "${d.title}"`);
            Swal.fire('Завершено', 'Продавец получил оплату!', 'success');
        }

        // --- HELPERS ---
        function handleBtn(url) {
            if(url === 'deposit') setTab('me');
            else if(url.startsWith('http')) window.open(url);
        }

        async function tgMsg(txt) {
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_ID}&text=${encodeURIComponent(txt)}&parse_mode=HTML`);
        }

        async function admProc(id, ok, type, target) {
            if(ok && type === 'НОВЫЙ_ЛОТ') rdb.ref(`${DB_KEY}/tasks/${target}`).update({status:'active'});
            else if(ok) {
                const {value: v} = await Swal.fire({title:'Сумма', input:'number'});
                if(v) rdb.ref(`${DB_KEY}/users/${target}`).update({bal: (db.users[target].bal||0) + (type==='DEPOSIT' ? Number(v) : -Number(v))});
            }
            rdb.ref(`${DB_KEY}/logs/${id}`).update({status: ok?'approved':'rejected'});
        }

        async function reqAction(type) {
            const id = "l"+Date.now();
            await rdb.ref(`${DB_KEY}/logs/${id}`).set({id, type: type.toUpperCase(), uid: me.id, nick: me.nick, status: 'pending'});
            tgMsg(`⚠️ <b>ЗАЯВКА НА ${type.toUpperCase()}</b>\n\nЮзер: ${me.nick}\nСумма: ...`);
            Swal.fire('Ожидание', 'Администратор уведомлен', 'info');
        }

        function openDialog(id) { activeChat = id; document.getElementById('chat-list-ui').classList.add('hidden'); document.getElementById('chat-room-ui').classList.remove('hidden'); renderMsgs(); }
        function closeDialog() { activeChat = null; document.getElementById('chat-list-ui').classList.remove('hidden'); document.getElementById('chat-room-ui').classList.add('hidden'); }
        async function sendMsg() {
            const v = document.getElementById('msg-input').value; if(!v) return;
            const t = activeChat === 'system' ? me.id : activeChat;
            await rdb.ref(`${DB_KEY}/chats/${t}/${Date.now()}`).set({text:v, from: activeChat === 'system' ? 'user' : 'system', time:Date.now()});
            document.getElementById('msg-input').value = "";
        }
        function renderMsgs() {
            const t = activeChat === 'system' ? me.id : activeChat;
            const msgs = Object.values(db.chats[t] || {}).sort((a,b)=>a.time-b.time);
            document.getElementById('msgs-box').innerHTML = msgs.map(m => `<div class="p-4 max-w-[85%] rounded-3xl text-xs font-bold ${m.from==='system'?'bg-zinc-900 self-start border border-white/5':'bg-white text-black self-end'}">${m.text}</div>`).join('');
            const c = document.getElementById('msgs-box'); c.scrollTop = c.scrollHeight;
        }

        function setTab(t) {
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.add('active'));
            document.querySelectorAll('nav button').forEach(b => b.id === 'btn-'+t ? b.classList.add('active') : b.classList.remove('active'));
            renderAll();
        }

        init();
    </script>
</body>
</html>
