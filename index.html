<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK OMEGA V120.3 - STABLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700&family=Orbitron:wght@900&family=UnifrakturMaguntia&display=swap');
        :root { --bg: #050505; --card: #121214; --text: #ffffff; --blue: #007aff; --gray: #1c1c1e; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin:0; }
        .glass { background: var(--card); border: 1px solid rgba(255,255,255,0.03); border-radius: 24px; }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px 16px 160px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Стили ников */
        .nick-gold { color: #ffcc00; text-shadow: 0 0 10px rgba(255,204,0,0.6); font-weight: 900; }
        .nick-diamond { color: #b9f2ff; text-shadow: 0 0 15px #b9f2ff; font-weight: 900; }
        .nick-neon { color: #00ffcc; text-shadow: 0 0 15px #00ffcc; font-weight: 900; }
        .nick-rainbow { background: linear-gradient(to right, #ef4444, #eab308, #22c55e, #3b82f6, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rb 3s linear infinite; font-weight: 900; }
        @keyframes rb { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: rgba(10,10,10,0.8); backdrop-filter: blur(20px); display: flex; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #636366; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 700; }
        .nav-btn.active { color: var(--blue); }

        input, textarea, select { background: var(--gray); border: 1px solid transparent; border-radius: 14px; padding: 14px; color: white; width: 100%; outline: none; font-size: 14px; }
        .btn-blue { background: var(--blue); color: white; border-radius: 16px; font-weight: 800; padding: 16px; width: 100%; border: none; cursor: pointer; }
        
        #loader { background: #000; z-index: 10000; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 13px; line-height: 1.4; margin-bottom: 5px; }
        .msg-me { align-self: flex-end; background: var(--blue); color: white; border-bottom-right-radius: 4px; }
        .msg-op { align-self: flex-start; background: #2c2c2e; color: white; border-bottom-left-radius: 4px; }
    </style>
</head>
<body>

    <div id="loader"><div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>

    <div id="auth_scr" class="hidden fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-8">
        <h1 class="text-4xl font-black mb-12 italic tracking-tighter">LYNEOK<span class="text-blue-500">.</span></h1>
        <div class="w-full max-sm glass p-6 space-y-4">
            <div id="reg_ext" class="hidden space-y-4">
                <input type="file" id="r_ava" class="hidden" accept="image/*" onchange="upImg(this, 'l_r_ava')">
                <label for="r_ava" id="l_r_ava" class="w-20 h-20 bg-zinc-800 mx-auto rounded-full flex items-center justify-center cursor-pointer border-2 border-dashed border-zinc-700 overflow-hidden">
                    <i class="fa-solid fa-plus text-zinc-500"></i>
                </label>
                <input id="r_tg" placeholder="Telegram (@username)">
            </div>
            <input id="a_n" placeholder="Логин">
            <input id="a_p" type="password" placeholder="Пароль">
            <button onclick="handleAuth()" id="a_btn" class="btn-blue">Войти</button>
            <p onclick="toggleR()" id="a_tog" class="text-center text-[10px] font-black text-zinc-500 uppercase cursor-pointer pt-2">Создать аккаунт</p>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-5 py-4 flex justify-between items-center bg-black/50 backdrop-blur-md sticky top-0 z-50">
            <b class="text-xl italic">LYNEOK</b>
            <div onclick="switchT('profile')" class="bg-zinc-900 px-4 py-1.5 rounded-full flex items-center gap-2 border border-white/5">
                <span id="h_bal" class="font-bold text-xs">0 ₽</span>
                <img id="h_ava" class="w-6 h-6 rounded-full object-cover">
            </div>
        </header>

        <main id="tab_market" class="tab-content active">
            <div id="cat_grid" class="grid grid-cols-2 gap-3"></div>
            <div id="subcat_view" class="hidden space-y-4">
                <button onclick="closeSubcat()" class="text-blue-500 font-bold text-xs">← НАЗАД</button>
                <div id="subcat_grid" class="grid grid-cols-2 gap-3"></div>
            </div>
            <div id="items_view" class="hidden space-y-4">
                <button onclick="closeCat()" class="text-blue-500 font-bold text-xs">← НАЗАД</button>
                <div id="items_list" class="space-y-3"></div>
            </div>
        </main>

        <main id="tab_sell" class="tab-content">
            <div class="glass p-5 space-y-4">
                <input type="file" id="s_img" class="hidden" onchange="upImg(this, 'l_s_img')">
                <label for="s_img" id="l_s_img" class="w-full h-40 bg-zinc-900 rounded-2xl flex flex-col items-center justify-center border-2 border-dashed border-zinc-800 overflow-hidden">
                    <i class="fa-solid fa-camera text-2xl text-zinc-700"></i>
                </label>
                <select id="s_game" onchange="updateSubcats()"></select>
                <select id="s_subcat"></select>
                <input id="s_t" placeholder="Название товара">
                <textarea id="s_acc" placeholder="Данные (увидит только покупатель)"></textarea>
                <div class="space-y-1">
                    <input id="s_p" type="number" placeholder="Цена" oninput="calcComm()">
                    <p id="s_receive" class="text-[10px] text-zinc-500 font-bold ml-1 italic"></p>
                </div>
                <button onclick="postItem()" class="btn-blue">Выставить на продажу</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content">
            <h2 class="text-2xl font-black mb-6">Сделки</h2>
            <div id="deals_list" class="space-y-3"></div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="glass p-6 text-center">
                <img id="p_ava" class="w-24 h-24 rounded-full mx-auto mb-4 object-cover border-4 border-zinc-800">
                <h2 id="p_n" class="text-2xl font-black">...</h2>
                <div id="p_rating_box" class="text-yellow-500 font-bold text-xs mb-4"></div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="askPay()" class="btn-blue !bg-white !text-black">ПОПОЛНИТЬ</button>
                    <button onclick="askOut()" class="btn-blue">ВЫВОД</button>
                </div>
            </div>
            <button id="adm_btn" onclick="switchT('admin')" class="hidden w-full bg-red-600/10 text-red-500 border border-red-600/20 py-4 rounded-2xl font-bold mt-4">АДМИН-ПАНЕЛЬ</button>
            <button onclick="logout()" class="w-full py-8 text-red-500 opacity-30 text-xs font-black">ВЫЙТИ ИЗ АККАУНТА</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <div class="space-y-8">
                <section>
                    <h3 class="text-blue-500 text-[10px] font-black uppercase mb-2">Настройки</h3>
                    <div class="glass p-4 flex gap-2">
                        <input id="ad_comm_val" type="number" placeholder="Комиссия %" class="!py-2">
                        <button onclick="admSaveComm()" class="bg-blue-600 px-4 rounded-xl text-xs font-bold">ОК</button>
                    </div>
                </section>
                <section>
                    <h3 class="text-orange-500 text-[10px] font-black uppercase mb-2">Модерация</h3>
                    <div id="ad_mod_list" class="space-y-2"></div>
                </section>
                <section>
                    <h3 class="text-purple-500 text-[10px] font-black uppercase mb-2">Игры</h3>
                    <div id="ad_games_list" class="space-y-2"></div>
                </section>
            </div>
        </main>

        <nav class="nav-bar">
            <div onclick="switchT('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-shop text-xl"></i><span>Маркет</span></div>
            <div onclick="switchT('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-plus-circle text-xl"></i><span>Продать</span></div>
            <div onclick="switchT('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-comments text-xl"></i><span>Сделки</span></div>
            <div onclick="switchT('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user text-xl"></i><span>Профиль</span></div>
        </nav>
    </div>

    <div id="chat_modal" class="hidden fixed inset-0 z-[10001] bg-black flex flex-col">
        <header class="p-5 flex justify-between items-center border-b border-white/5">
            <b id="chat_title">Чат</b>
            <button onclick="closeChatModal()" class="text-2xl">&times;</button>
        </header>
        <div id="chat_body" class="flex-1 overflow-y-auto p-4 flex flex-col"></div>
        <div class="p-4 border-t border-white/5 flex gap-2">
            <input id="chat_input" placeholder="Сообщение...">
            <button onclick="sendMessage()" class="bg-blue-600 w-12 h-12 rounded-xl flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const FB_CFG = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        firebase.initializeApp(FB_CFG);
        const db = firebase.database().ref('lyne_v120_omega');
        const Tst = Swal.mixin({ toast: true, position: 'top', timer: 2000, showConfirmButton: false, background: '#1c1c1e', color: '#fff' });

        let me = null, data = { games:{}, i:{}, mod:{}, settings:{comm:10} }, isR = false, tmpImg = "", activeChat = null;

        // ПРЯМОЙ ФИКС БЕСКОНЕЧНОЙ ЗАГРУЗКИ
        setTimeout(() => { if(!me) document.getElementById('loader').style.display = 'none'; }, 4000);

        function init() {
            const sid = localStorage.getItem('lyne_v120_sid');
            
            // Загружаем только необходимые ветки (Оптимизация для 5к человек)
            db.child('settings').on('value', s => { data.settings = s.val() || {comm:10}; render(); });
            db.child('games').on('value', g => { data.games = g.val() || {}; render(); });
            db.child('i').on('value', i => { data.i = i.val() || {}; render(); });
            
            if (sid) {
                db.child(`u/${sid}`).on('value', snap => {
                    me = snap.val();
                    if (!me) { logout(); return; }
                    document.getElementById('auth_scr').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('loader').style.display = 'none';
                    if(me.n?.toLowerCase() === 'owwner') {
                        document.getElementById('adm_btn').classList.remove('hidden');
                        db.child('mod').on('value', m => { data.mod = m.val() || {}; renderAdmin(); });
                    }
                    render();
                });
            } else {
                document.getElementById('auth_scr').classList.remove('hidden');
                document.getElementById('loader').style.display = 'none';
            }
        }

        function render() {
            if(!me) return;
            document.getElementById('h_bal').innerText = (me.bal || 0) + ' ₽';
            document.getElementById('h_ava').src = me.ava || '';
            document.getElementById('p_ava').src = me.ava || '';
            document.getElementById('p_n').innerText = me.n || 'User';
            document.getElementById('p_n').className = `text-2xl font-black ${me.style || ''}`;

            // Категории
            const games = Object.values(data.games);
            document.getElementById('cat_grid').innerHTML = games.map(g => `
                <div class="glass p-4 text-center" onclick="openGame('${g.id}')">
                    <img src="${g.img}" class="w-12 h-12 mx-auto mb-2 rounded-xl object-cover">
                    <p class="text-[10px] font-black uppercase">${g.name}</p>
                </div>`).join('');
            
            document.getElementById('s_game').innerHTML = games.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
        }

        function openGame(gid) {
            const game = data.games[gid];
            document.getElementById('cat_grid').classList.add('hidden');
            document.getElementById('subcat_view').classList.remove('hidden');
            const cats = Object.values(game.cats || {});
            document.getElementById('subcat_grid').innerHTML = cats.map(c => `
                <div class="glass p-4 text-center border border-blue-500/20" onclick="openSubCat('${gid}', '${c.name}')">
                    <b class="text-xs uppercase">${c.name}</b>
                </div>`).join('');
        }

        function openSubCat(gid, cname) {
            document.getElementById('subcat_view').classList.add('hidden');
            document.getElementById('items_view').classList.remove('hidden');
            const items = Object.values(data.i).filter(i => i.gameId === gid && i.cat === cname);
            document.getElementById('items_list').innerHTML = items.map(i => `
                <div class="glass p-4 flex gap-4">
                    <img src="${i.img}" class="w-16 h-16 rounded-xl object-cover">
                    <div class="flex-1">
                        <b class="text-sm block">${i.title}</b>
                        <p class="text-[10px] text-zinc-500 mb-2">${i.seller}</p>
                        <button onclick="buyItem('${i.id}')" class="bg-blue-600 px-4 py-1.5 rounded-lg text-xs font-black">${i.price} ₽</button>
                    </div>
                </div>`).join('') || '<p class="text-center py-8 text-zinc-500">Товаров пока нет</p>';
        }

        function postItem() {
            const gid = document.getElementById('s_game').value;
            const sub = document.getElementById('s_subcat').value;
            const t = document.getElementById('s_t').value, p = Number(document.getElementById('s_p').value);
            if(!gid || !t || p < 50 || !tmpImg) return Tst.fire({icon:'error', title:'Заполни всё'});
            
            const iid = 'm' + Date.now();
            db.child(`mod/${iid}`).set({ id:iid, sid:me.id, seller:me.n, title:t, price:p, gameId:gid, game:data.games[gid].name, cat:sub, acc_data:document.getElementById('s_acc').value, img:tmpImg });
            
            Tst.fire({icon:'success', title:'Отправлено на модерацию'});
            switchT('market');
        }

        function buyItem(iid) {
            const i = data.i[iid];
            if(me.bal < i.price) return Tst.fire({icon:'error', title:'Недостаточно средств'});
            const comm = data.settings.comm || 10;
            const sellerGet = Math.floor(i.price * (1 - comm/100));
            
            const did = 'd' + Date.now();
            db.child(`u/${me.id}/bal`).transaction(b => b - i.price);
            db.child(`u/${i.sid}/bal`).transaction(b => (b||0) + sellerGet);
            db.child(`d/${did}`).set({ id:did, bid:me.id, bn:me.n, sid:i.sid, sn:i.seller, t:i.title, p:i.price, acc:i.acc_data, status:'active' });
            db.child(`i/${iid}`).remove();
            Tst.fire({icon:'success', title:'Покупка успешна!'});
            switchT('chats');
        }

        function renderAdmin() {
            const mods = Object.values(data.mod || {});
            document.getElementById('ad_mod_list').innerHTML = mods.map(m => `
                <div class="glass p-3 flex items-center justify-between">
                    <div class="text-[10px]"><b>${m.title}</b><br>${m.seller}</div>
                    <div class="flex gap-2">
                        <button onclick="admApprove('${m.id}')" class="bg-green-600 p-2 rounded">✅</button>
                        <button onclick="db.child('mod/${m.id}').remove()" class="bg-red-600 p-2 rounded">🗑</button>
                    </div>
                </div>`).join('');
        }

        function admApprove(iid) {
            const item = data.mod[iid];
            db.child(`i/${iid}`).set(item);
            db.child(`mod/${iid}`).remove();
        }

        function calcComm() {
            const p = Number(document.getElementById('s_p').value);
            const c = data.settings?.comm || 10;
            document.getElementById('s_receive').innerText = p > 0 ? `Вы получите: ${Math.floor(p * (1 - c/100))} ₽` : "";
        }

        function upImg(input, tid) {
            const f = input.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const c = document.createElement('canvas'); const x = c.getContext('2d');
                    c.width = 400; c.height = 400; x.drawImage(img,0,0,400,400);
                    tmpImg = c.toDataURL('image/jpeg', 0.7);
                    document.getElementById(tid).innerHTML = `<img src="${tmpImg}" class="w-full h-full object-cover">`;
                }; img.src = e.target.result;
            }; r.readAsDataURL(f);
        }

        function handleAuth() {
            const n = document.getElementById('a_n').value.trim(), p = document.getElementById('a_p').value.trim();
            if (isR) {
                const tg = document.getElementById('r_tg').value.trim();
                if(!n || !p || !tg || !tmpImg) return Tst.fire({icon:'error', title:'Заполни всё'});
                const sid = 'u' + Date.now();
                db.child(`u/${sid}`).set({ id:sid, n, p, tg, ava:tmpImg, bal:0 }).then(() => {
                    localStorage.setItem('lyne_v120_sid', sid);
                    location.reload();
                });
            } else {
                db.child('u').once('value', s => {
                    const users = s.val() || {};
                    const found = Object.values(users).find(u => u.n === n && u.p === p);
                    if(found) { localStorage.setItem('lyne_v120_sid', found.id); location.reload(); }
                    else Tst.fire({icon:'error', title:'Неверные данные'});
                });
            }
        }

        function switchT(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.getElementById('tab_'+t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById('n_'+t)?.classList.add('active');
            if(t==='market') { document.getElementById('cat_grid').classList.remove('hidden'); document.getElementById('subcat_view').classList.add('hidden'); document.getElementById('items_view').classList.add('hidden'); }
        }

        function logout() { localStorage.clear(); location.reload(); }
        function toggleR() { isR = !isR; document.getElementById('reg_ext').classList.toggle('hidden', !isR); document.getElementById('a_btn').innerText = isR ? 'Создать аккаунт' : 'Войти'; }
        function closeCat() { document.getElementById('items_view').classList.add('hidden'); document.getElementById('subcat_view').classList.remove('hidden'); }
        function closeSubcat() { document.getElementById('subcat_view').classList.add('hidden'); document.getElementById('cat_grid').classList.remove('hidden'); }

        init();
    </script>
</body>
</html>
