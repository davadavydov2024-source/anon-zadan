<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK OFFICIAL | POWERED BY SSWCKK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Unbounded:wght@900&family=Press+Start+2P&family=Silkscreen&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #050505; --card: #121214; --blue: #007aff; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        
        /* Стили ников */
        .nick-rainbow { background: linear-gradient(90deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rb 3s linear infinite; background-size: 200%; font-weight: 900; }
        .nick-neon { color: #00f3ff; text-shadow: 0 0 10px #00f3ff, 0 0 20px #00f3ff; font-weight: 900; }
        @keyframes rb { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

        .glass { background: var(--card); border: 1px solid rgba(255,255,255,0.03); border-radius: 24px; backdrop-filter: blur(15px); }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px 16px 180px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Навигация */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(10,10,10,0.9); backdrop-filter: blur(25px); display: flex; border-top: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: #636366; transition: 0.3s; }
        .nav-btn.active { color: var(--blue); }
        
        .btn-main { background: var(--blue); color: white; padding: 18px; border-radius: 20px; font-weight: 900; text-transform: uppercase; width: 100%; transition: 0.2s; }
        .btn-main:active { transform: scale(0.96); }

        /* Иконка праздника */
        #holiday_icon { position: fixed; top: 20px; right: 20px; z-index: 2000; width: 50px; pointer-events: none; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .online-dot { width: 8px; height: 8px; background: #34c759; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px #34c759; }
    </style>
</head>
<body>

    <img id="holiday_icon" src="" class="hidden">

    <div id="auth_scr" class="fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-8">
        <h1 class="text-5xl font-black italic mb-12 tracking-tighter">LYNEOK<span class="text-blue-500">.</span></h1>
        <div class="w-full glass p-8 space-y-4">
            <div id="reg_ext" class="hidden"><input id="a_ava" type="file" class="hidden" onchange="upImg(this, 'l_ava')"><label for="a_ava" id="l_ava" class="w-20 h-20 bg-zinc-900 rounded-full mx-auto flex items-center justify-center border-2 border-dashed border-zinc-700 mb-4 cursor-pointer"><i class="fa-solid fa-camera"></i></label></div>
            <input id="a_n" placeholder="Никнейм (Уникальный)" class="w-full bg-zinc-900 p-4 rounded-xl border border-white/5">
            <input id="a_p" type="password" placeholder="Пароль" class="w-full bg-zinc-900 p-4 rounded-xl border border-white/5">
            <button onclick="auth()" id="a_btn" class="btn-main">Войти</button>
            <p onclick="toggleR()" id="a_tog" class="text-center text-[10px] font-black uppercase text-zinc-600 mt-4 cursor-pointer">Создать аккаунт</p>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-6 py-5 flex justify-between items-center border-b border-white/5">
            <b class="text-2xl font-black italic text-blue-500">LYNEOK</b>
            <div onclick="switchT('profile')" class="flex items-center gap-3 bg-white/5 px-4 py-2 rounded-full cursor-pointer">
                <span id="h_bal" class="font-black text-sm">0 ₽</span>
                <img id="h_ava" class="w-8 h-8 rounded-full object-cover">
            </div>
        </header>

        <main id="tab_market" class="tab-content active">
            <div id="promo_banner" class="hidden bg-blue-600/20 border border-blue-500/30 p-4 rounded-2xl mb-6 flex items-center gap-4">
                <i class="fa-solid fa-fire-flame-curved text-blue-500 text-2xl"></i>
                <div>
                    <p class="text-[10px] font-black uppercase text-blue-400">Акция от Админа!</p>
                    <p id="promo_text" class="text-xs font-bold">Бесплатное улучшение товара!</p>
                </div>
            </div>
            <h2 class="text-3xl font-black italic mb-6">Маркет</h2>
            <div id="m_grid" class="grid grid-cols-2 gap-4"></div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="glass p-8 text-center mb-6">
                <img id="p_ava" class="w-24 h-24 rounded-full mx-auto mb-4 border-4 border-zinc-900">
                <div class="flex items-center justify-center gap-2 mb-6">
                    <span id="p_n" class="text-2xl">...</span>
                    <span id="p_badge"></span>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <button class="bg-zinc-800 p-4 rounded-xl text-[10px] font-black uppercase">Пополнить</button>
                    <button class="bg-zinc-800 p-4 rounded-xl text-[10px] font-black uppercase">Вывод</button>
                </div>
                <button id="tg_connect_btn" onclick="connectTG()" class="hidden w-full bg-[#0088cc] p-4 rounded-xl text-[10px] font-black uppercase flex items-center justify-center gap-2">
                    <i class="fa-brands fa-telegram"></i> Подключить уведомления
                </button>
            </div>
            <button id="adm_btn" onclick="switchT('admin')" class="hidden w-full p-5 glass border-red-500/20 text-red-500 font-black uppercase mb-4 italic">Titan Control Panel</button>
            <button onclick="logout()" class="w-full text-zinc-600 font-black text-[10px] uppercase">Выйти из системы</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <h2 class="text-3xl font-black italic mb-8">TITAN <span class="text-red-500">CORE</span></h2>
            
            <section class="glass p-6 mb-6">
                <p class="text-[10px] font-black uppercase text-zinc-500 mb-4">Настройка Праздника</p>
                <select id="adm_holiday" class="w-full bg-zinc-900 p-4 rounded-xl mb-4 text-xs">
                    <option value="none">Нет праздника</option>
                    <option value="ny">Новый год 🎄</option>
                    <option value="easter">Пасха 🥚</option>
                    <option value="day67">День 67 🌀</option>
                    <option value="may">Майские 🍖</option>
                    <option value="bday_adm">ДР Админа 👑</option>
                    <option value="spring">Весна 🌸</option>
                    <option value="summer">Лето ☀️</option>
                    <option value="flies">День мух 🪰</option>
                    <option value="poop">День какашек 💩</option>
                    <option value="april">1 Апреля 🤡</option>
                    <option value="bday_lyneok">ДР Lyneok 💎</option>
                </select>
                <button onclick="setHoliday()" class="btn-main !py-3 !text-[10px]">Применить праздник</button>
            </section>

            <section class="glass p-6 mb-6">
                <p class="text-[10px] font-black uppercase text-zinc-500 mb-4">Акции и Лимиты</p>
                <div class="space-y-4">
                    <div class="flex items-center justify-between">
                        <span class="text-xs">Бесплатное улучшение</span>
                        <input type="checkbox" id="adm_promo_boost">
                    </div>
                    <input id="adm_boost_limit" type="number" placeholder="Лимит улучшений" class="w-full bg-zinc-900 p-3 rounded-xl text-xs">
                    
                    <div class="flex items-center justify-between">
                        <span class="text-xs">Акция на галочку</span>
                        <input type="checkbox" id="adm_promo_badge">
                    </div>
                    <input id="adm_badge_limit" type="number" placeholder="Лимит заявок на галочку" class="w-full bg-zinc-900 p-3 rounded-xl text-xs">
                    <button onclick="savePromos()" class="btn-main !py-3 !text-[10px]">Сохранить акции</button>
                </div>
            </section>

            <section class="glass p-6 mb-6">
                <p class="text-[10px] font-black uppercase text-zinc-500 mb-4">Telegram Бот</p>
                <input id="adm_bot_token" placeholder="Bot Token" class="w-full bg-zinc-900 p-3 rounded-xl mb-2 text-xs">
                <input id="adm_bot_id" placeholder="Твой TG ID" class="w-full bg-zinc-900 p-3 rounded-xl mb-4 text-xs">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-xs">Разрешить уведомления юзерам</span>
                    <input type="checkbox" id="adm_bot_active">
                </div>
                <button onclick="saveBot()" class="btn-main !py-3 !text-[10px]">Подключить бота</button>
            </section>

            <section class="glass p-6 mb-6">
                <p class="text-[10px] font-black uppercase text-zinc-500 mb-4">Пользователи</p>
                <input id="adm_u_search" oninput="renderAdmin()" placeholder="Поиск по нику..." class="w-full bg-zinc-900 p-3 rounded-xl mb-4 text-xs">
                <div id="adm_u_list" class="space-y-4"></div>
            </section>
        </main>

        <nav class="nav-bar">
            <div onclick="switchT('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-shop"></i><span>Маркет</span></div>
            <div onclick="switchT('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user"></i><span>Профиль</span></div>
        </nav>
    </div>

    <script>
        // Иконки праздников (Пиксельные)
        const HOLIDAYS = {
            ny: "https://i.ibb.co/L8y2v8y/pixel-tree.png",
            easter: "https://i.ibb.co/V9mH9nB/pixel-egg.png",
            day67: "https://i.ibb.co/6y4GfFm/pixel-vortex.png",
            may: "https://i.ibb.co/r7C8zM6/pixel-meat.png",
            bday_adm: "https://i.ibb.co/fC5Y66S/pixel-crown.png",
            spring: "https://i.ibb.co/kXZ9rD2/pixel-flower.png",
            summer: "https://i.ibb.co/QfH30P3/pixel-sun.png",
            flies: "https://i.ibb.co/v4KxW9B/pixel-fly.png",
            poop: "https://i.ibb.co/mBvL8YV/pixel-poop.png",
            april: "https://i.ibb.co/xS2kS2z/pixel-clown.png",
            bday_lyneok: "https://i.ibb.co/G9t0h6X/pixel-diamond.png"
        };

        // Настройка Firebase
        const config = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        firebase.initializeApp(config);
        const db = firebase.database().ref('lyneok_v125_final');

        let me = null, data = {}, isR = false, tmpImg = "";

        function init() {
            db.on('value', snap => {
                data = snap.val() || { u: {}, settings: { holiday: 'none', promos: {}, bot: {} } };
                const sid = localStorage.getItem('lyne_sid');
                
                if (sid && data.u[sid]) {
                    me = data.u[sid];
                    document.getElementById('auth_scr').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    db.child('u/'+me.id+'/lastSeen').set(Date.now());
                    render();
                } else {
                    document.getElementById('auth_scr').classList.remove('hidden');
                }
            });
        }

        function render() {
            document.getElementById('h_bal').innerText = (me.bal || 0) + ' ₽';
            document.getElementById('h_ava').src = me.ava;
            document.getElementById('p_ava').src = me.ava;
            
            const nEl = document.getElementById('p_n');
            nEl.innerText = me.n;
            nEl.className = `text-2xl ${me.style === 'rainbow' ? 'nick-rainbow' : me.style === 'neon' ? 'nick-neon' : ''}`;
            
            // Галочки
            const badges = ['', '🔵', '🟡', '🌈', '💎'];
            document.getElementById('p_badge').innerText = badges[me.badge || 0];

            // Праздник
            const hIcon = document.getElementById('holiday_icon');
            if (data.settings.holiday !== 'none') {
                hIcon.src = HOLIDAYS[data.settings.holiday];
                hIcon.classList.remove('hidden');
            } else hIcon.classList.add('hidden');

            // Акции
            const pb = document.getElementById('promo_banner');
            if (data.settings.promos?.boostActive) {
                pb.classList.remove('hidden');
                document.getElementById('promo_text').innerText = `Бесплатное улучшение (Осталось: ${data.settings.promos.boostLimit})`;
            } else pb.classList.add('hidden');

            // ТГ Кнопка
            if (data.settings.bot?.active) document.getElementById('tg_connect_btn').classList.remove('hidden');

            if (me.isAdmin) {
                document.getElementById('adm_btn').classList.remove('hidden');
                renderAdmin();
            }
        }

        function auth() {
            const n = document.getElementById('a_n').value.trim(), p = document.getElementById('a_p').value;
            if (!n || !p) return;

            if (isR) {
                // Проверка на уникальность ника
                const exists = Object.values(data.u).some(u => u.n.toLowerCase() === n.toLowerCase());
                if (exists) return Swal.fire('Ошибка', 'Этот ник уже занят!', 'error');

                const id = 'u' + Date.now();
                db.child('u/'+id).set({ id, n, p, ava: tmpImg || 'https://ui-avatars.com/api/?name='+n, bal: 0, isAdmin: n.toLowerCase() === 'sswckk' });
                localStorage.setItem('lyne_sid', id);
            } else {
                const user = Object.values(data.u).find(u => u.n === n && u.p === p);
                if (user) localStorage.setItem('lyne_sid', user.id);
                else Swal.fire('Ошибка', 'Неверные данные', 'error');
            }
        }

        // Админ-функции
        function renderAdmin() {
            const search = document.getElementById('adm_u_search').value.toLowerCase();
            const users = Object.values(data.u).filter(u => u.n.toLowerCase().includes(search));
            
            document.getElementById('adm_u_list').innerHTML = users.map(u => {
                const isOnline = (Date.now() - (u.lastSeen || 0)) < 60000;
                return `
                <div class="glass p-4">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-black uppercase">${isOnline ? '<span class="online-dot"></span>' : ''} ${u.n}</span>
                        <b class="text-blue-500 text-xs">${u.bal} ₽</b>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="admGiveAdmin('${u.id}')" class="bg-zinc-800 p-2 rounded text-[8px] uppercase">Админ: ${u.isAdmin?'ДА':'НЕТ'}</button>
                        <select onchange="admSetBadge('${u.id}', this.value)" class="bg-zinc-800 p-2 rounded text-[8px]">
                            <option>Галочка</option>
                            <option value="1">Blue</option>
                            <option value="2">Gold</option>
                            <option value="3">Rainbow</option>
                            <option value="4">Pixel</option>
                        </select>
                        <select onchange="admSetStyle('${u.id}', this.value)" class="bg-zinc-800 p-2 rounded text-[8px]">
                            <option>Стиль Ника</option>
                            <option value="none">Обычный</option>
                            <option value="rainbow">Радуга</option>
                            <option value="neon">Неон</option>
                        </select>
                    </div>
                    <button onclick="admMsg('${u.id}')" class="w-full mt-2 bg-blue-600/20 p-2 rounded text-[8px] uppercase font-black">Написать сообщение</button>
                </div>`;
            }).join('');
        }

        function setHoliday() {
            db.child('settings/holiday').set(document.getElementById('adm_holiday').value);
            Swal.fire('Готово', 'Праздник изменен!', 'success');
        }

        function savePromos() {
            db.child('settings/promos').update({
                boostActive: document.getElementById('adm_promo_boost').checked,
                boostLimit: Number(document.getElementById('adm_boost_limit').value),
                badgeActive: document.getElementById('adm_promo_badge').checked,
                badgeLimit: Number(document.getElementById('adm_badge_limit').value)
            });
        }

        function saveBot() {
            db.child('settings/bot').update({
                token: document.getElementById('adm_bot_token').value,
                adminId: document.getElementById('adm_bot_id').value,
                active: document.getElementById('adm_bot_active').checked
            });
        }

        async function admMsg(uid) {
            const { value: text } = await Swal.fire({ title: 'Сообщение юзеру', input: 'textarea' });
            if (text) {
                // Логика отправки (можно в БД или сразу в ТГ если подключен)
                sendTG(uid, `Админ написал вам: ${text}`);
            }
        }

        function admGiveAdmin(uid) {
            const u = data.u[uid];
            db.child(`u/${uid}/isAdmin`).set(!u.isAdmin);
        }

        function admSetBadge(uid, val) { db.child(`u/${uid}/badge`).set(Number(val)); }
        function admSetStyle(uid, val) { db.child(`u/${uid}/style`).set(val); }

        function sendTG(uid, text) {
            const bot = data.settings.bot;
            if (!bot?.token) return;
            const user = data.u[uid];
            if (!user?.tgId) return;
            fetch(`https://api.telegram.org/bot${bot.token}/sendMessage?chat_id=${user.tgId}&text=${encodeURIComponent(text)}`);
        }

        function connectTG() {
            Swal.fire({
                title: 'Подключение',
                text: 'Перейдите в нашего бота и отправьте ему свой ID',
                icon: 'info',
                footer: `Ваш ID для бота: ${me.id}`
            });
        }

        function switchT(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.getElementById('tab_'+t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById('n_'+t).classList.add('active');
        }

        function toggleR() { isR = !isR; document.getElementById('reg_ext').classList.toggle('hidden'); document.getElementById('a_btn').innerText = isR ? 'Создать' : 'Войти'; }
        function upImg(i, tid) { const r = new FileReader(); r.onload = e => { tmpImg = e.target.result; document.getElementById(tid).innerHTML = `<img src="${tmpImg}" class="w-full h-full object-cover rounded-full">`; }; r.readAsDataURL(i.files[0]); }
        function logout() { localStorage.clear(); location.reload(); }

        init();
    </script>
</body>
</html>
