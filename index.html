<!DOCTYPE html>
<html lang="ru">
<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

        body.theme-summer { --bg: #0b2e13; --blue: #ffcc00; background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2073&auto=format&fit=crop'); }
        body.theme-halloween { --bg: #1a0f00; --blue: #ff6600; background-image: url('https://images.unsplash.com/photo-1508361705456-d6f4b634877a?q=80&w=2070&auto=format&fit=crop'); }
        body.theme-spring { --bg: #2d1b2d; --blue: #ff85ff; background-image: url('https://images.unsplash.com/photo-1490750967868-88aa4486c946?q=80&w=2070&auto=format&fit=crop'); }
        body.theme-autumn { --bg: #2d1b1b; --blue: #d35400; background-image: url('https://images.unsplash.com/photo-1507722744111-703359846394?q=80&w=2070&auto=format&fit=crop'); }
        body.theme-easter { --bg: #1b2d2d; --blue: #00feba; background-image: url('https://images.unsplash.com/photo-1522336572018-ed27201bb747?q=80&w=2070&auto=format&fit=crop'); }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; background-size: cover; background-attachment: fixed; transition: 0.5s; }
        .glass { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 24px; backdrop-filter: blur(15px); }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px 16px 180px; scrollbar-width: none; }
        .tab-content::-webkit-scrollbar { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(10,10,10,0.9); backdrop-filter: blur(25px); display: flex; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #636366; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: 0.3s; } .nav-btn.active { color: var(--blue); transform: translateY(-2px); }
        input, textarea, select { background: var(--gray); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; color: white; width: 100%; outline: none; font-size: 14px; transition: 0.3s; } input:focus { border-color: var(--blue); }
        .btn-blue { background: var(--blue); color: white; border-radius: 18px; font-weight: 900; padding: 18px; width: 100%; border: none; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-style: italic; } 
        
        #loader { background: #000; z-index: 10000; position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .badge-rainbow { background: linear-gradient(45deg, red, orange, yellow, green, blue, indigo, violet); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rainbow_anim 3s linear infinite; background-size: 200%; }
        .nick-rainbow { background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rainbow_anim 3s linear infinite; background-size: 200%; font-weight: 900; }
        @keyframes rainbow_anim { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .online-dot { width:8px; height:8px; background:#34c759; border-radius:50%; display:inline-block; box-shadow:0 0 8px #34c759; }
        .item-boosted { border: 2px solid #eab308 !important; box-shadow: 0 0 15px rgba(234, 179, 8, 0.2); background: linear-gradient(180deg, rgba(234,179,8,0.1) 0%, transparent 100%); }
    </style>
    <style id="dynamic_styles"></style>
</head>
<body>

    <div id="auth_scr" class="hidden fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-8">
        <h1 id="auth_logo" class="text-5xl font-black mb-16 italic tracking-tighter">LYNEOK<span class="text-blue-500">.</span></h1>

                <input type="file" id="r_ava" class="hidden" accept="image/*" onchange="upImg(this, 'l_r_ava', true)">

            <div class="relative py-2"><div class="absolute inset-0 flex items-center"><span class="w-full border-t border-white/10"></span></div><div class="relative flex justify-center text-[10px] uppercase"><span class="bg-[#121214] px-2 text-zinc-500">Или</span></div></div>
            <button onclick="authGoogle()" class="w-full bg-white text-black py-4 rounded-2xl font-black text-xs uppercase flex items-center justify-center gap-3"><img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" class="w-4 h-4"> Войти через Google</button>
        </div>
    </div>

    <div id="google_setup_scr" class="hidden fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-8">
        <h2 class="text-3xl font-black italic mb-6 text-center">Создание<br><span class="text-blue-500">Профиля</span></h2>
        <div class="w-full glass p-8 space-y-4 text-center">
            <p class="text-[10px] text-zinc-400 uppercase mb-4">Настрой свой профиль LYNEOK</p>
            <input type="file" id="gs_ava" class="hidden" accept="image/*" onchange="upImg(this, 'l_gs_ava', true)">
            <label for="gs_ava" id="l_gs_ava" class="w-24 h-24 bg-zinc-900 mx-auto rounded-full flex items-center justify-center cursor-pointer border-2 border-dashed border-zinc-800 overflow-hidden mb-4"><img id="gs_ava_preview" class="w-full h-full object-cover"></label>
            <input id="gs_n" placeholder="Придумай Никнейм">

            <input type="hidden" id="gs_uid">
            <button onclick="finishGoogleSetup()" class="btn-blue mt-4">Завершить</button>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-6 py-5 flex justify-between items-center bg-black/60 backdrop-blur-xl border-b border-white/5 sticky top-0 z-50">
            <b id="main_logo" class="text-2xl italic tracking-tighter text-blue-500">LYNEOK</b>
            <div onclick="switchT('profile')" class="bg-white/5 px-4 py-2 rounded-2xl flex items-center gap-3 border border-white/5 cursor-pointer">
                <div class="text-right"><p class="text-[9px] uppercase font-black opacity-40">Баланс</p><span id="h_bal" class="font-black text-sm">0 ₽</span></div>
                <img id="h_ava" class="w-9 h-9 rounded-full object-cover bg-zinc-800">
            </div>
        </header>

        <main id="tab_market" class="tab-content active">
            <div id="market_main">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-black italic">Маркет</h2>
                    <select id="m_filter_price" onchange="render()" class="!p-2 !text-[10px] !w-24"><option value="all">Все цены</option><option value="0-500">до 500₽</option><option value="500-2000">500-2000₽</option><option value="2000+">2000₽+</option></select>
                </div>
                <div id="cat_grid" class="grid grid-cols-3 gap-3"></div> 
            </div>
            <div id="subcat_view" class="hidden space-y-6"><button onclick="closeSubcat()" class="text-blue-500 text-xs font-bold uppercase"><i class="fa-solid fa-chevron-left mr-1"></i> Назад</button><div id="subcat_grid" class="grid grid-cols-1 gap-3"></div></div>
            <div id="items_view" class="hidden space-y-6"><button onclick="closeCat()" class="text-blue-500 text-xs font-bold uppercase"><i class="fa-solid fa-chevron-left mr-1"></i> К категориям</button><div id="items_list" class="space-y-4"></div></div>
        </main>

        <main id="tab_sell" class="tab-content">
            <h2 class="text-3xl font-black mb-6 italic">Создать лот</h2>
            <div class="glass p-6 space-y-5">
                <input type="file" id="s_img" class="hidden" onchange="upImg(this, 'l_s_img', true)">
                <label for="s_img" id="l_s_img" class="w-full h-48 bg-zinc-900 rounded-3xl flex flex-col items-center justify-center border-2 border-dashed border-zinc-800 cursor-pointer"><i class="fa-solid fa-image text-3xl text-zinc-700"></i></label>
                <div class="grid grid-cols-2 gap-3"><select id="s_game" onchange="updateSubcatsSell()"></select><select id="s_subcat"></select></div>
                <input id="s_t" placeholder="Название">
                <textarea id="s_acc" rows="3" placeholder="Описание товара"></textarea>
                <div><input id="s_p" type="number" placeholder="Цена ₽ (от 70₽)" oninput="calcCom()"><p class="text-[9px] font-black uppercase text-zinc-500 mt-2">Комиссия (<span id="s_com_perc">0</span>%): <span id="s_com_val">0 ₽</span></p></div>
                <button onclick="postItem()" class="btn-blue">Опубликовать</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content">
            <h2 class="text-3xl font-black mb-6 italic">Сделки</h2>

        </main>

        <main id="tab_profile" class="tab-content">
            <div class="glass p-8 mb-6 text-center border border-white/5 relative">
                <img id="p_ava" class="w-28 h-28 mx-auto mb-6 rounded-full object-cover border-4 border-zinc-900 shadow-2xl">
                <div class="flex items-center justify-center gap-2 mb-4"><span id="p_n" class="text-3xl font-black">...</span><span id="p_badge"></span></div>
                <div class="grid grid-cols-2 gap-4"><button onclick="topUp()" class="bg-white text-black py-4 rounded-2xl font-black text-xs uppercase italic">Пополнить</button><button onclick="askOut()" class="bg-zinc-800 text-white py-4 rounded-2xl font-black text-xs uppercase italic">Вывести</button></div>
                
                <button onclick="openSupport()" class="w-full bg-blue-600/20 text-blue-400 py-4 rounded-2xl font-black text-[10px] uppercase mt-4 border border-blue-500/30"><i class="fa-solid fa-headset mr-2"></i>Служба Поддержки</button>
            </div>
            <button id="adm_btn" onclick="switchT('admin')" class="hidden w-full bg-red-600/10 text-red-500 py-5 rounded-3xl font-black mb-4 border border-red-600/20 uppercase text-xs italic"><i class="fa-solid fa-crown mr-2"></i>TITAN PANEL</button>
            <button onclick="logout()" class="w-full py-4 text-zinc-600 text-[10px] font-black uppercase">Выйти</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <h1 class="text-4xl font-black italic mb-8">TITAN <span class="text-red-500">SYSTEM</span></h1>
            
            <section class="glass p-6 mb-8 border-blue-500/20">
                <h3 class="text-[11px] font-black uppercase mb-4 text-blue-500">Чат Поддержки (Запросы)</h3>
                <div id="ad_support_list" class="space-y-3"></div>
            </section>

            <section class="glass p-6 mb-8 border-pink-500/20">
                <h3 class="text-[11px] font-black uppercase mb-4 text-pink-500">Управление Праздниками</h3>
                <select id="ad_holiday_sel" class="!py-3 !text-xs mb-3">
                    <option value="none">Нет</option><option value="ny">Новый год 🎄</option><option value="easter">Пасха 🥚</option><option value="summer">Лето ☀️</option>
                </select>
                <button onclick="admSetHoliday()" class="bg-pink-600 text-white font-black uppercase text-[10px] py-3 px-4 rounded-xl w-full">Применить</button>
            </section>
            
            <section class="glass p-6 mb-8 border-purple-500/20">
                <h3 class="text-[11px] font-black uppercase mb-4 text-purple-500">Модерация Товаров</h3>
                <div id="ad_mod_list" class="space-y-3"></div>
            </section>
        </main>

        <nav class="nav-bar">
            <div onclick="switchT('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-store text-xl"></i><span>Маркет</span></div>
            <div onclick="switchT('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-circle-plus text-xl"></i><span>Продать</span></div>
            <div onclick="switchT('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-receipt text-xl"></i><span>Сделки</span></div>
            <div onclick="switchT('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-id-card text-xl"></i><span>Профиль</span></div>
        </nav>
    </div>

    <div id="item_modal" class="hidden fixed inset-0 z-[10002] bg-black/98 overflow-y-auto">
        <div class="relative w-full aspect-square"><img id="im_img" class="w-full h-full object-cover"><button onclick="document.getElementById('item_modal').classList.add('hidden')" class="absolute top-8 right-8 text-3xl">&times;</button></div>
        <div class="p-8">
            <h1 id="im_title" class="text-4xl font-black italic mb-2"></h1>
            <span id="im_price" class="text-3xl text-blue-500 font-black mb-6 block"></span>
            <p id="im_desc" class="glass p-6 text-sm opacity-60 mb-6"></p>
            <button id="im_buy_btn" class="btn-blue mb-3">Купить</button>
        </div>
    </div>

    <div id="chat_modal" class="hidden fixed inset-0 z-[10005] bg-black flex flex-col">
        <header class="px-6 py-4 flex justify-between items-center bg-zinc-900 border-b border-white/5 shrink-0">
            <button onclick="closeChat()" class="text-blue-500 text-xs font-bold uppercase"><i class="fa-solid fa-chevron-left mr-1"></i> Назад</button>
            <div id="chat_actions" class="flex gap-2"></div>
        </header>
        <div id="chat_msgs" class="flex-1 overflow-y-auto p-4 space-y-3 flex flex-col"></div>
        <div class="p-4 bg-zinc-900 border-t border-white/5 flex gap-2 shrink-0 pb-safe">
            <input id="chat_input" placeholder="Сообщение..." class="!py-3 !rounded-xl">
            <button onclick="sendChatMsg()" class="bg-blue-600 text-white px-5 rounded-xl font-black uppercase text-[10px]"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const fList = ["Inter", "Comfortaa", "Press Start 2P"];
        const HOLIDAY_IMG = { ny: "https://i.ibb.co/L8y2v8y/pixel-tree.png", easter: "https://i.ibb.co/V9mH9nB/pixel-egg.png", summer: "https://i.ibb.co/QfH30P3/pixel-sun.png" };
        
        // Инициализация EmailJS
        emailjs.init("9M8GxYWeMi6hJP6Rg");

        firebase.initializeApp({ apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" });
        const db = firebase.database().ref('lyne_v122_titan');
        const Tst = Swal.mixin({ toast: true, position: 'top', timer: 2000, showConfirmButton: false, background: '#1c1c1e', color: '#fff' });

        let me = null, data = {}, isR = false, tmpImg = "", curG = null, curSub = null, activeChat = null;

        function init() {
            db.on('value', snap => {
                data = snap.val() || { u:{}, i:{}, d:{}, games:{}, chats:{}, settings:{com:5, holiday:"none"} };
                const sid = localStorage.getItem('lyne_v122_sid');
                document.getElementById('loader').style.display = 'none';
                
                if (sid && data.u && data.u[sid]) { me = data.u[sid]; db.child(`u/${me.id}/online`).set(Date.now()); }

                if (me) {
                    document.getElementById('auth_scr').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    if(me.isAdmin || me.n.toLowerCase() === 'sswckk') document.getElementById('adm_btn').classList.remove('hidden');
                    render();
                    if(activeChat) renderChatMsgs(); // Обновление чата в реальном времени
                } else { document.getElementById('auth_scr').classList.remove('hidden'); }
            });
        }

        // --- УВЕДОМЛЕНИЯ НА ПОЧТУ И В БОТА ---
        function notifyUser(uid, text) {
            const u = data.u[uid];
            if(u && u.email) {
                emailjs.send("service_ndr83sj", "template_q98pr7g", { to_email: u.email, message: text })
                .then(()=>console.log('Email sent to', u.email), e=>console.error('Email error', e));
            }
        }

        // --- GOOGLE AUTH & SETUP ---
        async function authGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await firebase.auth().signInWithPopup(provider);
                const user = result.user;
                const u = Object.values(data.u||{}).find(x => x.email === user.email || x.id === user.uid);
                
                if(u) {
                    localStorage.setItem('lyne_v122_sid', u.id); location.reload();
                } else {
                    document.getElementById('auth_scr').classList.add('hidden');
                    document.getElementById('google_setup_scr').classList.remove('hidden');
                    document.getElementById('gs_email').value = user.email;
                    document.getElementById('gs_uid').value = user.uid;
                    document.getElementById('gs_ava_preview').src = user.photoURL || "https://ui-avatars.com/api/?name=User";
                    tmpImg = user.photoURL; 
                }
            } catch(e) { console.error(e); Tst.fire({icon:'error', title:'Ошибка Google: ' + e.message}); }
        }

        function finishGoogleSetup() {
            const n = document.getElementById('gs_n').value.trim();
            const p = document.getElementById('gs_p').value;
            const email = document.getElementById('gs_email').value;
            const uid = document.getElementById('gs_uid').value;
            
            if(!n || !p) return Tst.fire({icon:'error', title:'Заполните все поля!'});
            const exists = Object.values(data.u||{}).find(x => x.n.toLowerCase() === n.toLowerCase());
            if(exists) return Swal.fire('Ошибка', 'Никнейм занят!', 'error');
            
            db.child(`u/${uid}`).set({id: uid, n, p, email, ava: tmpImg||'https://ui-avatars.com/api/?name='+n, bal:0, font:0, style:'none', badge:'none', isAdmin: false});
            localStorage.setItem('lyne_v122_sid', uid); location.reload();
        }

        // --- РЕНДЕР ПРИЛОЖЕНИЯ ---
        function render() {
            if(!me) return;
            document.getElementById('h_bal').innerText = (me.bal || 0) + ' ₽';
            document.getElementById('h_ava').src = me.ava;
            document.getElementById('p_ava').src = me.ava;
            document.getElementById('p_n').innerText = me.n;

            const hImg = document.getElementById('holiday_pixel');
            if(data.settings.holiday && data.settings.holiday !== 'none') { hImg.src = HOLIDAY_IMG[data.settings.holiday]; hImg.classList.remove('hidden'); } 
            else hImg.classList.add('hidden');

            if(!curG) {
                document.getElementById('cat_grid').innerHTML = Object.values(data.games || {}).map(g => `
                    <div class="glass p-3 text-center" onclick="openGame('${g.id}')">
                        <img src="${g.img}" class="w-12 h-12 mx-auto mb-2 rounded-2xl object-cover">
                        <b class="text-[9px] uppercase block truncate">${g.name}</b>
                    </div>`).join('');
            }

            const deals = Object.values(data.d || {}).filter(d => d.bid === me.id || d.sid === me.id).reverse();
            document.getElementById('deals_list').innerHTML = deals.map(d => `
                <div class="glass p-5 flex justify-between items-center cursor-pointer border border-white/5" onclick="openChat('${d.id}')">
                    <div><b class="text-sm">${d.t}</b><br><span class="text-[9px] opacity-60 uppercase">${d.status} | ${d.p}₽</span></div>
                    <i class="fa-solid fa-chevron-right text-zinc-600"></i>
                </div>`).join('');

            document.getElementById('s_game').innerHTML = Object.values(data.games || {}).map(g => `<option value="${g.id}">${g.name}</option>`).join('');
            if(me.isAdmin || me.n.toLowerCase() === 'sswckk') renderAdmin();
        }

        function renderAdmin() {
            const pendingItems = Object.values(data.i || {}).filter(i => i.mod === 'pending');
            document.getElementById('ad_mod_list').innerHTML = pendingItems.map(i => `
                <div class="glass p-3 flex justify-between items-center text-[10px]">
                    <span>${i.t} (${i.p}₽)</span>
                    <button onclick="db.child('i/${i.id}/mod').set('active')" class="text-green-500 font-bold">ОДОБРИТЬ</button>
                </div>`).join('');

            const supChats = Object.keys(data.chats || {}).filter(k => k.startsWith('support_'));
            document.getElementById('ad_support_list').innerHTML = supChats.map(k => `
                <div class="glass p-3 flex justify-between items-center text-[10px]" onclick="openChat('${k}')">
                    <span>Тикет от ${data.u[k.replace('support_','')]?.n || 'User'}</span>
                    <button class="text-blue-500 font-bold">ОТВЕТИТЬ</button>
                </div>`).join('') || '<p class="text-[10px] opacity-50">Нет тикетов</p>';
        }

        // --- ЛОГИКА ЖИВОГО ЧАТА ---
        function openChat(chatId) {
            activeChat = chatId;
            document.getElementById('chat_modal').classList.remove('hidden');
            
            const actions = document.getElementById('chat_actions');
            actions.innerHTML = '';
            
            if(!chatId.startsWith('support_')) {
                const d = data.d[chatId];
                if(d.status === 'Оплачено') {
                    if(d.bid === me.id) {
                        actions.innerHTML = `<button onclick="disputeDeal('${chatId}')" class="bg-red-600/20 text-red-500 px-3 py-2 rounded-xl text-[9px] font-black uppercase">Подать проблему</button>`;
                    } else if(d.sid === me.id) {
                        actions.innerHTML = `<button onclick="cancelDeal('${chatId}')" class="bg-yellow-600/20 text-yellow-500 px-3 py-2 rounded-xl text-[9px] font-black uppercase">Отменить сделку</button>`;
                    }
                }
            }
            renderChatMsgs();
        }

        function renderChatMsgs() {
            if(!activeChat) return;
            const msgs = Object.values(data.chats?.[activeChat]?.messages || {}).sort((a,b)=>a.time-b.time);
            const box = document.getElementById('chat_msgs');
            
            box.innerHTML = msgs.map(m => {
                const isMe = m.uid === me.id;
                const senderName = m.uid === 'AI' ? 'ИИ Поддержка' : (m.uid === 'system' ? 'Система' : data.u[m.uid]?.n);
                return `
                <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                    <span class="text-[8px] opacity-40 mb-1">${senderName}</span>
                    <div class="p-3 rounded-2xl max-w-[80%] text-sm ${isMe ? 'bg-blue-600 rounded-br-sm' : 'bg-zinc-800 rounded-bl-sm'}">
                        ${m.text}
                    </div>
                </div>`;
            }).join('');
            box.scrollTop = box.scrollHeight;
        }

        function sendChatMsg() {
            const inp = document.getElementById('chat_input');
            const text = inp.value.trim();
            if(!text || !activeChat) return;
            
            const msgId = 'm'+Date.now();
            db.child(`chats/${activeChat}/messages/${msgId}`).set({ uid: me.id, text: text, time: Date.now() });
            inp.value = '';

            // AI ПОДДЕРЖКА ПО КЛЮЧЕВЫМ СЛОВАМ
            if(activeChat.startsWith('support_') && !me.isAdmin) {
                const tLow = text.toLowerCase();
                let aiReply = '';
                if(tLow.includes('как купить') || tLow.includes('купить')) aiReply = "Чтобы купить товар, выберите нужную игру в Маркете, нажмите на лот и кнопку 'Купить'. Деньги спишутся с баланса, а в разделе 'Сделки' появится чат с продавцом.";
                else if(tLow.includes('как продать') || tLow.includes('создать лот')) aiReply = "Для продажи перейдите во вкладку 'Продать', загрузите скриншот, укажите данные и цену. После модерации товар появится в маркете.";
                else if(tLow.includes('проблема') || tLow.includes('обман')) aiReply = "Если вас обманули в сделке, нажмите 'Подать проблему' в чате сделки. Администратор подключится и решит вопрос.";
                else if(tLow.includes('вывод') || tLow.includes('пополнить')) aiReply = "Управление балансом доступно во вкладке 'Профиль'. Вывод от 509₽.";
                
                if(aiReply) {
                    setTimeout(() => { db.child(`chats/${activeChat}/messages/m${Date.now()}`).set({ uid: 'AI', text: aiReply, time: Date.now() }); }, 1000);
                }
            }
        }

        function closeChat() { activeChat = null; document.getElementById('chat_modal').classList.add('hidden'); }

        // --- ЛОГИКА ЖАЛОБ И ОТМЕН ---
        function disputeDeal(did) {
            const d = data.d[did];
            db.child(`d/${did}/status`).set('Спор');
            db.child(`chats/${did}/messages/sys${Date.now()}`).set({ uid: 'system', text: `🚨 ПОКУПАТЕЛЬ ПОДАЛ ЖАЛОБУ! Ожидайте администратора.`, time: Date.now() });
            notifyUser(d.sid, `Проблема в сделке: ${d.t}. Покупатель подал жалобу.`);
            notifyUser(d.bid, `Жалоба на сделку ${d.t} зарегистрирована.`);
            Tst.fire({icon:'success', title:'Жалоба отправлена'}); openChat(did);
        }

        function cancelDeal(did) {
            const d = data.d[did];
            const buyerBal = data.u[d.bid]?.bal || 0;
            db.child(`u/${d.bid}/bal`).set(buyerBal + d.p); // Возврат денег
            db.child(`d/${did}/status`).set('Отменена');
            db.child(`chats/${did}/messages/sys${Date.now()}`).set({ uid: 'system', text: `❌ ПРОДАВЕЦ ОТМЕНИЛ СДЕЛКУ. Деньги (${d.p}₽) возвращены покупателю.`, time: Date.now() });
            db.child(`i/${d.iid}/sold`).set(false); // Товар возвращается
            notifyUser(d.bid, `Сделка "${d.t}" отменена продавцом. ${d.p}₽ возвращены вам на баланс.`);
            Tst.fire({icon:'success', title:'Сделка отменена'}); openChat(did);
        }

        function openSupport() { const cid = 'support_' + me.id; openChat(cid); }

        // --- ОПЕРАЦИИ С БАЛАНСОМ & ПОКУПКИ ---
        function topUp() { notifyUser(me.id, "Заявка на пополнение отправлена."); Swal.fire('Пополнение', 'Функция оплаты (тест)', 'info'); }
        function askOut() { notifyUser(me.id, "Заявка на вывод средств создана."); Swal.fire('Вывод', 'Заявка создана', 'info'); }

        function buyItem(id) { 
            const i = data.i[id]; 
            if(me.bal < i.p) return Tst.fire({icon:'error', title:'Нет денег'}); 
            db.child(`u/${me.id}/bal`).set(me.bal - i.p); 
            db.child(`i/${id}/sold`).set(true); 
            const did = 'd'+Date.now();
            db.child(`d/${did}`).set({id:did, iid:id, sid:i.sid, bid:me.id, t:i.t, p:i.p, status:'Оплачено', time:Date.now()}); 
            db.child(`chats/${did}/messages/sys1`).set({uid:'system', text:'Сделка начата. Общайтесь здесь.', time:Date.now()});
            notifyUser(i.sid, `У вас купили товар "${i.t}" за ${i.p}₽! Перейдите в сделки.`);
            notifyUser(me.id, `Вы успешно купили "${i.t}".`);
            Tst.fire({icon:'success', title:'Куплено!'}); document.getElementById('item_modal').classList.add('hidden'); 
        }

        function postItem() {
            const t=document.getElementById('s_t').value, p=Number(document.getElementById('s_p').value);
            if(t && p>=70 && tmpImg) {
                const id='i'+Date.now();
                db.child(`i/${id}`).set({id, t, p, sid:me.id, img:tmpImg, desc:document.getElementById('s_acc').value, game:document.getElementById('s_game').value, sub:document.getElementById('s_subcat').value, sold:false, mod:'pending', boosted:false});
                Tst.fire({icon:'success', title:'На модерации'}); switchT('market');
            }
        }

        // --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ---
        function admSetHoliday() { db.child('settings/holiday').set(document.getElementById('ad_holiday_sel').value); Tst.fire({icon:'success', title:'Праздник обновлен'}); }
        function upImg(i, tid, set) { const r=new FileReader(); r.onload=e=>{ tmpImg=e.target.result; if(set) document.getElementById(tid).innerHTML=`<img src="${tmpImg}" class="w-full h-full object-cover rounded-[inherit]">`; }; if(i.files[0]) r.readAsDataURL(i.files[0]); }
        function handleAuth() { 
            const n=document.getElementById('a_n').value.trim(), p=document.getElementById('a_p').value; 
            if(!n||!p) return; 
            if(isR) { 
                const exists = Object.values(data.u||{}).find(x => x.n.toLowerCase() === n.toLowerCase());
                if(exists) return Swal.fire('Ошибка', 'Этот никнейм уже занят!', 'error');
                const id='u'+Date.now(); 
                db.child(`u/${id}`).set({id, n, p, ava:tmpImg||'https://ui-avatars.com/api/?name='+n, bal:0, font:0, style:'none', badge:'none', isAdmin:n.toLowerCase()==='owwner' || n.toLowerCase()==='sswckk'}); 
                localStorage.setItem('lyne_v122_sid', id); location.reload(); 
            } else { 
                const u=Object.values(data.u||{}).find(x=>x.n.toLowerCase()===n.toLowerCase() && x.p===p); 
                if(u) { localStorage.setItem('lyne_v122_sid', u.id); location.reload(); } else { Swal.fire('Ошибка', 'Неверный ник или пароль', 'error'); } 
            } 
        }

        function switchT(t) { document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active')); document.getElementById('tab_'+t).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active')); document.getElementById('n_'+t).classList.add('active'); }
        function toggleR() { isR=!isR; document.getElementById('reg_ext').classList.toggle('hidden'); document.getElementById('a_btn').innerText=isR?'Создать':'Войти'; }
        function logout() { localStorage.clear(); location.reload(); }
        function openGame(gid) { curG=gid; document.getElementById('market_main').classList.add('hidden'); document.getElementById('subcat_view').classList.remove('hidden'); document.getElementById('subcat_grid').innerHTML = Object.values(data.games[gid]?.sub||{}).map(s=>`<div onclick="openSub('${s.id}')" class="glass p-5 uppercase font-black italic text-xs">${s.n}</div>`).join(''); }
        function openSub(sid) { curSub=sid; document.getElementById('subcat_view').classList.add('hidden'); document.getElementById('items_view').classList.remove('hidden'); renderItems(); }
        function renderItems() { let its = Object.values(data.i||{}).filter(x=>x.game===curG && x.mod==='active' && !x.sold); document.getElementById('items_list').innerHTML = its.map(i=>`<div onclick="showItem('${i.id}')" class="glass p-5 flex justify-between items-center"><b class="truncate pr-4">${i.t}</b><span class="whitespace-nowrap font-black">${i.p}₽</span></div>`).join(''); }
        function showItem(id) { const i = data.i[id]; document.getElementById('im_img').src=i.img; document.getElementById('im_title').innerText=i.t; document.getElementById('im_price').innerText=i.p+' ₽'; document.getElementById('im_desc').innerText=i.desc; document.getElementById('im_buy_btn').onclick=()=>buyItem(id); document.getElementById('item_modal').classList.remove('hidden'); }
        function closeSubcat() { document.getElementById('subcat_view').classList.add('hidden'); document.getElementById('market_main').classList.remove('hidden'); curG=null; }
        function closeCat() { document.getElementById('items_view').classList.add('hidden'); document.getElementById('subcat_view').classList.remove('hidden'); }
        function calcCom() { const p=Number(document.getElementById('s_p').value); const c=data.settings.com||5; document.getElementById('s_com_perc').innerText=c; document.getElementById('s_com_val').innerText=(p*(c/100)).toFixed(0)+' ₽'; }
        function updateSubcatsSell() { const g=document.getElementById('s_game').value; if(data.games[g]) document.getElementById('s_subcat').innerHTML=Object.values(data.games[g].sub||{}).map(s=>`<option value="${s.id}">${s.n}</option>`).join(''); }

        init();
    </script>
</body>
</html>
