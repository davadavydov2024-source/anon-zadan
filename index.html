<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK TITAN V122 | MEGA FIXED & EXPANDED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-analytics-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Russo+One&family=Unbounded:wght@900&display=swap" rel="stylesheet">
    <style> 
        :root { --bg: #050505; --card: #121214; --text: #ffffff; --blue: #007aff; --gray: #1c1c1e; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .glass { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 24px; }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px 16px 180px; scrollbar-width: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(10,10,10,0.9); backdrop-filter: blur(25px); display: flex; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #636366; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: 0.3s; } 
        .nav-btn.active { color: var(--blue); transform: translateY(-2px); }
        input, textarea, select { background: var(--gray); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; color: white; width: 100%; outline: none; font-size: 14px; transition: 0.3s; }
        .btn-blue { background: var(--blue); color: white; border-radius: 18px; font-weight: 900; padding: 18px; width: 100%; border: none; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        #loader { background: #000; z-index: 10000; position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ad-banner { background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.8)), var(--ad-bg); background-size: cover; background-position: center; }
    </style>
</head>
<body>
    <div id="loader"><div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div><p class="mt-4 text-[10px] font-bold uppercase tracking-widest opacity-40">Loading Titan System...</p></div>

    <div id="maintenance_scr" class="hidden fixed inset-0 z-[20000] bg-black flex flex-col items-center justify-center p-8 text-center">
        <div class="w-20 h-20 bg-yellow-500/10 rounded-full flex items-center justify-center mb-6 border border-yellow-500/20 animate-pulse">
            <i class="fa-solid fa-screwdriver-wrench text-3xl text-yellow-500"></i>
        </div>
        <h1 id="maint_title" class="text-3xl font-black italic uppercase text-white mb-2">Тех. перерыв</h1>
        <div id="maint_timer" class="text-2xl font-mono text-yellow-500 mb-6 bg-white/5 px-6 py-2 rounded-2xl border border-white/5">00:00:00</div>
        <div id="maint_texts" class="space-y-2 mb-8 opacity-60 text-xs font-medium max-w-xs"></div>
        <div id="maint_btns" class="w-full max-w-xs"></div>
    </div>

    <div id="auth_scr" class="hidden fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-8">
        <h1 class="text-5xl font-black mb-16 italic tracking-tighter">LYNEOK<span class="text-blue-500">.</span></h1>
        <div class="w-full glass p-8 space-y-4">
            <div id="reg_ext" class="hidden space-y-4">
                <input type="file" id="r_ava" class="hidden" accept="image/*" onchange="upImg(this, 'l_r_ava')">
                <label for="r_ava" id="l_r_ava" class="w-24 h-24 bg-zinc-900 mx-auto rounded-full flex items-center justify-center cursor-pointer border-2 border-dashed border-zinc-800"><i class="fa-solid fa-camera text-zinc-600"></i></label>
            </div>
            <input id="a_n" placeholder="Никнейм">
            <input id="a_p" type="password" placeholder="Пароль">
            <button onclick="handleAuth()" id="a_btn" class="btn-blue">Войти</button>
            <p onclick="toggleR()" id="a_tog" class="text-center text-[10px] font-black text-zinc-500 uppercase cursor-pointer pt-4">Создать аккаунт</p>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-6 py-5 flex justify-between items-center bg-black/60 backdrop-blur-xl border-b border-white/5 sticky top-0 z-50">
            <b class="text-2xl italic tracking-tighter text-blue-500">LYNEOK</b>
            <div onclick="switchT('profile')" class="bg-white/5 px-4 py-2 rounded-2xl flex items-center gap-3 border border-white/5 cursor-pointer">
                <div class="text-right"><p class="text-[9px] uppercase font-black opacity-40">Баланс</p><span id="h_bal" class="font-black text-sm">0 ₽</span></div>
                <img id="h_ava" class="w-9 h-9 rounded-full object-cover bg-zinc-800">
            </div>
        </header>

        <main id="tab_market" class="tab-content active">
            <div id="ad_slider" class="mb-8 space-y-4"></div>
            <div id="market_main">
                <h2 class="text-3xl font-black italic mb-6">Маркет</h2>
                <div id="cat_grid" class="grid grid-cols-3 gap-3"></div>
            </div>
            <div id="subcat_view" class="hidden space-y-4">
                <button onclick="closeSubcat()" class="text-blue-500 text-[10px] font-black uppercase mb-4"><i class="fa-solid fa-arrow-left mr-2"></i>Назад</button>
                <div id="subcat_grid" class="grid grid-cols-1 gap-2"></div>
            </div>
            <div id="items_view" class="hidden space-y-4">
                <button onclick="closeCat()" class="text-blue-500 text-[10px] font-black uppercase mb-4"><i class="fa-solid fa-arrow-left mr-2"></i>К подкатегориям</button>
                <div id="items_list" class="space-y-3"></div>
            </div>
        </main>

        <main id="tab_sell" class="tab-content">
            <h2 class="text-3xl font-black mb-6 italic">Создать лот</h2>
            <div class="glass p-6 space-y-4">
                <input type="file" id="s_img" class="hidden" onchange="upImg(this, 'l_s_img')">
                <label for="s_img" id="l_s_img" class="w-full h-40 bg-zinc-900 rounded-2xl flex flex-col items-center justify-center border-dashed border border-zinc-700 cursor-pointer"><i class="fa-solid fa-image mb-2"></i><span class="text-[9px] font-black uppercase opacity-40">Фото товара</span></label>
                <div class="grid grid-cols-2 gap-2"><select id="s_game" onchange="updateSubcatsSell()"></select><select id="s_subcat"></select></div>
                <input id="s_t" placeholder="Название">
                <textarea id="s_acc" rows="3" placeholder="Описание товара"></textarea>
                <input id="s_p" type="number" placeholder="Цена ₽" oninput="calcCom()">
                <button onclick="postItem()" class="btn-blue">Опубликовать</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content">
            <h2 class="text-3xl font-black mb-6 italic">Сделки</h2>
            <div id="deals_list" class="space-y-3"></div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="glass p-8 text-center border-white/5 mb-6">
                <img id="p_ava" class="w-24 h-24 mx-auto mb-4 rounded-full object-cover">
                <h3 id="p_n" class="text-2xl font-black mb-6">...</h3>
                <div class="grid grid-cols-2 gap-3"><button onclick="topUp()" class="bg-white text-black py-4 rounded-xl font-black text-[10px] uppercase">Пополнить</button><button onclick="askOut()" class="bg-zinc-800 text-white py-4 rounded-xl font-black text-[10px] uppercase">Вывести</button></div>
            </div>
            <button id="adm_btn" onclick="switchT('admin')" class="hidden w-full bg-red-600/10 text-red-500 py-4 rounded-2xl font-black mb-4 border border-red-600/20 uppercase text-xs tracking-widest italic">TITAN PANEL</button>
            <button onclick="logout()" class="w-full text-zinc-600 text-[10px] font-black uppercase">Выйти</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <h1 class="text-4xl font-black italic mb-8">TITAN <span class="text-red-500">PANEL</span></h1>
            
            <section class="glass p-6 mb-6 border-yellow-500/20">
                <h3 class="text-[10px] font-black text-yellow-500 uppercase mb-4 tracking-widest">Управление тех. перерывом</h3>
                <div class="space-y-4">
                    <label class="flex items-center justify-between bg-black/40 p-4 rounded-xl">
                        <span class="text-[10px] font-black uppercase">Активен для всех</span>
                        <input type="checkbox" id="ad_maint_active" class="w-6 h-6">
                    </label>
                    <label class="flex items-center justify-between bg-black/40 p-4 rounded-xl">
                        <span class="text-[10px] font-black uppercase">Игнорировать (Я Админ)</span>
                        <input type="checkbox" id="ad_maint_ignore_me" class="w-6 h-6">
                    </label>
                    
                    <div class="grid grid-cols-3 gap-2">
                        <div><p class="text-[8px] uppercase mb-1 opacity-40 ml-2">Дней</p><input id="ad_maint_d" type="number" value="0" class="!py-2 !text-center"></div>
                        <div><p class="text-[8px] uppercase mb-1 opacity-40 ml-2">Часов</p><input id="ad_maint_h" type="number" value="0" class="!py-2 !text-center"></div>
                        <div><p class="text-[8px] uppercase mb-1 opacity-40 ml-2">Минут</p><input id="ad_maint_m" type="number" value="30" class="!py-2 !text-center"></div>
                    </div>

                    <input id="ad_maint_title" placeholder="Заголовок" class="!py-3 !text-xs">
                    <textarea id="ad_maint_texts" placeholder="Текст (через запятую)" class="!py-3 !text-xs"></textarea>
                    <button onclick="admSaveMaint()" class="btn-blue !bg-yellow-600 !py-3 !text-[10px]">Обновить статус работ</button>
                </div>
            </section>

            <section id="ad_users" class="space-y-4"></section>
        </main>

        <nav class="nav-bar">
            <div onclick="switchT('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-store text-xl"></i><span>Маркет</span></div>
            <div onclick="switchT('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-circle-plus text-xl"></i><span>Продать</span></div>
            <div onclick="switchT('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-receipt text-xl"></i><span>Сделки</span></div>
            <div onclick="switchT('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-id-card text-xl"></i><span>Профиль</span></div>
        </nav>
    </div>

    <script>
        // ИСПРАВЛЕННЫЙ КОНФИГ И ИНИЦИАЛИЗАЦИЯ
        const firebaseConfig = {
            apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
            authDomain: "dogx-base.firebaseapp.com",
            databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
            projectId: "dogx-base",
            storageBucket: "dogx-base.firebasestorage.app",
            messagingSenderId: "81713249793",
            appId: "1:81713249793:web:1b44a13e6faf5acfa78a00",
            measurementId: "G-HDQEQRGLTK"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('lyne_titan_v122');
        const Tst = Swal.mixin({ toast: true, position: 'top', timer: 2000, showConfirmButton: false, background: '#1c1c1e', color: '#fff' });

        let me = null, data = {}, isR = false, tmpImg = "", curG = null, maintInterval = null;

        function init() {
            db.on('value', snap => {
                data = snap.val() || { u:{}, i:{}, d:{}, games:{}, settings:{com:0, maint:{active:false, until:0, ignoreAdmins:false}}, ads:{} };
                document.getElementById('loader').style.display = 'none';
                
                const sid = localStorage.getItem('lyne_v122_sid');
                if (sid && data.u[sid]) {
                    me = data.u[sid];
                    
                    // ПРОВЕРКА ТЕХ ПЕРЕРЫВА
                    const isMaint = data.settings?.maint?.active;
                    const isExpired = Date.now() > (data.settings?.maint?.until || 0);
                    const canIgnore = data.settings?.maint?.ignoreAdmins && me.n.toLowerCase() === 'owwner';

                    if (isMaint && !isExpired && !canIgnore) {
                        renderMaintenanceScreen();
                    } else {
                        document.getElementById('maintenance_scr').classList.add('hidden');
                        document.getElementById('app').classList.remove('hidden');
                        document.getElementById('auth_scr').classList.add('hidden');
                        if(me.n.toLowerCase() === 'owwner') document.getElementById('adm_btn').classList.remove('hidden');
                        render();
                    }
                } else {
                    document.getElementById('auth_scr').classList.remove('hidden');
                    document.getElementById('app').classList.add('hidden');
                }
            });
        }

        // ТАЙМЕР И ЭКРАН ТЕХ РАБОТ
        function renderMaintenanceScreen() {
            document.getElementById('app').classList.add('hidden');
            document.getElementById('maintenance_scr').classList.remove('hidden');
            const m = data.settings.maint;
            document.getElementById('maint_title').innerText = m.title || 'ТЕХНИЧЕСКИЙ ПЕРЕРЫВ';
            document.getElementById('maint_texts').innerHTML = (m.texts || []).map(t => `<p>${t.trim()}</p>`).join('');
            
            if (maintInterval) clearInterval(maintInterval);
            maintInterval = setInterval(() => {
                const diff = m.until - Date.now();
                if (diff <= 0) {
                    clearInterval(maintInterval);
                    location.reload();
                    return;
                }
                const h = Math.floor(diff / 3600000);
                const min = Math.floor((diff % 3600000) / 60000);
                const sec = Math.floor((diff % 60000) / 1000);
                document.getElementById('maint_timer').innerText = `${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
            }, 1000);
        }

        function admSaveMaint() {
            const d = Number(document.getElementById('ad_maint_d').value) || 0;
            const h = Number(document.getElementById('ad_maint_h').value) || 0;
            const m = Number(document.getElementById('ad_maint_m').value) || 0;
            
            const durationMs = (d * 86400000) + (h * 3600000) + (m * 60000);
            const until = Date.now() + durationMs;

            const maint = {
                active: document.getElementById('ad_maint_active').checked,
                ignoreAdmins: document.getElementById('ad_maint_ignore_me').checked,
                until: until,
                title: document.getElementById('ad_maint_title').value || 'Технический перерыв',
                texts: document.getElementById('ad_maint_texts').value.split(',')
            };

            db.child('settings/maint').set(maint);
            Tst.fire({icon:'success', title:'Настройки тех.работ сохранены'});
        }

        function render() {
            document.getElementById('h_bal').innerText = me.bal.toLocaleString() + ' ₽';
            document.getElementById('h_ava').src = me.ava;
            document.getElementById('p_ava').src = me.ava;
            document.getElementById('p_n').innerText = me.n;

            if(!curG) {
                document.getElementById('cat_grid').innerHTML = Object.values(data.games || {}).map(g => `
                    <div class="glass p-3 text-center active:scale-95 transition" onclick="openGame('${g.id}')">
                        <img src="${g.img}" class="w-10 h-10 mx-auto mb-2 rounded-xl object-cover">
                        <b class="text-[8px] uppercase font-black block truncate">${g.name}</b>
                    </div>`).join('');
            }
        }

        function handleAuth() {
            const n = document.getElementById('a_n').value.trim();
            const p = document.getElementById('a_p').value.trim();
            if(!n || !p) return Tst.fire({icon:'warning', title:'Заполни все поля'});

            if(isR) {
                const id = 'u' + Date.now();
                const newUser = { id, n, p, ava: tmpImg || 'https://ui-avatars.com/api/?name='+n, bal: 0 };
                db.child(`u/${id}`).set(newUser);
                localStorage.setItem('lyne_v122_sid', id);
                location.reload();
            } else {
                const u = Object.values(data.u).find(x => x.n.toLowerCase() === n.toLowerCase() && x.p === p);
                if(u) {
                    localStorage.setItem('lyne_v122_sid', u.id);
                    location.reload();
                } else {
                    Tst.fire({icon:'error', title:'Неверные данные'});
                }
            }
        }

        function toggleR() { isR = !isR; document.getElementById('reg_ext').classList.toggle('hidden'); document.getElementById('a_btn').innerText = isR ? 'Создать' : 'Войти'; }
        function switchT(t) { 
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.getElementById('tab_'+t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById('n_'+t)?.classList.add('active');
        }
        function upImg(input, targetId) {
            const reader = new FileReader();
            reader.onload = e => {
                tmpImg = e.target.result;
                document.getElementById(targetId).innerHTML = `<img src="${tmpImg}" class="w-full h-full object-cover rounded-full">`;
            };
            if(input.files[0]) reader.readAsDataURL(input.files[0]);
        }
        function logout() { localStorage.clear(); location.reload(); }

        init();
    </script>
</body>
</html>
