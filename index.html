<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK TITAN V122 | MEGA FIXED & EXPANDED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Bungee+Shade&family=Rubik+Glitch&family=Silkscreen&display=swap" rel="stylesheet">
    <style> 
        :root { --bg: #050505; --card: #121214; --text: #ffffff; --blue: #007aff; --gray: #1c1c1e; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .glass { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 24px; }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px 16px 180px; scrollbar-width: none; }
        .tab-content::-webkit-scrollbar { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(10,10,10,0.9); backdrop-filter: blur(25px); display: flex; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #636366; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: 0.3s; } 
        .nav-btn.active { color: var(--blue); transform: translateY(-2px); }
        input, textarea, select { background: var(--gray); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; color: white; width: 100%; outline: none; font-size: 14px; transition: 0.3s; } 
        input:focus { border-color: var(--blue); }
        .btn-blue { background: var(--blue); color: white; border-radius: 18px; font-weight: 900; padding: 18px; width: 100%; border: none; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-style: italic; }
        #loader { background: #000; z-index: 10000; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
        .ad-banner { background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.8)), var(--ad-bg); background-size: cover; background-position: center; }
    </style>
    <style id="dynamic_styles"></style>
</head>
<body>
    <div id="loader"><div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>

    <div id="maintenance_scr" class="hidden fixed inset-0 z-[20000] bg-black flex flex-col items-center justify-center p-8 text-center overflow-y-auto">
        <div class="mb-6"><i class="fa-solid fa-screwdriver-wrench text-6xl text-yellow-500 animate-pulse"></i></div>
        <h1 id="maint_title" class="text-4xl font-black italic uppercase text-yellow-500 mb-4 tracking-tighter">ТЕХНИЧЕСКИЙ ПЕРЕРЫВ</h1>
        <div id="maint_timer" class="mb-8 p-4 bg-yellow-500/10 border border-yellow-500/20 rounded-3xl hidden">
            <p class="text-[10px] uppercase font-black opacity-40 mb-2 text-white">До окончания осталось:</p>
            <div id="timer_display" class="flex gap-3 justify-center font-mono text-2xl font-bold text-white">00д 00ч 00м 00с</div>
        </div>
        <div id="maint_texts" class="space-y-2 mb-8 opacity-70 text-sm font-medium text-white"></div>
        <div id="maint_btns" class="flex flex-col gap-3 w-full max-w-xs"></div>
    </div>

    <div id="auth_scr" class="hidden fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-8">
        <h1 class="text-5xl font-black mb-16 italic tracking-tighter">LYNEOK<span class="text-blue-500">.</span></h1>
        <div class="w-full glass p-8 space-y-4">
            <div id="reg_ext" class="hidden space-y-4">
                <input type="file" id="r_ava" class="hidden" accept="image/*" onchange="upImg(this, 'l_r_ava', true)">
                <label for="r_ava" id="l_r_ava" class="w-24 h-24 bg-zinc-900 mx-auto rounded-full flex items-center justify-center cursor-pointer border-2 border-dashed border-zinc-800"><i class="fa-solid fa-camera text-zinc-600 text-xl"></i></label>
                <input id="r_email" type="email" placeholder="Email (необяз.)">
            </div>
            <input id="a_n" placeholder="Никнейм">
            <input id="a_p" type="password" placeholder="Пароль">
            <button onclick="handleAuth()" id="a_btn" class="btn-blue">Войти</button>
            <p onclick="toggleR()" id="a_tog" class="text-center text-[11px] font-black text-zinc-500 uppercase cursor-pointer pt-4 hover:text-white transition">Создать новый аккаунт</p>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-6 py-5 flex justify-between items-center bg-black/60 backdrop-blur-xl border-b border-white/5 sticky top-0 z-50">
            <b class="text-2xl italic tracking-tighter text-blue-500">LYNEOK</b>
            <div onclick="switchT('profile')" class="bg-white/5 px-4 py-2 rounded-2xl flex items-center gap-3 border border-white/5 cursor-pointer">
                <div class="text-right"><p class="text-[9px] uppercase font-black opacity-40">Баланс</p><span id="h_bal" class="font-black text-sm">0 ₽</span></div>
                <img id="h_ava" class="w-9 h-9 rounded-full object-cover bg-zinc-800">
            </div>
        </header>

        <main id="tab_market" class="tab-content active">
            <div id="ad_slider" class="mb-8 space-y-4"></div>
            <div id="market_main">
                <h2 class="text-3xl font-black italic mb-6">Маркет</h2>
                <div id="cat_grid" class="grid grid-cols-3 gap-3"></div>
            </div>
            <div id="subcat_view" class="hidden space-y-6">
                <button onclick="closeSubcat()" class="text-blue-500 text-xs font-bold uppercase">Назад</button>
                <div id="subcat_grid" class="grid grid-cols-1 gap-3"></div>
            </div>
            <div id="items_view" class="hidden space-y-6">
                <button onclick="closeCat()" class="text-blue-500 text-xs font-bold uppercase">К категориям</button>
                <div id="items_list" class="space-y-4"></div>
            </div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="glass p-8 mb-6 text-center">
                <img id="p_ava" class="w-28 h-28 mx-auto mb-6 rounded-full object-cover">
                <div id="p_n" class="text-3xl font-black mb-8">...</div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="topUp()" class="bg-white text-black py-4 rounded-2xl font-black text-xs uppercase italic">Пополнить</button>
                    <button onclick="askOut()" class="bg-zinc-800 text-white py-4 rounded-2xl font-black text-xs uppercase italic">Вывести</button>
                </div>
            </div>
            <button id="adm_btn" onclick="switchT('admin')" class="hidden w-full bg-red-600/10 text-red-500 py-5 rounded-3xl font-black mb-4 border border-red-600/20 uppercase text-xs tracking-[3px] italic">TITAN PANEL</button>
            <button onclick="logout()" class="w-full py-4 text-zinc-600 text-[10px] font-black uppercase">Выйти</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <h1 class="text-4xl font-black italic mb-8 tracking-tighter">TITAN SYSTEM</h1>
            
            <section class="glass p-6 mb-8 border-yellow-600/20">
                <h3 class="text-[11px] font-black text-yellow-500 uppercase mb-5 tracking-widest">Управление тех. перерывом</h3>
                <div class="space-y-4">
                    <label class="flex items-center justify-between bg-black/40 p-4 rounded-xl cursor-pointer">
                        <span class="text-[10px] font-black uppercase">Включить режим работ</span>
                        <input type="checkbox" id="ad_maint_active" class="w-6 h-6">
                    </label>
                    
                    <div class="grid grid-cols-3 gap-2">
                        <div><p class="text-[8px] uppercase mb-1">Дни</p><input id="ad_maint_days" type="number" value="0" class="!py-3 !text-center"></div>
                        <div><p class="text-[8px] uppercase mb-1">Часы</p><input id="ad_maint_hours" type="number" value="0" class="!py-3 !text-center"></div>
                        <div><p class="text-[8px] uppercase mb-1">Минуты</p><input id="ad_maint_mins" type="number" value="0" class="!py-3 !text-center"></div>
                    </div>

                    <textarea id="ad_maint_whitelist" placeholder="Ники через запятую, кому РАЗРЕШЕН вход (например: owwner, Artyom)" class="!py-3 !text-xs"></textarea>
                    
                    <input id="ad_maint_title" placeholder="Заголовок (Тех. перерыв)" class="!py-3 !text-xs">
                    <textarea id="ad_maint_texts" placeholder="Тексты через запятую" class="!py-3 !text-xs"></textarea>
                    
                    <button onclick="admSaveMaint()" class="btn-blue !bg-yellow-600 !py-3 !text-[10px]">Применить настройки и таймер</button>
                </div>
            </section>

            <section class="glass p-6 mb-8 border-red-600/20"><h3 class="text-[11px] font-black text-red-500 uppercase mb-5">Пользователи</h3><div id="ad_users" class="space-y-4"></div></section>
        </main>

        <main id="tab_chats" class="tab-content">
            <h2 class="text-3xl font-black mb-6 italic">Сделки</h2>
            <div id="deals_list" class="space-y-4"></div>
        </main>

        <nav class="nav-bar">
            <div onclick="switchT('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-store text-xl"></i><span>Маркет</span></div>
            <div onclick="switchT('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-receipt text-xl"></i><span>Сделки</span></div>
            <div onclick="switchT('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-id-card text-xl"></i><span>Профиль</span></div>
        </nav>
    </div>

    <div id="chat_modal" class="hidden fixed inset-0 z-[10005] bg-black flex flex-col">
        <header class="p-5 flex justify-between items-center bg-zinc-900 border-b border-white/10">
            <button onclick="closeChat()" class="text-blue-500 text-xs font-black uppercase">Назад</button>
            <b id="chat_title" class="text-[10px] uppercase font-black">Чат</b>
            <div id="chat_admin_controls" class="hidden flex gap-2">
                <button onclick="admChatAction('Подтверждено')" class="bg-green-600/20 text-green-500 w-8 h-8 rounded-full"><i class="fa-solid fa-check"></i></button>
            </div>
        </header>
        <div id="chat_msgs" class="flex-1 overflow-y-auto p-4 space-y-3 pb-24"></div>
        <div id="review_trigger" class="hidden p-4 bg-zinc-900 border-t border-white/10 text-center">
             <button onclick="openReviewModal()" class="w-full bg-yellow-600 py-3 rounded-xl font-black text-[10px] uppercase">Оставить отзыв ⭐</button>
        </div>
        <div class="p-4 bg-zinc-900 flex gap-2">
            <input id="chat_input" placeholder="Сообщение..." class="!py-3 flex-1">
            <button onclick="sendMsg()" class="bg-blue-600 px-5 rounded-xl"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="review_modal" class="hidden fixed inset-0 z-[10010] bg-black/90 flex items-center justify-center p-8">
        <div class="glass p-8 w-full max-w-sm space-y-6 text-center">
            <h3 class="text-xl font-black italic uppercase">Оценка сделки</h3>
            <div class="flex justify-center gap-2 text-2xl" id="stars_box">
                <i onclick="setRate(1)" class="fa-solid fa-star text-zinc-700 cursor-pointer"></i>
                <i onclick="setRate(2)" class="fa-solid fa-star text-zinc-700 cursor-pointer"></i>
                <i onclick="setRate(3)" class="fa-solid fa-star text-zinc-700 cursor-pointer"></i>
                <i onclick="setRate(4)" class="fa-solid fa-star text-zinc-700 cursor-pointer"></i>
                <i onclick="setRate(5)" class="fa-solid fa-star text-zinc-700 cursor-pointer"></i>
            </div>
            <textarea id="rev_text" placeholder="Ваш комментарий..." rows="3"></textarea>
            <button onclick="submitReview()" class="btn-blue">Отправить</button>
        </div>
    </div>

    <script>
        firebase.initializeApp({ apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" });
        const db = firebase.database().ref('lyne_v122_titan');
        const Tst = Swal.mixin({ toast: true, position: 'top', timer: 2000, showConfirmButton: false, background: '#1c1c1e', color: '#fff' });

        let me = null, data = {}, isR = false, tmpImg = "", curChat = null, curRate = 0;

        function init() {
            db.on('value', snap => {
                data = snap.val() || { u:{}, i:{}, d:{}, settings:{ maint:{active:false, endTime:0, whitelist:""} } };
                const sid = localStorage.getItem('lyne_v122_sid');
                document.getElementById('loader').style.display = 'none';

                if (sid && data.u[sid]) { 
                    me = data.u[sid];
                    
                    // ПРОВЕРКА ТЕХ ПЕРЕРЫВА (С УЧЕТОМ БЕЛОГО СПИСКА И ТАЙМЕРА)
                    const mnt = data.settings.maint;
                    const whitelist = (mnt.whitelist || "").toLowerCase().split(',').map(n => n.trim());
                    const isWhitelisted = whitelist.includes(me.n.toLowerCase()) || me.n.toLowerCase() === 'owwner';
                    const isTimeActive = mnt.endTime > Date.now();

                    if (mnt.active && !isWhitelisted && isTimeActive) {
                        renderMaintenance();
                        return;
                    } else {
                        document.getElementById('maintenance_scr').classList.add('hidden');
                    }

                    document.getElementById('auth_scr').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    if(me.n.toLowerCase() === 'owwner') document.getElementById('adm_btn').classList.remove('hidden');
                    render(); if(curChat) renderChat();
                } else {
                    document.getElementById('auth_scr').classList.remove('hidden');
                }
            });
        }

        function renderMaintenance() {
            const m = data.settings.maint;
            document.getElementById('maintenance_scr').classList.remove('hidden');
            document.getElementById('maint_title').innerText = m.title || "ТЕХНИЧЕСКИЙ ПЕРЕРЫВ";
            document.getElementById('maint_texts').innerHTML = (m.texts || []).map(t => `<p>${t}</p>`).join('');
            
            if (m.endTime > Date.now()) {
                document.getElementById('maint_timer').classList.remove('hidden');
                updateMaintTimer();
            }
        }

        function updateMaintTimer() {
            const endTime = data.settings.maint.endTime;
            const timer = setInterval(() => {
                const diff = endTime - Date.now();
                if (diff <= 0) {
                    clearInterval(timer);
                    location.reload();
                    return;
                }
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer_display').innerText = `${d}д ${h}ч ${m}м ${s}с`;
            }, 1000);
        }

        function admSaveMaint() {
            const days = Number(document.getElementById('ad_maint_days').value) || 0;
            const hours = Number(document.getElementById('ad_maint_hours').value) || 0;
            const mins = Number(document.getElementById('ad_maint_mins').value) || 0;
            
            const totalMs = (days * 86400000) + (hours * 3600000) + (mins * 60000);
            const endTime = Date.now() + totalMs;

            const maint = {
                active: document.getElementById('ad_maint_active').checked,
                endTime: endTime,
                whitelist: document.getElementById('ad_maint_whitelist').value,
                title: document.getElementById('ad_maint_title').value,
                texts: document.getElementById('ad_maint_texts').value.split(',')
            };
            db.child('settings/maint').set(maint);
            Tst.fire({icon:'success', title:'Настройки тех.работ сохранены'});
        }

        function render() {
            document.getElementById('h_bal').innerText = me.bal.toLocaleString() + ' ₽';
            document.getElementById('h_ava').src = me.ava;
            document.getElementById('p_ava').src = me.ava;
            document.getElementById('p_n').innerText = me.n;
            
            const deals = Object.values(data.d || {}).filter(d => d.bid === me.id || d.sid === me.id).reverse();
            document.getElementById('deals_list').innerHTML = deals.map(d => `
                <div class="glass p-5 flex justify-between items-center">
                    <div><b>${d.t}</b><br><span class="text-[10px] opacity-40">${d.status}</span></div>
                    <button onclick="openChat('${d.id}', '${d.t}')" class="bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-black">ЧАТ</button>
                </div>`).join('');

            if(me.n.toLowerCase() === 'owwner') renderAdmin();
        }

        function renderAdmin() {
            document.getElementById('ad_users').innerHTML = Object.values(data.u).map(u => `
                <div class="glass p-4 flex justify-between items-center">
                    <span>${u.n} (${u.bal}₽)</span>
                    <button onclick="admEditBal('${u.id}')" class="text-blue-500 font-black">EDIT</button>
                </div>`).join('');
        }

        function openChat(id, title) {
            curChat = id;
            document.getElementById('chat_title').innerText = title;
            document.getElementById('chat_modal').classList.remove('hidden');
            const deal = data.d[id];
            if (deal && deal.status === 'Подтверждено' && deal.bid === me.id && !deal.reviewed) {
                document.getElementById('review_trigger').classList.remove('hidden');
            } else {
                document.getElementById('review_trigger').classList.add('hidden');
            }
            if(me.n.toLowerCase() === 'owwner') document.getElementById('chat_admin_controls').classList.remove('hidden');
            renderChat();
        }

        function setRate(r) {
            curRate = r;
            document.querySelectorAll('#stars_box i').forEach((s, i) => {
                s.className = i < r ? 'fa-solid fa-star text-yellow-500' : 'fa-solid fa-star text-zinc-700';
            });
        }

        function submitReview() {
            if(curRate === 0) return Tst.fire({icon:'warning', title:'Поставьте звезды'});
            db.child(`reviews/r${Date.now()}`).set({ dealId: curChat, from: me.n, rate: curRate, text: document.getElementById('rev_text').value });
            db.child(`d/${curChat}/reviewed`).set(true);
            document.getElementById('review_modal').classList.add('hidden');
            Tst.fire({icon:'success', title:'Отзыв сохранен!'});
        }

        function openReviewModal() { document.getElementById('review_modal').classList.remove('hidden'); }
        function closeChat() { curChat = null; document.getElementById('chat_modal').classList.add('hidden'); }
        function sendMsg() {
            const input = document.getElementById('chat_input');
            if(!input.value.trim()) return;
            const msgs = data.chats[curChat]?.msgs || [];
            msgs.push({ sender: me.id, n: me.n, text: input.value, time: Date.now() });
            db.child(`chats/${curChat}/msgs`).set(msgs);
            input.value = '';
        }

        function renderChat() {
            const msgs = data.chats[curChat]?.msgs || [];
            document.getElementById('chat_msgs').innerHTML = msgs.map(m => `
                <div class="flex flex-col ${m.sender === me.id ? 'items-end' : 'items-start'}">
                    <span class="text-[8px] opacity-40">${m.n}</span>
                    <div class="p-3 rounded-2xl ${m.sender === me.id ? 'bg-blue-600' : 'bg-zinc-800'} text-sm">${m.text}</div>
                </div>`).join('');
            document.getElementById('chat_msgs').scrollTop = 99999;
        }

        function switchT(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.getElementById('tab_'+t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById('n_'+t)?.classList.add('active');
        }

        function upImg(i, tid, setImg) {
            const r = new FileReader();
            r.onload = e => { tmpImg = e.target.result; if(setImg) document.getElementById(tid).innerHTML = `<img src="${tmpImg}" class="w-full h-full rounded-full object-cover">`; };
            r.readAsDataURL(i.files[0]);
        }

        function handleAuth() {
            const n = document.getElementById('a_n').value, p = document.getElementById('a_p').value;
            if(isR) {
                const id = 'u'+Date.now();
                db.child(`u/${id}`).set({id, n, p, ava: tmpImg || 'https://via.placeholder.com/100', bal: 0});
                localStorage.setItem('lyne_v122_sid', id);
                location.reload();
            } else {
                const u = Object.values(data.u).find(x => x.n === n && x.p === p);
                if(u) { localStorage.setItem('lyne_v122_sid', u.id); location.reload(); }
                else { Tst.fire({icon:'error', title:'Неверные данные'}); }
            }
        }

        function toggleR() { isR = !isR; document.getElementById('reg_ext').classList.toggle('hidden'); document.getElementById('a_btn').innerText = isR ? 'Создать' : 'Войти'; }
        function logout() { localStorage.clear(); location.reload(); }
        function admEditBal(uid) { 
            Swal.fire({title: 'Сумма', input: 'number'}).then(r => { 
                if(r.value) db.child(`u/${uid}/bal`).set(Number(r.value)); 
            }); 
        }
        function admChatAction(status) { db.child(`d/${curChat}/status`).set(status); closeChat(); }

        init();
    </script>
</body>
</html>
