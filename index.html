<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>anon:zadan | V39 SUPREME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; margin: 0; }
        .glass { background: rgba(20, 20, 25, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .input-mod { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 15px; width: 100%; color: #fff; outline: none; transition: 0.3s; font-size: 13px; }
        .btn-super { background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899); border-radius: 24px; padding: 18px; font-weight: 900; width: 100%; text-transform: uppercase; letter-spacing: 1px; animation: grad 5s ease infinite; border: none; color: white; cursor: pointer; }
        @keyframes grad { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .tab { display: none; height: 100vh; overflow-y: auto; padding-bottom: 120px; }
        .tab.active { display: block; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(5,5,5,0.9); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .nav-btn { color: #52525b; transition: 0.3s; font-size: 22px; }
        .nav-btn.active { color: #a855f7; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="ban-screen" class="fixed inset-0 z-[10000] bg-black hidden items-center justify-center flex-col text-center p-6">
        <div class="glass p-10 w-full max-w-sm border-red-500/30">
            <h1 class="text-5xl font-black text-red-500 italic mb-4">STOP!</h1>
            <div id="ban-timer" class="text-3xl font-black mb-8 bg-zinc-900 py-4 rounded-3xl">00:00:00</div>
            <button onclick="window.open('https://t.me/sswckk')" class="w-full py-4 bg-indigo-600 rounded-2xl font-black uppercase text-[10px]">Поддержка</button>
        </div>
    </div>

    <div id="app">
        <header class="px-6 py-4 flex justify-between items-center glass rounded-none rounded-b-[35px] sticky top-0 z-50">
            <h1 class="text-xl font-black italic">anon:<span class="text-zinc-500">zadan</span></h1>
            <div id="top_bal" onclick="setTab('wallet')" class="bg-indigo-600/20 px-4 py-2 rounded-xl text-xs font-black text-indigo-400">0 ₽</div>
        </header>

        <main id="home" class="tab active px-5 pt-6"><div id="task_list" class="grid gap-4"></div></main>

        <main id="wallet" class="tab px-5 pt-6">
            <div class="glass p-8 text-center space-y-6">
                <h2 id="wallet_bal" class="text-5xl font-black italic">0 ₽</h2>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="money('deposit')" class="py-5 bg-indigo-600 rounded-2xl font-black uppercase text-[10px]">Ввод</button>
                    <button onclick="money('withdraw')" class="py-5 bg-zinc-800 rounded-2xl font-black uppercase text-[10px]">Вывод</button>
                </div>
                <div id="trans_list" class="space-y-2"></div>
            </div>
        </main>

        <main id="chats" class="tab px-5 pt-6">
            <div id="chat_list" class="space-y-3">
                <div class="glass p-5 flex items-center gap-4 border-indigo-500/30 relative overflow-hidden">
                    <div class="w-12 h-12 bg-indigo-600 rounded-xl flex justify-center items-center"><i class="fa-solid fa-check-double"></i></div>
                    <div class="flex-1">
                        <div class="flex items-center gap-1"><b class="text-sm font-black uppercase">Channel</b><i class="fa-solid fa-circle-check text-indigo-400 text-[10px]"></i></div>
                        <p class="text-[9px] opacity-40">Официальные новости и отчеты</p>
                    </div>
                    <span class="text-[8px] bg-indigo-500/20 px-2 py-1 rounded-md text-indigo-300 font-bold">PINNED</span>
                </div>
                <div onclick="openChat('support')" class="glass p-5 flex items-center gap-4 cursor-pointer">
                    <div class="w-12 h-12 bg-zinc-800 rounded-xl flex justify-center items-center"><i class="fa-solid fa-headset text-indigo-400"></i></div>
                    <div><b class="text-sm font-black uppercase">Support & Logs</b><p class="text-[9px] opacity-40">Техническая помощь</p></div>
                </div>
            </div>
            <div id="chat_room" class="hidden h-full flex flex-col -mt-6 bg-[#050505] relative z-[1001]">
                <div class="glass rounded-t-none p-4 flex items-center gap-4 border-b border-white/5"><button onclick="closeChat()"><i class="fa-solid fa-arrow-left"></i></button><b class="text-xs uppercase font-black">Уведомления</b></div>
                <div id="chat_msgs" class="flex-1 overflow-y-auto p-5 space-y-4 pb-40"></div>
            </div>
        </main>

        <main id="profile" class="tab px-5 pt-6">
            <div class="glass p-10 text-center space-y-6">
                <h3 id="me_name" class="text-3xl font-black italic uppercase">...</h3>
                <button onclick="window.open('https://t.me/sswckk')" class="w-full py-4 bg-white/5 rounded-2xl font-black text-[10px] uppercase">Связаться с админом</button>
                <button onclick="deleteAccount()" class="w-full py-4 text-red-500/40 text-[9px] font-black uppercase">Удалить данные</button>
                <button onclick="setTab('admin_login')" class="opacity-0">ADM</button>
            </div>
        </main>

        <main id="admin_login" class="tab px-5 pt-20"><div class="glass p-8"><input type="password" oninput="if(this.value==='kalubxq') setTab('admin_panel')" class="input-mod text-center" placeholder="SECRET KEY"></div></main>
        
        <main id="admin_panel" class="tab px-4 pt-6 space-y-6">
            <h2 class="text-2xl font-black text-red-500 uppercase italic text-center">Overlord V39</h2>
            
            <div class="glass p-6 space-y-4 border-red-500/20">
                <p class="text-[10px] font-black text-red-500 uppercase tracking-widest">Бесконечный конструктор рассылки</p>
                <input id="adm_bc_img" class="input-mod !p-3 text-[10px]" placeholder="Ссылка на фото/файл (необязательно)">
                <textarea id="adm_bc_txt" class="input-mod h-20 text-[10px]" placeholder="Текст сообщения..."></textarea>
                
                <div id="bc_btns_list" class="space-y-2"></div>
                <button onclick="addBcBtn()" class="w-full py-2 border border-dashed border-white/20 rounded-xl text-[9px] uppercase font-black">+ Добавить кнопку</button>
                
                <button onclick="runSupremeBroadcast()" class="btn-super !py-4 text-[11px]">Запустить мега-пробив</button>
            </div>

            <div class="glass p-6 space-y-4">
                <input id="adm_search" oninput="renderAdm()" class="input-mod !p-3 text-[11px]" placeholder="Поиск воркеров...">
                <div id="adm_users" class="space-y-4"></div>
            </div>
        </main>

        <nav class="nav-bar">
            <button onclick="setTab('home')" id="n_home" class="nav-btn active"><i class="fa-solid fa-bolt"></i></button>
            <button onclick="setTab('wallet')" id="n_wallet" class="nav-btn"><i class="fa-solid fa-wallet"></i></button>
            <button onclick="setTab('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-comment-dots"></i></button>
            <button onclick="setTab('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user-ninja"></i></button>
        </nav>
    </div>

    <script>
        const TG = "8722822022:AAEmZa-V4-isxXnZ00omU8gAM_NtYevuL9Y";
        const ADM_CHAT = "7040863301";
        const CFG = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        firebase.initializeApp(CFG); const dbRef = firebase.database().ref('anon_v39');
        let me = null, db = {u:{}, c:{}, w:{}}, actC = null, bcBtns = [];

        function init() {
            dbRef.on('value', s => {
                db = s.val() || {u:{}, c:{}, w:{}};
                const id = localStorage.getItem('u_id');
                if(id && db.u[id]) { me = db.u[id]; render(); checkBan(); document.getElementById('app').classList.add('visible'); }
            });
            setInterval(() => { if(me) dbRef.child(`u/${me.id}/seen`).set(Date.now()); checkBan(); }, 5000);
        }

        function render() {
            document.getElementById('top_bal').innerText = me.bal + ' ₽';
            document.getElementById('wallet_bal').innerText = me.bal + ' ₽';
            document.getElementById('me_name').innerText = me.n;
            if(actC) renderM(); renderAdm();
        }

        // КОНСТРУКТОР КНОПОК
        function addBcBtn() {
            const id = Date.now();
            bcBtns.push({id, type: 'link', text: '', val: ''});
            renderBcBtns();
        }
        function renderBcBtns() {
            document.getElementById('bc_btns_list').innerHTML = bcBtns.map((b, i) => `
                <div class="flex gap-2 items-center bg-white/5 p-2 rounded-xl">
                    <select onchange="bcBtns[${i}].type=this.value" class="bg-transparent text-[9px] uppercase font-black outline-none"><option value="link">Ссылка</option><option value="text">Текст</option></select>
                    <input oninput="bcBtns[${i}].text=this.value" class="bg-transparent text-[10px] flex-1 outline-none" placeholder="Текст кнопки">
                    <input oninput="bcBtns[${i}].val=this.value" class="bg-transparent text-[10px] flex-1 outline-none" placeholder="Значение (URL или текст)">
                    <button onclick="bcBtns.splice(${i},1);renderBcBtns()"><i class="fa-solid fa-xmark text-red-500"></i></button>
                </div>`).join('');
        }

        async function runSupremeBroadcast() {
            const txt = document.getElementById('adm_bc_txt').value;
            const img = document.getElementById('adm_bc_img').value;
            if(!txt) return;
            const now = Date.now();
            Object.values(db.u).forEach(u => {
                dbRef.child(`c/${u.id}/${now}`).set({txt, img, btns: bcBtns, from:'sys'});
            });
            Swal.fire('УСПЕХ', 'Рассылка ушла!', 'success');
            bcBtns = []; renderBcBtns();
        }

        function renderM() {
            const ms = Object.values(db.c[me.id] || {});
            document.getElementById('chat_msgs').innerHTML = ms.map(m => `
                <div class="p-5 max-w-[90%] rounded-[28px] ${m.from==='sys'?'bg-zinc-900 border border-white/5 self-start':'bg-indigo-600 self-end'}">
                    ${m.img ? `<img src="${m.img}" class="w-full rounded-xl mb-3 shadow-xl">` : ''}
                    <p class="text-[11px] font-bold leading-relaxed whitespace-pre-wrap">${m.txt}</p>
                    ${m.btns ? `<div class="mt-4 grid gap-2">${m.btns.map(b => `<button onclick="${b.type==='link' ? `window.open('${b.val}')` : `Swal.fire('Инфо', '${b.val}', 'info')`}" class="py-3 bg-white/5 rounded-xl text-[10px] font-black uppercase border border-white/5">${b.text}</button>`).join('')}</div>` : ''}
                </div>`).join('');
            const b = document.getElementById('chat_msgs'); b.scrollTop = b.scrollHeight;
        }

        function renderAdm() {
            const q = document.getElementById('adm_search').value.toLowerCase();
            document.getElementById('adm_users').innerHTML = Object.values(db.u).filter(u=>u.n.toLowerCase().includes(q)).map(u => {
                const online = (Date.now() - (u.seen || 0)) < 30000;
                return `<div class="glass p-4 space-y-3">
                    <div class="flex justify-between items-center"><b class="text-xs uppercase">@${u.t} ${online ? '🟢' : '🔴'}</b><b class="text-indigo-400">${u.bal}₽</b></div>
                    <div class="flex gap-2">
                        <input id="bal-${u.id}" type="number" class="input-mod !p-2 text-[10px] flex-1" placeholder="+/- Баланс">
                        <button onclick="admBal('${u.id}')" class="bg-indigo-600 px-4 rounded-xl font-black text-[9px]">OK</button>
                    </div>
                    <div class="flex gap-2">
                        <input id="ban-${u.id}" type="number" class="input-mod !p-2 text-[10px] flex-1" placeholder="Мин. бана">
                        <button onclick="admBan('${u.id}')" class="bg-red-600 px-4 rounded-xl font-black text-[9px]">BAN</button>
                    </div>
                    <button onclick="dbRef.child('u/${u.id}').update({banUntil:0})" class="w-full py-2 bg-white/5 rounded-lg text-[8px] font-black uppercase">Разбанить</button>
                </div>`;
            }).join('');
        }

        async function admBal(id) {
            const v = Number(document.getElementById(`bal-${id}`).value);
            if(v) await dbRef.child(`u/${id}`).update({bal: (Number(db.u[id].bal) + v)});
            renderAdm();
        }

        async function admBan(id) {
            const m = Number(document.getElementById(`ban-${id}`).value);
            if(m) await dbRef.child(`u/${id}`).update({banUntil: Date.now() + (m * 60000)});
            renderAdm();
        }

        function checkBan() {
            if(!me) return;
            const diff = (me.banUntil || 0) - Date.now();
            if(diff > 0) {
                document.getElementById('ban-screen').style.display = 'flex';
                const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                document.getElementById('ban-timer').innerText = `${h}:${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
            } else { document.getElementById('ban-screen').style.display = 'none'; }
        }

        function setTab(t) { 
            document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); 
            document.getElementById(t).classList.add('active'); 
            document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active')); 
            const btn = document.getElementById('n_'+t); if(btn) btn.classList.add('active');
        }

        async function auth(m) {
            const t = document.getElementById(m==='reg'?'auth_t':'login_t').value, p = document.getElementById(m==='reg'?'auth_p':'login_p').value;
            if(!t || !p) return;
            const ex = Object.values(db.u).find(u => u.t === t);
            if(ex) { if(ex.p === p){ localStorage.setItem('u_id', ex.id); location.reload(); } }
            else { const id = "u"+Date.now(); await dbRef.child(`u/${id}`).set({id, n:document.getElementById('auth_n').value, t, p, bal:0}); localStorage.setItem('u_id', id); location.reload(); }
        }

        function openChat(id) { actC=id; document.getElementById('chat_list').classList.add('hidden'); document.getElementById('chat_room').classList.remove('hidden'); renderM(); }
        function closeChat() { actC=null; document.getElementById('chat_list').classList.remove('hidden'); document.getElementById('chat_room').classList.add('hidden'); }
        async function money(type) {
            const {value: am} = await Swal.fire({title: 'СУММА ₽', input: 'number', background: '#111', color: '#fff'});
            if(am) { 
                const id="w"+Date.now(); await dbRef.child(`w/${id}`).set({id, uid:me.id, n:me.n, t:me.t, type, amount:Number(am), st:'pending'});
                fetch(`https://api.telegram.org/bot${TG}/sendMessage`, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({ chat_id: ADM_CHAT, text: `💰 ${type}: @${me.t} (${am}₽)` }) });
                Swal.fire('ОК','Заявка в обработке','success'); 
            }
        }
        function deleteAccount() { if(confirm('Удалить всё?')) { dbRef.child(`u/${me.id}`).remove(); localStorage.clear(); location.reload(); } }
        init();
    </script>
</body>
</html>
