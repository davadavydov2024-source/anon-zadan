<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK OMEGA V120.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700&family=Orbitron:wght@900&family=UnifrakturMaguntia&display=swap');
        :root { --bg: #050505; --card: #121214; --text: #ffffff; --blue: #007aff; --gray: #1c1c1e; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: var(--card); border: 1px solid rgba(255,255,255,0.03); border-radius: 24px; }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px 16px 160px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: rgba(10,10,10,0.8); backdrop-filter: blur(20px); display: flex; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #636366; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 700; }
        .nav-btn.active { color: var(--blue); }
        input, textarea, select { background: var(--gray); border: 1px solid transparent; border-radius: 14px; padding: 14px; color: white; width: 100%; outline: none; font-size: 14px; }
        .btn-blue { background: var(--blue); color: white; border-radius: 16px; font-weight: 800; padding: 16px; width: 100%; border: none; }
        #loader { background: #000; z-index: 10000; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
        .chat-container { display: flex; flex-direction: column; gap: 8px; padding: 10px; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 13px; line-height: 1.4; position: relative; }
        .msg-me { align-self: flex-end; background: var(--blue); color: white; border-bottom-right-radius: 4px; }
        .msg-op { align-self: flex-start; background: #2c2c2e; color: white; border-bottom-left-radius: 4px; }
        .star-rating { display: flex; flex-direction: row-reverse; justify-content: center; gap: 10px; }
        .star-rating input { display: none; }
        .star-rating label { font-size: 30px; color: #333; cursor: pointer; }
        .star-rating input:checked ~ label { color: #ffcc00; }
        .star-rating label:hover, .star-rating label:hover ~ label { color: #ffcc00; }
    </style>
</head>
<body>

    <div id="loader"><div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>

    <div id="auth_scr" class="hidden fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-8">
        <h1 class="text-4xl font-black mb-12 italic tracking-tighter">LYNEOK<span class="text-blue-500">.</span></h1>
        <div class="w-full max-sm glass p-6 space-y-4">
            <div id="reg_ext" class="hidden space-y-4">
                <input type="file" id="r_ava" class="hidden" accept="image/*" onchange="upImg(this, 'l_r_ava')">
                <label for="r_ava" id="l_r_ava" class="w-20 h-20 bg-zinc-800 mx-auto rounded-full flex items-center justify-center cursor-pointer border-2 border-dashed border-zinc-700">
                    <i class="fa-solid fa-plus text-zinc-500"></i>
                </label>
                <input id="r_tg" placeholder="Telegram (@username)">
            </div>
            <input id="a_n" placeholder="Логин">
            <input id="a_p" type="password" placeholder="Пароль">
            <button onclick="handleAuth()" id="a_btn" class="btn-blue">Войти</button>
            <p onclick="toggleR()" id="a_tog" class="text-center text-[10px] font-black text-zinc-500 uppercase cursor-pointer tracking-widest pt-2">Создать аккаунт</p>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-5 py-4 flex justify-between items-center bg-black/50 backdrop-blur-md sticky top-0 z-50">
            <b class="text-xl italic">LYNEOK</b>
            <div onclick="switchT('profile')" class="bg-zinc-900 px-4 py-1.5 rounded-full flex items-center gap-2 border border-white/5">
                <span id="h_bal" class="font-bold text-xs">0 ₽</span>
                <img id="h_ava" class="w-6 h-6 rounded-full object-cover">
            </div>
        </header>

        <main id="tab_market" class="tab-content active">
            <div id="cat_grid" class="grid grid-cols-2 gap-3"></div>
            <div id="subcat_view" class="hidden space-y-4">
                <button onclick="closeSubcat()" class="text-blue-500 font-bold text-xs"><i class="fa-solid fa-chevron-left mr-1"></i> НАЗАД</button>
                <div id="subcat_grid" class="grid grid-cols-2 gap-3"></div>
            </div>
            <div id="items_view" class="hidden space-y-4">
                <button onclick="closeCat()" class="text-blue-500 font-bold text-xs"><i class="fa-solid fa-chevron-left mr-1"></i> НАЗАД</button>
                <div id="items_list" class="space-y-3"></div>
            </div>
        </main>

        <main id="tab_sell" class="tab-content">
            <div class="glass p-5 space-y-4">
                <input type="file" id="s_img" class="hidden" onchange="upImg(this, 'l_s_img')">
                <label for="s_img" id="l_s_img" class="w-full h-40 bg-zinc-900 rounded-2xl flex flex-col items-center justify-center border-2 border-dashed border-zinc-800">
                    <i class="fa-solid fa-camera text-2xl text-zinc-700"></i>
                </label>
                <select id="s_game" onchange="updateSubcats()"></select>
                <select id="s_subcat"></select>
                <input id="s_t" placeholder="Название">
                <textarea id="s_acc" placeholder="Данные аккаунта"></textarea>
                <input id="s_p" type="number" placeholder="Цена">
                <button onclick="postItem()" class="btn-blue">Опубликовать</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black">Сделки</h2>
                <button onclick="openChat('support_' + me.id, 'ПОДДЕРЖКА')" class="bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-black">SUPPORT</button>
            </div>
            <div id="deals_list" class="space-y-3"></div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="glass p-6 mb-4 text-center">
                <img id="p_ava" class="w-24 h-24 rounded-full mx-auto mb-4 object-cover">
                <div class="flex items-center justify-center gap-2 mb-1">
                    <span id="p_n" class="text-2xl font-black">...</span>
                    <span id="p_badge"></span>
                </div>
                <div id="p_rating" class="text-yellow-500 text-[10px] font-bold mb-4"></div>
                <p id="p_tg" class="text-zinc-500 text-sm mb-6"></p>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="askPay()" class="btn-blue !bg-white !text-black">ПОПОЛНИТЬ</button>
                    <button onclick="askOut()" class="btn-blue">ВЫВОД</button>
                </div>
            </div>
            <button id="adm_btn" onclick="switchT('admin')" class="hidden w-full bg-red-600/10 text-red-500 py-4 rounded-2xl font-bold mb-4 border border-red-600/20">АДМИН-ПАНЕЛЬ</button>
            <button onclick="logout()" class="w-full py-4 text-red-500 opacity-30 text-xs font-black">ВЫЙТИ</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <h1 class="text-3xl font-black mb-6 italic">АДМИНКА</h1>
            <div class="space-y-8">
                <section>
                    <h3 class="text-[10px] font-black text-zinc-500 uppercase mb-4">Пользователи</h3>
                    <div id="ad_users" class="space-y-3"></div>
                </section>
                <section>
                    <h3 class="text-[10px] font-black text-purple-500 uppercase mb-4">Добавить игру</h3>
                    <div class="glass p-4 space-y-3">
                        <input id="ad_game_name" placeholder="Название игры">
                        <input type="file" id="ad_game_img_input" class="hidden" onchange="upImg(this, 'l_ad_game_img')">
                        <label for="ad_game_img_input" id="l_ad_game_img" class="w-full h-12 bg-zinc-900 rounded-xl flex items-center justify-center border border-white/5 text-xs">Фото игры</label>
                        <button onclick="admAddGame()" class="w-full bg-purple-600 py-3 rounded-xl text-xs font-black">СОЗДАТЬ</button>
                    </div>
                    <div id="ad_games_list" class="mt-4 space-y-3"></div>
                </section>
                <section>
                    <h3 class="text-[10px] font-black text-yellow-500 uppercase mb-4">Заявки на вывод</h3>
                    <div id="ad_outs" class="space-y-2"></div>
                </section>
            </div>
        </main>

        <nav class="nav-bar">
            <div onclick="switchT('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-shop text-xl"></i><span>Маркет</span></div>
            <div onclick="switchT('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-plus-circle text-xl"></i><span>Продать</span></div>
            <div onclick="switchT('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-comments text-xl"></i><span>Чат</span></div>
            <div onclick="switchT('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user text-xl"></i><span>Профиль</span></div>
        </nav>
    </div>

    <div id="chat_modal" class="hidden fixed inset-0 z-[10001] bg-black flex flex-col">
        <header class="p-5 flex justify-between items-center bg-zinc-900">
            <b id="chat_title">Чат</b>
            <button onclick="closeChatModal()" class="text-2xl">&times;</button>
        </header>
        <div id="chat_body" class="flex-1 overflow-y-auto chat-container"></div>
        <div id="chat_admin_actions" class="hidden p-3 bg-red-900/20 border-t border-red-500/30 flex gap-2">
            <button onclick="admDealAction('confirm')" class="flex-1 bg-green-600 py-3 rounded-xl text-xs font-black">ПОДТВЕРДИТЬ СДЕЛКУ</button>
            <button onclick="admDealAction('cancel')" class="flex-1 bg-red-600 py-3 rounded-xl text-xs font-black">ОТМЕНИТЬ</button>
        </div>
        <div class="p-4 bg-zinc-900 flex gap-2">
            <input id="chat_input" placeholder="Сообщение...">
            <button onclick="sendMessage()" class="bg-blue-600 px-4 rounded-xl"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        firebase.initializeApp({ apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" });
        const db = firebase.database().ref('lyne_v120_omega');
        const Tst = Swal.mixin({ toast: true, position: 'top', timer: 2000, showConfirmButton: false, background: '#1c1c1e', color: '#fff' });

        let me = null, data = {}, isR = false, tmpImg = "", activeChat = null;

        function init() {
            db.on('value', snap => {
                data = snap.val() || { u:{}, i:{}, d:{}, games:{}, msgs:{}, reviews:{}, outs:{} };
                const sid = localStorage.getItem('lyne_v120_sid');
                if (sid && data.u[sid]) {
                    me = data.u[sid];
                    document.getElementById('auth_scr').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    if(me.n.toLowerCase() === 'owwner') document.getElementById('adm_btn').classList.remove('hidden');
                    render();
                    if(activeChat) renderMessages();
                    checkReviews();
                } else { document.getElementById('auth_scr').classList.remove('hidden'); }
                document.getElementById('loader').style.display = 'none';
            });
        }

        function render() {
            if(!me) return;
            document.getElementById('h_bal').innerText = me.bal + ' ₽';
            document.getElementById('h_ava').src = me.ava;
            document.getElementById('p_ava').src = me.ava;
            document.getElementById('p_n').innerText = me.n;
            document.getElementById('p_tg').innerText = me.tg;
            document.getElementById('p_badge').innerHTML = (me.sales >= 45 || me.badge === 'white_badge') ? '<i class="fa-solid fa-certificate text-white"></i>' : '';

            const revs = Object.values(data.reviews && data.reviews[me.id] || {});
            const avg = revs.length ? (revs.reduce((a,b)=>a+b.stars,0)/revs.length).toFixed(1) : '0.0';
            document.getElementById('p_rating').innerHTML = `<i class="fa-solid fa-star"></i> ${avg} (${revs.length} отзывов)`;

            const games = Object.values(data.games || {});
            document.getElementById('cat_grid').innerHTML = games.map(g => `<div class="glass p-4 text-center" onclick="openGame('${g.id}')"><img src="${g.img}" class="w-12 h-12 mx-auto mb-2 rounded-xl object-cover"><b>${g.name}</b></div>`).join('');
            document.getElementById('s_game').innerHTML = games.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
            
            const myDeals = Object.values(data.d || {}).filter(d => d.bid === me.id || d.sid === me.id);
            document.getElementById('deals_list').innerHTML = myDeals.reverse().map(d => `<div class="glass p-4 flex justify-between"><div><b>${d.t}</b><br><span class="text-xs text-zinc-500">${d.p} ₽</span></div><button onclick="openChat('${d.id}', 'СДЕЛКА')" class="bg-zinc-800 px-4 rounded-xl"><i class="fa-solid fa-comments"></i></button></div>`).join('');

            if(me.n.toLowerCase() === 'owwner') renderAdmin();
        }

        function renderAdmin() {
            const users = Object.values(data.u);
            document.getElementById('ad_users').innerHTML = users.map(u => `
                <div class="glass p-4 flex justify-between items-center">
                    <div><b>${u.n}</b><br><span class="text-[10px] text-zinc-500">Баланс: ${u.bal}₽</span></div>
                    <div class="flex gap-1">
                        <button onclick="admEditBal('${u.id}', 100)" class="bg-green-600 px-2 rounded text-[10px]">+100</button>
                        <button onclick="admEditBal('${u.id}', -100)" class="bg-red-600 px-2 rounded text-[10px]">-100</button>
                        <button onclick="admBan('${u.id}')" class="bg-zinc-700 px-2 rounded text-[10px]"><i class="fa-solid fa-ban"></i></button>
                    </div>
                </div>
            `).join('');

            const games = Object.values(data.games || {});
            document.getElementById('ad_games_list').innerHTML = games.map(g => `
                <div class="glass p-3">
                    <div class="flex justify-between"><b>${g.name}</b> <button onclick="db.child('games/${g.id}').remove()" class="text-red-500 text-xs">Удалить</button></div>
                    <div class="mt-2 flex gap-1">
                        <input id="incat_${g.id}" class="!py-1 !text-xs" placeholder="Новая категория">
                        <button onclick="admAddCat('${g.id}')" class="bg-blue-600 px-3 rounded text-xs">+</button>
                    </div>
                    <div class="mt-2 text-[10px] text-zinc-400">${Object.values(g.cats||{}).map(c=>c.name).join(', ')}</div>
                </div>
            `).join('');

            const outs = Object.values(data.outs || {});
            document.getElementById('ad_outs').innerHTML = outs.map(o => `
                <div class="glass p-3 flex justify-between text-xs">
                    <span>${o.n}: ${o.sum}₽</span>
                    <button onclick="db.child('outs/${o.id}').remove()" class="text-green-500 font-bold">Оплачено</button>
                </div>
            `).join('');
        }

        function admEditBal(uid, amt) { db.child(`u/${uid}/bal`).transaction(b => (b||0) + amt); }
        function admAddGame() { const id = 'g'+Date.now(); db.child(`games/${id}`).set({id, name:document.getElementById('ad_game_name').value, img:tmpImg}); }
        function admAddCat(gid) { const name = document.getElementById('incat_'+gid).value; if(name) db.child(`games/${gid}/cats/${'c'+Date.now()}`).set({name}); }
        function askOut() { if(me.bal >= 500) { const id = 'o'+Date.now(); db.child(`outs/${id}`).set({id, uid:me.id, n:me.n, sum:500}); db.child(`u/${me.id}/bal`).transaction(b => b - 500); Tst.fire({icon:'success', title:'Заявка создана'}); } }

        function checkReviews() {
            const d = Object.values(data.d || {}).find(x => x.bid === me.id && x.status === 'completed' && !x.reviewed);
            if(d) {
                Swal.fire({
                    title: 'Оцени сделку',
                    html: `<div class="star-rating mb-4">
                        <input type="radio" id="s5" name="stars" value="5"><label for="s5">★</label>
                        <input type="radio" id="s4" name="stars" value="4"><label for="s4">★</label>
                        <input type="radio" id="s3" name="stars" value="3"><label for="s3">★</label>
                        <input type="radio" id="s2" name="stars" value="2"><label for="s2">★</label>
                        <input type="radio" id="s1" name="stars" value="1"><label for="s1">★</label>
                    </div>`,
                    preConfirm: () => { return document.querySelector('input[name="stars"]:checked')?.value }
                }).then(r => {
                    if(r.value) {
                        db.child(`reviews/${d.sid}/${'r'+Date.now()}`).set({stars: Number(r.value), from: me.n});
                        db.child(`d/${d.id}/reviewed`).set(true);
                    }
                });
            }
        }

        function admDealAction(action) {
            const deal = data.d[activeChat];
            if(action === 'confirm') {
                db.child(`d/${deal.id}/status`).set('completed');
                db.child(`u/${deal.sid}/sales`).transaction(s => (s||0) + 1);
                db.child(`u/${deal.sid}/sales`).once('value', s => { if(s.val() >= 45) db.child(`u/${deal.sid}/badge`).set('white_badge'); });
                closeChatModal();
            } else {
                db.child(`u/${deal.bid}/bal`).transaction(b => b + deal.p);
                db.child(`d/${deal.id}/status`).set('cancelled');
                closeChatModal();
            }
        }

        function openGame(gid) { document.getElementById('cat_grid').classList.add('hidden'); document.getElementById('subcat_view').classList.remove('hidden'); const g = data.games[gid]; document.getElementById('subcat_grid').innerHTML = Object.values(g.cats||{}).map(c => `<div class="glass p-4 text-center" onclick="openItems('${gid}', '${c.name}')"><b>${c.name}</b></div>`).join(''); }
        function openItems(gid, cat) { document.getElementById('subcat_view').classList.add('hidden'); document.getElementById('items_view').classList.remove('hidden'); const its = Object.values(data.i||{}).filter(i=>i.gameId===gid && i.cat===cat); document.getElementById('items_list').innerHTML = its.map(i=>`<div class="glass p-4 flex justify-between items-center"><div><b>${i.title}</b><br><span class="text-xs">${i.price} ₽</span></div><button onclick="buyItem('${i.id}')" class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-black">КУПИТЬ</button></div>`).join(''); }

        // ОБНОВЛЕННАЯ ФУНКЦИЯ ПОКУПКИ (МОДЕРАЦИЯ)
        function buyItem(id) { 
            const i = data.i[id]; 
            
            // Запрет покупки своего товара
            if (i.sid === me.id) {
                Tst.fire({ icon: 'error', title: 'Нельзя купить свой товар' });
                return;
            }

            if(me.bal < i.price) {
                Tst.fire({ icon: 'warning', title: 'Недостаточно средств' });
                return;
            }

            const did = 'd' + Date.now(); 
            db.child(`u/${me.id}/bal`).transaction(b => b - i.price); 
            db.child(`u/${i.sid}/bal`).transaction(b => (b || 0) + Math.floor(i.price * 0.9)); 
            db.child(`d/${did}`).set({id:did, bid:me.id, bn:me.n, sid:i.sid, t:i.title, p:i.price, status:'active'}); 
            db.child(`i/${id}`).remove(); 
            Tst.fire({ icon: 'success', title: 'Товар куплен!' });
            switchT('chats'); 
        }

        function openChat(id, t) { activeChat = id; document.getElementById('chat_modal').classList.remove('hidden'); document.getElementById('chat_admin_actions').classList.toggle('hidden', !(me.n === 'owwner' && id.startsWith('d'))); renderMessages(); }
        function closeChatModal() { activeChat = null; document.getElementById('chat_modal').classList.add('hidden'); }
        function sendMessage() { const t = document.getElementById('chat_input').value; if(!t) return; db.child(`msgs/${activeChat}/${Date.now()}`).set({sender:me.n, text:t}); document.getElementById('chat_input').value = ""; }
        function renderMessages() { const msgs = Object.values(data.msgs[activeChat] || {}); document.getElementById('chat_body').innerHTML = msgs.map(m => `<div class="msg ${m.sender === me.n ? 'msg-me' : 'msg-op'}"><b>${m.sender}</b><br>${m.text}</div>`).join(''); const b = document.getElementById('chat_body'); b.scrollTop = b.scrollHeight; }
        function upImg(i, tid) { const r = new FileReader(); r.onload = e => { tmpImg = e.target.result; document.getElementById(tid).innerHTML = `<img src="${tmpImg}" class="w-full h-full object-cover rounded-xl">`; }; r.readAsDataURL(i.files[0]); }
        function switchT(t) { document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active')); document.getElementById('tab_'+t).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active')); document.getElementById('n_'+t)?.classList.add('active'); }
        function logout() { localStorage.clear(); location.reload(); }
        function handleAuth() { const n = document.getElementById('a_n').value, p = document.getElementById('a_p').value; if(isR){ const id = 'u'+Date.now(); db.child(`u/${id}`).set({id, n, p, tg:document.getElementById('r_tg').value, ava:tmpImg, bal:0, sales:0}); localStorage.setItem('lyne_v120_sid', id); } else { const u = Object.values(data.u).find(x => x.n === n && x.p === p); if(u) { localStorage.setItem('lyne_v120_sid', u.id); location.reload(); } else { alert('Ошибка входа'); } } }
        function toggleR() { isR = !isR; document.getElementById('reg_ext').classList.toggle('hidden'); document.getElementById('a_tog').innerText = isR ? 'Уже есть аккаунт' : 'Создать аккаунт'; }
        function closeSubcat() { document.getElementById('subcat_view').classList.add('hidden'); document.getElementById('cat_grid').classList.remove('hidden'); }
        function closeCat() { document.getElementById('items_view').classList.add('hidden'); document.getElementById('subcat_view').classList.remove('hidden'); }
        function postItem() { 
            const id = 'i'+Date.now(); 
            const t = document.getElementById('s_t').value;
            const p = document.getElementById('s_p').value;
            if(!t || !p) return Tst.fire({icon:'error', title:'Заполните поля'});
            db.child(`i/${id}`).set({id, sid:me.id, seller:me.n, title:t, price:Number(p), gameId:document.getElementById('s_game').value, cat:document.getElementById('s_subcat').value, acc_data:document.getElementById('s_acc').value, img:tmpImg}); 
            switchT('market'); 
            Tst.fire({icon:'success', title:'Товар выставлен'});
        }
        function updateSubcats() { const g = data.games[document.getElementById('s_game').value]; if(g && g.cats) document.getElementById('s_subcat').innerHTML = Object.values(g.cats).map(c => `<option value="${c.name}">${c.name}</option>`).join(''); }

        init();
    </script>
</body>
</html>
