<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>anon:zadan | V36.2 ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; margin: 0; }
        .glass { background: rgba(20, 20, 25, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .input-mod { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 20px; width: 100%; color: #fff; outline: none; transition: 0.3s; font-size: 14px; font-weight: 600; }
        .btn-super { background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899); background-size: 200% 200%; border-radius: 28px; padding: 20px; font-weight: 900; width: 100%; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 15px 30px rgba(168, 85, 247, 0.3); transition: 0.4s; animation: grad 5s ease infinite; border: none; color: white; cursor: pointer; }
        @keyframes grad { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        #auth-screen { position: fixed; inset: 0; z-index: 9999; background: radial-gradient(circle at top right, #312e81, #000); display: flex; align-items: center; justify-content: center; padding: 20px; }
        #app { height: 100vh; display: flex; flex-direction: column; opacity: 0; transition: 0.6s ease; }
        #app.visible { opacity: 1; }
        .tab { display: none; height: 100vh; overflow-y: auto; padding-bottom: 150px; }
        .tab.active { display: block; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 95px; background: rgba(5,5,5,0.85); backdrop-filter: blur(30px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .nav-btn { color: #52525b; transition: 0.3s; font-size: 24px; padding: 15px; }
        .nav-btn.active { color: #a855f7; text-shadow: 0 0 20px rgba(168,85,247,0.5); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="glass p-10 w-full max-w-sm">
            <div class="text-center mb-10">
                <div class="w-20 h-20 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-[28px] mx-auto flex items-center justify-center shadow-2xl mb-5"><i class="fa-solid fa-fingerprint text-4xl text-white"></i></div>
                <h2 class="text-4xl font-black italic tracking-tighter">anon:<span class="text-indigo-400">access</span></h2>
            </div>
            <div id="auth_mode" class="space-y-4">
                <input id="auth_n" class="input-mod" placeholder="Никнейм">
                <input id="auth_t" class="input-mod" placeholder="@tg_username">
                <input id="auth_p" type="password" class="input-mod" placeholder="Пароль">
                <button onclick="auth('reg')" class="btn-super mt-2">Регистрация</button>
                <div class="text-center pt-4"><button onclick="toggleAuth()" class="text-[11px] font-bold text-zinc-500 uppercase">Уже есть аккаунт? Вход</button></div>
            </div>
            <div id="login_mode" class="space-y-4 hidden">
                <input id="login_t" class="input-mod" placeholder="@tg_username">
                <input id="login_p" type="password" class="input-mod" placeholder="Пароль">
                <button onclick="auth('login')" class="btn-super mt-2">Войти</button>
                <div class="text-center pt-4"><button onclick="toggleAuth()" class="text-[11px] font-bold text-zinc-500 uppercase">Нет аккаунта? Создать</button></div>
            </div>
        </div>
    </div>

    <div id="app">
        <header class="px-6 py-5 flex justify-between items-center glass rounded-none rounded-b-[40px] sticky top-0 z-50">
            <h1 class="text-2xl font-black italic tracking-tighter">anon:<span class="text-zinc-500">zadan</span></h1>
            <div id="top_bal" onclick="setTab('wallet')" class="bg-indigo-600/20 px-5 py-3 rounded-2xl text-xs font-black text-indigo-400">0 ₽</div>
        </header>

        <main id="home" class="tab active px-5 pt-8 space-y-6"><div id="task_list" class="grid gap-6"></div></main>
        
        <main id="wallet" class="tab px-5 pt-8">
            <div class="glass p-10 text-center space-y-8">
                <p class="text-[10px] font-black opacity-40 uppercase tracking-widest">Твой баланс</p>
                <h2 id="wallet_bal" class="text-6xl font-black italic">0 ₽</h2>
                <div class="grid grid-cols-2 gap-4"><button onclick="money('deposit')" class="py-6 bg-indigo-600 rounded-3xl font-black uppercase text-[10px]">Пополнить</button><button onclick="money('withdraw')" class="py-6 bg-zinc-800 rounded-3xl font-black uppercase text-[10px]">Вывести</button></div>
                <div id="trans_list" class="space-y-3 pt-4"></div>
            </div>
        </main>

        <main id="chats" class="tab px-5 pt-8">
            <div id="chat_list" class="space-y-4">
                <div onclick="openChat('support')" class="glass p-6 flex items-center gap-5 cursor-pointer">
                    <div class="w-14 h-14 bg-indigo-600 rounded-2xl flex justify-center items-center text-xl"><i class="fa-solid fa-headset"></i></div>
                    <div><b class="text-sm uppercase font-black">Уведомления системы</b><p class="text-[10px] opacity-50 mt-1">Чеки и статусы здесь</p></div>
                </div>
            </div>
            <div id="chat_room" class="hidden h-full flex flex-col -mt-8 bg-[#050505] relative z-[1001]">
                <div class="glass rounded-t-none p-5 flex items-center gap-4"><button onclick="closeChat()" class="text-xl px-2"><i class="fa-solid fa-chevron-left"></i></button><b class="font-black uppercase">Уведомления</b></div>
                <div id="chat_msgs" class="flex-1 overflow-y-auto p-5 space-y-4 pb-32"></div>
            </div>
        </main>

        <main id="profile" class="tab px-5 pt-8">
            <div class="glass p-10 text-center space-y-6">
                <h3 id="me_name" class="text-4xl font-black italic uppercase">...</h3>
                <p id="me_tg" class="text-zinc-500 font-bold">@tg</p>
                <button onclick="setTab('admin_login')" class="py-6 w-full bg-white/5 rounded-3xl font-black uppercase text-[10px] opacity-30 mt-10">Admin Login</button>
            </div>
        </main>

        <main id="admin_login" class="tab px-5 pt-24"><div class="glass p-10"><input type="password" oninput="if(this.value==='kalubxq') setTab('admin_panel')" class="input-mod text-center" placeholder="SECURE CODE"></div></main>
        
        <main id="admin_panel" class="tab px-4 pt-6 space-y-6">
            <h2 class="text-3xl font-black italic text-red-500 text-center uppercase tracking-tighter">Overlord v36.2</h2>
            <div class="glass p-6 space-y-4"><p class="text-[10px] font-black uppercase text-yellow-500">Заявки</p><div id="adm_reqs" class="space-y-4"></div></div>
        </main>

        <nav class="nav-bar">
            <button onclick="setTab('home')" id="n_home" class="nav-btn active"><i class="fa-solid fa-bolt"></i></button>
            <button onclick="setTab('wallet')" id="n_wallet" class="nav-btn"><i class="fa-solid fa-wallet"></i></button>
            <button onclick="setTab('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-comment-dots"></i></button>
            <button onclick="setTab('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user-ninja"></i></button>
        </nav>
    </div>

    <script>
        const TG = "8722822022:AAEmZa-V4-isxXnZ00omU8gAM_NtYevuL9Y";
        const ADM = "7040863301";
        const MY_SITE = "https://davadavydov2024-source.github.io/anon-zadan/";
        const CFG = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        
        firebase.initializeApp(CFG); 
        const dbRef = firebase.database().ref('anon_zadan_v36');
        let me = null, db = {u:{}, t:{}, c:{}, w:{}}, actC = null;

        function init() {
            const params = new URLSearchParams(window.location.search);
            const isBotGo = params.get('admin') === 'kalubxq';

            dbRef.on('value', s => {
                db = s.val() || {u:{}, t:{}, c:{}, w:{}}; 
                const id = localStorage.getItem('u_id');
                if(id && db.u[id]) { 
                    me = db.u[id]; 
                    document.getElementById('auth-screen').style.display='none'; 
                    document.getElementById('app').classList.add('visible'); 
                    render(); 
                    if(isBotGo) { setTab('admin_panel'); window.history.replaceState({}, document.title, MY_SITE); }
                } else document.getElementById('auth-screen').classList.remove('hidden');
            });
        }

        async function tg(txt, reqBtns = false) {
            let body = { chat_id: ADM, text: txt, parse_mode: "HTML" };
            if(reqBtns) {
                const fastLink = `${MY_SITE}?admin=kalubxq`;
                body.reply_markup = { inline_keyboard: [[ { text: "ДА 👑", url: fastLink }, { text: "НЕТ 🙁", url: fastLink } ]] };
            }
            await fetch(`https://api.telegram.org/bot${TG}/sendMessage`, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(body) });
        }

        async function money(type) {
            const {value: am} = await Swal.fire({title: 'СУММА ₽', input: 'number', background: '#111', color: '#fff'});
            if(am) { 
                const id="w"+Date.now(); 
                await dbRef.child(`w/${id}`).set({id, uid:me.id, n:me.n, t:me.t, type, amount:Number(am), st:'pending'});
                tg(`💳 <b>ЗАЯВКА</b>\nЮзер: @${me.t}\nТип: ${type==='deposit'?'ВВОД':'ВЫВОД'}\nСумма: ${am} ₽`, true); 
                Swal.fire('ОК','Заявка отправлена','success'); 
            }
        }

        function render() {
            document.getElementById('top_bal').innerText = me.bal + ' ₽';
            document.getElementById('wallet_bal').innerText = me.bal + ' ₽';
            document.getElementById('me_name').innerText = me.n;
            document.getElementById('me_tg').innerText = '@'+me.t;
            renderAdm(); if(actC) renderM();
            document.getElementById('trans_list').innerHTML = Object.values(db.w).filter(x=>x.uid===me.id).map(w=>`<div class="p-4 bg-white/5 rounded-2xl flex justify-between text-[10px] font-bold uppercase"><span>${w.type}</span><span class="${w.st==='success'?'text-green-500':w.st==='rejected'?'text-red-500':'text-yellow-500'}">${w.amount}₽ (${w.st})</span></div>`).reverse().join('');
        }

        function renderAdm() {
            document.getElementById('adm_reqs').innerHTML = Object.values(db.w).filter(x=>x.st==='pending').map(r => `
                <div class="glass p-5 mb-2">
                    <p class="text-xs font-black uppercase mb-3">@${r.t}: ${r.type} ${r.amount}₽</p>
                    <div class="flex gap-3"><button onclick="admOk('${r.id}',true)" class="flex-1 py-3 bg-indigo-600 rounded-xl font-black text-xs">ДА 👑</button><button onclick="admOk('${r.id}',false)" class="flex-1 py-3 bg-red-600/20 text-red-500 rounded-xl font-black text-xs">НЕТ 🙁</button></div>
                </div>`).join('') || '<p class="text-center opacity-20 text-xs">Нет заявок</p>';
        }

        async function admOk(id, ok) {
            const r = db.w[id]; if(!r) return;
            const u = db.u[r.uid];
            if(ok) {
                let nb = r.type==='deposit' ? Number(u.bal) + Number(r.amount) : Number(u.bal) - Number(r.amount);
                await dbRef.child(`u/${u.id}`).update({bal: nb});
                await dbRef.child(`w/${id}`).update({st:'success'});
                // Уведомление юзеру
                await dbRef.child(`c/${u.id}/${Date.now()}`).set({txt: `✅ Заявка на ${r.amount}₽ ОДОБРЕНА. Баланс обновлен!`, from:'sys'});
                tg(`✅ ОДОБРЕНО: @${u.t} +${r.amount}₽`);
            } else {
                await dbRef.child(`w/${id}`).update({st:'rejected'});
                // Уведомление юзеру об отмене
                await dbRef.child(`c/${u.id}/${Date.now()}`).set({txt: `❌ Заявка на ${r.amount}₽ ОТКЛОНЕНА администрацией.`, from:'sys'});
            }
            Swal.fire('ОК', 'Готово', 'success');
        }

        // Логика чата
        function openChat(id) { actC=id; document.getElementById('chat_list').classList.add('hidden'); document.getElementById('chat_room').classList.remove('hidden'); renderM(); }
        function closeChat() { actC=null; document.getElementById('chat_list').classList.remove('hidden'); document.getElementById('chat_room').classList.add('hidden'); }
        function renderM() {
            const msgs = Object.values(db.c[me.id] || {});
            document.getElementById('chat_msgs').innerHTML = msgs.map(m => `<div class="p-4 max-w-[85%] rounded-[24px] text-[11px] font-bold ${m.from==='sys'?'bg-indigo-600 self-start':'bg-zinc-800 self-end'}">${m.txt}</div>`).join('');
            const b = document.getElementById('chat_msgs'); b.scrollTop = b.scrollHeight;
        }

        function setTab(t) { 
            document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); 
            const target = document.getElementById(t); if(target) target.classList.add('active'); 
            document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active')); 
            const btn = document.getElementById('n_'+t); if(btn) btn.classList.add('active');
        }

        async function auth(m) {
            const t = document.getElementById(m==='reg'?'auth_t':'login_t').value, p = document.getElementById(m==='reg'?'auth_p':'login_p').value;
            if(!t || !p) return;
            const ex = Object.values(db.u).find(u => u.t === t);
            if(ex) { if(ex.p === p){ localStorage.setItem('u_id', ex.id); location.reload(); } }
            else { const id = "u"+Date.now(); await dbRef.child(`u/${id}`).set({id, n:document.getElementById('auth_n').value, t, p, bal:0}); localStorage.setItem('u_id', id); location.reload(); }
        }

        function toggleAuth() { document.getElementById('auth_mode').classList.toggle('hidden'); document.getElementById('login_mode').classList.toggle('hidden'); }
        init();
    </script>
</body>
</html>
