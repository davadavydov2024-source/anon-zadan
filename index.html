<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK OMEGA V120.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700&family=Orbitron:wght@900&family=UnifrakturMaguntia&display=swap');
        
        :root { --bg: #050505; --card: #121214; --text: #ffffff; --blue: #007aff; --gray: #1c1c1e; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: var(--card); border: 1px solid rgba(255,255,255,0.03); border-radius: 24px; }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px 16px 160px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Стили ников */
        .nick-gold { color: #ffcc00; text-shadow: 0 0 10px rgba(255,204,0,0.6); font-weight: 900; }
        .nick-diamond { color: #b9f2ff; text-shadow: 0 0 15px #b9f2ff; font-weight: 900; }
        .nick-neon { color: #00ffcc; text-shadow: 0 0 15px #00ffcc; font-weight: 900; }
        .nick-rainbow { background: linear-gradient(to right, #ef4444, #eab308, #22c55e, #3b82f6, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rb 3s linear infinite; font-weight: 900; }
        @keyframes rb { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        /* Шрифты */
        .f-cyber { font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }
        .f-mono { font-family: 'JetBrains Mono', monospace; }
        .f-gothic { font-family: 'UnifrakturMaguntia', serif; font-size: 1.2em; }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: rgba(10,10,10,0.8); backdrop-filter: blur(20px); display: flex; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #636366; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 700; }
        .nav-btn.active { color: var(--blue); }

        input, textarea, select { background: var(--gray); border: 1px solid transparent; border-radius: 14px; padding: 14px; color: white; width: 100%; outline: none; font-size: 14px; }
        .btn-blue { background: var(--blue); color: white; border-radius: 16px; font-weight: 800; padding: 16px; width: 100%; border: none; }
        
        #loader { background: #000; z-index: 10000; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
        
        /* Чат */
        .chat-container { display: flex; flex-direction: column; gap: 8px; padding: 10px; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 13px; line-height: 1.4; position: relative; }
        .msg-me { align-self: flex-end; background: var(--blue); color: white; border-bottom-right-radius: 4px; }
        .msg-op { align-self: flex-start; background: #2c2c2e; color: white; border-bottom-left-radius: 4px; }
    </style>
</head>
<body>

    <div id="loader"><div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>

    <div id="auth_scr" class="hidden fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-8">
        <h1 class="text-4xl font-black mb-12 italic tracking-tighter">LYNEOK<span class="text-blue-500">.</span></h1>
        <div class="w-full max-sm glass p-6 space-y-4">
            <div id="reg_ext" class="hidden space-y-4">
                <input type="file" id="r_ava" class="hidden" accept="image/*" onchange="upImg(this, 'l_r_ava')">
                <label for="r_ava" id="l_r_ava" class="w-20 h-20 bg-zinc-800 mx-auto rounded-full flex items-center justify-center cursor-pointer border-2 border-dashed border-zinc-700">
                    <i class="fa-solid fa-plus text-zinc-500"></i>
                </label>
                <input id="r_tg" placeholder="Telegram (@username)">
                </div>
            <input id="a_n" placeholder="Логин">
            <input id="a_p" type="password" placeholder="Пароль">
            <button onclick="handleAuth()" id="a_btn" class="btn-blue">Войти</button>
            <p onclick="toggleR()" id="a_tog" class="text-center text-[10px] font-black text-zinc-500 uppercase cursor-pointer tracking-widest pt-2">Создать аккаунт</p>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-5 py-4 flex justify-between items-center bg-black/50 backdrop-blur-md sticky top-0 z-50">
            <b class="text-xl italic">LYNEOK</b>
            <div onclick="switchT('profile')" class="bg-zinc-900 px-4 py-1.5 rounded-full flex items-center gap-2 border border-white/5">
                <span id="h_bal" class="font-bold text-xs">0 ₽</span>
                <img id="h_ava" class="w-6 h-6 rounded-full object-cover">
            </div>
        </header>

        <main id="tab_market" class="tab-content active">
            <div id="cat_grid" class="grid grid-cols-2 gap-3"></div>
            <div id="items_view" class="hidden space-y-4">
                <button onclick="closeCat()" class="text-blue-500 font-bold text-xs"><i class="fa-solid fa-chevron-left mr-1"></i> НАЗАД</button>
                <div id="items_list" class="space-y-3"></div>
            </div>
        </main>

        <main id="tab_sell" class="tab-content">
            <div class="glass p-5 space-y-4">
                <input type="file" id="s_img" class="hidden" onchange="upImg(this, 'l_s_img')">
                <label for="s_img" id="l_s_img" class="w-full h-40 bg-zinc-900 rounded-2xl flex flex-col items-center justify-center border-2 border-dashed border-zinc-800">
                    <i class="fa-solid fa-camera text-2xl text-zinc-700"></i>
                </label>
                <select id="s_cat" onchange="updateMethods()"></select>
                <select id="s_meth"></select>
                <input id="s_t" placeholder="Название">
                <textarea id="s_acc" placeholder="Данные аккаунта"></textarea>
                <input id="s_p" type="number" placeholder="Цена" oninput="calcComm()">
                <button onclick="postItem()" class="btn-blue">Опубликовать</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black">Чат и Сделки</h2>
                <button onclick="openChat('support_' + me.id, 'ПОДДЕРЖКА')" class="bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-black">СЛУЖБА ПОДДЕРЖКИ</button>
            </div>
            <div id="deals_list" class="space-y-3"></div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="glass p-6 mb-4 text-center">
                <img id="p_ava" class="w-24 h-24 rounded-full mx-auto mb-4 object-cover border-4 border-zinc-800">
                <div class="flex items-center justify-center gap-2 mb-1">
                    <span id="p_n" class="text-2xl font-black">...</span>
                    <span id="p_badge"></span>
                </div>
                <p id="p_tg" class="text-zinc-500 text-sm mb-6"></p>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="askPay()" class="btn-blue !bg-white !text-black py-3">ПОПОЛНИТЬ</button>
                    <button onclick="askOut()" class="btn-blue py-3">ВЫВОД</button>
                </div>
            </div>
            <button id="adm_btn" onclick="switchT('admin')" class="hidden w-full bg-red-600/10 text-red-500 border border-red-600/20 py-4 rounded-2xl font-bold mb-4">АДМИН-ПАНЕЛЬ</button>
            <button onclick="logout()" class="w-full py-4 text-red-500 opacity-30 text-xs font-black">ВЫЙТИ</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <h1 class="text-3xl font-black mb-6 italic">OMEGA ANALYTICS</h1>
            <input id="u_search" oninput="renderAdmin()" placeholder="Поиск юзера..." class="mb-8 !bg-zinc-900">

            <div class="space-y-8">
                <section>
                    <h3 class="text-[10px] font-black text-zinc-500 uppercase mb-4">Тикеты техподдержки</h3>
                    <div id="ad_tickets" class="space-y-2"></div>
                </section>
                <section>
                    <h3 class="text-[10px] font-black text-zinc-500 uppercase mb-4">Выводы</h3>
                    <div id="ad_outs" class="space-y-2"></div>
                </section>
                <section>
                    <h3 class="text-[10px] font-black text-zinc-500 uppercase mb-4">Все пользователи</h3>
                    <div id="ad_users" class="space-y-3"></div>
                </section>
            </div>
        </main>

        <nav class="nav-bar">
            <div onclick="switchT('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-shop text-xl"></i><span>Маркет</span></div>
            <div onclick="switchT('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-plus-circle text-xl"></i><span>Продать</span></div>
            <div onclick="switchT('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-comments text-xl"></i><span>Чат</span></div>
            <div onclick="switchT('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user text-xl"></i><span>Профиль</span></div>
        </nav>
    </div>

    <div id="chat_modal" class="hidden fixed inset-0 z-[10001] bg-black flex flex-col">
        <header class="p-5 flex justify-between items-center border-b border-white/5 bg-zinc-900/50">
            <b id="chat_title" class="text-lg italic">Чат</b>
            <button onclick="closeChatModal()" class="text-zinc-500 text-2xl">&times;</button>
        </header>
        <div id="chat_body" class="flex-1 overflow-y-auto chat-container"></div>
        <div class="p-4 border-t border-white/5 flex gap-2 bg-zinc-900">
            <input id="chat_input" placeholder="Сообщение..." class="flex-1">
            <button onclick="sendMessage()" class="bg-blue-600 w-12 h-12 rounded-xl flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const FB_CFG = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        const TG = { tok: "8641257792:AAEsxnQWEIeozMt_gnSwJdVgSFQlOc-hnuc", chat: "7040863301" };
        
        firebase.initializeApp(FB_CFG);
        const db = firebase.database().ref('lyne_v120_omega');
        const Tst = Swal.mixin({ toast: true, position: 'top', timer: 2000, showConfirmButton: false, background: '#1c1c1e', color: '#fff' });

        let me = null, data = {}, isR = false, tmpImg = "", activeChat = null;

        function bot(m) { fetch(`https://api.telegram.org/bot${TG.tok}/sendMessage?chat_id=${TG.chat}&text=${encodeURIComponent('🔱 OMEGA: ' + m)}`); }

        function init() {
            db.on('value', snap => {
                data = snap.val() || { u:{}, i:{}, d:{}, cats:{}, requests:{}, settings:{comm:10}, outs:{}, msgs:{} };
                const sid = localStorage.getItem('lyne_v120_sid');
                if (sid && data.u[sid]) {
                    me = data.u[sid];
                    if (me.ban) { alert(`BAN: ${me.banReason}`); logout(); return; }
                    document.getElementById('auth_scr').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    if(me.n.toLowerCase() === 'owwner') document.getElementById('adm_btn').classList.remove('hidden');
                    render();
                    if(activeChat) renderMessages();
                } else { document.getElementById('auth_scr').classList.remove('hidden'); }
                document.getElementById('loader').style.display = 'none';
            });
        }

        function render() {
            if(!me) return;
            document.getElementById('h_bal').innerText = me.bal + ' ₽';
            document.getElementById('h_ava').src = me.ava;
            document.getElementById('p_ava').src = me.ava;
            document.getElementById('p_n').innerText = me.n;
            document.getElementById('p_n').className = `text-2xl font-black ${me.style || ''} ${me.font || ''}`;
            document.getElementById('p_tg').innerText = me.tg;
            document.getElementById('p_badge').innerHTML = getB(me);

            const cats = Object.values(data.cats || {});
            document.getElementById('cat_grid').innerHTML = cats.map(c => `<div class="glass p-4 text-center" onclick="openCat('${c.name}')"><img src="${c.img}" class="w-12 h-12 mx-auto mb-2 rounded-xl object-cover"><p class="text-[10px] font-black uppercase">${c.name}</p></div>`).join('');
            document.getElementById('s_cat').innerHTML = cats.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            renderDeals();
            if(me.n.toLowerCase() === 'owwner') renderAdmin();
        }

        function getB(u) {
            const b = { blue: 'text-blue-500', gold: 'text-yellow-500', diamond: 'text-cyan-300' };
            return u.badge ? `<i class="fa-solid fa-certificate ${b[u.badge]}"></i>` : '';
        }

        function openChat(id, title) {
            activeChat = id;
            document.getElementById('chat_title').innerText = title;
            document.getElementById('chat_modal').classList.remove('hidden');
            renderMessages();
            if(me.n === 'owwner' && id.startsWith('support_')) db.child(`requests/${id.split('_')[1]}/status`).set('reading');
        }

        function closeChatModal() { activeChat = null; document.getElementById('chat_modal').classList.add('hidden'); }

        function sendMessage() {
            const text = document.getElementById('chat_input').value.trim();
            if(!text || !activeChat) return;
            const mid = Date.now();
            db.child(`msgs/${activeChat}/${mid}`).set({ sender: me.n, text: text, time: mid });
            document.getElementById('chat_input').value = "";
            if(activeChat.startsWith('support_') && me.n !== 'owwner') {
                const uid = me.id;
                db.child(`requests/support_${uid}`).set({ id:uid, name:me.n, status:'open', time:Date.now() });
            }
        }

        function renderMessages() {
            const msgs = Object.values(data.msgs[activeChat] || {});
            document.getElementById('chat_body').innerHTML = msgs.map(m => `<div class="msg ${m.sender === me.n ? 'msg-me' : 'msg-op'}"><p class="text-[9px] opacity-50 mb-1 font-black">${m.sender}</p>${m.text}</div>`).join('');
            const b = document.getElementById('chat_body');
            b.scrollTop = b.scrollHeight;
        }

        function renderAdmin() {
            const search = document.getElementById('u_search').value.toLowerCase();
            const tickets = Object.values(data.requests || {}).filter(r => r.status === 'open' || r.status === 'reading');
            document.getElementById('ad_tickets').innerHTML = tickets.map(t => `<div onclick="openChat('support_${t.id}', 'SUPPORT: ${t.name}')" class="glass p-3 flex justify-between items-center cursor-pointer border-l-4 ${t.status==='open' ? 'border-red-500' : 'border-blue-500'}"><div><b class="text-xs">${t.name}</b></div><i class="fa-solid fa-comment-dots text-zinc-600"></i></div>`).join('');

            const outs = Object.values(data.outs || {}).filter(o => o.status === 'pending');
            document.getElementById('ad_outs').innerHTML = outs.map(o => `<div class="glass p-3 flex justify-between items-center"><div class="text-[10px]"><b>${o.name}</b>: ${o.sum}₽ (${o.card})</div><button onclick="db.child('outs/${o.id}/status').set('done')" class="bg-green-600 px-3 py-1 rounded-lg text-[10px]">OK</button></div>`).join('');

            const users = Object.values(data.u).filter(u => u.n.toLowerCase().includes(search));
            document.getElementById('ad_users').innerHTML = users.map(u => `<div class="glass p-4"><div class="flex justify-between items-start mb-4"><div class="flex gap-3"><img src="${u.ava}" class="w-10 h-10 rounded-full object-cover"><div><b class="${u.style} ${u.font} text-sm">${u.n}</b><p class="text-[9px] text-zinc-500">P: ${u.p} | TG: ${u.tg}</p></div></div><b class="text-blue-500">${u.bal} ₽</b></div><div class="grid grid-cols-3 gap-2"><button onclick="admManageUser('${u.id}', 'bal')" class="bg-zinc-800 py-2 rounded text-[9px] font-black uppercase">Баланс</button><button onclick="admManageUser('${u.id}', 'badge')" class="bg-zinc-800 py-2 rounded text-[9px] font-black uppercase">Галка</button><button onclick="admManageUser('${u.id}', 'style')" class="bg-zinc-800 py-2 rounded text-[9px] font-black uppercase">Стиль</button><button onclick="admManageUser('${u.id}', 'font')" class="bg-zinc-800 py-2 rounded text-[9px] font-black uppercase">Шрифт</button><button onclick="admManageUser('${u.id}', 'ban')" class="bg-red-900/20 text-red-500 py-2 rounded text-[9px] font-black uppercase">Бан</button></div></div>`).join('');
        }

        function admManageUser(uid, action) {
            const u = data.u[uid];
            if(action === 'bal') Swal.fire({ title:'Изменить баланс', input:'number', inputValue:u.bal }).then(r => r.value && db.child(`u/${uid}/bal`).set(Number(r.value)));
            else if(action === 'badge') Swal.fire({ title:'Галка', input:'select', inputOptions:{'':'Нет','blue':'Синяя','gold':'Золотая','diamond':'Алмазная'} }).then(r => db.child(`u/${uid}/badge`).set(r.value));
            else if(action === 'style') Swal.fire({ title:'Стиль', input:'select', inputOptions:{'':'Обычный','nick-gold':'Золото','nick-diamond':'Бриллиант','nick-neon':'Неон','nick-rainbow':'Радуга'} }).then(r => db.child(`u/${uid}/style`).set(r.value));
            else if(action === 'font') Swal.fire({ title:'Шрифт', input:'select', inputOptions:{'':'Обычный','f-cyber':'Cyber','f-mono':'Mono','f-gothic':'Gothic'} }).then(r => db.child(`u/${uid}/font`).set(r.value));
            else if(action === 'ban') Swal.fire({ title:'Причина', input:'text' }).then(r => r.value && db.child(`u/${uid}`).update({ban:true, banReason:r.value}));
        }

        function handleAuth() {
            const n = document.getElementById('a_n').value.trim(), p = document.getElementById('a_p').value.trim();
            if (isR) {
                const tg = document.getElementById('r_tg').value.trim();
                if (!tg.includes('@') || !tmpImg) return Tst.fire({ icon:'error', title:'Заполни всё!' });
                const sid = 'u'+Date.now();
                db.child(`u/${sid}`).set({ id:sid, n, p, tg, ava:tmpImg, bal:0, sales:0, stars:0, revs:0, badge:'', font:'', style:'' });
                localStorage.setItem('lyne_v120_sid', sid);
            } else {
                const u = Object.values(data.u).find(x => x.n === n && x.p === p);
                if (u) localStorage.setItem('lyne_v120_sid', u.id);
                else Tst.fire({ icon:'error', title:'Ошибка данных' });
            }
        }

        function renderDeals() {
            const list = Object.values(data.d || {}).filter(d => d.bid === me.id || d.sid === me.id);
            document.getElementById('deals_list').innerHTML = list.reverse().map(d => `<div class="glass p-4 flex justify-between items-center"><div><b class="text-xs block mb-1">${d.t}</b><span class="text-[10px] text-zinc-500">${d.p} ₽</span></div><div class="flex gap-2"><button onclick="openChat('${d.id}', 'СДЕЛКА: ${d.t}')" class="bg-zinc-800 p-3 rounded-xl"><i class="fa-solid fa-comments"></i></button>${d.bid === me.id ? `<button onclick="Swal.fire('Данные','${d.acc}')" class="bg-blue-600 px-3 py-1 rounded-xl text-[10px] font-black">ИНФО</button>` : ''}</div></div>`).join('');
        }

        function buyItem(iid) {
            const i = data.i[iid];
            if(me.bal < i.price) return Tst.fire({ icon:'error', title:'Мало денег' });
            const did = 'd'+Date.now();
            db.child(`u/${me.id}/bal`).transaction(b => b - i.price);
            db.child(`u/${i.sid}/bal`).transaction(b => (b||0) + Math.floor(i.price * 0.9));
            db.child(`d/${did}`).set({ id:did, bid:me.id, bn:me.n, sid:i.sid, t:i.title, p:i.price, acc:i.acc_data, time:Date.now() });
            db.child(`i/${iid}`).remove().then(() => { Tst.fire({icon:'success',title:'Куплено!'}); switchT('chats'); });
        }

        function askPay() { Swal.fire({title:'Пополнение', input:'number'}).then(r => { if(r.value >= 50) { Tst.fire({icon:'info',title:'Заявка отправлена'}); bot(`💰 ${me.n} +${r.value}₽`); } }); }
        function askOut() { Swal.fire({title:'Вывод', html:'<input id="os" type="number" placeholder="Сумма"><input id="oc" placeholder="Карта">', preConfirm:()=>({s:document.getElementById('os').value, c:document.getElementById('oc').value}) }).then(r => { if(r.value.s >= 467 && r.value.s <= me.bal) { db.child(`u/${me.id}/bal`).transaction(b => b - r.value.s); db.child(`outs/out${Date.now()}`).set({id:'out'+Date.now(), uid:me.id, name:me.n, sum:r.value.s, card:r.value.c, status:'pending'}); } }); }

        function postItem() {
            const t = document.getElementById('s_t').value, p = Number(document.getElementById('s_p').value);
            if(!t || p < 50 || !tmpImg) return Tst.fire({icon:'error',title:'Заполни всё'});
            const iid = 'i'+Date.now();
            db.child(`i/${iid}`).set({ id:iid, sid:me.id, seller:me.n, title:t, price:p, cat:document.getElementById('s_cat').value, meth:'Auto', acc_data:document.getElementById('s_acc').value, img:tmpImg });
            switchT('market');
        }

        function switchT(t) { 
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.getElementById('tab_'+t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById('n_'+t)?.classList.add('active');
        }

        function upImg(input, tid) {
            const f = input.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const c = document.createElement('canvas'); const x = c.getContext('2d');
                    c.width = 400; c.height = 400; x.drawImage(img,0,0,400,400);
                    tmpImg = c.toDataURL('image/jpeg', 0.7);
                    document.getElementById(tid).innerHTML = `<img src="${tmpImg}" class="w-full h-full object-cover rounded-full">`;
                };
                img.src = e.target.result;
            };
            r.readAsDataURL(f);
        }

        function logout() { localStorage.clear(); location.reload(); }
        function toggleR() { isR = !isR; document.getElementById('reg_ext').classList.toggle('hidden', !isR); document.getElementById('a_btn').innerText = isR ? 'Создать аккаунт' : 'Войти'; }
        
        init();
    </script>
</body>
