<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>lyneok — Digital Marketplace</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        :root { --bg: #050505; --card: #0f0f12; --accent: #3b82f6; --zinc-900: #18181b; }
        body { background: var(--bg); color: #fff; font-family: 'Manrope', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding-bottom: 140px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-bar { position: fixed; bottom: 20px; left: 16px; right: 16px; height: 75px; background: rgba(15, 15, 18, 0.95); backdrop-filter: blur(20px); border-radius: 28px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .nav-btn { color: #52525b; font-size: 20px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn span { font-size: 9px; font-weight: 800; text-transform: uppercase; }
        .btn-action { background: var(--accent); padding: 16px; border-radius: 20px; font-weight: 800; text-align: center; width: 100%; display: block; }
        input, select { outline: none; transition: 0.2s; }
        input:focus { border-color: var(--accent) !important; }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 bg-black z-[9999] flex items-center justify-center font-black italic text-2xl">lyne<span class="text-blue-500">ok</span></div>

    <div id="auth_screen" class="hidden h-screen flex flex-col items-center justify-center px-10">
        <h1 class="text-5xl font-black italic mb-2">lyne<span class="text-blue-500">ok</span></h1>
        <p class="text-zinc-500 text-[10px] font-black uppercase tracking-[4px] mb-12 text-center">Ваш аккаунт будет сохранен на этом устройстве</p>
        <div class="w-full max-w-sm space-y-3">
            <input id="reg_n" class="w-full bg-zinc-900 border border-white/5 p-5 rounded-2xl text-sm font-bold" placeholder="Никнейм">
            <input id="reg_tg" class="w-full bg-zinc-900 border border-white/5 p-5 rounded-2xl text-sm font-bold" placeholder="Telegram ID">
            <input id="reg_p" type="password" class="w-full bg-zinc-900 border border-white/5 p-5 rounded-2xl text-sm font-bold" placeholder="Пароль">
            <button onclick="auth()" class="btn-action !mt-6 shadow-xl shadow-blue-500/10">Войти в 1 клик</button>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-6 py-4 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-xl z-50">
            <h1 class="text-2xl font-black italic">lyne<span class="text-blue-500">ok</span></h1>
            <div onclick="openFinanceMenu()" class="bg-blue-600/10 border border-blue-500/20 px-4 py-2 rounded-2xl active:scale-95 transition">
                <b id="h_bal" class="text-lg font-black">0</b> <span class="text-[10px] text-blue-500 font-bold">₽</span>
            </div>
        </header>

        <main id="tab_market" class="tab-content active px-5 pt-4">
            <div class="space-y-3" id="market_grid"></div>
        </main>

        <main id="tab_seller" class="tab-content">
            <div class="bg-gradient-to-b from-blue-600/10 p-10 text-center rounded-b-[40px] relative">
                <button onclick="switchTab('market')" class="absolute top-6 left-6 text-zinc-500"><i class="fa-solid fa-chevron-left"></i></button>
                <div class="w-24 h-24 bg-blue-600 rounded-[30px] mx-auto flex items-center justify-center text-4xl font-black mb-4" id="s_ava">?</div>
                <h2 id="s_name" class="text-2xl font-black">Seller</h2>
                <div class="flex justify-center gap-2 mt-4">
                    <button onclick="shareProfile()" class="bg-white/5 px-4 py-2 rounded-xl text-[10px] font-black uppercase"><i class="fa-solid fa-share mr-2"></i>Поделиться</button>
                </div>
            </div>
            <div class="px-5 mt-8" id="seller_items"></div>
        </main>

        <main id="tab_sell" class="tab-content px-5 pt-10">
            <div class="bg-zinc-900/50 p-8 rounded-[40px] border border-white/5">
                <h3 class="text-xl font-black mb-6">Выставить товар</h3>
                <div class="space-y-4">
                    <select id="l_cat" class="w-full bg-black p-5 rounded-2xl text-sm font-bold border border-white/5 appearance-none">
                        <option>Brawl Stars</option><option>Roblox</option><option>Clash Royale</option>
                        <option>Standoff 2</option><option>Fortnite</option><option>CS:GO / CS2</option>
                        <option>Telegram</option><option>ChatGPT</option>
                    </select>
                    <input id="l_title" class="w-full bg-black p-5 rounded-2xl text-sm font-bold border border-white/5" placeholder="Название товара">
                    <input id="l_price" oninput="calcComm()" type="number" class="w-full bg-black p-5 rounded-2xl text-xl font-black text-blue-500 border border-white/5" placeholder="Цена (от 70 ₽)">
                    <p id="comm_info" class="text-[9px] text-zinc-600 text-center font-bold uppercase">К получению: 0 ₽ (Комиссия 3%)</p>
                    <button onclick="createLot()" class="btn-action">Опубликовать</button>
                </div>
            </div>
        </main>

        <main id="tab_profile" class="tab-content px-5 pt-6">
            <div class="bg-zinc-900/30 p-8 rounded-[40px] text-center border border-white/5">
                <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto flex items-center justify-center text-3xl font-black mb-4" id="my_ava">?</div>
                <h3 id="my_name" class="text-xl font-black">User</h3>
                <div class="grid grid-cols-2 gap-3 mt-8">
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                        <b id="my_bal" class="text-lg font-black">0</b>
                        <p class="text-[8px] text-zinc-500 font-black uppercase tracking-widest">Баланс</p>
                    </div>
                    <div onclick="openSellerProfile(me.id)" class="bg-blue-600/10 p-4 rounded-2xl border border-blue-500/20 active:scale-95 transition">
                        <b class="text-lg font-black text-blue-500"><i class="fa-solid fa-store"></i></b>
                        <p class="text-[8px] text-zinc-500 font-black uppercase tracking-widest">Витрина</p>
                    </div>
                </div>
            </div>

            <div id="admin_terminal" class="hidden mt-8 pb-32">
                <div class="p-4 bg-red-600/5 rounded-3xl border border-red-600/10">
                    <h4 class="text-[10px] font-black uppercase text-red-500 text-center mb-4 italic tracking-[5px]">Admin Control</h4>
                    <div id="adm_deposits" class="space-y-2 mb-4"></div>
                    <input id="adm_promocode" class="w-full bg-black p-4 rounded-xl text-xs border border-white/5 mb-2" placeholder="Название промокода">
                    <input id="adm_promo_val" type="number" class="w-full bg-black p-4 rounded-xl text-xs border border-white/5 mb-2" placeholder="Сумма ₽">
                    <button onclick="createPromo()" class="w-full bg-blue-600 text-[10px] font-black py-3 rounded-xl uppercase">Создать промокод</button>
                </div>
            </div>
            <button onclick="logout()" class="w-full py-10 opacity-10 text-[10px] font-black uppercase">Выйти из сессии</button>
        </main>

        <nav class="nav-bar">
            <div onclick="switchTab('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-house"></i><span>Рынок</span></div>
            <div onclick="switchTab('sell')" id="n_sell" class="nav-btn !text-white bg-blue-600 w-14 h-14 rounded-full !justify-center -mt-10 shadow-xl shadow-blue-500/30"><i class="fa-solid fa-plus"></i></div>
            <div onclick="switchTab('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user-gear"></i><span>Меню</span></div>
        </nav>
    </div>

    <script>
        const CFG = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        const ADMIN_TG = { token: "8641257792:AAEsxnQWEIeozMt_gnSwJdVgSFQlOc-hnuc", id: "7040863301" };
        
        firebase.initializeApp(CFG);
        const db = firebase.database().ref('lyneok_v14');

        let me = null, data = {};

        function init() {
            db.on('value', snap => {
                data = snap.val() || { u: {}, i: {}, dep: {}, promo: {} };
                const savedUid = localStorage.getItem('lyne_session');
                
                if(!savedUid) toggleAuth(true);
                else {
                    me = data.u[savedUid];
                    if(me) {
                        toggleAuth(false); render();
                    } else {
                        localStorage.removeItem('lyne_session');
                        toggleAuth(true);
                    }
                }
                document.getElementById('loader').style.display = 'none';
            });
        }

        function toggleAuth(s) {
            document.getElementById('auth_screen').classList.toggle('hidden', !s);
            document.getElementById('app').classList.toggle('hidden', s);
        }

        async function auth() {
            const n = document.getElementById('reg_n').value.trim();
            const t = document.getElementById('reg_tg').value.trim();
            const p = document.getElementById('reg_p').value.trim();
            if(!n || !p) return Swal.fire('Error', 'Ник и пароль обязательны', 'error');

            let uid = Object.keys(data.u || {}).find(k => data.u[k].n === n);
            if(uid) {
                if(data.u[uid].p !== p) return Swal.fire('Ошибка', 'Неверный пароль', 'error');
            } else {
                uid = 'u' + Date.now().toString().slice(-7);
                await db.child(`u/${uid}`).set({ id: uid, n, tg: t, p, bal: 0, rating: 0, reviews: 0, joined: Date.now() });
                tgAdmin(`🆕 НОВЫЙ ИГРОК\nНик: ${n}\nTG ID: ${t}`);
            }
            
            localStorage.setItem('lyne_session', uid);
        }

        function render() {
            document.getElementById('h_bal').innerText = me.bal.toLocaleString();
            document.getElementById('my_bal').innerText = me.bal.toLocaleString();
            document.getElementById('my_name').innerText = me.n;
            document.getElementById('my_ava').innerText = me.n[0].toUpperCase();

            if(me.n === 'sswckk' || me.n === 'artyom') {
                document.getElementById('admin_terminal').classList.remove('hidden');
                renderAdmin();
            }

            const items = Object.values(data.i || {}).reverse();
            document.getElementById('market_grid').innerHTML = items.map(i => `
                <div class="bg-zinc-900/50 p-5 rounded-[24px] border border-white/5 flex justify-between items-center">
                    <div class="flex items-center gap-4 flex-1" onclick="buyItem('${i.id}')">
                        <div class="w-12 h-12 bg-blue-600/10 rounded-2xl flex items-center justify-center text-blue-500 text-xl"><i class="${getIcon(i.cat)}"></i></div>
                        <div><h4 class="font-bold text-sm">${i.title}</h4><p class="text-[10px] text-zinc-600 font-bold uppercase">${i.cat}</p></div>
                    </div>
                    <div class="text-right">
                        <b class="text-blue-500 block">${i.price} ₽</b>
                        <span onclick="openSellerProfile('${i.sid}')" class="text-[9px] font-black text-zinc-700 uppercase underline">${data.u[i.sid]?.n || 'System'}</span>
                    </div>
                </div>
            `).join('');
        }

        async function openFinanceMenu() {
            const { value: act } = await Swal.fire({
                title: 'Финансы',
                background: '#0f0f12', color: '#fff',
                showDenyButton: true,
                confirmButtonText: 'Пополнить',
                denyButtonText: 'Промокод',
                confirmButtonColor: '#3b82f6',
                denyButtonColor: '#18181b'
            });

            if(act === true) {
                const { value: amount } = await Swal.fire({ title: 'Пополнение', input: 'number', background: '#0f0f12', color: '#fff' });
                if(amount > 0) {
                    const depId = 'dep' + Date.now();
                    await db.child(`dep/${depId}`).set({ id: depId, uid: me.id, n: me.n, sum: amount, status: 'wait' });
                    tgAdmin(`💰 ЗАЯВКА НА ПОПОЛНЕНИЕ\nЮзер: ${me.n}\nСумма: ${amount}₽`);
                    Swal.fire('Готово', 'Заявка отправлена админу', 'success');
                }
            } else if (act === false) {
                const { value: code } = await Swal.fire({ title: 'Введи промокод', input: 'text', background: '#0f0f12', color: '#fff' });
                const promo = Object.values(data.promo || {}).find(p => p.code === code);
                if(promo && !promo.usedBy?.[me.id]) {
                    await db.child(`u/${me.id}/bal`).set(me.bal + Number(promo.val));
                    await db.child(`promo/${promo.id}/usedBy/${me.id}`).set(true);
                    tgAdmin(`🎫 ПРОМОКОД АКТИВИРОВАН\nЮзер: ${me.n}\nКод: ${code}\nБонус: ${promo.val}₽`);
                    Swal.fire('Ура!', `Вам зачислено ${promo.val}₽`, 'success');
                } else {
                    Swal.fire('Ошибка', 'Код неверный или уже использован', 'error');
                }
            }
        }

        function createPromo() {
            const code = document.getElementById('adm_promocode').value;
            const val = document.getElementById('adm_promo_val').value;
            if(!code || !val) return;
            const id = 'pr' + Date.now();
            db.child(`promo/${id}`).set({ id, code, val });
            Swal.fire('Ок', 'Промокод создан', 'success');
        }

        function renderAdmin() {
            const deps = Object.values(data.dep || {}).filter(d => d.status === 'wait');
            document.getElementById('adm_deposits').innerHTML = deps.map(d => `
                <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/5">
                    <span class="text-[10px] font-bold">${d.n}: ${d.sum}₽</span>
                    <button onclick="approveDep('${d.id}')" class="bg-blue-600 px-3 py-1 rounded-lg text-[8px] font-black uppercase">Одобрить</button>
                </div>
            `).join('') || '<p class="text-center text-[8px] opacity-20">ЗАЯВОК НЕТ</p>';
        }

        async function approveDep(id) {
            const d = data.dep[id];
            const u = data.u[d.uid];
            await db.child(`u/${d.uid}/bal`).set((u.bal || 0) + Number(d.sum));
            await db.child(`dep/${id}/status`).set('ok');
            fetch(`https://api.telegram.org/bot${ADMIN_TG.token}/sendMessage?chat_id=${u.tg}&text=${encodeURIComponent(`✅ Баланс пополнен на ${d.sum}₽!`)}`);
        }

        function tgAdmin(m) { fetch(`https://api.telegram.org/bot${ADMIN_TG.token}/sendMessage?chat_id=${ADMIN_TG.id}&text=${encodeURIComponent(m)}`); }
        function logout() { localStorage.removeItem('lyne_session'); location.reload(); }
        function getIcon(cat) { const icons = { 'Brawl Stars': 'fa-solid fa-star', 'Roblox': 'fa-solid fa-cube', 'Clash Royale': 'fa-solid fa-chess-king', 'Standoff 2': 'fa-solid fa-gun', 'Fortnite': 'fa-solid fa-person-rifle', 'CS:GO / CS2': 'fa-solid fa-shield-halved', 'Telegram': 'fa-brands fa-telegram', 'ChatGPT': 'fa-solid fa-robot' }; return icons[cat] || 'fa-solid fa-gamepad'; }
        function switchTab(t) { document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active')); document.getElementById('tab_'+t).classList.add('active'); if(t !== 'sell' && t !== 'seller') document.getElementById('n_'+t).classList.add('active'); }
        function calcComm() { const p = document.getElementById('l_price').value; const net = p > 0 ? Math.floor(p * 0.97) : 0; document.getElementById('comm_info').innerText = `К получению: ${net} ₽ (Комиссия 3%)`; }
        async function createLot() { const t = document.getElementById('l_title').value; const p = Number(document.getElementById('l_price').value); const c = document.getElementById('l_cat').value; if(p < 70 || !t) return Swal.fire('Упс', 'Мин. цена 70₽', 'warning'); const lid = 'i' + Date.now(); await db.child(`i/${lid}`).set({ id: lid, sid: me.id, title: t, price: p, cat: c }); switchTab('market'); tgAdmin(`📦 НОВЫЙ ТОВАР\nПродавец: ${me.n}\nТовар: ${t}\nЦена: ${p}₽`); }

        init();
    </script>
</body>
</html>
