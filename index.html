<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK TITAN V122 | MEGA FIXED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style> 
        :root { --bg: #050505; --card: #121214; --text: #ffffff; --blue: #007aff; --gray: #1c1c1e; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .glass { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 24px; }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px 16px 180px; scrollbar-width: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(10,10,10,0.9); backdrop-filter: blur(25px); display: flex; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #636366; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: 0.3s; } 
        .nav-btn.active { color: var(--blue); }
        input, textarea { background: var(--gray); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; color: white; width: 100%; outline: none; }
        .btn-blue { background: var(--blue); color: white; border-radius: 18px; font-weight: 900; padding: 18px; width: 100%; cursor: pointer; text-transform: uppercase; }
        #loader { background: #000; z-index: 10000; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="loader"><div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>

    <div id="maintenance_scr" class="hidden fixed inset-0 z-[20000] bg-black flex flex-col items-center justify-center p-8 text-center">
        <i class="fa-solid fa-clock-rotate-left text-5xl text-yellow-500 mb-6 animate-pulse"></i>
        <h1 id="maint_title" class="text-3xl font-black text-yellow-500 mb-4">ТЕХ. РАБОТЫ</h1>
        <div id="maint_timer" class="text-2xl font-mono font-bold mb-6 text-white bg-white/5 p-4 rounded-2xl">00:00:00</div>
        <div id="maint_texts" class="opacity-60 text-sm mb-8"></div>
    </div>

    <div id="auth_scr" class="hidden fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-8">
        <h1 class="text-4xl font-black mb-12 italic">LYNEOK<span class="text-blue-500">.</span></h1>
        <div class="w-full glass p-6 space-y-4">
            <input id="a_n" placeholder="Никнейм">
            <input id="a_p" type="password" placeholder="Пароль">
            <button onclick="handleAuth()" id="a_btn" class="btn-blue">Войти</button>
            <p onclick="toggleR()" id="a_tog" class="text-center text-[10px] uppercase opacity-40 cursor-pointer">Создать аккаунт</p>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="p-6 flex justify-between items-center border-b border-white/5">
            <b class="text-2xl italic text-blue-500">LYNEOK</b>
            <div class="flex items-center gap-3">
                <div class="text-right"><p class="text-[8px] opacity-40">БАЛАНС</p><span id="h_bal" class="font-black text-sm">0 ₽</span></div>
                <img id="h_ava" class="w-10 h-10 rounded-full bg-zinc-800" onclick="switchT('profile')">
            </div>
        </header>

        <main id="tab_market" class="tab-content active"><h2 class="text-2xl font-black mb-6">Маркет</h2><div id="cat_grid" class="grid grid-cols-3 gap-3"></div></main>
        
        <main id="tab_chats" class="tab-content"><h2 class="text-2xl font-black mb-6">Сделки</h2><div id="deals_list" class="space-y-4"></div></main>

        <main id="tab_profile" class="tab-content text-center">
            <img id="p_ava" class="w-24 h-24 mx-auto mb-4 rounded-full">
            <h2 id="p_n" class="text-2xl font-black mb-6">...</h2>
            <button id="adm_btn" onclick="switchT('admin')" class="hidden w-full bg-red-600/20 text-red-500 py-4 rounded-2xl font-black mb-4">ADMIN PANEL</button>
            <button onclick="logout()" class="text-xs opacity-40 uppercase">Выйти</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <h2 class="text-2xl font-black mb-6 text-red-500">TITAN SETTINGS</h2>
            <div class="glass p-5 space-y-4 mb-6">
                <h3 class="text-xs font-bold uppercase opacity-40">Тех. Перерыв</h3>
                <label class="flex justify-between items-center bg-black/20 p-3 rounded-xl">
                    <span class="text-xs">Включить работы</span>
                    <input type="checkbox" id="ad_maint_active">
                </label>
                <div class="grid grid-cols-3 gap-2">
                    <input id="ad_m_d" type="number" placeholder="Дни" class="!p-2 text-center text-xs">
                    <input id="ad_m_h" type="number" placeholder="Часы" class="!p-2 text-center text-xs">
                    <input id="ad_m_m" type="number" placeholder="Мин" class="!p-2 text-center text-xs">
                </div>
                <input id="ad_m_white" placeholder="Белый список (через запятую)" class="!p-3 text-xs">
                <button onclick="saveMaint()" class="btn-blue !p-3 text-xs">Обновить статус</button>
            </div>
            <div id="ad_users" class="space-y-2"></div>
        </main>

        <nav class="nav-bar">
            <div onclick="switchT('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-store"></i><span>Маркет</span></div>
            <div onclick="switchT('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-receipt"></i><span>Сделки</span></div>
            <div onclick="switchT('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user"></i><span>Профиль</span></div>
        </nav>
    </div>

    <div id="review_modal" class="hidden fixed inset-0 z-[30000] bg-black/95 flex items-center justify-center p-6">
        <div class="glass p-8 w-full text-center space-y-6">
            <h3 class="text-xl font-black uppercase">Оцените сделку</h3>
            <div id="stars" class="flex justify-center gap-3 text-3xl">
                <i onclick="setRate(1)" class="fa-solid fa-star text-zinc-800"></i>
                <i onclick="setRate(2)" class="fa-solid fa-star text-zinc-800"></i>
                <i onclick="setRate(3)" class="fa-solid fa-star text-zinc-800"></i>
                <i onclick="setRate(4)" class="fa-solid fa-star text-zinc-800"></i>
                <i onclick="setRate(5)" class="fa-solid fa-star text-zinc-800"></i>
            </div>
            <textarea id="rev_text" placeholder="Ваш отзыв..." class="text-sm"></textarea>
            <button onclick="sendReview()" class="btn-blue">Отправить</button>
        </div>
    </div>

    <script>
        // Инициализация (Замени на свои данные, если надо)
        firebase.initializeApp({ apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" });
        const db = firebase.database().ref('lyne_v122_titan');
        const Tst = Swal.mixin({ toast: true, position: 'top', timer: 2000, showConfirmButton: false });

        let me = null, data = {}, isR = false, curRate = 0, curDeal = null;

        // ПРЕДОХРАНИТЕЛЬ ЛОАДЕРА (Уберет его через 3 сек в любом случае)
        setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 3000);

        function init() {
            db.on('value', snap => {
                data = snap.val() || { u:{}, d:{}, settings:{ maint:{active:false, endTime:0, whitelist:""} } };
                document.getElementById('loader').style.display = 'none';
                checkSession();
                render();
            });
        }

        function checkSession() {
            const sid = localStorage.getItem('lyne_v122_sid');
            if (sid && data.u[sid]) {
                me = data.u[sid];
                
                // ЛОГИКА ТЕХ РАБОТ
                const m = data.settings.maint;
                const isWhite = (m.whitelist || "").toLowerCase().split(',').map(x=>x.trim()).includes(me.n.toLowerCase());
                if (m.active && !isWhite && m.endTime > Date.now()) {
                    showMaint(m);
                } else {
                    document.getElementById('maintenance_scr').classList.add('hidden');
                    document.getElementById('auth_scr').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                }
            } else {
                document.getElementById('auth_scr').classList.remove('hidden');
            }
        }

        function showMaint(m) {
            document.getElementById('maintenance_scr').classList.remove('hidden');
            document.getElementById('app').classList.add('hidden');
            const timer = setInterval(() => {
                const diff = m.endTime - Date.now();
                if (diff <= 0) { clearInterval(timer); location.reload(); }
                const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
                document.getElementById('maint_timer').innerText = `${h}ч ${m}м ${s}с`;
            }, 1000);
        }

        function saveMaint() {
            const d = Number(document.getElementById('ad_m_d').value)||0, h = Number(document.getElementById('ad_m_h').value)||0, m = Number(document.getElementById('ad_m_m').value)||0;
            const end = Date.now() + (d*86400000) + (h*3600000) + (m*60000);
            db.child('settings/maint').update({
                active: document.getElementById('ad_maint_active').checked,
                endTime: end,
                whitelist: document.getElementById('ad_m_white').value
            });
            Tst.fire({icon:'success', title:'Настройки сохранены'});
        }

        function render() {
            if(!me) return;
            document.getElementById('h_bal').innerText = me.bal + ' ₽';
            document.getElementById('h_ava').src = me.ava || 'https://ui-avatars.com/api/?name='+me.n;
            document.getElementById('p_ava').src = me.ava || 'https://ui-avatars.com/api/?name='+me.n;
            document.getElementById('p_n').innerText = me.n;
            if(me.n.toLowerCase() === 'owwner') document.getElementById('adm_btn').classList.remove('hidden');

            const deals = Object.values(data.d || {}).filter(d => d.bid === me.id || d.sid === me.id).reverse();
            document.getElementById('deals_list').innerHTML = deals.map(d => `
                <div class="glass p-4 flex justify-between items-center">
                    <div><b>${d.t}</b><br><span class="text-[10px] opacity-40">${d.status}</span></div>
                    ${(d.status==='Подтверждено' && !d.reviewed && d.bid===me.id) ? `<button onclick="openRev('${d.id}')" class="bg-yellow-600 px-3 py-2 rounded-xl text-[10px] font-black">ОТЗЫВ</button>` : ''}
                </div>`).join('');
        }

        function openRev(did) { curDeal = did; document.getElementById('review_modal').classList.remove('hidden'); }
        function setRate(r) { curRate = r; document.querySelectorAll('#stars i').forEach((s,i)=>s.className = i<r ? 'fa-solid fa-star text-yellow-500':'fa-solid fa-star text-zinc-800'); }
        function sendReview() {
            if(!curRate) return;
            db.child(`reviews/r${Date.now()}`).set({ did: curDeal, from: me.n, rate: curRate, text: document.getElementById('rev_text').value });
            db.child(`d/${curDeal}/reviewed`).set(true);
            document.getElementById('review_modal').classList.add('hidden');
            Tst.fire({icon:'success', title:'Спасибо за отзыв!'});
        }

        function handleAuth() {
            const n = document.getElementById('a_n').value, p = document.getElementById('a_p').value;
            if(isR) {
                const id = 'u'+Date.now();
                db.child(`u/${id}`).set({id, n, p, bal:0});
                localStorage.setItem('lyne_v122_sid', id);
            } else {
                const u = Object.values(data.u || {}).find(x=>x.n===n && x.p===p);
                if(u) { localStorage.setItem('lyne_v122_sid', u.id); location.reload(); }
                else Tst.fire({icon:'error', title:'Ошибка входа'});
            }
        }

        function switchT(t) {
            document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
            document.getElementById('tab_'+t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
            document.getElementById('n_'+t)?.classList.add('active');
        }

        function toggleR() { isR=!isR; document.getElementById('a_tog').innerText = isR ? 'Войти':'Создать'; document.getElementById('a_btn').innerText = isR?'Создать':'Войти'; }
        function logout() { localStorage.clear(); location.reload(); }

        init();
    </script>
</body>
</html>
