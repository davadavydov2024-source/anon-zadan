<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>anon:zadan v7.0 COMPLETE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { background: #0a0a0b; color: #e4e4e7; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: #161618; border: 1px solid #27272a; border-radius: 24px; overflow: hidden; }
        .tab { display: none; }
        .tab.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn-accent { background: #ffffff; color: #000; border-radius: 16px; font-weight: 800; }
        .input-dark { background: #0f0f10 !important; border: 1px solid #27272a !important; color: white !important; border-radius: 14px !important; outline: none; }
        .ban-screen { display:none; position:fixed; inset:0; background:#000; z-index:9999; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
        .swal2-input { color: black !important; background: white !important; }
        .verify-badge { color: #3b82f6; font-size: 10px; margin-left: 4px; }
    </style>
</head>
<body class="pb-28">

    <div id="ban-overlay" class="ban-screen">
        <img src="https://media.tenor.com/8s76Y9v-v80AAAAd/cat-sad.gif" class="w-48 mb-6 rounded-full border-4 border-red-500">
        <h1 class="text-2xl font-black text-red-500 italic uppercase">anon:zadan</h1>
        <p id="ban-text" class="text-zinc-500 text-[10px] mt-2 px-10">...</p>
    </div>

    <header class="p-5 flex justify-between items-center sticky top-0 bg-[#0a0a0b]/90 backdrop-blur-md z-50 border-b border-white/5">
        <h1 class="text-lg font-extrabold italic tracking-tighter">anon:<span class="text-zinc-600">zadan</span></h1>
        <div id="u-bal-head" class="bg-zinc-900 px-4 py-1.5 rounded-full text-[11px] font-bold border border-zinc-800 text-white">0.00₽</div>
    </header>

    <section id="home" class="tab active px-5 pt-4">
        <div id="zadan-list" class="space-y-4 pb-10"></div>
    </section>

    <section id="create" class="tab px-5 pt-4">
        <div class="card p-6 space-y-4">
            <h2 class="font-bold text-[10px] opacity-40 uppercase tracking-widest text-center">Создать задание</h2>
            <input id="z-title" class="input-dark w-full p-4 text-xs" placeholder="Название">
            <textarea id="z-desc" class="input-dark w-full p-4 text-xs h-20" placeholder="Описание задания..."></textarea>
            <input id="z-addr" class="input-dark w-full p-4 text-xs" placeholder="Адрес / Район">
            <input id="z-price" type="number" class="input-dark w-full p-4 text-xs" placeholder="Цена в ₽">
            <button onclick="createZadan()" class="w-full btn-accent py-5 text-[11px] uppercase tracking-widest italic">Опубликовать</button>
        </div>
    </section>

    <section id="chats" class="tab px-5 pt-4">
        <div id="chat-list-screen">
            <div id="dialog-list" class="card divide-y divide-zinc-800">
                <div onclick="openDialog()" class="p-5 flex items-center gap-4 active:bg-zinc-800">
                    <div class="w-12 h-12 bg-zinc-900 border border-zinc-800 rounded-full flex items-center justify-center font-black italic">A</div>
                    <div class="flex-1">
                        <div class="flex justify-between items-center">
                            <b class="text-sm italic">anon : zadan <i class="fa-solid fa-circle-check verify-badge"></i></b>
                            <span class="text-[8px] text-green-500 uppercase font-bold">online</span>
                        </div>
                        <p class="text-[10px] opacity-40">Поддержка и новости</p>
                    </div>
                </div>
            </div>
        </div>
        <div id="chat-room-screen" class="hidden">
            <div class="flex items-center gap-3 mb-4">
                <button onclick="closeDialog()" class="text-zinc-500 text-xs"><i class="fa-solid fa-chevron-left"></i> Назад</button>
                <span class="text-xs font-bold italic">anon : zadan <i class="fa-solid fa-circle-check verify-badge"></i></span>
            </div>
            <div class="card p-4 h-[58vh] flex flex-col">
                <div id="messages-container" class="flex-1 overflow-y-auto space-y-4 flex flex-col"></div>
                <div class="flex gap-2 mt-4">
                    <input id="msg-input" class="input-dark flex-1 p-3 text-[11px]" placeholder="Сообщение...">
                    <button onclick="sendMessage()" class="bg-blue-600 w-12 h-11 rounded-xl flex items-center justify-center"><i class="fa-solid fa-paper-plane text-white"></i></button>
                </div>
            </div>
        </div>
    </section>

    <section id="me" class="tab px-5 pt-4 text-center">
        <div class="card p-8 space-y-6">
            <h3 id="u-nick" class="font-black text-2xl tracking-tighter italic">...</h3>
            <div id="u-bal-main" class="bg-zinc-900 p-7 rounded-[32px] border border-zinc-800 font-black text-3xl italic">0₽</div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="deposit()" class="btn-accent py-4 text-[10px] uppercase italic">Пополнить</button>
                <button onclick="withdraw()" class="bg-zinc-800 py-4 rounded-xl text-[10px] uppercase text-zinc-400 italic">Вывод</button>
            </div>
            <button onclick="logout()" class="text-[9px] text-zinc-600 font-bold uppercase mt-4">Выйти</button>
            <button onclick="setTab('admin_login')" class="opacity-10 text-[8px] uppercase font-bold mt-10 block mx-auto">Admin</button>
        </div>
    </section>

    <section id="admin_login" class="tab px-5 pt-20">
        <input type="password" oninput="if(this.value.toLowerCase()==='kalubxq') setTab('admin')" class="w-full p-6 text-center input-dark card" placeholder="ACCESS KEY">
    </section>

    <section id="admin" class="tab px-5 pt-4 pb-32 space-y-4">
        <div class="card p-5 space-y-3">
            <h2 class="text-[10px] font-bold text-blue-500 uppercase italic">Рассылка (anon:zadan ✅)</h2>
            <textarea id="adm-news-txt" class="input-dark w-full p-3 text-xs h-16" placeholder="Текст..."></textarea>
            <input type="file" id="adm-news-file" class="hidden" onchange="processFile(this)">
            <button onclick="document.getElementById('adm-news-file').click()" class="w-full bg-zinc-900 border border-zinc-800 py-2 rounded-lg text-[9px] uppercase">Фото</button>
            <div class="grid grid-cols-2 gap-2">
                <input id="adm-btn-txt" class="input-dark p-3 text-[10px]" placeholder="Текст кнопки">
                <input id="adm-btn-val" class="input-dark p-3 text-[10px]" placeholder="Ссылка/Команда">
            </div>
            <button onclick="broadcastNews()" class="w-full bg-blue-600 py-3 rounded-xl text-[10px] font-bold uppercase italic">Отправить всем</button>
        </div>
        <div class="card p-5 space-y-3">
            <h2 class="text-[10px] font-bold text-red-500 uppercase italic">Бан / Баланс</h2>
            <input id="adm-nick" class="input-dark w-full p-3 text-xs" placeholder="Ник юзера">
            <div class="grid grid-cols-3 gap-1">
                <button onclick="adminAction('bal')" class="bg-zinc-800 py-3 rounded-lg text-[8px]">БАЛАНС</button>
                <button onclick="adminAction('ban')" class="bg-red-900 text-white py-3 rounded-lg text-[8px]">БАН</button>
                <button onclick="adminAction('unban')" class="bg-green-900 text-white py-3 rounded-lg text-[8px]">UNBAN</button>
            </div>
        </div>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-black/95 border-t border-zinc-900 flex justify-around items-center z-[100] px-4">
        <button onclick="setTab('home')" id="btn-home"><i class="fa-solid fa-house text-lg"></i></button>
        <button onclick="setTab('create')" id="btn-create" class="opacity-30"><i class="fa-solid fa-plus-circle text-lg"></i></button>
        <button onclick="setTab('chats')" id="btn-chats" class="opacity-30"><i class="fa-solid fa-comment-dots text-lg"></i></button>
        <button onclick="setTab('me')" id="btn-me" class="opacity-30"><i class="fa-solid fa-user text-lg"></i></button>
    </nav>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
          authDomain: "dogx-base.firebaseapp.com",
          databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
          projectId: "dogx-base",
          storageBucket: "dogx-base.firebasestorage.app",
          messagingSenderId: "81713249793",
          appId: "1:81713249793:web:1b44a13e6faf5acfa78a00"
        };

        const DB_VER = 'anon_v7_0';
        firebase.initializeApp(firebaseConfig);
        const rdb = firebase.database();
        let db = { users: {}, tasks: {}, notifications: {} };
        let me = null;
        let isAuthOpen = false;
        let tempFile = "";

        function init() {
            rdb.ref(DB_VER).on('value', (s) => {
                db = s.val() || { users: {}, tasks: {}, notifications: {} };
                const uid = localStorage.getItem('anon_uid');
                if (uid && db.users && db.users[uid]) {
                    me = db.users[uid];
                    if(me.banUntil && me.banUntil > Date.now()) {
                        document.getElementById('ban-overlay').style.display = 'flex';
                        document.getElementById('ban-text').innerText = `Бан до: ${new Date(me.banUntil).toLocaleTimeString()}`;
                    } else { document.getElementById('ban-overlay').style.display = 'none'; }
                    renderAll();
                } else if(!isAuthOpen) { showAuth(true); }
            });
        }

        // АВТОРИЗАЦИЯ
        async function showAuth(isL) {
            isAuthOpen = true;
            const { value: f } = await Swal.fire({
                title: isL ? 'ВХОД' : 'РЕГИСТРАЦИЯ',
                background: '#161618', color: '#fff',
                html: `<input id="s-n" class="swal2-input" placeholder="Ник"><input id="s-p" type="password" class="swal2-input" placeholder="Пароль">${!isL ? '<input id="s-tg" class="swal2-input" placeholder="Telegram">' : ''}<button onclick="window.toggleAuth()" class="mt-4 text-blue-500 text-[10px] block w-full uppercase font-bold">${isL ? 'Создать аккаунт' : 'Есть аккаунт'}</button>`,
                confirmButtonText: 'OK', allowOutsideClick: false,
                preConfirm: () => [document.getElementById('s-n').value, document.getElementById('s-p').value, !isL ? document.getElementById('s-tg').value : '']
            });
            isAuthOpen = false;
            if(f && f[0]) {
                const [n, p, tg] = f;
                const user = Object.values(db.users).find(u => u.nick === n);
                if(isL) {
                    if(user && user.pass === p) { localStorage.setItem('anon_uid', user.id); location.reload(); }
                    else { Swal.fire('Ошибка','','error'); showAuth(true); }
                } else {
                    const id = "u"+Date.now();
                    await rdb.ref(`${DB_VER}/users/${id}`).set({id, nick:n, pass:p, tg, bal:0});
                    localStorage.setItem('anon_uid', id); location.reload();
                }
            }
        }
        window.toggleAuth = () => { const l = Swal.getTitle().innerText === 'ВХОД'; showAuth(!l); };

        // ЗАДАНИЯ
        function createZadan() {
            const t = document.getElementById('z-title').value;
            const p = Number(document.getElementById('z-price').value);
            const a = document.getElementById('z-addr').value;
            if(!t || !p) return;
            const id = "z"+Date.now();
            rdb.ref(`${DB_VER}/tasks/${id}`).set({id, title:t, price:p, addr:a, status:'active', created:Date.now()});
            setTab('home');
        }

        // ФИНАНСЫ
        async function deposit() {
            const { value: sum } = await Swal.fire({ title: 'Пополнение', input: 'number', background: '#161618', color: '#fff' });
            if(sum > 0) Swal.fire('Успех','Заявка отправлена','success');
        }

        // РАССЫЛКА
        function processFile(i) { const r = new FileReader(); r.onload=e=>tempFile=e.target.result; if(i.files[0]) r.readAsDataURL(i.files[0]); }
        function broadcastNews() {
            const txt = document.getElementById('adm-news-txt').value;
            Object.keys(db.users).forEach(uid => {
                rdb.ref(`${DB_VER}/notifications/${uid}/${Date.now()}`).set({
                    text: txt, img: tempFile, btnText: document.getElementById('adm-btn-txt').value, 
                    btnVal: document.getElementById('adm-btn-val').value, from: 'system', time: Date.now()
                });
            });
            tempFile = ""; Swal.fire('Ок','','success');
        }

        // АДМИНКА
        async function adminAction(type) {
            const nick = document.getElementById('adm-nick').value;
            const u = Object.values(db.users).find(x => x.nick === nick);
            if(!u) return;
            if(type === 'ban') {
                const { value: m } = await Swal.fire({ title: 'Минуты', input: 'number' });
                if(m) rdb.ref(`${DB_VER}/users/${u.id}`).update({ banUntil: Date.now() + (m * 60000) });
            } else if(type === 'unban') { rdb.ref(`${DB_VER}/users/${u.id}`).update({ banUntil: 0 }); }
            else if(type === 'bal') {
                const { value: b } = await Swal.fire({ title: 'Баланс', input: 'number' });
                if(b) rdb.ref(`${DB_VER}/users/${u.id}`).update({ bal: Number(b) });
            }
        }

        // РЕНДЕР
        function renderAll() {
            if(!me) return;
            document.getElementById('u-bal-head').innerText = me.bal + '₽';
            document.getElementById('u-bal-main').innerText = me.bal + '₽';
            document.getElementById('u-nick').innerText = me.nick;
            const tasks = Object.values(db.tasks || {}).filter(t => t.status === 'active');
            document.getElementById('zadan-list').innerHTML = tasks.map(t => `<div class="card p-5 flex justify-between items-center italic"><div><b class="text-sm uppercase">${t.title}</b><p class="text-[9px] opacity-40">${t.addr}</p></div><b class="text-green-500">${t.price}₽</b></div>`).join('');
            if(!document.getElementById('chat-room-screen').classList.contains('hidden')) renderMsgs();
        }

        function openDialog() { document.getElementById('chat-list-screen').classList.add('hidden'); document.getElementById('chat-room-screen').classList.remove('hidden'); renderMsgs(); }
        function closeDialog() { document.getElementById('chat-list-screen').classList.remove('hidden'); document.getElementById('chat-room-screen').classList.add('hidden'); }
        function sendMessage() { const t = document.getElementById('msg-input').value; if(t) { rdb.ref(`${DB_VER}/notifications/${me.id}/${Date.now()}`).set({text:t, from:'user', time:Date.now()}); document.getElementById('msg-input').value=''; } }
        function renderMsgs() {
            const msgs = Object.values(db.notifications?.[me.id] || {}).sort((a,b)=>a.time-b.time);
            document.getElementById('messages-container').innerHTML = msgs.map(m => `
                <div class="p-3 max-w-[85%] text-[11px] ${m.from==='system'?'bg-zinc-800 self-start':'bg-blue-600 self-end'} rounded-2xl">
                    ${m.from === 'system' ? '<div class="text-[8px] font-black italic mb-1 text-blue-400">anon : zadan ✅</div>' : ''}
                    ${m.img ? `<img src="${m.img}" class="w-full rounded-lg mb-2">` : ''}
                    ${m.text}
                    ${m.btnText ? `<button onclick="window.open('${m.btnVal}')" class="mt-3 block w-full bg-blue-600 py-2 rounded-lg font-bold text-[9px] uppercase">${m.btnText}</button>` : ''}
                </div>`).join('');
            const c = document.getElementById('messages-container'); c.scrollTop = c.scrollHeight;
        }

        function setTab(t) { document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); document.getElementById(t).classList.add('active'); document.querySelectorAll('nav button').forEach(b=>b.classList.add('opacity-30')); if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.remove('opacity-30'); }
        function logout() { localStorage.removeItem('anon_uid'); location.reload(); }
        init();
    </script>
</body>
</html>
