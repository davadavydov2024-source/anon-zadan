<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK TITAN V122 | MAINTENANCE PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style> 
        :root { --bg: #050505; --card: #121214; --text: #ffffff; --blue: #007aff; --gray: #1c1c1e; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .glass { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 24px; }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px 16px 180px; scrollbar-width: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(10,10,10,0.9); backdrop-filter: blur(25px); display: flex; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #636366; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: 0.3s; } 
        .nav-btn.active { color: var(--blue); }
        input, textarea, select { background: var(--gray); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; color: white; width: 100%; outline: none; }
        .btn-blue { background: var(--blue); color: white; border-radius: 18px; font-weight: 900; padding: 18px; width: 100%; cursor: pointer; text-transform: uppercase; }
        #loader { background: #000; z-index: 10000; position: fixed; inset: 0; display: flex; items-center justify-center; }
    </style>
</head>
<body>
    <div id="loader"><div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>

    <div id="maintenance_scr" class="hidden fixed inset-0 z-[20000] bg-black flex flex-col items-center justify-center p-8 text-center">
        <div class="mb-6 bg-yellow-500/10 p-6 rounded-full animate-pulse">
            <i class="fa-solid fa-screwdriver-wrench text-5xl text-yellow-500"></i>
        </div>
        <h1 id="maint_title" class="text-3xl font-black text-yellow-500 mb-2 italic">ТЕХ. ПЕРЕРЫВ</h1>
        <div id="maint_timer" class="text-4xl font-mono font-black mb-6 text-white tracking-widest">00:00:00</div>
        <div id="maint_texts" class="opacity-50 text-xs mb-8 space-y-1"></div>
        <div id="maint_btns" class="w-full max-w-xs space-y-3"></div>
        <button id="maint_admin_bypass" onclick="document.getElementById('maintenance_scr').classList.add('hidden'); document.getElementById('app').classList.remove('hidden');" class="hidden mt-10 text-[9px] uppercase opacity-20 font-black tracking-widest">Админ-доступ подтвержден</button>
    </div>

    <div id="auth_scr" class="hidden fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-8">
        <h1 class="text-5xl font-black mb-16 italic tracking-tighter">LYNEOK<span class="text-blue-500">.</span></h1>
        <div class="w-full glass p-8 space-y-4">
            <input id="a_n" placeholder="Никнейм">
            <input id="a_p" type="password" placeholder="Пароль">
            <button onclick="handleAuth()" id="a_btn" class="btn-blue">Войти</button>
            <p onclick="toggleR()" id="a_tog" class="text-center text-[10px] font-black opacity-30 uppercase cursor-pointer">Создать аккаунт</p>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-6 py-5 flex justify-between items-center border-b border-white/5 bg-black/50 backdrop-blur-lg sticky top-0 z-50">
            <b class="text-2xl italic tracking-tighter text-blue-500">LYNEOK</b>
            <div onclick="switchT('profile')" class="flex items-center gap-3 bg-white/5 p-2 rounded-2xl border border-white/5">
                <div class="text-right"><p class="text-[8px] opacity-40 uppercase font-black">Баланс</p><span id="h_bal" class="font-black text-xs">0 ₽</span></div>
                <img id="h_ava" class="w-8 h-8 rounded-full object-cover bg-zinc-800">
            </div>
        </header>

        <main id="tab_market" class="tab-content active">
             <div id="ad_slider" class="mb-6"></div>
             <h2 class="text-2xl font-black mb-4 italic">Категории</h2>
             <div id="cat_grid" class="grid grid-cols-3 gap-3"></div>
        </main>

        <main id="tab_chats" class="tab-content">
            <h2 class="text-2xl font-black mb-6 italic">Мои сделки</h2>
            <div id="deals_list" class="space-y-3"></div>
        </main>

        <main id="tab_profile" class="tab-content text-center">
            <div class="glass p-8 mb-6">
                <img id="p_ava" class="w-24 h-24 mx-auto mb-4 rounded-full object-cover border-4 border-zinc-900">
                <h2 id="p_n" class="text-2xl font-black mb-6 italic">...</h2>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <button class="bg-white text-black p-4 rounded-2xl font-black text-[10px] uppercase">Пополнить</button>
                    <button class="bg-zinc-800 text-white p-4 rounded-2xl font-black text-[10px] uppercase">Вывод</button>
                </div>
                <button id="adm_btn" onclick="switchT('admin')" class="hidden w-full bg-red-600/10 text-red-500 py-4 rounded-2xl font-black border border-red-500/20 uppercase text-[10px] tracking-widest italic mb-3">Admin Panel</button>
                <button onclick="logout()" class="text-[10px] font-black opacity-30 uppercase">Выйти</button>
            </div>
        </main>

        <main id="tab_admin" class="tab-content">
            <h2 class="text-3xl font-black mb-8 italic text-red-500">TITAN <span class="text-white">CONTROL</span></h2>
            
            <section class="glass p-6 mb-6 border-l-4 border-l-yellow-500">
                <h3 class="text-[10px] font-black uppercase text-yellow-500 mb-4 tracking-widest">Управление работами</h3>
                <div class="space-y-4">
                    <label class="flex justify-between items-center bg-black/40 p-3 rounded-xl">
                        <span class="text-[10px] font-bold uppercase">Включить тех. перерыв</span>
                        <input type="checkbox" id="ad_maint_active" class="w-5 h-5 accent-yellow-500">
                    </label>
                    
                    <label class="flex justify-between items-center bg-black/40 p-3 rounded-xl border border-yellow-500/20">
                        <span class="text-[10px] font-bold uppercase text-yellow-200">Игнорировать меня (Whitelist)</span>
                        <input type="checkbox" id="ad_maint_bypass" class="w-5 h-5 accent-blue-500">
                    </label>

                    <div class="grid grid-cols-3 gap-2">
                        <div class="text-center"><p class="text-[8px] mb-1 opacity-40">ДНИ</p><input id="ad_m_d" type="number" placeholder="0" class="!p-2 text-center text-xs bg-black/40"></div>
                        <div class="text-center"><p class="text-[8px] mb-1 opacity-40">ЧАСЫ</p><input id="ad_m_h" type="number" placeholder="0" class="!p-2 text-center text-xs bg-black/40"></div>
                        <div class="text-center"><p class="text-[8px] mb-1 opacity-40">МИНУТЫ</p><input id="ad_m_m" type="number" placeholder="0" class="!p-2 text-center text-xs bg-black/40"></div>
                    </div>

                    <input id="ad_maint_title" placeholder="Заголовок (например: ОБНОВЛЕНИЕ)" class="!p-3 text-xs bg-black/40">
                    <button onclick="admSaveMaint()" class="btn-blue !bg-yellow-600 !p-4 !text-[10px]">Применить настройки времени</button>
                </div>
            </section>

            <section class="glass p-6 border-l-4 border-l-blue-500">
                 <h3 class="text-[10px] font-black uppercase text-blue-500 mb-4 tracking-widest">Пользователи</h3>
                 <div id="ad_users_list" class="space-y-3"></div>
            </section>
        </main>

        <nav class="nav-bar">
            <div onclick="switchT('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-store"></i><span>Маркет</span></div>
            <div onclick="switchT('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-receipt"></i><span>Сделки</span></div>
            <div onclick="switchT('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-user"></i><span>Профиль</span></div>
        </nav>
    </div>

    <script>
        firebase.initializeApp({ apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" });
        const db = firebase.database().ref('lyne_v122_titan');
        const Tst = Swal.mixin({ toast: true, position: 'top', timer: 2000, showConfirmButton: false, background: '#1c1c1e', color: '#fff' });

        let me = null, data = {}, isR = false, maintInterval = null;

        function init() {
            db.on('value', snap => {
                data = snap.val() || { u:{}, settings:{ maint:{active:false, endTime:0, title:"", bypassAdmin: true} } };
                document.getElementById('loader').style.display = 'none';
                
                const sid = localStorage.getItem('lyne_v122_sid');
                if (sid && data.u[sid]) {
                    me = data.u[sid];
                    checkMaintenance();
                } else {
                    document.getElementById('auth_scr').classList.remove('hidden');
                }
                render();
            });
        }

        function checkMaintenance() {
            const m = data.settings.maint;
            const isAdmin = me && me.n.toLowerCase() === 'owwner';
            const isExpired = m.endTime < Date.now();
            
            // Если тех. работы активны И (мы не админ ИЛИ админ не включил себе байпас)
            if (m.active && !isExpired) {
                if (isAdmin && m.bypassAdmin) {
                    // Админ заходит спокойно
                    document.getElementById('maintenance_scr').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('auth_scr').classList.add('hidden');
                } else {
                    // Показываем экран тех. работ
                    showMaintenanceScreen(m);
                }
            } else {
                document.getElementById('maintenance_scr').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('auth_scr').classList.add('hidden');
            }
        }

        function showMaintenanceScreen(m) {
            document.getElementById('maintenance_scr').classList.remove('hidden');
            document.getElementById('app').classList.add('hidden');
            document.getElementById('auth_scr').classList.add('hidden');
            document.getElementById('maint_title').innerText = m.title || "ТЕХ. ПЕРЕРЫВ";
            
            // Кнопка байпаса для админа (на всякий случай)
            if(me && me.n.toLowerCase() === 'owwner') {
                document.getElementById('maint_admin_bypass').classList.remove('hidden');
            }

            if(maintInterval) clearInterval(maintInterval);
            maintInterval = setInterval(() => {
                const diff = m.endTime - Date.now();
                if(diff <= 0) {
                    clearInterval(maintInterval);
                    location.reload();
                }
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                const min = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('maint_timer').innerText = `${h.toString().padStart(2,'0')}:${min.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        }

        function admSaveMaint() {
            const days = Number(document.getElementById('ad_m_d').value) || 0;
            const hours = Number(document.getElementById('ad_m_h').value) || 0;
            const mins = Number(document.getElementById('ad_m_m').value) || 0;
            
            const totalMs = (days * 86400000) + (hours * 3600000) + (mins * 60000);
            const endTime = Date.now() + totalMs;

            db.child('settings/maint').update({
                active: document.getElementById('ad_maint_active').checked,
                bypassAdmin: document.getElementById('ad_maint_bypass').checked,
                title: document.getElementById('ad_maint_title').value || "ТЕХ. ПЕРЕРЫВ",
                endTime: endTime
            });
            Tst.fire({icon:'success', title:'Статус обновлен'});
        }

        function render() {
            if(!me) return;
            document.getElementById('h_bal').innerText = me.bal.toLocaleString() + ' ₽';
            document.getElementById('h_ava').src = me.ava || 'https://ui-avatars.com/api/?name='+me.n;
            document.getElementById('p_ava').src = me.ava || 'https://ui-avatars.com/api/?name='+me.n;
            document.getElementById('p_n').innerText = me.n;
            
            if(me.n.toLowerCase() === 'owwner') {
                document.getElementById('adm_btn').classList.remove('hidden');
                renderAdminContent();
            }
        }

        function renderAdminContent() {
            const list = document.getElementById('ad_users_list');
            if(!list || !data.u) return;
            list.innerHTML = Object.values(data.u).map(u => `
                <div class="flex justify-between items-center bg-black/40 p-3 rounded-xl border border-white/5">
                    <div><b class="text-xs uppercase">${u.n}</b><p class="text-[9px] text-blue-500">${u.bal} ₽</p></div>
                    <button onclick="db.child('u/${u.id}/bal').set(${(u.bal||0)+1000})" class="bg-green-600/20 text-green-500 px-3 py-1 rounded-lg text-[9px] font-black">+1000</button>
                </div>
            `).join('');
        }

        function handleAuth() {
            const n = document.getElementById('a_n').value, p = document.getElementById('a_p').value;
            if(isR) {
                const id = 'u'+Date.now();
                db.child(`u/${id}`).set({id, n, p, bal:0});
                localStorage.setItem('lyne_v122_sid', id);
                location.reload();
            } else {
                const u = Object.values(data.u || {}).find(x=>x.n===n && x.p===p);
                if(u) { localStorage.setItem('lyne_v122_sid', u.id); location.reload(); }
                else Tst.fire({icon:'error', title:'Ошибка входа'});
            }
        }

        function switchT(t) {
            document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
            document.getElementById('tab_'+t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
            document.getElementById('n_'+t)?.classList.add('active');
        }

        function toggleR() { isR=!isR; document.getElementById('a_tog').innerText = isR ? 'Уже есть аккаунт':'Создать аккаунт'; document.getElementById('a_btn').innerText = isR?'Создать':'Войти'; }
        function logout() { localStorage.clear(); location.reload(); }

        init();
    </script>
</body>
</html>
