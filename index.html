<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYNEOK — Экосистема Цифровых Сделок</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');

        :root {
            --bg-dark: #0a0b10;
            --accent: #3b82f6;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { -webkit-tap-highlight-color: transparent; user-select: none; }
        input, textarea { user-select: text; }

        body {
            background-color: var(--bg-dark);
            color: #f1f5f9;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            touch-action: pan-y;
        }

        .nick-rainbow {
            background: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: rainbow-flow 3s linear infinite;
            background-size: 200% auto;
            font-weight: 800;
        }
        @keyframes rainbow-flow { to { background-position: 200% center; } }

        .glass { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--border); }
        .glass-hover:hover { background: rgba(255, 255, 255, 0.06); border-color: var(--accent); transition: 0.3s; }

        .chat-box { height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 80%; font-size: 0.85rem; }
        .msg-admin { background: #3b82f6; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg-user { background: #1e293b; align-self: flex-end; border-bottom-right-radius: 2px; }
        
        .section-fade { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .hidden { display: none !important; }
        .star-active { color: #fbbf24; }
    </style>
</head>
<body class="min-h-screen">

<div id="maintenance-overlay" class="fixed inset-0 z-[9999] bg-[#0a0b10] hidden flex flex-col items-center justify-center p-6 text-center">
    <img id="mt-img-display" src="https://i.postimg.cc/85zK6P1F/mainte.png" class="w-64 mb-8 rounded-2xl">
    <h1 id="mt-title-display" class="text-4xl font-extrabold text-white mb-4 uppercase italic">Тех. перерыв</h1>
    <p id="mt-text-display" class="text-gray-400 max-w-md">Мы скоро вернемся!</p>
</div>

<nav class="glass sticky top-0 z-[100] px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-3 cursor-pointer" onclick="navigate('market')">
        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/30">
            <i class="fas fa-bolt text-white"></i>
        </div>
        <span class="text-2xl font-black tracking-tighter uppercase italic">Lyneok</span>
    </div>

    <div class="hidden lg:flex gap-6 text-[10px] font-bold uppercase tracking-widest text-gray-400">
        <button onclick="navigate('market')" class="hover:text-blue-500 transition"><i class="fas fa-home mr-1"></i> Главная</button>
        <button onclick="navigate('adm-goods')" class="hover:text-blue-500 transition"><i class="fas fa-plus-circle mr-1"></i> Создать товар</button>
        <button onclick="navigate('chats')" class="hover:text-blue-500 transition"><i class="fas fa-comments mr-1"></i> Чаты</button>
        <button onclick="navigate('profile')" class="hover:text-blue-500 transition"><i class="fas fa-user mr-1"></i> Профиль</button>
        <button id="nav-admin-btn" onclick="navigate('admin-panel')" class="text-red-500 hidden hover:scale-110 transition">Admin Panel 😈</button>
    </div>

    <div class="flex items-center gap-4">
        <div class="text-right">
            <p id="nav-balance" class="text-green-400 font-bold leading-none">0.00₽</p>
            <p id="nav-nick" class="text-[9px] text-gray-500 uppercase tracking-widest mt-1">Гость</p>
        </div>
        <div onclick="navigate('profile')" class="w-11 h-11 rounded-full border-2 border-blue-600 p-0.5 cursor-pointer overflow-hidden">
            <img id="nav-avatar" src="https://i.postimg.cc/mD3m6v90/user-default.png" class="w-full h-full rounded-full object-cover">
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto p-4 md:p-8">

    <section id="sec-auth" class="section-fade max-w-md mx-auto py-12">
        <div class="glass p-8 rounded-[2rem] shadow-2xl">
            <h2 class="text-3xl font-extrabold text-center mb-6 italic uppercase">Вход / Регистрация</h2>
            <div class="space-y-4">
                <div class="flex justify-center mb-4">
                    <label class="relative cursor-pointer group">
                        <div class="w-24 h-24 rounded-full bg-gray-900 border-2 border-dashed border-gray-700 flex items-center justify-center overflow-hidden">
                            <img id="reg-preview" class="hidden w-full h-full object-cover">
                            <i class="fas fa-image text-gray-600 group-hover:text-blue-500 transition"></i>
                        </div>
                        <input type="file" id="reg-file" class="hidden" onchange="handleImgPreview(this, 'reg-preview')">
                    </label>
                </div>
                <input type="text" id="reg-nick" placeholder="Никнейм" class="w-full bg-gray-900 border border-border p-4 rounded-2xl outline-none focus:border-blue-500">
                <input type="password" id="reg-pass" placeholder="Пароль" class="w-full bg-gray-900 border border-border p-4 rounded-2xl outline-none focus:border-blue-500">
                <button onclick="authAction()" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-white shadow-xl hover:bg-blue-700 transition">ВОЙТИ В СИСТЕМУ</button>
            </div>
        </div>
    </section>

    <section id="sec-market" class="section-fade hidden">
        <h1 class="text-4xl font-black tracking-tighter uppercase italic mb-8">Каталог игр</h1>
        <div id="market-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
    </section>

    <section id="sec-reviews" class="section-fade hidden">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-black uppercase italic">Отзывы</h2>
            <button onclick="openModal('modal-review')" class="bg-blue-600 px-6 py-2 rounded-xl text-[10px] font-black uppercase">Оставить отзыв</button>
        </div>
        <div id="reviews-list" class="grid md:grid-cols-2 gap-4"></div>
    </section>

    <section id="sec-profile" class="section-fade hidden">
        <div class="grid lg:grid-cols-3 gap-8">
            <div class="glass p-8 rounded-[2rem] text-center">
                <img id="prof-img" src="" class="w-32 h-32 rounded-full mx-auto border-4 border-blue-600 mb-4 object-cover">
                <h3 id="prof-nick" class="text-2xl font-black mb-4">NICKNAME</h3>
                
                <div class="bg-gray-900 p-4 rounded-2xl mb-6">
                    <p class="text-[10px] text-gray-500 font-bold uppercase mb-1">Ваш кошелек</p>
                    <p id="prof-balance" class="text-3xl font-black text-green-400">0.00₽</p>
                </div>

                <div class="space-y-2 mb-6">
                    <input type="text" id="promo-input" placeholder="Введите промокод..." class="w-full bg-black/40 border border-border p-3 rounded-xl text-xs outline-none">
                    <button onclick="applyPromo()" class="w-full bg-yellow-600 py-3 rounded-xl font-bold text-xs uppercase italic">Активировать промо</button>
                </div>

                <button onclick="navigate('reviews')" class="w-full bg-gray-800 py-3 rounded-xl font-bold mb-2 text-xs uppercase">Мои отзывы</button>
                <button onclick="requestDeposit()" class="w-full bg-blue-600 py-3 rounded-xl font-bold text-xs uppercase">Пополнить</button>
            </div>
            
            <div class="lg:col-span-2 glass p-8 rounded-[2rem]">
                <h4 class="text-xl font-black mb-6 uppercase italic">История операций</h4>
                <div id="user-deals-list" class="space-y-4 text-gray-500 italic text-sm">Здесь пока пусто...</div>
            </div>
        </div>
    </section>

    <section id="sec-admin" class="section-fade hidden">
        <div class="flex items-center gap-4 mb-8">
            <div class="w-12 h-12 bg-red-600 rounded-2xl flex items-center justify-center text-white"><i class="fas fa-crown"></i></div>
            <h2 class="text-4xl font-black italic uppercase italic">Админ-Центр</h2>
        </div>
        <div class="grid grid-cols-12 gap-8">
            <div class="col-span-12 lg:col-span-3 space-y-2">
                <button onclick="admTab('adm-users')" class="w-full text-left p-5 rounded-2xl glass-hover font-bold text-xs uppercase tracking-wider">Юзеры</button>
                <button onclick="admTab('adm-goods')" class="w-full text-left p-5 rounded-2xl glass-hover font-bold text-xs uppercase tracking-wider">Добавить товар</button>
                <button onclick="admTab('adm-sys')" class="w-full text-left p-5 rounded-2xl glass-hover font-bold text-xs uppercase tracking-wider">Система</button>
            </div>
            <div class="col-span-12 lg:col-span-9 glass p-8 rounded-3xl min-h-[400px]">
                <div id="adm-users" class="adm-content hidden">
                    <table class="w-full text-xs uppercase">
                        <tr class="text-gray-500 border-b border-border">
                            <th class="pb-4 text-left">Ник</th>
                            <th class="pb-4 text-left">Баланс</th>
                            <th class="pb-4 text-right">Статус</th>
                        </tr>
                        <tbody id="adm-user-table-body"></tbody>
                    </table>
                </div>
                <div id="adm-goods" class="adm-content hidden">
                    <h3 class="text-xl font-black mb-6">НОВЫЙ ТОВАР</h3>
                    <div class="space-y-4">
                        <label class="w-full h-32 rounded-2xl bg-gray-900 border-2 border-dashed border-gray-700 flex items-center justify-center overflow-hidden cursor-pointer">
                            <img id="good-img-preview" class="hidden w-full h-full object-cover">
                            <span id="good-ph" class="text-gray-600 font-bold uppercase text-[10px]">Прикрепить фото товара</span>
                            <input type="file" class="hidden" onchange="handleImgPreview(this, 'good-img-preview')">
                        </label>
                        <input type="text" id="g-name" placeholder="Название" class="w-full bg-gray-900 border border-border p-4 rounded-xl outline-none">
                        <input type="number" id="g-price" placeholder="Цена ₽" class="w-full bg-gray-900 border border-border p-4 rounded-xl outline-none">
                        <button onclick="alert('Товар добавлен!')" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase">Опубликовать</button>
                    </div>
                </div>
                <div id="adm-sys" class="adm-content hidden">
                    <h3 class="text-xl font-black mb-6">ЗАГЛУШКА</h3>
                    <input type="checkbox" onchange="toggleMT(this.checked)" class="mb-4"> Активировать перерыв
                </div>
            </div>
        </div>
    </section>

</main>

<div id="modal-review" class="fixed inset-0 z-[200] bg-black/90 hidden flex items-center justify-center p-6">
    <div class="glass max-w-md w-full p-8 rounded-3xl">
        <h3 class="text-xl font-black uppercase mb-6 italic">Ваш отзыв</h3>
        <div class="flex gap-2 mb-6" id="star-rating">
            <i class="fas fa-star text-xl cursor-pointer star-active" onclick="setStar(1)"></i>
            <i class="fas fa-star text-xl cursor-pointer star-active" onclick="setStar(2)"></i>
            <i class="fas fa-star text-xl cursor-pointer star-active" onclick="setStar(3)"></i>
            <i class="fas fa-star text-xl cursor-pointer star-active" onclick="setStar(4)"></i>
            <i class="fas fa-star text-xl cursor-pointer star-active" onclick="setStar(5)"></i>
        </div>
        <textarea id="review-text" class="w-full bg-gray-900 p-4 rounded-xl h-24 outline-none mb-4 text-xs" placeholder="Текст отзыва..."></textarea>
        <div class="flex gap-2">
            <button onclick="closeModal('modal-review')" class="flex-1 bg-gray-800 py-3 rounded-xl font-bold uppercase text-[10px]">Закрыть</button>
            <button onclick="submitReview()" class="flex-1 bg-blue-600 py-3 rounded-xl font-bold uppercase text-[10px]">Отправить</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
        authDomain: "dogx-base.firebaseapp.com",
        databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
        projectId: "dogx-base",
        storageBucket: "dogx-base.firebasestorage.app",
        messagingSenderId: "81713249793",
        appId: "1:81713249793:web:1b44a13e6faf5acfa78a00",
        measurementId: "G-HDQEQRGLTK"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 🧠 ГЛОБАЛЬНЫЙ ОБЪЕКТ
    window.lyneok = {
        user: null,
        promos: { "START": 500, "LYNEOK2026": 1000, "ARTEM": 5000 },
        usersList: [],
        reviews: [
            { user: 'Admin', text: 'Добро пожаловать!', stars: 5 }
        ]
    };

    // 🚀 СТАРТ
    window.onload = () => {
        window.navigate('sec-auth');
        renderMarket();
        renderReviews();
    };

    // НАВИГАЦИЯ
    window.navigate = (id) => {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        const map = { 'market': 'sec-market', 'profile': 'sec-profile', 'admin-panel': 'sec-admin', 'auth': 'sec-auth', 'reviews': 'sec-reviews', 'adm-goods': 'sec-admin' };
        document.getElementById(map[id] || id).classList.remove('hidden');
        if(id === 'profile') renderProfile();
        if(id === 'admin-panel') admTab('adm-users');
    };

    // АВТОРИЗАЦИЯ + ЗАЩИТА НИКОВ
    window.authAction = async () => {
        const nick = document.getElementById('reg-nick').value.trim();
        const pass = document.getElementById('reg-pass').value.trim();
        const avatar = document.getElementById('reg-preview').src;

        if(!nick || !pass) return alert("Введите данные!");

        const dbRef = ref(db);
        const snapshot = await get(child(dbRef, `users/${nick}`));

        if (snapshot.exists()) {
            // Если юзер есть - проверяем пароль (Вход)
            const existingUser = snapshot.val();
            if(existingUser.pass === pass) {
                window.lyneok.user = existingUser;
            } else {
                return alert("Этот ник уже занят другим пользователем или пароль неверный!");
            }
        } else {
            // Если юзера нет - РЕГИСТРАЦИЯ
            // Защита: нельзя регать owwner если ты не первый
            if(nick.toLowerCase() === 'owwner') return alert("Регистрация под ником owwner запрещена!");

            const newUser = {
                nick, pass, balance: 0, 
                avatar: avatar.includes('data') ? avatar : 'https://i.postimg.cc/mD3m6v90/user-default.png',
                style: ''
            };
            await set(ref(db, 'users/' + nick), newUser);
            window.lyneok.user = newUser;
        }

        if(window.lyneok.user.nick === 'owwner') {
            document.getElementById('nav-admin-btn').classList.remove('hidden');
        }

        updateNav();
        window.navigate('market');
    };

    // ПРОМОКОДЫ
    window.applyPromo = async () => {
        const code = document.getElementById('promo-input').value.toUpperCase();
        if(window.lyneok.promos[code]) {
            const reward = window.lyneok.promos[code];
            window.lyneok.user.balance += reward;
            delete window.lyneok.promos[code]; // Одноразовый для сессии
            
            // Сохраняем в Firebase
            await set(ref(db, 'users/' + window.lyneok.user.nick), window.lyneok.user);
            
            alert(`Успех! Зачислено ${reward}₽`);
            updateNav();
            renderProfile();
            document.getElementById('promo-input').value = '';
        } else {
            alert("Неверный или уже использованный промокод!");
        }
    };

    function updateNav() {
        const u = window.lyneok.user;
        document.getElementById('nav-balance').innerText = u.balance.toLocaleString() + '₽';
        document.getElementById('nav-nick').innerText = u.nick;
        document.getElementById('nav-avatar').src = u.avatar;
        if(u.nick === 'owwner') document.getElementById('nav-nick').className = 'nick-rainbow text-[9px] uppercase tracking-widest mt-1';
    }

    function renderProfile() {
        const u = window.lyneok.user;
        document.getElementById('prof-img').src = u.avatar;
        document.getElementById('prof-nick').innerText = u.nick;
        document.getElementById('prof-balance').innerText = u.balance.toLocaleString() + '₽';
    }

    window.admTab = (id) => {
        document.querySelectorAll('.adm-content').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'adm-users') renderAdminUsers();
    };

    async function renderAdminUsers() {
        const dbRef = ref(db);
        const snapshot = await get(child(dbRef, `users`));
        if(snapshot.exists()) {
            const users = snapshot.val();
            const body = document.getElementById('adm-user-table-body');
            body.innerHTML = Object.values(users).map(u => `
                <tr class="border-b border-border">
                    <td class="py-4 font-bold ${u.nick === 'owwner' ? 'nick-rainbow' : 'text-blue-500'}">${u.nick}</td>
                    <td class="py-4 text-green-400">${u.balance}₽</td>
                    <td class="py-4 text-right"><button class="bg-red-600/20 text-red-500 px-2 py-1 rounded">Блокировать</button></td>
                </tr>
            `).join('');
        }
    }

    // Вспомогательные функции
    window.handleImgPreview = (input, imgId) => {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById(imgId).src = e.target.result;
                document.getElementById(imgId).classList.remove('hidden');
                if(imgId === 'good-img-preview') document.getElementById('good-ph').classList.add('hidden');
            };
            reader.readAsDataURL(input.files[0]);
        }
    };

    window.openModal = (id) => document.getElementById(id).classList.remove('hidden');
    window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

    function renderMarket() {
        const games = [
            { name: 'Roblox', img: 'https://i.postimg.cc/P5tY8H9D/roblox.jpg' },
            { name: 'Brawl Stars', img: 'https://i.postimg.cc/g2f7Xm3T/brawl.jpg' },
            { name: 'Standoff 2', img: 'https://i.postimg.cc/mD3m6v90/user-default.png' }
        ];
        document.getElementById('market-grid').innerHTML = games.map(g => `
            <div class="glass-hover rounded-3xl overflow-hidden h-40 relative cursor-pointer">
                <img src="${g.img}" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-black/40 flex items-end p-4">
                    <span class="font-black italic uppercase text-xs">${g.name}</span>
                </div>
            </div>
        `).join('');
    }

    window.submitReview = () => {
        const text = document.getElementById('review-text').value;
        if(!text) return;
        window.lyneok.reviews.unshift({ user: window.lyneok.user.nick, text, stars: 5 });
        renderReviews();
        closeModal('modal-review');
    };

    function renderReviews() {
        document.getElementById('reviews-list').innerHTML = window.lyneok.reviews.map(r => `
            <div class="glass p-4 rounded-2xl border-l-4 border-blue-600">
                <div class="flex justify-between mb-2"><span class="font-bold text-[10px]">${r.user}</span><span class="text-yellow-500 text-[8px]">★★★★★</span></div>
                <p class="text-xs text-gray-400 italic">"${r.text}"</p>
            </div>
        `).join('');
    }
</script>

</body>
</html>
