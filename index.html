<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2222010</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0a0a0a; color: #ff2d55;
            font-family: 'Courier New', Courier, monospace; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        #terminal {
            text-align: center; z-index: 10; transition: opacity 0.5s;
        }
        .status { color: #888; font-size: 0.9rem; margin-bottom: 10px; }
        .glitch { font-size: 1.2rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        
        button {
            background: transparent; border: 1px solid #ff2d55; color: #ff2d55;
            padding: 10px 20px; cursor: pointer; font-family: inherit;
            margin-top: 20px; transition: 0.3s; text-transform: uppercase;
        }
        button:hover { background: #ff2d55; color: #000; box-shadow: 0 0 15px #ff2d55; }

        canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
        
        #message-overlay {
            position: absolute; color: #ff2d55; font-size: 2rem;
            font-weight: bold; text-shadow: 0 0 10px #ff2d55;
            opacity: 0; transition: opacity 2s; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="terminal">
        <div class="status">[system] 💞💞💞💞💞💞💞💞💞💞..</div>
        <div class="glitch">> One encrypted package found.</div>
        <button onclick="checkPassword()">Decrypt Message</button>
    </div>

    <div id="message-overlay">I LOVE YOU :3</div>
    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationStarted = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function checkPassword() {
            const pass = prompt("Enter Decryption Key :");
            if (pass === "1111", "3333") {
                startAnimation();
            } else {
                alert("ACCESS DENIED");
            }
        }

        function startAnimation() {
            document.getElementById('terminal').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('terminal').style.display = 'none';
                document.getElementById('message-overlay').style.opacity = '1';
                animationStarted = true;
                initParticles();
                animate();
            }, 500);
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                // Параметрическое уравнение сердца
                const t = Math.random() * Math.PI * 2;
                this.targetX = 16 * Math.pow(Math.sin(t), 3);
                this.targetY = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                
                const scale = Math.min(canvas.width, canvas.height) / 40;
                this.targetX = this.targetX * scale + canvas.width / 2;
                this.targetY = this.targetY * scale + canvas.height / 2;
                
                this.speed = Math.random() * 0.02 + 0.01;
                this.size = Math.random() * 10 + 5;
                this.opacity = Math.random();
            }
            update() {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
                
                // Эффект пульсации
                const pulse = Math.sin(Date.now() * 0.005) * 5;
                this.x += (Math.random() - 0.5) * 2;
                this.y += (Math.random() - 0.5) * 2;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 45, 85, ${this.opacity})`;
                ctx.font = `${this.size}px Arial`;
                ctx.fillText("I love you", this.x, this.y);
            }
        }

        function initParticles() {
            for (let i = 0; i < 250; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
