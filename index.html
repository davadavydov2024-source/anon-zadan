<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>anon:zadan | V40 SUPREME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { background: #050505; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; margin: 0; }
        .glass { background: rgba(20, 20, 25, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 30px; }
        .input-mod { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 15px; width: 100%; color: #fff; font-size: 13px; }
        .btn-main { background: linear-gradient(135deg, #6366f1, #a855f7); border-radius: 22px; padding: 18px; font-weight: 900; width: 100%; text-transform: uppercase; color: white; border: none; cursor: pointer; transition: 0.3s; }
        .btn-main:active { transform: scale(0.95); }
        .tab { display: none; height: 100vh; overflow-y: auto; padding-bottom: 120px; }
        .tab.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(5,5,5,0.9); backdrop-filter: blur(15px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .nav-btn { color: #52525b; font-size: 22px; transition: 0.3s; }
        .nav-btn.active { color: #a855f7; }
        .reaction-chip { background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 12px; font-size: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .star-rating { color: #facc15; font-size: 20px; }
    </style>
</head>
<body>

    <div id="ban-screen" class="fixed inset-0 z-[10000] bg-black hidden items-center justify-center flex-col text-center p-6">
        <div class="glass p-10 w-full max-w-sm border-red-500/40 shadow-[0_0_50px_rgba(239,68,68,0.2)]">
            <h1 class="text-6xl font-black text-red-500 italic mb-4">LOL!</h1>
            <p id="ban-joke" class="text-xs font-bold uppercase mb-8 text-zinc-400">Воркер месяца уходит в отпуск...</p>
            <div id="ban-timer" class="text-4xl font-black mb-8 bg-zinc-900 py-5 rounded-[30px] tracking-widest">00:00:00</div>
            <button onclick="window.open('https://t.me/sswckk')" class="w-full py-4 bg-white/10 rounded-2xl font-black uppercase text-[10px]">Поплакаться админу</button>
        </div>
    </div>

    <div id="app">
        <header class="px-6 py-4 flex justify-between items-center glass rounded-none rounded-b-[35px] sticky top-0 z-50">
            <h1 class="text-xl font-black italic tracking-tighter">anon:<span class="text-zinc-500">zadan</span></h1>
            <div id="top_bal" onclick="setTab('wallet')" class="bg-indigo-600/20 px-4 py-2 rounded-xl text-xs font-black text-indigo-400">0 ₽</div>
        </header>

        <main id="home" class="tab active px-5 pt-6">
            <div id="task_list" class="space-y-4"></div>
        </main>

        <main id="chats" class="tab px-5 pt-6">
            <div id="chat_list" class="space-y-3">
                <div onclick="openChat('news')" class="glass p-5 flex items-center gap-4 border-indigo-500/40 relative cursor-pointer">
                    <div class="w-12 h-12 bg-indigo-600 rounded-xl flex justify-center items-center"><i class="fa-solid fa-bullhorn text-white"></i></div>
                    <div class="flex-1">
                        <div class="flex items-center gap-2"><b class="text-sm font-black uppercase">Official News</b><i class="fa-solid fa-circle-check text-indigo-400 text-[10px]"></i></div>
                        <p class="text-[9px] opacity-40">Читай закрепы, воркер!</p>
                    </div>
                </div>
                <div onclick="openChat('support')" class="glass p-5 flex items-center gap-4 cursor-pointer">
                    <div class="w-12 h-12 bg-zinc-800 rounded-xl flex justify-center items-center"><i class="fa-solid fa-headset text-indigo-400"></i></div>
                    <div><b class="text-sm font-black uppercase">Support 24/7</b><p class="text-[9px] opacity-40">Технический отдел</p></div>
                </div>
            </div>

            <div id="chat_room" class="hidden h-full flex flex-col -mt-6 bg-[#050505] relative z-[1001]">
                <div class="glass rounded-t-none p-4 flex items-center gap-4 border-b border-white/5">
                    <button onclick="closeChat()"><i class="fa-solid fa-arrow-left"></i></button>
                    <b id="chat_title" class="text-xs uppercase font-black">Чат</b>
                </div>
                <div id="chat_msgs" class="flex-1 overflow-y-auto p-5 space-y-4 pb-40"></div>
                <div id="chat_input_area" class="p-4 glass rounded-b-none flex gap-2">
                    <input id="msg_val" class="input-mod !py-3" placeholder="Сообщение...">
                    <button onclick="sendMsg()" class="w-12 bg-indigo-600 rounded-xl"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </main>

        <main id="wallet" class="tab px-5 pt-6">
            <div class="glass p-8 text-center space-y-6">
                <h2 id="wallet_bal" class="text-5xl font-black italic">0 ₽</h2>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="money('deposit')" class="py-5 bg-indigo-600 rounded-2xl font-black uppercase text-[10px]">Пополнить</button>
                    <button onclick="money('withdraw')" class="py-5 bg-zinc-800 rounded-2xl font-black uppercase text-[10px]">Вывести</button>
                </div>
                <div id="trans_list" class="space-y-2"></div>
            </div>
        </main>

        <main id="admin_panel" class="tab px-4 pt-6 space-y-6">
            <h2 class="text-2xl font-black text-red-500 italic text-center uppercase">Overlord Core V40</h2>
            
            <div class="glass p-5 space-y-4 border-red-500/20">
                <p class="text-[10px] font-black text-red-500 uppercase">Бесконечный конструктор</p>
                <textarea id="adm_txt" class="input-mod h-20 text-[11px]" placeholder="Текст поста..."></textarea>
                <div id="adm_btns_container" class="space-y-2"></div>
                <button onclick="addAdmBtn()" class="w-full py-2 border border-dashed border-white/20 rounded-xl text-[9px] font-black uppercase">+ Кнопка</button>
                <button onclick="startMassiveBroadcast()" class="btn-main !py-3 text-[10px]">ВЫПУСТИТЬ КРАКЕНА (РАССЫЛКА)</button>
            </div>

            <div class="glass p-5 space-y-4">
                <p class="text-[10px] font-black text-indigo-400 uppercase">Управление воркерами</p>
                <div id="adm_users_list" class="space-y-3"></div>
            </div>
        </main>

        <nav class="nav-bar">
            <button onclick="setTab('home')" id="n_home" class="nav-btn active"><i class="fa-solid fa-bolt"></i></button>
            <button onclick="setTab('wallet')" id="n_wallet" class="nav-btn"><i class="fa-solid fa-wallet"></i></button>
            <button onclick="setTab('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-comment-dots"></i></button>
            <button onclick="setTab('admin_panel')" class="nav-btn"><i class="fa-solid fa-shield-halved"></i></button>
        </nav>
    </div>

    <script>
        const TG_BOT = "8722822022:AAEmZa-V4-isxXnZ00omU8gAM_NtYevuL9Y";
        const ADM_ID = "7040863301";
        const CFG = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        firebase.initializeApp(CFG); const dbRef = firebase.database().ref('anon_v40');

        let me = null, db = {}, actC = null, admBtns = [], jokes = ["Воркер месяца уходит в отпуск...", "Твои копейки теперь мои!", "Админ нажал кнопку 'Удалить токсиса'", "Попробуй зайти через год (шутка)"];

        function init() {
            dbRef.on('value', s => {
                db = s.val() || {u:{}, c:{}, t:{}, w:{}, n:{}};
                let id = localStorage.getItem('u_id');
                if(!id) {
                    id = "u" + Date.now();
                    localStorage.setItem('u_id', id);
                    dbRef.child(`u/${id}`).set({id, n: "Worker_"+id.slice(-4), t: "user", bal: 100, banUntil: 0});
                }
                me = db.u[id];
                render();
                checkBan();
            });
            setInterval(() => { if(me) dbRef.child(`u/${me.id}/last`).set(Date.now()); }, 5000);
        }

        function render() {
            document.getElementById('top_bal').innerText = me.bal + ' ₽';
            document.getElementById('wallet_bal').innerText = me.bal + ' ₽';
            
            // Рендер заданий с кнопкой Жалобы
            document.getElementById('task_list').innerHTML = Object.values(db.t || {
                t1: {id:'t1', n:'Пробив номера', p:500, d:'Узнать владельца по БД'}
            }).map(t => `
                <div class="glass p-6 space-y-4">
                    <div class="flex justify-between items-start">
                        <b class="text-lg uppercase">${t.n}</b>
                        <span class="text-indigo-400 font-black">${t.p} ₽</span>
                    </div>
                    <p class="text-[10px] opacity-50">${t.d}</p>
                    <div class="flex gap-2">
                        <button onclick="takeTask('${t.id}')" class="flex-1 py-3 bg-indigo-600 rounded-xl text-[10px] font-black uppercase">Взять в работу</button>
                        <button onclick="reportTask('${t.id}')" class="px-4 bg-red-500/10 text-red-500 rounded-xl border border-red-500/20"><i class="fa-solid fa-triangle-exclamation"></i></button>
                    </div>
                </div>
            `).join('');

            if(actC) renderMessages();
            renderAdmin();
        }

        // ЖАЛОБА АДМИНУ
        async function reportTask(tid) {
            const { value: text } = await Swal.fire({ title: 'Что случилось?', input: 'textarea', background: '#111', color: '#fff' });
            if(text) {
                tg(`🚨 <b>ЖАЛОБА</b>\nОт: @${me.t}\nЗадание: ${tid}\nСуть: ${text}`);
                Swal.fire('Ок', 'Админ уведомлен', 'success');
            }
        }

        // ОБЯЗАТЕЛЬНЫЙ ОТЗЫВ
        async function takeTask(id) {
            // Имитация завершения сделки админом
            const { value: rating } = await Swal.fire({
                title: 'Оставь отзыв!',
                html: '<div class="star-rating"><i class="fa-solid fa-star"></i> 4.9</div>',
                input: 'select',
                inputOptions: { 5:'⭐⭐⭐⭐⭐', 4:'⭐⭐⭐⭐', 3:'⭐⭐⭐', 2:'⭐⭐', 1:'⭐' },
                inputPlaceholder: 'Оцени сделку',
                background: '#111', color: '#fff',
                allowOutsideClick: false
            });
            if(rating) {
                const { value: comment } = await Swal.fire({ input:'text', placeholder:'Твой комментарий', background:'#111', color:'#fff', allowOutsideClick:false });
                tg(`🌟 <b>НОВЫЙ ОТЗЫВ</b>\nОценка: ${rating}/5\nОт: @${me.t}\nТекст: ${comment}`);
                Swal.fire('Успех', 'Отзыв опубликован!', 'success');
            }
        }

        // ЧАТЫ И КАНАЛ
        function openChat(type) {
            actC = type;
            document.getElementById('chat_list').classList.add('hidden');
            document.getElementById('chat_room').classList.remove('hidden');
            document.getElementById('chat_title').innerText = type === 'news' ? 'OFFICIAL NEWS ✅' : 'SUPPORT';
            document.getElementById('chat_input_area').style.display = type === 'news' ? 'none' : 'flex';
            renderMessages();
        }

        function closeChat() {
            actC = null;
            document.getElementById('chat_list').classList.remove('hidden');
            document.getElementById('chat_room').classList.add('hidden');
        }

        function renderMessages() {
            const path = actC === 'news' ? 'news' : me.id;
            const msgs = Object.values(db.c[path] || {});
            document.getElementById('chat_msgs').innerHTML = msgs.map(m => `
                <div class="p-4 max-w-[85%] rounded-[24px] text-xs ${m.from==='sys'?'bg-indigo-600 self-start':'bg-zinc-800 self-end'}">
                    <p class="font-bold">${m.txt}</p>
                    ${m.btns ? `<div class="mt-3 space-y-2">${m.btns.map(b => `<button onclick="${b.type==='link'?`window.open('${b.val}')` : `Swal.fire('Инфо','${b.val}','info')`}" class="w-full py-2 bg-white/20 rounded-xl text-[9px] uppercase font-black">${b.name}</button>`).join('')}</div>` : ''}
                    ${actC === 'news' ? `<div class="flex gap-2 mt-3"><button onclick="react('${m.id}')" class="reaction-chip">🔥 ${m.reac||0}</button></div>` : ''}
                </div>
            `).join('');
            const d = document.getElementById('chat_msgs'); d.scrollTop = d.scrollHeight;
        }

        async function react(mid) {
            let r = (db.c.news[mid].reac || 0) + 1;
            await dbRef.child(`c/news/${mid}/reac`).set(r);
        }

        // АДМИНКА
        function addAdmBtn() {
            admBtns.push({name: '', type: 'link', val: ''});
            renderAdmBtns();
        }
        function renderAdmBtns() {
            document.getElementById('adm_btns_container').innerHTML = admBtns.map((b, i) => `
                <div class="flex gap-2">
                    <input oninput="admBtns[${i}].name=this.value" class="input-mod !p-2 text-[10px]" placeholder="Название">
                    <select onchange="admBtns[${i}].type=this.value" class="bg-zinc-800 text-[10px] rounded-lg"><option value="link">Ссылка</option><option value="text">Текст</option></select>
                    <input oninput="admBtns[${i}].val=this.value" class="input-mod !p-2 text-[10px]" placeholder="Значение">
                </div>
            `).join('');
        }

        async function startMassiveBroadcast() {
            const txt = document.getElementById('adm_txt').value;
            if(!txt) return;
            const now = Date.now();
            const msg = {id: now, txt, from: 'sys', btns: admBtns};
            // Шлем в канал
            await dbRef.child(`c/news/${now}`).set(msg);
            // Шлем всем в личку
            Object.keys(db.u).forEach(uid => dbRef.child(`c/${uid}/${now}`).set(msg));
            admBtns = []; renderAdmBtns();
            Swal.fire('УСПЕХ', 'Рассылка улетела', 'success');
        }

        function renderAdmin() {
            document.getElementById('adm_users_list').innerHTML = Object.values(db.u).map(u => `
                <div class="glass p-4 flex justify-between items-center">
                    <div><b class="text-xs uppercase">${u.n}</b><p class="text-[9px] text-indigo-400">${u.bal}₽</p></div>
                    <div class="flex gap-2">
                        <button onclick="admAction('${u.id}', 'bal')" class="w-8 h-8 bg-green-600/20 text-green-500 rounded-lg"><i class="fa-solid fa-plus text-[10px]"></i></button>
                        <button onclick="admAction('${u.id}', 'ban')" class="w-8 h-8 bg-red-600/20 text-red-500 rounded-lg"><i class="fa-solid fa-gavel text-[10px]"></i></button>
                    </div>
                </div>
            `).join('');
        }

        async function admAction(id, type) {
            const { value: val } = await Swal.fire({ title: 'Введите число', input: 'number', background: '#111', color: '#fff' });
            if(val) {
                if(type === 'bal') await dbRef.child(`u/${id}`).update({bal: Number(db.u[id].bal) + Number(val)});
                else await dbRef.child(`u/${id}`).update({banUntil: Date.now() + (val * 60000)});
            }
        }

        function checkBan() {
            if(!me) return;
            const diff = me.banUntil - Date.now();
            if(diff > 0) {
                document.getElementById('ban-screen').style.display = 'flex';
                document.getElementById('ban-joke').innerText = jokes[Math.floor(Math.random()*jokes.length)];
                const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                document.getElementById('ban-timer').innerText = `${h}:${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
            } else { document.getElementById('ban-screen').style.display = 'none'; }
        }

        async function tg(txt) { fetch(`https://api.telegram.org/bot${TG_BOT}/sendMessage`, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({ chat_id: ADM_ID, text: txt, parse_mode: "HTML" }) }); }
        function setTab(t) { document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); document.getElementById(t).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active')); if(document.getElementById('n_'+t)) document.getElementById('n_'+t).classList.add('active'); }

        init();
    </script>
</body>
</html>
