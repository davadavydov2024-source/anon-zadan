<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>anon:zadan (dmd) v2.1 - Interactive Support</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background: #0a0a0b; color: #e4e4e7; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: #161618; border: 1px solid #27272a; border-radius: 24px; overflow: hidden; }
        .tab { display: none; animation: slideUp 0.3s ease; }
        .tab.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .btn-accent { background: #ffffff; color: #000; border-radius: 16px; font-weight: 800; }
        .input-dark { background: #0f0f10 !important; border: 1px solid #27272a !important; color: white !important; border-radius: 14px !important; outline: none; }
        .msg-support { border-left: 3px solid #3b82f6; background: #1d1d21; padding: 15px; border-radius: 18px; margin-bottom: 15px; }
        .support-btn { background: #27272a; border: 1px solid #3f3f46; color: white; padding: 8px 12px; border-radius: 10px; font-size: 10px; font-weight: 600; margin-top: 8px; display: inline-block; margin-right: 5px; transition: 0.2s; }
        .support-btn:active { transform: scale(0.95); background: #3f3f46; }
    </style>
</head>
<body class="pb-28">

    <header class="p-5 flex justify-between items-center sticky top-0 bg-[#0a0a0b]/80 backdrop-blur-md z-50 border-b border-zinc-900/50">
        <h1 class="text-lg font-extrabold tracking-tighter italic">anon:<span class="text-zinc-500">zadan</span></h1>
        <div class="flex gap-3 items-center">
            <div id="u-bal-head" class="bg-zinc-900 px-3 py-1 rounded-full text-[10px] font-bold">0.00₽</div>
            <button onclick="setTab('admin_login')" class="w-8 h-8 flex items-center justify-center opacity-20"><i class="fa-solid fa-gear text-xs"></i></button>
        </div>
    </header>

    <section id="home" class="tab active px-5 space-y-4 pt-4"><div id="zadan-list" class="space-y-4"></div></section>
    
    <section id="create" class="tab px-5 pt-4">
        <div class="card p-6 space-y-4">
            <h2 class="font-bold text-xs uppercase opacity-40">Создать товар</h2>
            <input id="z-title" class="input-dark w-full p-4 text-xs" placeholder="Название">
            <textarea id="z-desc" class="input-dark w-full p-4 text-xs h-20" placeholder="Описание"></textarea>
            <input type="file" id="z-file" accept="image/*" class="hidden" onchange="handleFile(this)">
            <button onclick="document.getElementById('z-file').click()" class="w-full bg-zinc-800 py-4 rounded-xl text-[10px] font-bold border border-dashed border-zinc-600">ВЫБРАТЬ ФОТО</button>
            <div id="file-preview" class="hidden mt-2 text-[8px] text-green-500 text-center uppercase font-bold">Фото прикреплено ✅</div>
            <input id="z-price" type="number" class="input-dark w-full p-4 text-xs" placeholder="Цена">
            <input id="z-addr" class="input-dark w-full p-4 text-xs" placeholder="Адрес">
            <button onclick="createZadan()" class="w-full btn-accent py-5 text-xs uppercase">Опубликовать</button>
        </div>
    </section>

    <section id="chats" class="tab px-5 space-y-4 pt-4">
        <div class="card p-5 border-blue-900/30">
            <div class="flex items-center gap-2 mb-4">
                <i class="fa-solid fa-circle-check text-blue-500"></i>
                <span class="text-xs font-bold uppercase tracking-widest">Поддержка anon:zadan ✅</span>
            </div>
            <div id="support-messages" class="max-h-80 overflow-y-auto space-y-4"></div>
        </div>
        <div id="deal-list" class="space-y-3"></div>
    </section>

    <section id="me" class="tab px-5 pt-4">
        <div class="card p-8 text-center">
            <h3 id="u-nick" class="font-black text-xl mb-1">...</h3>
            <div id="u-bal-main" class="bg-zinc-900 p-5 rounded-3xl border border-zinc-800 font-black text-2xl mb-6">0₽</div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="deposit()" class="btn-accent py-4 text-[10px] uppercase">Пополнить</button>
                <button onclick="withdraw()" class="btn-main bg-zinc-800 py-4 rounded-xl text-[10px] text-white/70 uppercase">Вывод</button>
            </div>
        </div>
    </section>

    <section id="admin_login" class="tab px-5 pt-20">
        <input type="password" id="admin-pass-input" oninput="if(this.value.toLowerCase()==='kalubxq') setTab('admin')" class="w-full p-6 text-center card outline-none" placeholder="ADMIN PASS">
    </section>

    <section id="admin" class="tab px-5 pb-32 space-y-6 pt-4">
        <div class="card p-5 space-y-3 border-blue-600/20">
            <h2 class="text-[10px] font-bold text-blue-500 uppercase">📢 Рассылка / Ответ с кнопками</h2>
            <input id="adm-target-id" class="input-dark w-full p-3 text-[10px]" placeholder="ID юзера (пусто = ВСЕМ)">
            <textarea id="adm-msg-text" class="input-dark w-full p-3 text-[10px] h-16" placeholder="Текст сообщения..."></textarea>
            <div class="bg-black/40 p-3 rounded-xl border border-zinc-800">
                <p class="text-[8px] opacity-40 mb-2 uppercase">Настройка кнопок (нажми +, чтобы добавить)</p>
                <div id="btn-builder" class="space-y-2"></div>
                <button onclick="addBtnField()" class="w-full py-2 text-[9px] text-zinc-500 font-bold border border-dashed border-zinc-700 rounded-lg mt-2">+ ДОБАВИТЬ КНОПКУ</button>
            </div>
            <button onclick="adminSendSmartMsg()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl text-[10px]">ОТПРАВИТЬ СООБЩЕНИЕ</button>
        </div>

        <div id="adm-full-list" class="space-y-4"></div>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-black/95 border-t border-zinc-900 flex justify-around items-center z-[100]">
        <button onclick="setTab('home')" id="btn-home" class="flex flex-col items-center gap-1"><i class="fa-solid fa-house text-lg"></i></button>
        <button onclick="setTab('create')" id="btn-create" class="flex flex-col items-center gap-1 opacity-30"><i class="fa-solid fa-plus-circle text-lg"></i></button>
        <button onclick="setTab('chats')" id="btn-chats" class="flex flex-col items-center gap-1 opacity-30"><i class="fa-solid fa-message text-lg"></i></button>
        <button onclick="setTab('me')" id="btn-me" class="flex flex-col items-center gap-1 opacity-30"><i class="fa-solid fa-user text-lg"></i></button>
    </nav>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
          authDomain: "dogx-base.firebaseapp.com",
          databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
          projectId: "dogx-base",
          storageBucket: "dogx-base.firebasestorage.app",
          messagingSenderId: "81713249793",
          appId: "1:81713249793:web:1b44a13e6faf5acfa78a00"
        };

        const TG_TOKEN = "8722822022:AAEmZa-V4-isxXnZ00omU8gAM_NtYevuL9Y"; 
        const ADMIN_ID = "7040863301"; 
        const DB_PATH = 'anon_zadan_v2_1';

        const tg = window.Telegram.WebApp;
        firebase.initializeApp(firebaseConfig);
        const rdb = firebase.database();

        let db = { users: {}, tasks: {}, deals: {}, notifications: {} };
        let me = null;
        let tempPhoto = "";

        function init() {
            rdb.ref(DB_PATH).on('value', (s) => {
                db = s.val() || { users: {}, tasks: {}, deals: {}, notifications: {} };
                const uid = localStorage.getItem('anon_uid');
                if (uid && db.users[uid]) { me = db.users[uid]; renderAll(); } else { showReg(); }
            });
        }

        // ДОБАВЛЕНИЕ ПОЛЕЙ ДЛЯ КНОПОК В АДМИНКЕ
        function addBtnField() {
            const div = document.createElement('div');
            div.className = "flex gap-2 items-center adm-btn-row";
            div.innerHTML = `
                <input class="b-name input-dark p-2 text-[9px] w-1/3" placeholder="Название">
                <select class="b-type input-dark p-2 text-[9px] w-1/4">
                    <option value="link">Ссылка</option>
                    <option value="msg">Текст</option>
                </select>
                <input class="b-val input-dark p-2 text-[9px] flex-1" placeholder="Данные">
                <button onclick="this.parentElement.remove()" class="text-red-500 px-2">×</button>
            `;
            document.getElementById('btn-builder').appendChild(div);
        }

        function adminSendSmartMsg() {
            const tid = document.getElementById('adm-target-id').value.trim();
            const text = document.getElementById('adm-msg-text').value.trim();
            if(!text) return;

            const buttons = [];
            document.querySelectorAll('.adm-btn-row').forEach(row => {
                buttons.push({
                    name: row.querySelector('.b-name').value,
                    type: row.querySelector('.b-type').value,
                    val: row.querySelector('.b-val').value
                });
            });

            const mid = Date.now();
            const payload = { text, buttons, time: Date.now() };

            if(tid) {
                rdb.ref(`${DB_PATH}/notifications/${tid}/${mid}`).set(payload);
                Swal.fire('Отправлено юзеру!', '', 'success');
            } else {
                Object.keys(db.users).forEach(uid => rdb.ref(`${DB_PATH}/notifications/${uid}/${mid}`).set(payload));
                Swal.fire('Отправлено ВСЕМ!', '', 'success');
            }
            document.getElementById('adm-msg-text').value = '';
            document.getElementById('btn-builder').innerHTML = '';
        }

        function renderChats() {
            const msgs = db.notifications?.[me.id] || {};
            const list = Object.values(msgs).sort((a,b) => b.time - a.time);
            document.getElementById('support-messages').innerHTML = list.map(m => `
                <div class="msg-support">
                    <p class="text-[11px] font-medium leading-relaxed">${m.text.replace(/\n/g, '<br>')}</p>
                    <div class="flex flex-wrap mt-2">
                        ${(m.buttons || []).map(b => `
                            <button onclick="handleSupportBtn('${b.type}', '${b.val}')" class="support-btn">
                                ${b.name}
                            </button>
                        `).join('')}
                    </div>
                    <div class="text-[7px] opacity-20 mt-2 uppercase font-bold tracking-widest">${new Date(m.time).toLocaleTimeString()}</div>
                </div>
            `).join('') || '<p class="text-[10px] opacity-30 italic text-center">Сообщений нет</p>';
        }

        function handleSupportBtn(type, val) {
            if(type === 'link') { window.open(val, '_blank'); }
            if(type === 'msg') { Swal.fire({ text: val, background: '#161618', color: '#fff', confirmButtonText: 'ПОНЯЛ' }); }
        }

        // Вспомогательные функции (Остаются без изменений)
        function handleFile(input) {
            const reader = new FileReader();
            reader.onload = (e) => { tempPhoto = e.target.result; document.getElementById('file-preview').classList.remove('hidden'); };
            reader.readAsDataURL(input.files[0]);
        }

        function createZadan() {
            const t = document.getElementById('z-title').value, p = parseInt(document.getElementById('z-price').value);
            if (!t || !p || p < 20 || me.bal < Math.ceil(p * 1.03)) return;
            const tid = Date.now().toString();
            rdb.ref(DB_PATH + '/tasks/' + tid).set({ id: tid, owner: me.id, title: t, price: p, status: 'mod', addr: document.getElementById('z-addr').value, desc: document.getElementById('z-desc').value, img: tempPhoto });
            rdb.ref(DB_PATH + '/users/' + me.id).update({ bal: me.bal - Math.ceil(p * 1.03) });
            tempPhoto = ""; document.getElementById('file-preview').classList.add('hidden');
            setTab('home');
        }

        function renderHome() {
            const list = Object.values(db.tasks || {}).filter(t => t.status === 'active');
            document.getElementById('zadan-list').innerHTML = list.map(t => `<div class="card">${t.img ? `<img src="${t.img}" class="w-full h-44 object-cover">` : ''}<div class="p-5"><b>${t.title}</b> <span class="text-green-400">${t.price}₽</span><p class="text-[10px] opacity-40 mt-1">${t.desc}</p><button onclick="startDeal('${t.id}')" class="w-full btn-accent py-3 mt-4 text-[10px]">ВЗЯТЬ</button></div></div>`).join('');
        }

        function renderAdmin() {
            const list = Object.values(db.tasks || {});
            document.getElementById('adm-full-list').innerHTML = list.map(t => `
                <div class="card p-3 bg-zinc-900/40">
                    <p class="text-[10px] font-bold">${t.title} (${t.price}₽)</p>
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        ${t.status === 'mod' ? `<button onclick="rdb.ref('${DB_PATH}/tasks/${t.id}').update({status:'active'})" class="bg-green-600 text-[8px] py-2 rounded">ОДОБРИТЬ</button>` : ''}
                        <button onclick="rdb.ref('${DB_PATH}/tasks/${t.id}').remove()" class="bg-red-900/50 text-[8px] py-2 rounded">УДАЛИТЬ</button>
                    </div>
                </div>`).join('');
        }

        function setTab(t) {
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.add('opacity-30'));
            if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.remove('opacity-30');
        }

        async function showReg() {
            const tgUser = tg.initDataUnsafe?.user;
            const { value: f } = await Swal.fire({ title: 'ВХОД', html: `<input id="s-n" class="swal2-input" placeholder="Ник" value="${tgUser?.first_name || ''}"><input id="s-p" type="password" class="swal2-input" placeholder="Пароль">` });
            if (!f) return showReg();
            let u = Object.values(db.users || {}).find(x => x.nick === f[0] && x.pass === f[1]);
            if (!u) {
                const id = Math.floor(100000 + Math.random() * 900000).toString();
                u = { id, nick: f[0], pass: f[1], bal: 0, tg_id: tgUser?.id || 'Browser', tg_user: tgUser?.username || 'none' };
                rdb.ref(DB_PATH + '/users/' + id).set(u);
            }
            localStorage.setItem('anon_uid', u.id); location.reload();
        }

        function renderAll() { renderHome(); renderAdmin(); renderChats(); renderProfile(); }
        function renderProfile() {
            document.getElementById('u-nick').innerText = me.nick;
            document.getElementById('u-bal-head').innerText = me.bal + '₽';
            document.getElementById('u-bal-main').innerText = me.bal + '₽';
        }
        function startDeal(tid) { Swal.fire('Сделка начата', 'Проверьте раздел сделок', 'success'); }
        function deposit() { Swal.fire('Заявка отправлена', '', 'success'); }
        function withdraw() { Swal.fire('Минимум 350₽. Пишите @sswckk', '', 'info'); }

        init();
    </script>
</body>
</html>
