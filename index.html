<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYNEOK OMEGA V121 | TG-BOT & ADMIN CHATS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Press+Start+2P&family=Ruslan+Display&family=Kelly+Slab&family=Underdog&family=Lobster&family=Pacifico&family=Monoton&family=Jura:wght@700&family=Playfair+Display:wght@900&family=Courier+Prime&family=Zeyada&family=Dancing+Script:wght@700&family=EB+Garamond:ital@1&family=Montserrat+Alternates:wght@900&family=Caveat:wght@700&family=Unbounded:wght@900&family=Russo+One&family=Bad+Script&family=Bungee+Shade&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --bg: #050505; --card: #121214; --text: #ffffff; --blue: #007aff; --gray: #1c1c1e; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .glass { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 24px; }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px 16px 180px; scrollbar-width: none; }
        .tab-content::-webkit-scrollbar { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Эффекты ников и шрифты (сжато для места) */
        .n-rainbow { background: linear-gradient(to right, red, orange, yellow, green, cyan, blue, violet); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rainbow_anim 3s linear infinite; font-weight: 900; }
        .n-sunset { background: linear-gradient(45deg, #ff5f6d, #ffc371); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .n-ocean { background: linear-gradient(45deg, #2193b0, #6dd5ed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .n-gold { background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .n-fire { background: linear-gradient(45deg, #f12711, #f5af19); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        @keyframes rainbow_anim { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        .b-rainbow { background: linear-gradient(to right, red, yellow, lime, cyan, blue, magenta); -webkit-background-clip: text; -webkit-text-fill-color: transparent; } .b-blue { color: #007aff; } .b-gold { color: #ffd700; } .b-purple { color: #af52de; }
        .f-1 { font-family: 'Comfortaa'; } .f-2 { font-family: 'Press Start 2P'; } .f-3 { font-family: 'Ruslan Display'; } .f-4 { font-family: 'Kelly Slab'; } .f-5 { font-family: 'Underdog'; } .f-6 { font-family: 'Lobster'; } .f-7 { font-family: 'Pacifico'; } .f-8 { font-family: 'Monoton'; } .f-9 { font-family: 'Jura'; } .f-10 { font-family: 'Playfair Display'; } .f-11 { font-family: 'Courier Prime'; } .f-12 { font-family: 'Zeyada'; } .f-13 { font-family: 'Dancing Script'; } .f-14 { font-family: 'EB Garamond'; } .f-15 { font-family: 'Montserrat Alternates'; } .f-16 { font-family: 'Caveat'; } .f-17 { font-family: 'Unbounded'; } .f-18 { font-family: 'Russo One'; } .f-19 { font-family: 'Bad Script'; } .f-20 { font-family: 'Bungee Shade'; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(10,10,10,0.85); backdrop-filter: blur(25px); display: flex; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; color: #636366; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: 0.3s; } .nav-btn.active { color: var(--blue); transform: translateY(-2px); }
        input, textarea, select { background: var(--gray); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; color: white; width: 100%; outline: none; font-size: 14px; transition: 0.3s; } input:focus { border-color: var(--blue); }
        .btn-blue { background: var(--blue); color: white; border-radius: 18px; font-weight: 900; padding: 18px; width: 100%; border: none; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-style: italic; } .btn-blue:active { transform: scale(0.96); }
        #loader { background: #000; z-index: 10000; position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="loader"><div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>

    <div id="auth_scr" class="hidden fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-8">
        <h1 class="text-5xl font-black mb-16 italic tracking-tighter">LYNEOK<span class="text-blue-500">.</span></h1>
        <div class="w-full glass p-8 space-y-4">
            <div id="reg_ext" class="hidden space-y-4">
                <input type="file" id="r_ava" class="hidden" accept="image/*" onchange="upImg(this, 'l_r_ava', true)">
                <label for="r_ava" id="l_r_ava" class="w-24 h-24 bg-zinc-900 mx-auto rounded-full flex items-center justify-center cursor-pointer border-2 border-dashed border-zinc-800"><i class="fa-solid fa-camera text-zinc-600 text-xl"></i></label>
                <input id="r_email" type="email" placeholder="Email для уведомлений">
                <label class="flex items-center gap-3 px-2"><input type="checkbox" id="reg_rules" class="!w-6 !h-6"><span class="text-[11px] text-zinc-500">Я согласен с правилами</span></label>
            </div>
            <input id="a_n" placeholder="Никнейм">
            <input id="a_p" type="password" placeholder="Пароль">
            <button onclick="handleAuth()" id="a_btn" class="btn-blue">Войти</button>
            <p onclick="toggleR()" id="a_tog" class="text-center text-[11px] font-black text-zinc-500 uppercase cursor-pointer pt-4 hover:text-white transition">Создать новый аккаунт</p>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col">
        <header class="px-6 py-5 flex justify-between items-center bg-black/60 backdrop-blur-xl border-b border-white/5 sticky top-0 z-50">
            <b class="text-2xl italic tracking-tighter text-blue-500">LYNEOK</b>
            <div onclick="switchT('profile')" class="bg-white/5 px-4 py-2 rounded-2xl flex items-center gap-3 border border-white/5">
                <div class="text-right"><p class="text-[9px] uppercase font-black opacity-40">Баланс</p><span id="h_bal" class="font-black text-sm">0 ₽</span></div>
                <img id="h_ava" class="w-9 h-9 rounded-full object-cover bg-zinc-800">
            </div>
        </header>

        <main id="tab_market" class="tab-content active">
            <div id="market_main"><h2 class="text-3xl font-black mb-6 italic">Маркет</h2><div id="cat_grid" class="grid grid-cols-2 gap-4"></div></div>
            <div id="subcat_view" class="hidden space-y-6"><button onclick="closeSubcat()" class="text-blue-500 text-xs font-bold"><i class="fa-solid fa-chevron-left"></i> Назад</button><div id="subcat_grid" class="grid grid-cols-1 gap-3"></div></div>
            <div id="items_view" class="hidden space-y-6"><button onclick="closeCat()" class="text-blue-500 text-xs font-bold"><i class="fa-solid fa-chevron-left"></i> Назад</button><div id="items_list" class="space-y-4"></div></div>
        </main>

        <main id="tab_sell" class="tab-content">
            <h2 class="text-3xl font-black mb-6 italic">Создать лот</h2>
            <div class="glass p-6 space-y-5">
                <input type="file" id="s_img" class="hidden" onchange="upImg(this, 'l_s_img', true)">
                <label for="s_img" id="l_s_img" class="w-full h-48 bg-zinc-900 rounded-3xl flex flex-col items-center justify-center border-2 border-dashed border-zinc-800 gap-3"><i class="fa-solid fa-image text-3xl text-zinc-700"></i><span class="text-[10px] font-black uppercase text-zinc-600">Загрузить фото товара</span></label>
                <div class="grid grid-cols-2 gap-3"><select id="s_game" onchange="updateSubcatsSell()"></select><select id="s_subcat"></select></div>
                <input id="s_t" placeholder="Название">
                <textarea id="s_acc" rows="4" placeholder="Описание/Данные..."></textarea>
                <input id="s_p" type="number" placeholder="Цена ₽">
                <button onclick="postItem()" class="btn-blue">Опубликовать</button>
            </div>
        </main>

        <main id="tab_chats" class="tab-content">
            <h2 class="text-3xl font-black mb-6 italic">Сделки & Поддержка</h2>
            <button onclick="openSupport()" class="w-full bg-blue-600/20 text-blue-500 py-4 rounded-2xl font-black uppercase tracking-widest text-xs mb-6 border border-blue-500/20"><i class="fa-solid fa-headset mr-2"></i> Написать в поддержку</button>
            <h3 class="text-[10px] font-black uppercase text-zinc-600 mb-3 ml-2 tracking-widest italic">Ваши активные сделки</h3>
            <div id="deals_list" class="space-y-4"></div>
        </main>

        <main id="tab_profile" class="tab-content">
            <div class="glass p-8 mb-6 text-center border border-white/5 relative">
                <img id="p_ava" class="w-28 h-28 mx-auto mb-6 rounded-full object-cover border-4 border-zinc-900">
                <div class="flex items-center justify-center gap-2 mb-8"><span id="p_n" class="text-3xl font-black">...</span><span id="p_badge"></span></div>
                <div class="grid grid-cols-2 gap-4"><button onclick="topUp()" class="bg-white text-black py-4 rounded-2xl font-black text-xs uppercase italic">Пополнить</button><button onclick="askOut()" class="bg-zinc-800 text-white py-4 rounded-2xl font-black text-xs uppercase italic">Вывести</button></div>
            </div>
            <button id="adm_btn" onclick="switchT('admin')" class="hidden w-full bg-red-600/10 text-red-500 py-5 rounded-3xl font-black mb-4 border border-red-600/20 uppercase text-xs tracking-[3px] italic">OMEGA PANEL</button>
            <button onclick="logout()" class="w-full py-4 text-zinc-600 text-[10px] font-black uppercase tracking-widest">Выйти из системы</button>
        </main>

        <main id="tab_admin" class="tab-content">
            <h1 class="text-4xl font-black italic mb-8 tracking-tighter">OMEGA <span class="text-red-500">SYSTEM</span></h1>
            
            <section class="glass p-6 mb-8 border-blue-600/20">
                <h3 class="text-[11px] font-black text-blue-500 uppercase mb-5 tracking-widest"><i class="fa-brands fa-telegram mr-2"></i>Telegram Уведомления</h3>
                <div class="space-y-3">
                    <input id="ad_tg_token" placeholder="Токен Бота (от BotFather)" class="!py-3 !text-xs">
                    <input id="ad_tg_chat" placeholder="Твой Admin Chat ID" class="!py-3 !text-xs">
                    <button onclick="admSaveTG()" class="btn-blue !py-4 !text-[10px]">Подключить Бота</button>
                </div>
            </section>

            <section class="glass p-6 mb-8 border-green-600/20">
                <h3 class="text-[11px] font-black text-green-500 uppercase mb-5 tracking-widest">Управление Маркетом</h3>
                <div class="space-y-4">
                    <div class="p-4 bg-black/40 rounded-2xl border border-white/5 space-y-3">
                        <input id="ad_g_name" placeholder="Название игры" class="!py-3 !text-xs">
                        <input type="file" id="ad_g_img_file" class="hidden" accept="image/*" onchange="upImg(this, 'l_ad_g_img', false, 'ad_g_img_base64')">
                        <label for="ad_g_img_file" id="l_ad_g_img" class="w-full h-24 bg-zinc-900 rounded-xl flex items-center justify-center border-2 border-dashed border-zinc-700 cursor-pointer"><span class="text-[10px] font-black uppercase text-zinc-500">Загрузить фото игры</span></label>
                        <input type="hidden" id="ad_g_img_base64">
                        <button onclick="admAddGame()" class="w-full bg-green-600 py-3 rounded-xl text-[10px] font-black uppercase italic">Добавить игру</button>
                    </div>
                    <div id="ad_games_list" class="space-y-2"></div>
                </div>
            </section>

            <section class="glass p-6 mb-8 border-purple-600/20">
                <h3 class="text-[11px] font-black text-purple-500 uppercase mb-5 tracking-widest">Мониторинг сделок</h3>
                <div id="ad_all_deals" class="space-y-3"></div>
            </section>

            <section class="mb-8"><h3 class="text-[11px] font-black text-yellow-500 uppercase mb-5">Пользователи</h3><div id="ad_users" class="space-y-4"></div></section>
            <section class="mb-8"><h3 class="text-[11px] font-black text-red-500 uppercase mb-5">Заявки финансы</h3><div id="ad_money_list" class="space-y-3"></div></section>
        </main>

        <nav class="nav-bar">
            <div onclick="switchT('market')" id="n_market" class="nav-btn active"><i class="fa-solid fa-store text-xl"></i><span>Маркет</span></div>
            <div onclick="switchT('sell')" id="n_sell" class="nav-btn"><i class="fa-solid fa-circle-plus text-xl"></i><span>Продать</span></div>
            <div onclick="switchT('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-receipt text-xl"></i><span>Сделки</span></div>
            <div onclick="switchT('profile')" id="n_profile" class="nav-btn"><i class="fa-solid fa-id-card text-xl"></i><span>Профиль</span></div>
        </nav>
    </div>

    <div id="chat_modal" class="hidden fixed inset-0 z-[10005] bg-black flex flex-col">
        <header class="p-5 flex justify-between items-center bg-zinc-900 border-b border-white/10">
            <button onclick="closeChat()" class="text-blue-500 text-sm font-black uppercase"><i class="fa-solid fa-chevron-left mr-2"></i>Назад</button>
            <b id="chat_title" class="text-xs uppercase font-black">Чат</b>
            <div class="w-16 text-right"><span id="chat_status" class="text-[9px] uppercase font-bold text-green-500"></span></div>
        </header>
        <div id="chat_msgs" class="flex-1 overflow-y-auto p-4 space-y-3 pb-24"></div>
        <div class="p-4 bg-zinc-900 border-t border-white/10 fixed bottom-0 left-0 right-0 flex gap-2 pb-[env(safe-area-inset-bottom)]">
            <input id="chat_input" placeholder="Сообщение..." class="!py-3">
            <button onclick="sendMsg()" class="bg-blue-600 px-5 rounded-xl text-white"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="item_modal" class="hidden fixed inset-0 z-[10002] bg-black/98 overflow-y-auto">
        <div class="relative w-full aspect-square"><img id="im_img" class="w-full h-full object-cover"><button onclick="document.getElementById('item_modal').classList.add('hidden')" class="absolute top-8 right-8 w-12 h-12 bg-black/60 rounded-full text-3xl">&times;</button></div>
        <div class="p-8">
            <h1 id="im_title" class="text-4xl font-black italic tracking-tighter mb-2"></h1>
            <span id="im_price" class="text-3xl text-blue-500 font-black italic block mb-6"></span>
            <div class="glass p-6 mb-8"><p id="im_desc" class="text-sm opacity-60 leading-relaxed"></p></div>
            <button id="im_buy_btn" class="btn-blue">Купить лот</button>
        </div>
    </div>

    <script>
        firebase.initializeApp({ apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" });
        const db = firebase.database().ref('lyne_v121_omega');
        const Tst = Swal.mixin({ toast: true, position: 'top', timer: 2000, showConfirmButton: false, background: '#1c1c1e', color: '#fff' });

        let me = null, data = {}, isR = false, tmpImg = "", curG = null, curSub = null, curChat = null;
        const fonts = ["Inter", "Comfortaa", "Press Start 2P", "Ruslan Display", "Kelly Slab", "Underdog", "Lobster", "Pacifico", "Monoton", "Jura", "Playfair Display", "Courier Prime", "Zeyada", "Dancing Script", "EB Garamond", "Montserrat Alternates", "Caveat", "Unbounded", "Russo One", "Bad Script", "Bungee Shade"];
        const nicks = ["n-rainbow", "n-sunset", "n-ocean", "n-gold", "n-fire"]; const badges = ["b-rainbow", "b-blue", "b-gold", "b-purple"];

        // УВЕДОМЛЕНИЯ В ТЕЛЕГРАМ
        function notifyTG(text) {
            const token = data.settings?.tg_token, cid = data.settings?.tg_chat;
            if(!token || !cid) return;
            fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: cid, text: `<b>[LYNEOK OMEGA]</b>\n\n${text}`, parse_mode: 'HTML'})
            }).catch(e=>console.log("TG Error"));
        }

        function init() {
            db.on('value', snap => {
                data = snap.val() || { u:{}, i:{}, d:{}, games:{}, settings:{}, money_req:{}, chats:{} };
                const sid = localStorage.getItem('lyne_v121_sid');
                document.getElementById('loader').style.display = 'none';
                if (sid && data.u[sid]) { me = data.u[sid]; document.getElementById('auth_scr').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); if(me.n.toLowerCase() === 'owwner') document.getElementById('adm_btn').classList.remove('hidden'); render(); if(curChat) renderChat(); } 
                else { document.getElementById('auth_scr').classList.remove('hidden'); document.getElementById('app').classList.add('hidden'); }
            });
        }

        function render() {
            if(!me) return;
            document.getElementById('h_bal').innerText = me.bal.toLocaleString() + ' ₽'; document.getElementById('h_ava').src = me.ava; document.getElementById('p_ava').src = me.ava;
            const pN = document.getElementById('p_n'); pN.innerText = me.n; pN.className = `text-3xl font-black tracking-tighter ${me.nickEffect || ''} ${me.fontClass || ''}`;
            document.getElementById('p_badge').innerHTML = me.badgeType ? `<i class="fa-solid fa-circle-check ${me.badgeType}"></i>` : '';

            if(!curG) document.getElementById('cat_grid').innerHTML = Object.values(data.games || {}).map(g => `<div class="glass p-6 text-center border border-white/5 active:scale-95" onclick="openGame('${g.id}')"><img src="${g.img}" class="w-16 h-16 mx-auto mb-4 rounded-3xl object-cover"><b class="text-[11px] uppercase font-black">${g.name}</b></div>`).join('');
            document.getElementById('s_game').innerHTML = Object.values(data.games || {}).map(g => `<option value="${g.id}">${g.name}</option>`).join(''); updateSubcatsSell();

            // Мои сделки
            const deals = Object.values(data.d || {}).filter(d => d.bid === me.id || d.sid === me.id).reverse();
            document.getElementById('deals_list').innerHTML = deals.map(d => `
                <div class="glass p-5 flex justify-between items-center border-l-4 ${d.status === 'Подтверждено'?'border-l-green-500': d.status==='Отклонено'?'border-l-red-500':'border-l-yellow-500'}">
                    <div><b class="text-sm italic block">${d.t}</b><span class="text-[9px] uppercase opacity-40">${d.p} ₽ • ${d.sid === me.id ? 'Продажа' : 'Покупка'}</span></div>
                    <div class="text-right"><b class="text-[9px] uppercase text-zinc-500 block mb-2">${d.status}</b><button onclick="openChat('${d.id}', '${d.t}')" class="bg-blue-600/20 text-blue-500 px-3 py-1 rounded-lg text-[9px] font-black uppercase">Чат сделки</button></div>
                </div>`).join('');

            if(me.n.toLowerCase() === 'owwner') renderAdmin();
        }

        // МАРКЕТ
        function openGame(gid) { curG = gid; document.getElementById('market_main').classList.add('hidden'); document.getElementById('subcat_view').classList.remove('hidden'); document.getElementById('subcat_grid').innerHTML = Object.values(data.games[gid].sub || {}).map(s => `<div onclick="openSub('${s.id}')" class="glass p-5 flex justify-between items-center"><b class="text-[10px] uppercase font-black">${s.n}</b><i class="fa-solid fa-chevron-right text-[10px] opacity-30"></i></div>`).join(''); }
        function openSub(sid) { curSub = sid; document.getElementById('subcat_view').classList.add('hidden'); document.getElementById('items_view').classList.remove('hidden'); const its = Object.values(data.i || {}).filter(x => x.sub === curSub && !x.sold); document.getElementById('items_list').innerHTML = its.map(i => `<div onclick="showItem('${i.id}')" class="glass p-5 flex justify-between items-center"><div class="flex items-center gap-4"><img src="${i.img}" class="w-14 h-14 rounded-2xl object-cover"><div><b class="text-sm italic block">${i.t}</b><span class="text-[9px] uppercase opacity-30">${data.u[i.sid]?.n || 'продавец'}</span></div></div><b class="text-blue-500 italic text-lg">${i.p} ₽</b></div>`).join(''); }
        function showItem(id) { const i = data.i[id]; document.getElementById('im_img').src = i.img; document.getElementById('im_title').innerText = i.t; document.getElementById('im_price').innerText = i.p + ' ₽'; document.getElementById('im_desc').innerText = i.desc; document.getElementById('im_buy_btn').onclick = () => buyItem(id); document.getElementById('item_modal').classList.remove('hidden'); }
        function buyItem(id) {
            const i = data.i[id]; if(me.id === i.sid) return Tst.fire({icon:'error', title:'Свой товар'}); if(me.bal < i.p) return Tst.fire({icon:'error', title:'Нет средств'});
            Swal.fire({title:'Покупка', text:`Спишем ${i.p} ₽`, showCancelButton:true, background:'#121214', color:'#fff'}).then(r => {
                if(r.isConfirmed) {
                    db.child(`u/${me.id}/bal`).set(me.bal - i.p); db.child(`i/${id}/sold`).set(true);
                    const did = 'd'+Date.now();
                    db.child(`d/${did}`).set({id:did, sid:i.sid, bid:me.id, t:i.t, p:i.p, status:'Ожидает выдачи'});
                    db.child(`chats/${did}`).set({ id:did, msgs: [{sender:'system', text:'Сделка начата. Продавец должен передать данные, после чего админ подтвердит сделку.', time:Date.now()}] });
                    notifyTG(`🛒 <b>Новая покупка!</b>\nТовар: ${i.t}\nСумма: ${i.p}₽\nПокупатель: ${me.n}`);
                    Tst.fire({icon:'success', title:'Куплено!'}); document.getElementById('item_modal').classList.add('hidden'); switchT('chats');
                }
            });
        }

        // АДМИНКА
        function renderAdmin() {
            document.getElementById('ad_tg_token').value = data.settings?.tg_token || ''; document.getElementById('ad_tg_chat').value = data.settings?.tg_chat || '';
            document.getElementById('ad_games_list').innerHTML = Object.values(data.games || {}).map(g => `<div class="p-4 bg-zinc-900/50 rounded-2xl"><div class="flex justify-between items-center mb-2"><div class="flex items-center gap-3"><img src="${g.img}" class="w-8 h-8 rounded"><b class="text-xs uppercase">${g.name}</b></div><button onclick="db.child('games/${g.id}').remove()" class="text-red-500 text-xs font-black">Удалить</button></div><div class="flex gap-2"><input id="ad_sub_${g.id}" placeholder="Подкатегория" class="!py-2 !text-[10px]"><button onclick="admAddSub('${g.id}')" class="bg-blue-600 px-3 rounded-xl text-[10px] font-black">Добавить</button></div></div>`).join('');
            
            // Админка сделок
            const deals = Object.values(data.d || {}).reverse();
            document.getElementById('ad_all_deals').innerHTML = deals.map(d => `
                <div class="glass p-4 border border-white/5 text-xs">
                    <b class="italic block text-sm mb-1">${d.t}</b>
                    <p class="text-[9px] opacity-50 mb-3">Продавец: ${data.u[d.sid]?.n} | Покупатель: ${data.u[d.bid]?.n} | Сумма: ${d.p}₽ | <b>Статус: ${d.status}</b></p>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="openChat('${d.id}', 'Admin Чат: ${d.t}')" class="bg-blue-600/20 text-blue-500 py-2 rounded-xl text-[9px] font-black uppercase">Читать чат</button>
                        <button onclick="admDealStatus('${d.id}', 'Подтверждено', ${d.sid}, ${d.p})" class="bg-green-600/20 text-green-500 py-2 rounded-xl text-[9px] font-black uppercase">Одобрить</button>
                        <button onclick="admDealStatus('${d.id}', 'Отклонено', ${d.bid}, ${d.p})" class="bg-red-600/20 text-red-500 py-2 rounded-xl text-[9px] font-black uppercase">Отмена</button>
                    </div>
                </div>`).join('');

            // Пользователи (сжато)
            document.getElementById('ad_users').innerHTML = Object.values(data.u).map(u => `<div class="glass p-4 flex justify-between items-center"><div class="flex items-center gap-3"><img src="${u.ava}" class="w-8 h-8 rounded-full"><b class="text-xs ${u.fontClass||''} ${u.nickEffect||''}">${u.n}</b></div><button onclick="db.child('u/${u.id}').remove()" class="text-red-500 text-xs font-black">Удалить</button></div>`).join('');
            
            // Заявки
            document.getElementById('ad_money_list').innerHTML = Object.values(data.money_req || {}).filter(r=>r.status==='pending').map(r => `<div class="glass p-4 flex justify-between items-center"><b class="text-xs">${r.n} - ${r.amt}₽ (${r.type})</b><div><button onclick="admHandleMoney('${r.id}', true)" class="bg-green-600 px-3 py-1 rounded text-[10px] mr-1">ОК</button><button onclick="admHandleMoney('${r.id}', false)" class="bg-zinc-800 px-3 py-1 rounded text-[10px]">Х</button></div></div>`).join('');
        }

        // ЛОГИКА АДМИНА
        function admSaveTG() { db.child('settings').update({ tg_token: document.getElementById('ad_tg_token').value, tg_chat: document.getElementById('ad_tg_chat').value }); Tst.fire({icon:'success', title:'TG подключен'}); notifyTG("Бот успешно привязан к системе LYNEOK OMEGA!"); }
        function admAddGame() { const n=document.getElementById('ad_g_name').value, i=document.getElementById('ad_g_img_base64').value; if(!n||!i) return Tst.fire({icon:'warning', title:'Имя и фото'}); const id='g'+Date.now(); db.child(`games/${id}`).set({id, name:n, img:i, sub:{}}); document.getElementById('l_ad_g_img').innerHTML='Загружено'; }
        function admAddSub(gid) { const val=document.getElementById('ad_sub_'+gid).value; if(val) db.child(`games/${gid}/sub/s${Date.now()}`).set({id:'s'+Date.now(), n:val}); }
        function admDealStatus(did, status, uid, amount) { 
            db.child(`d/${did}/status`).set(status); 
            // Возврат денег или начисление продавцу
            if(status === 'Подтверждено') db.child(`u/${uid}/bal`).transaction(b => (b||0) + amount); // Начисляем продавцу
            if(status === 'Отклонено') db.child(`u/${uid}/bal`).transaction(b => (b||0) + amount); // Возврат покупателю
            Tst.fire({icon:'success', title:'Статус обновлен'});
            notifyTG(`⚖️ Статус сделки обновлен на: ${status}`);
        }
        function admHandleMoney(rid, approve) { const r = data.money_req[rid]; if(approve) db.child(`u/${r.uid}/bal`).transaction(b => (b||0) + (r.type === 'deposit' ? r.amt : -r.amt)); db.child(`money_req/${rid}/status`).set(approve ? 'approved' : 'rejected'); }

        // ЧАТЫ
        function openChat(id, title) { curChat = id; document.getElementById('chat_title').innerText = title; document.getElementById('chat_modal').classList.remove('hidden'); renderChat(); }
        function closeChat() { curChat = null; document.getElementById('chat_modal').classList.add('hidden'); }
        function sendMsg() {
            const input = document.getElementById('chat_input'); const text = input.value.trim(); if(!text) return;
            const msg = { sender: me.id, n: me.n, text: text, time: Date.now() };
            const msgs = data.chats[curChat]?.msgs || []; msgs.push(msg);
            db.child(`chats/${curChat}/msgs`).set(msgs); input.value = '';
            // Если пишет юзер, а не админ, уведомить админа в ТГ
            if(me.n.toLowerCase() !== 'owwner') notifyTG(`💬 <b>Новое сообщение в чате сделки</b>\nОт: ${me.n}\nТекст: ${text}`);
        }
        function renderChat() {
            if(!curChat || !data.chats[curChat]) return;
            const msgs = data.chats[curChat].msgs || [];
            document.getElementById('chat_msgs').innerHTML = msgs.map(m => {
                if(m.sender === 'system') return `<div class="text-center text-[9px] uppercase font-black text-zinc-500 my-4">${m.text}</div>`;
                const isMe = m.sender === me.id; const isAdmin = m.n?.toLowerCase() === 'owwner';
                return `<div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}"><span class="text-[8px] opacity-40 mb-1 ml-1 ${isAdmin?'text-red-500 font-black':''}">${isAdmin?'Администратор':m.n}</span><div class="${isMe ? 'bg-blue-600 text-white' : isAdmin ? 'bg-red-600/20 text-red-100 border border-red-500/30' : 'bg-zinc-800'} px-4 py-2 rounded-2xl max-w-[80%] text-sm">${m.text}</div></div>`;
            }).join('');
            document.getElementById('chat_msgs').scrollTop = document.getElementById('chat_msgs').scrollHeight;
        }
        function openSupport() { const id = 'sup_'+me.id; if(!data.chats[id]) { db.child(`chats/${id}`).set({ id, msgs:[{sender:'system', text:'Чат с поддержкой начат.', time:Date.now()}]}); db.child(`d/${id}`).set({ id, t:'Служба поддержки', status:'Активно', sid:'support', bid:me.id }); notifyTG(`🆘 ${me.n} открыл чат с поддержкой!`); } openChat(id, 'Поддержка'); }

        // БАЗОВЫЕ
        function handleAuth() { const n=document.getElementById('a_n').value, p=document.getElementById('a_p').value; if(isR) { if(!document.getElementById('reg_rules').checked) return; const id='u'+Date.now(); db.child(`u/${id}`).set({id, n, p, ava:tmpImg||'https://ui-avatars.com/api/?name='+n, bal:0}); localStorage.setItem('lyne_v121_sid', id); notifyTG(`👤 Новая регистрация: ${n}`); location.reload(); } else { const u = Object.values(data.u).find(x => x.n === n && x.p === p); if(u) { localStorage.setItem('lyne_v121_sid', u.id); location.reload(); } else Tst.fire({icon:'error', title:'Неверно'}); } }
        function postItem() { const i = { id: 'i'+Date.now(), sid: me.id, game: document.getElementById('s_game').value, sub: document.getElementById('s_subcat').value, t: document.getElementById('s_t').value, desc: document.getElementById('s_acc').value, p: Number(document.getElementById('s_p').value), img: tmpImg || 'https://via.placeholder.com/400', sold: false }; db.child(`i/${i.id}`).set(i); notifyTG(`📦 Создан лот: ${i.t} за ${i.p}₽`); Tst.fire({icon:'success', title:'Выставлено'}); switchT('market'); }
        function topUp() { Swal.fire({title:'Сумма', input:'number', background:'#121214', color:'#fff'}).then(r=>{if(r.value>0){db.child(`money_req/r${Date.now()}`).set({id:'r'+Date.now(), uid:me.id, n:me.n, amt:Number(r.value), type:'deposit', status:'pending'}); notifyTG(`💰 Заявка на пополнение: ${r.value}₽ от ${me.n}`); }}); }
        function askOut() { Swal.fire({title:'Сумма', input:'number', background:'#121214', color:'#fff'}).then(r=>{if(r.value>0&&r.value<=me.bal){db.child(`money_req/r${Date.now()}`).set({id:'r'+Date.now(), uid:me.id, n:me.n, amt:Number(r.value), type:'withdraw', status:'pending'}); notifyTG(`💸 Заявка на вывод: ${r.value}₽ от ${me.n}`); }}); }
        function updateSubcatsSell() { const g = document.getElementById('s_game').value; if(data.games[g]) document.getElementById('s_subcat').innerHTML = Object.values(data.games[g].sub||{}).map(s=>`<option value="${s.id}">${s.n}</option>`).join(''); }
        function logout() { localStorage.clear(); location.reload(); } function switchT(t) { document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active')); document.getElementById('tab_'+t).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active')); document.getElementById('n_'+t)?.classList.add('active'); } function closeSubcat() { document.getElementById('subcat_view').classList.add('hidden'); document.getElementById('market_main').classList.remove('hidden'); } function closeCat() { document.getElementById('items_view').classList.add('hidden'); document.getElementById('subcat_view').classList.remove('hidden'); }
        
        // Модифицированная загрузка фото (поддерживает Base64 инпуты)
        function upImg(i, tid, setImgHtml = true, hiddenInputId = null) { 
            const r = new FileReader(); r.onload = e => { 
                tmpImg = e.target.result; 
                if(setImgHtml) document.getElementById(tid).innerHTML = `<img src="${tmpImg}" class="w-full h-full object-cover rounded-[inherit]">`; 
                else { document.getElementById(tid).innerHTML = `<img src="${tmpImg}" class="w-8 h-8 rounded-full object-cover"> Фото загружено`; document.getElementById(tid).classList.replace('border-dashed', 'border-solid'); document.getElementById(tid).classList.add('border-green-500'); }
                if(hiddenInputId) document.getElementById(hiddenInputId).value = tmpImg;
            }; 
            if(i.files[0]) r.readAsDataURL(i.files[0]); 
        }
        function toggleR() { isR=!isR; document.getElementById('reg_ext').classList.toggle('hidden'); document.getElementById('a_btn').innerText=isR?'Создать':'Войти'; }
        init();
    </script>
</body>
</html>
