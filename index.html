<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>anon:zadan | v2.3.2 STABLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { background: #050505; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; margin: 0; }
        .glass { background: rgba(20, 20, 25, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 30px; }
        .input-mod { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 15px; width: 100%; color: #fff; font-size: 13px; }
        .btn-main { background: linear-gradient(135deg, #6366f1, #a855f7); border-radius: 22px; padding: 18px; font-weight: 900; width: 100%; text-transform: uppercase; color: white; border: none; cursor: pointer; transition: 0.3s; }
        .tab { display: none; height: 100vh; overflow-y: auto; padding-bottom: 120px; }
        .tab.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(5,5,5,0.9); backdrop-filter: blur(15px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .nav-btn { color: #52525b; font-size: 22px; transition: 0.3s; }
        .nav-btn.active { color: #a855f7; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="app">
        <header class="px-6 py-4 flex justify-between items-center glass rounded-none rounded-b-[35px] sticky top-0 z-50">
            <h1 class="text-xl font-black italic">anon:<span class="text-zinc-500">zadan</span></h1>
            <div id="top_bal" onclick="setTab('wallet')" class="bg-indigo-600/20 px-4 py-2 rounded-xl text-xs font-black text-indigo-400">0 ₽</div>
        </header>

        <main id="home" class="tab active px-5 pt-6">
            <div id="task_list" class="space-y-4"></div>
        </main>

        <main id="chats" class="tab px-5 pt-6">
            <div id="chat_list" class="space-y-3">
                <div onclick="openChat('news')" class="glass p-5 flex items-center gap-4 border-indigo-500/40 cursor-pointer">
                    <div class="w-12 h-12 bg-indigo-600 rounded-xl flex justify-center items-center"><i class="fa-solid fa-bullhorn text-white"></i></div>
                    <div class="flex-1"><b>Official News</b><p class="text-[9px] opacity-40">Главный канал связи</p></div>
                </div>
                <div onclick="openChat('support')" class="glass p-5 flex items-center gap-4 cursor-pointer">
                    <div class="w-12 h-12 bg-zinc-800 rounded-xl flex justify-center items-center"><i class="fa-solid fa-headset text-indigo-400"></i></div>
                    <div><b>Support</b><p class="text-[9px] opacity-40">Техническая поддержка</p></div>
                </div>
            </div>

            <div id="chat_room" class="hidden h-full flex flex-col -mt-6 bg-[#050505] relative z-[1001]">
                <div class="glass rounded-t-none p-4 flex items-center gap-4">
                    <button onclick="closeChat()"><i class="fa-solid fa-arrow-left"></i></button>
                    <b id="chat_title" class="text-xs uppercase font-black">Чат</b>
                </div>
                <div id="chat_msgs" class="flex-1 overflow-y-auto p-5 space-y-4 pb-40"></div>
                <div class="p-4 glass rounded-b-none flex gap-2">
                    <input id="msg_val" class="input-mod !py-3" placeholder="Сообщение...">
                    <button onclick="sendMsg()" class="w-12 bg-indigo-600 rounded-xl"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </main>

        <main id="wallet" class="tab px-5 pt-6">
            <div class="glass p-8 text-center space-y-6">
                <h2 id="wallet_bal" class="text-5xl font-black italic">0 ₽</h2>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="money('deposit')" class="py-5 bg-indigo-600 rounded-2xl font-black uppercase text-[10px]">Ввод</button>
                    <button onclick="money('withdraw')" class="py-5 bg-zinc-800 rounded-2xl font-black uppercase text-[10px]">Вывод</button>
                </div>
            </div>
        </main>

        <main id="admin_panel" class="tab px-4 pt-6 space-y-6">
            <div class="glass p-6 text-center">
                <h2 class="text-red-500 font-black uppercase tracking-widest">Admin Control</h2>
                <div class="mt-4 space-y-2">
                    <input id="adm_task_name" class="input-mod" placeholder="Название задания">
                    <input id="adm_task_price" class="input-mod" placeholder="Цена (₽)">
                    <button onclick="addTask()" class="btn-main !py-3 text-[10px]">Добавить задание</button>
                </div>
            </div>
            <div id="adm_users" class="space-y-3"></div>
        </main>

        <nav class="nav-bar">
            <button onclick="setTab('home')" id="n_home" class="nav-btn active"><i class="fa-solid fa-bolt"></i></button>
            <button onclick="setTab('wallet')" id="n_wallet" class="nav-btn"><i class="fa-solid fa-wallet"></i></button>
            <button onclick="setTab('chats')" id="n_chats" class="nav-btn"><i class="fa-solid fa-comment-dots"></i></button>
            <button onclick="setTab('admin_panel')" id="n_admin" class="nav-btn"><i class="fa-solid fa-shield-halved"></i></button>
        </nav>
    </div>

    <script>
        const TG_BOT = "8722822022:AAEmZa-V4-isxXnZ00omU8gAM_NtYevuL9Y", ADM_ID = "7040863301";
        const CFG = { apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI", databaseURL: "https://dogx-base-default-rtdb.firebaseio.com" };
        firebase.initializeApp(CFG); const dbRef = firebase.database().ref('anon_v2');

        let me = null, db = {}, actC = null;

        function init() {
            dbRef.on('value', s => {
                db = s.val() || {u:{}, t:{}, c:{}};
                let id = localStorage.getItem('u_id') || "u" + Date.now();
                if(!localStorage.getItem('u_id')) {
                    localStorage.setItem('u_id', id);
                    dbRef.child(`u/${id}`).set({id, n: "Worker_"+id.slice(-4), bal: 0, t: "user"});
                }
                me = db.u[id]; render();
            });
        }

        function render() {
            document.getElementById('top_bal').innerText = me.bal + ' ₽';
            document.getElementById('wallet_bal').innerText = me.bal + ' ₽';
            
            document.getElementById('task_list').innerHTML = Object.values(db.t || {}).map(t => `
                <div class="glass p-6 flex justify-between items-center">
                    <div><b>${t.n}</b><p class="text-[9px] opacity-40">Награда: ${t.p} ₽</p></div>
                    <button onclick="finishTask('${t.id}')" class="bg-indigo-600 px-6 py-3 rounded-xl text-[10px] font-black uppercase">Взять</button>
                </div>`).join('');

            if(actC) renderMessages();
            renderAdmin();
        }

        function renderAdmin() {
            document.getElementById('adm_users').innerHTML = Object.values(db.u).map(u => `
                <div class="glass p-4 flex justify-between items-center">
                    <span>${u.n} (${u.bal}₽)</span>
                    <button onclick="editBal('${u.id}')" class="bg-indigo-600 px-3 py-1 rounded-lg text-[10px]">+</button>
                </div>`).join('');
        }

        async function editBal(id) {
            const { value: v } = await Swal.fire({ title: 'Сумма', input: 'number', background: '#111', color: '#fff' });
            if(v) await dbRef.child(`u/${id}`).update({bal: Number(db.u[id].bal) + Number(v)});
        }

        async function addTask() {
            const n = document.getElementById('adm_task_name').value, p = document.getElementById('adm_task_price').value;
            if(!n || !p) return;
            const id = 't' + Date.now();
            await dbRef.child(`t/${id}`).set({id, n, p: Number(p)});
            document.getElementById('adm_task_name').value = ''; document.getElementById('adm_task_price').value = '';
        }

        function openChat(t) {
            actC = t;
            document.getElementById('chat_list').classList.add('hidden');
            document.getElementById('chat_room').classList.remove('hidden');
            document.getElementById('chat_title').innerText = t === 'news' ? 'ОФИЦИАЛЬНЫЙ КАНАЛ' : 'ПОДДЕРЖКА';
            renderMessages();
        }

        function closeChat() { actC = null; document.getElementById('chat_list').classList.remove('hidden'); document.getElementById('chat_room').classList.add('hidden'); }

        function renderMessages() {
            const path = actC === 'news' ? 'news' : me.id;
            const msgs = Object.values(db.c?.[path] || {});
            document.getElementById('chat_msgs').innerHTML = msgs.map(m => `
                <div class="p-4 max-w-[80%] rounded-[20px] text-xs ${m.f==='sys'?'bg-indigo-600 self-start':'bg-zinc-800 self-end'}">
                    ${m.txt}
                </div>`).join('');
            const d = document.getElementById('chat_msgs'); d.scrollTop = d.scrollHeight;
        }

        async function sendMsg() {
            const v = document.getElementById('msg_val').value; if(!v) return;
            const path = actC === 'news' ? 'news' : me.id;
            await dbRef.child(`c/${path}/${Date.now()}`).set({txt: v, f: 'user'});
            document.getElementById('msg_val').value = '';
            tg(`💬 Сообщение от @${me.n}: ${v}`);
        }

        async function finishTask(id) {
            await Swal.fire({ title: 'Готово!', text: 'Задание отправлено на проверку', icon: 'success', background: '#111', color: '#fff' });
            tg(`🚀 Воркер ${me.n} выполнил задание ${id}`);
        }

        async function money(t) {
            const { value: v } = await Swal.fire({ title: 'Сумма', input: 'number', background: '#111', color: '#fff' });
            if(v) tg(`💰 Заявка на ${t}: ${v} ₽ от ${me.n}`);
        }

        async function tg(txt) {
            fetch(`https://api.telegram.org/bot${TG_BOT}/sendMessage`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ chat_id: ADM_ID, text: txt })
            });
        }

        function setTab(t) {
            document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
            document.getElementById('n_'+(t==='admin_panel'?'admin':t)).classList.add('active');
        }

        init();
    </script>
</body>
</html>
