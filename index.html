<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>anon:zadan (dmd) v1.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-analytics-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background: #0a0a0b; color: #e4e4e7; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: #161618; border: 1px solid #27272a; border-radius: 24px; overflow: hidden; }
        .tab { display: none; animation: slideUp 0.3s ease; }
        .tab.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .btn-main { background: #27272a; border-radius: 16px; transition: 0.2s; font-weight: 600; }
        .btn-main:active { scale: 0.96; background: #3f3f46; }
        .btn-accent { background: #ffffff; color: #000; border-radius: 16px; font-weight: 800; }
        .input-dark { background: #0f0f10 !important; border: 1px solid #27272a !important; color: white !important; border-radius: 14px !important; outline: none; }
        .up-border { border: 2px solid #fbbf24 !important; box-shadow: 0 0 15px rgba(251, 191, 36, 0.1); }
        
        .notification-dot {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 10px;
            height: 10px;
            background-color: #ef4444;
            border-radius: 50%;
            border: 2px solid #000;
            display: none;
            z-index: 10;
        }
        nav button { position: relative; }
    </style>
</head>
<body class="pb-28">

    <header class="p-5 flex justify-between items-center sticky top-0 bg-[#0a0a0b]/80 backdrop-blur-md z-50 border-b border-zinc-900/50">
        <h1 class="text-lg font-extrabold tracking-tighter italic">anon:<span class="text-zinc-500">zadan</span></h1>
        <div class="flex gap-3 items-center">
            <div id="u-bal-head" class="bg-zinc-900 px-3 py-1 rounded-full text-[10px] font-bold">0.00₽</div>
            <button onclick="setTab('admin_login')" class="w-8 h-8 flex items-center justify-center opacity-20"><i class="fa-solid fa-gear text-xs"></i></button>
        </div>
    </header>

    <div class="px-5 mb-4 mt-2">
        <div class="relative">
            <i class="fa-solid fa-location-dot absolute left-4 top-1/2 -translate-y-1/2 text-zinc-600 text-xs"></i>
            <input id="search-addr" oninput="renderHome()" class="w-full bg-zinc-900 border border-zinc-800 py-4 pl-10 pr-4 rounded-2xl text-xs outline-none focus:border-zinc-500" placeholder="Поиск по адресу (РФ)...">
        </div>
    </div>

    <section id="home" class="tab active px-5 space-y-4"><div id="zadan-list" class="space-y-4"></div></section>
    <section id="create" class="tab px-5">
        <div class="card p-6 space-y-4">
            <h2 class="font-bold text-sm uppercase tracking-widest opacity-40">Новое задание</h2>
            <input id="z-title" class="input-dark w-full p-4 text-xs" placeholder="Заголовок">
            <textarea id="z-desc" class="input-dark w-full p-4 text-xs h-24" placeholder="Описание задачи"></textarea>
            <input id="z-img" class="input-dark w-full p-4 text-xs" placeholder="Ссылка на фото">
            <div class="grid grid-cols-2 gap-3">
                <input id="z-price" type="number" class="input-dark w-full p-4 text-xs" placeholder="Цена (₽)">
                <input id="z-addr" class="input-dark w-full p-4 text-xs" placeholder="Адрес (РФ)">
            </div>
            <button onclick="createZadan()" class="w-full btn-accent py-5 text-xs uppercase">Отправить на модерацию</button>
        </div>
    </section>
    <section id="chats" class="tab px-5 space-y-4"><div id="deal-list" class="space-y-3"></div></section>
    <section id="me" class="tab px-5">
        <div class="card p-8 text-center">
            <div class="w-20 h-20 bg-zinc-800 rounded-full mx-auto mb-4 flex items-center justify-center text-2xl">👤</div>
            <h3 id="u-nick" class="font-black text-xl mb-1">...</h3>
            <p id="u-id" class="text-[10px] opacity-30 mb-6 uppercase">ID: 000000</p>
            <div id="u-bal-main" class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800 font-bold">0₽</div>
        </div>
    </section>
    <section id="admin_login" class="tab px-5 pt-20">
        <input type="password" id="admin-pass-input" oninput="if(this.value.toLowerCase()==='kalubxq') setTab('admin')" class="w-full p-6 text-center text-2xl card outline-none border-zinc-700" placeholder="••••">
    </section>
    <section id="admin" class="tab px-5 pb-32 space-y-6">
        <div id="adm-mod-list" class="space-y-3"></div>
        <div id="adm-user-list" class="space-y-2"></div>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 h-24 bg-black/95 backdrop-blur-2xl border-t border-zinc-900 flex justify-around items-center px-6 z-[100]">
        <button onclick="setTab('home')" id="btn-home" class="flex flex-col items-center gap-1 transition-all">
            <div class="relative"><i class="fa-solid fa-rectangle-list text-xl"></i><div id="dot-home" class="notification-dot"></div></div>
            <span class="text-[8px] font-bold">Лента</span>
        </button>
        <button onclick="setTab('create')" id="btn-create" class="flex flex-col items-center gap-1 opacity-30 transition-all"><i class="fa-solid fa-circle-plus text-xl"></i><span class="text-[8px] font-bold">Создать</span></button>
        <button onclick="setTab('chats')" id="btn-chats" class="flex flex-col items-center gap-1 opacity-30 transition-all">
            <div class="relative"><i class="fa-solid fa-comment-dots text-xl"></i><div id="dot-chats" class="notification-dot"></div></div>
            <span class="text-[8px] font-bold">Сделки</span>
        </button>
        <button onclick="setTab('me')" id="btn-me" class="flex flex-col items-center gap-1 opacity-30 transition-all"><i class="fa-solid fa-user text-xl"></i><span class="text-[8px] font-bold">Профиль</span></button>
    </nav>

    <script>
        // --- ТВОЙ НОВЫЙ КОНФИГ Firebase ---
        const firebaseConfig = {
          apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
          authDomain: "dogx-base.firebaseapp.com",
          databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
          projectId: "dogx-base",
          storageBucket: "dogx-base.firebasestorage.app",
          messagingSenderId: "81713249793",
          appId: "1:81713249793:web:1b44a13e6faf5acfa78a00",
          measurementId: "G-HDQEQRGLTK"
        };

        // Инициализация
        const app = firebase.initializeApp(firebaseConfig);
        const analytics = firebase.analytics();
        const rdb = firebase.database();

        // Настройки админа (вставь свои данные для уведомлений)
        const TG_TOKEN = ""; 
        const ADMIN_ID = "";
        const DB_PATH = 'anon_zadan_v1_3';

        let db = { users: {}, tasks: {}, deals: {} };
        let me = null;
        let lastHomeV = localStorage.getItem('lhv') || 0;
        let lastChatsV = localStorage.getItem('lcv') || 0;

        function init() {
            rdb.ref(DB_PATH).on('value', (s) => {
                db = s.val() || { users: {}, tasks: {}, deals: {} };
                const uid = localStorage.getItem('anon_uid');
                if(uid && db.users[uid]) {
                    me = db.users[uid];
                    renderAll();
                } else { showReg(); }
            });
        }

        function renderAll() {
            renderHome(); renderChats(); renderProfile(); renderAdmin(); checkDots();
        }

        function checkDots() {
            const approved = Object.values(db.tasks || {}).filter(t => t.owner === me.id && t.status === 'active' && t.approved_at > lastHomeV);
            document.getElementById('dot-home').style.display = approved.length > 0 ? 'block' : 'none';
            const newUpdates = Object.values(db.deals || {}).filter(d => (d.owner === me.id || d.worker === me.id) && d.last_update > lastChatsV && d.last_updater !== me.id);
            document.getElementById('dot-chats').style.display = newUpdates.length > 0 ? 'block' : 'none';
        }

        function notifyAdmin(txt) {
            if(TG_TOKEN && ADMIN_ID) fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(txt)}`);
        }

        async function showReg() {
            const { value: r } = await Swal.fire({
                title: 'anon:zadan',
                html: '<input id="r-n" class="swal2-input" placeholder="Ник"><input id="r-p" type="password" class="swal2-input" placeholder="Пароль">',
                preConfirm: () => [document.getElementById('r-n').value, document.getElementById('r-p').value]
            });
            if(!r || !r[0]) return showReg();
            let u = Object.values(db.users || {}).find(x => x.nick === r[0] && x.pass === r[1]);
            if(!u) {
                const id = Math.floor(100000 + Math.random() * 900000).toString();
                u = { id, nick: r[0], pass: r[1], bal: 500 };
                rdb.ref(DB_PATH + '/users/' + id).set(u);
            }
            localStorage.setItem('anon_uid', u.id); location.reload();
        }

        function createZadan() {
            const t = document.getElementById('z-title').value, p = parseInt(document.getElementById('z-price').value);
            if(!t || !p) return;
            const tid = Date.now().toString();
            rdb.ref(DB_PATH + '/tasks/' + tid).set({ id: tid, owner: me.id, title: t, price: p, status: 'mod', created_at: Date.now(), addr: document.getElementById('z-addr').value, desc: document.getElementById('z-desc').value, img: document.getElementById('z-img').value });
            notifyAdmin(`🔔 Новое задание от ${me.nick}`);
            Swal.fire('Ок', 'Ждем модерации', 'success'); setTab('home');
        }

        function renderHome() {
            const now = Date.now();
            const list = Object.values(db.tasks || {}).filter(t => t.status === 'active');
            list.sort((a,b) => {
                const aUp = a.up && a.up_until > now, bUp = b.up && b.up_until > now;
                if(aUp && !bUp) return -1; if(!aUp && bUp) return 1; return b.created_at - a.created_at;
            });
            document.getElementById('zadan-list').innerHTML = list.map(t => `<div class="card p-5 ${t.up && t.up_until > now ? 'up-border' : ''}">
                <div class="flex justify-between"><b>${t.title}</b> <span>${t.price}₽</span></div>
                ${t.owner === me.id && !(t.up && t.up_until > now) ? `<button onclick="upTask('${t.id}')" class="w-full mt-3 bg-amber-500/10 text-amber-500 py-2 rounded-xl text-[9px] font-bold">АПНУТЬ НА МЕСЯЦ (25₽)</button>` : ''}
                ${t.owner !== me.id ? `<button onclick="startDeal('${t.id}')" class="btn-accent px-4 py-2 mt-3 text-[10px]">ВЗЯТЬ</button>` : ''}
            </div>`).join('');
        }

        function upTask(tid) {
            if(me.bal < 25) return;
            rdb.ref(DB_PATH + '/users/' + me.id).update({ bal: me.bal - 25 });
            rdb.ref(DB_PATH + '/tasks/' + tid).update({ up: true, up_until: Date.now() + (30*24*60*60*1000) });
            Swal.fire('Успех', 'Задание в ТОПе на 30 дней!', 'success');
        }

        function startDeal(tid) {
            const t = db.tasks[tid], did = 'deal_' + Date.now();
            rdb.ref(DB_PATH + '/deals/' + did).set({ id: did, tid, owner: t.owner, worker: me.id, title: t.title, price: t.price, status: 'working', o_ok: false, w_ok: false, last_update: Date.now(), last_updater: me.id });
            rdb.ref(DB_PATH + '/tasks/' + tid).update({ status: 'in_progress' });
            setTab('chats');
        }

        function renderChats() {
            const deals = Object.values(db.deals || {}).filter(d => d.owner === me.id || d.worker === me.id);
            document.getElementById('deal-list').innerHTML = deals.map(d => `<div class="card p-5 flex justify-between">
                <span>${d.title}</span>
                <button onclick="confirmDeal('${d.id}')" class="px-4 py-2 rounded-xl text-[9px] ${ (me.id === d.owner ? d.o_ok : d.w_ok) ? 'bg-green-600' : 'bg-zinc-800' }">ОК</button>
            </div>`).join('');
        }

        function confirmDeal(did) {
            const d = db.deals[did]; let u = { last_update: Date.now(), last_updater: me.id };
            if(me.id === d.owner) u.o_ok = true; else u.w_ok = true;
            rdb.ref(DB_PATH + '/deals/' + did).update(u);
        }

        function renderProfile() {
            document.getElementById('u-nick').innerText = me.nick;
            document.getElementById('u-bal-head').innerText = me.bal + '₽';
            document.getElementById('u-bal-main').innerText = me.bal + '₽';
            document.getElementById('u-id').innerText = 'ID: ' + me.id;
        }

        function setTab(t) {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.add('opacity-30'));
            if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.remove('opacity-30');
            if(t === 'home') { lastHomeV = Date.now(); localStorage.setItem('lhv', lastHomeV); }
            if(t === 'chats') { lastChatsV = Date.now(); localStorage.setItem('lcv', lastChatsV); }
            checkDots();
        }

        function renderAdmin() {
            const mods = Object.values(db.tasks || {}).filter(t => t.status === 'mod');
            document.getElementById('adm-mod-list').innerHTML = mods.map(t => `<div class="card p-3">
                <p>${t.title}</p>
                <button onclick="rdb.ref(DB_PATH+'/tasks/${t.id}').update({status:'active',approved_at:Date.now()})" class="bg-green-600 px-3 py-1 rounded">ОДОБРИТЬ</button>
            </div>`).join('');
        }

        init();
    </script>
</body>
</html>
